  /v1/accounts/{accountId}/installment-advance:
    post:
      tags:
        - Installment advancements
      summary: Create installment advancement (outdated)
      description: >
        Creates an installment advancement for an account. An installment
        advancement moves one or more future installments to the current cycle.


        To advance installments for a specific installment agreement (contract),
        set the `condition` field to `SINGLE_CONTRACT`, and set the
        `transaction_id` field to the transaction ID of any of the installments
        in the installment agreement. Specify the number of installments to
        advance in the `number_of_installments_to_advance` field. Installments
        are advanced starting with the last scheduled installment in the
        agreement and working backwards from there.


        To advance <b>all</b> future installments for <b>all</b> installment
        agreements in the account, set the `condition` field to `ALL_CONTRACTS`.
        (In this case, the `number_of_installments_to_advance` field is
        ignored.)


        When you advance installments, you must specify what to do with the
        interest. You have three options:

        1. To remove 100% of the interest on the advanced installment(s), set
        the `remove_interest_from_current` field to `true` and the `calculator`
        field to `REMOVE_ALL_INTEREST`.

        2. To advance 100% of the interest on the advanced installment(s), set
        `remove_interest_from_current` to `false` and set `calculator` to
        `NONE`.

        3. To recalculate the interest applied to the advanced installment(s),
        set `calculator` to `PRESENT_VALUE`. You can set the
        `remove_interest_from_current` field  to either `true` or `false`. If
        `true`, the system recalculates interest on installments that were
        already in the current cycle (and did not need to be advanced).
        Otherwise, interest on those installments remains unchanged.

        For more information, refer to [Installment
        advancements](doc:installment-management#installment-advancements) and
        [Creating an installment
        advancment](doc:installment-management#creating-an-installment-advancement).


        This endpoint generates an <a
        href='https://developers.pismo.io/events/docs/balance-installment-advancement-1'>Installment
        advanced</a> event.


        (<b>Outdated:</b> For an updated version of this endpoint, refer to
        [Create installment advancement](ref:createinstallmentadvancementv2)).
      operationId: CreateInstallmentAdvancement
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/CorrelationIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstallmentAdvancedRequestDto'
        required: true
      responses:
        '202':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInstallmentAdvancedResponseDto'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServerError'
