openapi: 3.1.0
info:
  title: Revolving credit - Installment management
  description: >-
    Endpoints to handle moving transactions from future statements to the
    current statement.
  version: 1.0.0
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/installment-management
    description: Sandbox API server for testing
tags:
  - name: Installment advancements
    description: Endpoints to manage installment advancements
  - name: Simulations
    description: Endpoints to manage installment simulations
components:
  parameters:
    AccountIdPath:
      name: accountId
      in: path
      description: Account ID
      required: true
      style: simple
      schema:
        type: integer
        format: int64
        example: 6912345
    AdvancementIdPath:
      name: advancementId
      in: path
      description: Advancement ID
      required: true
      style: simple
      schema:
        type: integer
        format: int64
        example: 6912345
    CalculatorQuery:
      name: calculator
      in: query
      description: >-
        Specifies the type of calculation to be applied for interest reduction
        when an installment is advanced to the current cycle. To recalculate the
        interest on advancements, set `calculator` to `PRESENT_VALUE`. Default
        is `NONE`.
      required: false
      schema:
        type: string
        enum:
          - PRESENT_VALUE
          - NONE
    ConditionQuery:
      name: condition
      in: query
      description: >-
        Indicates if all installments should be advanced (`ALL_CONTRACTS`) or
        just a single installment (`SINGLE_CONTRACT`).
      required: true
      schema:
        type: string
        enum:
          - ALL_CONTRACTS
          - SINGLE_CONTRACT
        example: ALL_CONTRACTS
    CorrelationIdHeader:
      in: header
      name: x-cid
      schema:
        type: string
      description: >-
        The Correlation Identifier field is used to link related API requests
        and events. The x-cid can help the Pismo engineering team track
        everything related to a call. You can find the x-cid field in the
        response header from an API endpoint call. If this field isn't passed,
        one is automatically generated.
      example: 5bb05174-4e80-11ea-b77f-2e728ce88125
    InstallmentAdvanceIdPath:
      name: installmentAdvanceId
      in: path
      description: Installment Advance ID
      required: true
      schema:
        type: integer
        format: int64
        example: 12345
    NumberOfInstallmentsToAdvance:
      name: numberOfInstallmentsToAdvance
      in: query
      description: >-
        Define the number of installments to be brought to the current
        statement.
      required: false
      schema:
        type: integer
        example: 2
    RemoveInterestFromCurrentQuery:
      name: removeInterestFromCurrent
      in: query
      description: >-
        Indicates whether interest should be removed when an installment is
        advanced to the current statement. Default is `false`.
      required: false
      schema:
        type: boolean
        example: false
        default: false
    RescheduleQuery:
      name: reschedule
      in: query
      description: >-
        Indicates the type of rescheduling to apply. Must be set to
        `ADVANCEMENT`.
      required: true
      schema:
        type: string
        enum:
          - ADVANCEMENT
    TransactionIdQuery:
      name: transactionId
      in: query
      description: Transaction ID
      required: false
      schema:
        type: integer
        format: int64
        example: 98457355
  schemas:
    AccountID:
      type: integer
      description: Account ID
      format: int64
      example: 67854328
    AdvancementErrorMessage:
      type: string
      description: Error message if advancement failed
      example: Operation error
    AdvancementId:
      type: integer
      description: Advancement ID
      format: int64
      example: 67854328
    AdvancementStatus:
      type: string
      description: Current status of the advancement
      enum:
        - CREATED
        - PROCESSED
        - CANCELLED
        - ERROR
        - CANCELLATION_ERROR
      example: PROCESSED
    AuthorizationID:
      type: integer
      format: int64
      description: Authorization ID for the contract
      example: 12345
    Calculator:
      type: string
      description: |
        Type of calculation to apply. Default is `NONE`.
      example: PRESENT_VALUE
      enum:
        - PRESENT_VALUE
        - REMOVE_ALL_INTEREST
        - NONE
    CanceledAt:
      type: string
      format: date-time
      description: Date/time advancement was canceled. Format = yyyy-mm-dd:hr:mm:ss.
      example: '2021-04-14T12:00:00-03:00'
    CancelInstallmentAdvancedResponseDto:
      type: object
      description: Represents the result of the cancellation of an advancement.
      properties:
        advancement_id:
          $ref: '#/components/schemas/AdvancementId'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        cancelled_at:
          $ref: '#/components/schemas/CanceledAt'
        accountId:
          $ref: '#/components/schemas/AccountID'
        condition:
          $ref: '#/components/schemas/Condition'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        installments:
          type: array
          items:
            $ref: '#/components/schemas/InstallmentResponseDto'
    CancellationInstallmentAdvancedV2ResponseDto:
      type: object
      description: Response returned when an installment advancement (V2) is canceled.
      properties:
        id:
          $ref: '#/components/schemas/AdvancementId'
          description: Unique identifier for the installment advancement cancellation.
        condition:
          $ref: '#/components/schemas/ConditionV2'
          description: The condition of the installment advancement
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
          description: Identifier used to track the cancellation request.
        calculator:
          $ref: '#/components/schemas/Calculator'
          description: Details about the calculation performed for the cancellation.
        reschedule:
          $ref: '#/components/schemas/Reschedule'
          description: Information about any rescheduling related to the cancellation.
        remove_interest_from_current:
          $ref: '#/components/schemas/RemoveInterestFromCurrent'
          description: >-
            Indicates whether interest should be removed from the current
            statement as part of the cancellation.
        contracts:
          type: array
          description: >-
            List of contract details affected by the installment advancement
            cancellation.
          items:
            $ref: '#/components/schemas/ContractAdvancementResponseDto'
    Condition:
      type: string
      description: >
        Installments should be advanced for all the contracts for an account
        (`ALL_CONTRACTS`) or for a specific contract (`SINGLE_CONTRACT`).

        If `condition` is set to `SINGLE_CONTRACT`, then the `transaction_id`
        field must be set to the transaction ID of the specific contract.
      example: SINGLE_CONTRACT
      enum:
        - SINGLE_CONTRACT
        - ALL_CONTRACTS
    ConditionV2:
      type: string
      description: >
        Installments should be advanced for all the contracts for an account
        (`ALL_CONTRACTS`) or for multiple specific contracts
        (`MULTIPLE_CONTRACTS`).
      example: MULTIPLE_CONTRACTS
      enum:
        - MULTIPLE_CONTRACTS
        - ALL_CONTRACTS
    ContractAdvancementDto:
      type: object
      description: Contract advancement configuration for multiple contracts mode
      required:
        - remove_interest_from_current
        - authorization_id
        - calculator
        - reschedule
      properties:
        authorization_id:
          $ref: '#/components/schemas/AuthorizationID'
        calculator:
          $ref: '#/components/schemas/Calculator'
        remove_interest_from_current:
          $ref: '#/components/schemas/RemoveInterestFromCurrent'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        contract_condition:
          $ref: '#/components/schemas/ContractCondition'
        number_of_installments:
          $ref: '#/components/schemas/NumberOfInstallmentsToAdvance'
    ContractAdvancementResponseDto:
      type: object
      description: Contract advancement response
      properties:
        remove_interest_from_current:
          $ref: '#/components/schemas/RemoveInterestFromCurrent'
        authorization_id:
          $ref: '#/components/schemas/AuthorizationID'
        number_of_installments:
          $ref: '#/components/schemas/NumberOfInstallmentsToAdvance'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
    ContractCondition:
      type: string
      description: >
        Should all the remaining installments for the contract be advanced
        (`ALL_INSTALLMENTS`) or just a specific number of them
        (`SPECIFIC_NUMBER_OF_INSTALLMENTS`)?


        If this field is set to `SPECIFIC_NUMBER_OF_INSTALLMENTS`, the
        `number_of_installments` field must be set. If this field is set to
        `ALL_INSTALLMENTS`, the `number_of_installments` field is ignored.
      example: ALL_INSTALLMENTS
      enum:
        - ALL_INSTALLMENTS
        - SPECIFIC_NUMBER_OF_INSTALLMENTS
    CreatedAt:
      type: string
      format: date-time
      description: Date/time advancement was created. Format = yyyy-mm-dd:hr:mm:ss.
      example: '2021-04-14T12:00:00-03:00'
    CreateInstallmentAdvancedRequestDto:
      type: object
      description: Parameters for requesting an advancement
      properties:
        transaction_id:
          $ref: '#/components/schemas/TransactionID'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        condition:
          $ref: '#/components/schemas/Condition'
        remove_interest_from_current:
          $ref: '#/components/schemas/RemoveInterestFromCurrent'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        number_of_installments_to_advance:
          $ref: '#/components/schemas/NumberOfInstallmentsToAdvance'
    CreateInstallmentAdvancedResponseDto:
      type: object
      description: Response returned by advancement creation request
      properties:
        advancement_id:
          $ref: '#/components/schemas/AdvancementId'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        accountId:
          $ref: '#/components/schemas/AccountID'
        condition:
          $ref: '#/components/schemas/Condition'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        installments:
          type: array
          items:
            $ref: '#/components/schemas/InstallmentResponseDto'
    CreateInstallmentAdvancedV2RequestDto:
      type: object
      description: Parameters for requesting an advancement (V2)
      required:
        - condition
        - tracking_id
      properties:
        condition:
          $ref: '#/components/schemas/ConditionV2'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        remove_interest_from_current:
          $ref: '#/components/schemas/RemoveInterestFromCurrent'
        contracts:
          type: array
          description: >-
            Array of contract advancement configurations (required for
            `MULTIPLE_CONTRACTS` condition)
          items:
            $ref: '#/components/schemas/ContractAdvancementDto'
    CreateInstallmentAdvancedV2ResponseDto:
      type: object
      description: Response returned by advancement creation request (V2)
      properties:
        id:
          $ref: '#/components/schemas/AdvancementId'
        condition:
          $ref: '#/components/schemas/ConditionV2'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        remove_interest_from_current:
          $ref: '#/components/schemas/RemoveInterestFromCurrent'
        number_of_installments:
          $ref: '#/components/schemas/NumberOfInstallmentsToAdvance'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        cancelled_at:
          $ref: '#/components/schemas/CanceledAt'
        contracts:
          type: array
          description: >-
            Array of contract advancement configurations (present for
            `MULTIPLE_CONTRACTS` condition)
          items:
            $ref: '#/components/schemas/ContractAdvancementResponseDto'
        installments:
          type: array
          description: Array of installment details
          items:
            $ref: '#/components/schemas/InstallmentResponseDto'
        error_message:
          $ref: '#/components/schemas/AdvancementErrorMessage'
        status:
          $ref: '#/components/schemas/AdvancementStatus'
    ErrorCode:
      type: string
      description: Error code
      example: EX0001
    GetInstallmentAdvancedResponseDto:
      type: object
      description: Response returned by the creation of an advancement.
      properties:
        advancement_id:
          $ref: '#/components/schemas/AdvancementId'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        cancelled_at:
          $ref: '#/components/schemas/CanceledAt'
        accountId:
          $ref: '#/components/schemas/AccountID'
        condition:
          $ref: '#/components/schemas/Condition'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        number_of_installments_to_advance:
          $ref: '#/components/schemas/NumberOfInstallmentsToAdvance'
        installments:
          type: array
          items:
            $ref: '#/components/schemas/InstallmentResponseDto'
    GetInstallmentAdvanceV2ResponseDto:
      type: object
      description: Response returned by the V2 get installment advancement endpoint
      properties:
        id:
          $ref: '#/components/schemas/AdvancementId'
        condition:
          $ref: '#/components/schemas/ConditionV2'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        remove_interest_from_current:
          $ref: '#/components/schemas/RemoveInterestFromCurrent'
        number_of_installments:
          $ref: '#/components/schemas/NumberOfInstallmentsToAdvance'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        cancelled_at:
          $ref: '#/components/schemas/CanceledAt'
        contracts:
          type: array
          description: >-
            Array of contract advancement configurations (present for
            `MULTIPLE_CONTRACTS` condition)
          items:
            $ref: '#/components/schemas/ContractAdvancementResponseDto'
        installments:
          type: array
          description: Array of installment details
          items:
            $ref: '#/components/schemas/InstallmentResponseDto'
        error_message:
          $ref: '#/components/schemas/AdvancementErrorMessage'
        status:
          $ref: '#/components/schemas/AdvancementStatus'
    InstallmentResponseDto:
      type: object
      properties:
        new_amount:
          type: number
          format: double
          description: >
            The full installment amount after applying any discount, including
            principal and interest charges.
          example: 99.9
        old_amount:
          type: number
          format: double
          description: >
            The full installment amount before applying any discount, including
            principal and interest charges.
          example: 102.9
        new_interest_amount:
          type: number
          format: double
          description: >
            The full interest amount of an installment after applying any
            discount. This value is calculated as follows:

            `new_interest_amount` = `new_amount` x interest rate

            Since `new_amount` already includes both principal and interest,
            this formula provides an estimate of the interest portion of the new
            installment amount.
          example: 9.9
        old_interest_amount:
          type: number
          format: double
          description: >
            The full interest amount of an installment before applying any
            discount.
          example: 11.9
        new_statement_id:
          type: number
          format: integer
          description: |
            ID of the current statement
          example: 1
        old_statement_id:
          type: number
          format: integer
          description: >
            ID of the old statement. This is the ID of the statement on which
            the installment was scheduled to appear before it was advanced. For
            installments that are not advanced, `old_statement_id` and
            `new_statement_id` should contain the same values.
          example: 10
    NumberOfInstallmentsToAdvance:
      type: integer
      format: int32
      description: >
        Number of installments to advance.


        This field is **REQUIRED** if `contract_condition` is set to
        `SPECIFIC_NUMBER_OF_INSTALLMENTS`. If `contract_condition` is set to
        `ALL_CONTRACTS`, this field is ignored.
      example: 3
    RemoveInterestFromCurrent:
      type: boolean
      description: Whether interest should be removed when an installment is advanced.
      example: false
      default: false
    Reschedule:
      type: string
      description: |
        Reschedule mode to apply. Must be `ADVANCEMENT`.
      example: ADVANCEMENT
      enum:
        - ADVANCEMENT
    SimulateInstallmentAdvancedResponseDto:
      type: object
      description: Response returned by the simulation of an advancement
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        condition:
          $ref: '#/components/schemas/Condition'
        calculator:
          $ref: '#/components/schemas/Calculator'
        reschedule:
          $ref: '#/components/schemas/Reschedule'
        installments:
          type: array
          items:
            $ref: '#/components/schemas/InstallmentResponseDto'
    StandardErrorResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          description: Error message
          example: Internal error
    TrackingID:
      type: string
      description: >-
        Tracking ID. A client-supplied tracking ID that can be used to keep
        track of an advancement. Must consist of the characters
        [a-z,A-Z,0-9,-,:] with a range from 1 to 128.
      example: 3ea22692-a209-11eb-89a2-f73e179dcbc2
    TransactionID:
      type: integer
      format: int64
      description: Transaction ID
      example: 98457355
    UpdatedAt:
      type: string
      format: date-time
      description: Date/time advancement was last updated. Format = yyyy-mm-dd:hr:mm:ss.
      example: '2025-09-01T10:05:00'
  responses:
    404NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
          examples:
            Installment advance not found:
              description: Installment advancement not found
              value:
                code: EX307
                message: >-
                  Installment advancement AdvancementID for account accountID
                  not found.
    400BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
          examples:
            Missing request header:
              description: Missing request header
              value:
                code: EX0002
                message: Missing request header for method parameter of type String
    409Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
          examples:
            Account conflict:
              value:
                message: >-
                  Installment advance already exists with this Account_ID and
                  Tracking_ID.
    500InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
          examples:
            Internal Server Error:
              description: Service is unavailable
              value:
                code: GN0001
                message: Service is unavailable
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Account access token. Tokens can expire quickly, which can result in an
        "Unauthorized" error.
      bearerFormat: JWT
security:
  - BearerAuth: []
paths:
  /v1/accounts/{accountId}/installment-advance/simulations:
    get:
      tags:
        - Simulations
      summary: Simulate installment advancement
      description: >
        Simulates an installment advancement for an account. That is, it
        simulates advancing one or more installments from a future cycle to the
        current cycle.


        To simulate advancing installments for a specific installment agreement
        (contract), set the `condition` query parameter to `SINGLE_CONTRACT`,
        and set the `transaction_id` query parameter to the transaction ID of
        any of the installments in the installment agreement. Specify the number
        of installments to advance in the simulation in the
        `number_of_installments_to_advance` query parameter. Installments are
        advanced starting with the last scheduled installment in the agreement
        and working backwards from there.


        To simulate advancing <b>all</b> future installments for <b>all</b>
        installment agreements in the account, set the `condition` field to
        `ALL_CONTRACTS`. (In this case, the `number_of_installments_to_advance`
        field is ignored.)


        When you simulate advancing installments, you must specify what to do
        with the interest. You have three options:

        - To simulate removing 100% of the interest on the advanced
        installment(s), set the `remove_interest_from_current` query parameter
        to `true` and the `calculator` query parameter to `NONE`.

        - To simulate advancing 100% of the interest on the advanced
        installment(s), set `remove_interest_from_current` to `false` and set
        `calculator` to `NONE`.

        - To simulate recalculating the interest applied to the advanced
        installments(s), set `calculator` to `PRESENT_VALUE`. The
        `remove_interest_from_current` parameter can be set to either `true` or
        `false`. If `true`, the interest on installments that were already in
        the current cycle (and did not need to be advanced) is recalculated in
        the simulation. Otherwise, interest on those installments is unchanged.


        For more information, see <a
        href='https://developers.pismo.io/pismo-docs/docs/installment-management#installment-advancements'>Installment
        advancements</a>.


        This endpoint generates an <a
        href='https://developers.pismo.io/events/docs/balance-installment-advancement-1'>Installment
        advanced</a> event.      
      operationId: SimulateInstallmentAdvancement
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/TransactionIdQuery'
        - $ref: '#/components/parameters/ConditionQuery'
        - $ref: '#/components/parameters/RemoveInterestFromCurrentQuery'
        - $ref: '#/components/parameters/CalculatorQuery'
        - $ref: '#/components/parameters/RescheduleQuery'
        - $ref: '#/components/parameters/NumberOfInstallmentsToAdvance'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulateInstallmentAdvancedResponseDto'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v2/accounts/{accountId}/installment-advance:
    post:
      tags:
        - Installment advancements
      summary: Create installment advancement
      description: >
        Creates an installment advancement for an account. An installment
        advancement moves one or more future installments to the current cycle.


        This version supports two advancement modes:


        **ALL_CONTRACTS mode**: Advances all future installments for all
        installment agreements in the account. When using this mode:

        - Set `condition` to `ALL_CONTRACTS`.

        - The `calculator`, `reschedule`, and `remove_interest_from_current`
        fields are required at the root level.

        - The `contracts` array should <i>not</i> be provided.


        **MULTIPLE_CONTRACTS mode**: Advances installments for specific
        contracts with individual configurations. When using this mode:

        - Set `condition` to `MULTIPLE_CONTRACTS`.

        - Provide a `contracts` array with individual contract configurations.

        - Root-level `calculator`, `reschedule`, and
        `remove_interest_from_current` fields must not be provided.


        When you advance installments, you must specify what to do with the
        interest. You have three options:

        1. To remove 100% of the interest on the advanced installment(s), set
        the `remove_interest_from_current` field to `true` and the `calculator`
        field to `REMOVE_ALL_INTEREST`.

        2. To advance 100% of the interest on the advanced installment(s), set
        `remove_interest_from_current` to `false` and set `calculator` to
        `NONE`.

        3. To recalculate the interest applied to the advanced installment(s),
        set `calculator` to `PRESENT_VALUE`. You can set the
        `remove_interest_from_current` field  to either `true` or `false`. If
        `true`, the system recalculates interest on installments that were
        already in the current cycle (and did not need to be advanced).
        Otherwise, interest on those installments remains unchanged.

        For more information, refer to [Installment
        advancements](doc:installment-management#installment-advancements) and
        [Creating an installment
        advancment](doc:installment-management#creating-an-installment-advancement).


        This endpoint triggers an async process in which the transactions are
        advanced as requested.
      operationId: CreateInstallmentAdvancementV2
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/CorrelationIdHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstallmentAdvancedV2RequestDto'
            examples:
              all_contracts:
                summary: Advance all contracts
                description: >-
                  Example for advancing all future installments for all
                  contracts
                value:
                  condition: ALL_CONTRACTS
                  tracking_id: 3ea22692-a209-11eb-89a2-f73e179dcbc2
                  calculator: PRESENT_VALUE
                  reschedule: ADVANCEMENT
                  remove_interest_from_current: false
              multiple_contracts:
                summary: Advance multiple specific contracts
                description: >-
                  Example for advancing specific contracts with individual
                  configurations
                value:
                  condition: MULTIPLE_CONTRACTS
                  tracking_id: 3ea22692-a209-11eb-89a2-f73e179dcbc2
                  contracts:
                    - remove_interest_from_current: false
                      authorization_id: 12345
                      number_of_installments: 3
                      calculator: PRESENT_VALUE
