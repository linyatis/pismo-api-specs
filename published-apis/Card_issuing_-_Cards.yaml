  /wallet/v2/cards/{cardId}/program-migration:
    post:
      summary: Migrate card to different program [beta]
      description: >
        Migrate a card to a different program. It is possible to migrate from a
        Zero balance program to a Full balance program and vice-versa.
                
        This endpoint generates two events:

          * [Card can be added to next scheduled embossing](https://developers.pismo.io/events/docs/cards-embossing-card-ingress-1) event containing the field `operation_type` = `CARD_PROGRAM_MIGRATION` if the card has not yet been embossed.

          * [Card migrated](https://developers.pismo.io/events/docs/cards-migration-1) event. 

        **Notes:** 

           * This endpoint **REQUIRES** an account token - an access token encoded with a Pismo account ID.

           * For combination cards, this endpoint migrates the [card mode](doc:cards-overview-1#create-a-combination-card-with-card-modes) the card was originally created with. To migrate the secondary mode, call the [Migrate card mode](ref:post-migrate-card-mode) endpoint.
      operationId: post-migrate-card
      tags:
        - Migration
      parameters:
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/customerIdHeader'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateCardToProgramRequest'
      responses:
        '202':
          description: Success
        '400':
          $ref: '#/components/responses/400BadRequest2'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '406':
          $ref: '#/components/responses/406NotAcceptable'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v2/cards/{cardId}/mode/{modeId}/program-migration:
    post:
      summary: Migrate card mode [beta]
      description: >
        Migrate a [card's
        mode](doc:cards-overview-1#create-a-combination-card-with-card-modes) to
        a different program.


        Migrate a card's secondary mode (debit or credit) to a new program. If a
        combination card is initially created with a credit account (has a
        `CREDIT` mode), it gets migrated when the [Migrate card to different
        program](ref:post-migrate-card) endpoint is called. However, if you wish
        to migrate the debit (secondary) mode, you need to call this endpoint. 


        This endpoint generates a [Card
        migrated](https://developers.pismo.io/events/docs/cards-migration-1)
        event. 


        **Note:** This endpoint **REQUIRES** an account token - an access token
        encoded with a Pismo account ID.
      operationId: post-migrate-card-mode
      tags:
        - Migration
      parameters:
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/modeIdPath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateCardToProgramRequest'
      responses:
        '202':
          description: Success
        '400':
          $ref: '#/components/responses/400BadRequest2'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '406':
          $ref: '#/components/responses/406NotAcceptable'
        '500':
          $ref: '#/components/responses/500InternalServer'
