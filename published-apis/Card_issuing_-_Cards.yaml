  /wallet/v2/cards/{cardId}/validity/renew:
    patch:
      summary: Renew card validity
      description: >
        Renew a card's validity period in hours. 


        Renewal can be done for `VIRTUAL` cards and activated `PLASTIC` cards
        that were created or reissued with the `validity_period_hours` field set
        to a defined value greater than zero.


        When a card reaches its `valid_until` date, the card's status is set to
        `INOPERATIVE`. When this happens, a [Card
        updated](https://developers.pismo.io/events/docs/cards-update-1) event
        is generated.


        For existing cards that never had `validity_period_hours` defined, you
        can do it through this endpoint.


        When the card is renewed: 

          * A new `valid_until` date is calculated and a [Card updated](https://developers.pismo.io/events/docs/cards-update-1) event is generated with `operation type` =  `CARD_VALIDITY_RENEWAL`.

          * If the card's status is `INOPERATIVE`, the status changes to `NORMAL`.

          * If the card's status is `NORMAL`, `REISSUED`, `BLOCKED`, `PENDING` or `WARNING`, the status remains the same. 

        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthoried** error message. 
      operationId: patch-v2-card-validity-renew
      tags:
        - Card validity
      parameters:
        - $ref: '#/components/parameters/cardId'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardsValidityRenewBody'
      responses:
        '200':
          description: Card validity period was renewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardsValidityRenewResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v2/cards/{cardId}/validity:
    delete:
      operationId: delete-v2-card-validity
      summary: Delete card validity period
      description: >
        Delete a card's previously scheduled validity period. 


        The card's validity period can be removed when a virtual or plastic card
        has a `valid_until` value in effect.


        If the card's status is `NORMAL`, `REISSUED`, `BLOCKED`, `PENDING`, or
        `WARNING`, the `valid_until` value is removed and the card's status
        remains the same.


        When authorizing a card with a `valid_until` value in effect, this date
        and the card's `expiration date` are both taken into account. Otherwise,
        only the `expiration_date` is taken into account.


        This endpoint generates a [Card
        updated](https://developers.pismo.io/events/docs/cards-update-1) event
        with `operation_type` = `CARD_VALIDITY_CANCEL`.


        **Notes:** 

         * This endpoint requires an account token - an access token encoded with a Pismo account ID. 

         * This is a PCI endpoint, use the https://gw-pci.pismolabs.io environment.
      tags:
        - Card validity
      parameters:
        - $ref: '#/components/parameters/cardId'
      responses:
        '204':
          description: No content.
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
