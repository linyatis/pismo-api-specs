  /wallet/v2/cards/{cardId}/password-tries/increase:
    post:
      operationId: post-v2-card-password-increase
      summary: Increase password try count
      description: >
        Increase a card's password tries counter by 1. 


        If the counter reaches the maximum number of tries configured in the
        program parameter for this and `block_card_exceeds_counter` is `true`,
        the card is blocked.

        When this happens:

          * The status is changed to `BLOCKED` 
          * A [Card updated](https://developers.pismo.io/events/docs/cards-update-1) event is generated.

        If the card's status is `CREATED`, the counter is increased, but the
        status does not change.


        For more information, refer to the [Card lifecycle and
        statuses](doc:card-lifecycle-and-statuses) guide.
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/cardId'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardsIncreasePasswordBody'
      responses:
        '200':
          description: Card password tries increased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardsIncreasePasswordTriesResponse'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
