          type: BROKEN
          must_charge: false
          must_block: false
          cost: '20.00'
        - id: '1721'
          description: Name change
          type: RENAME
          must_charge: false
          must_block: false
          cost: '9.90'
        - id: '1722'
          description: Customer request
          type: CLIENT_ORDER
          must_charge: false
          must_block: false
          cost: '9.90'
        - id: '1723'
          description: Scratched card
          type: SHAVED
          must_charge: false
          must_block: false
          cost: '9.90'
        - id: '1724'
          description: Loss of relief
          type: RELIEF_LOSS
          must_charge: false
          must_block: false
          cost: '9.90'
        - id: '1725'
          description: Lost
          type: LOST
          must_charge: false
          must_block: true
          cost: '9.90'
        - id: '1726'
          description: Robbed
          type: ROBBED
          must_charge: false
          must_block: true
          cost: 'null'
        - id: '1727'
          description: Theft
          type: THEFT
          must_charge: false
          must_block: true
          cost: 'null'
        - id: '1728'
          description: Card not received
          type: UNRECEIVED
          must_charge: false
          must_block: true
          cost: 'null'
        - id: '1729'
          description: Card is not working
          type: DAMAGED
          must_charge: false
          must_block: false
          cost: 'null'
        - id: '1730'
          description: Defective card
          type: DEFECT
          must_charge: false
          must_block: false
          cost: 'null'
        - id: '1731'
          description: Incorrect name
          type: INCORRECT_NAME
          must_charge: false
          must_block: false
          cost: 'null'
