    Hash:
      type: string
      description: >
        Encrypted Primary Account Number (PAN). This field does not exist until
        the card PCI data is asynchronously created.
      example: >-
        WEPvOQuZvjfYEd0iBmr43bhWyOsylIsW95ebYrLD89App2iEq9IizP+8w73pxKQ4mI47EdhzYHF9RfXjrBOyug==
    IncrementBulk:
      type: object
      description: Increment noname card bulk request object
      required:
        - external_ids
      properties:
        external_ids:
          $ref: '#/components/schemas/ExternalIDs'
    InitializationVector:
      type: string
      description: >
        Array initialization vector, used as a initial state for the AES
        algorithm. This field is used on the requester side to encrypt the PAN.
        It must be an random array of 16 bytes of length encoded as base64
      example: ZZ3cUcotvQeaGciyLZb1wA==
    InitialVector:
      type: string
      description: >
        Initial vector (IV) value, needs to be 16 bytes and hexadecimal. An IV
        is a random or pseudo-random value used as the starting point for an
        encryption algorithm to generate a unique cipher text for each message.
        The IV is used in combination with a secret key (`key_id`) to ensure
        that the same message encrypted with the same key does not result in the
        same cipher text.
    IssuingDate:
      type: string
      description: >-
        Date/time when card was issued in RFC3339 format, i.e.,
        2019-07-03T17:23:18Z
      example: '2019-07-03T17:23:18Z'
    KeyID:
      type: string
      description: >
        Key ID used for encryption. To obtain the `key_id`, the sender will
        generate a symmetric key (AES), encrypt this key with an asymmetric key
        (public_key) and send it via secure email to the security team. 


        To obtain the asymmetric key, you must open a Configuration item for the
        Cards squad. After the Pismo security team registers the symmetric key,
        the `key_id` is shared with the issuer.
      example: 5c09cda4-8153-11ed-a1eb-0242ac120002
    KeyID2:
      type: string
      description: >
        Generated key ID. 


        A Zone PIN Key (ZPK) identifier. The ZPK is a data encrypting or
        decrypting key for PIN transfer between parties. Ffor example, between
        issuers and processors or acquirers and networks or networks and
        processors, and so on.


        In a sandbox environment, a fixed ZPK is used:

          key_id: 7d14ca2e-1057-11ee-8cee-060f666de710

          HSM key: 0404F2543B1C6E70AB61586E1304B6A7

        For production, open a Jira ticket with type = **Configuration**.
        Request you need the key to use endpoints with PIN management such as
        PINBLOCK.
      example: 32a147ec-b2d9-4b0d-8c5b-557e6cf41e0e
    KeyID3:
      type: string
      description: >
        Encryption key ID to embossing, used in conjunction with the initial
        vector value.
    Last4Digits:
      type: string
      description: >
        Last four Primary Account Number (PAN) digits. This field does not exist
        until the card PCI data is asynchronously created.
      example: '4321'
    Metadata:
      type: object
      description: >-
        Any key-value object. Max length = 3200 bytes. This **must** be valid
        JSON data.
      example:
        my-custom-key: my-custom-value
      maxLength: 3200
    MigrateCardToProgramRequest:
      type: object
      description: Migrate card to different program object
      required:
        - new_program_id
      properties:
        new_program_id:
          $ref: '#/components/schemas/ProgramID'
    Mode:
      type: string
      description: >
        Mode enum:

        `CREDIT` - Single credit card

        `DEBIT` - Single debit card

        `COMBO` - Card has both a credit and debit *mode*, meaning it is
        associated with both a credit and debit program and account.

        `MULTIPLE` -  Combination card created with the DEPRECATED [Create combo
        card](ref:post-v1-combocard-relationship) endpoint. 


        For more information, refer to the [mode
        documentation](doc:cards-overview-1#create-a-combination-card-with-card-modes)
        in the Card management guide.
      example: CREDIT
      enum:
        - CREDIT
        - DEBIT
        - COMBO
        - MULTIPLE
    ModeType:
      type: string
      description: >
        Mode type enum - `SINGLE` or `COMBO`.  A combo card can have both a
        credit and debit *mode*, meaning it is associated with both a credit and
        debit program and  account. A single card has one mode - credit or
        debit. Refer to the [mode
        documentation](doc:cards-overview-1#create-a-combination-card-with-card-modes)
        in the Card overview guide for more information.
      example: COMBO
      enum:
        - SINGLE
        - COMBO
    NumberOfTransactions:
      type: integer
      description: Maximum transactions allowed
      example: 40
    Operation:
      type: string
      description: >
        Operation that changed the card status:  

        * `ACTIVATE`&mdash;When the card is activated via the [Activate physical
        card](ref:put-v1-card-activate) endpoint.

        * `UPDATE_STATUS_PUT`&mdash;When the card has its status changed via the
        [Update card status](ref:put-v1-card-status) endpoint.

        * `UPDATE_STATUS_PATCH`&mdash;When any card data changed via the end
        [Update card information](ref:patch-v2-card) endpoint.

        * `REISSUE`&mdash;When a card is reissued via the [Reissue
        card](ref:post-v1-card-reissue) endpoint. 

        * `RESET_PASSWORD_TRIES`&mdash;When the password try counter is reset
        via the [Reset password try count](ref:post-v2-card-password-reset)
        endpoint.

        * `BIND_NONAME`&mdash;When the card noname and the cardholder are bound
        via the [Associate noname card with customer](ref:post-v2-card-bind)
        endpoint.

        * `BIND_REISSUE`&mdash;When the card noname and the holder are bound
        with reissue use case via the [Associate noname card with
        customer](ref:post-v2-card-bind) 

        * `TEMPORARY_CARD_INOPERATIVE_EVENT`&mdash;When the `TEMPORARY` card is
        renewed and has its status changed to `NORMAL`. More details about
        `TEMPORARY` cards at [Cards management](doc:cards-overview-1) 

        * `TEMPORARY_CARD_RENEWAL_EVENT`&mdash;When the `TEMPORARY` card is
        renewed and has its status changed to `INOPERATIVE`. More details about
        `TEMPORARY` cards at [Cards management](doc:cards-overview-1)  

        * `AUTH_PASSWORD_TRIES_EXCEEDED`&mdash;When at the time network
        authorization (OffUs), the number of password tries made reaches the
        allowed try limit.

        * `AUTHONUS_PASSWORD_TRIES_EXCEEDED`&mdash;When at the time
        authorization (OnUs), the number of password tries made reaches the
        allowed try limit.

        * `INCREASE_PASSWORD_TRIES_EXCEEDED`&mdash;When the number of attempts
        is increased through the endpoint

        * `MIGRATION`&mdash;When in the card migration flow to Pismo the card
        status changes.

        * `AUTH_REFERRED`&mdash;When at the time authorization and performing
        fraud analysis, the issuer can return a flag so that the card is blocked
      example: ACTIVATE
      enum:
        - ACTIVATE
        - UPDATE_STATUS_PUT
        - UPDATE_STATUS_PATCH
        - REISSUE
        - RESET_PASSWORD_TRIES
        - BIND_NONAME
        - BIND_REISSUE
        - TEMPORARY_CARD_INOPERATIVE_EVENT
        - TEMPORARY_CARD_RENEWAL_EVENT
        - AUTH_PASSWORD_TRIES_EXCEEDED
        - AUTHONUS_PASSWORD_TRIES_EXCEEDED
        - INCREASE_PASSWORD_TRIES_EXCEEDED
        - MIGRATION
        - AUTH_REFERRED
    OrgID:
      type: string
      description: Organization/tenant ID
      example: TN-f878e4a1-2879-48ba-be16-821e73ac98db
    PAN:
      type: string
      description: >
        Card embossed Primary Account Number (PAN).


        **Note:** The PAN shown here is a fictional example used for
        documentation purposes. It does not represent a real card number.
      example: 123456******7890
    PANencrypted:
      type: string
      description: >
        Primary Account Number (PAN) encrypted with AES/GCM/NoPadding algorithm.
        The ciphertext (PAN encryption result) is **REQUIRED** to be base64
        encoded.
      example: /5yGTkBSoqGY+Ug5yJuHUSGk54VRMNoY0G5Ni2HSa64=
    PasswordTries:
      type: integer
      description: Number of times the password was tried
      example: 1
    PrimaryAccountNumber:
      type: string
      description: Card's Primary Account Number (PAN)
      example: 123456******789
    PasswordUpdated:
      type: boolean
      description: Has password been updated?
    PIN:
      type: string
      description: Card Primary Identification Number (PIN) - 4 or 6 digits
      minLength: 4
      maxLength: 6
      example: '7654'
    PIN2:
      type: string
      description: New card Primary Identification Number (PIN)- 4 or 6 digits.
      minLength: 4
      maxLength: 6
      example: '1234'
    PinBlock:
      type: string
      description: >
        PINBlocks are 64-bit strings that encode a PIN ready for encryption and
        secure transmission in banking networks. It contains both the PIN and
        additional data needed to encrypt it for transmission. The PIN block is
        typically encrypted using a secure cryptographic algorithm to prevent
        unauthorized access or tampering during transmission. 
      example: 4E49BF480C44A36C
    PinLength:
      type: integer
      description: PIN length - 4 or 6 digits. Default is `4`.
      default: 4
      enum:
        - 4
        - 6
    PinLengthString:
      type: string
      description: >
        PIN length. 


        Either `pinblock` or `pin_length` is **REQUIRED**. If `pinblock` is not
        passed, Pismo will generate a random PIN. 
      example: '4'
      enum:
        - '4'
        - '6'
    PreviousStatus:
      type: string
      description: >
        Previous card status. 


        Refer to the [Card lifecycle and
        statuses](doc:card-lifecycle-and-statuses) guide for more information
        and a complete list.
      example: NORMAL
    PrintedName:
      type: string
      minLength: 2
      maxLength: 26
      example: Chester Fields
      description: >
        Printed/embossed card name.


        Currently, you have 3 ways to populate this field:
           
           1. During account creation via the `application.applicant.personal.social_name` field.
           2. During account creation via the `application.applicant.personal.name` field when the field in #1 is not set.
           3. Passing the `printed_name` field during card creation, updating a card, or when reissuing a card. This takes priority over #1 and #2.

        No letters with accents, numbers, or special characters - only letters
        (a-z|A-Z) and space, as specified in the <a
        href="https://emvlab.org/emvtags/show/t5F20/" target="_blank">ISO EMV
        tag 5F20</a> for cardholder name.


        **REQUIRED** for an `UNNUMBERED` card (Card created without PIN or PAN
        that issuer defines at some point in the future.)
    ProgramID:
      type: integer
      description: Pismo program ID
      example: 7654
