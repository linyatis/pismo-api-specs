    cvvRotationInterval:
      type: integer
      description: >
        <b>REQUIRED</b> for a virtual card.  Virtual card CVV rotation interval
        in hours.


        To force a rotation manually, call the [Rotate virtual card
        CVV](ref:post-v2-reset-cvv) endpoint.


        If `0` is passed, the CVV will **NOT** be rotated.
