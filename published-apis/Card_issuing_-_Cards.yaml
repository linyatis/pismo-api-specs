  /embossing/v1/triggers/embossing:
    post:
      operationId: start-embossing
      summary: Start card embossing
      description: >
        Starts card embossing for a specific embossing configuration. Within
        that configuration, you can emboss cards for a specific program or
        card(s).


        * If only `config_id` is passed in the request, then all cards in all
        programs are added to the embossing file.

        * If `config_id` and  program ID(s) are passed in the request, then all
        cards in those programs are added to the embossing file.

        * If `config_id` and card ID(s) are passed in the request, then only
        those cards are added to the embossing file.


        You can call the [List embossing files](ref:get-embossing-file-info)
        endpoint to get embossing configuration IDs.


        The file generation is asynchronous and not in real-time for any option
        described above.


        Only available in the EXT environment. For more information, refer to
        [Embossing flows](doc:physical-card-embossing#embossing-flow).


        **Note:** This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      tags:
        - Embossing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config_id:
                  $ref: '#/components/schemas/ConfigID'
                programs:
                  type: array
                  description: Program ID array
                  items:
                    type: integer
                cards:
                  type: array
                  description: Card ID array
                  items:
                    type: integer
              required:
                - config_id
      responses:
        '202':
          description: Embossing trigger as Accepted
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                description: ''
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: integer
                  error:
                    type: string
              examples:
                example-bad-request:
                  value:
                    message: Field config_id is required
                    error: bad_request
                    status: 400
