        A 3 digit value, not to be confused with the CVV. Each number in the
        service code has a well-defined meaning, known to the card networks and
        other components of the interchange networks. The service code's purpose
        is to tell merchant terminals and acquiring networks about usage
        restrictions the issuer has placed on the card.


        If passed, a new random service code value is not generated, and the
        passed value is used instead.
      minLength: 3
      maxLength: 3
