openapi: 3.0.1
info:
  title: Card issuing - Cards
  version: 1.4.6
  description: Card endpoints API
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io
    description: Sandbox API server for testing.
  - url: https://gw-pci.pismolabs.io
    description: Sandbox PCI API server for testing
security:
  - BearerAuth: []
tags:
  - name: Cards
    description: Card management endpoints
  - name: Card reissue
    description: Card reissue endpoints
  - name: Card status
    description: Card status endpoints
  - name: Card validity
    description: Endpoints to manage card validity period.
  - name: PCI
    description: Card PCI/sensitive information endpoints
  - name: Noname
    description: >-
      Noname card endpoints. Noname cards are batch-generated and not initially
      associated with customers, which occurs later.
  - name: Embossing
    description: Card embossing endpoints
  - name: Embossing data
    description: Embossing data endpoints
  - name: Embossing encrypted
    description: Embossing encrypted data endpoints
  - name: Modes
    description: Card mode endpoints
  - name: Templates
    description: Card template (BIN override) endpoints.
  - name: Issuer PAN/PIN
    description: For issuer-defined PIN and PIN endpoints.
  - name: Migration
    description: Migrate card and card modes
components:
  parameters:
    accountIdPath:
      in: path
      name: accountId
      schema:
        type: integer
      description: Pismo account ID
      required: true
    accountIdHeader:
      in: header
      name: x-account-id
      schema:
        type: integer
      description: Pismo account ID
      required: true
    beginDateQuery:
      in: query
      name: beginDate
      schema:
        type: string
        format: date
      required: true
      description: Beginning date filter, format = yyyy-mm-dd
      example: '2022-08-27'
    bulkIDpath:
      in: path
      name: bulkID
      schema:
        type: string
      description: Bulk ID
      required: true
    cardId:
      in: path
      name: cardId
      schema:
        type: string
      description: Pismo card ID
      required: true
    configIdQuery:
      in: query
      name: configId
      schema:
        type: string
        format: uuid
      required: false
      description: >
        Embossing configuration/group ID.


        You can call [Get nominal card embossing
        info](https://developers.pismo.io/pismo-docs/reference/get-embossing-info) 
        to get a card's embossing group.


        You can also call [Get org embosser
        info](https://developers.pismo.io/pismo-docs/reference/get-embossing-configurations-info)
        to get an embossing group's configuration ID. 
      example: 6dacfdde-64bd-4a17-bbdf-3be627b271e6
    customerIdHeader:
      in: header
      name: x-customer-id
      schema:
        type: integer
      required: true
      description: Pismo customer ID
    customerIdPath:
      in: path
      name: customerId
      schema:
        type: string
      required: true
      description: Customer ID
    embossingFileNameQuery:
      in: query
      name: fileName
      schema:
        type: string
      required: true
      description: Embossing file to download
    endDateQuery:
      in: query
      name: endDate
      schema:
        type: string
        format: date
      required: true
      description: End date filter, format = yyyy-mm-dd
      example: '2022-08-27'
    formatQuery:
      in: query
      name: format
      schema:
        description: Set to `paged` to use paging for results.
        type: string
        enum:
          - paged
    idempotencyHeader:
      in: header
      name: x-idempotency-key
      schema:
        type: string
        maxLength: 36
      required: false
      description: >
        A unique identifier to ensure the operation remains idempotent, allowing
        for operation repetition without causing unintended effects or
        duplication. An idempotent operation is one that can be applied multiple
        times, yet the outcome remains the same. it ensures that network errors,
        retries, or failures can occur without introducing inconsistencies. 36
        chars max. 
    modeIdPath:
      in: path
      name: modeId
      schema:
        type: string
      required: true
      description: >
        Card mode ID. For more information, refer to [Create a combination card
        with card
        modes](https://developers.pismo.io/pismo-docs/docs/cards-overview-1#create-a-combination-card-with-card-modes).
    modesQuery:
      in: query
      name: modes
      explode: false
      description: |
        Filter results using card mode. 
          - If nothing is passed, all cards are returned. 
          - If one or more specific modes are passed, cards with those modes are returned.
      schema:
        type: array
        items:
          type: string
          enum:
            - CREDIT
            - DEBIT
            - MULTIPLE
            - COMBO
    pageQuery:
      in: query
      name: page
      schema:
        type: string
      description: >-
        Page number. Default is initial page - `0`. To navigate between pages,
        set `format=paged`.
    perPageQuery:
      in: query
      name: perPage
      description: >-
        Cards per page. Default is `10`.  To navigate between pages, set
        `format=paged`.
      schema:
        type: string
    perPageQuery2:
      in: query
      name: perPage
      description: Items per page. Default is `10`.
      required: false
      schema:
        type: string
    statusQuery:
      in: query
      name: status
      explode: false
      description: >
        Card status filter:
          - If nothing is passed, cards with status `CREATED`, `NORMAL`, and `BLOCKED` are returned. 
          - If `ALL` is passed, all cards, regardless of status, are returned. 
          - If one or more specific statuses are passed, cards with those statuses are returned.

        Refer to the [Card lifecycle and
        statuses](doc:card-lifecycle-and-statuses) guide for more information
        and a complete status list.
      schema:
        type: array
        items:
          type: string
    typesQuery:
      in: query
      name: types
      explode: false
      description: |
        Card type filter:
          - If nothing is passed, all cards are returned. 
          - If one or more specific types are passed, cards with those types are returned.
      schema:
        type: array
        items:
          type: string
          enum:
            - PLASTIC
            - VIRTUAL
            - RECURRING
            - TEMPORARY
    x-AccountIdHeader:
      in: header
      name: x-account-id
      schema:
        type: string
      description: Account ID
      required: true
    x-TenantHeader:
      in: header
      name: x-tenant
      schema:
        type: string
      description: Organization/tenant ID
      required: true
  schemas:
    ABUenabled:
      type: boolean
      description: >

        This field is **DEPRECATED**. For more information, refer to the [ABU
        documentation](doc:cards-overview-1#mastercards-automatic-billing-updater-option)
        in the Cards overview guide.



        When a card is created or reissued, or its account credentials change,
        Mastercard is notified if this feaure is enabled. Notification updates
        are sent to Mastercard on a daily basis. 


        For more information, refer to Mastercard's <a
        href="https://developer.mastercard.com/product/automatic-billing-updater-abu/"
        target="_blank">ABU</a> documentation.
      example: true
      deprecated: true
    AccountID:
      type: integer
      description: Pismo account ID
      example: 7654776
    AddCardModeResponse:
      type: object
      description: Add card mode response
      properties:
        mode_id:
          type: integer
          description: Mode ID
          example: 128876
        mode:
          type: string
          example: CREDIT
          enum:
            - DEBIT
            - CREDIT
    AddressID:
      type: integer
      description: Pismo address object ID
      example: 7654776
    AllCardStatusesResponse:
      type: array
      description: All card statuses
      items:
        type: string
        enum:
          - BLOCKED
          - BROKEN
          - CANCELED
          - CLIENT_ORDER
          - CREATED
          - DAMAGED
          - DEFECT
          - DELETED
          - EXPIRED
          - FRAUD
          - INCORRECT_NAME
          - INOPERATIVE
          - LOST
          - NORMAL
          - PENDING
          - REISSUED
          - RELIEF_LOSS
          - RENAME
          - ROBBED
          - SHAVED
          - THEFT
          - UNBOUND
          - UNRECEIVED
          - WARNING
    AppendIssuerScriptBody:
      type: object
      description: Object used to append issuer scripts to card
      required:
        - script_id
      properties:
        script_id:
          type: string
          description: >
            Issuer script ID. Pismo configures a script according to your needs.
            Contact your Pismo representative to create a script. Once created,
            Pismo gives you the script ID. 
          example: 11a10bff-830b-4649-9660-1a01a5e1c192
    AppendUpdatePinIssuerScriptBody:
      type: object
      description: Object used to append issuer script to update card PIN
      required:
        - script_id
      properties:
        script_id:
          type: string
          description: >
            Issuer script ID. Pismo configures a script according to your needs.
            Contact your Pismo representative to create a script. Once created,
            Pismo gives you the script ID. 
          example: 11a10bff-830b-4649-9660-1a01a5e1c192
        pin_block:
          type: string
          description: >-
            New PIN encrypted as a PINblock using the Zone Pin Key (ZPK)
            `key_id` field that was pre-registered.
          example: 86FA0CED8BDD40D1
        key_id:
          $ref: '#/components/schemas/KeyID2'
        pin:
          $ref: '#/components/schemas/PIN2'
    AppendIssuerScriptResponse:
      type: object
      description: Response body containing card script created
      properties:
        card_script_id:
          type: string
          description: ID of script added to card.
          example: 11a10bff-830b-4649-9660-1a01a5e1c192
        org_id:
          $ref: '#/components/schemas/OrgID'
        card_id:
          $ref: '#/components/schemas/CardID2'
        account_id:
          $ref: '#/components/schemas/AccountID'
        script_id:
          $ref: '#/components/schemas/ScriptID'
        created_at:
          type: string
          description: Card script creation date, format = yyyy-MM-dd'T'HH:mm:ss.SSS"
          example: '2021-10-16T14:09:04.549'
        applied:
          type: boolean
          description: Has script been applied?
          example: false
    ATC:
      type: string
      description: >
        Application Transaction Counter (ATC). The chip card application
        maintains the ATC as a counter that the chip increments. It provides a
        reference for each transaction. A duplicate ATC, a decrease in ATC, or a
        large jump in ATC values may indicate data copying or other fraud. 


        Though the ATC is a string, it takes the form of an array of integers
        containing up to 1000 numbers showing the counter's sequence. 


        For more information on how Pismo uses the ATC, refer to the
        [Application Transaction
        Counter](doc:application-transaction-counter-atc) guide.
      example: '[5, 4, 3, 2, 1]'
    ATMchangeOnlinePinWhenScriptSent:
      type: boolean
      description: >
        During ATM transactions, should the card's online PIN be updated when
        the offline PIN change script is sent to the terminal for execution? 


        If `false`, the online PIN is only updated after a subsequent
        transaction, once the Pismo platform verifies - via the card's CVR (Card
        Verification Results) — that the offline script was successfully
        applied. 


        Default is `false`.
      default: false
      example: false
    BIN:
      type: string
      description: >-
        Bank Identification Number (BIN). A 6 or 8 digit number identitying the
        card network, issuer, and product.
      example: '87634277'
    BindRequest:
      type: object
      properties:
        reissued_card_id:
          $ref: '#/components/schemas/ReissuedCardID'
    Brand:
      type: string
      description: Card network, i.e., Visa, Mastercard, ELO, RuPay, Private
      example: Visa
    BulkResponse:
      type: object
      properties:
        abu_enabled:
          $ref: '#/components/schemas/ABUenabled'
        contactless_enabled:
          $ref: '#/components/schemas/Contactless'
        embossing_custom_field:
          $ref: '#/components/schemas/EmbossingCustomField'
        id:
          type: string
          description: Bulk ID.
          example: Bkdj9999
        metadata:
          additionalProperties: true
          type: object
          description: Additional key-value object information for operation.
        program_id:
          $ref: '#/components/schemas/ProgramID'
        size:
          type: integer
          description: Bulk size - number of cards
          example: 1200
        status:
          $ref: '#/components/schemas/BulkStatus'
        validity_period_hours:
          $ref: '#/components/schemas/ValidityPeriodHours'
      example:
        id: 3e8d9c51-64c7-420d-ae53-87e2b76cf45e
        program_id: 8519
        embossing_custom_field: Please make cards metal, not plastic
        contactless_enabled: false
        abu_enabled: false
        metadata:
          trackingID: 345660
        status: CREATED
        size: 2
    BulkStatus:
      type: string
      description: Bulk noname card job status.
      example: CREATED
      enum:
        - CREATED
        - RUNNING
        - COMPLETED
    CancelBulkRequest:
      type: object
      required:
        - cancel_type
      properties:
        cancel_type:
          type: string
          enum:
            - FULL
            - PARTIAL
        external_ids:
          type: array
          description: >
            External ID array. If `cancel_type` = `PARTIAL`, this field is
            **REQUIRED**. The maximum number of cards in one bulk/batch is 1000.
          minLength: 1
          maxLength: 1000
          items:
            type: string
            description: External ID
            maxLength: 255
            minLength: 1
    CardActivatedSuccessResponse:
      type: object
      description: Physical card activated success response
      properties:
        message:
          type: string
          description: Physical card activated message
          example: The card was successfully unblocked
    CardAlias:
      type: string
      description: >
        Card alias name for a `VIRTUAL` card. 


        This field is **REQUIRED** to be unique for each `VIRTUAL` card a
        customer owns.


        No matter what is passed for a `PLASTIC` card, the value is always
        `PLASTIC`.
      minLength: 1
      maxLength: 50
      example: Vacation card
    CardID:
      type: object
      description: Pismo card ID object
      properties:
        cardId:
          type: string
          example: '737040484'
    CardID2:
      type: integer
      description: Pismo card ID
      example: 123456
    CardInfoResponse:
      type: object
      description: Card information - non sensitive PCI information
      properties:
        id:
          $ref: '#/components/schemas/CardID2'
        hash:
          $ref: '#/components/schemas/Hash'
        status:
          $ref: '#/components/schemas/CardStatus'
        printed_name:
          $ref: '#/components/schemas/PrintedName'
        name:
          $ref: '#/components/schemas/CardAlias'
        type:
          $ref: '#/components/schemas/CardType'
        bin:
          $ref: '#/components/schemas/BIN'
        brand:
          $ref: '#/components/schemas/Brand'
        template_id:
          $ref: '#/components/schemas/TemplateID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        issuing_date:
          $ref: '#/components/schemas/IssuingDate'
        transaction_limit:
          $ref: '#/components/schemas/TransactionLimit'
        expiration_date:
          $ref: '#/components/schemas/ExpirationDate'
        last_4_digits:
          $ref: '#/components/schemas/Last4Digits'
        track_number:
          type: integer
          description: Sequential counter incremented every time card is reissued.
          example: 1
        reissued_card_id:
          $ref: '#/components/schemas/ReissuedCardID'
        password_tries:
          $ref: '#/components/schemas/PasswordTries'
        contactless_enabled:
          $ref: '#/components/schemas/Contactless'
        abu_enabled:
          $ref: '#/components/schemas/ABUenabled'
        dual_message_debit:
          $ref: '#/components/schemas/DualMessageDebit'
        embossing_custom_field:
          $ref: '#/components/schemas/EmbossingCustomField'
        mode:
          $ref: '#/components/schemas/Mode'
        validity_period_hours:
          $ref: '#/components/schemas/ValidityPeriodHours'
        valid_until:
          $ref: '#/components/schemas/ValidUntil2'
        metadata:
          $ref: '#/components/schemas/Metadata'
    CardInfoResponse2:
      type: object
      description: Card information - non sensitive PCI information
      properties:
        id:
          $ref: '#/components/schemas/CardID2'
        hash:
          $ref: '#/components/schemas/Hash'
        status:
          $ref: '#/components/schemas/CardStatus'
        printed_name:
          $ref: '#/components/schemas/PrintedName'
        customer_id:
          $ref: '#/components/schemas/CustomerID'
        name:
          $ref: '#/components/schemas/CardAlias'
        type:
          $ref: '#/components/schemas/CardType'
        bin:
          $ref: '#/components/schemas/BIN'
        brand:
          $ref: '#/components/schemas/Brand'
        template_id:
          $ref: '#/components/schemas/TemplateID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        issuing_date:
          $ref: '#/components/schemas/IssuingDate'
        transaction_limit:
          $ref: '#/components/schemas/TransactionLimit'
        expiration_date:
          $ref: '#/components/schemas/ExpirationDate'
        last_4_digits:
          $ref: '#/components/schemas/Last4Digits'
        track_number:
          type: integer
          description: Sequential counter incremented every time card is reissued.
          example: 1
        reissued_card_id:
          $ref: '#/components/schemas/ReissuedCardID'
        contactless_enabled:
          $ref: '#/components/schemas/Contactless'
        abu_enabled:
          $ref: '#/components/schemas/ABUenabled'
        dual_message_debit:
          $ref: '#/components/schemas/DualMessageDebit'
        embossing_custom_field:
          $ref: '#/components/schemas/EmbossingCustomField'
        mode:
          $ref: '#/components/schemas/Mode'
        password_tries:
          $ref: '#/components/schemas/PasswordTries'
        validity_period_hours:
          $ref: '#/components/schemas/ValidityPeriodHours'
        valid_until:
          $ref: '#/components/schemas/ValidUntil2'
        metadata:
          $ref: '#/components/schemas/Metadata'
    CardInfoResponse3:
      type: object
      description: Card information - non sensitive PCI information
      properties:
        id:
          $ref: '#/components/schemas/CardID2'
        hash:
          $ref: '#/components/schemas/Hash'
        status:
          $ref: '#/components/schemas/CardStatus'
        printed_name:
          $ref: '#/components/schemas/PrintedName'
        name:
          $ref: '#/components/schemas/CardAlias'
        type:
          $ref: '#/components/schemas/CardType'
        bin:
          $ref: '#/components/schemas/BIN'
        brand:
          $ref: '#/components/schemas/Brand'
        template_id:
          $ref: '#/components/schemas/TemplateID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        issuing_date:
          $ref: '#/components/schemas/IssuingDate'
        transaction_limit:
          $ref: '#/components/schemas/TransactionLimit'
        expiration_date:
          $ref: '#/components/schemas/ExpirationDate2'
        last_4_digits:
          $ref: '#/components/schemas/Last4Digits'
        track_number:
          type: integer
          description: Sequential counter incremented every time card is reissued.
          example: 1
        reissued_card_id:
          $ref: '#/components/schemas/ReissuedCardID'
        password_tries:
          $ref: '#/components/schemas/PasswordTries'
        contactless_enabled:
          $ref: '#/components/schemas/Contactless'
        abu_enabled:
          $ref: '#/components/schemas/ABUenabled'
        dual_message_debit:
          $ref: '#/components/schemas/DualMessageDebit'
        embossing_custom_field:
          $ref: '#/components/schemas/EmbossingCustomField'
        mode:
          $ref: '#/components/schemas/Mode'
        validity_period_hours:
          $ref: '#/components/schemas/ValidityPeriodHours'
        valid_until:
          $ref: '#/components/schemas/ValidUntil2'
        metadata:
          $ref: '#/components/schemas/Metadata'
    CardStatusListResponse:
      type: object
      description: Card status list response object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              status:
                $ref: '#/components/schemas/CardStatus'
              previous_status:
                $ref: '#/components/schemas/PreviousStatus'
              event_datetime:
                type: string
                description: Date/time card status changed, formatted as a RFC3339 string
                example: '2021-07-03T17:23:18Z'
              operation:
                $ref: '#/components/schemas/Operation'
        currentPage:
          type: integer
          description: Current page
          example: 1
        perPage:
          type: integer
          description: Items per page
          example: 10
        totalItems:
          type: integer
          description: Total items
          example: 17
        pages:
          type: integer
          description: Total number of pages
          example: 2
    CardPCIInfoResponse:
      type: object
      description: Card PCI (sensitive information) respomse object
      properties:
        org_id:
          $ref: '#/components/schemas/OrgID'
        card_id:
          $ref: '#/components/schemas/CardID2'
        service_code:
          $ref: '#/components/schemas/ServiceCode'
        correlation_id:
          $ref: '#/components/schemas/CorrelationID'
        account_id:
          $ref: '#/components/schemas/AccountID'
        type:
          $ref: '#/components/schemas/CardType'
        printed_name:
          $ref: '#/components/schemas/PrintedName'
        valid_until:
          $ref: '#/components/schemas/ValidUntil'
        expiration_date:
          $ref: '#/components/schemas/ExpirationDate'
        card_number:
          $ref: '#/components/schemas/PAN'
        issuing_date:
          $ref: '#/components/schemas/IssuingDate'
        cvv:
          $ref: '#/components/schemas/CVV'
        cvv_next_rotation_date:
          $ref: '#/components/schemas/cvvNextRotationDate'
        cvv_rotation_interval_hours:
          $ref: '#/components/schemas/cvvRotationInterval'
        password_updated:
          $ref: '#/components/schemas/PasswordUpdated'
    CardsIncreasePasswordBody:
      type: object
      description: Increase password tries request body
      required:
        - block_card_exceeds_counter
      properties:
        block_card_exceeds_counter:
          type: boolean
          description: Block card if it exceeds counter
          example: true
    CardsIncreasePasswordTriesResponse:
      type: object
      description: Increase password tries response body
      properties:
        success:
          type: string
          description: Message indicating success
          example: Incremented password tries counter
    CardStatus:
      type: string
      description: >
        Card status enum. Refer to the [Card lifecycle and
        statuses](doc:card-lifecycle-and-statuses) guide for more information
        and a complete list.
      example: NORMAL
    CardsSuccessResponse:
      type: object
      description: Response body
      properties:
        success:
          type: boolean
          description: Flag indicating success
          example: true
    CardType:
      type: string
      description: |
        Card type enum:
         * `PLASTIC` - Physical card - plastic or metal.
         * `VIRTUAL` - Digital card with fixed PAN and dynamic CVV.
         * `TEMPORARY` - Virtual card with a fixed PAN and CVV meant for short-term use, typically 24 hours. For more information, refer to [Configuring temporary cards](https://developers.pismo.io/pismo-docs/docs/cards-overview-1#configuring-temporary-cards) in the Cards management guide.
         * `RECURRING` - Virtual card with a fixed PAN and CVV originally meant for use with recurring subscriptions. This type is being **DEPRECATED** and it is recommended you use `VIRTUAL` instead. 
      example: VIRTUAL
      enum:
        - PLASTIC
        - VIRTUAL
        - RECURRING
        - TEMPORARY
    CardUpdateResponse:
      type: string
      description: Response for card password update request
      example: '[:correlationId] Card updated'
    Contactless:
      type: boolean
      description: >
        For physical cards. Is card enabled for contactless transactions? 
         
        With contactless transactions, you hold or tap the card on
        contactless-enabled card reader to complete a transaction. This requires
        that both the card and the terminal have Near Field Communication (NFC)
        technology. Most embossers can create plastic contactless cards.


        Default is `true`.
      default: true
      example: false
    ConfigID:
      type: string
      format: uuid
      description: >
        Embosser configuration/group ID. 


        You can call [Get nominal card embossing
        info](https://developers.pismo.io/pismo-docs/reference/get-embossing-info) 
        to get a card's embossing group.


        You can also call [Get org embosser
        info](https://developers.pismo.io/pismo-docs/reference/get-embossing-configurations-info)
        to get an embossing group's configuration ID. 
      example: acde070d-8c4c-4f0d-9d8a-162843c10333
    CorrelationID:
      type: string
      description: >
        Correlation ID used in request x-cid header. This  is used to link
        related API requests and events. For example, if a user makes an
        authorization request with 10 installments, this generates 1
        authorization event and 10 transaction events all containing the same
        correlation ID. The x-cid can help the Pismo engineering team track
        everything related to a call. If this field isn't passed, one is
        generated. You can find the x-cid field in the response header from an
