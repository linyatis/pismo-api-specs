  /cards/v1/bulks/{bulkID}/start:
    post:
      operationId: start-bulk
      summary: Start noname card bulk process
      description: >
        Start noname card bulk/batch process. Each card is identified with an
        `external_id`.  This endpoint starts the process begun with [Create
        noname card bulk](ref:create-bulk). Pass the bulk ID returned from that
        endpoint here.


        Each card created generates an event - [Card
        created](https://developers.pismo.io/events/docs/cards-create-1) - with
        event data that includes the card ID, bulk ID, and external ID. You pass
        the card ID to the [Associate noname card with
        customer](ref:post-v2-card-bind) endpoint. For more information on
        events and setting up event notifications, rerfer to the [Data and
        reporting](doc:data-reporting-overview) guide.


        For more information on embossing, refer to the [Physical card
        embossing](doc:physical-card-embossing) guide.


        For detailed information about embossing flows, refer to [Embossing
        flows](doc:physical-card-embossing#embossing-flows).
      tags:
