  /wallet/v2/cards/{cardId}/noname/bind:
    put:
      operationId: post-v2-card-bind
      summary: Associate noname card with customer
      description: >
        Bind an account and customer to a noname card, which changes its status
        to `CREATED`. The card is then treated as a normal physical plastic or
        metal card.


        You have to pass this endpoint a noname card's ID. Card IDs are
        generated when the [Start noname card bulk process](ref:start-bulk)
        endpoint is called.  This endpoint generates an event for each card -
        [Card created](https://developers.pismo.io/events/docs/cards-create-1) -
        with event data that includes the card ID, bulk ID, and external ID.
        Refer to the [Data and reporting](doc:data-reporting-overview) guide for
        information on events and setting up event notifications.


        The bind operation is completed asynchronously and generates a [Customer
        bound to noname
        card](https://developers.pismo.io/events/docs/cards-bind-card-1) event.
        Make sure the operation has completed and the event generated before
        attempting to access or use the associated card. 


        **Card reissuing**


        * You can use this endpoint to reissue a card&mdash;replacing the card
        to be reissued with a noname card, which is then treated as a normal
        physical card. If a card to be replaced is entered (`reissued_card_id`),
        the [Card
        updated](https://developers.pismo.io/events/docs/cards-update-1) event
        is also generated. 


        * If you attempt to reissue a card to a card that has already been
        associated, meaning it is no longer a noname card and no longer has an
        `UNBOUND` status, you will get a **409 Conflict** error. 


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID.
      tags:
        - Noname
      parameters:
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/x-AccountIdHeader'
        - $ref: '#/components/parameters/customerIdHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindRequest'
      responses:
        '202':
          description: >-
            Your request was accepted. The bind operation is made
            asynchronously, check the event [Customer bound to noname
            card](https://developers.pismo.io/events/docs/cards-bind-card-1).
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
