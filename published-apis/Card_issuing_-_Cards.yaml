  /pcicards/v2/pcicards/cvv/{cardId}/reset:
    post:
      operationId: post-v2-reset-cvv
      summary: Rotate virtual card CVV
      description: >
        Force a virtual card's CVV (Card Verification Value) rotation.


        **CVV rotation rules:**


        Calling this endpoint can reset the CVV rotation schedule in the future.
        For example, if you call this endpoint at 3PM and the defined rotation
        interval is 24 hours, the next rotation will take place at 3PM the next
        day and subsequent days after.


        A 2-minute validation occurs between scheduling requests and, within
        this interval, no new scheduling takes place. This can lead to the
        following scenarios:


        * If a forced rotation occurs less than 2 minutes after an
        auto-rotation, the CVV is rotated and no new scheduling takes place.

        * If an auto-rotation occurs less than 2 minutes after a forced
        rotation, the CVV is rotated and no new scheduling takes place.

        * If more than one forced call occurs in less than 2 minutes, the CVV is
        rotated, but new scheduling only takes place for the first call.


        This endpoint generates a [Card CVV
        changed](https://developers.pismo.io/events/docs/cards-rotate-cvv-1)
        event.


        **Note:** This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      tags:
        - PCI
      parameters:
        - $ref: '#/components/parameters/cardId'
      requestBody:
        description: Rotate CVV request body
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                service_code:
                  $ref: '#/components/schemas/ServiceCode'
      responses:
        '200':
          description: Success CVV rotation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetCvvResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /cards/v1/bulks:
    post:
      operationId: create-bulk
      summary: Create noname card bulk
      description: >
        Create up to 1000 noname cards per bulk/batch process. After calling
        this endpoint, call [Start noname card bulk process](ref:start-bulk) to
        begin the bulk/batch card creation and embossing process.


        Noname cards are batch-generated and not initially associated with
        customers, which occurs later. Noname cards work well for special use
        cases like gift cards or in countries or scenarios where a password or
        chip might be required but not necessarily a printed card name.


        One card is created for each `external_id` entered.


        For more information on embossing, refer to the [Physical card
        embossing](doc:physical-card-embossing) guide.


        For detailed information about embossing flows, refer to [Embossing
        flows](doc:physical-card-embossing#embossing-flows).
      tags:
        - Noname
      requestBody:
        description: Create bulk request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBulk'
      responses:
        '201':
          description: Bulk created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /cards/v1/bulks/{bulkID}:
    put:
      operationId: increment-bulk
      summary: Increment noname card bulk
      description: >
        Increment noname card bulk/batch with up to 1000 additional cards.

        Use the bulk ID returned from [Create noname card
        bulk](ref:create-bulk).


        One card is created for each `external_id` entered.
      tags:
