          $ref: '#/components/schemas/ValidUntil'
        bulk_id:
          type: string
          description: Noname bulk/batch ID
        external_id:
          type: string
          description: Client internal tracking ID
          maxLength: 255
        mode:
          $ref: '#/components/schemas/Mode'
        dual_message_debit:
          $ref: '#/components/schemas/DualMessageDebit'
      example:
        program:
          id: '8519'
        account:
          id: '102378693'
        customer:
          id: '102377856'
        org:
          id: TN-f878e4a1-2879-48ba-be16-821e73ac98db
        id: 6741322
        hash: >-
          WEPvOQuZvjfYEd0iBmr43bhWyOsylIsW95ebYrLD89App2iEq9IizP+8w73pxKQ4mI47EdhzYHF9RfXjrBOyug==
        last_4_digits: '3598'
        first_4_digits: 'null'
        status: PENDING
        stage: UNBLOCKED
        issuing_date: '2022-01-04T17:20:15Z'
        expiration_date: '2027-01-04T00:00:00Z'
        printed_name: Mabel Syrup
        name: Vacation card 2
        tracking: 4859
        track_number: 1
        transaction_limit: '100'
        embossing_custom_field: Emboss it, emboss it good
        contactless_enabled: true
        abu_enabled: true
        reissued_card_id: 38474
        type: VIRTUAL
        metadata:
          my-custom-key: my-custom-value
        template_id: 'null'
        valid_until: 'null'
        bulk_id: 'null'
        external_id: 'null'
        mode: CREDIT
        dual_message_debit: true
    UpdatePinFromPinblockBody:
      type: object
      description: Update PIN from PINBlock object
      properties:
        pinblock:
          type: string
          description: PINBlock to update
          example: 4E49BF480C44A36C
        key_id:
          type: string
          description: >
            ID of key used to generate the PINBlock. 


            A Zone PIN Key (ZPK) identifier. The ZPK is a data encrypting or
            decrypting key for PIN transfer between parties. For example,
            between issuers and processors or acquirers and networks or networks
            and processors, and so on.


            In a sandbox environment, a fixed ZPK is used:

               key_id: `7d14ca2e-1057-11ee-8cee-060f666de710`

               HSM key: `0404F2543B1C6E70AB61586E1304B6A7`

            For production, open a Jira ticket with type = **Configuration**.
            Request you need the key to use endpoints with PIN management such
            as PINBLOCK.
          example: 32a147ec-b2d9-4b0d-8c5b-557e6cf41e0e
        sync_offline_pin:
          $ref: '#/components/schemas/SyncOfflinePin'
    UpdateTokens:
      type: boolean
      description: >
        Should the card be updated with associated tokens? 


        If `true`, the cardholder will not need to redigitize their card for
        their current wallet apps. 


        Default is `false`.


        **IMPORTANT:** This feature requires additional access setup. Contact
        your Pismo representative for details. 
      default: false
      example: true
    ValidateCVV:
      type: object
      description: Validate CVV object
      required:
        - cvv
      properties:
        cvv:
          description: CVV to be validated against card info
          type: string
          minLength: 3
          maxLength: 3
          example: '123'
    ValidityPeriodHours:
      type: integer
      description: >
        How long, in hours, the card is valid. Cannot exceed the card's
        `expiration_date`. Once this period is exceeded, and the card has a 
        `NORMAL`, `BLOCKED`, `PENDING`, `WARNING` or `REISSUED` status, its
        status becomes `INOPERATIVE`. 


        This field is used to calculate the datetime value for `valid_until`.


        For `VIRTUAL` and `PLASTIC` cards. Setting this field for `TEMPORARY` or
        `RECURRING` cards returns a **400 Bad request** error.  
      example: 240
    ValidUntil:
      type: string
      description: >
        Card validation date in UTC time (format:yyyy-MM-ddThh:mm:ssZ). For
        `TEMPORARY` virtual cards, which have a limited time frame, typically 24
        hours (default), or according to the program parameter for this, which
        is why the date/time here is more granular than `expiration_date`.  


        For more information, refer to [Configuring temporary
        cards](https://developers.pismo.io/pismo-docs/docs/cards-overview-1#configuring-temporary-cards).
      example: '2021-07-03T17:23:18Z'
    ValidUntil2:
      type: string
      description: >
        Card is valid until this datetime. ISO 8601 format. Once this time is
        exceeded, and the card has a  `NORMAL`, `BLOCKED`, `PENDING`, `WARNING`
        or `REISSUED` status, its status becomes `INOPERATIVE`. 

        This field's value is calculated using the `validity_period_hours`. 
      example: '2021-07-03T17:23:18Z'
    CardsValidityRenewBody:
      type: object
      description: Card validity period object
      required:
        - validity_period_hours
      properties:
        validity_period_hours:
          $ref: '#/components/schemas/ValidityPeriodHours2'
    CardsValidityRenewResponse:
      type: object
      description: Card validity period renewal response object.
      properties:
        id:
          $ref: '#/components/schemas/CardID2'
        status:
          $ref: '#/components/schemas/CardStatus'
        validity_period_hours:
          $ref: '#/components/schemas/ValidityPeriodHours'
        valid_until:
          $ref: '#/components/schemas/ValidUntil'
    ValidityPeriodHours2:
      type: integer
      description: >
        Sets a card's validity period in hours. Cannot exceed the card's
        `expiration_date`.


        <b>REQUIRED</b> for a `PLASTIC` or `VIRUTUAL` card.  
      minimum: 1
      example: 48
    UpdatePanBody:
      type: object
      description: |
        Update a card's PAN/PIN object. For cards with status `UNNUMBERED`. 
      required:
        - pan
      properties:
        pan:
          $ref: '#/components/schemas/PanObjectUpdatePan'
        pin:
          $ref: '#/components/schemas/PinObjectUpdatePan'
    PanObjectUpdatePan:
      type: object
      description: PAN update object
      required:
        - bin
        - data
        - key_id
        - iv
      properties:
        bin:
          $ref: '#/components/schemas/BIN'
        data:
          $ref: '#/components/schemas/PANencrypted'
        key_id:
          $ref: '#/components/schemas/KeyID'
        iv:
          $ref: '#/components/schemas/InitializationVector'
    PinObjectUpdatePan:
      type: object
      description: >-
        PIN update object. If passed, either `pinblock` or `pin_length` is
        **REQUIRED**.
      properties:
        pinblock:
          $ref: '#/components/schemas/PinBlock'
        pin_length:
          $ref: '#/components/schemas/PinLengthString'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Account token - an access token encoded with a Pismo account ID. Tokens
        can expire quickly, which can result in an "Unauthorized" error.
      bearerFormat: JWT
  responses:
    204NoContent:
      description: No Content
    400BadRequest:
      description: Bad Request
    400BadRequest2:
      description: Bad Request, missing customer ID or program ID
    401Unauthorized:
      description: Access token is missing or invalid
    403Forbidden:
      description: You don't have permission to access this resource
    404NotFound:
      description: The specified resource was not found
    406NotAcceptable:
      description: Not accepetable
    409Conflict:
      description: Specified resource status conflict with current request
    409ConflictPinNull:
      description: Card PIN must not be null
    409ConflictCardsPost:
      description: You already have a card with this type and name active
    406RangeNotSatisfiable:
      description: Request is out-of-range.
    500InternalServer:
      description: Internal server error
paths:
  /wallet/v2/cards:
    post:
      summary: Create card
      description: >
        Create a virtual or physical (plastic/metal) card.


        Refer to the [Cards management](doc:cards-overview-1) guide for more
        information about physical and virtual cards.


        For more information about embossing, refer to [Embossing
        flows](doc:physical-card-embossing#embossing-flow).


        This endpoint generates a [Card
        created](https://developers.pismo.io/events/docs/cards-create-1) event.
        The card's PCI data is created asynchronously as is the Card created
        event. Any operation that tries to access a card before this event, such
        as update password or get PCI information, is going to return a **404,
        not found** error.
      operationId: post-v2-card
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/customerIdHeader'
        - $ref: '#/components/parameters/idempotencyHeader'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCard'
      responses:
        '200':
          description: >-
            Card creation response when `x-idempotency-key` is passed and the
            card had already been created in a preivous call.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCardResponse'
        '201':
          description: >-
            Card creation response -  with or without `x-idempotency-key`
            passed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCardResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '409':
          $ref: '#/components/responses/409ConflictCardsPost'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/customers/{customerId}/accounts/{accountId}/cards/{cardId}/activate:
    put:
      operationId: put-v1-card-activate
      summary: Activate physical card
      description: >
        A physical card is initally blocked for transactions until activated. 
        This prevents unauthorized use until the cardholder takes delivery. You
        do not have to activate a card to tokenize it for a digital wallet.

        This endpoint generates a [Card
        updated](https://developers.pismo.io/events/docs/cards-update-1) event.
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/customerIdPath'
        - $ref: '#/components/parameters/accountIdPath'
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/customerIdHeader'
      responses:
        '200':
          description: Card activated success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardActivatedSuccessResponse'
        '204':
          $ref: '#/components/responses/204NoContent'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/customers/{customerId}/accounts/{accountId}/cards:
    get:
      operationId: get-v1-cards
      summary: Get cards for customer and account
      description: >
        Get cards for specified account and customer with paging and filter
        options. 


        Accounts can have multiple customers, typically to accommodate primary
        and additional cardholders, but only one owner. There can only be one
        physical card per customer. A customer can have multiple virtual cards,
        but the card names have to be different.
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/customerIdPath'
        - $ref: '#/components/parameters/accountIdPath'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery'
        - $ref: '#/components/parameters/formatQuery'
        - $ref: '#/components/parameters/statusQuery'
        - $ref: '#/components/parameters/modesQuery'
        - $ref: '#/components/parameters/typesQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardInfoResponse'
          description: CardInfoResponse object array
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/cards:
    get:
      operationId: get-v1-cards-by-account
      summary: Get account cards
      description: >
        Get cards for specified account with paging and filter options. The
        account is parsed from the token, which must be an account token.


        Accounts can have multiple customers, typically to accommodate primary
        and additional cardholders, but only one owner.
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery'
        - $ref: '#/components/parameters/formatQuery'
        - $ref: '#/components/parameters/statusQuery'
        - $ref: '#/components/parameters/modesQuery'
        - $ref: '#/components/parameters/typesQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardInfoResponse2'
          description: CardInfoResponse object array
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/cards/{cardId}:
    get:
      operationId: get-v1-card
      summary: Get non-PCI card information
      description: >
        Get card non-sensitive (non-PCI) information.


        NOTE: This endpoint requires an account-specific access token - a token
        encoded with a Pismo account ID.
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/customerIdHeader'
        - $ref: '#/components/parameters/accountIdHeader'
      responses:
        '200':
          description: Card information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardInfoResponse3'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v2/cards/{cardId}:
    patch:
      summary: Update card information
      description: >
        Update card information - `name`, `transaction_limit`, `printed_name`,
        `contactless_enabled`, `abu_enabled`, or `metadata`.<br>


        This endpoint generates an [Card
        updated](https://developers.pismo.io/events/docs/cards-update-1) event.
      operationId: patch-v2-card
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/customerIdHeader'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCard'
      responses:
        '200':
          description: Card update response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCardResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '409':
          $ref: '#/components/responses/409ConflictCardsPost'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v2/cards/{cardId}/atc/reset:
    post:
      summary: Reset card ATC
      description: >
        Reset card ATC (Application Transaction Counter) in case of sync failure
        between what is saved in a card's memory and the incremented data. The
        ATC is a counter, maintained by the chip card application (incremented
        by the chip), that provides a sequential reference to each transaction.
        A duplicate ATC, a decrease in ATC, or a large jump in ATC values  may
        indicate data copying or other fraud. For more information on how Pismo
        processes ATCs, refer to the [Application Transaction Counter
        (ATC)](https://developers.pismo.io/pismo-docs/docs/application-transaction-counter-atc)
        guide article.


        **Notes:** 
          * ATC reset only occurs on the Pismo platform. When a new transaction occurs, the ATC is synchronized with the chip's ATC.
          * This endpoint takes an account token - an access token encoded with a Pismo account ID. For combo cards, whether the debit or credit ATC is reset depends on which account ID (credit or debit) is encoded with the access token.
          
      operationId: post-v2-card-atc-reset
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/cardId'
      responses:
        '200':
          description: Card ATC reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardsSuccessResponse'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v2/cards/{cardId}/password-tries/reset:
    post:
      operationId: post-v2-card-password-reset
      summary: Reset password try count
      description: >
        Unblock a card after it has exceeded its maximum password tries count.


        If the card is `BLOCKED`:

          * The status is changed to `NORMAL`
          * The counter is reset 
          * An [Card updated](https://developers.pismo.io/events/docs/cards-update-1) event is generated.

        If the card is `NORMAL`, `PENDING`, or `WARNING`, the counter is reset.


        For any other status, a 406 - range not satisfiable - error is returned.


        **Note**: This does not change the password recorded on an embossed
        card's chip. If the card is configured for offline password
        verification, you need to change the password on the physical card. To
        do that, you can use a [card script](doc:card-scripts).


        For more information, refer to the [Card lifecycle and
        statuses](doc:card-lifecycle-and-statuses) guide.
      tags:
        - Cards
      parameters:
        - $ref: '#/components/parameters/cardId'
      responses:
        '200':
          description: Card password tries reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardsSuccessResponse'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '406':
          $ref: '#/components/responses/406RangeNotSatisfiable'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/customers/{customerId}/accounts/{accountId}/cards/{cardId}/status:
    put:
      operationId: put-v1-card-status
      summary: Update card status
      description: >
        Change a card's status. For more information, Refer to the [Card
        lifecycle and statuses](doc:card-lifecycle-and-statuses) guide.


        This endpoint generates a [Card
        updated](https://developers.pismo.io/events/docs/cards-update-1) event.
      tags:
        - Card status
      parameters:
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/accountIdPath'
        - $ref: '#/components/parameters/customerIdPath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCardStatus'
      responses:
        '200':
          description: Card information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCardStatusResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/cards/statuses:
    get:
      operationId: get-v1-card-statuses
      summary: Get card statuses
      description: Get all possible card statuses, including those used for card reissuing.
      tags:
        - Card status
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllCardStatusesResponse'
          description: Card statuses list
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/cards/{cardId}/status-history:
    get:
      operationId: get-v1-card-satus-history
      summary: List card status history
      tags:
        - Card status
      description: >
        Gets a list of a card's status history. The IDs of the card's account
        and org/tenant are parsed from the access token.


        **Note**: Only cards with status changes after September/2022 are
        returned.


        For more information, refer to [Card lifecycle and
        statuses](doc:card-lifecycle-and-statuses).
      parameters:
        - $ref: '#/components/parameters/customerIdHeader'
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery2'
      responses:
        '200':
          description: Array of card statuses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardStatusListResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/customers/{customerId}/accounts/{accountId}/cards/{cardId}/reissue:
    post:
      operationId: post-v1-card-reissue
      summary: Reissue card
      tags:
        - Card reissue
      description: >
        Reissue a physical (plastic/metal) or virtual card for a given
        customer/account.


        For information on card reissue scenarios and statuses, refer to the
        [Card reissuing](doc:card-reissuing) guide. 


        This endpoint generates a [Card
        updated](https://developers.pismo.io/events/docs/cards-update-1) event
        for the old card, and a [Card
        created](https://developers.pismo.io/events/docs/cards-create-1) event
        for the new card. The Card created event is generated asynchronously -
        any operation that tries to access a card before this event, such as
        update password or get PCI information, is going to return a **404, not
        found** error. 


        **Notes:**

        * If an attempt is made to reissue a card that has already been
        reissued, the new card's data created in the previous reissue is
        returned, that is, another card is not created and events are not
        generated.

        * To update the new card with the old card's PIN, call [Get password
        ](ref:get-v2-card-password) for the old card, then update the new card's
        password with [Change card password](ref:put-v2-card-password) 

        * To transfer tokens to the new card, set the `update_tokens` field to
        `true`. You can also do this later with the [Transfer card tokens to
        other card](ref:transfertokens) endpoint. 

        * Currently, there is no way to transfer a card's PAN
      parameters:
        - $ref: '#/components/parameters/customerIdPath'
        - $ref: '#/components/parameters/accountIdPath'
        - $ref: '#/components/parameters/cardId'
        - $ref: '#/components/parameters/idempotencyHeader'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitReissue'
      responses:
        '200':
          description: Reissue card response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReissueCardResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /wallet/v1/cards/reissue/reasons:
    get:
      operationId: get-v1-card-reissue-reasons
      summary: Get card reissue reasons
      tags:
        - Card reissue
      description: >
        Get all reissue reasons together with associated costs.


        To register reasons for reissue:


        [Open a Jira ticket](doc:opening-a-service-desk-ticket) with type  =
        **Settings** and enter the data below:


        `cost` - Reissue cost value. This field is for information only - only
        issuers can make debit entries to a customer's account.


        `must_block` - Whether the card is canceled at reissue time or can
        transact until new card is activated.


        `description` - Reason description.


        `must_charge` - Will reissue be charged? This field is for information
        only as only the issuer can make debit entries to a customer's account.


        `type` - Issuer defined reissue reason enum value
      responses:
        '200':
          description: Reissue reasons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReissueReasons'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /pcicards/v2/pcicards/card/{cardId}:
    put:
      operationId: put-v2-card-password
      summary: Change card password
      description: >
        Update a card's password (PIN).


        **Note**: This does not change the password recorded on an embossed
        card's chip. If the card is configured for offline password
        verification, you need to change the password on the physical card. To
        do that, you can use a [card script](doc:card-scripts).


        This endpoint generates a [Card password
        changed](https://developers.pismo.io/events/docs/cards-update-password-1)
        event.


        **Note:** This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      tags:
        - PCI
      parameters:
        - $ref: '#/components/parameters/cardId'
