        time. Cards to be resent must meet the prerequisites. For more
        information, refer to the [Physical card embossing
        guide](doc:physical-card-embossing).


        This endpoint is available to on-demand customers. On-demand customers
        can emboss cards with `NORMAL`, `BLOCKED`, `PENDING`, and `WARNING`
        statuses, in addition to `CREATED`.


