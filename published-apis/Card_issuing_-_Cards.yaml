  /embossing/v2/cards/generate-embossing/noname:
    post:
      summary: Get noname encrypted card data for embossing V2 [beta]
      description: >
        Get noname encrypted card embossing data. 


        Issuers who do their own embossing can use this endpoint to get a card's
        data, which needs to be encrypted as per regulations.


        This endpoint uses AES256 with the GCM mode, and randomly generates the
        initialization vector, returning it in the response. AES-256 GCM is an
        authenticated encryption mode that uses the Advanced Encryption Standard
        (AES) with a 256-bit key in Galois/Counter Mode (GCM) to provide both
        confidentiality and integrity for data. The Additional Authenticated
        Data (AAD) parameter used is the organization/tenant ID.  AAD, in
        AES-GCM, is unencrypted data that is authenticated alongside the
        ciphertext to ensure the message's integrity and authenticity. 


        **To use this endpoint:**
          * Open a [Jira ticket](https://developers.pismo.io/pismo-docs/docs/opening-a-service-desk-ticket) with type = **Settings** and ask to use on-demand embossing.
          * Generate and register a symmetric key with Pismo: open a Jira ticket with type = **Settings** and request an asymmetric key (RSA 2048 PKCS1) to send the symmetric key.

        While the return values are shown as JSON, they are encrypted and not
        returned as clear text.


        The endpoint generates a [Card embossing notification
        received](https://developers.pismo.io/events/docs/cards-embossing-1)
        event.


        **Note:** This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      operationId: post-generate-embossing-noname
      tags:
        - Embossing encrypted
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetEncryptedCardDataRequest2'
      responses:
        '200':
          description: Encrypted card embossing data (shown here as unencrypted JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptedCardContent2'
              example:
                org_id: TN-5aea4104-7994-46d5-83d6-a55cxxxxxxxx
                card_id: 19509998
                correlation_id: 9f46663d-34dc-9e37-a89a-a1d6ef56039a
                password_updated: true
                account_id: 116871845
                card_number: 123456******7890
                program_id: 11084
                printed_name: Leah Tard
                expiration_date: '2805'
                customer_id: 116906961
                cvv: '468'
                cvv2: '178'
                icvv: '010'
                track1_magnetic_stripe: B6505670006255449^DOE/JOHN^2805201000000000000000468000000?
                track1_chip: B6505670006255449^DOE/JOHN ^2805201000000000000000010000000?
                track2_chip: 6505670006255449D28052010000001000000F
                track2_magnetic_stripe: 6505670006255449=28052010000046800000?
                pinblock: E6203FAE966D7D90
                service_code_cvv1: '201'
                service_code_cvv2: '000'
                service_code_icvv: '999'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                description: ''
                type: object
                properties:
                  error_code:
                    type: string
                  message:
                    type: string
                  status:
                    type: integer
                  error:
                    type: string
        '401':
