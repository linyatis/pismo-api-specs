  /v1/interest/plan/{interestPlanId}:
    get:
      summary: Get interest plan
      description: >
        Get interest plan details. By default, returns the latest version of the
        interest plan.

        You can optionally specify a `version_date` query parameter to retrieve
        the version that was active on a specific date.

        If a `version_date` is provided, the endpoint returns the latest version
        with a start date less than or equal to the specified date.
      tags:
        - Interest engine
      operationId: get-v1-interest-plan
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/InterestPlanIdPath'
        - $ref: '#/components/parameters/VersionDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInterestPlanResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    patch:
      summary: Create interest plan version
      description: >
        Create a new version of an existing interest plan. This endpoint allows
        you to update specific fields while preserving others from the previous
        version. 


        Key features:

        - Creates a new version with the specified `start_date`.

        - Updates only the provided fields—any field not specified inherits the
        value from the previous version.

        - Validates that the new `start_date` is after the `start_date` of the
        previous version.

        - Maintains immutable fields like `interest_type` and
        `tier_calculation`.

        - Preserves existing tiers when updating `interest_by_tiers`—only
        specified tiers are updated.


        This endpoint generates an [Interest plan
        created](https://developers.pismo.io/events/docs/interest-engine-interest-plan-creation-success-1)
        event.
      tags:
        - Interest engine
      operationId: patch-v1-interest-plan
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/InterestPlanIdPath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterestPlanVersionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestPlanVersionResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServerError'
