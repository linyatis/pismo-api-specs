    NewStatementID:
      type: integer
      format: int64
      description: >
        Indicates the ID of the statement to receive the transaction. This field
        cannot be present along with `desired_cycle_date`.
      example: 124533
    NewStatus:
      type: string
      description: >
        New status for updated interest accruals. You can change an interest
        accrual's status to `PENDING`, `STOP_ACCRUAL`, or `SETTLED`. If the
        current status is `PROCESSED`, it cannot be changed.

        * `PENDING`: Accrual has been calculated but has not yet generated a
        transaction.

        * `PROCESSED`: Accrual has been processed and a transaction has been
        generated.

        * `STOP_ACCRUAL`: Due to a program parameter, the accrual has reached
        the maximum number of days to be posted as a transaction. For more
        information, refer to [Limiting the number of days accruals can be
        charged](doc:limiting-the-number-of-days-accruals-can-be-charged).

        * `SETTLED`: Accrual transaction has been settled.   
      enum:
        - PENDING
        - STOP_ACCRUAL
        - SETTLED
      example: SETTLED
    NotUpdatedIDs:
      type: array
      description: >-
        ID's of interest accruals that have not been updated, because, for
        example, the status cannot be changed if it is already PROCESSED.
      example:
        - 5
        - 6
      items:
        type: integer
        format: int64
    NumberOfInstallments:
      type: integer
      format: int32
      description: Number of installments
      example: 8
    OldStatementID:
      type: integer
      format: int64
      description: ID of the source statement
      example: 124532
    OpenDueDate:
      type: string
      format: date
      example: '2021-05-24'
      description: Open due date. Format = yyyy-mm-dd.
    OptionalDescription:
      type: string
      description: Optional description for this installment transaction
      minLength: 0
      maxLength: 32
      example: Installment 1
    OptionalInstallmentInterestRate:
      type: number
      format: float
      description: >-
        Optional installment interest rate. If not provided, the default value
        registered with the program is used instead. Maximum of 2 digits allowed
        after the decimal place.
      example: 0.1
    OrgID:
      type: string
      description: Organization ID
      example: TN-e7091464-cd1e-4c20-8c68-1e4c5774d972
    OtherCreditsAfterDueDate:
      type: number
      format: float
      description: >
        Amount discharged after real due date by credit transactions that <i>are
        not</i> considered payment transactions.

        <b>Notes:</b>

        - If you do not use the program parameter
        [PAYMENTS_TTS](doc:multivalue-parameters) to configure the payments
        transactions, the Pismo platform uses the following transaction types as
        defaults: [201, 244, 255, 276, 282, 320, 342, 701, 711, 721, 2224]


        - This field only appears in closed statements and only if they were
        closed after 17 April 2025.
      example: 0
    OtherCreditsUntilDueDate:
      type: number
      format: float
      description: >
        Amount discharged on or before real due date by credit transactions that
        <i>are not</i> considered payment transactions.

        <b>Notes:</b>

        - If you do not use the program parameter
        [PAYMENTS_TTS](doc:multivalue-parameters) to configure the payments
        transactions, the Pismo platform uses the following transaction types as
        defaults: [201, 244, 255, 276, 282, 320, 342, 701, 711, 721, 2224]


        - This field only appears in closed statements and only if they were
        closed after 17 April 2025.
      example: 0
    OverdueDate:
      type: string
      format: full-date
      description: Overdue date. Format = yyyy-mm-dd.
      example: '2020-08-17'
    OverdueDays:
      type: integer
      format: int32
      description: Number of days overdue
      example: 4
    OverdueInterestAmount:
      type: number
      format: float
      description: Overdue interest amount
      example: 12.35
    OverdueRateAfterDueDate:
      type: number
      format: float
      description: >
        Interest rate used for the accrual type `REFINANCING` if the statement
        due date has passed and the MAD was not paid. <b>Note:</b> If this value
        is null, `refinancing_rate_after_due_date` is used instead.


        By default, this is a monthly rate, so the Pismo platform divides it by
        30 before applying it on a daily basis. For more information, refer to
        [Changing the interest rate
        period](doc:configuring-accrual-rates#changing-the-interest-rate-period).
      example: 17.99
    OverdueRateAfterDueDateMultiplierPercent:
      type: number
      format: float
