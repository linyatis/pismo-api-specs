                    message: >-
                      account_default_program_due_date_id is invalid for this
                      account
                Invalid calendar_id:
                  description: >-
                    Selected calendar_id is invalid for this account, this id
                    may be from a different program
                  value:
                    code: CE0001
                    message: Selected calendar_id is invalid
                statement_id from different account:
                  description: >-
                    Invalid statement_id for this account, this id may be from a
                    different account
                  value:
                    code: CE0001
                    message: >-
                      Selected statement_id (value = 1) is from a different
                      account
                statement_id from closed statement:
                  description: Invalid statement_id because this is from a closed statement
                  value:
                    code: CE0001
                    message: Selected statement_id (value = 1) is a closed statement
                Disordered statement_id:
                  description: >-
                    statement_id is out of order, the order must be ascending of
