    AccrualStatus:
      type: string
      description: >
        Interest accrual status.

        * `PENDING`: Accrual has been calculated but has not yet generated a
        transaction.

        * `PROCESSED`: Accrual has been processed and a transaction has been
        generated.

        * `STOP_ACCRUAL`: Due to a program parameter, the accrual has reached
        the maximum number of days to be posted as a transaction. For more
        information, refer to [Limiting the number of days accruals can be
        charged](doc:limiting-the-number-of-days-accruals-can-be-charged).

        * `SETTLED`: Accrual transaction has been settled.        
      enum:
        - PENDING
        - PROCESSED
        - STOP_ACCRUAL
        - SETTLED
      example: PENDING
    AccrualsToUpdate:
      type: array
      description: Interest accruals to update.
      items:
        $ref: '#/components/schemas/AccrualsIdsToUpdateStatusRequest'
