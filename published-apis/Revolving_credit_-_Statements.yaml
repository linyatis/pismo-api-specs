      title: InstallmentPaymentsV4Request
      description: Installment Payments request (v4)
      required:
        - statement_agreement
        - installments
      type: object
      properties:
        statement_agreement:
          $ref: '#/components/schemas/StatementAgreement'
        installments:
          type: array
          description: |
            Installment payments.

            <b>Note:</b> You must define at least 2 installment payments.
          items:
            required:
              - installment_number
              - total_amount
              - principal_amount
              - interest_amount
              - interest_rate
              - iof_amount
            type: object
            properties:
              installment_number:
                $ref: '#/components/schemas/InstallmentNumber'
              total_amount:
                $ref: '#/components/schemas/SumPrincipalWithInterestAndFees'
              principal_amount:
                $ref: '#/components/schemas/TotalPrincipalAmountOfInstallments'
              interest_amount:
                $ref: '#/components/schemas/InterestAmount'
              interest_rate:
                $ref: '#/components/schemas/InstallmentInterestRate'
              iof_amount:
                $ref: '#/components/schemas/IofAmount'
              daily_iof_amount:
                $ref: '#/components/schemas/DailyIofAmount'
              description:
                $ref: '#/components/schemas/OptionalDescription'
              custom_transactions:
                $ref: '#/components/schemas/CustomTransaction'
          example:
            - installment_number: 1
              total_amount: 40
              principal_amount: 38
              interest_amount: 1
              interest_rate: 0.1
              iof_amount: 0.5
              daily_iof_amount: 0.5
              description: 'installment #1'
              custom_transactions:
                - custom_key: tax
                  amount: 1
            - installment_number: 2
              total_amount: 40
              principal_amount: 38
              interest_amount: 1
              interest_rate: 0.1
              iof_amount: 0.5
              daily_iof_amount: 0.5
              description: 'installment #2'
              custom_transactions:
                - custom_key: insurance
                  amount: 3.99
