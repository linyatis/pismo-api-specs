  /statements/v4/accounts/{accountId}/installment-payments:
    post:
      summary: Create payment agreement
      description: >
        Create a payment agreement and post the refinanced debt as new
        installment transactions, beginning from the currently open statement.


        The `statement_agreement` and `compulsory` flags are used to specify the
        transaction types of the transactions that are created on the customer's
        statement. Here are the possible combinations.


        <b>Type of payment agreement:</b> Statement agreement

        Description: The customer renegotiates all debt for all their
        statements.

        `statement_agreement`: true 

        `compulsory`: false 

        Transaction types of transactions: 

        712 (INSTALLMENT AGREEMENT) 

        711 (CREDIT BY AGREEMENT) 

        713 (CONTRACT AGREEMENT)


        <b>Type of payment agreement:</b> Installment agreement

        Description: This an agreement that the customer makes with their credit
        card issuer stating that they aren't able to pay off their debt within
        the current month, so they intend to settle the amount over the next few
        bills. In other words, the amount that remains outstanding is added to
        their statement for the following month.

        `statement_agreement`: false 

        `compulsory`: false 

        Transaction types of transactions:

        702 (REFINANCING INSTALLMENT) 

        701 (INSTALLMENT CREDIT)

        703 (REFINANCING CONTRACT)


        <b>Type of payment agreement:</b> Compulsory agreement

        Description: This is the same as an installment agreement, except that
        it's the result of a renegotiation that was made independently of the
        customer. This is mandatory in Brazil, due to a measure initiated by the
        Central Bank to protect customers from revolving credit interest charged
        on the unpaid amount of the invoice. According to this measure, after 30
        days, the bank or financial institution must offer more advantageous
        conditions for the customer to pay off the debt. In practice, the amount
        owed is automatically divided into installments, allowing the user to
        fit the payment of the debt into their monthly budget.

        `statement_agreement`: false

        `compulsory`: true 

        Transaction types of transactions:

        722 (CP REFINANCING INSTALLMENT) 

        721 (CP INSTALLMENT CREDIT) 

        723 (CP REFINANCING CONTRACT)


        <b>Note:</b> The following combination is not valid. It returns the
        error message "A compulsory request requires the statement agreement
        field to be set to false."

        `statement_agreement`: true 

        `compulsory`: true 


        After the installments are created, the Pismo platform asynchronously
        generates an [Installment payment
        processed](https://developers.pismo.io/events/docs/balance-installment-payment-processed-1)
        event. You should not try to access the new payment agreement until you
        receive this event.
      operationId: InstallmentPaymentsv4
      tags:
        - Refinancing
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstallmentPaymentsV4Request'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallmentPaymentsV4SuccessResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/InvalidFieldErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Compulsory Mode:
                  value:
                    message: >-
                      A compulsory request requires the statement agreement
                      field to be set to false
                Installments Empty:
                  value:
                    message: Installments are empty
                Missing Installment Number:
                  value:
                    message: Missing installment number
                Invalid Total Amount:
                  value:
                    message: >-
                      The total amount should be equals to the sum of the
                      principal amount, interest amount, and IOF (Brazilian tax)
                      amount
                PaymentAgreement Pending Already exists:
                  value:
                    message: PaymentAgreement already exists
                PaymentAgreement Processed Already exists:
                  value:
                    message: PaymentAgreement already exists
                Invalid Field:
                  value:
                    message: fieldName must not be empty
                    field: fieldName
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Account Not Found:
                  $ref: '#/components/examples/AccountNotFoundOrInFirstCycle'
        '423':
          $ref: '#/components/responses/423Locked'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: List payment agreements
      description: List payment agreements for a specified account.
