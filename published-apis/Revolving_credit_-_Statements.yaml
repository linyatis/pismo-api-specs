                $ref: '#/components/schemas/StatementMinimumAmountDueResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
