        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header:
                  description: Settings not found
                  value:
                    code: CE0001
                    message: >-
                      Settings not found for Program with id {program_id} and
                      Parameter with id {parameter_id}
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/accounts/{accountId}/discharges-tracking:
    get:
      tags:
        - Discharge tracking
      summary: List discharges
      description: >
        Track discharges for an account. A discharge occurs when a credit
        transaction is used to reduce the balance of a debit transaction.

        This endpoint returns a list of credit transactions along with the debit
        transactions that they were used to discharge.

        You can filter the list by `creditTransactionId`,
        `CreditTransactionBeginDate`, and `CreditTransactionEndDate`.


        If an invalid value is entered for `creditTransactionBeginDate` or
        `creditTransactionEndDate`, the endpoint returns `400 - Bad Request`. An
        example of an invalid value would be if `creditTransactionEndDate` is an
        earlier date than `creditTransactionBeginDate` or if
        `creditTransactionBeginDate` is more than 184 days in the past.
      operationId: getAccountDischargeTracking
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/CreditTransactionIdQuery'
        - $ref: '#/components/parameters/CreditTransactionBeginDateQuery'
        - $ref: '#/components/parameters/CreditTransactionEndDateQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DischargeTrackingListResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/accounts/{accountId}/minimum-amount-due:
    post:
      tags:
        - Statement minimum amount due
      summary: Create or update statement minimum amount due
      description: >
