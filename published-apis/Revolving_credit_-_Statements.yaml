  /statements-v2/v1/accounts/{accountId}/statements/{statementId}/min-payment-memory:
    get:
      tags:
        - Statement
      summary: Get minimum payout calculation memory
      description: >
        Get a minimum payment calculation memory for a specific account
        statement. The minimum payout calculation memory is the information used
        in the [calculation of the minimum amount due
        (MAD)](doc:minimum-amount-due-calculation) and the results of that
        calculation.


        This this information in a JSON file. For example, in the following
        sample result, the default calculation strategy was used, the resulting
        MAD was 150, and two transactions were used in the calculation.

        {
          "id": 1,
          "created_at": "2021-08-10T00:00:00",
          "org_id": "TN-e7091464-aa1e-4c20-8c68-1e4c57741234",
          "account_id": 1010,
          "statement_id": 1,
          "calc_strategy": "DEFAULT",
          "minimum_amount": 150,
          "calculation_memory": [
            {
              "type": "PREVIOUS_STATEMENT_TRANSACTION",
              "cycle": 4,
              "amount": 43.74,
              "balance": 43.74,
              "percentage": 1.0,           
              "transaction_id": 77489
            },
            {
              "type": "CURRENT_STATEMENT_TRANSACTION",
              "cycle": 5,
              "amount": 3.65,
              "balance": 3.65,
              "percentage": 1.0,
              "transaction_id": 77542
            }
          ]
        }


        The `calc_strategy` field has three possible values: `DEFAULT`,
        `PERCENTAGE_ONLY`, and
        `FIXED_PERCENTAGE_WITH_OVERLIMIT_AND_OVERDUE_AMOUNT`. These values
        correspond to the three possible settings for the `Minimum payment
        calculation method` program parameter: 0, 1, and 2. That is, `DEFAULT` =
        0, `PERCENTAGE_ONLY` = 1, and
        `FIXED_PERCENTAGE_WITH_OVERLIMIT_AND_OVERDUE_AMOUNT` = 2. For more
        information, refer to [Minimum amount due
        calculation](doc:minimum-amount-due-calculation#full-amount-transactions).


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthorized** message.
      operationId: getMinimumPaymentCalculationMemory
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/StatementIdPath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinimumPaymentCalculationMemoryResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/accounts/{accountId}/transactions/shifts:
    post:
      tags:
        - Transaction shift
      summary: Shift transactions
      description: >
        Shift one or more transactions between open statements. For example, a
        transaction can be moved from a future statement to an earlier open
        statement. A transaction can also be moved to a statement farther in the
        future. A maximum of 24 shifts are allowed per request.


        This endpoint generates an [Transaction
        updated](https://developers.pismo.io/events/docs/transaction-update-1)
        event for each transaction that is shifted. After all the transactions
        are successfully shifted, it generates a [Transactions
        shifted](https://developers.pismo.io/events/docs/balance-shift-transactions-1)
        event.


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthorized** message.
      operationId: post-shift-transactions
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionShiftRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/200OK'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          description: >-
            NOT FOUND - Some transactions were not found for the account ID and
            this organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/accounts/{accountId}/transactions/shifts/{transactionShiftId}:
    get:
      tags:
        - Transaction shift
      summary: Get transaction shift
      description: >
        Get the record for a performed shift. Includes the IDs for the source
        and destination statements.


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthorized** message.
      operationId: getTransactionShift
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/TransactionShiftIdPath'
      responses:
        '200':
          $ref: '#/components/responses/200OK'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          description: >-
            NOT FOUND - There is no transactions shift record with the requested
            ID for this organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/accounts/{accountId}/accounts-transactions-categories/{accountTransactionCategoryId}:
    delete:
      tags:
        - Account transaction categories
      summary: Cancel account transaction category
      description: >-
        Cancel an account transaction category. If the passed account
        transaction category is already canceled, an exception is raised.


        When you cancel an account transaction category, the account reverts
        back to using the rates defined in the program-level transaction
        category. For more information about program transaction categories,
        refer to [Transaction category
        structure](doc:configuring-accrual-rates#transaction-category-structure).


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthorized** message.
      operationId: cancelAccountTransactionCategory
      parameters:
        - $ref: '#/components/parameters/AccountTransactionCategoryIdPath'
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          $ref: '#/components/responses/200OK'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/transactions-types:
    get:
      tags:
        - Transaction types
      summary: |
        List transaction types
      description: >
        List transaction types.


        This endpoint will be **DEPRECATED**. Use [List program transaction
        types](ref:gettransactiontypes_1) instead.
      operationId: getTransactionTypes
      parameters:
        - $ref: '#/components/parameters/XProgramIdHeader'
        - $ref: '#/components/parameters/TransactionTypeIdArrayQuery'
        - $ref: '#/components/parameters/TransactionCategoryIdQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionTypeListResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Program not found:
                  description: Program not found
                  value:
                    code: EX0001
                    message: >-
                      There is no program with the informed program_id:
                      ${program_id}
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/programs/{programId}/parameters/{parameterId}:
    get:
      summary: List multivalue program parameter values
      description: >
        Retrieve an array of multivalue program parameter values given a
        parameter ID and program ID.


        For a list of available multivalue parameters, refer to [Multivalue
        program parameters](doc:multivalue-parameters).
      operationId: getProgramParameter
      tags:
        - Multivalue program parameters
      parameters:
        - $ref: '#/components/parameters/ProgramIdPath'
        - $ref: '#/components/parameters/ParameterIdPath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramParameterResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header:
                  description: Missing request header
                  value:
                    code: EX0002
                    message: Missing request header for method parameter of type
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header:
                  description: Settings not found
                  value:
                    code: CE0001
                    message: >-
                      Settings not found for Program with id {program_id} and
                      Parameter with id {parameter_id}
        '500':
          $ref: '#/components/responses/500InternalServerError'
    put:
      summary: Update multivalue program parameter values
      description: >
        Update multivalue program parameters using an array list.  


        For a list of available multivalue parameters, refer to [Multivalue
        program parameters](doc:multivalue-parameters).
      operationId: updateProgramParamenter
      tags:
        - Multivalue program parameters
      parameters:
        - $ref: '#/components/parameters/ProgramIdPath'
        - $ref: '#/components/parameters/ParameterIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                values:
                  type: array
                  items:
                    type: string
                  example:
                    - '100'
                    - '200'
                    - '300'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramParameterResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header:
                  description: Incorrect parameter values
                  value:
                    code: CE0001
                    message: The parameter values must be of type INTEGER
        '500':
          $ref: '#/components/responses/500InternalServerError'
    delete:
      tags:
        - Multivalue program parameters
      summary: Delete multivalue program parameter values
      description: >
        Delete multivalue program parameter values.


        For a list of available multivalue parameters, refer to [Multivalue
        program parameters](doc:multivalue-parameters).
      operationId: deleteProgramParamenter
      parameters:
        - $ref: '#/components/parameters/ProgramIdPath'
        - $ref: '#/components/parameters/ParameterIdPath'
      responses:
