    ProgramTypeID:
      type: integer
      format: int64
      description: Program type ID
      example: 1
    RapBalance:
      type: number
      format: float
      description: >-
        Revenue to be appropriated after the limit days of delay (59 days, for
        example)
      example: 1.21
    RealDueDate:
      type: string
      format: date
      description: >-
        Real due date. The regular due date does not take holidays into account.
        The real due date does, so it might be a later date. Format =
        yyyy-mm-dd.
      example: '2021-05-24'
    RefinancingRateAfterDueDate:
      type: number
      format: float
      description: >
        Interest rate for the accrual type `REFINANCING` if the statement due
        date is past, but the account is not overdue. (That is, the MAD was
        paid.)


        By default, this is a monthly rate, so the Pismo platform divides it by
        30 before applying it on a daily basis. For more information, refer to
        [Changing the interest rate
        period](doc:configuring-accrual-rates#changing-the-interest-rate-period).
      example: 15.99
    RefinancingRateAfterDueDateMultiplierPercent:
      type: number
      format: float
      description: >-
        Percentage multiplier applied to transaction category refinancing rate
        after due date. 1.5 = 150% of the refinancing rate.
      example: 1.5
