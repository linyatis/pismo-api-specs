          $ref: '#/components/schemas/StatementID'
        cycle:
          $ref: '#/components/schemas/CycleNumber'
        calendar_id:
          $ref: '#/components/schemas/CalendarID'
        cycle_closing_date:
          $ref: '#/components/schemas/CycleClosingDate'
        due_date:
          $ref: '#/components/schemas/DueDate'
        real_due_date:
          $ref: '#/components/schemas/RealDueDate'
        program_due_date_id:
          $ref: '#/components/schemas/ProgramDueDateID'
    StatementCycle:
      type: integer
      format: int32
      description: Statement cycle
      example: 7
    StatementCloseDate:
      type: string
      description: Statement close date. Format = yyyy-mm-ddThh:mm:ss.
      format: full-date-time
      example: '2020-05-21T03:00:00Z'
    StatementDueDateResponse:
      type: object
      properties:
        account_default_program_due_date_id:
          $ref: '#/components/schemas/ProgramDueDateID'
        statements:
          type: array
          items:
            $ref: '#/components/schemas/StatementCalendarResponse'
    StatementDueDateRequest:
      required:
        - account_default_program_due_date_id
      type: object
      properties:
        account_default_program_due_date_id:
          $ref: '#/components/schemas/ProgramDueDateID'
        statements:
          type: array
          items:
            $ref: '#/components/schemas/StatementRequest'
    StatementFillingV1ResponseSuccess:
      type: object
      properties:
        org_id:
          $ref: '#/components/schemas/OrgID'
        account_id:
          $ref: '#/components/schemas/AccountID'
        cid:
          $ref: '#/components/schemas/CID'
    StatementID:
      type: integer
      format: int64
      description: Statement ID
      example: 9497889
    StatementMigrationID:
      type: string
      description: Statement migration ID
      example: 123abc
    StatementMinimumAmountDueRequest:
      required:
        - amount_type
        - minimum_amount_due
      type: object
      properties:
        amount_type:
          $ref: '#/components/schemas/AmountType'
        minimum_amount_due:
          $ref: '#/components/schemas/MinimumAmountDue'
    StatementMinimumAmountDueResponse:
      type: object
      properties:
        statement_id:
          $ref: '#/components/schemas/StatementID'
        amount_type:
          $ref: '#/components/schemas/AmountType'
        cycle:
          $ref: '#/components/schemas/StatementCycle'
        current_balance:
          $ref: '#/components/schemas/CurrentBalance'
        minimum_amount_due:
          $ref: '#/components/schemas/MinimumAmountDue'
        enabled:
          $ref: '#/components/schemas/MinimumAmountDueEnabled'
    StatementMonth:
      type: integer
      format: int32
      description: Statement month
      example: 6
    StatementObject:
      type: object
      properties:
        statement_id:
          $ref: '#/components/schemas/StatementID'
        cycle:
          $ref: '#/components/schemas/CycleNumber'
        cycle_closing_date:
          $ref: '#/components/schemas/CycleClosingDate'
        due_date:
          $ref: '#/components/schemas/DueDate'
        real_due_date:
          $ref: '#/components/schemas/RealDueDate'
        previous_balance:
          $ref: '#/components/schemas/PreviousBalance'
        debits:
          $ref: '#/components/schemas/Debits'
        credits:
          $ref: '#/components/schemas/Credits'
        current_balance:
          $ref: '#/components/schemas/CurrentBalance'
        minimum_payment:
          $ref: '#/components/schemas/MinimumPayment'
        status:
          $ref: '#/components/schemas/StatementStatus'
    StatementRequest:
      type: object
      properties:
        statement_id:
          $ref: '#/components/schemas/StatementID'
        calendar_id:
          $ref: '#/components/schemas/CalendarID'
    Statements:
      type: array
      items:
        type: object
        properties:
          amount:
            $ref: '#/components/schemas/StatementAmount'
          month:
            $ref: '#/components/schemas/StatementMonth'
          year:
            $ref: '#/components/schemas/StatementYear'
    StatementStatus:
      type: string
      description: >
        Statement status. The possible values are:

        * `CLOSED`: Statement is closed, and the due date has already passed.

        * `CLOSED_NOT_DUE`: Statement is closed, but the due date has not yet
        passed. In other words, the current date is between the statement's
        cycle closing date and due date.

        * `OPEN`: Statement is open. This is the current statement, before cycle
        closing.

        * `FUTURE`: Future statement. That is, a statement that has not been
        opened yet. Statements with this status usually include installments
        from purchases that will be due in future billing cycles.
      example: CLOSED
    StatementYear:
      type: integer
      format: int32
      description: Statement year
      example: 2021
    StatusUpdatedAt:
      type: string
      format: full-date-time
      description: >-
        When the status's imported statement was updated. Format =
        yyyy-mm-ddThh:mm:ss.
      example: '2021-08-10T00:00:00'
    SummaryItems:
      type: array
      description: Summary of the debts posted on the customer's statements.
      items:
        type: object
        properties:
          description:
            type: string
            description: Summary item description
            example: TOTAL
          value:
            type: number
            description: Value of summary item
            example: 0
    SummedInterestAccrualIDs:
      type: array
      description: All ID's that are included in the summed interest accrual amount
      example:
        - 7
        - 8
        - 9
        - 10
        - 11
      items:
        type: integer
        format: int64
        description: ID included in summed interest accrual amount
    SumPrincipalWithInterestAndFees:
      type: number
      format: float
      description: >-
        Sum of this installment's principal amount with its interest and fees.
        Maximum of 2 digits allowed after the decimal place.
      example: 40
    TaxAmount:
      type: number
      format: float
      description: Tax amount
      example: 7.99
    Taxes:
      type: object
      properties:
        total_fixed_iof_amount:
          $ref: '#/components/schemas/TotalFixedIofAmount'
        total_daily_iof_amount:
          $ref: '#/components/schemas/TotalDailyIofAmount'
        total_iof_amount:
          $ref: '#/components/schemas/TotalIofAmount'
    TotalAmount:
      type: number
      format: float
      description: Total amount
      example: 600
    TotalBalance:
      type: number
      format: float
      description: Total balance
      example: 90
    TotalContractAmount:
      type: number
      format: float
      description: Total contract amount
      example: 55
    TotalDailyIofAmount:
      type: number
      format: float
      description: Total daily IOF (Brazilian tax) amount.
      example: 0.04
    TotalDebitAmount:
      type: number
      format: float
      description: >-
        Statement total debit amount. (Includes only debits from previous
        statements.)
      example: 99.99
    TotalDue:
      type: number
      format: float
      description: Total due
      example: 100
    TotalDueAmount:
      type: number
      format: float
      description: Total amount due
      example: 81.45
    TotalDueResponse:
      type: object
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        current_cycle:
          $ref: '#/components/schemas/Currentycle'
        open_due_date:
          $ref: '#/components/schemas/OpenDueDate'
        collection_status:
          $ref: '#/components/schemas/CollectionStatus'
        balance:
          $ref: '#/components/schemas/BalanceObject'
        pending_accruals:
          type: array
          items:
            $ref: '#/components/schemas/PendingAccrualResponse'
    TotalFixedIofAmount:
      type: number
      format: float
      description: Total fixed IOF (Brazilian tax) amount
      example: 0.07
    TotalInterestAmountDiscount:
      type: number
      format: float
      description: Total interest amount discount
      example: 25
    TotalIofAmount:
      type: number
      format: float
      description: Total IOF (Brazilian tax) amount
      example: 0.11
    TotalItems:
      type: integer
      format: int32
      description: Number of items found
      example: 100
    TotalPrincipalAmountOfInstallments:
      type: number
      format: float
      description: Principal amount. Maximum of 2 digits allowed after the decimal place.
      example: 600
    TransactionAmount:
      type: number
      format: float
      description: Transaction amount
      example: 150
    TransactionBalance:
      type: number
      format: float
      description: Value of interest accrual transaction
      example: 101.99
    TransactionCategoryDescription:
      type: string
      maxLength: 50
      description: Transaction category description
      example: purchase
    TransactionCategoryID:
      type: integer
      format: int64
      description: Transaction category ID
      example: 1
    TransactionCategoryIDForSave:
      type: integer
      description: >-
        Transaction category ID. **Must** be associated with the passed
        `program_id` and `org_id`.
      format: int64
      example: 1
    TransactionCategoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransactionCategoryResponse'
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        per_page:
          $ref: '#/components/schemas/PerPageDefault10'
        total_items:
          $ref: '#/components/schemas/TotalItems'
        items_on_page:
          $ref: '#/components/schemas/ItemsOnPage'
        pages:
          $ref: '#/components/schemas/Pages'
        is_last_page:
          $ref: '#/components/schemas/IsLastPage'
    TransactionCategoryResponse:
      type: object
      properties:
        transaction_category_id:
          $ref: '#/components/schemas/TransactionCategoryID'
        transaction_category_description:
          $ref: '#/components/schemas/TransactionCategoryDescription'
        refinancing_rate_after_due_date:
          $ref: '#/components/schemas/RefinancingRateAfterDueDate'
        default_rate:
          $ref: '#/components/schemas/DefaultRate'
        fine_rate:
          $ref: '#/components/schemas/FineRate'
        overdue_rate_after_due_date:
          $ref: '#/components/schemas/OverdueRateAfterDueDate'
        minimum_value:
          $ref: '#/components/schemas/MinimumValue'
        charge_order:
          $ref: '#/components/schemas/ChargeOrder'
        secondary_charge_order:
          $ref: '#/components/schemas/SecondaryChargeOrder'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        programs:
          $ref: '#/components/schemas/Programs'
    TransactionCategoryRequest:
      required:
        - default_rate
        - fine_rate
        - minimum_value
        - overdue_rate_after_due_date
        - refinancing_rate_after_due_date
      type: object
      properties:
        default_rate:
          $ref: '#/components/schemas/DefaultRate'
        fine_rate:
          $ref: '#/components/schemas/FineRate'
        minimum_value:
          $ref: '#/components/schemas/MinimumValue'
        overdue_rate_after_due_date:
          $ref: '#/components/schemas/OverdueRateAfterDueDate'
        refinancing_rate_after_due_date:
          $ref: '#/components/schemas/RefinancingRateAfterDueDate'
        description:
          $ref: '#/components/schemas/TransactionCategoryDescription'
        charge_order:
          $ref: '#/components/schemas/ChargeOrder'
        secondary_charge_order:
          $ref: '#/components/schemas/SecondaryChargeOrder'
      example:
        refinancing_rate_after_due_date: 13.99
        default_rate: 1
        fine_rate: 2
        overdue_rate_after_due_date: 17.99
        minimum_value: 0.2
        charge_order: 1
        secondary_charge_order: 7
    TransactionDescription:
      type: string
      description: Transaction description
      example: purchase
    TransactionID:
      type: integer
      format: int64
      description: Transaction ID
      example: 77489
    TransactionInterestRate:
      type: number
      format: float
      description: Transaction interest rate.
      example: 15.99
    TransactionTypeDescription:
      type: string
      description: Transaction type description
      example: purchase
    TransactionsBalanceListResponse:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        per_page:
          $ref: '#/components/schemas/PerPageDefault10'
        total_items:
          $ref: '#/components/schemas/TotalItems'
        pages:
          $ref: '#/components/schemas/Pages'
        is_last_page:
          $ref: '#/components/schemas/IsLastPage'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransactionsBalanceResponse'
    TransactionsBalanceResponse:
      type: object
      properties:
        transaction_id:
          $ref: '#/components/schemas/TransactionID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        statement_id:
          $ref: '#/components/schemas/StatementID'
        amount:
          $ref: '#/components/schemas/TransactionAmount'
        tax_amount:
          $ref: '#/components/schemas/TaxAmount'
        interest_rate:
          $ref: '#/components/schemas/TransactionInterestRate'
        interest_amount:
          $ref: '#/components/schemas/InterestAmount'
        balance_amount:
          $ref: '#/components/schemas/BalanceAmount'
        event_datetime:
          $ref: '#/components/schemas/EventDatetime'
        installment_number:
          $ref: '#/components/schemas/InstallmentNumber'
        number_of_installments:
          $ref: '#/components/schemas/NumberOfInstallments'
        transaction_type_id:
          $ref: '#/components/schemas/TransactionTypeID'
        statement:
          $ref: '#/components/schemas/StatementObject'
    TransactionShiftResponseBody:
      description: Resource that represents the performed request for transactions shifts
      type: object
      properties:
        transaction_statement_shift_id:
          $ref: '#/components/schemas/TransactionStatementShiftID'
        desired_cycle_date:
          $ref: '#/components/schemas/DesiredCycleDateInResponse'
        tracking_id:
          $ref: '#/components/schemas/ShiftTrackingID'
        shifts:
          $ref: '#/components/schemas/ResponseShifts'
    TransactionShiftRequestBody:
      description: Resource that represents the performed request for transactions shift.
      type: object
      properties:
        tracking_id:
          $ref: '#/components/schemas/ShiftTrackingID'
        shifts:
          $ref: '#/components/schemas/RequestShifts'
      example:
        tracking_id: 3ea22692-a209-11eb-89a2-f73e179dcbc2,
        shifts:
          - transaction_id: 10
            new_statement_id: 5
          - transaction_id: 11
            desired_cycle_date: '2023-12-25'
    TransactionStatementShiftID:
      type: integer
      format: int64
      description: ID of the shift operation performed
      example: 211452
    TransactionTypeID:
      type: integer
      format: int32
      description: Transaction type ID
      example: 342
    TransactionTypeListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransactionTypeResponse'
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        per_page:
          $ref: '#/components/schemas/PerPageDefault10'
        total_items:
          $ref: '#/components/schemas/TotalItems'
        items_on_page:
          $ref: '#/components/schemas/ItemsOnPage'
        pages:
          $ref: '#/components/schemas/Pages'
        is_last_page:
          $ref: '#/components/schemas/IsLastPage'
    TransactionTypeResponse:
      type: object
      properties:
        transaction_type_id:
          $ref: '#/components/schemas/TransactionTypeID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        transaction_category_id:
          $ref: '#/components/schemas/TransactionCategoryID'
        transaction_type_description:
          $ref: '#/components/schemas/TransactionTypeDescription'
    UpdatedAt:
      type: string
      description: When this interest rate was updated. Format = yyyy-mm-ddThh:mm:ss.
      example: '2021-08-20T00:00:00'
    UpdatedIDs:
      type: array
      description: ID's of interest accruals that have been updated.
      example:
        - 1
        - 2
        - 3
      items:
        type: integer
        format: int64
    UpdateStatementsDueDateV1Request:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int32
          minimum: 1
          example: 1
          description: ID of desired program due date
    UpdateStatementsDueDateV1ResponseSuccess:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          example: true
          description: '`true` if update operation was successful. `false` otherwise.'
    UpfrontAmount:
      type: number
      format: float
      description: Upfront amount
      example: 200
    UseOriginalRate:
      type: boolean
      default: false
      example: false
      description: >-
        Set to `true` if the original installment rate should be used to
        generate accruals. Set to `false`, otherwise. The original installment
        rate is the payment agreement contract interest rate. So, if this field
        is set to `true`, this rate is used instead of the transaction category
        interest rate when a payment agreement installment is due.
    ValidationQuery:
      type: string
      description: Validation query
      example: Select 1
    YearDueDate:
      type: integer
      format: int32
      description: Reference year of statement
      example: 2020
  responses:
    200OK:
      description: >-
        OK - Indicates that the server accepted the request and created the
        resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TransactionShiftResponseBody'
    400BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
          examples:
            Missing request header:
              description: Missing request header
              value:
                code: EX0002
                message: Missing request header for method parameter of type String
    400IdempotentError:
      description: Bad Request
      content:
        application/json:
          schema:
            anyOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            Idempotent Error:
              $ref: '#/components/examples/IdempotentError'
    408RequestTimeout:
      description: Request Timeout
      content:
        application/json:
          schema:
            anyOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            Bankslip Timeout:
              $ref: '#/components/examples/BankslipTimeout'
    423Locked:
      description: Locked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Account Locked:
              description: >-
                The operation could not be completed because another process is
                manipulating the account. Try again in a moment.
              value:
                message: >-
                  The operation could not be completed because another process
                  is manipulating the account (the account lock could not be
                  obtained). Try again in a moment.
    4XXClientError:
      description: Client Error
      content:
        application/json:
          schema:
            anyOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            Unable to fetch parameters:
              value:
                message: Unable to fetch parameters
    500InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            anyOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            Internal Server Error:
              description: Service is unavailable
              value:
                code: GN0001
                message: Service is unavailable
    503ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
          examples:
            Internal Server Error:
              description: Service is unavailable
              value:
                code: GN0001
                message: Service is unavailable
    5XXServerError:
      description: Server Error
      content:
        application/json:
          schema:
            anyOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            Error fetching parameters:
              value:
                message: Error fetching parameters
  examples:
    AccountNotFound:
      value:
        message: Account not found.
    AccountNotFoundOrInFirstCycle:
      value:
        message: Account not found or account in first cycle
    InvalidAccountId:
      value:
        message: Invalid Long value for account_id parameter.
    IdempotentError:
      value:
        message: Already exists an operation with the same data.
    InstallmentNotFoundToAdvance:
      value:
        message: >-
          Not found installments to advance for accountId: 999999 and
          transactionId: 99999999
    InvalidNumberOfInstallmentsToAdvance:
      value:
        message: >-
          Invalid number of installments to advance. Number of installments to
          advance=10 Available installments=5)
    StatementNotFound:
      value:
        message: Statement not found
    FinancingAndInstallmentsOptionsNotFound:
      value:
        message: Financing and InstallmentsOptions not found
    BankslipTimeout:
      value:
        message: Timeout during bankslip generation
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Account JWT
security:
  - BearerAuth: []
paths:
  /statements/v1/accounts/{accountId}/next:
    get:
      summary: Get current statement
      description: >
        Get the current statement by account ID. For more information about
        statements, refer to [Understanding
        statements](doc:understanding-statements).


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthorized** message.         
      operationId: GetCurrentStatement
      tags:
        - Statement
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AccountNextResponse'
                example:
                  id: 1
                  cycle: 1
                  due_date: '2020-06-01'
                  best_transaction_date: '2020-05-23'
                  minimum_payment_amount: 15
        '404':
          description: Bad Request
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Account Not Found:
                  $ref: '#/components/examples/AccountNotFound'
                Invalid Account ID:
                  $ref: '#/components/examples/InvalidAccountId'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements/v1/accounts/{accountId}/statements/{statementId}:
    get:
      summary: Get statement
      description: >
        Get a statement by account ID and statement ID. For more information
        about statements, refer to [Understanding
        statements](doc:understanding-statements).


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthorized** message.
      operationId: GetStatementInfo
      tags:
        - Statement
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/StatementIdPath'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                oneOf:
                  - $ref: '#/components/schemas/GetStatementV1ResponseSuccess'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/InvalidFieldErrorResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Account Not Found:
                  $ref: '#/components/examples/AccountNotFound'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Statement not found:
                  $ref: '#/components/examples/StatementNotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v3/accounts/{accountId}/statements:
    get:
      tags:
        - Statement
      summary: List statements v3
      description: >
        List account statements. For more information about statements, refer to
        [Understanding statements](doc:understanding-statements).


        The filter parameters have the following order of precedence:

        1. `startFromCurrentCycle`

        2. `presentToFront`

        3. `presentToPast`


        That is, if `startFromCurrentCycle` is `true`, then `presentToFront` and
        `presentToPast` are ignored.

        If `startFromCurrentCycle` is `false` (or not set), and `presentToFront`
        is `true`, then `presentToPast` is ignored.


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthorized** message.
      operationId: getByStatementId
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/StatementIdQuery'
        - $ref: '#/components/parameters/StartCycleQuery'
        - $ref: '#/components/parameters/StartFromCurrentCycleQuery'
        - $ref: '#/components/parameters/PresentToFrontQuery'
        - $ref: '#/components/parameters/PresentToPastQuery'
        - $ref: '#/components/parameters/BeginDueDateQuery'
        - $ref: '#/components/parameters/EndDueDateQuery'
        - $ref: '#/components/parameters/MaxClosedCyclesQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountStatementsListResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/transactions-categories:
    post:
      tags:
        - Program transaction categories
      summary: Create program transaction category
      description: >
        Create a program transaction category. Program transaction categories
        are used to group transaction types and set properties for the group.
        Transaction types, in combination with processing codes, are used to
        define how financial operations are implemented on the Pismo platform. 


        For more information, refer to [Using configurable
        entities](doc:full-balance-credit-program#using-configurable-entities)
        and [Transaction category
        structure](doc:configuring-accrual-rates#transaction-category-structure).
