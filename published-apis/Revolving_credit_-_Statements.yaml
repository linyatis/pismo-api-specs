  /statements-v2/v1/accounts/{accountId}:
    patch:
      summary: Update account collection status
      description: >
        Change an account's collection status from `NORMAL` to `OVERDUE` or
        vice-versa. `OVERDUE` accounts cannot do cash-outs (purchases, cash
        withdrawals, and so on).


        When you try to change an account's collection status to `OVERDUE`, the
        Pismo platform first verifies that `OpenDueDate` is not `NULL` and that
        it is a date in the past. If this test fails, it returns `400 Bad
        request`.


        No validations are done when you change the collection status to
        `NORMAL`.


        Changing the account collection status does not affect the [account
        status](doc:managing-account-statuses#account-statuses-common-to-all-accounts).
        So, for example, changing the account collection status from `NORMAL` to
        `OVERDUE` does not cause the account status to change to `BLOCKED`, even
        though it does prevent cash-outs by blocking the ledger itself. When you
        change the account collection status from `OVERDUE` to `NORMAL`, the
        ledger is unblocked and the account is again able to do cash-outs,
        assuming the account status is not `BLOCKED`. The two fields are not
        linked.


        <table>
          <thead>
            <tr>
              <th>Collection status</th>
              <th>Account status</th>
              <th>Result</th>
            </tr>           
          </thead>
          <tbody>
            <tr>
              <td><b>`NORMAL`</b>
              <td><b>`NORMAL`</b></td>
              <td>Account is usable.</td>
            </tr>
            <tr>
              <td><b>`NORMAL`</b>
              <td><b>`BLOCKED`</b></td>
              <td>Account is not usable.</td>
            </tr>
            <tr>
              <td><b>`OVERDUE`</b>
              <td><b>`NORMAL`</b></td>
              <td>Account is not usable.</td>
            </tr>
            <tr>
              <td><b>`OVERDUE`</b>
              <td><b>`BLOCKED`</b></td>
              <td>Account is not usable.</td>
            </tr>               
          </tbody>
        </table>


        For more information about the account collection status, refer to the
        [Credit liquidation](doc:credit-liquidation) guide.


        **Note:** This endpoint requires an account token - an access token
        encoded with a Pismo account ID. Tokens can expire quickly, which can
        result in a **401 Unauthorized** message.
      operationId: ChangeAccountCollectionStatus
      tags:
        - Account
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCollectionStatusV1PatchRequest'
        required: true
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                oneOf:
                  - $ref: >-
                      #/components/schemas/AccountCollectionStatusV1PatchResponse
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/InvalidFieldErrorResponse'
              examples:
                Account Not Found:
                  $ref: '#/components/examples/AccountNotFound'
                Invalid Account ID:
                  $ref: '#/components/examples/InvalidAccountId'
                Invalid Status:
                  value:
                    message: invalid collection-status
        '500':
          $ref: '#/components/responses/500InternalServerError'
