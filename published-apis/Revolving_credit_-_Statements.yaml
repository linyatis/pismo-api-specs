      type: boolean
      description: >
        Are the current interests removed from the installment in the current
        statement (`true`) or not (`false`)? This field is considered when mode
        = `all`. Note that all interest from future installments are always
        removed when they are advanced. If mode = `single`, it is not possible
        to remove interest from the installment in the current statement.
        Default is `false`.
      example: false
