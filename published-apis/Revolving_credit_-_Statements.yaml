          $ref: '#/components/schemas/AccrualsToUpdate'
    AccrualType:
      type: string
      description: >
        Interest accrual type. Possible values:

        * `OVERDUE`:  A daily charge applied to an unpaid balance if the minimum
        amount due (MAD) has not been paid.

        * `REFINANCING`: A daily charge applied to an unpaid balance if the MAD
        has been paid, but the total amount due has not.

        * `IOF`: A Brazilian tax

        * `FINE`: A one-time charge that's applied on the day an account becomes
        overdue.
      enum:
        - OVERDUE
        - REFINANCING
        - IOF
        - FINE
      example: OVERDUE
    AccrualType2:
      type: string
      description: >
        Interest accrual type.

        * `REFINANCING`: When payment is greater than the minimum and less than
        the total balance amount.

        * `OVERDUE`:  When a customer pays less than the minimum amount on the
        balance, he enters an overdue state, and refinancing of that type is
        calculated.
      enum:
        - REFINANCING
        - OVERDUE
      example: REFINANCING
