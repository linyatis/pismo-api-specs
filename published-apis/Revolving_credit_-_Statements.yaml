    CancelAtStartDate:
      type: boolean
      description: >
        Cancel at start date?


        If `false`, the behavior of the endpoint is not affected.


        If `true`, the endpoint presents the following behavior.

        * If a value is provided for `start_date`, the `cancelled_at` field is
        set to the day before `start_date`, and the configuration is canceled on
        that date.

        * If a value is provided for `start_cycle`, `cancel_at_start_date` is
        ignored. The account transaction category is immediately canceled (that
        is, `cancelled_at` is set to null), and the `cancelled_at` field is
        updated with today's date (the date of the request), just as it would be
        if `cancel_at_start_date` were `false`.       


        **Note:** You must provide a value for either `start_date` or
        `start_cycle`, but not both.


        Executing this endpoint multiple times with `cancel_at_start_date` set
        to `true`, but with different values for `rate` and `start_date` enables
        you to define a schedule for when the different rates should be applied.
        For example, suppose you have an existing account transaction category
        with the following settings.

        `account_transaction_category_id` = 2301

        `account_id` = 1

        `transaction_category_id` = 1001

        `rate` = 10.0

        `start_date` = 2025-07-01 


        Now suppose you execute this endpoint with the following settings.
        (Assume 2025-07-15 is the current date or a date in the near future.)
        You do not have to pass an `account_transaction_category_id`. The Pismo
        platform generates a new ID and returns it in the endpoint response.
        Note, however, that you're passing the same value (1001) for
        `transaction_category_id` as in the existing category.

        `account_id` = 1

        `transaction_category_id` = 1001

        `rate` = 12.0

        `start_date` = 2025-07-15


        The new account transaction category is created with ID 2302 (for
        example), and the account transaction category with ID 2301 is canceled
        on 2025-07-14.


        Suppose the client executes the endpoint again, using the following
        values.

        `account_id`: 1

        `transaction_category_id`: 1001

        `rate`: 14.0

        `start_date`: 2025-07-25


        The new account transaction category is created with ID 2303 (for
        example) and the account transaction category with ID 2302 is canceled
        on 2025-07-24.

        In the last request, if a value is provided for `start_cycle`, instead
        of `start_date`, the platform immediately cancels all of the existing
        account transactions categories, just as it would have done if
        `cancel_at_start_date` were `false`.
      default: false
      example: true
