        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Settings not found:
                  description: No Statements Minimum Amount Due found
                  value:
                    code: CE0001
                    message: >-
                      No Statements Minimum Amount Due found for the provided
                      Statement_ID and Account_ID.
