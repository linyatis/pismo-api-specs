                  description: Current Statement not found
                  value:
                    code: CE0001
                    message: No Current Statement found for the provided Account_ID.
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: Get statement minimum amount due
      description: |
        Get the statement minimum amount due by account ID and statement ID.
      operationId: getStatementAmountDue
      tags:
        - Statement minimum amount due
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/StatementIdQuery2'
        - $ref: '#/components/parameters/AuthHeader'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
