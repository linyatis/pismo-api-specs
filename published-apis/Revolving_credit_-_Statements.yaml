                    code: CE0001
                    message: Information not found for calendar_id (value = 1)
                Resource not found:
                  description: Resource was not found for given information
                  value:
                    code: CE0001
                    message: Resource account not found
                Unexpected response:
                  description: Unexpected response for given information
                  value:
