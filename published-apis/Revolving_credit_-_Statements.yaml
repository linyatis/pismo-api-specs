    SecondaryChargeOrder:
      type: integer
      format: int32
      description: >
        An alternative form of discharge priority for debit transactions. This
        field is only used if the `secondary_charge_order` parameter is active
        at the account level. In the discharge flow, the Pismo platform checks
        to see if `secondary_charge_order` is set for the account and is
        positive. If so, then the platform ignores the `charge_order` field and
        uses the `secondary_charge_order` field instead.


        Use <a
        href="https://developers.pismo.io/pismo-docs/reference/account-parameters-update">Update
        account parameter</a> to set this parameter. The endpoint requires the
        ID of the parameter. Use <a
        href="https://developers.pismo.io/pismo-docs/reference/account-parameters-find">List
        account parameters</a> to find the ID. For example, if you want the
        `secondary_charge_order` field to be used for transactions on the
        account with account ID 1234, and the ID for the parameter is 108, then
        you should call the Update account parameter endpoint with `accountId` =
        `1234`, `parameterId` = 108, and `value` = 1.
      example: 7
