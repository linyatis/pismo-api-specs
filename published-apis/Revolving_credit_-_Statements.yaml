  /statements/v1/accounts/{accountId}/statements/due-date:
    put:
      summary: Change due date
      description: >
        Update the due date for all subsequent account statements. The new due
        date must always be greater than the current due date to avoid
        inconsistencies in the platform. 


        **Important:** The due date must be updated no later than two days
        before the cycle closes. If you try to update the due date within a day
        of the cycle closing date, the endpoint generates an error. This
        behavior is necessary to ensure accuracy on cycle closing and data
        consistency.


        By default, you can only update the due date once per credit cycle. If
        you update the due date, and then try to update it again before the end
        of the same cycle, the endpoint returns an error. This behavior can be
        disabled by setting the [Due date exchange
        control](doc:program-parameters-reference-table) program parameter to
        `false`.


        **Notes:**

        - Due date is *required* for credit full balance program types.


        - This endpoint requires an account token - an access token encoded with
        a Pismo account ID. Tokens can expire quickly, which can result in a
        **401 Unauthorized message**.        
      operationId: UpdateStatementsDueDate
      tags:
        - Due date
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatementsDueDateV1Request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateStatementsDueDateV1ResponseSuccess'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Invalid due date:
                  value:
                    message: Invalid due date ID
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Account Not Found:
                  $ref: '#/components/examples/AccountNotFound'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Same due date id:
                  value:
                    message: Due date is the same already configured
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /statements-v2/v1/accounts/{accountId}/transactions-balance:
