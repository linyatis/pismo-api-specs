              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0007
                message: An unexpected error happened.
    put:
      summary: Update limit config by account
      description: >-
        Update the limit configuration for authorizations on the account level.
        This endpoint updates the entire configuration, so you must send all
