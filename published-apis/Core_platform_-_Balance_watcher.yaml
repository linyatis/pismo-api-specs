              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0007
                message: An unexpected error happened.
  /v1/acceptance/processing-code/{processingCode}:
    parameters:
      - $ref: '#/components/parameters/ProcessingCodePath'
    post:
      summary: Create limit acceptance config by Org
      description: >
        Create a limit acceptance configuration for authorizations on the
        organization (Org) level. This configuration applies to authorizations
        generated by operations defined in the provided processing code. 


        This level can be used as a default configuration for all programs and
        accounts in this Org. There can be only one configuration by Org. New
        creation attempts for the same Org get a conflict response.


        At least one of the following objects is **required** in this request:

        - `network_authorization` 

        - `platform_authorization`

        - `authorization`


        This configuration currently supports only the over-limit feature. See
        the [Over-limit fee](doc:over-limit-fee) guide for more information.
      operationId: post-acceptance-by-tenant
      tags:
        - Limit acceptance configurations
      requestBody:
        description: Create acceptance configuration request body.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptanceRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptanceResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0008
                message: Invalid request.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0031
                message: Config creation by account unauthorized.
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0032
                message: Config already exists.
        '500':
          description: Internal server error
          content:
