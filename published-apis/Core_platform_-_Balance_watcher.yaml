            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0008
                message: Invalid request.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0031
                message: Config creation by account unauthorized.
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0032
                message: Config already exists.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0007
                message: An unexpected error happened.
    get:
      summary: Get limit config by program
      description: Get the limit configuration for authorizations on the program level.
      operationId: get-config-by-program
      tags:
        - Limit configurations
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0008
                message: Invalid request.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0031
                message: Config creation by account unauthorized.
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0001
                message: No configuration was found.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0007
                message: An unexpected error happened.
    put:
      summary: Update limit config by program
      description: >-
        Update the limit configuration for authorizations on the program level.
        This endpoint updates the entire configuration, so you must send all
        fields to avoid data loss.
      operationId: put-config-by-program
      tags:
        - Limit configurations
      requestBody:
        description: Update configuration request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigRequest'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0008
                message: Invalid request.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0031
                message: Config creation by account unauthorized.
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0001
                message: No configuration was found.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: BW0007
                message: An unexpected error happened.
  /v1/config/account/{accountId}:
    parameters:
      - $ref: '#/components/parameters/AccountIdPathInteger'
    post:
      summary: Create limit config by account
      description: >
        Create a limit configuration for authorizations on the account level. 


        This is the most granular level allowed and can be used to customize a
        specific account. There can be only one configuration by account. New
        creation attempts for the same account get a conflict response.


        This configuration currently supports only the over-limit feature. See
        the [Over-limit fee](doc:over-limit-fee) guide for more information.
      operationId: post-config-by-account
      tags:
        - Limit configurations
      requestBody:
        description: Create configuration request body
