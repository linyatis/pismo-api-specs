openapi: 3.0.1
info:
  title: Instant payments - QR Code
  contact:
    name: Pismo
    url: https://pismo.io/en/contact
  description: QR Code API for creating dynamic QR Code strings, and payloads for payment
  license:
    name: Copyright Pismo
    url: https://developers.pismo.io/licenses/
  version: '1.0'
servers:
  - url: https://sandbox.pismolabs.io/qrcode
    description: Sandbox API server for testing
  - url: https://api.pismo.io/qrcode
    description: API server for production.
tags:
  - name: QR Code
  - name: Recurring payment
components:
  parameters:
    authHeader:
      name: Authorization
      in: header
      schema:
        type: string
      description: >
        Account token - token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a <b>401 Unauthorized</b> message.
      required: true
  schemas:
    accessToken:
      type: string
      description: |
        QR Code access token generated and returned at creation.
      example: '1234567890'
    additionalInfo:
      type: array
      description: Additional remarks
      items:
        $ref: '#/components/schemas/qrcode.Additional'
    additionalInformation:
      type: string
      maxLength: 64
      description: Additional information about the new QR Code creation
      example: Additional info about this qrcode
    address:
      type: string
      maxLength: 200
      description: Location
      example: 10 Downing Street, London  SW1A 2AB, UK
    allowsValueChange:
      type: boolean
      description: Can payer change payment values. Default = `false`.
      example: true
    amount:
      type: number
      description: Amount to be transferred.
      example: 1050.44
    charge:
      description: Charge information
      allOf:
        - $ref: '#/components/schemas/qrcode.Charge'
    city:
      type: string
      maxLength: 40
      description: City where payment occurred.
      example: Brasilia
    contractID:
      type: string
      description: |
        Payee-created external ID for their reference.
      maxLength: 35
      example: 5509-uroo-78944-9987
    creationDate:
      type: string
      format: datetime
      description: QR Code creation date/time. RFC 3339 format.
      example: '2023-04-12T23:20:50.52Z'
    customer.DetailMessage:
      type: object
      properties:
        external:
          type: array
          items:
            $ref: '#/components/schemas/customer.ExternalMessage'
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/customer.ParameterMessage'
        payload:
          type: array
          items:
            $ref: '#/components/schemas/customer.PayloadMessage'
    customer.Error:
      type: object
      properties:
        code:
          type: string
          description: Error code.
          example: EPT0001
        details:
          $ref: '#/components/schemas/customer.DetailMessage'
        message:
          type: string
          description: Error message.
          example: User not found
    customer.ExternalMessage:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code.
          example: PBE315
        message:
          type: string
          description: Error message.
          example: Generic error
    customer.ParameterMessage:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Detailed field name
          example: query_parameter
        message:
          type: string
          description: Error's message.
          example: Generic error
    customer.PayloadMessage:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Detailed field name.
          example: Entity.field
        message:
          type: string
          description: Error message.
          example: Generic error
    debtor:
      type: object
      required:
        - document_number
        - document_type
        - name
      properties:
        document_number:
          $ref: '#/components/schemas/documentNumber'
        document_type:
          $ref: '#/components/schemas/legalType'
        name:
          $ref: '#/components/schemas/name'
    discountDate:
      type: string
      format: date
      description: Last date discount can be applied. Format = yyyy-mm-dd.
      example: '2024-01-12'
    discountFixedDates:
      type: array
      description: >
        Maximum dates for payment to apply the discount (fixed value). Use this
        attribute for discount_type = `FIXED_VALUE_UNTIL_THE_DATES_INFORMED`
      items:
        $ref: '#/components/schemas/qrcode.DiscountDate'
    discountType:
      type: string
      description: |
        Discount value type.
      enum:
        - FIXED_VALUE_UNTIL_THE_DATES_INFORMED
        - PERCENTAGE_DATE_REPORTED
        - AMOUNT_PER_CALENDAR_DAY_ADVANCE
        - AMOUNT_ADVANCE_WORKING_DAY
        - PERCENTAGE_ADVANCE_CURRENT_DAY
        - PERCENTAGE_ADVANCE_WORKING_DAY
      example: FIXED_VALUE_UNTIL_THE_DATES_INFORMED
    discountValue:
      type: number
      description: >
        Discount value to be applied when `discount_type` is not
        `FIXED_VALUE_UNTIL_THE_DATES_INFORMED` or `PERCENTAGE_DATE_REPORTED`.
      example: 99
    discountValue2:
      type: number
      description: Discount values.
      example: 86753.09
    documentNumber:
      type: string
      maxLength: 15
      description: >
        Government ID, such as a CPF (Cadastro de Pessoas Fisicas - individual
        tax ID in Brazil) or a CNPJ (Cadastro Nacional de Pessoa Juridica -
        business tax ID in Brazil) number. 
      example: '42761202686'
    dueDate:
      type: string
      format: date
      description: Payment due date. Format = yyyy-mm-dd
    emv:
      type: string
      description: >
        Base 64 encoded discount QR Code payload. EMV = Europay, Mastercard and
        Visa, a global standard for credit and debit payment. The EMV might
        include details required for secure transactions such as cardholder
        informatipn, transaction amount, merchant information, and other
        relevant data.
      example: >-
        00020101021226980014br.gov.bcb.pix2576api-h.developer.btgpactual.com/pc/p/v2/...***63040441
    externalID:
      type: string
      description: |
        Client-generated record identifier for client tracking and monitoring.
      example: my-external-id-9999-6474
    finalAmount:
      type: number
      description: >
        Total (initial - `settlement_final_amount` - `discount_final_amount` +
        `interest_final_amount` + `fine_final_amount`)
      example: 10
    fineFinalAmount:
      type: number
      description: Fine total (calculated).
      example: 99.87
    fineType:
      type: string
      description: Fine type.
      enum:
        - FIXED_VALUE
        - PERCENT
      example: FIXED_VALUE
    fineValue:
      type: number
      description: Fine value.
      example: 45.67
    firstPaymentDate:
      type: string
      format: datetime
      description: First charge/payment date. Format = yyyy-mm-dd
      example: '2025-04-25'
    frequencyType:
      type: string
      description: Recurrence payment type
      enum:
        - WEEK
        - MONTH
        - QUARTER
        - SEMESTER
        - YEAR
      example: MONTH
    initialAmount:
      type: number
      description: Initial payment amount
      example: 86753.09
    interestFinalAmount:
      type: number
      description: Interest total (calculated).
      example: 67.89
    interestType:
      type: string
      description: |
        Interest type to calculate.
      enum:
        - VALUE_CALENDAR_DAYS
        - PERCENTAGE_PER_DAY_CALENDAR_DAYS
        - PERCENTAGE_PER_MONTH_CALENDAR_DAYS
        - PERCENTAGE_PER_YEAR_CALENDAR_DAYS
        - VALUE_WORKING_DAYS
        - PERCENTAGE_PER_DAY_WORKING_DAYS
        - PERCENTAGE_PER_MONTH_WORKING_DAYS
        - PERCENTAGE_PER_YEAR_WORKING_DAYS
      example: VALUE_WORKING_DAYS
    interestValue:
      type: number
      description: Value to be applied.
      example: 34.09
    jws:
      type: string
      description: >
        JWS (JSON Web Signature) payload. When a JWT (JSON Web Token) is signed,
        it becomes a JWS.
      example: eYqqqwq.heif.jk2w
    jwsRec:
      type: string
      description: |
        Signed JWS payload, referring to the data of the recurrence.
      example: eYqqqwq.heif.jk2w
    labelName:
      type: string
      maxLength: 140
      description: Label name
      example: Purity of essence
    lastPaymentDate:
      type: string
      format: datetime
      description: Last charge/payment date. Format = yyyy-mm-dd
      example: '2026-06-10'
    lastUpdate:
      type: string
      format: datetime
      description: When QR Code last updated. RFC 3339 format.
      example: '2023-04-12T23:20:50.52Z'
    legalType:
      type: string
      description: |
        Person legal type: 
          * `LEGAL_PERSON` - Person 
          * `NATURAL_PERSON` - Company or organization
      enum:
        - LEGAL_PERSON
        - NATURAL_PERSON
      example: NATURAL_PERSON
    merchantCategory:
      type: string
      description: Receiver ISO 18245 merchant category code.
      example: '5651'
    minPaymentAmount:
      type: number
      description: Payee-defined minimum payment amount for dynamic amount recurrences.
      example: 10.09
    name:
      type: string
      maxLength: 25
      description: Name
      example: Eva Destrukion
    payerInfo:
      allOf:
        - $ref: '#/components/schemas/qrcode.Payer'
      description: Payer info
    payerSolicitation:
      type: string
      maxLength: 140
      description: Payee text sent to payer.
      example: For dinner last night
    pixKey:
      type: string
      maxLength: 77
      description: Payee Pix key (should have Pismo account)
      example: chuck@steaks.com
    qrcode.Additional:
      type: object
      required:
        - name
        - value
      properties:
        name:
          $ref: '#/components/schemas/labelName'
        value:
          $ref: '#/components/schemas/value'
    qrcode.Charge:
      type: object
      required:
        - due_date
      properties:
        due_date:
          $ref: '#/components/schemas/dueDate'
        validity_after_expiration_day:
          $ref: '#/components/schemas/validityAfterExpirationDay'
        discount_type:
          $ref: '#/components/schemas/discountType'
        discount_value:
          $ref: '#/components/schemas/discountValue'
        discount_fixed_dates:
          $ref: '#/components/schemas/discountFixedDates'
        fine_type:
          $ref: '#/components/schemas/fineType'
        fine_value:
          $ref: '#/components/schemas/fineValue'
        fine_final_amount:
          $ref: '#/components/schemas/fineFinalAmount'
        interest_type:
          $ref: '#/components/schemas/interestType'
        interest_value:
          $ref: '#/components/schemas/interestValue'
        interest_final_amount:
          $ref: '#/components/schemas/interestFinalAmount'
        settlement_type:
          $ref: '#/components/schemas/settlementType'
        settlement_value:
          $ref: '#/components/schemas/settlementValue'
        settlement_final_amount:
          $ref: '#/components/schemas/settlementFinalAmount'
        final_amount:
          $ref: '#/components/schemas/finalAmount'
    qrcode.DiscountDate:
      type: object
      properties:
        date:
          $ref: '#/components/schemas/discountDate'
        value:
          $ref: '#/components/schemas/discountValue2'
    qrcodeExpirationTime:
      type: integer
      description: QR Code's maximum time for presentation (in seconds)
      example: 7200
    qrcodeID:
      type: string
      description: Pismo QR Code identifier
      example: 442e992a-2f89-46fb-820a-958693bde84d
    qrcode.CreateRecurrenceQrCodeCobvResponse:
      type: object
      description: Create a Recurrence COB Qrcode response
      required:
        - id
        - access_token
        - external_id
        - emv
        - qrcode_image_b64
        - recurrence_id
      properties:
        id:
          $ref: '#/components/schemas/qrcodeID'
        access_token:
          $ref: '#/components/schemas/accessToken'
        external_id:
          $ref: '#/components/schemas/externalID'
        emv:
          $ref: '#/components/schemas/emv'
        qrcode_imageb64:
          $ref: '#/components/schemas/qrcode.imageb64'
        recurrence_id:
          $ref: '#/components/schemas/recurrenceID'
        jws:
          $ref: '#/components/schemas/jws'
        jws_rec:
          $ref: '#/components/schemas/jwsRec'
    qrcode.CreateRecurrenceQrCodeCobResponse:
      type: object
      description: Create a Recurrence COB Qrcode response
      required:
        - id
        - access_token
        - external_id
        - emv
        - qrcode_image_b64
        - recurrence_id
      properties:
        id:
          $ref: '#/components/schemas/qrcodeID'
        access_token:
          $ref: '#/components/schemas/accessToken'
        external_id:
          $ref: '#/components/schemas/externalID'
        emv:
          $ref: '#/components/schemas/emv'
        qrcode_imageb64:
          $ref: '#/components/schemas/qrcode.imageb64'
        recurrence_id:
          $ref: '#/components/schemas/recurrenceID'
        jws:
          $ref: '#/components/schemas/jws'
        jws_rec:
          $ref: '#/components/schemas/jwsRec'
    qrcode.CreateRecurrenceQrCodeCobvRequest:
      type: object
      required:
        - charge
        - payee
        - payer
        - initial_amount
        - transaction_identification
      properties:
        charge:
          $ref: '#/components/schemas/charge'
        payee:
          $ref: '#/components/schemas/qrcode.PayeeRequest'
        payer:
          $ref: '#/components/schemas/qrcode.PayerRequest'
        initial_amount:
          $ref: '#/components/schemas/initialAmount'
        transaction_identification:
          $ref: '#/components/schemas/transactionID'
        payer_solicitation:
          $ref: '#/components/schemas/payerSolicitation'
        allows_value_change:
          $ref: '#/components/schemas/allowsValueChange'
        additional_information:
          $ref: '#/components/schemas/additionalInfo'
        reusable:
          $ref: '#/components/schemas/reusable'
        location:
          $ref: '#/components/schemas/qrcode.LocationDynamicQrcode'
        recurrence_id:
          $ref: '#/components/schemas/recurrenceID'
        recurrence:
          $ref: '#/components/schemas/qrcode.Recurrence'
    qrcode.CreateRecurrenceQrCodeRequest:
      type: object
      required:
        - payee
        - transaction_identification
      properties:
        payee:
          $ref: '#/components/schemas/qrcode.RecurrenceQrcodePayeeRequest'
        transaction_identification:
          $ref: '#/components/schemas/transactionIDSmall'
        location:
          $ref: '#/components/schemas/qrcode.LocationQrcodeComposite'
        recurrence_id:
          $ref: '#/components/schemas/recurrenceID'
        recurrence:
          $ref: '#/components/schemas/qrcode.Recurrence'
    qrcode.CreateRecurrenceQrCodeCobRequest:
      type: object
      required:
        - payee
        - payer
        - initial_amount
        - transaction_identification
      properties:
        payee:
          $ref: '#/components/schemas/qrcode.PayeeRequest'
        payer:
          $ref: '#/components/schemas/qrcode.PayerRequest'
        initial_amount:
          $ref: '#/components/schemas/initialAmount'
        transaction_identification:
          $ref: '#/components/schemas/transactionID'
        payer_solicitation:
          $ref: '#/components/schemas/payerSolicitation'
        allows_value_change:
          $ref: '#/components/schemas/allowsValueChange'
        qrcode_expiration_time:
          $ref: '#/components/schemas/qrcodeExpirationTime'
        additional_information:
          $ref: '#/components/schemas/additionalInfo'
        reusable:
          $ref: '#/components/schemas/reusable'
        location:
          $ref: '#/components/schemas/qrcode.LocationDynamicQrcode'
        recurrence_id:
          $ref: '#/components/schemas/recurrenceID'
        recurrence:
          $ref: '#/components/schemas/qrcode.Recurrence'
    qrcode.CreateRecurrenceQrCodeStaticRequest:
      type: object
      required:
        - payee
        - amount
        - transaction_identification
      properties:
        payee:
          $ref: '#/components/schemas/qrcode.PayeeRequest'
        amount:
          $ref: '#/components/schemas/initialAmount'
        transaction_identification:
          $ref: '#/components/schemas/transactionIDSmall'
        additional_information:
          $ref: '#/components/schemas/additionalInformation'
        location:
          $ref: '#/components/schemas/qrcode.Location'
        recurrence_id:
          $ref: '#/components/schemas/recurrenceID'
        recurrence:
          $ref: '#/components/schemas/qrcode.Recurrence'
    qrcode.CreateRecurrenceQrCodeStaticResponse:
      type: object
      description: Create a Recurrence Static Qrcode response
      required:
        - id
        - external_id
        - emv
        - qrcode_image_b64
        - access_token
        - recurrence_id
      properties:
        id:
          $ref: '#/components/schemas/qrcodeID'
        access_token:
          $ref: '#/components/schemas/accessToken'
        external_id:
          $ref: '#/components/schemas/externalID'
        emv:
          $ref: '#/components/schemas/emv'
        qrcode_imageb64:
          $ref: '#/components/schemas/qrcode.imageb64'
        recurrence_id:
          $ref: '#/components/schemas/recurrenceID'
        jws:
          $ref: '#/components/schemas/jws'
        jws_rec:
          $ref: '#/components/schemas/jwsRec'
    qrcode.CreateRecurrenceQrCodeResponse:
      type: object
      description: Create a Recurrence Qrcode response
      required:
        - id
        - external_id
        - emv
        - qrcode_image_b64
        - access_token
        - recurrence_id
      properties:
        id:
          $ref: '#/components/schemas/qrcodeID'
        access_token:
          $ref: '#/components/schemas/accessToken'
        external_id:
          $ref: '#/components/schemas/externalID'
        emv:
          $ref: '#/components/schemas/emv'
        qrcode_imageb64:
          $ref: '#/components/schemas/qrcode.imageb64'
        recurrence_id:
          $ref: '#/components/schemas/recurrenceID'
        jws:
          $ref: '#/components/schemas/jws'
        jws_rec:
          $ref: '#/components/schemas/jwsRec'
    qrcode.imageb64:
      type: string
      description: Base64 encoded QR Code
      example: dfkk7830o*&#)@#9FEE
    qrcode.Location:
      type: object
      properties:
        url_jwk:
          $ref: '#/components/schemas/urlJWK'
        url_payload:
          $ref: '#/components/schemas/urlPayload'
    qrcode.LocationDynamicQrcode:
      type: object
      properties:
        url_jwk:
          $ref: '#/components/schemas/urlJWK'
        url_payload:
          $ref: '#/components/schemas/urlPayload'
        url_payload_rec:
          $ref: '#/components/schemas/urlPayloadRec'
    qrcode.LocationQrcodeComposite:
      type: object
      properties:
        url_jwk:
          $ref: '#/components/schemas/urlJWK'
        url_payload_rec:
          $ref: '#/components/schemas/urlPayloadRec'
    qrcode.PayeeRequest:
      type: object
      required:
        - address
        - city
        - key
        - state
        - zip_code
      properties:
        address:
          $ref: '#/components/schemas/address'
        category:
          $ref: '#/components/schemas/merchantCategory'
        city:
          $ref: '#/components/schemas/city'
        key:
          $ref: '#/components/schemas/pixKey'
        state:
          $ref: '#/components/schemas/state'
        zip_code:
          $ref: '#/components/schemas/zipCode'
    qrcode.Payer:
      type: object
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/name'
        address:
          $ref: '#/components/schemas/address'
        city:
          $ref: '#/components/schemas/city'
        document_number:
          $ref: '#/components/schemas/documentNumber'
        state:
          $ref: '#/components/schemas/state'
        trade_name:
          $ref: '#/components/schemas/tradeName'
        type:
          $ref: '#/components/schemas/legalType'
        zip_code:
          $ref: '#/components/schemas/zipCode'
    qrcode.PayerRequest:
      type: object
      required:
        - name
        - document_number
        - type
      properties:
        name:
          $ref: '#/components/schemas/name'
        document_number:
          $ref: '#/components/schemas/documentNumber'
        type:
          $ref: '#/components/schemas/legalType'
        trade_name:
          $ref: '#/components/schemas/tradeName'
    qrcode.QrCodeGenerateCobRequest:
      type: object
      required:
        - payee
        - payer
        - transaction_identification
        - initial_amount
      properties:
        payee:
          $ref: '#/components/schemas/qrcode.PayeeRequest'
        payer:
          $ref: '#/components/schemas/payerInfo'
        transaction_identification:
          $ref: '#/components/schemas/transactionID'
        initial_amount:
          $ref: '#/components/schemas/initialAmount'
        payer_solicitation:
          $ref: '#/components/schemas/payerSolicitation'
        qrcode_expiration_time:
          $ref: '#/components/schemas/qrcodeExpirationTime'
        allows_value_change:
          $ref: '#/components/schemas/allowsValueChange'
        reusable:
          $ref: '#/components/schemas/reusable'
        location:
          $ref: '#/components/schemas/qrcode.Location'
        additional_information:
          $ref: '#/components/schemas/additionalInfo'
    qrcode.QrCodeGenerateCobResponse:
      type: object
      description: Generate COB Qrcode response
      required:
        - id
        - access_token
        - external_id
        - status
        - emv
        - qrcode_image_b64
      properties:
        id:
          $ref: '#/components/schemas/qrcodeID'
        access_token:
          $ref: '#/components/schemas/accessToken'
        external_id:
          $ref: '#/components/schemas/externalID'
        emv:
          $ref: '#/components/schemas/emv'
        status:
          $ref: '#/components/schemas/status'
        qrcode_imageb64:
          $ref: '#/components/schemas/qrcode.imageb64'
        version:
          $ref: '#/components/schemas/version'
        jws:
          $ref: '#/components/schemas/jws'
        creation_date:
          $ref: '#/components/schemas/creationDate'
        last_update:
          $ref: '#/components/schemas/lastUpdate'
    qrcode.QrCodeGenerateCobVRequest:
      type: object
      required:
        - charge
        - payee
        - payer
        - initial_amount
        - transaction_identification
      properties:
        charge:
          $ref: '#/components/schemas/charge'
        payee:
          $ref: '#/components/schemas/qrcode.PayeeRequest'
        payer:
          $ref: '#/components/schemas/payerInfo'
        initial_amount:
          $ref: '#/components/schemas/initialAmount'
        transaction_identification:
          $ref: '#/components/schemas/transactionID'
        payer_solicitation:
          $ref: '#/components/schemas/payerSolicitation'
        qrcode_expiration_time:
          $ref: '#/components/schemas/qrcodeExpirationTime'
        reusable:
          $ref: '#/components/schemas/reusable'
        allows_value_change:
          $ref: '#/components/schemas/allowsValueChange'
        location:
          $ref: '#/components/schemas/qrcode.Location'
        additional_information:
          $ref: '#/components/schemas/additionalInfo'
    qrcode.QrCodeUpdateCobRequest:
      type: object
      required:
        - id
        - status
        - payee
        - payer
        - transaction_identification
        - initial_amount
      properties:
        id:
          $ref: '#/components/schemas/qrcodeID'
        status:
          $ref: '#/components/schemas/status'
        payee:
          $ref: '#/components/schemas/qrcode.PayeeRequest'
        payer:
          $ref: '#/components/schemas/payerInfo'
        transaction_identification:
          $ref: '#/components/schemas/transactionID'
        initial_amount:
          $ref: '#/components/schemas/initialAmount'
        payer_solicitation:
          $ref: '#/components/schemas/payerSolicitation'
        qrcode_expiration_time:
          $ref: '#/components/schemas/qrcodeExpirationTime'
        allows_value_change:
          $ref: '#/components/schemas/allowsValueChange'
        reusable:
          $ref: '#/components/schemas/reusable'
        location:
          $ref: '#/components/schemas/qrcode.Location'
        additional_information:
          $ref: '#/components/schemas/additionalInfo'
    qrcode.QrCodeUpdateCobVRequest:
      type: object
      required:
        - id
        - status
        - charge
        - payee
        - payer
        - initial_amount
        - transaction_identification
      properties:
        id:
          $ref: '#/components/schemas/qrcodeID'
        status:
          $ref: '#/components/schemas/status'
        charge:
          $ref: '#/components/schemas/charge'
        payee:
          $ref: '#/components/schemas/qrcode.PayeeRequest'
        payer:
          $ref: '#/components/schemas/payerInfo'
        initial_amount:
          $ref: '#/components/schemas/initialAmount'
        transaction_identification:
          $ref: '#/components/schemas/transactionID'
        payer_solicitation:
          $ref: '#/components/schemas/payerSolicitation'
        qrcode_expiration_time:
          $ref: '#/components/schemas/qrcodeExpirationTime'
        reusable:
          $ref: '#/components/schemas/reusable'
        allows_value_change:
          $ref: '#/components/schemas/allowsValueChange'
        location:
          $ref: '#/components/schemas/qrcode.Location'
        additional_information:
          $ref: '#/components/schemas/additionalInfo'
    qrcode.Recurrence:
      type: object
      required:
        - frequency_type
        - first_payment_date
        - debtor
        - contract_id
      properties:
        frequency_type:
          $ref: '#/components/schemas/frequencyType'
        first_payment_date:
          $ref: '#/components/schemas/firstPaymentDate'
        last_payment_date:
          $ref: '#/components/schemas/lastPaymentDate'
        amount:
          $ref: '#/components/schemas/amount'
        min_payment_amount:
          $ref: '#/components/schemas/minPaymentAmount'
        debtor:
          $ref: '#/components/schemas/debtor'
        contract_id:
          $ref: '#/components/schemas/contractID'
        description:
          $ref: '#/components/schemas/recurrenceDescription'
        retry:
          $ref: '#/components/schemas/retry'
    qrcode.RecurrenceQrcodePayeeRequest:
      type: object
      required:
        - city
        - state
        - zip_code
      properties:
        category:
          $ref: '#/components/schemas/merchantCategory'
        city:
          $ref: '#/components/schemas/city'
        state:
          $ref: '#/components/schemas/state'
        zip_code:
          $ref: '#/components/schemas/zipCode'
    recurrenceDescription:
      type: string
      description: Recurrence payment description
      maxLength: 35
      example: Gym membership
    recurrenceID:
      type: string
      description: Recurrence ID
      example: RN219952X6X02505XXCONTRACTXXX
    retry:
      type: boolean
      description: Retry transaction on failure? Default is `false`.
      default: false
      example: true
    reusable:
      type: boolean
      description: Can QR Code be reused flag. Default is `false`.
      default: false
      example: true
    settlementFinalAmount:
      type: number
      description: Total settlement (calculated as fixed or percentage).
      example: 876.34
    settlementType:
      type: string
      description: Settlement type.
      enum:
        - FIXED_VALUE
        - PERCENT
      example: FIXED_VALUE
    settlementValue:
      type: number
      description: Settlement value (depends on `settlement_type`).
      example: 453.98
    state:
      type: string
      maxLength: 2
      description: Brazilian state where payment will occur - two letter ISO 3166 code.
      example: DF
    status:
      type: string
      description: |
        QR Code status.
      enum:
        - ACTIVE
        - COMPLETED
        - REMOVED_BY_PAYEE
        - REMOVED_BY_PSP
      example: ACTIVE
    tradeName:
      type: string
      description: Company name
      example: Acme Widgets
    transactionID:
      type: string
      maxLength: 36
      description: >
        Client-generated unique transaction ID for client monitoring and
        tracking. 
      example: trans-id-7578994740
    transactionIDSmall:
      type: string
      maxLength: 25
      description: >
        Client-generated unique transaction ID for client monitoring and
        tracking. 
      example: trans-id-7578994740
    urlJWK:
      type: string
      description: >
        PSP Receiver's URL that holds key pairs in JSON format. Should be hosted
        on the same site associated with the CERTQRC certificate. Use the format
        "JWK Set URL"  without the protocol (http/https).


        The Central Bank uses this field and `url_payload` to register and
        validate the QR Code. This field **must** be passed if the PSP requires
        it.


        The URL format is described in <a
        href="https://www.bcb.gov.br/content/estabilidadefinanceira/cedsfn/Manual_de_Seguranca_PIX.pdf"
        target="_blank">Manual de Segurança do PIX</a>.
    urlPayload:
      type: string
      maxLength: 77
      description: >
        PSP Receiver's URL containing the dynamic QR Code's JSON Web Signature
        (JWS). Should not include the protocol (http/https).


        The Central Bank uses this field and `url_jwk` to register and validate
        the QR Code. This field **must** be passed if the PSP requires it.


        The URL format is described in <a
        href="https://www.bcb.gov.br/content/estabilidadefinanceira/pix/Regulamento_Pix/II_ManualdePadroesparaIniciacaodoPix.pdf"
        target="_blank">Manual de Padrões para Iniciação do PIX</a>.
      example: example.com/pix/8b3da2f3-941-40d1-a91a-bd93113bd441
    urlPayloadRec:
      type: string
      maxLength: 77
      description: >
        PSP Receiver's URL containing the recurence QR Code's JSON Web Signature
        (JWS). Should not include the protocol (http/https).


        The Central Bank uses this field and `url_jwk` to register and validate
        the QR Code. This field **must** be passed if the PSP requires it.


        The URL format is described in <a
        href="https://www.bcb.gov.br/content/estabilidadefinanceira/pix/Regulamento_Pix/II_ManualdePadroesparaIniciacaodoPix.pdf"
        target="_blank">Manual de Padrões para Iniciação do PIX</a>.
      example: example.com/rec/8b3da2f3-941-40d1-a91a-bd93113bd441
    validityAfterExpirationDay:
      type: integer
      description: How many days QR Code is valid after expiration
    value:
      type: string
      maxLength: 140
      description: Value
      example: '5.00'
    version:
      type: integer
      description: Current version
      example: 1
    zipCode:
      type: string
      description: Location postal code.
      example: '8675309'
  responses:
    400BadRequest:
      description: Bad request
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
    401Unauthorized:
      description: Invalid authorization
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
    403Forbidden:
      description: Forbidden
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
    404NotFound:
      description: Not found
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
    409Conflict:
      description: Conflict
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
    429TooManyRequests:
      description: Too many reqquests
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
    500InternalServerError:
      description: Internal Server Error
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
    502BadGateway:
      description: Bad Gateway
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
    504GatewayTimeout:
      description: Gateway Timeout
      headers:
        x-cid:
          schema:
            type: string
          description: Request tracking identifier
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/customer.Error'
paths:
  /v1/pix/qrcode/cob:
    post:
      summary: Create dynamic COB QR Code [beta]
      description: >
        Generate a new dynamic COB QR Code and EMV (Europay Mastercard Visa)
        string. 


        COB is short for *cobranca*, which means *charge* in Portuguese. A COB
        QR Code has an expiration date while a COBV QR Code has a due date,
        fine, interest, and rebates. 


        Typically, this endpoint is used to generate a dynamic QR Code for the
        [Pix instant payments](doc:pix-instant-payments) system.
      operationId: post-create-cob
      tags:
        - QR Code
      parameters:
        - $ref: '#/components/parameters/authHeader'
      requestBody:
        description: Create COB QR Code Request Body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/qrcode.QrCodeGenerateCobRequest'
        required: true
      responses:
        '202':
          description: Generate COB QR Code response
          headers:
            x-cid:
              schema:
                type: string
              description: Request tracking identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/qrcode.QrCodeGenerateCobResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '429':
          $ref: '#/components/responses/429TooManyRequests'
        '500':
          $ref: '#/components/responses/500InternalServerError'
        '502':
          $ref: '#/components/responses/502BadGateway'
        '504':
          $ref: '#/components/responses/504GatewayTimeout'
    patch:
      summary: Update dynamic COB QR Code [beta]
      description: >
        Update COB QR Code information.


        The entire QR Code is updated. If a parameter is not passed, the current
        value (if any) is emptied.
      operationId: patch-generate-qrcode-cob
      tags:
        - QR Code
      parameters:
        - $ref: '#/components/parameters/authHeader'
      requestBody:
        description: Update COB QR Code Request Body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/qrcode.QrCodeUpdateCobRequest'
        required: true
      responses:
        '202':
          description: Generate COB QR Code response
          headers:
            x-cid:
              schema:
                type: string
              description: Request tracking identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/qrcode.QrCodeGenerateCobResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '429':
          $ref: '#/components/responses/429TooManyRequests'
        '500':
          $ref: '#/components/responses/500InternalServerError'
        '502':
          $ref: '#/components/responses/502BadGateway'
        '504':
          $ref: '#/components/responses/504GatewayTimeout'
  /v1/pix/qrcode/cobv:
    post:
      summary: Create dynamic COBV QR Code [beta]
      description: >
        Generate a new COBV QR Code image and EMV (Europay Mastercard Visa)
