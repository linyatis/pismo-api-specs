        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '429':
          $ref: '#/components/responses/429TooManyRequests'
        '500':
          $ref: '#/components/responses/500InternalServerError'
        '502':
          $ref: '#/components/responses/502BadGateway'
        '504':
          $ref: '#/components/responses/504GatewayTimeout'
  /v1/pix/qrcode/jws/{access-token}:
    get:
      summary: Get QR Code information and calculate payment [beta]
      description: >
        Get QR Code information and, at the same time, calculate payment
        information depending on query parameters passed.
      operationId: get-qrcode-jws
      tags:
        - QR Code
      parameters:
        - $ref: '#/components/parameters/authHeader'
        - name: access-token
          in: path
          schema:
            type: string
          description: QR Code ID
          required: true
        - name: desired-payment-date
          in: query
          schema:
            type: string
            format: date
          description: >-
            Payer's desired payment date. Format = yyyy-mm-dd. Default is
            current date.
        - name: payer-city-id
          in: query
          schema:
            type: string
          description: >
            Payer city (in Brazil) dialing code identifier. Cities in Brazil can
            have their own holidays, which is needed to calculate fees and
            payment. Default city is Brasilia ("61").
      responses:
        '202':
          description: Generate COB QR Code response
          headers:
            x-cid:
              schema:
                type: string
              description: Request tracking identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/qrcode.QrCodeGenerateCobResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '429':
          $ref: '#/components/responses/429TooManyRequests'
        '500':
          $ref: '#/components/responses/500InternalServerError'
        '502':
          $ref: '#/components/responses/502BadGateway'
        '504':
          $ref: '#/components/responses/504GatewayTimeout'
