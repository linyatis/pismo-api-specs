    EloInternationalAction:
      type: string
      description: Elo international action
      enum:
        - CREATED
        - UPDATED
        - DELETED
      example: CREATED
    EloInternationalPrimaryReason:
      type: string
      description: >
        Fraud report reasons:

        `AT`: Account Takeover - The unauthorized use of a card account by any
        person who gains access to that card account with the intent to defraud
        the Issuer.

        `CA`: Counterfeit/altered Cards - Any card that is manufactured
        illegally, stamped, or coded.

        `ED`: Employee Fraud - Any manipulation or misuse of a card account by
        an employee of the issuer with the intention of defrauding the issuer.

        `FA`: Application fraud - Acquisition of a card account as a result of
        presenting false or incorrect information with the intention of
        deceiving and  defrauding an issuer.

        `LS`: Lost/Stolen - Unauthorized use of lost or stolen card, checks, or
        balance transfer coupons.

        `MS`: Skimmed - Unauthorized use or possession of an account through
        theft of content of the complete magnetic stripe data of a valid card
        and duplication on the stripe magnetic from another card.

        `ND`: No device - Unauthorized use of a valid card number to make
        purchases by mail, telephone, or electronic order.

        `NR`: Non-Receipt - Non-receipt or theft through the card sending
        process by mail, checks, or balance transfer coupons.

        `OT`: Others - Generally not used. This type of fraud is only used when
        the fraud activity cannot be classified by the remaining fraud types.
        **Exception for prepaid only**: This type of fraud must be used to
        classify the activity determined to be the conversion of unsettled
        funds.
      enum:
        - AT
        - CA
        - ED
        - FA
        - LS
        - MS
        - ND
        - NR
        - OT
      example: AT
    EloInternationalSecondaryReason:
      type: string
      description: >
        Secondary fraud report reasons.

        `BT`\* - Balance Transfer Coupon - An unauthorized, completed balance
        transfer by telephone, at the request of a person claiming to be the
        Owner.

        `CD` - Card - An altered card.

        `CK`\* - Verification - Any non-receipt of money access checks or
        balance transfer. Or changed check(s).

        `FF`\* - Family Fraud - The information (Name, social security number
        (SSN), date of birth, etc.) belongs to another person (the victim), who
        actually knows the individual(fraudster) who committed the fraud,
        forging his (the victim's) identity. The fraudster may be a household,
        non-domestic, or a distant family member relative or friend. This is the
        most common application of fraud.

        `FP` - Forced emission of plastic - Plastics that were sent due to the
        update platinum, marketing initiative, or any issue outside the usual
        reissue cycle.

        `IT`\* - Internet - An unauthorized change of address made via the
        internet.

        `MI`\* - Mail - An unauthorized address change request sent via US mail.

        `NA` - Nova Conta - Plastics shipped upon issuance of a new bill.

        `P!`\* - Telephone - A request for authorization for a change of
        address, plastics, or checks by a person claiming to be the holder.

        `PN` - Card and PIN - unauthorized cash advances at an ATM for a lost or
        stolen personal card number and password (PIN).

        `RI` - Card reissuance - Plastics sent automatically to replace those
        that approaching their expiration date.

        `RT` - Retail - Sales are keyed in commercial establishments where a
        card is normally necessary and there is no direct evidence that any card
        was present at the time of sale.

        `ST`\* - Student - A long format "student" application, usually
        requested in university campuses.

        `TM`\* - Telemarketing - A request made over the telephone via an
        outgoing call from the center or via marketing service.

        `TO`\* - Take One - Unsolicited Application. This is the most common
        type of application. Lots of It are sometimes displayed at sales
        counters.

        `TP` - Telephone - An inbound telephone call to the Customer Service
        Department to the cardholder, in which the representative, assumed the
        information provided  by telephone.

        `TR`- Account Transfer - Plastics that were shipped as a result of any
        type replacement account.


        \* - Can only be used for Credit.
      enum:
        - BT
        - CD
        - CK
        - FF
        - FP
        - IT
        - MI
        - NA
        - PI
        - PN
        - RI
        - RT
        - ST
        - TM
        - TO
        - TP
        - TR
      example: BT
    EloNationalAuthorizationOriginIndicator:
      type: string
      description: |
        Authorization origin indicator.
          `Y` - Issuer authorized
          `X` - Parameter authorized
          `N` - Not authorized
      enum:
        - 'Y'
        - 'N'
        - X
      example: 'Y'
    EloNationalCardServiceCode:
      type: string
      description: |
        Card type:
          * `C` - Chip
          * `M` - Stripe
      enum:
        - C
        - M
      example: C
    EloNationalExchangeIndicator:
      type: string
      description: |
        Is this an exchange? Default is `N` (no).
      enum:
        - 'Y'
        - 'N'
      example: 'N'
    EloNationalExchangeValue:
      type: number
      format: double
      description: Exchange value.
      example: 9
    EloNationalFraudType:
      type: string
      description: |
        Elo national fraud type:

          `00` - Cartão Perdido pelo Portador/ Lost card
          `01` - Cartão Roubado do Portador/ Stolen card
          `02` - Cartão extraviado (Portador não recebeu cartão do emissor, porém emissor alega que enviou o cartão)/ Card not received as issued
          `03` - Falsidade ideológica/ Fraudulent use
          `04` - Cartão clonado/falsificado/ Cloned card
          `05` - Transação autorizada sem o envolvimento do portador/invasão da conta/ Fraudulent use of account number
          `06` - Número do cartão foi usado em transação de marketing direto ou no comércio eletrônico/ Card number was used in a direct marketing or e-commerce transaction.
          `07` - Fraude Familiar / Friendly fraud
          `08` - Suspeita de Golpe / Suspected scam
          `09` - Auto Fraude / Auto fraud
          `10` - Fraude Interna / Internal fraud
          `11` - Prilex / Brazilian malware
      enum:
        - '00'
        - '01'
        - '02'
        - '03'
        - '04'
        - '05'
        - '06'
        - '07'
        - '08'
        - '09'
        - '10'
        - '11'
      example: '01'
    EloNationalNotificationCode:
      type: string
      description: |
        Notification type code.
        `1` - First notification
        `2` - Notification sent again
        `3` - Change
        `4` - Deletion (cancellation fraud warning)
        `5` = Reactivation
      enum:
        - '1'
        - '2'
        - '3'
        - '4'
        - '5'
      example: '1'
    ErrorModel:
      title: ErrorModel
      description: API generic returned error.
      type: object
      properties:
