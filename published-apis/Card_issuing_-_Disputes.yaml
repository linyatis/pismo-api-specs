          example: '2023-02-23'
    stopAutomatedInstallment:
      type: boolean
      description: >
        Automated dispute installment control? If an issuer opens a dispute for
        a transaction that has more than one installment, with installments that
        can still be posted, the issuer will need to open a dispute for
        subsequent installments as well. With automated dispute installment
        control, once you open a chargeback for the first installment, the same
        information can be used for subsequent transaction installments.
      example: true
    UpdateDisputeRequest:
      type: object
      properties:
        disputed_amount:
          type: number
          description: Amount under dispute.
          example: 215
        currency_code:
          type: string
          description: >
            ISO-4217 code for transaction currency. For example, 986 = Brazilian
            real.  


            **Note:** Only allowed if you are updating a dispute in a Zero
            balance program.
          example: '986'
        reason_code:
          $ref: '#/components/schemas/reasonCode'
        comment:
          type: string
          example: Some comment
          maxLength: 5000
          description: Updated dispute comment.
        first_installment_amount:
          type: number
          description: Amount to be updated on first installment chargeback.
          example: 86753.09
        stop_automated_installment:
          type: boolean
          description: >
            Stop automated dispute installment control. If an issuer opens a
            dispute for a transaction that has more than one installment, with
            installments that can still be posted, the issuer will need to open
            a dispute for subsequent installments as well. With automated
            dispute installment control, once you open a chargeback for the
            first installment, the same information can be used for subsequent
            transaction installments. Default = `false`.
          example: true
        transaction_amount:
          type: number
          description: >
            Transaction amount.


            **Note:** Only allowed if you are updating a dispute in a Zero
            balance program.
          example: 86753.09
        arn:
          type: string
          description: >
            Acquirer reference number for first installment


            **Note:** Only allowed if you are updating a dispute in a Zero
            balance program.
          maxLength: 255
          example: '73669599903'
        transaction_date:
          type: string
          description: |
            Transaction date. Format = yyyy-mm-dd

             **Note:** Only allowed if you are updating a dispute in a Zero balance program.
          example: '2025-09-23'
