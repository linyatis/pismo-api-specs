  /v2/fee:
    post:
      summary: Create fee V2
      description: >
        A fee, or *fee collection* in network terminology, allows acquirers and
        issuers to exchange money outside the standard chargeback process.
        Typically, this means reversing a settled chargeback, but not always.


        You can use this endpoint to create a fee collection/funds disbursement
        with or without a chargeback **case number**.


        You can create a fee collection/funds disbursement for an existing
        **case**, or, if it doesn't exist, you can provide the necessary
        transaction/card information to create it.


        The main differences between fees V2 and V1 are:
          * V1&mdash;Associated with the dispute/installment
          * V2&mdash;Can only be created with transaction ID (Full balance), transaction information (Zero balance), card ID and customer ID, or NetworkCaseID (VisaCaseNumber).

        For more information, refer to [Dispute
        fees](https://developers.pismo.io/pismo-docs/docs/disputes-overview#dispute-fees)
        in the Disputes overview guide. 


        This feature is **only** currently available for **Visa**.
      operationId: create-fee-v2
      tags:
        - Fees V2
      parameters:
        - $ref: '#/components/parameters/Authorization'
      requestBody:
        required: true
        description: Fill out and submit one object
        content:
          application/json:
            schema:
              anyOf:
                - $ref: >-
                    #/components/schemas/Create_Visa_Fee_From_Transaction_Full_Balance
                - $ref: >-
                    #/components/schemas/Create_Visa_Fee_From_Transaction_Zero_Balance
                - $ref: '#/components/schemas/Create_Visa_Fee_From_Card'
                - $ref: '#/components/schemas/Create_Visa_Fee_From_Network_Case_ID'
            examples:
              FeeVisaFromTransactionFullBalance:
                summary: Create Visa Fee from Transaction - Full Balance
                value:
                  network_brand_type: Visa
                  transaction_id: 1234567890
                  currency: USD
                  amount: 150
                  credit_sender: false
                  credit_receiver: true
                  fee:
                    Reason: '350'
                    Message: Fee collection created via SYSTEM
                    DestinationBin: '474749'
                    EventDate: '2025-08-28'
              FeeFromTransactionZeroBalance:
                summary: Create Visa Fee from Transaction - Zero Balance
                value:
                  network_brand_type: Visa
                  arn: '0000000000539598'
                  transaction_date: '2022-09-02'
                  transaction_amount: 150
                  currency: USD
                  amount: 150
                  credit_sender: false
                  credit_receiver: true
                  fee:
                    Reason: '100'
                    Message: Fee collection created via SYSTEM
                    DestinationBin: '484884'
              FeeFromCard:
                summary: Create Visa Fee from Card
                value:
                  network_brand_type: Visa
                  currency: USD
                  amount: 150
                  credit_sender: true
                  credit_receiver: false
                  card_id: 123456
                  customer_id: 7890123
                  fee:
                    Reason: '130'
                    Message: Fee collection created via SYSTEM
                    DestinationBin: '484884'
              FeeFromNetworkCaseID:
                summary: Create Visa Fee from Network Case ID
                value:
                  network_brand_type: Visa
                  network_case_id: '10203040'
                  currency: USD
                  amount: 150
                  credit_sender: true
                  credit_receiver: false
                  fee:
                    Reason: '350'
                    Message: Fee collection created via SYSTEM
                    EventDate: '2025-08-28'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: >-
                      #/components/schemas/Fee_Response_From_Transaction_Full_Balance
                  - $ref: >-
                      #/components/schemas/Fee_Response_From_Transaction_Zero_Balance
                  - $ref: '#/components/schemas/Fee_Response_From_Card'
                  - $ref: '#/components/schemas/Fee_Response_From_Network_Case_ID'
              examples:
                FeeResponseFromTransactionFullBalance:
                  summary: Visa Fee from Transaction - Full Balance
                  value:
                    fee_id: 1
                    org_id: TN-123
                    account_id: 102030
                    network_brand_type: Visa
