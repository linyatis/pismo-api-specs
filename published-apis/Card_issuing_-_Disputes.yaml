        notification_cd:
          $ref: '#/components/schemas/VisaNotificationCd'
        close_fraud_case_ind:
          $ref: '#/components/schemas/VisaCloseFraudCaseInd'
    Status:
      type: string
      description: Fraud report ststus
      enum:
        - PENDING
        - FAILED
        - PROCESSED
      example: PENDING
    TransactionId:
      type: number
      description: Pismo transaction ID.
      example: 1234567890
    UpdatedAt:
      type: string
      description: Datetime when updated, format = yyyy-mm-dd hh:mm:ss
      example: '2024-10-18 11:21:45'
    VisaCloseFraudCaseInd:
      type: boolean
      description: |
        Should the case be closed on the Visa's side? Default is `false`.
      example: false
      default: false
    VisaFraudType:
      type: string
      description: |
        Visa fraud type:

          `0` - Lost
          `1` - Stolen
          `2` - Card not received as issued (NRI)
          `3` - Fraudulent application (cardholder never applied for the card)
          `4` - Issuer-reported counterfeit
          `5` - Miscellaneous
          `6` - Fraudulent use of account number
          `A` = Incorrect processing
          `B` = Account or credentials takeover
          `C` = Merchant misrepresentation
          `D` = Manipulation of account holder
      enum:
        - '0'
        - '1'
        - '2'
        - '3'
        - '4'
        - '5'
        - '6'
        - A
        - B
        - C
        - D
      example: '0'
    VisaFraudTypeCategory:
      type: string
      description: |
        Visa fraud type category: 
          `CARDTXN` - Card transaction
          `NRI` - Not received as issued
      default: CARDTXN
      enum:
        - CARDTXN
        - NRI
      example: CARDTXN
    VisaNotificationCd:
      type: number
      description: >
        Notification code specifying action performed on the fraud report.
        Domain values:
          `1`: Addition
          `2`: Addition of dup
          `3`: Change
          `4`: Delete
          `5`: Reactivate. No edits restricting values based on the value of existing report in case.
    Amount:
      type: number
      format: double
      description: Fee amount.
      example: 215
    Arn:
      type: string
      description: Acquirer Reference Number (ARN).
      example: '12345678901234567890123'
      nullable: true
    CreditReceiver:
      type: boolean
      description: Should receiver be credited?
    CreditSender:
      type: boolean
      description: Should sender be credited?
    Currency:
      type: string
      description: ISO-4217 currency code.
      example: USD
    DestinationBIN:
      type: string
      description: >
        This is the BIN that represents the organization who will receive the
        Fee Collection/Funds Disbursement.


        **REQUIRED** when use `card_id` and `customer_id`
      nullable: true
    FeeEventDate:
      type: string
      description: >

        Use this field to pass:

            - Date the card was recovered (Reason 150)
            - Collection letter date (Reason 240)
            - Pre-Compliance / Pre-Arbitration Letter Date (Reason 350)
            
        **REQUIRED** when `Reason` is `150`, `240`, or `350` (US domestic);
        otherwise, it is not valid. 
            
        Format = yyyy-mm-dd
    FeeId:
      type: number
      example: 123
      description: Pismo fee ID.
    FeeMessage:
      type: string
      description: Fee message. 70 chars maximum.
      maxLength: 70
      nullable: true
    NetworkBrandType:
      type: string
      description: Card network brand. Currently, only `Visa`.
      enum:
        - Visa
      example: Visa
    NetworkCaseId:
      type: string
      description: >-
        Network case ID. The case number the card network gives you when you
        file a dispute.
      example: '1234567890'
      nullable: true
    NetworkFeeId:
      type: string
      description: Network fee ID.
      example: '1234567890'
      nullable: true
    Source:
      type: string
      description: Who initiated the fee.
      enum:
        - ISSUER
        - ACQUIRER
    FeeStatus:
      type: string
      description: >
        Fee status


        - `PENDING`&mdash;The fee creation request has been received and is
        awaiting Pismo processing within the network.

        - `FAILED`&mdash;An error occurred while attempting to create the fee in
        the network. The operation was not completed.

        - `WAITING_NETWORK`&mdash;The request has been successfully sent to the
        network and is currently awaiting a response.

        - `PROCESSED`&mdash;The fee was successfully created and
        network-confirmed.

        - `REJECTED`&mdash;The network declined the fee creation request.
      example: PENDING
      enum:
        - PENDING
        - FAILED
        - WAITING_NETWORK
        - PROCESSED
        - REJECTED
    TransactionDate:
      type: string
      example: '2025-08-11'
      description: |
        Transaction date, format = yyyy-mm-dd.
      nullable: true
    FeeReasonCode:
      type: string
      description: >
        Fee reason code.
         `100`&mdash;Telecommunication charges (non-US)
         `110`&mdash;Auto telex charges (non-US)
         `130`&mdash;Lost/stolen card report fees
         `140`&mdash;Merchant service fees
         `150`&mdash;Recovered Visa card, Electron card, or Visa Electron card. Handling fees/rewards. Non-US - Recovered card handling fee
         `170`&mdash;Recovery of retrieval request fees. 
         `200`&mdash;Emergency replacement card distribution fee
         `210`&mdash;Emergency cash disbursement handling fee
         `220`&mdash;Arbitration/compliance/resolution case decision or filing fee
         `230`&mdash;Incorrect merchant ID/transacton date handling
         `240`&mdash;"Good faith" collection letter settlement funds disbursement. Non-US - Funds disbursement transactions
         `250`&mdash;Cardholder does not recognize transacton chargeback handling fee.
