  /v1/fee:
    post:
      summary: Create dispute fee
      operationId: post-v1-fee
      description: >
        A dispute fee, or *fee collection* in network terminology, is a way for
        an acquirer and issuer to exchange money outside the normal chargeback
        process. Typically, this means reversing a settled chargeback, but not
        always,


        You can use this endpoint to create a dispute fee with or without a
        chargeback claim ID. You can create a dispute fee for a claim that
        already exists or, if it doesn't, you can pass the necessary
        authorization information to create it.


        For more information, refer to [Dispute
        fees](doc:disputes-overview#dispute-fees) in the Disputes overview
        guide. This feature is only available for Mastercard and Elo.


        This endpoint generates a [Dispute fee status
        created](https://developers.pismo.io/events/docs/disputes-dispute-fee-events-1)
        event.


        **Note:** This endpoint takes an account token - an access token encoded
        with a Pismo account ID. Tokens can expire quickly, which can result in
        a <b>401 Unauthorized</b> message.
      tags:
        - Fees
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
      requestBody:
        description: Dispute fee data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeFee'
            examples:
              Dispute fee with clam id:
                value:
                  card_id: 15595
                  claim_id: '15465165165'
                  card_acceptor_code: '125'
                  country_code: '125'
                  destination_member: '125485'
                  fee_date: '2022-05-31'
                  currency: '840'
                  amount: 15.56
                  message: test
                  reason_code: '1515'
                  settlement_date: '2022-05-31'
                  control_number: '1564989'
                  credit_sender: false
                  credit_receiver: true
                  network_brand_type: Mastercard
              Dispute fee when there is no claim id:
                value:
                  authorization_id: 31241
                  arn: '15641616'
                  transaction_amount: 36.25
                  transaction_date: '2022-05-31 23:00:25'
                  card_id: 15595
                  card_acceptor_code: '125'
                  country_code: '125'
                  destination_member: '125485'
                  fee_date: '2022-05-31'
                  currency: '840'
                  amount: 15.56
                  message: test
                  reason_code: '1515'
                  settlement_date: '2022-05-31'
                  reply_fee_id: '1949884'
                  control_number: '1564989'
                  credit_sender: false
                  credit_receiver: true
                  network_brand_type: Mastercard
              Dispute fee with replay ID:
                value:
                  card_id: 15595
                  claim_id: '15465165165'
                  card_acceptor_code: '125'
                  country_code: '125'
                  destination_member: '125485'
                  fee_date: '2022-05-31'
                  currency: '840'
                  amount: 15.56
                  message: test
                  reason_code: '1515'
                  settlement_date: '2022-05-31'
                  reply_fee_id: '12345645'
                  control_number: '1564989'
                  credit_sender: false
                  credit_receiver: true
                  network_brand_type: Mastercard
          application/xml:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeFeeResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: List dispute fees
      description: Get a list of fees with filter and paging options.
      operationId: get-v1-fee
      tags:
        - Fees
      parameters:
        - schema:
            type: string
          in: header
          name: x-tenant
          description: >-
            Organization/tenant ID. Get all dispute fees associated with an
            organization/tenant.
          required: true
        - schema:
            type: string
          in: query
          name: beginDate
          description: Beginning date filter,  format = yyyy-mm-dd.
        - schema:
            type: string
          in: query
          name: endDate
          description: End date filter, format = yyyy-mm-dd.
        - schema:
            type: string
          in: query
          name: claimId
          description: Fee item claim ID.
        - schema:
            type: string
          in: query
          name: cardId
          description: >
            Fee item card ID. Return dispute fees associated with a specific
            card.
        - schema:
            type: string
          in: query
          name: networkFeeId
          description: Fee ID from network.
        - schema:
            type: string
            enum:
              - PENDING
              - PROCESSED
              - FAILED
            example: PROCESSED
          in: query
          name: status
          description: Status filter.
        - schema:
            type: integer
          in: query
          name: page
          description: Page to return. Default = `1`.
        - schema:
            type: integer
          in: query
          name: perPage
          description: Number of items per page. Default = `30`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DisputeFeeResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'
        '500':
          $ref: '#/components/responses/500InternalServerError'
