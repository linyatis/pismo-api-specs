        Create a migration for a Full balance or Zero balance program.


        After this, you can create a [dispute migration for a specific
        installment](ref:post-migration-installment) using the dispute ID
        returned here.


        This endpoint generates a [Dispute installment
        created](https://developers.pismo.io/events/docs/disputes-dispute-installment-creation-1)
        event. Once the dispute is migrated into the system, its status changes
        and a [Dispute status
        changed](https://developers.pismo.io/events/docs/disputes-dispute-installment-status-change-1)
        event is generated.
      tags:
        - Migration
      requestBody:
        description: Migration data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMigrationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMigrationResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/migration/{disputeId}/installment:
    post:
      summary: Create installment migration
      operationId: post-migration-installment
      description: >
        Create a migration for a specific installment. Before you do this, you
        need to call [Create dispute migration](ref:post-migration-with-auth)
        and get a dispute ID to use here.


        This endpoint generates a [Dispute installment
        created](https://developers.pismo.io/events/docs/disputes-dispute-installment-creation-1)
        event. Once the dispute is migrated into the system, its status changes
        and a [Dispute status
        changed](https://developers.pismo.io/events/docs/disputes-dispute-installment-status-change-1)
        event is generated.
      tags:
        - Migration
      parameters:
        - $ref: '#/components/parameters/disputeId'
      requestBody:
        description: Dispute Installment information
        content:
          application/json:
            schema:
              type: object
              required:
                - installment_number
                - installment_disputed_amount
                - claim_id
                - chargeback_id
              properties:
                installment_number:
                  $ref: '#/components/schemas/InstallmentNumber'
                arn:
                  type: string
                  example: '000000000042'
                  description: >-
                    Installment acquirer reference number. **REQUIRED** for Zero
                    balance integration.
                claim_id:
                  type: string
                  description: Claim ID, same as case number for VISA.
                  example: 88993u748
                chargeback_id:
                  type: string
                  description: Chargeback ID, same as dispute ID for VISA.
                  example: '8849003'
                installment_disputed_amount:
                  type: number
                  example: 50
                  description: Disputed installment value
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeInstallment'
              examples:
                Dispute Installment registered on Mastercom:
                  value:
                    id: 50068
                    dispute_id: 42
                    installment: 2
                    arn: '000000485723'
                    chargeback_id: '4586'
                    claim_id: '00058678'
                    installment_disputed_amount: 45.5
                    dispute_status:
                      id: 5
                      description: CHARGEBACK_CONFIDENCE_CREDIT_SYSTEM_DISAGREEMENT.
                      type: MASTERCARD_CARD
                      group: CARDNETWORK_CHARGEBACK
                    reason_code: 4853
                    network_return_reason_code: null
                    network_return_reject_reason: null
                    is_first_installment: true
                    network_return_reject_reason_code: null
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'
        '500':
          $ref: '#/components/responses/500InternalServerError'
