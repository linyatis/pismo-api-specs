  /v1/disputes/{disputeId}/possible-status:
    get:
      summary: Get possible dispute states
      description: >
        Get possible states for a specified dispute.


        See <a
        href="https://developers.pismo.io/pismo-docs/docs/disputes-state-machine"
        target="_blank">Disputes state machine</a>.
      operationId: get-v1-disputes-disputeId-possible-status
      tags:
        - State check
      parameters:
        - $ref: '#/components/parameters/disputeId'
        - name: disputeInstallmentId
          description: Dispute installment ID
          schema:
            type: number
          in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateMachineConfigResponse'
              examples:
                Sample result of possibles status:
                  value:
                    - source: PENDING
                      target: OPENED
                      event: OPEN
  /v1/disputes/possible-status:
    get:
      summary: Get possible states
      description: >
        Get possible dispute states given a state machine and dispute status.


        See <a
        href="https://developers.pismo.io/pismo-docs/docs/disputes-state-machine">Disputes
        state machine</a> for more information.
      operationId: get-v1-disputes-possible-status
      tags:
        - State check
      parameters:
        - schema:
            type: string
            enum:
              - MASTERCARD_CARD
              - PRIMITIVE
              - TOK_PAG
          in: header
          name: type
          description: >-
            State machine type - `MASTERCARD_CARD` (BTG), `PRIMITIVE` and
            `TOK_PAG`.
          required: true
        - in: header
          name: source
          schema:
            type: string
            description: Dispute status enums, i.e., `OPENED`
            enum:
              - OPENED
              - PENDING
              - CANCELED
              - FAILED
              - CHARGEBACK_REJECTED
              - CHARGEBACK_CREATED
              - CHARGEBACK_ACCEPTED
              - CHARGEBACK_CLOSED
              - SECOND_PRESENTMENT
              - PRE_ARBITRATION_OPENED
              - PRE_ARBITRATION_DECLINED
              - PRE_ARBITRATION_ACCEPTED
              - PRE_ARBITRATION_RECALL
              - PRE_ARB_ALLOCATION_OPENED
              - FAILED_PRE_ARBITRATION
              - PRE_ARB_ALLOCATION_ACCEPTED
              - PRE_ARB_ALLOCATION_DECLINED
              - PRE_ARB_ALLOCATION_RECALLED
              - FAILED_DECLINE_PRE_ARB
              - FAILED_ACCEPT_PRE_ARB
              - FAILED_ON_CLOSE
              - EXPIRED
              - ISSUER_LOSS
              - MIGRATION
              - FAILED_MIGRATION
          required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateMachineConfigResponse'
              examples:
                Sample result of possibles status:
                  value:
                    - source: PENDING
                      target: OPENED
                      event: OPEN
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/disputes/{disputeId}/forms:
    post:
      summary: Create dispute form
      description: >
        Create a dispute form with more information to send to the network.


        You can create one of the following types of Expedited Billing Dispute
        Forms (EBDF):


        1. **fraudDrfDocument** - Used for cases of fraud


        2. **cardholderDisputeChargebackDrfDocument** -  Used when the
        cardholder disputes a purchase and notifies the card issuer.


        3. **pointOfInteractionErrorsDrfDocument** -  Used when there's either a
        disagreement between parties or an error with the transaction. For
        example, a wrong value or a duplicate charge.


        For VISA, you need to fill out the `allocationQuestionnaire` (reason 11)
        or `collaborationQuestionnaire` (reason 12 and 13) form object. VISA's
        rules for filling out form fields can be found in [this guide
        document](https://developers.pismo.io/pismo-docs/docs/visa-colloboration-questionaire)


        For Elo, you need to fill out the `clearingElo` form object.
