  /v1/disputes/{disputeId}/event:
    post:
      summary: Update dispute status
      operationId: post-v1-disputes-disputeId-event
      description: >
        Change a dispute's status via an event. After creating a dispute and
        uploading all necessary forms, reports, and evidence files, send the
        event `OPEN` to officially begin the dispute process with the network.


        For more information on events and statuses, refer to the <a
        href="https://developers.pismo.io/pismo-docs/docs/disputes-state-machine">Disputes
        state machine</a>.


        This endpoint generates a [Dispute status
        changed](https://developers.pismo.io/events/docs/disputes-dispute-installment-status-change-1)
        event.
      tags:
        - Disputes
      parameters:
        - $ref: '#/components/parameters/disputeId'
      requestBody:
        description: Event data.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  $ref: '#/components/schemas/Event'
                reason:
                  type: string
                  description: Status change reason.
                  example: Disputed by account holder.
                dispute_installment_id:
                  type: number
                  description: >-
                    Dispute installment ID. If not passed, the first Installment
                    is used.
                  example: 234
                memo:
                  type: string
                  description: >
                    Enter memo pertaining to the case. **REQUIRED** for ELO
                    dispute. Also **REQUIRED** when `event` =
                    `SEND_PRE_ARBITRATION` and network is Mastercard.

                    Maximum length = 13000 chars.
                  maxLength: 13000
                  example: Example memo
                merchant_name:
                  type: string
                  description: >
                    Merchant name - 100 characters maximum.

                    **REQUIRED** only for disputes without transaction and
                    `event` = `SEND_PRE_ARBITRATION` and network is Mastercard.
                  maxLength: 100
                  example: Acme Goods
                updated_chargeback_reason_code:
                  $ref: '#/components/schemas/reasonCode'
                change_reason_code_reason:
                  type: string
                  description: >
                    Explanation for changing the reason code, if that's what you
                    are doing - 1000 characters maximum.

                    **REQUIRED** if `updated_chargeback_reason_code` is passed, 
                    `event` = `SEND_PRE_ARBITRATION` and network is Mastercard.
                  maxLength: 1000
                pre_arb_is_partial:
                  type: boolean
                  description: >
                    Is pre-arbitration for a partial amount and not the full
                    amount?

                    Used when `event` = `SEND_PRE_ARBITRATION`.
                pre_arb_currency_code:
                  type: string
                  description: >
                    ISO 4217 3-letter currency code, for example, `USD` (United
                    States) or `BRL` (Brazilian Real).

                    **REQUIRED** if `pre_arb_is_partial` = `true` and  `event` =
                    `SEND_PRE_ARBITRATION`.
                  example: BRL
                  maxLength: 3
                justify_not_accepted_fully:
                  type: string
                  description: >
                    Explanation for asking for full or partial amount - 10000
                    characters maximum.

                    **REQUIRED** if `pre_arb_is_partial` = `true` or `event` =
                    DECLINE_PRE_ARBITRATION.
                  example: Partial refund based on already being used
                  maxLength: 10000
                pre_arb_amount:
                  type: number
                  description: >
                    Pre-arbitration amount.

                    **REQUIRED** if `pre_arb_is_partial` = `true` and `event` =
                    `SEND_PRE_ARBITRATION`.
                  example: 18.36
                is_dispute_migrated:
                  type: boolean
                  description: Is dispute migrated? Default is `false`.
              required:
                - event
                - reason
            examples:
              Change a Dispute status with success:
                value:
                  event: OPEN
                  reason: Disputed by account holder.
              Send Pre-arbitration to Mastercard network:
                value:
                  event: SEND_PRE_ARBITRATION
                  reason: Disputed by account holder.
                  dispute_installment_id: 234
                  memo: This is a test memo.
                  updated_chargeback_reason_code: 4859
                  change_reason_code_reason: This is a test reason.
              Send Pre-arbitration to Mastercard network - Dispute without transaction:
                value:
                  event: SEND_PRE_ARBITRATION
                  reason: Disputed by account holder.
                  dispute_installment_id: 234
                  memo: This is a test memo.
                  merchant_name: Acme Goods
                  updated_chargeback_reason_code: 4859
                  change_reason_code_reason: This is a test reason.
              Send accept full pre-arbitration allocation Visa:
                value:
                  event: ACCEPT_PRE_ARBITRATION
                  reason: Disputed by account holder.
                  dispute_installment_id: 234
              Send Pre-arbitration partial to Mastercard network:
                value:
                  event: SEND_PRE_ARBITRATION
                  reason: Disputed by account holder.
                  dispute_installment_id: 234
                  memo: This is a test memo.
                  updated_chargeback_reason_code: 4859
                  change_reason_code_reason: This is a test reason.
                  pre_arb_is_partial: true
                  pre_arb_currency_code: '840'
                  pre_arb_amount: 18.36
              Send Pre-arbitration partial to Mastercard network - Dispute without transaction:
                value:
                  event: SEND_PRE_ARBITRATION
                  reason: Disputed by account holder.
                  dispute_installment_id: 234
                  memo: This is a test memo.
                  merchant_name: Acme Goods
                  updated_chargeback_reason_code: 4859
                  change_reason_code_reason: This is a test reason.
                  pre_arb_is_partial: true
                  pre_arb_currency_code: '840'
                  pre_arb_amount: 18.36
              Send accept partial pre-arbitration allocation Visa:
                value:
                  event: ACCEPT_PRE_ARBITRATION
                  reason: Disputed by account holder.
                  dispute_installment_id: 234
                  pre_arb_is_partial: true
                  pre_arb_currency_code: '840'
                  justify_not_accepted_fully: Justification text
                  pre_arb_amount: 18.36
              Send decline pre-arbitration allocation Visa:
                value:
                  event: DECLINE_PRE_ARBITRATION
                  reason: Disputed by account holder.
                  dispute_installment_id: 234
                  justify_not_accepted_fully: Justification text
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeResponse'
              examples:
                Updated status:
                  value:
                    id: 1009087
                    org_id: TN-34778262-f4f0-464d-b4c6-a14exxxxxxxx
                    account_id: 30605
                    authorization_id: 4352243
                    comment: Some comment
                    dispute_reason: 4855
                    modality: 4855
                    dispute_status: OPENED
                    dispute_status_group: ANALYSING
                    timeline: '{ "data": "test"}'
                    protocol: 20190321L123456
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
