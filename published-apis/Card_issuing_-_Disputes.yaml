  /v1/disputes/{disputeId}/file:
    post:
      summary: Upload evidence file
      description: Upload a file for the dispute process.
      operationId: post-v1-disputes-disputeId-file
      tags:
        - Evidence files
      parameters:
        - $ref: '#/components/parameters/disputeId'
      requestBody:
        description: File data.
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 20
                  description: >
                    File name.

                    VISA - Anything alphanumeric, no special characters, 20
                    chars maximum.

                    Mastercard - At least a number and a letter and no special
                    characters. 9 chars maximum.
                  example: MyFile
                category:
                  $ref: '#/components/schemas/DisputeFileCategory'
                file:
                  type: string
                  format: binary
                  description: >-
                    Uploaded file. Max size = 14Mb. Must have one of these
                    extensions: .jpg, .jpeg, .tif, .tiff and .pdf.
                dispute_installment_id:
                  type: number
                  format: int64
                  description: >-
                    Dispute installment ID. If not passed, the first Installment
                    is used.
              required:
                - name
                - category
                - file
            examples:
              Dispute file sample data fields:
                value:
                  name: A personal file
                  category: PERSONAL
                  file: doc.pdf
                  dispute_installment_id: 1
              Pre arbitration allocation / collaboration Visa:
                value:
                  name: MyFile
                  category: PRE_ARBITRATION
                  file: doc.pdf
                  dispute_installment_id: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeFileResponse'
              examples:
                File Uploaded:
                  value:
                    id: 1
                    org_id: '123456789'
                    dispute_id: 1
                    path: /path/of/directory/
                    file_name: doc.pdf
                    category: PERSONAL
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
