        example-1:
          acct_status: ACCT_IS_OPEN
          chgbk_indicator: '0'
          cvc_invalid_indicator: 'Y'
          device_type: '1'
          fraud_type: '00'
          report_date: '2021-02-11'
          sub_type: K
