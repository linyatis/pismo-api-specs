paths:
  /v1/networkauthorization-disputes:
    post:
      summary: Create dispute
      operationId: post-v1-networkauthorization-disputes
      description: >
        Create a dispute for a Zero or Full balance program. You can create a
        dispute for a transaction made with a Pismo-issued card (Full balance)
        or with another card (Zero balance). You need to pass different
        parameters depending on which one as noted in the parameter
        descriptions.


        Disputes are initially created with a `PENDING` status. After you've
        uploaded all your supporting forms and evidence files, call [Update
        dispute
        status](https://developers.pismo.io/pismo-docs/reference/post-v1-disputes-disputeid-event)
        and use the `OPEN` event to change the status to `OPENED` and begin the
        dispute process with the network.


        For more information on events and statuses, refer to the <a
        href="https://developers.pismo.io/pismo-docs/docs/disputes-state-machine">Disputes
        state machine</a>.


        This endpoint generates a <a
        href="https://developers.pismo.io/events/docs/disputes-dispute-installment-creation-1">Dispute
        installment created</a> event.


        **Note:** For Zero balance customers, this endpoint takes an account
        token - an access token encoded with a Pismo account ID. Tokens can
        expire quickly, which can result in a <b>401 Unauthorized</b> message.
      tags:
        - Disputes
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
      requestBody:
        description: Dispute data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisputeRequestNetwork'
            examples:
              Create a dispute over a multiple Installment authorization with success:
                value:
                  authorization_id: 123
                  modality: 123
                  comment: Custom comment
                  protocol: client-custom-protocol-identifier
                  disputed_amount: 10
                  metadata: {}
                  is_partial: true
                  first_installment_amount: 5
                  arn: '0000000000539598'
                  network_brand_type: Mastercard
                  currency_code: '986'
                  fraud_type: '1'
              Create a dispute without network authorization:
                value:
                  modality: 123
                  comment: Custom comment
                  protocol: client-custom-protocol-identifier
                  disputed_amount: 10
                  metadata: {}
                  is_partial: true
                  first_installment_amount: 5
                  arn: '0000000000539598'
                  network_brand_type: Mastercard
                  transaction_date: yyyy-MM-dd
                  currency_code: '986'
                  fraud_type: '2'
              Create a dispute in Visa Collaboration flux:
                value:
                  authorization_id: 123
                  modality: 13
                  comment: Custom comment
                  protocol: client-custom-protocol-identifier
                  disputed_amount: 10
                  metadata: {}
                  is_network: true
                  is_partial: false
                  network_brand_type: Visa
                  dispute_due_to: NR
                  currency_code: '986'
                  fraud_type: '2'
              Create a dispute in Elo with card invalid:
                value:
                  modality: 77
                  disputed_amount: 86753.09
                  comment: Custom comment
                  protocol: client-custom-protocol-identifier
                  is_network: true
                  is_partial: false
                  network_brand_type: Elo
                  arn: '0000000000539598'
                  transaction_date: '2023-09-05'
                  transaction_amount: 210
                  authorization_code: '123456'
                  card_hash: XYZ
          application/xml:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeNetworkResponse'
              examples:
                Dispute created:
                  value:
                    id: 42
                    authorization_id: 1001
                    account_id: 1000101
                    comment: Dispute comment
                    reason:
                      dispute_reason_id: 1
                      description: Fraudulent transaction - no cardholder authorization
                      code: 4837
                      initial_status: CRIADO
                      initial_status_pci: EFETUADO
                      is_fraud: true
                Dispute created without authorization:
                  value:
                    id: 1
                    account_id: 4
                    comment: Simulação para Abertuda de Disputa - Sem Authotization
                    reason:
                      dispute_reason_id: 10
                      description: Fraudulent transaction - no cardholder authorization
                      code: 4837
                      initial_status: CRIADO
                      initial_status_pci: EFETUADO
                      is_fraud: false
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/disputes:
    get:
      summary: List disputes
      operationId: get-v1-disputes
      description: Get disputes with paging and filter options.
      tags:
        - Disputes
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - in: query
          name: beginDate
          description: Beginning date filter, format= yyyy-mm-dd
          schema:
            type: string
            example: '2020-01-31'
          required: false
        - in: query
          name: endDate
          schema:
            type: string
            example: '2020-02-15'
          required: false
          description: End date filter, format= yyyy-mm-dd.
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            example: 2
            minimum: 1
          required: false
          description: Page to return. Default = `1`.
        - in: query
          name: perPage
          schema:
            type: integer
            default: 30
            example: 20
            minimum: 1
          required: false
          description: Number of items per page. Default = `30`.
        - in: query
          name: accountId
          schema:
            type: integer
            example: 123
            minimum: 1
          required: false
          description: Account ID filter
        - in: query
          name: isNetwork
          schema:
            type: boolean
            example: true
          required: false
          description: Return only network disputes? Default is `false`.
        - in: query
          name: isDisputeMigrated
          schema:
            type: boolean
            default: false
            example: true
          required: false
          description: Return only migrated disputes? Default is `false`.
        - in: query
          name: isDisputeInvalidTransaction
          schema:
            type: boolean
            example: true
          required: false
          description: Return only disputes with invalid transaction? Default is `false`.
        - schema:
            type: string
            example: CARDNETWORK_CHARGEBACK
            enum:
              - OPEN
              - APPROVED
              - DENIED
              - CARDNETWORK_CHARGEBACK
              - ANALYSING
              - CARDNETWORK_SECOND_PRESENTMENT
              - FAILED
              - CARDNETWORK_PREARBITRATION
              - RESEND
              - LOSS
              - WON
              - REJECTED
              - FAILED_PROCESSED
          in: query
          name: group
          required: false
          description: Status group filter, i.e., `OPEN`.
          example: WON
        - schema:
            type: string
            example: OPENED
            enum:
              - OPENED
              - PENDING
              - CANCELED
              - FAILED
              - CHARGEBACK_REJECTED
              - CHARGEBACK_CREATED
              - CHARGEBACK_ACCEPTED
              - CHARGEBACK_CLOSED
              - SECOND_PRESENTMENT
              - PRE_ARBITRATION_OPENED
              - PRE_ARBITRATION_ACCEPTED
              - PRE_ARBITRATION_DECLINED
              - PRE_ARBITRATION_RECALL
              - PRE_ARB_ALLOCATION_OPENED
              - FAILED_PRE_ARBITRATION
              - PRE_ARB_ALLOCATION_ACCEPTED
              - PRE_ARB_ALLOCATION_DECLINED
              - PRE_ARB_ALLOCATION_RECALLED
              - FAILED_DECLINE_PRE_ARB
              - FAILED_ACCEPT_PRE_ARB
              - FAILED_ON_CLOSE
              - EXPIRED
              - ISSUER_LOSS
              - MIGRATION
              - FAILED_MIGRATION
          in: query
          name: status
          required: false
          description: Status filter
          example: OPENED
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FullDisputeResponse'
              examples:
                List Disputes:
                  value:
                    - id: 1
                      org_id: '123456789'
                      account_id: 30605
                      authorization_id: 4352243
                      disputed_amount: 10.5
                      comment: Some comment
                      dispute_reason: 4855
                      modality: 4855
                      dispute_status: PENDING
                      timeline: '{ "data": "test"}'
                      protocol: 20190321L123456
                      created_at: '2021-02-21'
                      updated_at: '2021-02-22'
                      created_at_utc: '2021-02-21T22:51:43.000000000Z'
                      updated_at_utc: '2021-02-25T01:43:06.000000000Z'
                      is_network: true
                      is_dispute_migrated: false
                      reversal_id: 10042
                      network_return_reason_code: '2833'
                      network_brand_type: Mastercard
                      transaction_date: '2021-02-21'
                      stop_automated_installment: true
                      card_hash: XYZ
                      authorization_code: '123456'
                      is_dispute_invalid_transaction: true
                      transaction_amount: 10.5
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/disputes/{disputeId}:
    get:
      summary: Get dispute
      operationId: get-v1-disputes-disputeId
      description: >
        Get information about a specific dispute given its ID in the path.


        You can use the [List disputes](ref:get-v1-disputes) endpoint to get
        dispute IDs.
      tags:
        - Disputes
      parameters:
        - $ref: '#/components/parameters/disputeId'
