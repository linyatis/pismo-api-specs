  /v2/fraud-report:
    post:
      summary: Create fraud report
      description: >
        Create a fraud report.


        This endpoint generates a [Fraud report
        created](https://developers.pismo.io/events/docs/fraud-report-fraud-report-creation-1)
        event.

         **Note:** This endpoint takes an account token - an access token encoded with a Pismo account ID. Tokens can expire quickly, which can result in a <b>401 Unauthorized</b> message.
      operationId: post-v2-fraud-report
      tags:
        - Fraud report
      requestBody:
        description: Fraud report data - fill out and enter one card network object.
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/Fraud_Report_Create_Elo_International'
                - $ref: '#/components/schemas/Fraud_Report_Create_Elo_National'
                - $ref: '#/components/schemas/Fraud_Report_Create_Mastercard'
                - $ref: '#/components/schemas/Fraud_Report_Create_Visa'
                - $ref: '#/components/schemas/Fraud_Report_Create_Visa_Card'
            examples:
              Create an Elo National Fraud Report from Transaction:
                value:
                  report_type: elo
                  transaction_id: 1234567890
                  report:
                    fraud_type: '10'
                    report_date: '2021-02-11'
                    authorization_origin_indicator: 'Y'
                    notification_code: '1'
                    card_service_code: C
                    exchange_value: 0
                    exchange_indicator: 'N'
              Create an Elo International Fraud Report from Transaction:
                value:
                  report_type: elo_international
                  transaction_id: 1234567890
                  report:
                    action: CREATED
                    primary_reason: CA
                    secondary_reason: BT
              Create a Mastercard Fraud Report from Transaction:
                value:
                  report_type: mastercard
                  transaction_id: 1234567890
                  report:
                    fraud_type: '00'
                    acct_status: ACCT_IS_OPEN
                    chgbk_indicator: '0'
                    cvc_invalid_indicator: 'Y'
                    device_type: '1'
                    sub_type: K
              Create a Visa Fraud Report from Transaction:
                value:
                  report_type: visa
                  transaction_id: 1234567890
                  report:
                    fraud_type: '1'
                    fraud_type_category: CARDTXN
                    notification_cd: 1
                    close_fraud_case_ind: false
              Create a Visa Fraud Report from Card:
                value:
                  report_type: visa_card
                  card_id: 102030
                  customer_id: 10203040
                  report:
                    fraud_type: '2'
                    fraud_type_category: NRI
                    notification_cd: 1
                    close_fraud_case_ind: false
          application/xml:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: >-
                      #/components/schemas/Fraud_Report_Create_Response_Elo_International
                  - $ref: >-
                      #/components/schemas/Fraud_Report_Create_Response_Elo_National
                  - $ref: >-
                      #/components/schemas/Fraud_Report_Create_Response_Mastercard
                  - $ref: '#/components/schemas/Fraud_Report_Create_Response_Visa'
                  - $ref: >-
                      #/components/schemas/Fraud_Report_Create_Response_Visa_Card
              examples:
                Fraud Report from Elo National Transaction:
                  value:
                    fraud_report_id: 1
                    org_id: TN-123
                    status: PENDING
                    network: Elo
                    fraud_report_network_id: '82702030405'
                    report:
                      fraud_type: '10'
                      report_date: '2021-02-11'
                      authorization_origin_indicator: 'Y'
                      notification_code: '1'
                      card_service_code: C
                      exchange_value: 0
                      exchange_indicator: 'N'
                    created_at: '2024-10-18 11:20:22'
                    network_authorization_id: 1234567890
                    authorization_code: F0JR9H
                    transaction_id: 1234567890
                    account_id: 10203040
                    card_id: 123456
                    report_type: elo
                Fraud Report from Elo International Transaction:
                  value:
                    fraud_report_id: 1
                    org_id: TN-123
                    status: PENDING
                    network: Elo
                    report:
                      action: CREATED
                      primary_reason: CA
                      secondary_reason: BT
                    created_at: '2024-10-18 11:20:22'
                    network_authorization_id: 1234567890
                    authorization_code: F0JR9H
                    transaction_id: 1234567890
                    account_id: 10203040
                    card_id: 123456
                    report_type: elo_international
                Fraud Report from Mastercard Transaction:
                  value:
                    fraud_report_id: 1
                    org_id: TN-123
                    status: PENDING
                    network: Mastercard
                    report:
                      fraud_type: '00'
                      acct_status: ACCT_IS_OPEN
                      chgbk_indicator: '0'
                      cvc_invalid_indicator: 'Y'
