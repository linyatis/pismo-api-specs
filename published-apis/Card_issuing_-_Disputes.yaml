    CardholderVerificationMethodStructure:
      type: object
      properties:
        onlinePIN:
          type: string
          maxLength: 1
          description: >-
            Online PIN Preferring. PIN preferring means that verficiation will
            first ask for a PIN.


            Valid Values/Format: 1
          example: '1'
        offlinePIN:
          type: string
          maxLength: 1
          description: |-
            Offline PIN.

             Valid Values/Format: 2
          example: '2'
        signature:
          type: string
          maxLength: 1
          description: |-
            Signature

            Valid Values/Format: 3
          example: '3'
        none:
          type: string
          maxLength: 1
          description: |-
            None (No Cardholder Verfication Method)

            Valid Values/Format: 4
          example: '4'
    CardholderDisputeChargebackDrfDocumentStructure:
      type: object
      properties:
        transactionAmount:
          type: string
          description: |-
            Transaction amount.

             Length: 0-12

             Valid Values/Format: Numeric
          example: '100.00'
        type:
          type: string
          description: Cardholder dispute type.
          minLength: 11
          maxLength: 22
          example: PRODUCT_DISPUTE
          enum:
            - PRODUCT_DISPUTE
            - NOT_PROVIDED
            - DIGITAL_GOODS
            - CREDIT_NOT_PROCESSED
            - COUNTERFEIT
            - RECURRING_CANCELLED
            - RECURRING_DISCLOSURE
            - ADDENDUM_DISPUTE
            - HOTEL_NO_SHOW
            - PURCHASE_INCOMPLETE
            - CANCELLATION_AGREEMENT
            - POSTED_CREDIT
            - FAILED_TRAVEL
        deliveryDateOfGoodsOrServices:
          maxLength: 11
          type: string
          description: >
            In case of `PRODUCT_DISPUTE`, goods or services delivery date.
            Format = dd-MMM-yyyy
          example: 18-FEB-2018
        expectedDeliveryDateOfGoodOrServices:
          maxLength: 11
          type: string
          description: >-
            In case of `NOT_PROVIDED`, goods or services expected delivery date.
            Format = dd-MMM-yyyy
          example: 18-FEB-2018
        returnDate:
          maxLength: 11
          type: string
          description: >-
            In case of `DIGITAL_GOODS`, return or cancellation of the goods or
            services. Format = dd-MMM-yyyy
          example: 18-FEB-2018
        cancellationDate:
          maxLength: 11
          type: string
          description: >-
            In case of `RECURRING_CANCELLED`, cancellation of the goods or
            services. Format = dd-MMM-yyyy
          example: 18-FEB-2018
        cardholderParticipation:
          type: boolean
          description: Did the cardholder participate in the transaction?
          example: false
        disputeDetails:
          maxLength: 3000
          type: string
          description: >
            Describe the cardholder’s complaint in sufficient detail to meet the
            requirements for the chargeback as described in the Chargeback Guide
            and to enable all parties to understand the dispute.

            Valid Values/Format: Alphanumeric / Special Char
            (~!@#$%^&*()_+{}|:"<>?,./;'[]-=)
          example: Test dispute details...
        chargebackRepresentative:
          maxLength: 25
          type: string
          description: >
            Customer service/chargeback representative.

            Valid Values/Format: Alphanumeric / Special Char
            (~!@#$%^&*()_+{}|:"<>?,./;'[]-=)
          example: Ahsta LaVista Baybee
    PointOfInteractionErrorsDrfDocumentStructure:
      type: object
      properties:
        transactionAmount:
          type: string
          maxLength: 12
          description: The transaction amount as string.
          example: '20000'
        type:
          type: string
          description: Error type enum, i.e. `DUPLICATE_DEBIT`
          example: DUPLICATE_DEBIT
          enum:
            - DUPLICATE_DEBIT
            - INCORRECT_AMOUNT
            - LTD_TRANSACTION
            - CURRENCY_DISPUTE
            - UNREASONABLE_AMOUNT
            - DUPLICATE_TRANSACTION
            - MERCHANT_CREDIT
            - IMPROPER_MERCHANT_SURCHARGE
        alternateMeansOfPaymentDetails:
          maxLength: 55
          type: string
          description: >
            In case of `DUPLICATE_DEBIT`, Alternate means of payment details.
            Max length = 55 chars.

            Valid Values/Format: Alphanumeric / Special Char
            (~!@#$%^&*()_+{}|:"<>?,./;'[]-=)
          example: Test alternate means of payment details
        disputeDetails:
          maxLength: 4800
          type: string
          description: >-
            Describe the cardholder's complaint in sufficient detail to meet the
            requirements for the chargeback as described in the Chargeback Guide
            and to enable all parties to understand the dispute.

            Valid Values/Format: Alphanumeric / Special Char
            (~!@#$%^&*()_+{}|:"<>?,./;'[]-=)
          example: Test Dispute details
        chargebackRepresentative:
          type: string
          maxLength: 25
          description: |-
            Customer service/chargeback representative.

             Valid Values/Format: Alphanumeric / Special Char (~!@#$%^&*()_+{}|:"<>?,./;'[]-=)
          example: Test Representative
    FraudDrfDocumentStructure:
      type: object
      properties:
        numberOfItems:
