          example: '1'
          enum:
            - '0'
            - '1'
        cvc_invalid_indicator:
          type: string
          description: >
            Mastercard <a
            href='https://developer.mastercard.com/fld-fraud-submission/documentation/parameters/annexure-1/#table-15-card-validation-code-cvc-indicator'
            target='_blank'>CVC invalid code indicator</a>
          example: 'Y'
          enum:
            - 'Y'
            - '*'
            - M
            - 'N'
            - P
            - U
            - '?'
            - E
        device_type:
          type: string
          description: >
            Mastercard <a
            href='https://developer.mastercard.com/fld-fraud-submission/documentation/parameters/annexure-1/#table-3-account-device-type-codes'
            target='_blank'>account device type</a>.
          example: '1'
          enum:
            - '1'
            - '2'
            - '3'
            - '4'
            - A
            - B
            - C
            - D
            - E
            - F
            - G
            - H
            - I
            - J
        fraud_type:
          type: string
          description: >
            Mastercard <a
            href='https://developer.mastercard.com/fld-fraud-submission/documentation/parameters/annexure-1/#table-1-fraud-type-codes'
            target='_blank'>fraud type codes</a>
          enum:
            - '00'
            - '01'
            - '02'
            - '03'
            - '04'
            - '05'
            - '06'
            - '07'
            - '08'
            - '09'
            - '10'
            - '11'
            - '51'
            - '55'
            - '56'
            - '57'
          example: '00'
        report_date:
          type: string
          description: Fraud report date, format = yyyy-mm-dd.
          example: '2021-02-11'
        sub_type:
          type: string
          description: >
            Mastercard <a
            href='https://developer.mastercard.com/fld-fraud-submission/documentation/parameters/annexure-1/#table-2-fraud-sub-type-codes'
            target='_blank'>fraud sub type codes</a>
          example: K
          enum:
            - K
            - 'N'
            - P
            - U
        authorization_origin_indicator:
          type: string
          description: >
            Authorization origin indicator, default is null. **REQUIRED** for
            ELO network.
              `Y` - Issuer authorized
              `X` - Parameter authorized
              `N` - Not Authorized
          enum:
            - 'Y'
            - X
            - 'N'
          nullable: true
          minLength: 1
          maxLength: 1
          example: 'Y'
        notification_code:
          type: string
          description: >
            Notification type code. Default is null. **REQUIRED** for ELO
            network.
              `1` - First notification
              `2` - Notification sent again
              `3` - Change
              `4` - Deletion (cancellation fraud warning)
              `5` = Reactivation
          enum:
            - '1'
            - '2'
            - '3'
            - '4'
            - '5'
          nullable: true
          minLength: 1
          maxLength: 1
          example: '1'
        exchange_indicator:
          type: string
          description: |
            Is this an exchange? Default is `N`. **REQUIRED** for ELO network.
              `Y` - Yes
              `N` - No
          enum:
            - 'N'
            - 'Y'
          minLength: 1
          maxLength: 1
          example: 'N'
        exchange_value:
          type: number
          description: Exchange value. **REQUIRED** for ELO network.
          example: 9.99
        card_service_code:
          type: string
          description: |
            Card type. **REQUIRED** for ELO network.
              `C` - Chip
              `M` - Stripe
          enum:
            - C
            - M
          minLength: 1
          maxLength: 1
          example: C
