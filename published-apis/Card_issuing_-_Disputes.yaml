openapi: 3.0.1
info:
  title: Card issuing - Disputes
  version: 1.0.0
  description: Disputes API endpoints
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/disputes
    description: Sandbox API server for testing.
security:
  - BearerAuth: []
tags:
  - name: Disputes
    description: Endpoints to create and manage disputes
  - name: Installments
    description: Endpoints to handle disputes applied to installments
  - name: Evidence files
    description: Endpoints to handle dispute evidence files
  - name: Supporting forms
    description: Endpoints to handle supporting forms for specific dispute types
  - name: Fraud report
    description: Endpoints to create and manage fraud reports
  - name: State check
    description: Endpoints to check a dispute's current or possible states
  - name: Fees
    description: Endpoints to create and check status for fees
  - name: Fees V2
    description: Endpoints to create and check status for fees V2
  - name: Migration
    description: Endpoints to manage dispute migration
components:
  parameters:
    Authorization:
      name: Authorization
      in: header
      required: true
      description: >
        Account token - an access token encoded with a Pismo account ID.  Tokens
        can expire quickly, which can result in a "** 401 Unauthorized**"
        error. 
      schema:
        type: string
    disputeFormId:
      name: disputeFormId
      in: path
      description: Dispute form ID
      required: true
      schema:
        type: number
    disputeId:
      name: disputeId
      in: path
      description: Dispute ID
      required: true
      schema:
        type: number
    disputeInstallmentId:
      name: disputeInstallmentId
      in: path
      description: Dispute installment ID
      required: true
      schema:
        type: number
    FeeId:
      name: fee_id
      in: path
      description: Fee ID
      required: true
      schema:
        type: number
    fileId:
      name: fileId
      in: path
      description: Dispute file ID
      required: true
      schema:
        type: number
    fraudReportId:
      name: fraudReportId
      description: Dispute fraud report ID
      in: path
      required: true
      schema:
        type: number
    AuthHeader:
      in: header
      name: Authorization
      required: true
      description: >-
        Account token - an access token encoded with a Pismo account ID. Tokens
        can expire quickly, which can result in a <b>401 Unauthorized</b>
        message.
      schema:
        type: string
        example: Bearer eyJhbGci...IUzUx
  schemas:
    AccountID:
      type: number
      description: Pismo account ID
      example: 577830
    Action:
      type: string
      description: Fraud report action
      enum:
        - CREATE
        - UPDATE
    AuthorizationCode:
      type: string
      description: Authorization code
      example: F0JR9H
    AuthorizationId:
      type: number
      description: Pismo network authorization ID.
      example: 1234567890
    CardID:
      type: number
      description: Pismo card ID.
      example: 123456
    ControlNumber:
      type: string
      description: >
        Control number. Used in routing chargeback and retrieval documentation -
        either a MasterCom endpoint suffix, in case of 2 characters, or a full
        MasterCom endpoint in case of 7 characters. When MasterCom control
        number is present, it cannot be all spaces or all zeros.
      maxLength: 7
      example: '1589457'
    DisputeID:
      type: number
      description: Dispute ID
      example: 1876567
    InstallmentNumber:
      type: integer
      description: Installment number.
      example: 1
    OrgID:
      type: string
      description: Organization/tenant ID.
      example: TN-34778262-f4f0-464d-b4c6-a14exxxxxxxx
    TransactionAmount:
      type: number
      description: Transaction amount
      example: 86753.09
    closeClaimReasonCode:
      type: string
      description: >
        Reason code for closing the claim. **REQUIRED** when network is
        Mastercard.


        `10` = Won

        `20` = Lost

        `30` = Lost, below threshold

        `40` = Cardholder liable
      enum:
        - '10'
        - '20'
        - '30'
        - '40'
    CountDisputes:
      type: object
      description: Count disputes for each status group
      properties:
        OPEN:
          type: number
          description: Number of disputes in status group `OPEN`.
          example: 1
        APPROVED:
          type: number
          description: Number of disputes in status group `APPROVED`.
          example: 0
        DENIED:
          type: number
          description: Number of disputes in status group `DENIED`.
          example: 2
        CARDNETWORK_CHARGEBACK:
          type: number
          description: Number of disputes in status group `CARDNETWORK_CHARGEBACK`.
          example: 0
        ANALYSING:
          type: number
          description: Number of disputes in status group `ANALYSING`.
          example: 1
        CARDNETWORK_SECOND_PRESENTMENT:
          type: number
          description: Number of disputes in status group `CARDNETWORK_SECOND_PRESENTMENT`.
          example: 0
        FAILED:
          type: number
          description: Number of disputes in status group `FAILED`.
          example: 1
        CARDNETWORK_PREARBITRATION:
          type: number
          description: Number of disputes in status group `CARDNETWORK_PREARBITRATION`.
          example: 0
        RESEND:
          type: number
          description: Number of disputes in status group `RESEND`.
          example: 1
        LOSS:
          type: number
          description: Number of disputes in status group `LOSS`.
          example: 1
        WON:
          type: number
          description: Number of disputes in status group `WON`.
          example: 1
        REJECTED:
          type: number
          description: Number of disputes in status group `REJECTED`.
          example: 1
        FAILED_PROCESSED:
          type: number
          description: Number of disputes in status group FAILED_PROCESSED.
          example: 1
    CreateMigrationRequest:
      type: object
      description: Create dispute migration request object
      required:
        - chargeback_id
        - claim_id
        - disputed_amount
        - network_brand_type
      properties:
        chargeback_id:
          type: string
          description: Chargeback ID, same as dispute ID for VISA.
          example: '4965860'
        claim_id:
          type: string
          description: Claim ID, same as case number for VISA.
          example: 88993u748
        disputed_amount:
          type: number
          format: double
          description: Amount under dispute
          example: 215
        network_brand_type:
          $ref: '#/components/schemas/NetworkBrand'
        authorization_id:
          type: number
          description: Authorization ID. **REQUIRED** for Full balance integration.
          example: 8475859059
        account_id:
          type: number
          description: Account ID. **REQUIRED** for Zero balance integration.
          example: 5894887
        transaction_date:
          type: string
          description: >-
            Transaction date, format = yyyy-mm-dd. **REQUIRED** for Zero balance
            integration.
          example: '2023-02-23'
        arn:
          type: string
          description: >-
            Acquirer reference number. **REQUIRED** for Zero balance
            integration.
          example: '4096860'
        is_partial:
          type: boolean
          description: Is partial amount chargeback? Default is `false`.
          default: false
          example: false
        installment_disputed_amount:
          type: number
          description: Installent disputed amount
          example: 678
        installment_number:
          $ref: '#/components/schemas/InstallmentNumber'
    CreateMigrationResponse:
      type: object
      description: Create dispute migration request object
      properties:
        id:
          type: number
          example: 5634
          description: Dispute ID.
        authorization_id:
          type: number
          description: Authorization ID. **REQUIRED** for Full balance integration.
          example: 8475859059
        account_id:
          type: number
          description: Account ID. **REQUIRED** for Zero balance integration.
        comment:
          type: string
          description: Dispute comment
        reason:
          $ref: '#/components/schemas/reasonCode'
        dispute_installment_id:
          $ref: '#/components/schemas/DisputeInstallmentId'
    disputeDueTo:
      type: string
      description: >
        **REQUIRED** when dispute is open to Visa Collaboration (Reason code 12
        and 13 and Visa network brand). Collaboration is the new name for Visa's
        old chargeback process, where each party has several chances to
        investigate and submit evidence in order to determine whether a
        chargeback is legitimate.<br>


        `NR` = Merchandise/services not receive

        `CR` = Cancelled recurring transaction

        `ND` = Not as described

        `DM` = Damaged or defective merchandise

        `Q` = Quality

        `CM` = Counterfeit merchandise

        `M` = Misrepresentation

        `CN` = Credit not processed

        `CS` = Cancelled merchandise/services

        `OC` = Original credit not accepted

        `CL` = Non-receipt of cash

        `TC` = Terms of contract (virtual account)

        `D` = Duplicate

        `IAN` = Incorrect account number

        `IA` = Incorrect amount

        `IC` = Incorrect currency

        `IT` = Incorrect transaction code

        `ID` = Invalid data

        `LP` = Late presentment

        `P` = Paid by other means


        For VISA, you need to fill out the `collaborationQuestionnaire` form
        object in the [Create dispute
        form](ref:post-v1-disputes-disputeid-forms) endpoint.
      enum:
        - NR
        - CR
        - ND
        - DM
        - Q
        - CM
        - M
        - CN
        - CS
        - OC
        - CL
        - TC
        - D
        - IAN
        - IA
        - IC
        - IT
        - ID
        - LP
        - P
      example: NR
    DisputeFee:
      type: object
      required:
        - amount
        - card_id
        - credit_sender
        - credit_receiver
        - currency
        - destination_member
        - fee_date
        - network_brand_type
        - reason_code
      description: Dispute fee object
      properties:
        amount:
          type: number
          example: 100
          format: double
          description: Fee amount.
        card_id:
          $ref: '#/components/schemas/CardID'
        credit_sender:
          type: boolean
          default: false
          description: Credit the sender?
        credit_receiver:
          type: boolean
          default: false
          description: Credit the receiver?
        currency:
          type: string
          maxLength: 3
          example: USD
          description: ISO 4217 fee currency code.
        destination_member:
          type: string
          example: '002083'
          maxLength: 6
          description: >-
            Destination member for the fee collection. These values are known to
            the network and identify either the issuer or acquirer.
        fee_date:
          type: string
          example: '2021-02-15'
          maxLength: 10
          format: date
          description: Date the fee was attached to the claim, format = yyyy-mm-dd.
        network_brand_type:
          $ref: '#/components/schemas/NetworkBrand'
        reason_code:
          type: string
          maxLength: 4
          example: '7604'
          description: >
            Collection reason code. These codes can be found in Mastercard's
            [Global Clearing Management System Reference
            Manual](https://pismoassets.pismo.io/pismo-docs/mc_gcms_rm.pdf)
            starting on page 408.
        authorization_id:
          type: number
          description: >-
            Authorization ID. **REQUIRED** if `claim_id` and `arn` is not
            passed.
        arn:
          type: string
          description: Acquirer reference number. **REQUIRED** if `claim_id` is not passed.
          example: '1564984'
        transaction_amount:
          type: number
          description: Transaction amount. **REQUIRED** if `claim_id` is not passed.
          format: double
          example: 100
        transaction_date:
          type: string
          description: >-
            Transaction date, format = yyyy-mm-dd hh:mm:ss. **REQUIRED** if
            `claim_id` is not passed.
          format: date-time
          example: '2022-06-01 10:25:36'
        claim_id:
          type: string
          description: Fee item claim ID
          example: '121698491'
          maxLength: 19
        card_acceptor_code:
          type: string
          maxLength: 15
          example: Test1234
          description: Merchant ID associated with this fee collection, if any.
        country_code:
          type: string
          maxLength: 3
          example: USA
          description: ISO 3166 3-letter country code.
        message:
          type: string
          maxLength: 100
          example: Cardholder recognized the transaction
          description: Message regarding fee - 100 chars maximum.
        settlement_date:
          type: string
          description: Settlement date, format = yyyy-mm-dd.
          example: '2021-09-22'
          format: date
          maxLength: 10
        reply_fee_id:
          type: string
          maxLength: 19
          example: '300009520876'
          description: Fee ID to be sent in reply to created Fee.
        control_number:
          $ref: '#/components/schemas/ControlNumber'
      x-examples:
        With claim ID:
          card_id: 123456
          claim_id: '12345981232'
          card_acceptor_code: Test1234
          country_code: USA
          destination_member: '002083'
          fee_date: yyyy-MM-dd
          currency: USD
          amount: '100.00'
          message: This is a test message
          reason_code: '7604'
          settlement_date: '2024-08-09'
          control_number: '1589457'
          credit_sender: false
          credit_receiver: false
          network_brand_type: VISA
        Without claim id:
          authorization_id: 123456
          arn: '1564984'
          transaction_amount: '100.00'
          transaction_date: '2022-06-01 10:25:36'
          card_id: 123456
          card_acceptor_code: Test1234
          country_code: USA
          destination_member: '002083'
          fee_date: '2024-12-03'
          currency: USD
          amount: '100.00'
          message: This is a test message
          reason_code: '7604'
          settlement_date: '2024-04-12'
          control_number: '1589457'
          credit_sender: false
          credit_receiver: false
          network_brand_type: VISA
        With reply fee ID:
          card_id: 123456
          claim_id: '121698491'
          card_acceptor_code: Test1234
          country_code: USA
          destination_member: '002083'
          fee_date: '2024-03-09'
          currency: USD
          amount: '100.00'
          message: This is a test message
          reason_code: '7604'
          settlement_date: '2024-10-09'
          reply_fee_id: '300009520876'
          control_number: '1589457'
          credit_sender: false
          credit_receiver: false
          network_brand_type: VISA
    reasonCode:
      type: number
      description: >
        Each card network, such as Visa or Mastercard, defines and maintains
        their own unique set of reason codes, which banks that issue credit and
        debit cards under their brands apply to disputes. Here's a reason code
        [quick
        reference](https://www.chargebackgurus.com/blog/a-definitive-guide-to-chargeback-reason-codes-by-card-network#chargback-reason-code-quick-reference-guide)
        for the major credit card networks.


        For Visa, this would be either `10` (fraud - card present), `11`
        (authorization), `12` (processing error), or `13` (consumer dispute).


        For more infomation, refer to the
        [Visa](https://usa.visa.com/dam/VCOM/global/support-legal/documents/chargeback-management-guidelines-for-visa-merchants-vbs-19-may-16-%20v2.pdf)
        or
        [Mastercard](https://www.mastercard.us/content/dam/public/mastercardcom/na/global-site/documents/chargeback-guide.pdf)
        chargeback quides.


        For example - `4853` (Mastercard - cardholder dispute), `12` (Visa -
        processing error) or `72` (ELO - denied authorization)
      example: 4853
    DisputeFeeResponse:
      type: object
      description: Dispute fee response object
      properties:
        id:
          type: number
          description: Dispute fee ID
          example: 152
        arn:
          type: string
          description: Acquirer reference number. **REQUIRED** if `claim_id` is not passed.
          example: '1564984'
        transaction_amount:
          type: number
          description: Transaction amount. **REQUIRED** if `claim_id` is not passed.
          format: double
        transaction_date:
          type: string
          description: >-
            Transaction date, format = yyyy-mm-dd hh:mm:ss.  **REQUIRED**  if
            `claim_id` is not passed.
          format: date-time
          example: '2022-06-01 10:25:36'
        card_id:
          $ref: '#/components/schemas/CardID'
        card_acceptor_code:
          type: string
          maxLength: 15
          example: Test1234
          description: Merchant ID associated with this fee collection..if any.
        country_code:
          type: string
          maxLength: 3
          example: USA
          description: ISO country code.
        destination_member:
          type: string
          example: '002083'
          maxLength: 6
          description: >-
            Destination member for the fee collection. These values are known to
            the network and identify either the acquirer or issuer.
        fee_date:
          type: string
          example: '2021-02-15'
          maxLength: 10
          format: date
          description: Date the fee was attached to the claim, format = yyyy-mm-dd
        currency:
          type: string
          maxLength: 3
          example: USD
          description: ISO 4217 currency code.
        amount:
          type: number
          example: 100
          format: double
          description: Fee amount.
        message:
          type: string
          maxLength: 100
          example: Cardholder recognized transaction
          description: Message regarding fee - 100 chars maximum.
        reason_code:
          type: string
          maxLength: 4
          example: '7604'
          description: >
            Collection reason code. These codes can be found in Mastercard's
            [Global Clearing Management System Reference
            Manual](https://pismoassets.pismo.io/pismo-docs/mc_gcms_rm.pdf)
            starting on page 408.
        settlement_date:
          type: string
          description: Settlement date, format = yyyy-mm-dd.
          example: '2021-09-22'
          format: date
          maxLength: 10
        control_number:
          $ref: '#/components/schemas/ControlNumber'
        credit_sender:
          type: boolean
          default: false
          description: Credit the sender?
        credit_receiver:
          type: boolean
          default: false
          description: Credit the receiver?
        network_brand_type:
          $ref: '#/components/schemas/NetworkBrand'
        status:
          type: string
          description: Dispute fee status - `PENDING`, `PROCESSED`, or  `FAILED`.
          enum:
            - PENDING
            - PROCESSED
            - FAILED
          example: PENDING
        chargeback_ref_num:
          type: string
          description: Chargeback reference number
          maxLength: 100
          example: '9000000006'
        reconciliation_amount:
          type: number
          description: Reconciliation amount
          format: double
          example: 123.22
        reconciliation_currency:
          type: string
          description: Reconciliation currency
          example: EUR
          maxLength: 3
        japan_common_merchant_code:
          type: string
          description: Japanese common merchant codes
          example: '0410'
          maxLength: 100
        installment_data:
          type: string
          description: Installment data
          example: '1234567890'
          maxLength: 255
        reply_fee_id:
          type: string
          maxLength: 19
          example: '300009520876'
          description: Fee ID to send to reply to created fee.
        reject_reason:
          type: string
          description: Reject reason
          maxLength: 515
          example: >-
            Code1=0142(00):D0063/002;DE072=D0063\\\\\\\\8000000808\\\\\\\\\\\\\\\\ 
        created_at:
          type: string
          description: When dispute created, format = yyyy-mm-ddThh:mm:ss"
          example: '2222-10-07T11:21:45'
        updated_at:
          type: string
          description: When dispute updated, format = yyyy-mm-ddThh:mm:ss"
          example: '2222-10-07T11:21:45'
        created_at_utc:
          type: string
          description: When dispute created in UTC date/time.
          example: 2022-10-13T19:56:010000000Z
        updated_at_utc:
          type: string
          description: When dispute updated in UTC date/time.
          example: 2022-10-13T19:56:010000000Z
    DisputeGroupStatus:
      description: |
        Group status enums
      type: string
      example: OPEN
      enum:
        - OPEN
        - APPROVED
        - DENIED
        - CARDNETWORK_CHARGEBACK
        - ANALYSING
        - CARDNETWORK_SECOND_PRESENTMENT
        - FAILED
        - CARDNETWORK_PREARBITRATION
        - RESEND
        - LOSS
        - WON
        - REJECTED
        - FAILED_PROCESSED
    DisputeFileCategory:
      type: string
      description: File category
      example: PRE_ARBITRATION
      enum:
        - PERSONAL
        - CARD
        - OTHERS
        - PRE_ARBITRATION
    DisputeFormStatus:
      type: string
      example: PENDING
      description: Dispute form status.
      enum:
        - PENDING
        - PROCESSED
        - FAILED
        - INACTIVE
    DisputeStatus:
      type: string
      description: |
        Dispute status enums.
      example: PENDING
      enum:
        - OPENED
        - PENDING
        - CANCELED
        - FAILED
        - CHARGEBACK_REJECTED
        - CHARGEBACK_CREATED
        - CHARGEBACK_ACCEPTED
        - CHARGEBACK_CLOSED
        - SECOND_PRESENTMENT
        - PRE_ARBITRATION_OPENED
        - PRE_ARBITRATION_ACCEPTED
        - PRE_ARBITRATION_DECLINED
        - PRE_ARBITRATION_RECALL
        - PRE_ARB_ALLOCATION_OPENED
        - FAILED_PRE_ARBITRATION
        - PRE_ARB_ALLOCATION_ACCEPTED
        - PRE_ARB_ALLOCATION_DECLINED
        - PRE_ARB_ALLOCATION_RECALLED
        - FAILED_DECLINE_PRE_ARB
        - FAILED_ACCEPT_PRE_ARB
        - FAILED_ON_CLOSE
        - EXPIRED
        - ISSUER_LOSS
        - MIGRATION
        - FAILED_MIGRATION
    DisputeStatusObject:
      type: object
      description: Dispute status informations.
      properties:
        id:
          type: number
          example: 5634
          description: Dispute status ID.
        description:
          type: string
          example: CHARGEBACK_CONFIDENCE_CREDIT_SYSTEM_DISAGREEMENT
          description: >-
            Description status - enums for a client's state machine, not to be
            implemented for anyone else at this point.
        type:
          type: string
          example: MASTERCARD_CARD
          description: Type status ID.
        group:
          $ref: '#/components/schemas/DisputeGroupStatus'
    DisputeResponse:
      type: object
      properties:
        id:
          type: number
          example: 1
          description: Dispute ID.
        org_id:
          $ref: '#/components/schemas/OrgID'
        account_id:
          $ref: '#/components/schemas/AccountID'
        authorization_id:
          type: number
          example: 4352243
          description: Authorization ID.
        comment:
          type: string
          example: Some comment
          description: Custom client comment.
          nullable: true
        dispute_reason:
          $ref: '#/components/schemas/reasonCode'
        modality:
          type: number
          example: 4855
          description: >-
            Dispute *modality* - legacy term for reason code to file the
            dispute.
        dispute_status:
          $ref: '#/components/schemas/DisputeStatus'
        dispute_status_group:
          $ref: '#/components/schemas/DisputeGroupStatus'
        created_at:
          type: string
          example: '2021-02-21'
          description: Dispute created date, format = yyyy-mm-dd.
          format: date
        updated_at:
          type: string
          example: '2021-02-22'
          description: Dispute last updated date, format = yyyy-mm-dd.
          format: date
        created_at_utc:
          type: string
          example: '2021-02-21T22:51:43.000000000Z'
          description: Dispute created as UTC date (ISO-8601).
          format: date-time
        updated_at_utc:
          type: string
          description: Dispute last updated as UTC date (ISO-8601).
          example: '2021-02-25T01:43:06.000000000Z'
          format: date-time
        timeline:
          type: string
          example: '{ "data": "test"}'
          description: Client custom timeline information.
          nullable: true
        protocol:
          type: string
          example: 20190321L123456
          description: >
            Client custom protocol ID. This is primarily for you to internally
            identify a request. If not provided, Pismo creates a CID
            (correlation ID) field for this purpose.
        metadata:
          type: object
          description: >-
            Can be used for caller's dispute information and process. Objects
            and name-value pairs.
        disputed_amount:
          type: number
          example: 10
          description: Disputed amount.
        is_network:
          type: boolean
          example: true
          description: Does dispute have a network authorization?
        is_dispute_migrated:
          type: boolean
          description: Has this dispute been migrated to the Pismo platform?
          example: false
        reversal_id:
          type: number
          description: Event-generated reversal ID
          example: 123
        network_return_reason_code:
          type: string
          description: Network reason code.
          example: '4853'
        network_brand_type:
          $ref: '#/components/schemas/NetworkBrand'
        transaction_date:
          type: string
          description: Transaction date, format = yyyy-mm-dd hh:mm:ss
          example: '2022-08-04 14:26:20'
        transaction_amount:
          $ref: '#/components/schemas/TransactionAmount'
        currency_code:
          type: string
          description: >
            ISO-4217 code for transaction currency. For example, 986 = Brazilian
