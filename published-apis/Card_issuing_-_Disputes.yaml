        description: Fraud report data - fill out and enter one card network object.
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/Fraud_Report_Update_Elo_National'
                - $ref: '#/components/schemas/Fraud_Report_Update_Elo_International'
