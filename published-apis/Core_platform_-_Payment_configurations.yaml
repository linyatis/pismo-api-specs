  /payment-methods-configs/v1/acceptances/processing-codes/{processing_code}/priority-configs:
    get:
      summary: Get acceptance configuration by hierarchy
      description: >
        Get acceptance configuration for a processing code operation based on
        the hierarchy from the most granular to the least granular (account >
        program > Org).


        **Note:** This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      operationId: get-acceptance-by-priority
      tags:
        - Payment method acceptances
      parameters:
        - name: processing_code
          schema:
            type: string
          in: path
          required: true
          description: >-
            Processing code that defines the operation related to the acceptance
            configuration that is being retrieved.
        - name: program_id
          schema:
            type: integer
          in: query
          required: true
          description: >-
            ID of program that the retrived configuration is applied to. You may
            skip this parameter if the account id parameter is present in the
            query.
        - name: account_id
          schema:
            type: integer
          in: query
          required: true
          description: >-
            ID of account that the retrieved configuration is applied to. You
            may skip this parameter if the program id parameter is present in
            the query.
        - name: fetch_config
          schema:
            type: boolean
          in: query
          required: false
          description: >-
            Flag to identify whether the Authorization configurations should be
            retrieved along with the acceptances or not.
      responses:
        '200':
          description: Retrieved Successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAcceptancePriorityResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /payments-config/v1/processing-codes:
    post:
      summary: Create processing code (deprecated)
      deprecated: true
      description: >
        This endpoint is **deprecated**. Use the [Create processing
        code](ref:createprocessingcode) endpoint instead. 


        Create a processing code that identifies a financial operation for the
        organization and defines how the Pismo platform handles this operation
        type.


        If you provide the required fields only, the platform creates and
        returns only one `processing_code` for the operation.


        If you provide all available fields, the platform creates and returns
        two processing codes: `processing_code` for the operation and
        `undo_processing_code` for its reversal.


        See the [Payments configuration](doc:payments-configurations) guide for
        more information.
      operationId: post-processing-code-by-tenant
      tags:
        - Processing codes
      requestBody:
        description: Create processing code configuration request body.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProcessingCodeRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProcessingCodeResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Fields violations:
                  value:
                    code: FIELDS-VIOLATIONS
                    error_code: FIELDS-VIOLATIONS
                    message: One or more fields are invalid.
                    error: >-
                      processing_code must be an alphanumeric
                      value;undo_processing_code must be an alphanumeric value
                    violations:
                      processing_code: processing_code must be an alphanumeric value
                      undo_processing_code: undo_processing_code must be an alphanumeric value
                Invalid payload:
                  value:
                    code: PC-INVALID-SAVE-PAYLOAD
                    error_code: PC-INVALID-SAVE-PAYLOAD
                    message: Save payload is invalid. It must be a valid JSON.
                Invalid Undo Information Payload:
                  value:
                    code: PC-INVALID-UNDO-INFORMATION-PAYLOAD
                    error_code: PC-INVALID-UNDO-INFORMATION-PAYLOAD
                    message: >-
                      Undo information in payload is invalid. All fields must be
                      present.
                Invalid Same Code And UndoCode:
                  value:
                    code: PC-INVALID-UNDO-EQUALS-CODE
                    error_code: PC-INVALID-UNDO-EQUALS-CODE
                    message: undo_processing_code cannot be equal to processing_code.
                InvalidPatchInformationPayload:
                  value:
                    code: PC-INVALID-PATCH-INFORMATION-PAYLOAD
                    error_code: PC-INVALID-PATCH-INFORMATION-PAYLOAD
                    message: >-
                      Patch information in payload is invalid. All fields must
                      be present.
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
    get:
      summary: List processing codes (deprecated)
      deprecated: true
      description: >
        This endpoint is **deprecated**. Use the [List processing
        codes](ref:processingcodelist) endpoint instead. 


        List processing codes, which you can filter by code or description.


        If you don't specify any query parameters, then the response lists all
        processing codes defined for the organization.
      operationId: get-processing-code-by-tenant
      parameters:
        - in: query
          name: processingCode
          schema:
            type: string
          description: >-
            Unique alphanumeric identifier that defines how the Pismo platform
            handles this financial operation type.
        - in: query
          name: description
          schema:
            type: string
          description: Processing code description.
      tags:
        - Processing codes
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProcessingCodeResponse'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
