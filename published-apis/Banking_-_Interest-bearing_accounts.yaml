openapi: 3.1.0
info:
  title: Banking - Interest-bearing accounts
  version: 1.0.0
  description: API for interest-bearing account functionality
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/savings-products
    description: Sandbox API server for testing
tags:
  - name: Product
    description: Endpoints that manage Interest-bearing accounts products
  - name: Account attachment
    description: >-
      Endpoints that manage account attachments to interest-bearing account
      products
  - name: Program attachment
    description: >-
      Endpoints that manage program attachments to interest-bearing account
      products
  - name: Average balance
    description: Endpoints that enable calculating average balances for an account
  - name: Maturity instruction override
    description: Endpoints that manage maturity instruction overrides for deposit accounts
components:
  parameters:
    authorizationTokenHeader:
      name: AuthorizationToken
      in: header
      schema:
        type: string
      required: true
      description: >
        Account token. Token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a 401 Unauthorized error.
      example: 1234
    authorizationTokenGenericHeader:
      name: AuthorizationToken
      in: header
      schema:
        type: string
      required: true
      description: >
        Generic token. Token encoded with a generic token ID. Tokens can expire
        quickly, which can result in a 401 Unauthorized error.
      example: 1234
    productId:
      description: Product ID.
      in: path
      name: productId
      required: true
      schema:
        type: string
      example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
    accountId:
      description: Account ID.
      in: path
      name: accountId
      required: true
      schema:
        type: integer
      example: 123456
    programIdPath:
      description: Program ID
      in: path
      name: programId
      required: true
      schema:
        type: integer
      example: 123
    afterIdQuery:
      description: >
        This is the `last_id` field returned in the response which you can use
        to get the next result set. This is displayed in UNIX timestamp.
      in: query
      name: afterId
      required: false
      schema:
        type: integer
      example: 1706027185000
    beginDateTimeQuery:
      description: >
        Queries for the date and time of products after the value of this field.
        Date and time are displayed in RFC 3339 format, for example:
        `2024-01-28T10:33:01Z`.
      in: query
      name: beginDatetime
      required: false
      schema:
        type: string
        format: date-time
      example: '2024-01-28T10:33:01.000Z'
    endDateTimeQuery:
      description: >
        Queries for the date and time of products created before the value of
        this field. Date and time are displayed in RFC 3339 format, for example:
        `2024-01-29T10:33:01Z`.
      in: query
      name: endDatetime
      required: false
      schema:
        type: string
        format: date-time
      example: '2024-01-30T10:33:01.000Z'
    perPageQuery:
      description: Number of items per page.
      in: query
      name: perPage
      required: false
      schema:
        type: integer
        maximum: 100
        default: 20
      example: 20
    orderQuery:
      description: >-
        List result order of the `created_at` value. It can be sorted in
        ascending (`ASC`) or descending (`DESC`) order. Default is `DESC`.
      in: query
      name: order
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: DESC
      example: DESC
    productTypeQuery:
      description: Filter results by product type.
      in: query
      name: productType
      required: false
      schema:
        type: string
        enum:
          - deposit
          - savings-account
      example: deposit
    statusQuery:
      description: Filter results by status.
      in: query
      name: status
      required: false
      schema:
        type: string
        enum:
          - CREATED
          - ACTIVE
          - INACTIVE
      example: ACTIVE
    idempotencyHeader:
      name: idempotency
      in: header
      schema:
        type: string
      required: true
      description: >
        A unique identifier for the request. If you need to retry a request, use
        the same idempotency key to avoid creating duplicate resources.
      example: 123e4567-e89b-12d3-a456-426614174000
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Error type code.
          example: EIBACC0003
        details:
          type: string
          description: Error details.
          example: 'error EIBACC0008: Validation error [(Field ''Order'' is invalid)]'
        message:
          description: Error message.
          example: Bad Request
          type: string
    DepositMaturityInstructions:
      properties:
        principal:
          type: string
          description: >
            Specifies the status of the principal amount at maturity.

            - `NO_ACTION`: No action is taken with the principal amount

            - `ROLLOVER`: The principal amount is rolled over to a new deposit
            term


            If no value is selected, the principal defaults to `NO_ACTION`.
          example: ROLLOVER
          enum:
            - NO_ACTION
            - ROLLOVER
          default: NO_ACTION
        interest:
          type: string
          description: >
            Specifies the status of the accrued interest at maturity.

            - `PAY`: The accrued interest is paid to the account

            - `ROLLOVER`: The accrued interest is rolled over and added to the
            principal


            If no value is selected, the interest defaults to `PAY`.
          example: PAY
          enum:
            - PAY
            - ROLLOVER
          default: PAY
      type: object
      description: >
        - If the principal or interest are `ROLLOVER,` the respective amounts is
        rolled over to a new deposit term.

        - If the principal is `NO_ACTION`, no action is taken with the principal
        amount at maturity.

        - If the interest is `PAY` and the accrued interest is greater than
        zero, it's paid to the account's cash balance.
    InterestPayoutAccount:
      properties:
        account:
          type: string
          description: |
            Account identifier to which the interest is paid.
          example: '123456'
        interest_payout_account_type:
          type: string
          description: |
            Interest payout account type, either internal or external.
          enum:
            - internal
            - external
          example: internal
      type: object
    DepositConfigs:
      type: object
      properties:
        maturity_date_days:
          type: integer
          description: >
            Specify the number of days until an asset or investment matures.<br>

            - Provide either `maturity_date_days` or a specific
            `calendar_maturity_date`, but not both.

            - If you provide the number of days, the exact maturity date is
            calculated automatically. 

            - If left blank, a default number of days is used.
          example: 365
        calendar_maturity_date:
          type: string
          format: date
          description: >
            The specific calendar date the asset or investment matures, format =
            `YYYY-MM-DD`.<br>
          example: '2026-10-07'
        interest_payout_account:
          $ref: '#/components/schemas/InterestPayoutAccount'
    DepositProduct:
      type: object
      properties:
        cool_off_period:
          type: integer
          description: Period in days when a withdrawal can be made without penalty.
          example: 0
        created_at:
          type: string
          format: datetime
          description: Date and time the product was created
          example: '2024-01-23T13:26:25.000Z'
        funding_duration:
          type: integer
          description: >-
            Period during which money is allowed to deposit into the account
            before the account is blocked. The value of this field is calculated
            in days.
          example: 12
        interest_plan_id:
          type: string
          description: >-
            Interest rate plan ID. This corresponds to the ID you created using
            the [Create interest plan version](ref:patch-v1-interest-plan))
            endpoint.
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        maturity_instructions:
          $ref: '#/components/schemas/DepositMaturityInstructions'
        min_amount:
          type: number
          description: >-
            The minimum balance required to earn yield. If the balance is below
            this amount, yield is not calculated, and if no value is specified,
            any available amount is treated as accrued interest.
          example: 1000
        max_amount:
          type: number
          description: Maximum deposit amount.
          example: 5000
        min_term:
          type: integer
          description: >-
            Minimum term duration. The value of this field is calculated in
            days.
          example: 265
        max_term:
          type: integer
          description: >-
            Maximum term duration. The value of this field is calculated in
            days.
          example: 1025
        grace_period_duration_days:
          type: integer
          description: >-
            The number of days in the grace period. Withdrawals are allowed
            during this period. This field applies only if no grace period
            penalty is defined and penalties do not apply.
          example: 30
        name:
          type: string
          description: Product name
          example: Tax 1 Default
        penalties:
          $ref: '#/components/schemas/DepositPenalties'
        processing_codes:
          $ref: '#/components/schemas/DepositProcessingCodes'
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        product_type:
          type: string
          description: Product type.
          enum:
            - deposit
            - savings-account
        status:
          type: string
          description: Indicates the current state of the product. For example, `CREATED`.
          enum:
            - CREATED
            - ACTIVE
            - INACTIVE
          example: CREATED
        term_type:
          type: string
          description: |
            Term type. For example, `FIXED` or `FLEXIBLE`.
          enum:
            - FIXED
            - FLEXIBLE
          example: FIXED
        start_date:
          type: string
          format: date
          description: >-
            Defines the earliest date from which the product can be attached to
            an account or program.
          example: '2025-11-01'
    CreateDepositProductRequest:
      required:
        - name
        - interest_plan_id
        - term_type
      type: object
      properties:
        name:
          type: string
          description: The product name.
          example: Tax 1 Default
        interest_plan_id:
          type: string
          description: >-
            Interest rate plan ID. This corresponds to the ID you created using
            the [Create interest plan version](ref:patch-v1-interest-plan))
            endpoint.
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        term_type:
          type: string
          description: |
            Term type. For example, `FIXED` or `FLEXIBLE`.
          enum:
            - FIXED
            - FLEXIBLE
          example: FIXED
        maturity_instructions:
          $ref: '#/components/schemas/DepositMaturityInstructions'
        processing_codes:
          $ref: '#/components/schemas/DepositProcessingCodes'
        cool_off_period:
          type: integer
          description: Period in days when a withdrawal can be made without penalty.
          example: 0
        funding_duration:
          type: integer
          description: >-
            Period during which money is allowed to deposit into the account
            before the account is blocked. The value of this field is calculated
            in days.
          example: 12
        grace_period:
          type: integer
          description: >-
            Define the number of days during which changes can be made to the
            product before it rolls over. If you define a grace period penalty,
            configure it under `penalties.grace_period`.
          example: 10
        min_amount:
          type: number
          description: >-
            The minimum balance required to earn yield. If the balance is below
            this amount, yield is not calculated, and if no value is specified,
            any available amount is treated as accrued interest.
          example: 1000
        max_amount:
          type: number
          description: Maximum deposit amount.
          example: 5000
        min_term:
          type: integer
          description: >-
            Minimum term duration. The value of this field is calculated in
            days.
          example: 265
        max_term:
          type: integer
          description: >-
            Maximum term duration. The value of this field is calculated in
            days.
          example: 1025
        penalties:
          $ref: '#/components/schemas/DepositPenalties'
        start_date:
          type: string
          format: date
          description: >-
            Define the earliest date from which the product can be attached to
            an account or program. Attach operations attempted before this date
            are rejected.
          example: '2025-11-01'
    CreateSavingsAccountProductRequest:
      required:
        - interest_plan_id
        - name
        - processing_codes
      type: object
      properties:
        interest_plan_id:
          type: string
          description: >-
            Interest rate plan ID. This corresponds to the ID you created using
            the [Create interest plan version](ref:patch-v1-interest-plan))
            endpoint.
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        name:
          type: string
          description: The product name.
          example: Tax 1 Default
        min_amount:
          type: number
          description: >-
            Minimum amount for yield. If balance is below this value, yield is
            not calculated. If no value is provided, any available amount is
            treated as accrued interest.
          example: 1000
        processing_codes:
          $ref: '#/components/schemas/SavingsAccountProcessingCodes'
        start_date:
          type: string
          format: date
          description: >-
            Define the earliest date from which the product can be attached to
            an account or program. Attach operations attempted before this date
            are rejected.
          example: '2025-11-01'
    ProductList:
      type: object
      properties:
        last_id:
          type: integer
          description: Pagination reference, displayed in UNIX timestamp.
          example: 1706027185000
        next_page:
          type: boolean
          description: Indicates whether there is a next page of results.
          example: true
        per_page:
          type: integer
          description: Number of items per page. Default `20`, maximum is `100`.
          maximum: 100
          minimum: 1
          example: 20
          default: 20
        items:
          allOf:
            - $ref: '#/components/schemas/DepositProduct'
            - $ref: '#/components/schemas/SavingsAccountProduct'
          description: A collection of individual product objects.
    PatchProductRequest:
      type: object
      properties:
        status:
          description: Product status
          example: ACTIVE
          type: string
          enum:
            - CREATED
            - ACTIVE
            - INACTIVE
        reason:
          description: Status update reason
          example: Activating product
          type: string
    DepositProcessingCodes:
      type: object
      properties:
        maturity_processing_code:
          type: string
          description: >
            Processing code for maturity.<br>

            If not provided at the time of creation, the default value is
            `009595`.
          example: '009595'
        interest_processing_code:
          type: string
          description: >-
            Processing code for interest calculation. <br> If you don't specify
            a value, the default is `009797`.
          example: '009797'
        detach_processing_code:
          type: string
          description: >
            Processing code for detaching deposit feature from a bank
            account.<br>

            Detaching means the bank removes the deposit feature from the bank
            account.

            If you don't specify a value, the default is `009696`.
          example: '009696'
    SavingsAccountProcessingCodes:
      type: object
      properties:
        interest_processing_code:
          type: string
          description: >-
            Processing code for interest calculation. <br> If you don't specify
            a value, the default is `009797`.
          example: '009797'
        detach_processing_code:
          type: string
          description: >
            Processing code for detaching deposit feature from a bank
            account.<br>

            Detaching means the bank removes the deposit feature from the bank
            account.

            If you don't specify a value, the default is `009696`.
          example: '009696'
    DepositAttachRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        deposit_configs:
          $ref: '#/components/schemas/DepositConfigs'
        metadata:
          type: object
          description: >
            The metadata object contains user-defined key-value pairs that
            provide additional context or custom information.<br>

            The platform has no control over its content, but rather controlled
            by the user.
          example:
            key: value
    SavingsAccountAttachRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        metadata:
          type: object
          description: >
            The metadata object contains user-defined key-value pairs that offer
            additional context or custom information.<br>

            The platform has no control over its content, it's controlled by the
            user.
          example:
            key: value
    DetachRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        metadata:
          type: object
          description: >
            The metadata object contains user-defined key-value pairs that offer
            additional context or custom information.<br>

            The platform has no control over its content, but rather controlled
            by the user.
          example:
            key: value
    SavingsAccountProduct:
      type: object
      properties:
        created_at:
          type: string
          format: datetime
          description: The moment when a product is created.
          example: '2024-01-23T13:26:25.000Z'
        updated_at:
          type: string
          format: datetime
          description: The moment when a product is updated.
          example: '2024-01-23T13:26:25.000Z'
        interest_plan_id:
          type: string
          description: >-
            Interest rate plan ID. This corresponds to the ID you created using
            the [Create interest plan version](ref:patch-v1-interest-plan))
            endpoint.
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        name:
          type: string
          description: The product name.
          example: Tax 1 Default
        min_amount:
          type: number
          description: >-
            Minimum amount for yield. If balance is below this value, yield is
            not calculated. If no value is provided, any available amount is
            treated as accrued interest.
          example: 1000
        processing_codes:
          $ref: '#/components/schemas/SavingsAccountProcessingCodes'
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        product_type:
          type: string
          description: Product type.
          enum:
            - deposit
            - savings-account
        status:
          description: Product status
          example: ACTIVE
          type: string
          enum:
            - CREATED
            - ACTIVE
            - INACTIVE
        start_date:
          type: string
          format: date
          description: >-
            Define the earliest date from which the product can be attached to
            an account or program.
          example: '2025-11-01'
    AccountAttachment:
      type: object
      properties:
        attachment_date:
          type: string
          format: datetime
          description: Date on which the product is attached to the account.
          example: '2024-01-23T13:26:25.000Z'
        interest_plan_id:
          type: string
          description: >-
            Interest rate plan ID. This corresponds to the ID you created using
            the [Create interest plan version](ref:patch-v1-interest-plan))
            endpoint.
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        maturity_date_days:
          type: integer
          description: >
            The number of days until the maturity date of the asset or
            investment.<br>

            This field represents the duration in days before the asset reaches
            its maturity and can be cashed out.
          example: 365
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        product_type:
          type: string
          description: Product type.
          enum:
            - deposit
            - savings-account
        interest_payout_account:
          $ref: '#/components/schemas/InterestPayoutAccount'
    ProgramAttachment:
      type: object
      properties:
        attachment_date:
          type: string
          format: datetime
          description: Date on which the product is attached to the program.
          example: '2024-01-23T13:26:25.000Z'
        interest_plan_id:
          type: string
          description: >-
            Interest rate plan ID. This corresponds to the ID you created using
            the [Create interest plan version](ref:patch-v1-interest-plan))
            endpoint.
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        maturity_date_days:
          type: integer
          description: >
            The number of days until the maturity date of the asset or
            investment.<br>

            This field represents the duration in days before the asset reaches
            its maturity date and can be cashed out
          example: 365
        calendar_maturity_date:
          type: string
          format: date
          description: >
            The date the asset or investment matures. The date format must be
            `YYYY-MM-DD`. <br>

            This value is either calculated from the provided days to maturity
            (`maturity_date_days`) or is the same date that was entered in the
            request.
          example: '2026-10-07'
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        product_type:
          type: string
          description: Product type.
          enum:
            - deposit
            - savings-account
    CalculateAverageBalanceRequest:
      type: object
      properties:
        account_id:
          type: number
          description: Account identifier.
          example: 123456
        begin_date_datetime:
          type: string
          format: date-time
          description: >
            The specified datetime when the average balance calculation begins.
            The datetime is displayed in the RFC 3339 format; for example:
            `2024-01-28T10:33:01Z`.
          example: '2024-01-28T10:33:01.000Z'
        end_date_datetime:
          type: string
          format: date-time
          description: >
            The specified datetime when the average balance calculation ends.
            The datetime is displayed in the RFC 3339 format; for example:
            `2024-01-29T10:33:01Z`.
          example: '2024-01-30T10:33:01.000Z'
        balance_types_to_calculate:
          type: array
          items:
            type: string
            enum:
              - available
              - savings
              - held_funds
          description: >
            Choose a balance to calculate its average balance, you can select
            multiple balance types to calculate their average balances
            simultaneously. The balance types are:<br>

            * `available`

            * `savings`

            * `held_funds`
          example:
            - available
            - savings
            - held_funds
    CalculateAverageBalanceResponse:
      type: object
      properties:
        account_id:
          type: number
          description: Account ID.
          example: 123456
        idempotency_key:
          type: string
          description: Idempotency key.
          example: 123e4567-e89b-12d3-a456-xyz
        status:
          type: string
          description: Status of the average balance calculation request.
          enum:
            - PROCESSING
            - COMPLETE
        message:
          type: string
          description: Message.
          example: Request is under progress
    GetAverageBalanceResponse:
      type: object
      properties:
        account_id:
          type: number
          description: Account ID.
          example: 123456
        begin_date_datetime:
          type: string
          format: date-time
          description: >
            The date and time when the calculation begins. The date and time are
            displayed in RFC 3339 format, for example: `2024-01-28T10:33:01Z`.
          example: '2024-01-28T10:33:01.000Z'
        end_date_datetime:
          type: string
          format: date-time
          description: >
            The date and time when the calculation ends. The date and time are
            displayed in RFC 3339 format, for example: `2024-01-29T10:33:01Z`.
          example: '2024-01-30T10:33:01.000Z'
        balance_types_to_calculate:
          type: array
          items:
            type: string
            enum:
              - available
              - savings
              - held_funds
          description: >
            Choose a balance to calculate its average balance, you can select
            multiple balance types to calculate their average balances
            simultaneously. The balance types are:<br>

            * `available`

            * `savings`

            * `held_funds`
          example:
            - available
            - savings
            - held_funds
    DetachProductFromProgramRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product ID
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
    DepositPenalties:
      type: object
      properties:
        early_withdrawal_after_opening:
          $ref: '#/components/schemas/EarlyWithdrawalAfterOpening'
        grace_period:
          $ref: '#/components/schemas/GracePeriod'
        tiered_interest_forfeiture:
          description: >-
            This penalty corresponds to fee ID
            `tieredInterestForfeiturePenaltyID` and transaction flow
            `tieredInterestForfeiturePenalty`
          type: array
          items:
            $ref: '#/components/schemas/TieredInterestForfeitureTier'
        withdrawal_fee:
          $ref: '#/components/schemas/WithdrawalFee'
        subsequent_withdrawals:
          $ref: '#/components/schemas/SubsequentWithdrawals'
    EarlyWithdrawalAfterOpening:
      description: >-
        This penalty corresponds to fee ID
        `earlyWithdrawalAfterOpeningPenaltyID` and transaction flow
        `earlyWithdrawalAfterOpeningPenalty`
      type: object
      required:
        - applicable_within_days
        - penalty_interest_days
      properties:
        applicable_within_days:
          type: integer
          minimum: 0
          description: Number of days after opening that the penalty is applied
          example: 30
        penalty_interest_days:
          type: integer
          minimum: 0
          description: >-
            Number of days multiplied by the applicable interest or earnings
            rate to determine the penalty amount.
          example: 90
    GracePeriod:
      description: >-
        This penalty corresponds to fee ID `gracePeriodPenaltyID` and trasaction
        flow `gracePeriodPenalty`
      type: object
      required:
        - duration_days
        - penalty_interest_days
      properties:
        duration_days:
          type: integer
          minimum: 0
          description: Duration of the grace period in days
          example: 7
        penalty_interest_days:
          type: integer
          minimum: 0
          description: Number of interest days to forfeit as penalty
          example: 30
    TieredInterestForfeitureTier:
      description: >-
        This penalty corresponds to fee ID `tieredInterestForfeiturePenaltyID`
        and transaction flow `tieredInterestForfeiturePenalty`
      type: object
      required:
        - min_days_held
        - max_days_held
        - forfeited_interest_days
      properties:
        min_days_held:
          type: integer
          description: Minimum number of days the deposit must be held
          example: 1
        max_days_held:
          type: integer
          description: Maximum number of days the deposit can be held
          example: 90
        forfeited_interest_days:
          type: integer
          description: Number of interest days to forfeit as penalty
          example: 30
    WithdrawalFee:
      description: >-
        This penalty corresponds to fee ID `withdrawalFeePenaltyID` and
        transaction flow `withdrawalFeePenalty`
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum:
            - PERCENTAGE
            - FIXED
          description: Withdrawal fee type
          example: PERCENTAGE
        value:
          type: number
          description: Value of the withdrawal fee
          example: 1.5
    SubsequentWithdrawals:
      type: object
      description: >
        This penalty corresponds to fee ID `subsequentWithdrawalPenaltyID` and
        transaction flow `subsequentWithdrawalPenalty`.<br>

        Settings for the subsequent withdrawal penalty (Regulation D). 

        A penalty fee is applied when a customer makes a withdrawal within the
        configured window. 

        The window either resets with each withdrawal (ROLLING) or remains fixed
        from the first withdrawal (FIXED).
      required:
        - applicable_within_days
        - window_behavior
      properties:
        applicable_within_days:
          type: integer
          minimum: 1
          description: >
            The number of days following a withdrawal during which a subsequent
            withdrawal triggers the penalty.

            Must be at least 1.
          example: 30
        window_behavior:
          type: string
          enum:
            - ROLLING
            - FIXED
          description: >
            Controls how the penalty window is managed after each withdrawal:

            - `ROLLING`: the window resets on every withdrawal (scheduler is
            replaced)

            - `FIXED`: the window is set once on the first withdrawal and does
            not reset
          example: ROLLING
        penalty_interest_days:
          type: integer
          minimum: 1
          description: |
            Number of interest days to forfeit as the penalty amount.
            Must be at least 1 when provided.
          example: 7
    CreateMaturityInstructionOverrideRequest:
      type: object
      required:
        - principal
        - interest
        - reason
      properties:
        principal:
          type: string
          enum:
            - NO_ACTION
            - ROLLOVER
          description: >
            Specifies the status of the principal amount at maturity.

            - `NO_ACTION`: No action is taken with the principal amount

            - `ROLLOVER`: The principal amount is rolled over to a new deposit
            term


            If no value is selected, principal defaults to `NO_ACTION`.
          example: ROLLOVER
          default: NO_ACTION
        interest:
          type: string
          enum:
            - PAY
            - ROLLOVER
          description: >
            Specifies the status of the accrued interest at maturity.

            - `PAY`: The accrued interest is paid to the account

            - `ROLLOVER`: The accrued interest is rolled over and added to the
            principal


            If no value is selected, the interest defaults to `PAY`.
          example: PAY
          default: PAY
        reason:
          type: string
          maxLength: 100
          description: Reason for creating the maturity instruction override
          example: Customer requested custom maturity handling
      description: >
        - If the principal or interest are `ROLLOVER`, the respective amounts is
        rolled over to a new deposit term.

        - When principal is `NO_ACTION`, no action is taken with the principal
        amount at maturity.

        - If the interest is `PAY` and the accrued interest is greater than
        zero, it's paid to the account's cash balance.
    UpdateMaturityInstructionOverrideRequest:
      type: object
      properties:
        principal:
          type: string
          enum:
            - NO_ACTION
            - ROLLOVER
          description: >
            Specifies the status of the principal amount at maturity.

            - `NO_ACTION`: No action is taken with the principal amount

            - `ROLLOVER`: The principal amount is rolled over to a new deposit
            term


            If no value is specified, the principal amount is not updated.
          example: NO_ACTION
        interest:
          type: string
          enum:
            - PAY
            - ROLLOVER
          description: >
            Specifies the status of the accrued interest at maturity.

            - `PAY`: The accrued interest is paid to the account

            - `ROLLOVER`: The accrued interest is rolled over and added to the
            principal


            If no value is selected, nothing is updated.
          example: ROLLOVER
        reason:
          type: string
          maxLength: 100
          description: Reason for updating the maturity instruction override
          example: Updated per customer request
      description: >
        - If principal or interest are `ROLLOVER`, the respective amounts is
        rolled over to a new deposit term.

        - When principal is `NO_ACTION`, no action is taken with the principal
        amount at maturity.

        - If interest is `PAY` and accrued interest is greater than zerto, it's
        paid to the account's cash balance.
    MaturityInstructionOverrideResponse:
      type: object
      properties:
        product_id:
          type: string
          description: The product ID associated with the override
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        principal:
          type: string
          description: Principal instruction setting
          example: ROLLOVER
        interest:
          type: string
          description: Interest instruction setting
          example: PAY
        reason:
          type: string
          description: Override reason
          example: Customer requested custom maturity handling
        status:
          type: string
          description: Override status
          example: ACTIVE
        created_at:
          type: string
          format: date-time
          description: Timestamp that indicates when the override was created
          example: '2024-01-23T13:26:25.000Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp that indicates when the override was last updated
          example: '2024-01-23T13:26:25.000Z'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    400BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequestBody:
              summary: Bad Request.
              value:
                code: EIBACC0008
                message: Bad Request.
                detail: >-
                  error EIBACC0008: Validation error [(Field 'Order' is
                  invalid)]
    404NotFound:
      description: Bad request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequestBody:
              summary: Bad Request.
              value:
                code: EIBACC0078
                message: Product not found.
    409Conflict:
      description: Conflict.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            conflict:
              summary: Conflict.
              value:
                code: EIBACC0128
                message: Product is already detached
    500InternalServer:
      description: Internal error.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalProcessingError:
              summary: Internal processing error.
              value:
                code: EIBACC0007
                message: Internal error
                detail: Internal error
paths:
  /v1/products:
    get:
      tags:
        - Product
      summary: List product
      description: |
        Returns a list of an organization's savings and time-deposit accounts.
      operationId: interest-bearing-v1-list-products
      parameters:
        - $ref: '#/components/parameters/beginDateTimeQuery'
        - $ref: '#/components/parameters/endDateTimeQuery'
        - $ref: '#/components/parameters/afterIdQuery'
        - $ref: '#/components/parameters/perPageQuery'
        - $ref: '#/components/parameters/orderQuery'
        - $ref: '#/components/parameters/productTypeQuery'
        - $ref: '#/components/parameters/statusQuery'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits:
    post:
      tags:
        - Product
      summary: Create deposit product
      description: >
        Create an organization's time deposit accounts. Time deposit accounts,
        such as CDs, require you to keep your funds in the account for a
        mutually agreed amount for a specific period of time.<br>

        This endpoint generates the [Deposit product
        created](https://developers.pismo.io/events/docs/deposit-product-creation-1)
        event.

        For information about interest-bearing accounts, see [Interest-bearing
        accounts](doc:interest-bearing-accounts).
      operationId: interest-bearing-v1-create-deposit-product
      parameters:
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepositProductRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositProduct'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits/{productId}:
    get:
      tags:
        - Product
      summary: Get deposit product
      description: >
        Get deposit product by product ID. Note that product ID is
        Pismo-generated.
      operationId: interest-bearing-v1-get-deposit-products
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositProduct'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
    patch:
      tags:
        - Product
      summary: Update deposit product
      description: >
        Update deposit by product ID. Note that product ID is
        Pismo-generated.<br>

        This endpoint generates the [Deposit product
        updated](https://developers.pismo.io/events/docs/deposit-product-update-1)
        event.
      operationId: interest-bearing-v1-patch-deposit-product
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/authorizationTokenGenericHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProductRequest'
      responses:
        '204':
          description: Success
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/savings-accounts:
    post:
      tags:
        - Product
      summary: Create savings account product
      description: >
        Create an organization's savings account product. Savings account
        products accrue interest based on the balance at the time of the
        interest calculation.<br>

        This endpoint generates the [Savings account product
        created](https://developers.pismo.io/events/docs/savings-account-product-creation-1)
        event.

        For information about interest-bearing accounts, see [Interest-bearing
        accounts](doc:interest-bearing-accounts).
      operationId: interest-bearing-v1-create-savings-account-product
      parameters:
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSavingsAccountProductRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsAccountProduct'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/savings-accounts/{productId}:
    get:
      tags:
        - Product
      summary: Get savings account product
      description: >
        Get saving accounts product by product ID. Note that product ID is
        Pismo-generated.
      operationId: interest-bearing-v1-get-savings-account-products
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsAccountProduct'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
    patch:
      tags:
        - Product
      summary: Update savings account product
      description: >
        Update a savings account product by product ID. Note that product ID is
        Pismo-generated.<br>

        This endpoint generates the [Savings account product
        updated](https://developers.pismo.io/events/docs/savings-account-product-update-1)
        event.
      operationId: interest-bearing-v1-patch-savings-account-product
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProductRequest'
      responses:
        '204':
          description: Success
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/products/attachments/accounts/{accountId}:
    get:
      tags:
        - Account attachment
      summary: Get account attachment
      description: |
        Gets an account's attached product.
      operationId: interest-bearing-v1-get-account-attachment
      parameters:
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAttachment'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits/accounts/{accountId}/attach:
    post:
      tags:
        - Account attachment
      summary: Attach deposit to account
      description: >
        Attach a time deposit product to an account.

        This endpoint generates the [Account
        attached](https://developers.pismo.io/events/docs/deposit-product-account-attach-1)
        event.
      operationId: interest-bearing-v1-deposit-attach-account
      parameters:
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositAttachRequest'
      responses:
        '204':
          description: Success - No Content
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits/accounts/{accountId}/detach:
    post:
      tags:
        - Account attachment
      summary: Detach deposit from account
      description: >
        Detach a time deposit product from an account.

        This endpoint generates the [Account
        detached](https://developers.pismo.io/events/docs/deposit-product-account-detach-1)
        event.
      operationId: interest-bearing-v1-deposit-detach-account
      parameters:
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetachRequest'
      responses:
        '204':
          description: Success - No Content
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          description: Conflict.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequestBody:
                  summary: Bad Request.
                  value:
                    code: EIBACC0128
                    message: Product is already detached
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits/{productId}/accounts/{accountId}/maturity-instructions/overrides:
    post:
      tags:
        - Maturity instruction override
      summary: Create maturity instruction override
      description: >
        Override the default maturity instruction for a specific account and
        deposit product. Use this endpoint to customize how principal and
        interest are handled when a deposit matures, which is ideal for accounts
        that require different behavior than the standard product configuration.
      operationId: interest-bearing-v1-create-maturity-instruction-override
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMaturityInstructionOverrideRequest'
      responses:
        '201':
          description: Override created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaturityInstructionOverrideResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '403':
          description: Forbidden
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
    get:
      tags:
        - Maturity instruction override
      summary: Get maturity instruction override
      description: >
        Get the maturity instruction override configured for a specific account
        and deposit product.
      operationId: interest-bearing-v1-get-maturity-instruction-override
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Override retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaturityInstructionOverrideResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '403':
          description: Forbidden
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
    patch:
      tags:
        - Maturity instruction override
      summary: Update maturity instruction override
      description: >
        Update an existing maturity instruction override for a specific account
        and deposit product, allowing modifications to its principal handling,
        interest handling, and reason.
      operationId: interest-bearing-v1-update-maturity-instruction-override
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMaturityInstructionOverrideRequest'
      responses:
        '200':
          description: Override updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaturityInstructionOverrideResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '403':
          description: Forbidden
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
    delete:
      tags:
        - Maturity instruction override
      summary: Delete maturity instruction override
      description: >
        Delete an existing maturity instruction override for a specific account
        and deposit product, reverting the account to the default maturity
        instructions configured in the product.
      operationId: interest-bearing-v1-delete-maturity-instruction-override
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Override deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaturityInstructionOverrideResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '403':
          description: Forbidden
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
