          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequestBody:
                  summary: Bad Request.
                  value:
                    code: EIBACC0128
                    message: Product is already detached
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/products/attachments/programs/{programId}:
    get:
      tags:
        - Program attachment
      summary: Get program attachment
      description: |
        Gets a program's attached product.
      operationId: interest-bearing-v1-get-program-attachment
      parameters:
        - $ref: '#/components/parameters/programIdPath'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Success
          content:
