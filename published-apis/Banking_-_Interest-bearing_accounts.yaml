              schema:
                $ref: '#/components/schemas/ProgramAttachment'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits/programs/{programId}/attach:
    post:
      tags:
        - Program attachment
      summary: Attach deposit product to program
      description: >
        Attach a time deposit product to a program.

        This endpoint generates the [Program
        attached](https://developers.pismo.io/events/docs/deposit-product-program-attach-1)
        event.
      operationId: interest-bearing-v1-deposit-attach-program
      parameters:
        - $ref: '#/components/parameters/programIdPath'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepositAttachRequest'
      responses:
        '204':
          description: Success - No Content
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          description: Conflict.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequestBody:
                  summary: Bad Request.
                  value:
                    code: EIBACC0120
                    message: The product ID provided is already attached.
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/savings-accounts/program/{programId}/attach:
    post:
      tags:
        - Program attachment
      summary: Attach savings accounts to program
      description: >
        Attach a savings accounts product to a program.

        This endpoint generates the [Program
        attached](https://developers.pismo.io/events/docs/deposit-product-program-attach-1)
        event.
      operationId: interest-bearing-v1-savings-account-attach-program
      parameters:
        - $ref: '#/components/parameters/programIdPath'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavingsAccountAttachRequest'
      responses:
        '204':
          description: Success - No Content
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/accounts/{accountId}/average-balance:
    post:
      tags:
        - Average balance
      summary: Calculate average balance
      description: >
        Calculates an average balance for an account.<br>

        Using this endpoint, you can specify a datetime range and calculate the
        [average
        balance](https://www.investopedia.com/terms/a/average-balance.asp) of an
        account over that period. This involves multiplying the balance by the
        number of days it has remained unchanged, summing the results, and then
        dividing them by the total number of days in the specified period.
      operationId: interest-bearing-calculate-average-balance
      parameters:
        - $ref: '#/components/parameters/idempotencyHeader'
        - $ref: '#/components/parameters/accountId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateAverageBalanceRequest'
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateAverageBalanceResponse'
          description: Accepted
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
    get:
      tags:
        - Average balance
      summary: Get average balance
      description: |
        Retrieves an already calculated average balance for an account.
      operationId: interest-bearing-get-average-balance
      parameters:
        - $ref: '#/components/parameters/idempotencyHeader'
        - $ref: '#/components/parameters/accountId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAverageBalanceResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
security:
