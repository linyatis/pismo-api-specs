  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /v1/transactions/{merchantTransactionId}/split:
    post:
      summary: Create split request
      description: >
        Create a new split request for a merchant transaction.<br>

        Managing financial transactions often requires dividing a single
        transaction into multiple parts for accurate record-keeping and
        reporting. The split transaction feature addresses this need by allowing
        you to split a transaction into different categories or assign portions
        to various accounts. This functionality is particularly useful for
        handling shared expenses, allocating costs across different budget
        categories, or separating business and personal expenses.

        When a split request is created, it's created with a `PENDING` status.
        Before you request a split, make sure the merchant transaction is
        already in the `WAITING_SPLIT` status.<br>

        This endpoint generates a [Merchant transaction
        created](https://developers.pismo.io/events/docs/merchants-merchant-transaction-created-1)
        event.
      tags:
        - Split requests
      operationId: post-split-request
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/merchantTransactionIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SplitRequestPostSaleRequest'
            examples:
              split-request-post:
                $ref: '#/components/examples/SplitRequestPostSaleRequest'
      responses:
        '202':
          $ref: '#/components/responses/202CreateSplitRequestAccepted'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/transactions/{merchantTransactionId}/split/cancel:
    post:
      summary: Cancel split request
      description: >
        Cancel a merchant transaction split request.<br>

        This endpoint generates a [Merchant transaction
        created](https://developers.pismo.io/events/docs/merchants-merchant-transaction-created-1)
        event.
      tags:
        - Split requests
      operationId: cancel-split-request
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/merchantTransactionIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SplitRequestPostCancelRequest'
            examples:
              split-request-post:
                $ref: '#/components/examples/SplitRequestPostCancelRequest'
      responses:
        '202':
          $ref: '#/components/responses/202CancelSplitRequestAccepted'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/marketplaces/{marketplaceId}/split-requests:
    get:
      summary: List split requests
      description: List split requests for a given marketplace.
      tags:
        - Split requests
      operationId: get-split-requests
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/marketplaceIdPath'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery'
        - $ref: '#/components/parameters/startDateQuery'
        - $ref: '#/components/parameters/endDateQuery'
      responses:
        '200':
          $ref: '#/components/responses/200SplitRequestListResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/marketplaces/{marketplaceId}/split-requests/{splitId}:
    get:
      summary: Get split request details
      description: Get the details of a specific split request in a marketplace.
      tags:
        - Split requests
      operationId: get-split-details
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/splitIdPath'
        - $ref: '#/components/parameters/marketplaceIdPath'
      responses:
        '200':
          $ref: '#/components/responses/200SplitRequestGetDetails'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/marketplaces/{marketplaceId}/split-requests/{parentId}/totals:
    get:
      summary: Get split request totals
      description: >
        Get the total amount for a specific split request in a marketplace.<br>

        This endpoint returns the gross amount for a specific parent split
        request with the `PROCESSED` status. It also return the gross amount for
        each participating merchant, as well as marketplace merchants.
      tags:
        - Split requests
      operationId: get-sale-split-request-totals
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/parentIdPath'
        - $ref: '#/components/parameters/marketplaceIdPath'
      responses:
        '200':
          $ref: '#/components/responses/200SplitRequestGetTotalsResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/marketplaces/{marketplaceId}/merchants/{merchantId}/balance:
    get:
      summary: Get merchant balance
      description: >
        The merchant balance endpoint provides an estimate of the available
        funds in the merchant account on a specified target date. It takes into
        account the scheduled merchant transactions in the specified marketplace
        to calculate the estimated values.


        `estimated_available_amount` represents the forecasted amount that might
        be available to the merchant on the target date, based on the current
        scheduled transactions. This estimate is subject to change due to
        cancellations, new transactions, and advancements made by the merchant
        until the target date arrives.


        If the merchant's scheduled balance is negative, the amount accumulates
        in the `scheduled_amount` field until it becomes positive and is
        available for settlement. Therefore, a negative `scheduled_amount` is
        not considered for settlement until it turns positive.
      tags:
        - Balance
      operationId: get-merchant-balance
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/marketplaceIdPath'
        - $ref: '#/components/parameters/merchantIdPath'
        - $ref: '#/components/parameters/balanceDateQuery'
      responses:
        '200':
          $ref: '#/components/responses/200GetMerchantBalanceResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/marketplaces/{marketplaceId}/merchants/{merchantId}/transactions:
    post:
      summary: Create merchant transaction
      description: >
        Create a new merchant transaction (sale) for a specific merchant
        associated with a marketplace.


        This endpoint allows for the creation of merchant sale transactions with
        installment support, MDR calculations, and scheduled payment dates. The
        default status is **SCHEDULED**. However, if the merchant is a
        marketplace scheduler, the transaction will automatically be set to
        **WAITING_SPLIT** status.


        This endpoint generates a [Merchant transaction
        created](https://developers.pismo.io/events/docs/merchants-merchant-transaction-created-1)
        event.
      tags:
        - Merchant transactions
      operationId: post-merchant-transaction-sale
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/marketplaceIdPath'
        - $ref: '#/components/parameters/merchantIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantTransactionSalePostRequest'
            examples:
              merchant-transaction-sale-post:
                $ref: '#/components/examples/MerchantTransactionSalePostRequest'
      responses:
        '201':
          $ref: '#/components/responses/201MerchantTransactionListResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/marketplaces/{marketplaceId}/merchants/{merchantId}/transactions/cancel:
    post:
      summary: Cancel merchant transaction
      description: >
        Cancel a previously created merchant transaction.


        This endpoint allows for the creation of cancellation transactions that
        reverse the financial impact of original sale transactions.

        Cancellation transactions maintain negative amounts of all financial
        values (amount, MDR, fees) and reference the original transaction via
        origin_merchant_transaction_id.


        When the original transaction was split, the cancellation status is
        automatically set to WAITING_SPLIT, otherwise it follows the default
        status (SCHEDULED).


        This endpoint generates a [Merchant transaction
        created](https://developers.pismo.io/events/docs/merchants-merchant-transaction-created-1)
        event.
      tags:
        - Merchant transactions
      operationId: post-merchant-transaction-cancel
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/marketplaceIdPath'
        - $ref: '#/components/parameters/merchantIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantTransactionCancelPostRequest'
            examples:
              merchant-transaction-cancel-post:
                $ref: '#/components/examples/MerchantTransactionCancelPostRequest'
      responses:
        '201':
          $ref: '#/components/responses/201MerchantTransactionListResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServerError'
