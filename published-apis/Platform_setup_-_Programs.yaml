      tags:
        - Export and import
      x-codegen-request-body-name: programExportRequest
      requestBody:
        description: Program export request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramExportRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramExport'
        '400':
          $ref: '#/components/responses/400BadRequest'
    get:
      summary: List exported programs
      description: >
        Get your organization's exported programs in a paginated list. The
        organization ID is parsed from the token.
      operationId: getProgramExport
      tags:
        - Export and import
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PerPageQuery'
        - $ref: '#/components/parameters/OrderQuery'
        - $ref: '#/components/parameters/OrderByQuery'
