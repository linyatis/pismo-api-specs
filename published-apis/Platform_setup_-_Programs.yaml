    ProgramParameterCategory:
      type: string
      description: >
        Program parameter categories. When passing as a parameter, use `,` as
        separator. 

        `CREDITO` - Credit

        `TAXA` -  Tax

        `TARIFA` -  Fee

        `PARAMETRO` -  Parameter

        `ARQUIVOS` -  Archives

        `COBRANCA` -  Collection

        `FISCAL` -  Fiscal

        `FATURAMENTO` -  Billing

        `CARTAO` -  Card

        `FRAUDE` -  Fraud

        `TIPO DE TRANSACAO` -  Type of transaction
      example: CREDITO
    ProgramParameterDescription:
      type: string
      description: Program parameter description
      example: Turn the control on and off.
    ProgramParameterID:
      type: integer
      format: int64
      description: >
        Program parameter ID. An ID, specific to the program itself, that
        identifies the program's setting for a specific program parameter.


        For example, suppose you have a program parameter named `CONTROL
        EXPIRATION CHANGES`, and its `id` is `15`. One program might set the
        value for that parameter like this:

        ```json

        {
          "account_parameter": false,
          "category": "PARAMETER",
          "description": "Turn the control on and off.",
          "id": 2,
          "parameter_id": 15,
          "name": "CONTROL EXPIRATION CHANGES",
          "type": "DECIMAL",
          "valid_from": "2020-01-01T00:00:00.000Z",
          "valid_until": "2020-12-31T23:59:59.999Z",
          "value": 0
        }

        ```


        Another program might set the value for same program parameter like
        this:

        ```json

        {
          "account_parameter": false,
          "category": "PARAMETER",
          "description": "Turn the control on and off.",
          "id": 4,
          "parameter_id": 15,
          "name": "CONTROL EXPIRATION CHANGES",
          "type": "DECIMAL",
          "valid_from": "2020-02-04T00:00:00.000Z",
          "valid_until": "2020-11-25T22:36:55.999Z",
          "value": 1
        }

        ```


        In both cases, `parameter_id` is `15` because the programs are setting
        the same program parameter - the one with `id` = `15`. However, the `id`
        value is different for each program, because it is used to identify that
        program's specific parameter setting.
      example: 1
    ProgramParameterName:
      type: string
      maxLength: 50
      description: >
