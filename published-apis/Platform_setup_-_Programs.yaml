paths:
  /programs/v1/programs/template:
    post:
      summary: Create program
      description: >
        Create a program synchronously. 


        For more information about programs, refer to [Core
        objects](doc:setup-overview#program).


        This endpoint executes synchronously, meaning, a network timeout or
        similar network delay could occur. In this case, an error is generated.
        To avoid this possibility, call the [Create program
        (async)](ref:createprogrambasedontemplateasync) endpoint instead.


        Thie endpoint generates a [Program
        created](https://developers.pismo.io/events/docs/programs-creation-1)
        event. 


        To get your Organization's programs, call the [List
        programs](ref:programs-1) endpoint, or view them in the [Pismo Control
        Center](doc:get-started-with-control-center).
      operationId: CreateProgramBasedOnTemplate
