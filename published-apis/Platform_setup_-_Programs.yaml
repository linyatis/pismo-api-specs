  /programs/v1/programs/export:
    post:
      summary: Export program
      description: >
        Export a program to a JSON file. 


        While this endpoint returns an immediate response, it also kicks off an
        asynchronous export process. You can check its progress with the [Get
        program export record](ref:getprogramexportrecord) endpoint. When done,
        the program status changes to `SUCCESS`. 


        To download the exported file, call [Download exported
        program](ref:getprogramexportdownload).
