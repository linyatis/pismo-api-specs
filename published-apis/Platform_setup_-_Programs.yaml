openapi: 3.1.0
info:
  title: Platform setup - Programs
  description: Endpoints to handle Programs
  version: v1.0
  contact:
    name: Pismo Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io
    description: Sandbox API server for testing.
tags:
  - name: Programs
    description: Create and manage programs
  - name: Parameters
    description: Manage program parameters
  - name: Export and import
    description: Export and import programs
components:
  parameters:
    BeginDateQuery:
      name: beginDate
      in: query
      description: >-
        Return programs exported on or after this date. Format =
        yyyy-mm-ddThh:mm:ss.
      schema:
        type: string
      example: '2021-09-22T15:00:00Z'
    BinValueQuery:
      name: binValue
      in: query
      description: >-
        Bank Identification Number (BIN) value filter. Card network-issued 6 or
        8 digit value identifying the card network, issuer, and product.
      schema:
        type: string
        maxLength: 8
      example: '123456'
    EndDateQuery:
      name: endDate
      in: query
      description: >-
        Return programs exported on or before this date. Format =
        yyyy-mm-ddThh:mm:ss.
      schema:
        type: string
      example: '2021-09-22T15:00:00Z'
    LanguageQuery:
      name: language
      in: query
      description: |
        Allows localization object content to be localized as specified.
        * `en-US` - US English
        * `pt-BR` - Brazilian Portuguese
      schema:
        type: string
        enum:
          - en-US
          - pt-BR
      example: en-US
    OrderByQuery:
      name: orderBy
      in: query
      description: Field to sort on. Default = `ID`.
      schema:
        type: string
        enum:
          - ID
          - NAME
      example: NAME
    OrderQuery:
      name: order
      in: query
      description: Sort order. Default = `ASC`.
      schema:
        type: string
        enum:
          - ASC
          - DESC
      example: DESC
    PageQuery:
      name: page
      in: query
      description: Current page number. Must be greater than `0`. Default = `1`.
      schema:
        type: integer
        format: int32
      example: 2
    PerPageQuery:
      name: perPage
      in: query
      description: >-
        Maximum number of items per page. Must be greater than `0`. Default =
        `10`.
      schema:
        type: integer
        format: int32
      example: 20
    ProgramParameterCategoryQuery:
      name: category
      in: query
      description: |
        One or more program parameter categories. Use `,` as separator. 
        `CREDITO` - Credit
        `TAXA` - Tax
        `TARIFA` -  Fee
        `PARAMETRO` - Parameter
        `ARQUIVOS` - Archives
        `COBRANCA` - Collection
        `FISCAL` - Fiscal
        `FATURAMENTO` - Billing
        `CARTAO` - Card
        `FRAUDE` - Fraud
        `TIPO DE TRANSACAO` -  Type of transaction
      schema:
        type: string
      example: CREDITO
    ProgramIdPath:
      description: Program ID
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
      example: 12345
    ProgramImportIdPath:
      description: Program import ID
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
      example: 12345
    ProgramExportIdPath:
      description: Exported program ID
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
      example: 12345
    ProgramIdPath2:
      name: program_id
      in: path
      description: Program ID
      required: true
      schema:
        type: integer
        format: int64
      example: 12345
    ProgramIdQuery:
      name: id
      in: query
      description: Program ID filter
      schema:
        type: integer
        format: int64
      example: 12345
    ProgramNameQuery:
      name: name
      in: query
      description: Program name filter
      schema:
        type: string
        maxLength: 50
      example: Pismolabs
    ProgramNamesQuery:
      name: names
      in: query
      description: One or more program names. Use `,` as separator.
      schema:
        type: string
      example: Pismolabs, Acme Testing
    ProgramParameterIdPath:
      name: program_parameter_id
      in: path
      description: >
        Program parameter ID. Parameter IDs can change depending on the
        environment and, consequently, are not listed in the [program parameters
        reference table](doc:program-parameters-reference-table). Call [List
        program parameters](ref:programparameter) endpoint to get the IDs
        (`parameter_id` in the response) for your program parameters. 
      required: true
      schema:
        type: integer
        format: int64
      example: 23
    ProgramStatusQuery:
      name: status
      in: query
      description: >-
        Program status filter. Can be `ACTIVE` and/or `INACTIVE`. Use ',' as
        separator.
      schema:
        type: string
      example: ACTIVE
    ProgramStatusQuery2:
      name: status
      in: query
      description: >-
        Program status. Possible values are `PENDING`, `PROCESS`, `SUCCESS`,
        and/or `ERROR`. Use `,` as separator.
      schema:
        type: string
      example: PENDING
    ProgramTypeQuery:
      name: type
      in: query
      description: >
        Program type:
          `CREDITO` — Full balance credit accounts
          `PRE-PAGO` — Full balance prepaid accounts
          `DEBITO` — Full balance debit accounts
          `MERCHANT` — Merchant accounts
          `CREDITO ZERO-BALANCE` — Zero balance credit accounts
          `PRE-PAGO ZERO-BALANCE` — Zero balance prepaid accounts
          `DEBITO ZERO-BALANCE` — Zero balance debit accounts
          `CURRENT ACCOUNTS` — Current accounts
          `INTERNAL ACCOUNTS` — Internal accounts
          `CORRESPONDENT ACCOUNTS` — Correspondent accounts   
          `VOUCHER` - Prepaid voucher meal/food card

        For more information, refer to [Program
        types](https://developers.pismo.io/pismo-docs/docs/program-types).
      schema:
        type: string
        enum:
          - CREDITO
          - PRE-PAGO
          - DEBITO
          - MERCHANT
          - CREDITO ZERO-BALANCE
          - PRE-PAGO ZERO-BALANCE
          - DEBITO ZERO-BALANCE
          - CURRENT ACCOUNTS
          - INTERNAL ACCOUNTS
          - CORRESPONDENT ACCOUNTS
          - VOUCHER
        maxLength: 30
      example: CURRENT ACCOUNTS
    RequiredQuery:
      name: required
      in: query
      description: Can be `REQUIRED` and/or `OPTIONAL`. Use `,` as separator.
      schema:
        type: string
      example: REQUIRED
    SearchQuery:
      name: search
      in: query
      description: Filter for provided text in the localization object's `name` field.
      schema:
        type: string
      example: test
    TextQuery:
      name: text
      in: query
      description: >-
        Filter items with provided text in the program name or the base program
        name.
      schema:
        type: string
        maxLength: 50
      example: Pismo test
    UserQuery:
      name: user
      in: query
      description: User filter
      schema:
        type: string
        maxLength: 255
      example: Test User
    ValidFromQuery:
      name: validFrom
      in: query
      description: >-
        Return results greater than or equal to the parameter's expiration date.
        Format = yyyy-mm-ddThh:mm:ss.
      schema:
        type: string
      example: '2021-07-06T13:11:05Z'
    ValidUntilQuery:
      name: validUntil
      in: query
      description: >-
        Return results less than or equal to the parameter expiration date.
        Format = yyyy-mm-ddThh:mm:ss.
      schema:
        type: string
      example: '2021-07-06T13:11:05Z'
  schemas:
    AccountParameterBoolean:
      type: boolean
      description: Can the parameter be customized at both the account and program levels?
      example: false
    Assignor:
      type: object
      description: Assignor
      properties:
        id:
          type: integer
          format: int64
          description: |
            Assignor ID. Assignors are configured at the program level.
        name:
          type: string
          description: Assignor name
    BaseProgramID:
      type: integer
      format: int64
      description: ID of program that was used to create this program.
      example: 2
    Bin:
      type: object
      description: >
        Bank Identification Number (BIN) object. **REQUIRED** for card-issuing
        programs. 
      properties:
        start_range:
          type: string
          description: BIN range start.  **REQUIRED** for card-issuing programs.
          example: '0'
        end_range:
          type: string
          description: BIN range end.  **REQUIRED** for card-issuing programs.
          example: '999999999'
        value:
          type: string
          description: |
            Card network-issued Bank Identification Number (BIN). 
            6 or 8-digit BIN identifying the card network, issuer, and product.
             **REQUIRED** for card-issuing programs.
          example: '999999'
    Brand:
      type: string
      description: |
        Program's card brand.  **REQUIRED** for card-issuing programs.
      enum:
        - VISA
        - MASTERCARD
        - ELO
        - RUPAY
        - PRIVATE
        - CABAL
        - GOODCARD
      example: VISA
    BrandData:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: |
            Brand ID. 
        description:
          type: string
          description: Program's card brand.  **REQUIRED** for card-issuing programs.
          enum:
            - VISA
            - MASTERCARD
            - ELO
            - RUPAY
            - PRIVATE
            - CABAL
            - GOODCARD
          example: VISA
        pci:
          type: boolean
          description: Is specified program PCI (Payment Card Industry)?
          example: true
    Channel:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: >
            Acquisition channel ID. ID of How the customer was referrred, such
            as from a web page or mobile app. Acquisition channels are
            configured at the program level.
        name:
          type: string
          description: Customer-supplied acquistion channel name
        type:
          type: string
          description: |
            Customer-supplied Acquisition channel type.
    Channels:
      type: array
      description: Program channels
      items:
        $ref: '#/components/schemas/Channel'
    CopyProgram:
      type: object
      required:
        - base_program_id
        - name
        - timezone
        - currency_numeric_code
        - country_code
      properties:
        base_program_id:
          $ref: '#/components/schemas/BaseProgramID'
        name:
          $ref: '#/components/schemas/ProgramName'
        timezone:
          $ref: '#/components/schemas/TimeZone'
        currency_numeric_code:
          $ref: '#/components/schemas/CurrencyNumericCode'
        country_code:
          $ref: '#/components/schemas/CountryCode'
        due_dates:
          $ref: '#/components/schemas/DueDates'
        brand:
          $ref: '#/components/schemas/Brand'
        bin:
          $ref: '#/components/schemas/Bin'
        language:
          $ref: '#/components/schemas/ProgramLanguage'
        cycle_closing:
          $ref: '#/components/schemas/ProgramCycleClosing'
        holiday_calendar_id:
          $ref: '#/components/schemas/ProgramHolidayCalendarId'
    CountryCode:
      type: string
      description: >-
        <a href="https://en.wikipedia.org/wiki/ISO_3166-1_alpha-3"
        target="_blank">ISO 3166 Alpha-3</a> program country code. For example,
        `BRA` = Brazil.
      example: BRA
    CreatedAt:
      type: string
      description: Program creation datetime. Format = yyyy-mm-ddThh:mm:ss.
      example: '2021-07-06T13:11:05Z'
    CreateProgramParameter:
      type: object
      required:
        - parameter_name
      properties:
        parameter_name:
          $ref: '#/components/schemas/ProgramParameterName'
    CreateProgramParameterResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ProgramParameterID'
        parameter_name:
          $ref: '#/components/schemas/ProgramParameterName'
        value:
          $ref: '#/components/schemas/FloatParameterValue'
        valid_from:
          $ref: '#/components/schemas/ValidFrom'
        status:
          $ref: '#/components/schemas/ProgramParameterStatus'
    CSS:
      type: string
      description: Card image. [Legacy - restricted]
    CurrentPage:
      type: integer
      format: int32
      description: Current page
      example: 1
    CurrencyNumericCode:
      type: string
      description: Program ISO 4217 currency code.
      example: '986'
    DueDateActiveBoolean:
      type: boolean
      description: Is due date active?
      example: true
    DueDateDay:
      type: integer
      format: int32
      description: Day of the month (1 to 28) for the statement due date.
      example: 10
    DueDateID:
      type: integer
      format: int64
      description: Due date ID
      example: 1234
    DueDates:
      type: array
      description: >
        Array of available program due dates. Every program account specifies a
        due date to use.


        A due date is **REQUIRED** for Full balance credit programs.


        For each due date, `day` and `active` are **REQUIRED**, as in the
        following example:

        ```

        {
            "due_dates": [
                  {
                    "day": 1,
                    "active": true
                  },
                  {
                    "day": 2,
                    "active": false
                  }
            ]
        }

        ```

        **Note:** The due date ID is passed as a **numeric value**. For example,
        for due date `1` (first day of the month) the ID could be something like
        `3063`. This is the value you should use. `day` must be between 1 and
        28.
      items:
        $ref: '#/components/schemas/ProgramDueDate'
    DueDatesPatch:
      type: array
      items:
        $ref: '#/components/schemas/ProgramDueDatePatch'
    ExistsAccountBoolean:
      type: boolean
      description: Is there a related account?
      example: true
    ExportCreatedAt:
      type: string
      description: Program export creation datetime. Format = yyyy-mm-ddThh:mm:ss.
      example: '2023-07-10 15:30:14'
    ExporterDetails:
      type: string
      description: Program exporter details
      example: Details of program export 484
    ExportFileUrl:
      type: string
      description: File URL for download export
      nullable: true
      example: export/TN-00001/484/export.json
    ExportFinishedAt:
      type: string
      description: Datetime when program export finished. Format = yyyy-mm-ddThh:mm:ss.
      example: '2023-07-10 18:31:18'
    ExportStepDetails:
      type: string
      description: Export step details
      example: Export step details
    ExportStepID:
      type: integer
      format: int32
      description: Program export step ID
      example: 45
    ExportStepOrder:
      type: integer
      format: int32
      description: Program export step order, with `1` as the highest.
      example: 1
    ExportStepStatus:
      type: string
      description: Program export step status
      enum:
        - PENDING
        - PROCESS
        - SUCCESS
        - ERROR
      example: PENDING
    ExportUser:
      type: string
      description: User who created the export's email address
      example: example@pismo.io
    FloatParameterValue:
      type: number
      format: float
      description: Parameter value
      example: 1.5
    handler.HTTPError:
      type: object
      properties:
        code:
          type: string
          description: Bad request code
          example: EOA0017
        message:
          type: string
          description: Bad request response
          example: Bad Request
    ImportExportStepName:
      type: string
      description: >
        Program export step name


        Steps per [program type](doc:program-types): 


        Key: FBC = Full balance (FB) credit, ZBC = Zero balance (ZB) credit, FBD
        = FB debit, ZBD = ZB debit, FBPP = FB pre-paid, ZBPP= ZB pre-paid, Corp
        = Corporate


        | Step | FBC | ZBC | FBD | ZBD | FBPP | ZBPP| Corp |

        | ------------------------------|---|---|---|---|---|---|---|

        | `PROGRAM` | X | X | X | X | X | X | X |

        | `DUEDATES` | X |  |  |  |  |  |  |

        | `CHANNELS` | X | X | X | X | X | X |  |

        | `PROGRAMS_PARAMETERS` | X | X | X | X | X | X | X |

        | `TRANSACTIONS_CATEGORIES` | X |  |  |  |  |  |  |

        | `PROGRAMS_TRANSACTION_TYPES` | X |  |  |  |  |  |  |

        | `ORGS_OPERATIONS` | X |  | X |  | X |  | X |

        | `NETWORK_ACCEPTANCES` | X | X |  |  |  |  |  |
      enum:
        - PROGRAM
        - DUEDATES
        - CHANNELS
        - PROGRAMS_PARAMETERS
        - TRANSACTIONS_CATEGORIES
        - PROGRAMS_TRANSACTION_TYPES
        - ORGS_OPERATIONS
        - NETWORK_ACCEPTANCES
      maxLength: 50
      example: PROGRAM
    ImportFileUrl:
      type: string
      description: >-
        File URL for downloading the import. Contains part of the path and JSON
        file name.
      example: https://programs-api.s3.amazonaws.com/TENANT/import/file.json
    ImportFinishedAt:
      type: string
      description: When program import finished. Format = yyyy-mm-ddThh:mm:ss.
      example: '2021-09-22T15:45:00Z'
    ImportStartedAt:
      type: string
      description: Program import start datetime. Format = yyyy-mm-ddThh:mm:ss.
      example: '2021-09-22T15:00:00Z'
    ImportStepDetails:
      type: string
      description: Program import step details
      example: Import step details
    ImportStepID:
      type: integer
      format: int64
      description: Program import step ID
      example: 12
    ImportStepOrder:
      type: integer
      format: int32
      description: >-
        Program import step order. For example, `1` = first step, `2`  = second,
        and so on.
      example: 1
    ImportStepStatus:
      type: string
      description: Program import step status
      enum:
        - PENDING
        - PROCESS
        - SUCCESS
        - ERROR
      example: SUCCESS
    InitialCardStatus:
      type: string
      enum:
        - CREATED
        - BLOCKED
        - UNBLOCKED
      description: Initial status for cards created in this program.
      example: CREATED
    LegacyBoolean:
      type: boolean
      description: Is parameter from a legacy process and kept for compatibility only?
      example: false
    Pages:
      type: integer
      format: int32
      description: Number of pages
      example: 1
    ParameterID:
      description: >
        Parameter ID. Parameter IDs can change depending on the environment and,
        consequently, are not listed in the [program parameters reference
        table](doc:program-parameters-reference-table). Use the [List program
        parameters](ref:programparameter) endpoint to get the IDs
        (`parameter_id` in the response) for your program parameters.
      example: 1
      type: integer
      format: int64
    PerPage:
      type: integer
      format: int32
      description: Maximum items per page
      example: 10
    PrintCardBoolean:
      type: boolean
      description: >-
        Should physical cards be issued by default on creation? Default is
        `false`. [Legacy - restricted]
      example: true
    Program:
      type: object
      properties:
        bin:
          $ref: '#/components/schemas/Bin'
        brand:
          $ref: '#/components/schemas/Brand'
        css:
          $ref: '#/components/schemas/CSS'
        id:
          $ref: '#/components/schemas/ProgramID'
        base_program_id:
          $ref: '#/components/schemas/BaseProgramID'
        initial_card_status:
          $ref: '#/components/schemas/InitialCardStatus'
        name:
          $ref: '#/components/schemas/ProgramName'
        print_card:
          $ref: '#/components/schemas/PrintCardBoolean'
        provider:
          $ref: '#/components/schemas/Provider'
        type:
          $ref: '#/components/schemas/ProgramType'
        url_image:
          $ref: '#/components/schemas/UrlImage'
        currency_numeric_code:
          $ref: '#/components/schemas/CurrencyNumericCode'
        timezone:
          $ref: '#/components/schemas/TimeZone'
        country_code:
          $ref: '#/components/schemas/CountryCode'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        status:
          $ref: '#/components/schemas/ProgramStatus'
        language:
          $ref: '#/components/schemas/ProgramLanguage'
        cycle_closing:
          $ref: '#/components/schemas/ProgramCycleClosing'
        holiday_calendar_id:
          $ref: '#/components/schemas/ProgramHolidayCalendarId'
    ProgramDetails:
      type: object
      properties:
        bin:
          $ref: '#/components/schemas/Bin'
        assignor_charge:
          $ref: '#/components/schemas/Assignor'
        assignor_invoice:
          $ref: '#/components/schemas/Assignor'
        brand:
          $ref: '#/components/schemas/BrandData'
        css:
          $ref: '#/components/schemas/CSS'
        id:
          $ref: '#/components/schemas/ProgramID'
        base_program_id:
          $ref: '#/components/schemas/BaseProgramID'
        initial_card_status:
          $ref: '#/components/schemas/InitialCardStatus'
        name:
          $ref: '#/components/schemas/ProgramName'
        print_card:
          $ref: '#/components/schemas/PrintCardBoolean'
        type:
          $ref: '#/components/schemas/ProgramTypeData'
        url_image:
          $ref: '#/components/schemas/UrlImage'
        currency_numeric_code:
          $ref: '#/components/schemas/CurrencyNumericCode'
        timezone:
          $ref: '#/components/schemas/TimeZone'
        country_code:
          $ref: '#/components/schemas/CountryCode'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        status:
          $ref: '#/components/schemas/ProgramStatus'
        language:
          $ref: '#/components/schemas/ProgramLanguage'
        cycle_closing:
          $ref: '#/components/schemas/ProgramCycleClosing'
        holiday_calendar_id:
          $ref: '#/components/schemas/ProgramHolidayCalendarId'
    ProgramCopyV2Response:
      type: object
      properties:
        program_export_id:
          type: integer
          description: >-
            Through `program_export_id`, it is possible to check the creation
            stage
          example: 1504
        message:
          type: string
          description: Process started message
          example: >-
            Your request has been submitted successfully. It may take some time
            to finish. You can track the progress on the programs dashboard.
    ProgramDueDate:
      type: object
      required:
        - active
        - day
      properties:
        active:
          $ref: '#/components/schemas/DueDateActiveBoolean'
        day:
          $ref: '#/components/schemas/DueDateDay'
        id:
          description: Program due date ID
          type: integer
          format: int64
          example: 12345
    ProgramDueDatePatch:
      type: object
      properties:
        active:
          $ref: '#/components/schemas/DueDateActiveBoolean'
        day:
          $ref: '#/components/schemas/DueDateDay'
    ProgramExportArray:
      type: array
      items:
        $ref: '#/components/schemas/ProgramExport'
    ProgramExportBatchRequest:
      type: object
      required:
        - export_ids
      properties:
        export_ids:
          type: array
          items:
            $ref: '#/components/schemas/ProgramExportID'
          example:
            - 1
            - 2
    ProgramExporterID:
      type: integer
      format: int64
      description: Program exporter ID
      example: 12
    ProgramExporterStatus:
      type: string
      description: Program exporter status
      enum:
        - PENDING
        - PROCESS
        - SUCCESS
        - ERROR
      example: SUCCESS
    ProgramExportID:
      type: integer
      format: int64
      description: Program export ID
      example: 1
    ProgramExportPage:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProgramExport'
        pages:
          $ref: '#/components/schemas/Pages'
        per_page:
          $ref: '#/components/schemas/PerPage'
        total_items:
          $ref: '#/components/schemas/TotalItems'
    ProgramExportRequest:
      type: object
      required:
        - program_id
      properties:
        program_id:
          $ref: '#/components/schemas/ProgramID'
    ProgramExportSteps:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ExportStepID'
        name:
          $ref: '#/components/schemas/ImportExportStepName'
        status:
          $ref: '#/components/schemas/ExportStepStatus'
        order:
          $ref: '#/components/schemas/ExportStepOrder'
        details:
          $ref: '#/components/schemas/ExportStepDetails'
        started_at:
          $ref: '#/components/schemas/StepStartedAt'
        finished_at:
          $ref: '#/components/schemas/StepFinishedAt'
        deleted_at:
          $ref: '#/components/schemas/StepDeletedAt'
    ProgramExportWithStepResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ProgramExporterID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        status:
          $ref: '#/components/schemas/ProgramExporterStatus'
        file_url:
          $ref: '#/components/schemas/ExportFileUrl'
        details:
          $ref: '#/components/schemas/ExporterDetails'
        started_at:
          $ref: '#/components/schemas/ExportCreatedAt'
        finished_at:
          $ref: '#/components/schemas/ExportFinishedAt'
        program_export_steps:
          type: array
          items:
