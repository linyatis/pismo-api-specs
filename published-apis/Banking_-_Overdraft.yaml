openapi: 3.1.0
info:
  title: Banking - Overdraft
  version: 1.0.0
  description: >-
    This API manages overdraft functionality, allowing account holders to
    perform debit transactions even when their balance is insufficient.
    Additionally, it enables the configuration of grace periods and interest
    rates for overdrafts.
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/overdraft
    description: Sandbox API server for testing
security:
  - BearerAuth: []
tags:
  - name: Product
    description: Endpoints that manage overdraft products
  - name: Account
    description: >-
      Endpoints that manage account attachments and detachment of overdraft
      products
components:
  parameters:
    accountIdPath:
      name: accountId
      in: path
      required: true
      schema:
        type: string
      description: Account ID
      example: '123456'
    programIdPath:
      name: programId
      in: path
      required: true
      schema:
        type: string
      description: Program ID
      example: '123456'
    authorizationTokenHeader:
      name: AuthorizationToken
      in: header
      schema:
        type: string
      required: true
      description: >
        Account token. Token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a `401 Unauthorized` error.
      example: '1234'
    productIdPath:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Overdraft product ID
      example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
    xAccountIdHeader:
      name: x-account-id
      in: header
      required: true
      schema:
        type: integer
      description: Pismo account ID
      example: 9812461
  schemas:
    AccountAttachment:
      type: object
      properties:
        account_id:
          type: integer
          description: Pismo account ID
        attach_datetime:
          type: string
          format: date-time
          description: >
            Datetime when the product was attached to the account. Format:
            `YYYY-MM-DDThh:mm:ss.sss`.
        status:
          type: string
          description: Status of the product attachment
        overdraft:
          $ref: '#/components/schemas/Product'
        metadata:
          type: object
          additionalProperties: true
          minLength: 0
          maxLength: 1024
          description: >
            Additional details about the product attachment. The information
            must be in `key:value` pair format. For example,
            `name:<your_name>`.<br>

            `minLength` = `0`

            `maxLength` = `1024`
    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
          description: Overdraft product name. This name is defined by the client.
          example: Overdraft Limit 1000
        interest_plan_id:
          type: string
          format: uuid
          description: >-
            Interest plan ID generated during the plan's creation. Created via
            the [Create interest plan](ref:post-v1-interest-plan-1) endpoint.
          example: b935acaf-886c-4817-8f7c-c2cc3ce4d509
        processing_code:
          $ref: '#/components/schemas/ProcessingCode'
        grace_period:
          type: integer
          description: >-
            Grace period during which you can restore the balance without
            incurring any interest charges. The unit is measured in days.
          example: 10
      required:
        - name
        - interest_plan_id
        - processing_code
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Error code
          example: EOVD0001
        message:
          type: string
          description: Error message
          example: Error
        details:
          type: string
          description: Details about the error
          example: Error details
    ProcessingCode:
      type: object
      properties:
        interest_processing_code:
          type: string
          description: Processing code for interest calculation
          example: '123456'
      required:
        - interest_processing_code
    Product:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          description: >-
            Product ID generated for an overdraft product. Once this ID is
            created, you must link it to your account ID.
        name:
          type: string
          description: Produt name
          example: Overdraft Limit 1000
        interest_plan_id:
          type: string
          format: uuid
          description: >-
            Interest plan ID generated during the plan's creation. Created via
            the [Create interest plan](ref:post-v1-interest-plan-1) endpoint.
        grace_period:
          type: integer
          description: >-
            Grace period during which you can restore the balance without
            incurring any interest charges. The unit is measured in days.
        processing_code:
          $ref: '#/components/schemas/ProcessingCode'
        status:
          type: string
          format: enum
          description: >
            Overdraft product status.<br>

            * `CREATED`: When you successfully created an overdraft product.

            * `ACTIVE`: When you attach your overdraft product to an account or
            a program ID. Once it's attached, the product becomes `ACTIVE`.
          enum:
            - CREATED
            - ACTIVE
        created_at_datetime:
          type: string
          format: date-time
          description: |
            Product created datetime. Format: `YYYY-MM-DDThh:mm:ss.sss`.
    ProductAttachRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          description: Overdraft product ID
          example: 876b2425-9778-4f02-8c50-67683e9a205e
        metadata:
          type: object
          minLength: 0
          maxLength: 1024
          additionalProperties: true
          description: >
            Additional details about the overdraft product. The information must
            be in `key:value` pair format. For example, `name:<your_name>`.<br>

            `minLength` = `0`

            `maxLength` = `1024`
          example:
            key: value
      required:
        - product_id
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
