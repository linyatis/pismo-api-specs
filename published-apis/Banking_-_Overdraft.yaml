paths:
  /v1/overdraft:
    post:
      tags:
        - Product
      summary: Create overdraft product
      description: >
        Create a new overdraft product.<br>

        The overdraft API enables a bank to set an overdraft limit for an
        account when the balance is insufficient. For details, refer to [How
        overdraft works](doc:how-overdraft-works).<br>

        This endpoint generates an [Overdraft product
        created](https://developers.pismo.io/events/docs/overdraft-product-creation-1)
        event.
      operationId: post-overdraft-product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          $ref: '#/components/responses/201CreateOverdraftProductResponse'
        '400':
          $ref: '#/components/responses/400CreateOverdraftProductErrorResponse'
        '404':
          $ref: '#/components/responses/404CreateOverdraftProductErrorResponse'
        '422':
          $ref: '#/components/responses/422CreateOverdraftProductErrorResponse'
        '500':
          $ref: '#/components/responses/500CreateOverdraftProductErrorResponse'
  /v1/overdraft/{productId}:
    get:
      tags:
        - Product
      summary: Get overdraft product
      description: Get details of a specific overdraft product.
      operationId: get-overdraft-product
      parameters:
        - $ref: '#/components/parameters/productIdPath'
      responses:
        '200':
          $ref: '#/components/responses/200GetOverdraftProductResponse'
        '400':
          $ref: '#/components/responses/400GetOverdraftProductErrorResponse'
        '404':
          $ref: '#/components/responses/404GetOverdraftProductErrorResponse'
        '500':
          $ref: '#/components/responses/500GetOverdraftProductErrorResponse'
  /v1/overdraft/accounts/{accountId}/attach:
    post:
      tags:
        - Account
      summary: Attach product to account
      description: >
        Attach an overdraft product to a bank account.<br>

        This endpoint generates an [Overdraft account
        attached](https://developers.pismo.io/events/docs/overdraft-product-account-attach-1)
        event.
      operationId: post-attach-product-to-account
      parameters:
        - $ref: '#/components/parameters/accountIdPath'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductAttachRequest'
      responses:
        '204':
          description: Product attached successfully
        '400':
          $ref: '#/components/responses/400AttachProductToAccountErrorResponse'
        '403':
          $ref: '#/components/responses/403AttachProductToAccountErrorResponse'
        '404':
          $ref: '#/components/responses/404AttachProductToAccountErrorResponse'
        '409':
          $ref: '#/components/responses/409AttachProductToAccountErrorResponse'
        '500':
          $ref: '#/components/responses/500AttachProductToAccountErrorResponse'
  /v1/overdraft/accounts/{accountId}/detach:
    post:
      tags:
        - Account
      summary: Detach product from account
      description: >
        Detach an overdraft product from a bank account.<br>

        This endpoint generates an [Overdraft account
        detached](https://developers.pismo.io/events/docs/overdraft-product-account-detach-1)
        event.
      operationId: post-detach-product-from-account
      parameters:
        - $ref: '#/components/parameters/accountIdPath'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductAttachRequest'
      responses:
        '204':
          description: Product detached successfully
        '400':
          $ref: '#/components/responses/400DetachProductFromAccount'
        '404':
          $ref: '#/components/responses/404DetachProductFromAccountErrorResponse'
        '409':
          $ref: '#/components/responses/409DetachProductFromAccountErrorResponse'
        '500':
          $ref: '#/components/responses/500DetachProductFromAccountErrorResponse'
  /v1/overdraft/attachments/accounts/{accountId}:
    get:
      tags:
        - Account
      summary: Get account attachment
      description: Get the details of an overdraft product attached to an account.
      operationId: get-overdraft-account-attachment
      parameters:
        - $ref: '#/components/parameters/accountIdPath'
        - $ref: '#/components/parameters/authorizationTokenHeader'
        - $ref: '#/components/parameters/xAccountIdHeader'
      responses:
        '200':
          $ref: '#/components/responses/200GetAccountAttachmentResponse'
        '400':
          $ref: '#/components/responses/400GetAccountAttachmentErrorResponse'
        '404':
          $ref: '#/components/responses/404GetAccountAttachmentErrorResponse'
        '500':
          $ref: '#/components/responses/500GetAccountAttachmentErrorResponse'
  /v1/overdraft/programs/{programId}/attach:
    post:
      tags:
        - Program
      summary: Attach product to program
      description: >
        Attach an overdraft product to a program.<br>

        This endpoint generates an [Overdraft program
        attached](https://developers.pismo.io/events/docs/overdraft-product-program-attach-1)
        event.
      operationId: post-attach-product-to-program
      parameters:
        - $ref: '#/components/parameters/programIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductAttachRequest'
      responses:
        '204':
          description: Product attached successfully
        '400':
          $ref: '#/components/responses/400AttachProductToProgramErrorResponse'
        '403':
          $ref: '#/components/responses/403AttachProductToProgramErrorResponse'
        '404':
          $ref: '#/components/responses/404AttachProductToProgramErrorResponse'
        '409':
          $ref: '#/components/responses/409AttachProductToProgramErrorResponse'
        '500':
          $ref: '#/components/responses/500AttachProductToProgramErrorResponse'
