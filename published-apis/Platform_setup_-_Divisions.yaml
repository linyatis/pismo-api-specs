        metadata:
          $ref: '#/components/schemas/Metadata'
    presenter.v2UpdateAdministrativeDivisionRequest:
      description: Data to update an administrative division (transaction banking)
      type: object
      properties:
        name:
          $ref: '#/components/schemas/AdminDivisionName'
        type:
          $ref: '#/components/schemas/AdminDivisionType'
        parent_id:
          $ref: '#/components/schemas/AdminDivisionParentID'
        external_id:
          $ref: '#/components/schemas/AdminDivisionExternalID'
        working_days:
          $ref: '#/components/schemas/WorkingDays'
        metadata:
          $ref: '#/components/schemas/Metadata'
    ProgramTypeObject:
      type: object
      properties:
        id:
          type: integer
          description: Program type ID
          example: 1
        description:
          type: string
          description: Program type description.
          example: Full balance credit progra,m
    ProgramTypeString:
      type: string
      description: Program type.
      example: CREDITO
    WorkingDays:
      type: array
      description: >
        Week days that are working days where `0` = Sunday and `6` = Saturday.
        The default - [1,2,3,4,5] - corresponds to Monday through Friday.
      items:
        type: integer
      example:
        - 1
        - 2
        - 3
        - 4
        - 5
  responses:
    400InvalidRequest:
      description: Invalid request or validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/handler.HTTPError'
    401UnauthorizedError:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/handler.HTTPError'
    404DivisionNotFound:
      description: Division not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/handler.HTTPError'
    409DivisionAlreadyExists:
      description: Division code already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/handler.HTTPError'
    500InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/handler.HTTPError'
  securitySchemes:
    S2SAuthentication:
      type: http
      scheme: bearer
      description: All requests must be previously authenticated with an account token.
  examples:
    MissingTenantResponse:
      value:
        code: '400'
        message: Missing x-tenant header
    InvalidParamsResponse:
      value:
        code: '400'
        message: Invalid {parameter_name} parameter value
    HierarchyLoopResponse:
      value:
        code: '400'
        message: >-
          The parent_id {parent_id} causes a circular hierarchy loop with the
          administrative_division id {id}.
    InternalServerErrorResponse:
      value:
        code: '500'
        message: >-
          The parent_id {parent_id} causes a circular hierarchy loop with the
          administrative_division id {id}.
    NotFoundResponse:
      value:
        code: '404'
        message: '{target_name} not found'
    ConflictResponse:
      value:
        code: '409'
        message: '{target_name} already exists'
