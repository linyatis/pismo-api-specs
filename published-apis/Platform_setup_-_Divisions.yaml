        external_id:
          $ref: '#/components/schemas/AdminDivisionExternalID'
        name:
          $ref: '#/components/schemas/AdminDivisionName'
        parent_id:
          $ref: '#/components/schemas/AdminDivisionParentID'
        type:
          $ref: '#/components/schemas/AdminDivisionType'
        working_days:
          $ref: '#/components/schemas/WorkingDays'
        metadata:
          $ref: '#/components/schemas/Metadata'
    presenter.v2CreateAdministrativeDivisionRequest:
      type: object
      description: Data to create an administrative division (transaction banking)
      required:
        - name
        - type
      properties:
        name:
          $ref: '#/components/schemas/AdminDivisionName'
        type:
          $ref: '#/components/schemas/AdminDivisionType'
        parent_id:
          $ref: '#/components/schemas/AdminDivisionParentID'
        external_id:
          $ref: '#/components/schemas/AdminDivisionExternalID'
        parent_external_id:
          $ref: '#/components/schemas/AdminDivisionParentExternalID'
        working_days:
