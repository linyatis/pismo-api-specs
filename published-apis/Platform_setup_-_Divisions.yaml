          $ref: '#/components/schemas/DivisionTimezone'
        language:
          $ref: '#/components/schemas/DivisionLanguage'
        country_code:
          $ref: '#/components/schemas/CountryCode'
        currency_numeric_code:
          $ref: '#/components/schemas/CurrencyCode'
        end_of_day:
          $ref: '#/components/schemas/EndOfDay'
        holiday_group_id:
          $ref: '#/components/schemas/HolidayGroupID'
    presenter.v1AdministrativeDivisionResponse:
      type: object
      description: Administrative division data.
      properties:
        id:
          $ref: '#/components/schemas/AdminDivisionID'
        name:
          $ref: '#/components/schemas/AdminDivisionName'
        type:
          $ref: '#/components/schemas/AdminDivisionType'
        parent_id:
          $ref: '#/components/schemas/AdminDivisionParentID'
        external_id:
          $ref: '#/components/schemas/AdminDivisionExternalID'
    presenter.v1CreateAdministrativeDivisionRequest:
      type: object
      description: Data to create an administrative division
      required:
        - name
        - type
      properties:
        name:
          $ref: '#/components/schemas/AdminDivisionName'
        type:
          $ref: '#/components/schemas/AdminDivisionType'
        parent_id:
          $ref: '#/components/schemas/AdminDivisionParentID'
        external_id:
          $ref: '#/components/schemas/AdminDivisionExternalID'
        external_id_reference:
          $ref: '#/components/schemas/AdminDivisionExternalIdReference'
    presenter.v1CreateAdministrativeDivisionResponse:
      description: Administrative division creation response
      type: object
      properties:
        id:
          $ref: '#/components/schemas/AdminDivisionID'
        external_id:
          $ref: '#/components/schemas/AdminDivisionExternalID'
        name:
          $ref: '#/components/schemas/AdminDivisionName'
        parent_id:
          $ref: '#/components/schemas/AdminDivisionParentID'
        type:
          $ref: '#/components/schemas/AdminDivisionType'
    presenter.v1UpdateAdministrativeDivisionRequest:
