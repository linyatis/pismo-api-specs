openapi: 3.1.0
info:
  title: Platform setup - Divisions
  description: >-
    Use administrative divisions to align organization territory with business
    needs
  version: v1.0
  contact:
    name: Pismo Support
    url: https://developers.pismo.io/support/
    email: support@pismo.com.br
  termsOfService: https://developers.pismo.io/terms/
  license:
    name: Copyright © 2023 Pismo
    url: https://developers.pismo.io/licenses/
servers:
  - url: https://api-sandbox.pismolabs.io
    description: Sandbox
security:
  - S2SAuthentication: []
tags:
  - name: Administrative divisions
    description: View and manage administrative divisions.
  - name: Administrative divisions V2
    description: View and manage admin divisions for transaction banking
components:
  parameters:
    AdminDivisionIdPath:
      description: Administrative division ID.
      in: path
      name: id
      required: true
      schema:
        type: integer
    AdminDivisionExternalIdPath:
      description: Client-supplied external ID
      in: path
      name: id
      required: true
      schema:
        type: string
    DivisionCodePath:
      description: Division code that identifies division.
      in: path
      name: code
      required: true
      schema:
        type: string
    DivisionCodePath2:
      description: Division code that identifies division.
      in: path
      name: divisionCode
      required: true
      schema:
        type: string
    DivisionCodeQuery:
      in: query
      name: code
      description: >
        Division code filter. A division code is a client-generated ID for
        client monitoring and tracking.
      required: true
      schema:
        type: string
    DivisionIdQuery:
      in: query
      name: id
      description: Division ID filter
      required: false
      schema:
        type: string
    LimitQuery2:
      in: query
      name: limit
      description: >
        Number of results to return per page. Maximum and default is 100 or
        until 1MB is reached.
      required: false
      schema:
        type: string
    NextCursorQuery:
      name: nextCursor
      in: query
      description: >-
        Pagination cursor for the next page. This is the `next_curor` field in
        the response,
      required: false
      schema:
        type: string
    PageQuery:
      description: Page must be greater than `0`. Default = `1`.
      in: query
      name: page
      required: true
      schema:
        type: integer
    PerPageQuery:
      description: PerPage must be greater than `0`. Default = `10`.
      in: query
      name: perPage
      required: true
      schema:
        type: integer
  schemas:
    AdminDivisionExternalID:
      type: string
      description: >-
        Client-supplied external ID. It must comply with the rule
        `^[a-zA-Z0-9-]+$`.
      example: '8675309'
    AdminDivisionExternalIdReference:
      type: string
      description: External ID reference. Must comply with the rule `^[a-zA-Z0-9-]+$`.
      example: CRM-software-ID
    AdminDivisionID:
      type: integer
      description: Admininistrative division ID
      example: 84849
    AdminDivisionName:
      type: string
      description: Administrative division name
      example: Scotland
    AdminDivisionParentID:
      type: integer
      description: Parent ID
    AdminDivisionParentExternalID:
      type: string
      description: Parent external ID. Must comply with the rule `^[a-zA-Z0-9-]+$`.
      example: '8675309'
    AdminDivisionType:
      type: string
      description: Admin division type
      enum:
        - City
        - State
        - Country
      example: State
    CountryCode:
      type: string
      maxLength: 3
      description: ISO 3-letter country code.
      example: BRA
    CurrencyCode:
      type: string
      maxLength: 3
      description: ISO currency numeric code.
      example: '986'
    DivisionCode:
      type: string
      maxLength: 36
      description: >
        Division code ID. This field is client-generated for client monitoring
        and tracking.
      example: DIV-BR-SP-001
    DivisionCreatedAt:
      type: string
      format: date-time
      description: Division creation timestamp.
      example: '2025-05-22T17:45:13.717773Z'
    DivisionDescription:
      type: string
      maxLength: 80
      description: Division description.
      example: Division responsible for operations in the Hong Kong metropolitan area
    DivisionID:
      type: string
      description: Division unique ID
      example: b9a5cc7e-2052-402f-bf81-bbe3964f9f3f
    DivisionLanguage:
      type: string
      maxLength: 5
      description: Division language setting.
      enum:
        - pt-BR
        - en-US
      example: pt-BR
    DivisionName:
      type: string
      maxLength: 40
      description: Division name.
      example: São Paulo Regional Division
    DivisionTimezone:
      type: string
      maxLength: 60
      description: Division timezone in IANA format.
      example: America/Sao_Paulo
    DivisionUpdatedAt:
      type: string
      format: date-time
      description: Division last update timestamp.
      example: '2025-06-01T10:15:00.000000Z'
    EndOfDay:
      type: string
      pattern: ^([01]?[0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$
      description: End of day time in HH:MM:SS format.
      example: '18:00:00'
    handler.HTTPError:
      description: Code and error message.
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
    HasNext:
      type: boolean
      description: Is there a next page?
      example: true
    HolidayGroupID:
      type: integer
      format: int64
      description: Holiday group identifier.
      example: 1
    ItemsCount:
      type: integer
      description: Number of items in the current page
      example: 2
    Metadata:
      type: object
      description: >
        A valid JSON schema as specified in
        [https://json-schema.org/specification.html](https://json-schema.org/specification.html).
        Used to register the rules that are used to authorize the transaction.


        This object uses
        [parameters](doc:posting-transactions-on-holidays#parameters) to specify
        business rules for holidays. For details, see [Posting Transactions on
        Holidays](doc:posting-transactions-on-holidays).
    NextCursor:
      type: string
      description: Cursor for the next page, if available
      example: eyJpZCI6IjEyMyJ9
    pagination.Pagination:
      type: object
      properties:
        pages:
          type: integer
          description: Total number of result pages.
          example: 1
        current_page:
          type: integer
          description: Current result page.
          example: 1
        per_page:
          type: integer
          description: Maximum results per page.
          example: 10
        total_items:
          type: integer
          description: Total number of result items.
          example: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/presenter.v1AdministrativeDivisionResponse'
    presenter.CreateDivision:
      type: object
      required:
        - code
        - name
        - timezone
        - country_code
        - currency_numeric_code
        - program_type
      properties:
        code:
          $ref: '#/components/schemas/DivisionCode'
        name:
          $ref: '#/components/schemas/DivisionName'
        timezone:
          $ref: '#/components/schemas/DivisionTimezone'
        country_code:
          $ref: '#/components/schemas/CountryCode'
        currency_numeric_code:
          $ref: '#/components/schemas/CurrencyCode'
        program_type:
          $ref: '#/components/schemas/ProgramTypeString'
        description:
          $ref: '#/components/schemas/DivisionDescription'
        end_of_day:
          $ref: '#/components/schemas/EndOfDay'
        language:
          $ref: '#/components/schemas/DivisionLanguage'
        holiday_group_id:
          $ref: '#/components/schemas/HolidayGroupID'
    presenter.DivisionDetails:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/DivisionID'
        code:
          $ref: '#/components/schemas/DivisionCode'
        name:
          $ref: '#/components/schemas/DivisionName'
        description:
          $ref: '#/components/schemas/DivisionDescription'
        timezone:
          $ref: '#/components/schemas/DivisionTimezone'
        language:
          $ref: '#/components/schemas/DivisionLanguage'
        country_code:
          $ref: '#/components/schemas/CountryCode'
        currency_numeric_code:
          $ref: '#/components/schemas/CurrencyCode'
        end_of_day:
          $ref: '#/components/schemas/EndOfDay'
        program_type:
          $ref: '#/components/schemas/ProgramTypeObject'
        holiday_group_id:
          $ref: '#/components/schemas/HolidayGroupID'
        created_at:
          $ref: '#/components/schemas/DivisionCreatedAt'
        updated_at:
          $ref: '#/components/schemas/DivisionUpdatedAt'
    presenter.DivisionDetailsPage:
      type: object
      properties:
        has_next:
          $ref: '#/components/schemas/HasNext'
        next_cursor:
          $ref: '#/components/schemas/NextCursor'
        count:
          $ref: '#/components/schemas/ItemsCount'
        items:
          type: array
          description: List of division details
          items:
            $ref: '#/components/schemas/presenter.DivisionDetails'
