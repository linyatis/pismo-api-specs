paths:
  /divisions-core/v1/administrative-division:
    post:
      summary: Create administrative division
      description: >
        Create an administrative division. 


        Administrative divisions are used to divide an organization's territory
        into separate areas. An organization covering Great Britian for example,
        might want to have separate divisions for England, Scotland, and
        Ireland. Each of these countries may have different holidays and need to
        be administered in different ways. 


        There is a [Create administrative division](ref:post-v2-admin-division)
        V2 endpoint designed for transaction banking. For details about the
        differences, refer to [Platform setup - Holidays and administrative
        divisions](doc:platform-setup-holidays#endpoints-for-transaction-banking).
      operationId: post-v1-admin-division
      tags:
        - Administrative divisions
      requestBody:
        content:
          application/json:
            schema:
              $ref: >-
                #/components/schemas/presenter.v1CreateAdministrativeDivisionRequest
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/presenter.v1CreateAdministrativeDivisionResponse
        '400':
          description: Bad request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.HTTPError'
              examples:
                response-missing-tenant:
                  $ref: '#/components/examples/MissingTenantResponse'
                invalid-params-response:
                  $ref: '#/components/examples/InvalidParamsResponse'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          description: Not found error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.HTTPError'
              examples:
                not-found-response:
                  $ref: '#/components/examples/NotFoundResponse'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /divisions-core/v1/administrative-division/external-id/{id}:
