openapi: 3.1.0
info:
  title: Revolving credit - Delinquency
  version: 3.0.0
  description: This project is responsible for account delinquency management
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/delinquency-bucket-api
    description: Sandbox API server for testing
tags:
  - name: Delinquency
    description: Endpoints associated with account delinquency buckets
components:
  schemas:
    CalcMemory:
      type: object
      properties:
        strategy:
          type: string
          description: >
            Strategy used to calculate the delinquency amount

            Defines whether delinquency buckets should be calculated for
            tracking an account's debt.
              0 - Does not calculate
              1 - Calculate and amortize buckets from oldest to newest (DEFAULT)
          enum:
            - DEFAULT
          example: DEFAULT
        mad:
          type: number
          description: Minimum amount due
          example: 52.5
        overdue_amount:
          type: number
          description: Overdue amount
          example: 0
        preivous_bucket_balance:
          type: number
          description: Previous bucket balance
          example: 0
    DelinquencyBucketResponse:
      type: object
      properties:
        statement_id:
          type: integer
          description: Statement ID
          example: 847490277
        cycle_closing_date:
          type: string
          description: Cycle closing date
          example: '2024-01-02T00:00:00.000Z'
        due_date:
          type: string
          description: Due date
          example: '2024-01-02T00:00:00.000Z'
        statement_cycle:
          type: integer
          description: Statement cycle
          example: 1
        delinquencyBucket_id:
          type: integer
          example: 21
          description: Delinquency bucket ID
        calculation_memory:
          $ref: '#/components/schemas/CalcMemory'
        overdue_amount:
          type: number
          description: Overdue amount
          example: 87
        unexpired_bucket:
          type: boolean
          description: Informs if the bucket is unexpired
          example: true
        bucket_amount:
          type: number
          description: Bucket amount
          example: 87
        bucket_balance:
          type: number
          description: Bucket balance
          example: 99
        created_at:
          type: string
          description: Bucket creation date in ISO-8601 UTC time
          format: date-time
          example: '2022-11-09T18:57:49.000Z'
        updated_at:
          type: string
          description: Bucket last updated date in ISO-8601 UTC time
          format: date-time
          example: '2022-11-09T18:57:49.000Z'
    StandardErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: '1020030'
        message:
          type: string
          example: Error message
    DelinquencyBucketListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DelinquencyBucketResponse'
        current_page:
          type: integer
          description: Current page
          format: int32
          example: 1
        per_page:
          type: integer
          description: Number of elements, default is 10
          format: int32
          example: 10
        total_items:
          type: integer
          description: Total elements found for the request
          format: int32
          example: 100
        items_on_page:
          type: integer
          description: Total elements on this page
          format: int32
          example: 5
        pages:
          type: integer
          description: Total pages for the request
          format: int32
          example: 1
        is_last_page:
          type: boolean
          description: Is the current page the last page flag
          example: true
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Account JWT
security:
  - BearerAuth: []
paths:
  /v1/accounts/{accountId}/buckets/{delinquencyBucketId}:
    get:
      tags:
        - Delinquency
      summary: Get delinquency bucket
      description: >
        Get account delinquency bucket given an account ID and bucket ID in the
        path. You can get delinquency bucket IDs from the [List delinquency
        buckets](ref:listdelinquencybuckets) endpoint. You can use delinquency
        buckets to control and manage cardholder delinquency. Buckets are
        created at cycle close. For more information, see the [Delinquency
        buckets](doc:delinquency-buckets) guide.


        **NOTE:** This endpoint requires an account token — an access token
        encoded with an account ID. Tokens can expire quickly, which can result
        in a **401 Unauthorized** message.
      operationId: getdelinquencybuckets
      parameters:
        - name: accountId
          description: Account ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 18898
        - name: delinquencyBucketId
          in: path
          description: >-
            Delinquency bucket ID.  You can get delinquency bucket IDs from the
            [List delinquency buckets](ref:listdelinquencybuckets) endpoint.
          required: true
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelinquencyBucketResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header:
                  description: Missing request header
                  value:
                    code: EX0002
                    message: Missing request header for method parameter of type String
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Internal Server Error:
                  description: Service is unavailable
                  value:
                    code: GN0001
                    message: Service is unavailable
  /v1/accounts/{accountId}/buckets:
    get:
      tags:
        - Delinquency
      summary: List delinquency buckets
      description: >
        Get an account's delinquency buckets with filtering options.

        For more information, see the [Delinquency
        buckets](doc:delinquency-buckets) guide.


        **NOTE:** This endpoint requires an account token — an access token
        encoded with an account ID. Tokens can expire quickly, which can result
        in a **401 Unauthorized** message.
      operationId: listdelinquencybuckets
      parameters:
        - name: accountId
          description: Account ID
          in: path
          required: true
          schema:
            type: integer
            format: int64
            example: 18899
        - name: page
          description: Current page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            example: 1
        - name: perPage
          in: query
          description: Items per page. Default is 10.
          required: false
          schema:
            type: integer
            format: int32
            example: 10
        - name: hasDelinquencyBalance
          in: query
          description: >
            `false` = return all account's existing delinquency buckets.

            `true` = return only delinquency bucket with balance amount greater
            than zero. 

            Default is `false`.
          required: false
          schema:
            type: boolean
            example: true
        - name: allBuckets
          in: query
          description: >
            `true` = return all buckets.

            `false` = return all buckets with DueDate less than today (or
            DueDate null for legacy buckets).

            Default is `false`.
          required: false
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelinquencyBucketListResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header:
                  description: Missing request header
                  value:
                    code: EX0002
                    message: Missing request header for method parameter of type String
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Internal Server Error:
                  description: Service is unavailable
                  value:
                    code: GN0001
                    message: Service is unavailable
