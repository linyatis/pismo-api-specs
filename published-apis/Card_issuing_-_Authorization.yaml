openapi: 3.1.0
info:
  title: Card issuing - Authorization
  version: 1.0.0
  description: Model for network-authorizations-api development - v1.0
  contact:
    name: API Support
    url: https://developers.pismo.io/support
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io
    description: Sandbox API server for testing
  - url: https://api-networktransactions-http-ext.pismolabs.io
    description: Sandbox API server for migration testing
tags:
  - name: Authorizations
components:
  parameters:
    AuthorizationToken:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
      description: >-
        Account token—a token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a <b>401 Unauthorized</b> message.
    CIDheader:
      name: x-cid
      in: header
      schema:
        type: string
      example: be0486e-073a-4f56-80bb-5c400337e721
      description: >
        Authorization correlation ID (CID). The CID is used to link related API
        requests and events. For example, if a user makes an authorization
        request with 10 installments, this generates 1 authorization event and
        10 transaction events all containing the same correlation ID. The
        `x-cid` can help the Pismo engineering team track everything related to
        a call. If a CID isn't passed, it's automatically generated. You can
        find this field in the response header.
    TenantHeader:
      in: header
      name: x-tenant
      description: Organization/tenant ID
      schema:
        type: string
        example: TN-beaecb37-d149-4674-a485-af0d11e40d85
  schemas:
    AdviceReasonCode:
      type: string
      description: >
        If this is an *advice*, this is the reason code. For more information
        about the Advice reason code (DE 60 subfield 01) and Advice detail code
        (DE 60 subfield 02) refer to the network manual. For example, the
        specification for Mastercard can be found in the section "Customer
        Interface Specification
        (2020-MasterCard-CustomerInterfaceSpecification.pdf)".  
    AuthorizationResponse:
      type: object
      description: Authorization response for a credit or debit purchase.
      properties:
        mti:
          $ref: '#/components/schemas/MTI'
        authorization_code:
          type: string
          description: Authorization code.
          example: F0JR9H
        response_code:
          $ref: '#/components/schemas/ResponseCode'
        authorization_date_time:
          type: string
          description: >-
            Authorization date and time in Coordinated Universal Time (UTC),
            i.e., 2020-01-01T10:10:00.000-03:00.
          example: '2020-01-01T10:10:00.000-03:00'
        custom_code:
          $ref: '#/components/schemas/CustomCode'
        match_address:
          type: boolean
          description: >-
            Is cardholder address street and number the same as that contained
            on the platform?
          example: true
          default: false
        match_postal_code:
          type: boolean
          description: >-
            Is cardholder postal code the same as the one contained on the
            platform?
          example: true
          default: false
        postal_five_digits:
          type: boolean
          description: Is this a valid postal code with five digits?
          example: true
          default: false
        no_address_data:
          type: boolean
          description: Is address registered on platform?
          example: true
          default: false
        authorization_id:
          type: integer
          description: Authorization ID
          example: 4923745
        account_id:
          type: integer
          description: Account ID
          example: 24141240
        installment_value:
          type: string
          description: >-
            Installment value. If there are no installments, this is the same as
            `contract_amount`.
          example: '100.00'
        interest_rate:
          type: number
          description: Monthly interest rate
          example: 2
        number_of_installments:
          type: number
          description: Number of installments
          example: 2
        contract_amount:
          type: string
          description: Transaction value
          example: '100.00'
        crediario_responses:
          type: array
          description: If there is more than one installment, this is the data for them.
          items:
            $ref: '#/components/schemas/CrediarioResponse'
          example:
            - installmentValue: '51.86'
              monthlyInterestRate: '2.00'
              totalAmount: '103.72'
              numberOfInstallments: '2'
              feeAmount: '0.00'
              taxesAmount: '0.86'
              taxesPercentageOfTotalAmount: '0.83'
              feePercentageOfTotalAmount: '0.00'
              planType: ''
              annualInterestRate: ''
              monthlyTotalEffectiveCost: ''
              annualTotalEffectiveCost: ''
              installmentDate: ''
              insurance: ''
              insurancePercentageOfTotalAmount: ''
              other: ''
              otherPercentageOfTotalAmount: ''
              totalAmountToMerchant: ''
              merchantAmountPercentage: ''
              reservedForFutureUse: ''
    CancellationRequest:
      type: object
      description: Transaction payload
      properties:
        network_authorization_id:
          type: integer
          description: >-
            Authorization ID—this field is mandatory if the `authorization_code`
            field is not provided.
          example: 1231232
        authorization_code:
          type: string
          description: >-
            Authorization code—this field is mandatory if the
            `network_authorization_id` field is not provided.
          example: 000SHK
        transaction_identifier:
          type: string
          description: Transaction ID
          example: ZZIR8T
        retrieval_reference_number:
          type: string
          description: Number generated by merchant point of sale (POS) system.
          example: '000000000000355'
        card_id:
          type: integer
          description: Transaction card ID
          example: 124123
        origin:
          type: string
          maxLength: 15
          description: >-
            This field identifies the origin of the operation to be cancelled as
            MIGRATION, ONUS, or STRIKER.
          example: ONUS
      required:
        - network_authorization_id
        - authorization_code
        - card_id
    CancellationResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: Success
      required:
        - message
    AuthorizationPaginatedResponse:
      type: object
      properties:
        current_page:
          type: integer
          description: Current page
          example: 1
        per_page:
          type: integer
          description: Records per page
          default: 20
          example: 20
        pages:
          type: integer
          description: Total number of pages.
          example: 1
        total_items:
          type: integer
          description: Total number of items.
          example: 1
        items:
          type: array
          description: Authorization items
          items:
            $ref: '#/components/schemas/AuthorizationPaginatedItemResponse'
    AuthorizationPaginatedItemResponse:
      type: object
      properties:
        correlation_id:
          type: string
          description: >-
            Correlation ID, which is used to link related API requests and
            events. The Pismo engineering team can use this to track everything
            related to a call. If one is not passed, it is automatically
            generated and returned to the client in a response header.
          example: 22222222-2222-2222-2222-222222222222
        id:
          type: integer
          description: Authorization ID
          example: 1
        message_type_indicator:
          $ref: '#/components/schemas/MTI'
        soft_descriptor:
          type: string
          description: >-
            Soft descriptor, which is temporary text displayed on the customer
            statement after a transaction authorization.
          example: Descriptor
        partial_cancellation_total_amount:
          type: string
          description: Total amount of partial cancellation.
          example: '1000.51'
        org_operation_id:
          type: integer
          description: Org operation ID.
          example: 10
        nsu:
          $ref: '#/components/schemas/NSU'
        status_id:
          type: string
          description: Authorization status ID
          example: '1'
        authorization_code:
          type: string
          description: Authorization code
          example: ABC123
        account_id:
          type: integer
          description: Account ID
          example: 123456789
        card_id:
          type: integer
          description: Card ID
          example: 987654321
        cardholder_currency_transaction_amount:
          type: string
          description: Transaction amount in cardholder currency.
          example: '20.78'
        cardholder_currency_code:
          type: string
          description: Cardholder currency code.
          example: '986'
        settlement_currency_code:
          type: string
          description: Three-digit code of the settlement currency.
          example: '840'
        settlement_currency_transaction_amount:
          type: string
          description: Transaction amount in settlement currency.
          example: '4.00'
        entry_mode:
          type: string
          description: Entry mode
          example: '051'
        response_code:
          type: string
          description: Response code
          example: '00'
        merchant_name:
          type: string
          description: Merchant name
          example: Store 007
        merchant_city:
          type: string
          description: Merchant city
          example: Sao Paulo
        merchant_state_or_country:
          type: string
          description: Merchant state or country
          example: BRA
        org_id:
          type: string
          description: Org ID or tenant ID
          example: TN-11111111-1111-1111-1111-111111111111
        retrieval_reference_number:
          type: string
          description: Retrieval reference number
          example: '9999998877'
        original_network_transaction_id:
          type: string
          description: Original network transaction ID or TID
          example: 987ABB
        transmission_datetime:
          type: string
          format: date-time
          description: Transmission date time
          example: '2022-11-30 00:00:00'
        event_datetime:
          type: string
          format: date-time
          description: Event date time
          example: '2023-11-07 15:02:28'
        event_datetime_utc:
          type: string
          description: Event date and time in UTC.
          example: '2023-11-07 18:02:28'
        datetime:
          type: string
          description: Authorization date and time.
          example: '2023-11-07 15:02:28'
        local_currency_code:
          type: string
          description: Three-digit local currency code
          example: '840'
        number_of_installments:
          type: integer
          description: Number of installments
          example: 1
        principal_amount:
          type: string
          description: Principal amount
          example: '20.78'
        local_currency_transaction_amount:
          type: string
          description: Transaction amount in local currency.
          example: '4.00'
        fee_amount:
          type: string
          description: Fee amount.
          example: '0.00'
        cardholder_currency_conversion_rate:
          type: string
          description: Cardholder currency conversion rate.
          example: '5.19000000'
        merchant_category_id:
          type: integer
          format: int32
          description: Merchant Category Code (MCC)
          example: 5199
        processing_code:
          type: string
          description: Processing code
          example: '00'
    ClearingS3path:
      type: string
      description: >
        The clearing settlement file path in the AWS S3 (storage service). The
        composition of this field is: Tenant + from<Network_name> (Visa, Master,
        Tecban, etc.) + specific clearing file name (ServiceB, Base II, T112,
        T464, and so on) + year + julian date + file name. This field must be
        used when the `mti` field equals `clearing` (representing the simulation
        of a clearing settlement file processing).
      example: >-
        TN-c9cccb07-41f7-493c-b796-
        60cc880bff4f/fromVisa/C489639/baseii/2023/105/17275501C489639.txt
    CreateAuthorization:
      type: object
      description: Creates an authorization
      properties:
        card_id:
          type: number
          description: Transaction card ID
          example: 1234567
        entry_mode:
          type: string
          description: >
            Method used for PAN entry to initiate a transaction and the PIN
            entry capabilities. This field is required and must have 3 or 4
            digits. For example, `901` or `9010` for magnetic stripe transaction
            simulation.
          example: '901'
        local_amount:
          type: number
          description: >-
            Local transaction amount in the currency of the place where the
            authorization is requested.
          example: 100.5
        local_currency:
          type: string
          description: >-
            Local ISO 4217 currency code number where transaction occurred. For
            example, 986 (Brazil) or 840 (US).
          enum:
            - '986'
            - '840'
        merchant:
          type: object
          description: Merchant details
          properties:
            name:
              type: string
              description: Merchant name
            city:
              type: string
              description: Merchant city name
            country:
              type: string
              description: >-
                Merchant country code in ISO 3166 format. For example, `BR` or
                `BRA` (Brazil).
            code:
              type: string
              description: Merchant code
            id:
              type: string
              description: Merchant ID
          required:
            - name
          example:
            name: merchantName
            city: São Paulo
            country: BR
            code: '5542'
            id: merchantId
        mti:
          $ref: '#/components/schemas/MTI'
        bin:
          type: string
          description: >-
            A bank identification number (BIN) represents the first four to
            eight digits on a credit card and identifies the financial
            institution that issued the card.
          example: '587498'
        processing_code:
          type: string
          description: >-
            Transaction's effect on the customer account and the type of
            accounts affected. For purchase, use "00"; for withdraw; use "01";
            for refund, use "20"; for payment, use "28".
          enum:
            - '00'
            - '01'
            - '20'
            - '28'
          example: '00'
        atc:
          type: string
          description: >
            Application transaction counter (ATC). The chip card application
            maintains and increments this counter. The ATC provides a sequential
            reference for each transaction.
          example: '0100'
        settlement_amount:
          type: number
          description: >-
            Settlement amount—**must** be the transaction amount in dollar
            currency.
          example: 10.5
        settlement_currency:
          type: string
          description: Settlement ISO 4217 currency code
          example: '840'
        cardholder_billing_amount:
          type: number
          description: Transaction amount in cardholder currency
          example: 11.5
        cardholder_billing_currency:
          type: string
          description: Cardholder ISO 4217 currency code
          example: '840'
        account_type:
          type: string
          description: >-
            Authorization mode being simulated. Use `20` for debit simulation
            and `30` for credit simulation.
          example: '20'
        invoice_address:
          type: string
          description: Invoice address
          example: Avenue Five, 222
        authorization_code:
          type: string
          description: Authorization code
          example: ABCDEF
        retrieval_reference_number:
          type: string
          description: Merchant POS system generated number
          example: '5600001085571'
        nsu:
          $ref: '#/components/schemas/NSU'
        processing_julian_date:
          type: string
          description: >-
            Reconciliation processing date. Format = YYDDD. **REQUIRED** for
            clearing simulations.
          example: '25147'
        acquirer_reference_number:
          type: string
          description: Acquirer generated number
          example: '1234569876541'
        airport_tax:
          type: number
          description: >
            Boarding fee—in a purchase with installments, this value is present
            at first installment. In a purchase without installments, this value
            should not be sent since it is included in the authorization amount.
          example: 3.5
        message_number:
          type: string
          description: >-
            Message number assigned to a clearing message. This **must** be a
            numeric and sequential number.
          example: '123'
        clearing_s3_path:
          $ref: '#/components/schemas/ClearingS3path'
        transaction_identifier:
          type: string
          description: Transaction ID
          example: '589256582795978'
        simule_tokenized_transaction:
          type: boolean
          description: Does the simulation use a tokenized transaction?
          enum:
            - false
            - true
          example: true
          default: false
        cash_back_amount:
          type: number
          description: Cash back amount used to simulate purchase with cash back
          example: 2
        advice_reason_code:
          $ref: '#/components/schemas/AdviceReasonCode'
        advice_detail_code:
          type: string
          description: Advice detail code
          example: '0004'
        wallet_identifier:
          type: string
          description: Wallet ID
          example: '618'
      required:
        - card_id
        - mti
        - local_amount
        - local_currency
        - entry_mode
        - merchant
      example:
        card_id: 4926027
        mti: '0100'
        local_amount: 100.5
        local_currency: '986'
        entry_mode: '901'
        merchant:
          name: merchantName
    InstallmentAuthorization:
      type: object
      description: Create an installment authorization
      properties:
        caller:
          type: string
          description: Name of the network that performed this authorization request
          example: MASTERCARD, VISA, or TECBAN
        card_id:
          type: number
          description: Identifier of the card used for the transaction.
          example: 1234567
        mti:
          type: string
          description: >-
            Message type indicator that defines which flows are going to be
            performed, such as authorization, cancellation, or clearing
          example: '0100'
        local_amount:
          type: number
          description: >-
            Local transaction amount—the amount in the currency of the place
            where the authorization is requested
          example: 100.5
        local_currency:
          type: string
          description: Local currency code number where transaction occurred
          enum:
            - '986'
            - '840'
        entry_mode:
          type: string
          description: >-
            Indicates the method used for PAN entry to initiate a transaction
            and the PIN entry capabilities
          example: '901'
        processing_code:
          type: string
          description: >-
            Describes the effect of a transaction on the customer account and
            the type of accounts affected. For purchase, use `00`; for
            withdrawal, use `01`; for refund, use `20`; for payment, use `28`.
          enum:
            - '00'
            - '01'
            - '20'
            - '28'
          example: '00'
        installments:
          type: object
          description: >-
            If this is a credit authorization, this field is required to deal
            with installments.
          properties:
            number:
              type: number
              description: Number of installments
            with_interest:
              type: string
              description: Indicates if the installment has an interest rate.
            payment_number:
              type: number
              description: Current installment number
            amount_of_each_installment:
              type: number
              description: Amount of each installment
          example:
            number: 4
            with_interest: 'true'
            payment_number: 2
            amount_of_each_installment: 50
        merchant:
          type: object
          description: Details about the merchant
          properties:
            name:
              type: string
              description: Merchant name
            city:
              type: string
              description: Merchant city name
            country:
              type: string
              description: Merchant country code
            code:
              type: string
              description: Merchant code
            id:
              type: string
              description: Merchant ID
          required:
            - name
          example:
            name: merchantName
            city: São Paulo
            country: Brazil
            code: BR
            id: merchantId
        atc:
          type: string
          description: Application transaction counter
          example: '0100'
        settlement_amount:
          type: number
          description: >-
            Settlement amount—this must be the amount of the transaction in
            Dollar currency.
          example: 10.5
        settlement_currency:
          type: string
          description: Settlement currency
          example: '840'
        cardholder_billing_amount:
          type: number
          description: Amount of the transaction in the Cardholder currency
          example: 11.5
        cardholder_billing_currency:
          type: string
          description: Currency code of the cardholder
          example: '840'
        account_type:
          type: string
          description: >-
            Defines the mode of the authorization being simulated. Use `20` for
            debit simulation and `30` for credit simulation.
          example: '00'
        invoice_address:
          type: string
          description: Invoice address
          example: 222 Fifth Avenue
        authorization_code:
          type: string
          description: Authorization code
          example: ABCDEF
        retrieval_reference_number:
          type: string
          description: Number generated by merchant POS systems
          example: '5600001085571'
        nsu:
          type: string
          description: Unique sequence number to identify one transaction
          example: '085581'
        processing_julian_date:
          type: string
          description: >-
            Date assigned to the reconciliation processing. This is required for
            clearing simulations and must have the format YDDD.
          example: '1360'
        acquirer_reference_number:
          type: string
          description: Number generated by Acquirer.
          example: '1234569876541'
        airport_tax:
          type: number
          description: >-
            Boarding fee. In a purchase with installment, this value will be
            present at first installment. In a purchase without installment,
            this value should not be sent since it should be summed to the
            authorization amount.
          example: 3.5
        message_number:
          type: string
          description: >-
            Message number assigned to a clearing message. It must be a
            sequential number.
          example: '1234'
        transaction_identifier:
          type: string
          description: Transaction identifier
          example: '589256582795978'
        simule_tokenized_transaction:
          type: boolean
          description: Indicates if the simulation will use a tokenized transaction
          enum:
            - false
            - true
          example: true
        cash_back_amount:
          type: number
          description: Cash back amount used to simulate purchase with cash back
          example: 2
        advice_reason_code:
          type: string
          description: Advice reason code
          example: '112'
        advice_detail_code:
          type: string
          description: Advice detail code
          example: '0004'
        wallet_identifier:
          type: string
          description: Wallet identifier
          example: '618'
        bin:
          type: string
          description: >-
            BIN represents the Bank Identification Number and corresponds to the
            first 6 or 8 digits of a card. In general terms, the BIN explains
            which bank institution issued that card.
          example: '82327110'
      required:
        - card_id
        - mti
        - local_amount
        - local_currency
        - entry_mode
        - merchant
      example:
        caller: mastercard
        card_id: 4926027
        mti: '0100'
        local_amount: 100.5
        local_currency: '986'
        entry_mode: '901'
        merchant:
          name: merchantName
    ReplacementAuthorization:
      type: object
      description: Create a replacement authorization
      properties:
        caller:
          type: string
          description: Name of the network that performed this authorization request
          example: MASTERCARD or VISA
        card_id:
          type: number
          description: ID of the card used for the transaction
          example: 1234567
        mti:
          type: string
          description: >-
            Message type indicator that defines with flow are going to be
            performed like authorization, cancellation or clearing
          example: '0400'
        local_amount:
          type: number
          description: >-
            Local transaction amount. It is the amount in the currency of the
            place where the authorization is requested.
          example: 100.5
        local_currency:
          type: string
          description: Local currency code number where transaction occurred
          enum:
            - '986'
            - '840'
        replacement_amount:
          type: number
          description: >-
            Replacement transaction amount. This is the value that will be used
            to replace the original authorization value.
          example: 90.5
        authorization_code:
          type: string
          description: Authorization code
          example: ABCDEF
        entry_mode:
          type: string
          description: >-
            Indicates the method used for PAN entry to initiate a transaction
            and the PIN entry capabilities.
          example: '051'
        processing_code:
          type: string
          description: >-
            Describes the effect of a transaction on the customer account and
            the type of accounts affected. For purchase, use `00`; for withdraw,
            use `01`; for refund, use `20`; for payment, use `28`.
          enum:
            - '00'
            - '01'
            - '20'
            - '28'
          example: '00'
        merchant:
          type: object
          description: Details about the merchant
          properties:
            name:
              type: string
              description: Merchant name
            city:
              type: string
              description: Merchant city name
            country:
              type: string
              description: Merchant country code
            code:
              type: string
              description: Merchant code
            id:
              type: string
              description: Merchant ID
          required:
            - name
          example:
            name: merchantName
            city: São Paulo
            country: Brazil
            code: BR
            id: merchantId
      required:
        - card_id
        - mti
        - local_amount
        - local_currency
        - entry_mode
        - merchant
    CreateCancelAuthorization:
      type: object
      properties:
        mti:
          $ref: '#/components/schemas/MTI'
      required:
        - mti
    CreateCrediarioAuthorization:
      type: object
      properties:
        installments:
          type: object
          description: >-
            If this is a Crediario Authorization, this field is required to deal
            with installments.
          properties:
            is_crediario:
              type: boolean
              description: Is this a credit authorization?
              default: true
            number:
              type: number
              description: Number of installments
            with_interest:
              type: boolean
              description: Does the installment have an interest rate?
              default: true
          example:
            is_crediario: true
            number: 2
            with_interest: true
    CreateRefundAuthorization:
      type: object
      properties:
        processing_code:
          type: string
          description: Processing code for refund/credit authorization
          example: '20'
    CreateWithdrawAuthorization:
      type: object
      properties:
        processing_code:
          type: string
          description: Processing code for international withdrawal
          example: '01'
    CrediarioResponse:
      type: object
      description: Data related to installments
      properties:
        installmentValue:
          type: string
          description: Installment value
          example: '51.86'
        monthlyInterestRate:
          type: string
          description: Monthly interest rate
          example: '2.00'
        totalAmount:
          type: string
          description: Total amount
          example: '103.72'
        numberOfInstallments:
          type: string
          description: Number of installments
          example: '2'
        feeAmount:
          type: string
          description: Fee amount
          example: '0.00'
        taxesAmount:
          type: string
          description: Taxes amount
          example: '0.86'
        taxesPercentageOfTotalAmount:
          type: string
          description: Taxes percentage of total amount
          example: '0.83'
        feePercentageOfTotalAmount:
          type: string
          description: Fee percentage of total amount
          example: '0.00'
        planType:
          type: string
          description: >-
            Plan type - with interest (20), without interest(21) or a crediario
            type(25)
          example: '20'
        annualInterestRate:
          type: string
          description: Annual interest rate
          example: '10.2'
        monthlyTotalEffectiveCost:
          type: string
          description: Monthly total effective cost
          example: '1.40'
        annualTotalEffectiveCost:
          type: string
          description: Aannual total effective cost
          example: '0.00'
        installmentDate:
          type: string
          description: Installment date - format = yyyymmdd
          example: '20201129'
        insurance:
          type: string
          description: Insurance
          example: '1'
        insurancePercentageOfTotalAmount:
          type: string
          description: Insurance percentage of total amount
          example: '2'
        other:
          type: string
          description: Any other added values, if applicable, that the cardholder is paying
          example: ''
        otherPercentageOfTotalAmount:
          type: string
          description: Other percentage of total amount
          example: ''
        totalAmountToMerchant:
          type: string
          description: Total amount to be paid to merchant (purchase amount)
          example: '4'
        merchantAmountPercentage:
          type: string
          description: Percentage of the total amount to be paid to merchant
          example: '0008'
        reservedForFutureUse:
          type: string
          description: Reserved for future use
    CustomCode:
      type: string
      description: >
        Internal custom code generated in authorization flow for declined
        requests, indicating the reason the request was declined.


        For more information, see [authorization
        validations](doc:validation-codes-for-authorization-events#authorization-validations).
      enum:
        - FL2
        - FL8
        - FLB
        - FLE
        - DCM
        - VMN
        - '998'
        - LUD
        - LUE
        - LUT
        - LGE
        - '810'
        - PFT
        - IAT
        - BND
        - ANF
        - CTE
        - CED
        - ZBD
        - FRB
        - UBT
        - FL6
        - BNF
        - BNP
        - BNR
        - VED
        - BNU
        - VEV
        - UBN
        - CSU
        - NPL
        - OP1
        - TNF
        - Z26
        - Z24
        - Z29
        - Z23
        - Z22
      example: FLB
    MTI:
      type: string
      description: >
        Message type ID. For example: `0100` = auth. request, `0110`` = auth.
        response, `0120` = auth. advice. For more information, see
        [MTI](https://en.wikipedia.org/wiki/ISO_8583#Message_type_indicator_(MTI)).
      nullable: false
      example: '0100'
    NetworkAuthorization:
      type: object
      properties:
        id:
          type: integer
          description: Unique ID for this network authorization record
          nullable: false
          example: 1230
        message_type_indicator:
          type: string
          description: >
            Message type ID. For example: `0100` = auth. request, `0110` = auth.
            response, `0120` = auth. advice. For more information, refer to
            [MTI](https://en.wikipedia.org/wiki/ISO_8583#Message_type_indicator_(MTI)).
          nullable: false
          example: '0100'
        caller:
          type: string
          description: Caller - Mastercard, VISA, etc.
          nullable: false
          example: Mastercard
        soft_descriptor:
          type: string
          description: Additional description for this authorization
          nullable: true
        processing_julian_date_settlement:
          type: string
          description: Settlement date in julian format = yydd
          nullable: true
          example: '1360'
        acquirer_reference_number:
          type: string
          description: Acquirer generated number
          nullable: true
          example: '1234569876541'
        clearing_s3_path:
          $ref: '#/components/schemas/ClearingS3path'
        message_number:
          type: string
          description: >-
            Message number assigned to a clearing message. This **must** be a
            numeric and sequential number.
          nullable: true
          example: '123'
        partial_cancellation_total_amount:
          type: string
          description: Partial cancellation total amount
          nullable: true
          example: '100.21'
        org_operation_id:
          type: integer
          description: Org Operation ID
          example: 79985
        clearing_file_path:
          type: string
          description: Clearing file path
          nullable: true
        password_present:
          type: boolean
          description: Is password used?
          example: false
          default: false
        digitalization_token_id:
          type: integer
          nullable: true
          description: Digitalization token ID
          example: 1123
        code:
          type: string
          description: Authorization code
          example: R1CMED
        status_id:
          type: integer
          description: |
            Authorization status: 
              1 - PENDING
              2 - PROCESSED 
              3 - DECLINED 
              4 - CANCELLED
              5 - DROPPED
          example: 2
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
        response_code:
          $ref: '#/components/schemas/ResponseCode'
        nsu:
          $ref: '#/components/schemas/NSU'
        retrieval_reference_number:
          type: string
          description: Merchant POS system generated number
          example: '5600001085571'
        custom_response_code:
          type: string
          nullable: true
        transmission_datetime:
          type: string
          nullable: true
        event_datetime:
          type: string
          format: date-time ISO8601
          description: Timestamp for when event was added into the database
          example: '2022-08-04T14:15:43.000Z'
        event_datetime_utc:
          type: string
          format: date-time ISO8601
          description: Timestamp in UTC for when event was added into the database
          nullable: true
          example: '2022-08-04T14:15:43.000Z'
        datetime:
          type: string
          format: date-time ISO8601
          description: Authorization datetime in ISO8601 format
          nullable: true
          example: '2022-08-04T14:15:43.000Z'
        original_network_id:
          type: string
          description: Network ID
          example: ti
        local_currency_code:
          type: string
          description: >-
            Local ISO 4217 currency code number where transaction occurred. For
            example, 986 (Brazil) or 840 (US).
          enum:
            - '986'
            - '840'
        number_of_installments:
          type: number
          description: Number of installments
        org_id:
          type: string
          example: TN-12345678-9f53-46ce-953b-b81dd1234567
          description: Organization/tenant ID
        principal_amount:
          type: string
          description: Principal amount
          example: '200.00'
        local_currency_transaction_amount:
          type: string
          description: Local currency transaction amount
          example: '200.00'
        card_id:
          type: integer
          description: Transaction cardholder card ID
          example: 9412645
        merchant_name:
          type: string
          description: >-
            Merchant name as registered at the payments network database
            (Visa/Mastercard)
          example: PISMO
        merchant_id:
          type: string
          description: >-
            Merchant code as registered at the payments network database
            (Visa/Mastercard)
          example: '687555537877464'
        account_id:
          type: integer
          description: Transaction cardholder account ID
          example: 1234
        airport_tax_amount:
          type: number
          description: >
            Boarding fee. In a purchase with installment, this value is present
            at first installment. In a purchase without installment, this value
            should not be sent since it should be summed to the authorization
            amount.
          example: 3.5
        settlement_currency_code:
          type: string
          description: Settlement ISO 4217 currency code
          example: '840'
        settlement_currency_transaction_amount:
          type: number
          description: >-
            Settlement amount - **must** be the transaction  amount in dollar
            currency
          example: 10.5
        correlation_id:
          type: string
          example: be0486e-073a-4f56-80bb-5c400337e721
          description: >
            Authorization correlation ID. The CID is used to link related API
            requests and events. For example, if a user makes an authorization
            request with 10 installments, this generates 1 authorization event
            and 10 transaction events all containing the same correlation ID.
            The x-cid can help the Pismo engineering team track everything
            related to a call.
        merchant_category_id:
          type: integer
          description: Merchant category codes payments network
          example: 1711
        merchant_city:
          type: string
          description: >-
            Merchant city as registered at the payments network database
            (Visa/Mastercard)
          example: SAO PAULO
        merchant_state_or_country:
          type: string
          description: >-
            Merchant country code outside USA OR Merchant state code from the
            USA OR Canadian province code from Canada (NOTE:Canadian merchants
            can either be represented through the province code or the canadian
            country code)
          example: BRA
        history:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAuthorizationHistory'
        migration_id:
          type: string
          description: Migration Id corresponding to this migrated authorization
          example: a6081d5e-127e-4702-a09b-339ae59e7dbb
        migration_version_datetime:
          type: string
          format: date-time ISO8601
          description: >-
            Migration version datetime corresponding to this migrated
            authorization
          nullable: true
          example: '2022-08-04T14:15:43.000Z'
      example:
        id: 5418804
        message_type_indicator: '0100'
        caller: MASTERCARD
        soft_descriptor: null
        processing_julian_date_settlement: null
        acquirer_reference_number: null
        message_number: null
        partial_cancellation_total_amount: null
        org_operation_id: 79985
        clearing_file_path: null
        password_present: false
        digitalization_token_id: null
        code: R1CMED
        status_id: 2
        response_code: '00'
        nsu: test
        retrieval_reference_number: '664151'
        custom_response_code: null
        transmission_datetime: null
        event_datetime: '2022-08-04T14:15:43.000Z'
        event_datetime_utc: null
        datetime: null
        original_network_id: ti
        local_currency_code: '986'
        number_of_installments: 1
        org_id: TN-191c4fff-3d3d-4de2-b072-4a7d9785e26d
        principal_amount: '200.00'
        local_currency_transaction_amount: '171.42'
        card_id: 9412645
        merchant_name: SINALOA CARTEL
        merchant_id: ''
        account_id: 104825816
        airport_tax_amount: 0
        settlement_currency_code: '840'
        settlement_currency_transaction_amount: 200
        correlation_id: 7ed71a20-d5b6-4698-b5d8-cc928139d998
        merchant_category_id: 1711
        merchant_city: ANTA GORDA
        merchant_state_or_country: RS
        history:
          - network_authorization_id: 23085309
            acquirer_reference_number: null
            history_type: PROCESSED
            history_datetime: '2022-08-04T14:15:43.000Z'
            ledger_tracking_id: null
            installment_number: null
          - network_authorization_id: 23085308
            acquirer_reference_number: null
            history_type: PROCESSED
            history_datetime: '2022-08-04T14:15:43.000Z'
            ledger_tracking_id: null
            installment_number: null
        migration_id: a6081d5e-127e-4702-a09b-339ae59e7dbb
        migration_version_datetime: '2022-08-04T14:15:43.000Z'
    NetworkAuthorizationHistory:
      type: object
      properties:
        network_authorization_id:
          type: integer
          description: Unique ID for authorization history record
          example: 23085309
        acquirer_reference_number:
          type: string
          nullable: true
          description: Acquirer generated number
          example: '1234569876541'
        history_type:
          type: string
          description: History type
          enum:
            - CREATION
            - PROCESSED
            - CONFIRMATION
            - DECLINED
            - CANCELLATION
            - DROPPED
            - PARTIAL_CANCELLATION
          example: CONFIRMATION
        history_datetime:
          type: string
          format: date-time ISO8601
          description: Timestamp for when history was entered into database
          example: '2022-08-04T14:15:43.000Z'
        ledger_tracking_id:
          type: string
          nullable: true
          description: Ledger tracking ID
        installment_number:
          type: integer
          description: Installment number
          nullable: true
    NSU:
      type: string
      description: >
        Authorization Network Settlement Utility (NSU) number - tracks the flow
        of funds between parties involved in a payment card transaction,
        including the bank, the merchant, and the card network. Different
        payment card networks may have their own NSU systems, ie, Visa -
        VisaNet, Mastercard - BankNet, or they may use a third party.
      example: '15469'
    ResponseCode:
      type: string
      description: >
        Network two-digit response code. For example: 00 = approve, 51 =
        insufficient funds, 57 = card not active, 96 = system failure, etc. For
        more information, see [Validation codes for authorization
        events](doc:validation-codes-for-authorization-events). If `approve` =
        `false`, you can use this value to respond to the network.
      example: '00'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Account access token. Tokens can expire quickly, which can result in an
        "Unauthorized" error.
      bearerFormat: JWT
  responses:
    400BadRequest:
      description: >-
        The request is acceptable but the syntax is malformed, for example, some
        type number parameter with a text content.
    401UnauthorizedError:
      description: Access token is missing or invalid.
    403Forbidden:
      description: Access forbidden.
    404NotFound:
      description: Specified resource was not found
    409Conflict:
      description: The specified resource status conflict with the current request
    500InternalServerError:
      description: Internal server error
paths:
  /networktransactions/v1/authorizations:
    post:
      summary: Simulate authorization
      description: >
        You can use this endpoint to simulate a real-world authorization from
        the network in the sandbox environment. This simulation does not go
        through all the card network services as it would in production, but it
        does check for card status and balance. The call gives you a chance to
        see how Pismo might respond to a network authorization. The fields
        returned can be used to cancel or confirm the request with this
        endpoint.


        You can also use this endpoint to cancel (total or partial) the
        simulated authorization in the EXT/HOMOLOG environment. To cancel in the
        production environments, use the [Cancel
        authorization](ref:cancel-network-authorizations) endpoint.


        This endpoint generates the simulated [Network authorization
        received](https://developers.pismo.io/events/docs/networktransactions-network-authorization-1)
        event which you can receive and view. This event occurs in production
        when the Pismo platform cancels or confirms an authorization.  You can
        also use this endpoint to test connectivity to your [anti-fraud webhook
        url](doc:anti-fraud-integration).


        For more information, see the [Simulate
        authorizations](doc:simulate-authorizations) guide.
      operationId: post_v1-authorizations
      tags:
        - Authorizations
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/CreateAuthorization'
                - $ref: '#/components/schemas/CreateCrediarioAuthorization'
                - $ref: '#/components/schemas/CreateWithdrawAuthorization'
                - $ref: '#/components/schemas/CreateRefundAuthorization'
                - $ref: '#/components/schemas/CreateCancelAuthorization'
                - $ref: '#/components/schemas/InstallmentAuthorization'
                - $ref: '#/components/schemas/ReplacementAuthorization'
            examples:
              Create authorization:
                value:
                  caller: visa
                  card_id: 186266181
                  mti: '0100'
                  local_amount: 5
                  local_currency: '986'
                  settlement_amount: 5
                  settlement_currency: '840'
                  entry_mode: '051'
                  processing_code: '00'
                  nsu: '0855861'
                  merchant:
                    name: merchantName
                    city: merchantCity
                    country: GB
                    code: '016205'
                    id: '12121212'
              National purchase:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0100'
                  local_amount: 50.5
                  local_currency: '986'
                  settlement_amount: 50.5
                  settlement_currency: '840'
                  entry_mode: '901'
                  processing_code: '00'
                  merchant:
                    name: merchantName
              National withdrawal:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0100'
                  local_amount: 50.5
                  local_currency: '986'
                  settlement_amount: 50.5
                  settlement_currency: '840'
                  entry_mode: '901'
                  processing_code: '01'
                  merchant:
                    name: merchantName
              Tecban Withdrawal:
                value:
                  caller: tecban
                  card_id: 6752905
                  mti: '0200'
                  local_amount: 10
                  local_currency: '986'
                  settlement_amount: 10
                  settlement_currency: '840'
                  retrieval_reference_number: '00000004500000130'
                  entry_mode: '051'
                  account_type: '30'
                  processing_code: '01'
                  merchant:
                    name: merchantName
              Tecban Cancellation Withdrawal:
                value:
                  caller: tecban
                  card_id: 6752905
                  mti: '0202'
                  local_amount: 10
                  local_currency: '986'
                  settlement_amount: 10
                  settlement_currency: '840'
                  retrieval_reference_number: '00000004500000130'
                  entry_mode: '051'
                  account_type: '30'
                  processing_code: '01'
                  authorization_code: RHRCDM
                  response_code: W4
                  merchant:
                    name: merchantName
              Internacional purchase:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0100'
                  local_amount: 50.5
                  local_currency: '840'
                  settlement_amount: 50.5
                  settlement_currency: '840'
                  entry_mode: '901'
                  merchant:
                    name: merchantName
                  processing_code: '00'
              Internacional withdrawal:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0100'
                  local_amount: 50.5
                  local_currency: '840'
                  settlement_amount: 50.5
                  settlement_currency: '840'
                  entry_mode: '901'
                  merchant:
                    name: merchantName
                  processing_code: '01'
              Crediario authorization:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0100'
                  local_amount: 50.5
                  local_currency: '986'
                  settlement_amount: 50.5
                  settlement_currency: '840'
                  entry_mode: '901'
                  merchant:
                    name: merchantName
                  installments:
                    is_crediario: true
                    number: 2
                    with_interest: true
              Cancel authorization (partial):
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0400'
                  local_amount: 5
                  local_currency: '986'
                  settlement_amount: 5
                  settlement_currency: '840'
                  entry_mode: '051'
                  account_type: '20'
                  processing_code: '00'
                  nsu: '0855861'
                  merchant:
                    name: MERCHANT test
                    city: MERCHANT CITY
                    country: BRA
                    code: '5199'
                  authorization_code: Z3DDJ7
                  replacement_amount: 4
                  settlement_replacement_amount: 1
              Refund/credit authorization:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0400'
                  local_amount: 50.5
                  local_currency: '986'
                  settlement_amount: 50.5
                  settlement_currency: '840'
                  entry_mode: '901'
                  processing_code: '00'
                  merchant:
                    name: merchantName
              Credit voucher:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0100'
                  local_amount: 50.5
                  local_currency: '986'
                  settlement_amount: 50.5
                  settlement_currency: '840'
                  entry_mode: '901'
                  processing_code: '20'
                  merchant:
                    name: merchantName
              Installment Authorization:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0100'
                  local_amount: 100
                  local_currency: '986'
                  settlement_amount: 100
                  settlement_currency: '840'
                  entry_mode: '071'
                  processing_code: '00'
                  account_type: '30'
                  retrieval_reference_number: '000002'
                  nsu: '000002'
                  installments:
                    number: 2
                    with_interest: true
                    payment_number: 1
                    amount_of_each_installment: 50
                  merchant:
                    name: merchantName
                    city: Teresina
                    country: BRA
              Replacement Authorization:
                value:
                  caller: mastercard
                  card_id: 4926027
                  mti: '0400'
                  local_amount: 100
                  local_currency: '986'
                  settlement_amount: 100
                  settlement_currency: '840'
                  replacement_amount: 90
                  authorization_code: Z3DDJ7
                  entry_mode: '071'
                  processing_code: '00'
                  account_type: '30'
                  retrieval_reference_number: '000002'
                  nsu: '000002'
                  merchant:
                    name: merchantName
                    city: Teresina
                    country: BRA
      responses:
        '200':
          description: Resource founded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /direct-network-transactions/v1/authorizations/desc:
    get:
      summary: List account authorizations
      description: >-
        List authorizations by account, tenant, or authorization ID. The
        response is an array of objects ordered by authorization ID. In
        descending order, the response includes every authorization for the
        account. Each page contains 20 items per page. If the authorization ID
        is used in the query parameter, the first record in the result will be
        the authorization related to this ID and the following results will be
        in descending order.
      operationId: get-network-authorizations
      tags:
        - Authorizations
      security:
        - BearerAuth: []
      parameters:
        - name: authorization-id
          in: query
          schema:
            type: string
          required: false
          example: '12345'
          description: Authorization ID
        - name: page
          in: query
          schema:
            type: string
          required: false
          example: '1'
          description: Indicates the selected page
      responses:
        '200':
          description: Records found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationPaginatedResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /direct-network-transactions/v1/cancellation:
    post:
      description: >
        Perform a full cancellation of an authorization. The authorization must
        have the status `PENDING` or `PROCESSED` and must also not have been
        previously confirmed (cleared).

        This endpoint generates a [Network authorization
        received](https://developers.pismo.io/events/docs/networktransactions-network-authorization-1)
        event.
      summary: Cancel authorization
      operationId: cancel-network-authorizations
      tags:
        - Authorizations
      security:
        - BearerAuth: []
      parameters: []
      requestBody:
        description: Form details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancellationRequest'
      responses:
        '200':
          description: Full cancellation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancellationResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServerError'
