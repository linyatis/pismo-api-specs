paths:
  /v1/bulletin:
    post:
      summary: Register card with Protection Bulletin
      operationId: post-v1-bulletin
      description: >
        Register a Pismo-issued card with the Protection Bulletin. This feature
        is available for Elo, Mastercard and Visa.


        The Protection Bulletin is used before a transaction takes place in
        cases where the issuer is temporarily offline and unable to provide an
        authorization. In a process known as *stand-in*, the card network
        authorizes the transaction to avoid creating problems for the cardholder
        and merchant. Once the issuer is back online, the card network lets them
        know what was authorized while they were down.


        You can add a card to the Protection Bulletin with this endpoint or
        [setting a card rule](ref:post-v1-bulletin-setup) so that when a card's
        status changes to a rule's configured status, the card is automatically
        added to the Protection Bulletin.


        For more information, refer to [Protection
        Bulletin](doc:protection-bulletin).


        **Note:** This endpoint takes an account token - an access token encoded
        with a Pismo account ID. Tokens can expire quickly, which can result in
        a <b>401 Unauthorized</b> message.
      tags:
        - Bulletin
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/XCustomerIdHeader'
      requestBody:
        description: >-
          Bulletin data. Enter data for one object, depending on brand (Elo,
          Visa, or Mastercard)
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/BulletinPostEloModel'
                - $ref: '#/components/schemas/BulletinPostMastercardModel'
                - $ref: '#/components/schemas/BulletinPostVisaModel'
            examples:
              Register a Elo card:
                value:
                  card_id: 10203040
              Register a Mastercard card with purge date:
                value:
                  card_id: 10203040
                  reason: L
                  purge_date: '2026-01-01T00:00:00.000Z'
              Register a Mastercard card without purge date:
                value:
                  card_id: 10203040
                  reason: L
              Register a Visa card with purge date:
                value:
                  card_id: 10203040
                  card_track_number: 0
                  reason: '04'
                  region_code:
                    - A
                    - B
                    - C
                    - D
                    - E
                    - F
                  purge_date: '2026-01-01T00:00:00.000Z'
              Register a Visa card without purge date:
                value:
                  card_id: 10203040
                  card_track_number: 0
                  reason: '04'
                  region_code:
                    - A
                    - B
                    - C
                    - D
                    - E
                    - F
      responses:
        '201':
          $ref: '#/components/responses/201PostBulletin'
        '400':
          $ref: '#/components/responses/400PostBulletin'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404PostBulletin'
        '422':
          $ref: '#/components/responses/422PostBulletin'
        '500':
          $ref: '#/components/responses/500'
        '504':
          $ref: '#/components/responses/504'
    get:
      summary: List cards in Protection Bulletin
      operationId: list-v1-bulletin
      description: >
        Get all Pismo-issued cards in the Protection Bulletin with filtering
        options.

         **Note:** This endpoint takes an account token - an access token encoded with a Pismo account ID. Tokens can expire quickly, which can result in a <b>401 Unauthorized</b> message.
      tags:
        - Bulletin
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/BeginDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
        - $ref: '#/components/parameters/PerPageQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/ProgramIdQuery'
        - $ref: '#/components/parameters/NetworkBrandTypeQuery'
        - $ref: '#/components/parameters/StatusQuery'
        - $ref: '#/components/parameters/StateQuery'
      responses:
        '200':
          $ref: '#/components/responses/200ListBulletin'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
        '504':
          $ref: '#/components/responses/504'
  /v1/bulletin/{card_id}:
    delete:
      summary: Delete card from Protection Bulletin
      operationId: delete-v1-bulletin
      description: >
        Remove a Pismo-issued card from the Protection Bulletin.


        **Note:** This endpoint takes an account token - an access token encoded
        with a Pismo account ID. Tokens can expire quickly, which can result in
        a <b>401 Unauthorized</b> message.
      tags:
        - Bulletin
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/CardIdPath'
        - $ref: '#/components/parameters/XCustomerIdHeader'
      responses:
        '201':
          $ref: '#/components/responses/201DeleteBulletin'
        '400':
          $ref: '#/components/responses/400DeleteBulletin'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404DeleteBulletin'
        '422':
          $ref: '#/components/responses/422DeleteBulletin'
        '500':
          $ref: '#/components/responses/500'
        '504':
          $ref: '#/components/responses/504'
    get:
      summary: Get Protection Bulletin card
      description: >
        Gets a Pismo-issued card in the Protection Bulletin and its history.


        **Note:** This endpoint takes an account token - an access token encoded
