  /v1/bulletin/setup:
    post:
      summary: Create Protection Bulletin rule
      operationId: post-v1-bulletin-setup
      description: >
        Register a new Protection Bulletin setup rule. This feature is available
        for Elo, Mastercard and Visa.


        When you set a card rule, for example, when a card status is changed to
        `LOST`, it is automatically added to the Protection Bulletin.


        This operation executes asynchronously. When complete, a [Bulletin rule
        event](https://developers.pismo.io/events/docs/bulletin-bulletin-rule-1)
        is generated.


        **Notes:** 
          * This endpoint takes an account token - an access token encoded with a Pismo account ID. Tokens can expire quickly, which can result in a <b>401 Unauthorized</b> message.
          * Deactivating a rule after it has been created requires re-calling this endpoint  with `active` set to `false`.
      tags:
        - Rules
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/BulletinSetupEloModel'
                - $ref: '#/components/schemas/BulletinSetupMastercardModel'
                - $ref: '#/components/schemas/BulletinSetupVisaModel'
            examples:
              Setup Rule Elo with allowed status:
                value:
                  active: true
                  program_id: 1010
                  allowed_status:
                    - status_pismo: LOST
                      default_purge_days: 30
                    - status_pismo: ROBBED
                      default_purge_days: 15
              Setup Rule Elo without allowed status:
                value:
                  active: true
                  program_id: 1010
              Setup Rule Mastercard with allowed status:
                value:
                  active: true
                  ica: '012345'
                  program_id: 1010
                  allowed_status:
                    - status_pismo: LOST
                      status_network: L
                      default_purge_days: 30
                    - status_pismo: ROBBED
                      status_network: O
                      default_purge_days: 15
              Setup Rule Mastercard without allowed status:
                value:
                  active: true
                  ica: '012345'
                  program_id: 1010
              Setup Rule Visa with allowed status:
                value:
                  active: true
                  bid: '012345'
                  program_id: 1010
                  region_code:
                    - A
                    - B
                    - C
                    - D
                    - E
                    - F
                  allowed_status:
                    - status_pismo: LOST
                      status_network: '41'
                      default_purge_days: 30
                    - status_pismo: ROBBED
                      status_network: '43'
                      default_purge_days: 15
              Setup Rule Visa without allowed status:
                value:
                  active: true
                  bid: '012345'
                  program_id: 1010
                  region_code:
                    - A
                    - B
                    - C
                    - D
                    - E
                    - F
      responses:
        '202':
          $ref: '#/components/responses/202'
        '400':
          $ref: '#/components/responses/400PostSetup'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404PostSetup'
        '422':
          $ref: '#/components/responses/422PostSetup'
        '500':
          $ref: '#/components/responses/500'
        '504':
          $ref: '#/components/responses/504'
  /v1/bulletin/setup/{program_id}:
    get:
      summary: Get Protection Bulletin rule
      operationId: get-v1-bulletin-rule
      description: >
        Gets a Protection Bulletin rule.


        The information requested is not returned in the endpoint response.
        Instead, the information is sent in a [Bulletin rule
        event](https://developers.pismo.io/events/docs/bulletin-bulletin-rule-1).


        **Note:** This endpoint takes an account token - an access token encoded
        with a Pismo account ID. Tokens can expire quickly, which can result in
        a <b>401 Unauthorized</b> message.
      tags:
        - Rules
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/ProgramIdPath'
      responses:
        '202':
          $ref: '#/components/responses/202'
        '400':
          $ref: '#/components/responses/400GetSetup'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404GetSetup'
        '500':
          $ref: '#/components/responses/500'
        '504':
          $ref: '#/components/responses/504'
