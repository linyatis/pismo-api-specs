        encoded with an account ID. Tokens can expire quickly, which can result
        in a **401 Unauthorized** message.
      operationId: delete-recurring-charge-link
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/RecurringChargeLinkIdPath'
      responses:
        '200':
          description: >-
            OK - Indicates that the server accepted the request and canceled the
            link.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringChargeLink'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
