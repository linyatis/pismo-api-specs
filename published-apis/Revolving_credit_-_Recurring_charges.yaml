  /v1/recurring-charge-plans/{recurring_charge_plan_id}/accounts/{account_id}:
    post:
      tags:
        - Recurring charge links
      summary: Create link
      description: >
        Creates a link between an active recurring charge plan and an account.


        This endpoint generates a [Recurring charge plan linked to
        account](https://developers.pismo.io/events/docs/balance-recurring-charge-plan-linked-to-account-1)
        event.


        **NOTE:** This endpoint requires an account token — an access token
        encoded with an account ID. Tokens can expire quickly, which can result
        in a **401 Unauthorized** message.
      operationId: create-recurring-charge-link
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/RecurringChargePlanIdPath'
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - tracking_id
              type: object
              properties:
                description:
                  $ref: '#/components/schemas/LinkDescription'
                tracking_id:
                  $ref: '#/components/schemas/TrackingID'
                post_installment_charge_on_current_cycle:
                  $ref: '#/components/schemas/PostInstallmentChargeOnCurrentCycle'
                start_installment_charge_in:
                  $ref: '#/components/schemas/StartInstallmentChargeIn'
                renew:
                  $ref: '#/components/schemas/Renew'
        required: true
      responses:
        '200':
          description: >-
            OK - Indicates that the server accepted the request and created the
            link.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkCreationResponseDto'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
    get:
      tags:
        - Recurring charge links
      summary: Get link between a plan and an account
      description: >
        Gets the link between a plan and an account, given the plan ID and
        account ID.


        **NOTE:** This endpoint requires an account token — an access token
        encoded with an account ID. Tokens can expire quickly, which can result
        in a **401 Unauthorized** message.
      operationId: get-recurring-charge-link
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/RecurringChargePlanIdPath'
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: >-
            OK - Indicates that the server accepted the request and found the
            link. If no links are found, an empty array is returned and
            `total_items` is 0.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedRecurringChargeLink'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/recurring-charge-links/{recurring_charge_link_id}:
    delete:
      tags:
        - Recurring charge links
      summary: Delete recurring charge link
      description: >
        Cancels the link between a recurring charge plan and an account. Results
        in the cancellation of all `PENDING` charges for that link. Already
        canceled links are unaffected.

        This endpoint generates a [Recurring charge plan unlinked from
        account](https://developers.pismo.io/events/docs/balance-recurring-charge-plan-unlinked-from-account-1)
        event.


