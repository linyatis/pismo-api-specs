openapi: 3.1.0
info:
  title: Platform setup - Holidays
  description: Manage business and non-business days by organization
  version: v1.0
  contact:
    name: Pismo Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io
    description: API sandbox server f
security:
  - S2SAuthentication: []
tags:
  - name: Holidays
    description: View and manage business and non-business days configurations.
  - name: Holidays v2 - Transaction banking
    description: >-
      View and manage business and non-business days configurations (for
      Transaction banking only)
components:
  parameters:
    AdminDivisionIDQuery:
      name: administrativeDivisionId
      in: query
      description: Administrative Division ID filter
      required: true
      schema:
        type: integer
        format: int32
    AdminDivisionIdPath:
      name: administrative_division_id
      in: path
      required: true
      description: Administrative Division ID
      schema:
        type: integer
        format: int32
    BeginDateQuery:
      name: beginDate
      in: query
      description: >
        Get results on or after this date. 


        This field indicates what part of the year to start searching for
        holidays, not when the holiday was created at Pismo.


        Format = yyyy-mm-dd. Must be less than or equal to `endDate`.
      schema:
        type: string
        example: '2025-12-24'
    CIDheader:
      name: x-cid
      in: header
      schema:
        type: string
      description: >
        The Correlation IDentifier UUID field links related API requests and
        events. The `x-cid` can help the Pismo engineering team track everything
        related to a call. If not passed, this field is automatically generated.
    DeletedHolidaysQuery:
      name: deleted
      in: query
      description: >-
        Deleted holidays filter. This field is for internal use only, deleted
        holidays are not returned,
      schema:
        type: boolean
    EndDateQuery:
      name: endDate
      in: query
      description: >
        Get holidays on or before this date. 

            
        This field indicates what part of the year to end searching for
        holidays, not when the holiday was created at Pismo.


        Format: yyyy-mm-dd. Must be greater than or equal to `beginDate`."
      schema:
        type: string
        example: '2025-11-02'
    FilterByNameQuery:
      name: name
      in: query
      description: Holiday name filter
      schema:
        type: string
        maxLength: 80
        example: Independance Day
    HolidayDateQuery:
      name: holidayDate
      in: query
      description: Holiday date filter. Format = yyyy-mm-dd.
      schema:
        type: string
        example: '2023-01-01'
    HolidayCalendarIdPath:
      name: id
      in: path
      description: Holiday calendar ID
      required: true
      schema:
        type: string
        example: '8675309'
    HolidayCalendarIdPath2:
      name: holiday_calendar_id
      in: path
      description: Holiday calendar ID
      required: true
      schema:
        type: string
        example: '8675309'
    HolidayIdPath:
      name: holiday_id
      in: path
      description: Pismo-assigned holiday ID
      required: true
      schema:
        type: string
        example: '8675309'
    HolidayNameQuery:
      name: name
      in: query
      description: Holiday name filter
      schema:
        type: string
        maxLength: 80
        example: New Year's Day
    OrderByQuery:
      name: orderBy
      in: query
      description: Sort by `ID` or `NAME`. Default = `ID`.
      schema:
        type: string
        enum:
          - ID
          - NAME
        example: ID
    OrderQuery:
      name: order
      in: query
      description: |
        Sort order: `ASC` (ascending) or `DESC` (descending). Default = `ASC`.
      schema:
        type: string
        enum:
          - ASC
          - DESC
        example: ASC
    OrgHeader:
      name: x-tenant
      in: header
      description: Organization/tenant ID
      schema:
        type: string
    PageNumberQuery:
      name: page
      in: query
      description: Page number.  Default = `1`.
      schema:
        type: integer
        minimum: 1
        format: int32
        example: 5
    PerPageQuery:
      name: perPage
      in: query
      description: Items per page. Default =  `10`. Maximum = `100`.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        example: 30
  schemas:
    AdminDivIdV1Only:
      type: integer
      description: >
        Administrative division ID. 


        When passed as a parameter, either this or `external_id` is
        **REQUIRED**.
      example: 100100
    AdminDivIdV2Only:
      type: integer
      description: >
        Administrative division ID. 


        When passed as a parameter, either this or `external_id` is
        **REQUIRED**.


        **Note:** 

        Holiday metadata always takes precedence over the administrative
        division settings. If a holiday is not specifically configured using the
        [transaction banking
        parameters](doc:posting-transactions-on-holidays#parameters), the
        platform defaults to the settings in the administrative division's
        `metadata` object when processing transactions.
      example: 100100
    CreatedAt:
      type: string
      format: datetime
      description: Date and time the holiday was created. Format = yyyy-mm-ddTHH:mm:ss.
      example: '2024-04-30T17:24:03'
    CurrentDate:
      type: string
      format: date
      description: Current date. Format = yyyy-mm-dd.
      example: '2023-01-02'
    CurrentPage:
      type: integer
      description: Current result page
      example: 1
    DeletedAt:
      type: string
      format: datetime
      description: Date and time the holiday was deleted. Format = yyyy-mm-ddTHH:mm:ss.
      example: '2024-04-30T17:24:03'
    ExternalId:
      type: string
      description: Client-created external ID
      maxLength: 36
      minLength: 1
      example: f89urqljnahosluiefku
    ExternalIdParent:
      type: string
      description: |
        Client-created external ID for parent calendar. 
        Refer to `parent_id` parameter for more information.
      maxLength: 36
      minLength: 1
      example: f89urqljnahosluiefku
    ExternalIdV1Only:
      type: string
      description: >
        Existing ID value from another process or application.


        When passed as a parameter, either this or `administrative_division_id`
        is **REQUIRED**.
      example: 38400-000
    handler.HTTPError:
      description: Error
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
    HolidayCalendar:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/HolidayCalendarID'
        name:
          $ref: '#/components/schemas/HolidayCalendarName'
    HolidayCalendarID:
      type: integer
      description: Holiday calendar ID
      example: 8675309
    HolidayCalendarName:
      type: string
      description: Holiday calendar name
      maxLength: 80
      minLength: 1
      example: Brazil holiday calendar
    HolidayDate:
      type: string
      description: Holiday date. Format = yyyy-mm-dd.
      example: '2023-12-01'
    HolidayDescription:
      type: string
      description: Holiday description
      maxLength: 500
      example: Day to party like it's 1999
    HolidayID:
      type: integer
      description: Holiday ID
      example: 8675309
    HolidayName:
      type: string
      description: Holiday name
      example: New Year's Day
      maxLength: 80
      minLength: 1
    HolidayType:
      type: string
      description: Type
      maxLength: 15
      minLength: 1
      example: Country
    HolidayWorkingDays:
      type: array
      description: |
        Working days array

        `1` = Monday, `6` = Saturday. Default = `[1, 2, 3, 4, 5]`.
      items:
        type: integer
        enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
      example:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
    IsHoliday:
      type: boolean
      description: Is this a holiday?
      example: true
    IsWeekend:
      type: boolean
      description: Is this a weekend day?
      example: true
    Metadata:
      type: object
      description: >
        A valid JSON schema as specified in
        https://json-schema.org/specification.html. Used to register rules used
        to authorize the transaction.
    MetadataV2:
      type: object
      description: >
        A valid JSON schema, as specified in
        https://json-schema.org/specification.html. Used to register the rules
        that are used to authorize the transaction.


        You can use metadata <a
        href="https://developers.pismo.io/pismo-docs/docs/posting-transactions-on-holidays#parameters">parameters</a>
        to specify holiday business rules. For details, refer to <a
        href="https://developers.pismo.io/pismo-docs/docs/posting-transactions-on-holidays">Posting
        Transactions on Holidays</a>.
    NextBusinessDate:
      type: string
      format: date
      description: Next work day following the holiday. Format = yyyy-mm-dd.
      example: '2023-01-02'
    Pages:
      type: integer
      description: Total number of result pages.
      example: 1
    pagination.Pagination:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        items:
          type: array
          items:
            $ref: '#/components/schemas/presenter.HolidayResponse'
        pages:
          $ref: '#/components/schemas/Pages'
        per_page:
          $ref: '#/components/schemas/PerPage'
        total_items:
          $ref: '#/components/schemas/TotalItems'
    pagination.v2.Pagination:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        items:
          type: array
          items:
            $ref: '#/components/schemas/presenter.HolidayV2Response'
        pages:
          $ref: '#/components/schemas/Pages'
        per_page:
          $ref: '#/components/schemas/PerPage'
        total_items:
          $ref: '#/components/schemas/TotalItems'
    pagination.PaginationResponse:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        items:
          description: The paginated items
        pages:
          $ref: '#/components/schemas/Pages'
        per_page:
          $ref: '#/components/schemas/PerPage'
        total_items:
          $ref: '#/components/schemas/TotalItems'
    ParentId:
      type: integer
      description: >
        Calendar parent ID.


        Holiday calendars can have parent-child relationships, creating a
        hierarchy. Child calendars inherit holidays from their parent calendars.


        Common use case: Country → State → City hierarchy


        Example:
         - Brazil (parent)
            - São Paulo (child of Brazil)
              - Campinas (child of São Paulo)

        When you query holidays for Campinas, you automatically get:
          - Campinas city holidays
          - São Paulo state holidays
          - Brazil national holidays

        You can reference the parent calendar using either:
          - `parent_id`: The internal parent calendar ID
          - `parent_external_id`: The parent calendar  `external_id`
      minimum: 1
      example: 8675309
    PerPage:
      type: integer
      description: Maximum results per page
      example: 10
    presenter.AddHolidayToCalendarRequest:
      type: object
      required:
        - holiday_date
        - name
      properties:
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        name:
          $ref: '#/components/schemas/HolidayName'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        external_id:
          $ref: '#/components/schemas/ExternalId'
        holiday_calendar_id:
          $ref: '#/components/schemas/HolidayCalendarID'
        metadata:
          $ref: '#/components/schemas/Metadata'
        working_date:
          $ref: '#/components/schemas/WorkingDate'
    presenter.AddHolidayToCalendarResponse:
      type: object
      properties:
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        external_id:
          $ref: '#/components/schemas/ExternalId'
        holiday_calendar_id:
          $ref: '#/components/schemas/HolidayCalendarID'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        holiday_id:
          $ref: '#/components/schemas/HolidayID'
        metadata:
          $ref: '#/components/schemas/Metadata'
        name:
          $ref: '#/components/schemas/HolidayName'
        working_date:
          $ref: '#/components/schemas/WorkingDate'
    presenter.AdministrativeDivisionResponse:
      type: object
      properties:
        id:
          type: integer
          description: Administrative division ID
          example: 1111
        name:
          description: Administrative division name
          type: string
          example: Brazil
    presenter.CreateHolidayCalendarRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          $ref: '#/components/schemas/HolidayCalendarName'
        type:
          $ref: '#/components/schemas/HolidayType'
        external_id:
          $ref: '#/components/schemas/ExternalId'
        holidays:
          type: array
          description: Holidays array
          items:
            $ref: '#/components/schemas/presenter.CreateNewHolidayRequest'
        metadata:
          $ref: '#/components/schemas/Metadata'
        parent_external_id:
          $ref: '#/components/schemas/ExternalIdParent'
        parent_id:
          $ref: '#/components/schemas/ParentId'
        working_days:
          $ref: '#/components/schemas/HolidayWorkingDays'
    presenter.CreateHolidayCalendarResponse:
      type: object
      properties:
        external_id:
          $ref: '#/components/schemas/ExternalId'
        holiday_calendar_id:
          $ref: '#/components/schemas/HolidayCalendarID'
        holidays:
          type: array
          items:
            $ref: '#/components/schemas/presenter.CreateNewHolidayResponse'
        metadata:
          $ref: '#/components/schemas/Metadata'
        name:
          $ref: '#/components/schemas/HolidayName'
        parent_external_id:
          $ref: '#/components/schemas/ExternalIdParent'
        parent_id:
          $ref: '#/components/schemas/ParentId'
        type:
          $ref: '#/components/schemas/HolidayType'
        working_days:
          $ref: '#/components/schemas/HolidayWorkingDays'
    presenter.CreateNewHolidayResponse:
      type: object
      properties:
        description:
          $ref: '#/components/schemas/HolidayDescription'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        holiday_id:
          $ref: '#/components/schemas/HolidayID'
        metadata:
          $ref: '#/components/schemas/Metadata'
        name:
          $ref: '#/components/schemas/HolidayName'
        working_date:
          $ref: '#/components/schemas/WorkingDate'
    presenter.CreateNewHolidayRequest:
      type: object
      required:
        - name
        - holiday_date
      properties:
        name:
          $ref: '#/components/schemas/HolidayName'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        metadata:
          $ref: '#/components/schemas/Metadata'
        working_date:
          $ref: '#/components/schemas/WorkingDate'
    presenter.CreateHolidayRequest:
      description: Data to create a holiday.
      type: object
      required:
        - name
        - holiday_date
        - working_date
      properties:
        name:
          $ref: '#/components/schemas/HolidayName'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        working_date:
          $ref: '#/components/schemas/NextBusinessDate'
        administrative_division_id:
          $ref: '#/components/schemas/AdminDivIdV1Only'
        external_id:
          $ref: '#/components/schemas/ExternalIdV1Only'
    presenter.CreateHolidayRequestV2:
      description: Create holiday for transaction banking payload
      type: object
      required:
        - name
        - holiday_date
      properties:
        name:
          $ref: '#/components/schemas/HolidayName'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        administrative_division_id:
          $ref: '#/components/schemas/AdminDivIdV2Only'
        external_id:
          $ref: '#/components/schemas/ExternalIdV1Only'
        metadata:
          $ref: '#/components/schemas/MetadataV2'
    presenter.CreateHolidayResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/HolidayID'
        name:
          $ref: '#/components/schemas/HolidayName'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        working_date:
          $ref: '#/components/schemas/NextBusinessDate'
        administrative_division_id:
          $ref: '#/components/schemas/AdminDivIdV1Only'
    presenter.CreateHolidayResponseV2:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/HolidayID'
        name:
          $ref: '#/components/schemas/HolidayName'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        next_business_date:
          $ref: '#/components/schemas/NextBusinessDate'
        administrative_division_id:
          $ref: '#/components/schemas/AdminDivIdV1Only'
        metadata:
          $ref: '#/components/schemas/Metadata'
    presenter.GetHolidayCalendarResponse:
      type: object
      properties:
        external_id:
          $ref: '#/components/schemas/ExternalId'
        holiday_calendar_id:
          $ref: '#/components/schemas/HolidayCalendarID'
        metadata:
          $ref: '#/components/schemas/Metadata'
        name:
          $ref: '#/components/schemas/HolidayCalendarName'
        parent_id:
          $ref: '#/components/schemas/ParentId'
        type:
          $ref: '#/components/schemas/HolidayType'
        working_days:
          $ref: '#/components/schemas/HolidayWorkingDays'
    presenter.GetHolidayResponse:
      type: object
      properties:
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        deleted_at:
          $ref: '#/components/schemas/DeletedAt'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        holiday_calendar:
          $ref: '#/components/schemas/HolidayCalendar'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        holiday_id:
          $ref: '#/components/schemas/HolidayID'
        metadata:
          $ref: '#/components/schemas/Metadata'
        name:
          $ref: '#/components/schemas/HolidayName'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        working_date:
          $ref: '#/components/schemas/WorkingDate'
    presenter.HolidayCalendarSearchBusinessDayRequest:
      type: object
      required:
        - current_date
      properties:
        current_date:
          $ref: '#/components/schemas/CurrentDate'
    presenter.HolidayCalendarBusinessDayBatchResponse:
      type: object
      properties:
        working_days:
          type: array
          items:
            $ref: >-
              #/components/schemas/presenter.HolidayCalendarSearchBusinessDayResponse
    presenter.HolidayCalendarNonBusinessDaysResponse:
      type: object
      properties:
        dates:
          type: array
          items:
            $ref: '#/components/schemas/presenter.NonBusinessDay'
        holiday_calendar_metadata:
          $ref: '#/components/schemas/Metadata'
    presenter.HolidayCalendarSearchBusinessDayResponse:
      type: object
      properties:
        current_date:
          $ref: '#/components/schemas/CurrentDate'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        holiday_calendar_id:
          $ref: '#/components/schemas/HolidayCalendarID'
        holiday_calendar_metadata:
          $ref: '#/components/schemas/Metadata'
        holiday_metadata:
          $ref: '#/components/schemas/Metadata'
        is_holiday:
          $ref: '#/components/schemas/IsHoliday'
        is_weekend:
          $ref: '#/components/schemas/IsWeekend'
        name:
          $ref: '#/components/schemas/HolidayName'
        next_business_date:
          $ref: '#/components/schemas/NextBusinessDate'
        prior_business_date:
          $ref: '#/components/schemas/PriorBusinessDate'
    presenter.HolidayCalendarValidateHolidayRequest:
      required:
        - date
      properties:
        date:
          $ref: '#/components/schemas/HolidayDate'
    presenter.HolidayCalendarValidateHolidayResponse:
      type: object
      properties:
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        holiday_calendar:
          $ref: '#/components/schemas/HolidayCalendar'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        holiday_id:
          $ref: '#/components/schemas/HolidayID'
        name:
          $ref: '#/components/schemas/HolidayName'
        working_date:
          $ref: '#/components/schemas/WorkingDate'
    presenter.HolidayResponse:
      type: object
      properties:
        administrative_division:
          $ref: '#/components/schemas/presenter.AdministrativeDivisionResponse'
        id:
          $ref: '#/components/schemas/HolidayID'
        name:
          $ref: '#/components/schemas/HolidayName'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        next_business_date:
          $ref: '#/components/schemas/NextBusinessDate'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
    presenter.HolidayV2Response:
      type: object
      properties:
        administrative_division:
          $ref: '#/components/schemas/presenter.AdministrativeDivisionResponse'
        id:
          $ref: '#/components/schemas/HolidayID'
        name:
          $ref: '#/components/schemas/HolidayName'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        holiday_date:
          $ref: '#/components/schemas/HolidayDate'
        working_date:
          $ref: '#/components/schemas/WorkingDate'
        metadata:
          $ref: '#/components/schemas/Metadata'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
    presenter.ListHolidayCalendarResponse:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        pages:
          $ref: '#/components/schemas/Pages'
        per_page:
          $ref: '#/components/schemas/PerPage'
        total_items:
          $ref: '#/components/schemas/TotalItems'
        items:
          type: array
          items:
            $ref: '#/components/schemas/presenter.GetHolidayCalendarResponse'
    presenter.ListHolidayResponse:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        pages:
          $ref: '#/components/schemas/Pages'
        per_page:
          $ref: '#/components/schemas/PerPage'
        total_items:
          $ref: '#/components/schemas/TotalItems'
        items:
          type: array
          items:
            $ref: '#/components/schemas/presenter.GetHolidayResponse'
    presenter.NonBusinessDay:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Non-business day date. Format = yyyy-mm-dd.
          example: '2023-01-20'
        is_holiday:
          $ref: '#/components/schemas/IsHoliday'
        is_weekend:
          $ref: '#/components/schemas/IsWeekend'
        holiday_metadata:
          type: object
          additionalProperties:
            type: object
          description: >
            A valid JSON schema as specified in
            https://json-schema.org/specification.html. Used to register rules
            used for transaction authorization.
    presenter.NonBusinessDaysResponse:
      type: object
      properties:
        dates:
          type: array
          items:
            $ref: '#/components/schemas/presenter.NonBusinessDay'
        division_metadata:
          $ref: '#/components/schemas/Metadata'
    presenter.SearchBusinessDayRequest:
      type: object
      required:
        - current_date
        - division_id
      properties:
        current_date:
          $ref: '#/components/schemas/HolidayDate'
        division_id:
          type: integer
          description: Division ID
    presenter.SearchBusinessDayResponse:
      properties:
        division_id:
          description: Division ID
          type: integer
          example: 100
        name:
          $ref: '#/components/schemas/HolidayName'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        current_date:
          $ref: '#/components/schemas/CurrentDate'
        next_business_date:
          $ref: '#/components/schemas/NextBusinessDate'
        prior_business_date:
          $ref: '#/components/schemas/PriorBusinessDate'
        is_holiday:
          $ref: '#/components/schemas/IsHoliday'
        is_weekend:
          $ref: '#/components/schemas/IsWeekend'
        holiday_metadata:
          $ref: '#/components/schemas/Metadata'
        division_metadata:
          $ref: '#/components/schemas/Metadata'
    presenter.UpdateHolidayInGroupRequest:
      type: object
      properties:
        description:
          $ref: '#/components/schemas/HolidayDescription'
        metadata:
          $ref: '#/components/schemas/Metadata'
        name:
          $ref: '#/components/schemas/HolidayName'
    presenter.UpdateHolidayRequest:
      description: Data to update a holiday
      type: object
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/HolidayName'
    presenter.UpdateHolidayResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/HolidayID'
        name:
          $ref: '#/components/schemas/HolidayName'
    presenter.UpdateHolidayV2Request:
      description: Data to update a holiday
      type: object
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/HolidayName'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        metadata:
          $ref: '#/components/schemas/Metadata'
    presenter.UpdateHolidayV2Response:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/HolidayID'
        name:
          $ref: '#/components/schemas/HolidayName'
        description:
          $ref: '#/components/schemas/HolidayDescription'
        metadata:
          $ref: '#/components/schemas/Metadata'
    presenter.ValidateHolidayRequest:
      type: object
      required:
        - date
        - division_id
      properties:
        date:
          $ref: '#/components/schemas/HolidayDate'
        division_id:
          type: integer
          description: Division ID
          example: 100
    PriorBusinessDate:
      type: string
      format: date
      description: Business day prior to holiday. Format = yyyy-mm-dd.
      example: '2023-01-02'
    TotalItems:
      type: integer
      description: Total number of result items
      example: 11
    UpdatedAt:
      type: string
      format: datetime
      description: Date and time the holiday was updated. Format = yyyy-mm-ddTHH:mm:ss.
      example: '2024-04-30T17:24:03'
    WorkingDate:
      type: string
      format: date
      description: Next work day following the holiday. Format = yyyy-mm-dd.
      example: '2023-01-02'
