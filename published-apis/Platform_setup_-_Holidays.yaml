paths:
  /holidays-core/v1/holiday:
    post:
      summary: Create holiday
      description: >
        Create a holiday—a day on which your company's offices are closed for
        normal business activity though online financial transactions and other
        business activity could still be occurring.


        For more information, refer to <a
        href="https://developers.pismo.io/pismo-docs/docs/platform-setup-holidays">Platform
        setup - Holidays and administrative divisions</a>.
      tags:
        - Holidays
      operationId: post-holiday
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/presenter.CreateHolidayRequest'
      responses:
        '201':
          description: Holidays response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.CreateHolidayResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: List holidays
      description: |
        Return a paginated list of holidays registered for an organization.
      operationId: get-v1-holidays
      tags:
        - Holidays
      parameters:
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PerPageQuery'
        - $ref: '#/components/parameters/OrderQuery'
        - $ref: '#/components/parameters/OrderByQuery'
        - $ref: '#/components/parameters/AdminDivisionIDQuery'
        - $ref: '#/components/parameters/FilterByNameQuery'
        - $ref: '#/components/parameters/HolidayDateQuery'
        - $ref: '#/components/parameters/BeginDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagination.Pagination'
        '400':
          $ref: '#/components/responses/400BadRequestListHolidays'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /holidays-core/v1/holiday/validate:
    post:
      summary: Get holiday
      description: |
        Get information for an administrative division's holiday.

         **Note:** The response could contain outdated information until at least one minute after an update is made to an administrative division.
      operationId: validate-v1-holiday
      tags:
        - Holidays
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/presenter.ValidateHolidayRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.HolidayResponse'
        '400':
          $ref: '#/components/responses/400BadRequestGetBusinessDay'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFoundCreateHolidayCalendar'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /holidays-core/v1/holiday/{holiday_id}:
    put:
      summary: Update holiday name
      description: |
        Update a holiday's name.
      operationId: put-v1-holiday
      tags:
        - Holidays
      parameters:
        - $ref: '#/components/parameters/HolidayIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/presenter.UpdateHolidayRequest'
      responses:
        '200':
          description: Updated holiday name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.UpdateHolidayResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    delete:
      summary: Delete holiday
      description: |
        Delete a holiday.
      tags:
        - Holidays
      operationId: delete-v1-holiday
      parameters:
        - $ref: '#/components/parameters/HolidayIdPath'
      responses:
        '204':
          description: No content
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /holidays-core/v1/search-business-day:
    post:
      summary: Check if business day
      description: >
        Check if a specific date is a business day for an administrative
        division.


        **Note:** The response could contain outdated information until at least
        one minute after an administrative division update.
      operationId: v1-search-business-day
      tags:
        - Holidays
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/presenter.SearchBusinessDayRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.SearchBusinessDayResponse'
              examples:
                response-v1-search-business-day:
                  $ref: '#/components/examples/SearchBusinessDayResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /holidays-core/v1/non-business-days:
    get:
      summary: List non-business days
      description: |
        Return a list of non-business days.
      operationId: v1-get-non-business-days
      tags:
        - Holidays
      parameters:
        - $ref: '#/components/parameters/OrgHeader'
        - $ref: '#/components/parameters/CIDheader'
        - $ref: '#/components/parameters/AdminDivisionIDQuery'
        - $ref: '#/components/parameters/BeginDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.NonBusinessDaysResponse'
              examples:
                response-v1-non-business-days:
                  $ref: '#/components/examples/NonBusinessDaysResponse'
        '400':
          $ref: '#/components/responses/400BadRequestGetNonBusinessDay'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFoundCreateHolidayCalendar'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /holidays-core/v1/holiday/administrative-division/{administrative_division_id}/ancestors:
    get:
      summary: List holidays with administrative division ancestors
      description: >
        Return a paginated list of holidays registered for an administrative
        division, including those inherited from a parent division.
      operationId: get-v1-holidays-with-administrative-divisions-ancestors
      tags:
        - Holidays
      parameters:
        - $ref: '#/components/parameters/AdminDivisionIdPath'
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PerPageQuery'
        - $ref: '#/components/parameters/OrderQuery'
        - $ref: '#/components/parameters/OrderByQuery'
        - $ref: '#/components/parameters/BeginDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagination.Pagination'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /holidays-core/v2/holiday:
    post:
      summary: Create holiday
      description: >
        Create a holiday&mdash;a day on which your company's offices are closed
        for normal business activity though online financial transactions and
        other business activity could still be occurring. 


        **Note:** This endpoint is designed for transaction banking. For more
        information, refer to [Calendars and holidays in transaction
        banking](doc:calendars-and-holidays-in-transaction-banking).
      operationId: post-v2-holiday
      tags:
        - Holidays v2 - Transaction banking
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/presenter.CreateHolidayRequestV2'
      responses:
        '201':
          description: Holidays response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.CreateHolidayResponseV2'
              examples:
                response-create-holidays-v2:
                  $ref: '#/components/examples/CreateHolidayResponseV2'
        '400':
          $ref: '#/components/responses/400BadRequestCreateHoliday'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: List holidays
      description: >
        Return a paginated list of holidays registered for an organization. 


        **Note:** This endpoint is designed for transaction banking. For more
        information, refer to [Calendars and holidays in transaction
        banking](doc:calendars-and-holidays-in-transaction-banking).
      operationId: get-v2-holidays
      tags:
        - Holidays v2 - Transaction banking
      parameters:
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PerPageQuery'
        - $ref: '#/components/parameters/OrderQuery'
        - $ref: '#/components/parameters/OrderByQuery'
        - $ref: '#/components/parameters/AdminDivisionIDQuery'
        - $ref: '#/components/parameters/HolidayNameQuery'
        - $ref: '#/components/parameters/HolidayDateQuery'
        - $ref: '#/components/parameters/BeginDateQuery'
        - $ref: '#/components/parameters/EndDateQuery'
        - $ref: '#/components/parameters/DeletedHolidaysQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pagination.v2.Pagination'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /holidays-core/v2/holiday/{holiday_id}:
    put:
      summary: Update holiday
      description: >
        Update some holiday information. Only parameters that are passed are
        updated.


        **Note:** This endpoint is designed for transaction banking. For more
        information, refer to [Calendars and holidays in transaction
        banking](doc:calendars-and-holidays-in-transaction-banking).
      operationId: put-v2-holiday
      tags:
        - Holidays v2 - Transaction banking
      parameters:
        - $ref: '#/components/parameters/HolidayIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/presenter.UpdateHolidayV2Request'
      responses:
        '200':
          description: Updated holiday
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.UpdateHolidayV2Response'
        '400':
          $ref: '#/components/responses/400BadRequestUpdateHoliday'
        '401':
          $ref: '#/components/responses/401UnauthorizedError'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
