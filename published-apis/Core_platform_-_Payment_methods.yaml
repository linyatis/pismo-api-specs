  /payment-methods/v2/payments:
    post:
      summary: Create cash-in or cash-out
      description: >
        Create a cash-in or cash-out payment operation. The type of operation
        depends on the processing code (credit for cash-in and debit for
        cash-out). 

        - For cash-in operations, the processing code must be of credit type.
        When [creating a processing code](ref:createprocessingcode), ensure that
        the `balance_impact` is `1` (credit).

        - For cash-out operations, the processing code must be of debit type.
        When [creating a processing code](ref:createprocessingcode), ensure that
        the `balance_impact` is `-1` (debit).


        With this endpoint, you have the following additional options.

        - Specify the `authentication` method and details.

        - Set `pre_authorization` to `true` for operations that require
        additional confirmation and then call the [Confirm pre-authorized
        cash-in or cash-out](ref:post-payment-confirm) endpoint.

        - Set `validation_rules` to control the rules in this flow, such as
        disabling a rule, changing the response code and denial code, and
        forcing a rule.


        Refer to the [Payment methods](doc:payment-methods) and [Payment
        configurations](doc:payments-configurations) guides for additional
        information.


        This endpoint generates a [Platform authorization
        created](https://developers.pismo.io/events/docs/platform-authorization-platform-authorization-1)
        event.


        **Note:** This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      operationId: post-payments
      tags:
        - Payment methods
      security:
        - BearerAuth: []
      requestBody:
        description: Request processing body.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentsRequest'
      responses:
        '200':
          description: >-
            Request was processed successfully, existing authorization with the
            corresponding `tracking_id` returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/v2PaymentsResponse'
        '201':
          description: Request was processed successfully, new authorization created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/v2PaymentsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Amount required:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      amount: amount is a required field.
                Invalid amount:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      amount: >-
                        A maximum of 20 digits, including two decimals, is
                        allowed for the amount field.
                Invalid account:
                  value:
                    code: WONB0001
                    message: Authorized account is different from the request.
                Invalid currency:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      currency: >-
                        Currency is invalid. The field must have the valid ISO
                        4217 currency code.
                Tracking ID required:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      tracking_id: tracking_id is a required field.
                Processing code required:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      processing_code: processing_code is a required field.
        '401':
          description: Access token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401Payments'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/409Payments'
        '422':
          description: Unprocessable request
          content:
