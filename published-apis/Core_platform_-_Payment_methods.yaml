    ForceRequest:
      title: ForceRequest
      type: object
      description: Request object for `POST v1/payments/force` (Force payment).
      properties:
        tracking_id:
          type: string
          minLength: 36
          maxLength: 50
          description: >-
            Unique tracking ID of the forced operation. If you don't provide
            one, the Pismo platform generates it randomly.
          example: be68db6e-8da0-4761-8632-6a51857bd123
          pattern: >-
            ^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
        account_id:
          type: integer
          description: Unique identifier of an account in the Pismo platform.
          example: 101
        amount:
          description: Credit or debit amount
          type: number
          format: float
          example: 12.13
        processing_code:
          description: >-
            Unique 6-character processing code that identifies the credit or
            debit operation.
          type: string
          example: '004000'
          pattern: ^[0-9]{6}$
        currency:
          $ref: '#/components/schemas/Currency'
        descriptor:
          type: string
          description: >-
            Optional text that describes the created operation. The platform
            supports only letters and numbers in this field and removes any
            special characters or emojis.
          example: Single credit adjustment
        metadata:
          type: object
          description: >-
            Any valid JSON key-value object that allows you to add complementary
            custom information.
          example:
            my-custom-key: my-custom-value
        original_authorization:
          type: object
          description: >
            This optional field identifies the original authorization to be
            forced. 

            When this object is provided, both the `id` and `type` fields need
            to be filled.
          properties:
            id:
              type: number
              description: Original authorization ID in the Pismo plataform.
              example: 101
            type:
              type: string
              description: Original authorization type.
              example: NETWORK
              enum:
                - NETWORK
                - PLATFORM
          required:
            - id
            - type
        payment_datetime:
          type: string
          format: date-time
          description: >
            Value date (effective date) of the payment in UTC-0 (RFC3339)
            format. 

            Payments can be backdated but future dates are not allowed.

            example: '2020-01-02T15:14:00.218Z'    
    ForceResponse:
      properties:
        authorization_id:
          description: Generated authorization ID
          type: integer
          format: int64
          example: 15301234
        event_date:
          description: Date and time of the authorization, in the UTC-0 (RFC3339) format.
          type: string
          format: date-time
          example: '2020-01-02T15:14:00.218Z'
        tracking_id:
          description: >-
            Unique tracking ID of the forced operation. If you don't provide
            one, the Pismo platform generates it randomly.
          type: string
          minLength: 36
          maxLength: 50
          example: 82766158-514c-42f0-87e2-1bb3250c6dee
      description: Successful response object from `v1/payments/force` (Force operation).
      title: ForceResponse
    ForceCancelRequest:
      title: ForceCancelRequest
