openapi: 3.1.0
info:
  title: Core platform - Payment methods
  version: 1.0.0
  description: API to handle payments.
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io
    description: Sandbox API server for testing
  - url: https://gw-pci.pismolabs.io
    description: Sandbox PCI API server for testing
tags:
  - name: Payment methods
    description: Endpoints to manage cash-in and cash-out payments and P2P transfers.
  - name: Payments
    description: Endpoints to manage payments and transfers.
  - name: Force operations
    description: APIs to manage force operations.
  - name: Hold funds
    description: APIs to manage hold funds.
  - name: Payment requests
    description: APIs to manage payment requests.
  - name: Installments payments
    description: APIs to manage installments payments.
  - name: Capture pre-authorizations
    description: APIs to capture pre-authorizations.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Account access token. Tokens can expire quickly, which can result in an
        "Unauthorized" error.
      bearerFormat: JWT
  schemas:
    ValidationRules:
      type: object
      description: Validation rules performed in the flow.
      additionalProperties:
        $ref: '#/components/schemas/RuleConfig'
    RuleConfig:
      type: object
      description: Configuration related to a rule.
      properties:
        denial_reasons:
          $ref: '#/components/schemas/DenialReasons'
        disable:
          type: boolean
          description: Flag to disable this rule throughout Payments validation flow.
        force:
          type: boolean
          description: Flag to force this rule throughout Payments validation flow.
    DenialReasons:
      type: object
      description: Denial reasons linked to a rule.
      additionalProperties:
        $ref: '#/components/schemas/ReasonConfig'
    ReasonConfig:
      type: object
      properties:
        denial_code:
          type: string
          description: >-
            Denial code that must be used when this denial reason is the one
            that caused the request to be denied.
          example: DAL
        response_code:
          type: string
          description: >-
            Response code that must be used when this denial reason is the one
            that caused the request to be denied.
          example: '57'
    CalculatedAmounts:
      title: Calculated amounts
      type: object
      properties:
        contract_amount:
          type: number
          description: >-
            Total amount of the authorization after calculation and addition of
            any necessary fee.
          example: 110
        principal_amount:
          type: number
          description: >-
            Total amount of the authorization after calculation without the
            addition of any fee.
          example: 100
        total_monthly_interest_rate:
          type: number
          description: >-
            This describes the total percentage rate of interests monthly
            applied to this contract.
          example: 9.99
        total_annual_interest_rate:
          type: number
          description: >-
            This describes the total percentage rate of interests annual applied
            to this contract.
          example: 27
        posting_date:
          type: string
          format: date
          description: >
            Date of the statement when the first installment should be
            considered. 

            This field is only considered in the first installment when the
            billing should be postponed until the statement correspoding to this
            date.

            This field will be ignored if there is a statement_id present or it
            is not the first installment (number different from 1)
          example: '2023-01-01T00:00:00.000Z'
        statement_id:
          type: integer
          description: >
            Pismo internal identifier of the statement when the first
            installment should be considered. 

            This field is only considered in the first installment when the
            billing should be postponed until the statement correspoding to this
            id.

            This field will take precedence over posting_date when both are
            present.

            This field will be ignored if it is not the first installment
            (number different from 1)
          example: 1234455
        postings:
          $ref: '#/components/schemas/Postings'
        installments:
          $ref: '#/components/schemas/Installments'
    CalculatedAmountsAuthorization:
      type: object
      description: Calculated amounts for the authorization.
      properties:
        contract_amount:
          type: number
          description: >-
            Total amount of the authorization after calculation and addition of
            any necessary fees.
          example: 110
        description:
          type: string
          description: Description of the plan.
          example: 0+24 with interest
        fees:
          $ref: '#/components/schemas/Fee'
        interests:
          $ref: '#/components/schemas/Interest'
        installments:
          $ref: '#/components/schemas/InstallmentsAuthorization'
        number_of_installments:
          type: integer
          minimum: 2
          maximum: 100
          description: Number of installments in this calculation.
          example: 12
        plan_id:
          type: string
          description: ID of the plan used to perform this calculation.
          example: PLAN_ID_1
        principal_amount:
          type: number
          description: >-
            Total amount of the authorization after calculation without the
            addition of any fees.
          example: 100
        taxes:
          $ref: '#/components/schemas/Tax'
        total_annual_rate:
          type: number
          description: Total interest percentage rate applied to this contract annually.
          minimum: 0
          example: 27
        total_monthly_rate:
          type: number
          description: Total interest percentage rate applied to this contract monthly.
          minimum: 0
          example: 9.99
        additional_financial_details:
          $ref: '#/components/schemas/AdditionalFinancialDetails'
    AdditionalFinancialDetails:
      description: Additional information related to the authorization.
      properties:
        effective_annual_cost:
          type: number
          description: Total annual finance charge expressed as a percentage rate.
          example: 0.13
        effective_monthly_cost:
          type: number
          description: Total monthly finance charge expressed as a percentage rate.
          example: 0.13
        annual_interest_rate:
          type: number
          description: Percentage of interest charged over the course of a year.
          example: 10
    Fee:
      type: array
      description: List of applied fees on this calculation.
      items:
        type: object
        properties:
          type:
            type: string
            description: >-
              Type of applied fee. For example, fixed, percentage, or any other
              type.
            example: fixed
            minLength: 2
            maxLength: 30
          amount:
            type: number
            description: Calculated amount of this fee.
            example: 10
          rate:
            type: number
            description: >-
              When using a percentage fee, this is the percentage rate used for
              calculating this fee. For example, the value `10` indicates 10%.
            minimum: 0
            example: 10
    Interest:
      type: array
      description: List of interests applied to this calculation.
      items:
        type: object
        properties:
          type:
            type: string
            description: >-
              Type of applied interest. For example, weekly, monthly, annually,
              or any other type.
            example: monthly
            minLength: 2
            maxLength: 30
          amount:
            type: number
            description: Calculated amount of this interest.
            example: 8.73
          rate:
            type: number
            description: >-
              Percentage rate used for calculating this interest. For example,
              the value `9.99` indicates 9.99%.
            minimum: 0
            example: 9.99
    Tax:
      type: array
      description: List of applied taxes on this calculation.
      items:
        type: object
        properties:
          type:
            type: string
            description: >-
              Type of applied tax. For example, DAILY_IOF, FIXED_IOF,
              INTERNATIONAL_IOF (taxes on financial operations) in Brazil, SDRT
              (stamp duty reserve tax) in United Kingdom, FTT (financial
              transaction tax) in European Union, STT (securities transaction
              tax) in India, or any other type.
            example: INTERNATIONAL_IOF
            minLength: 2
            maxLength: 50
          amount:
            type: number
            description: Calculated amount of this tax.
            example: 0.38
          rate:
            type: number
            description: >-
              Percentage rate used for calculating this tax. For example, the
              value `0.38` indicates 0.38%.
            minimum: 0
            example: 0.38
    InstallmentsAuthorization:
      type: array
      description: List and details for each installment.
      items:
        type: object
        properties:
          number:
            type: integer
            description: Order number of this installment in the hierarchy.
            minimum: 1
            maximum: 100
            example: 1
          contract_amount:
            type: number
            description: >-
              Total amount of the installment after calculation and addition of
              any necessary fees.
            example: 11
          principal_amount:
            type: number
            description: >-
              Total amount of the installment after calculation without the
              addition of any fees.
            example: 10
          amortization_amount:
            type: number
            description: Amortization amount related to this installment.
            example: 7.5
          fees:
            $ref: '#/components/schemas/Fee'
          interests:
            $ref: '#/components/schemas/Interest'
          taxes:
            $ref: '#/components/schemas/Tax'
    PaymentMethodsAuthorizationRequest:
      type: object
      description: Request payment methods authorization processing.
      required:
        - currency_code
        - mti
        - network
      properties:
        amount:
          type: number
          description: >
            Total amount of the authorization being requested in the local
            currency of the acquirer or source location of the transaction.


            **REQUIRED** in authorization requests, and optional in cancellation
            and confirmation requests. If this amount is omitted, the platform
            confirms or cancels the same amount as the original authorization.
            If the original authorization is not available and a forced
            confirmation is requested, this field is also required.
          example: 100
        currency_code:
          type: string
          description: >-
            ISO-4217 alphabetic or numeric (3 characters) authorization currency
            code. For example, either BRL or 986 for Brazilian real.
          example: '986'
        mti:
          type: string
          description: >
            Message type identifier. Indicates if this is an authorization,
            cancellation, or confirmation request.

            - `0100` - authorization request

            - `0120` - authorization advice request (coming soon)

            - `0200` - authorization SMS request

            - `0202` - confirmation request

            - `0400` - cancellation request

            - `0402` - confirmation of cancellation

            - `0420` - cancellation advice request (coming soon)
          enum:
            - '0100'
            - '0120'
            - '0200'
            - '0202'
            - '0400'
            - '0402'
            - '0420'
        network:
          type: string
          description: Network originating this request.
          example: Mastercard
        account_id:
          type: integer
          description: >
            Pismo ID of the account to be used as the owner of this request. 


            **REQUIRED** if `document_number`, card information (`card.pan` or
            `card.stored_id`), bank information (`bank.account` and
            `bank.branch`) are not provided.
          example: 123
        authentication:
          $ref: '#/components/schemas/Authentication'
        authorization_code:
          type: string
          description: >-
            Alphanumeric code generated in an authorization request and assigned
            to the authorization response.
          example: ABC123
        authorization_datetime:
          type: string
          format: date-time
          description: >-
            Date and time when the authorization request took place outside the
            Pismo platform, formatted in UTC-0 RFC3339 with milliseconds
            (yyyy-MM-ddThh:mm:ss.SSSZ).
          example: '2023-01-01T00:00:00.000Z'
        authorization_mode:
          type: string
          description: >
            Defines the mode of the authorization being requested. Credit cards
            can operate only in `CREDIT` mode while debit cards (from savings or
            checking accounts) can operate only in `DEBIT` code. Combo and
            multi-application cards can operate in both modes. 


            **REQUIRED** for card authorization requests (idenfified by
            `card.pan` or `card.stored_id`) with the `mti` values `0100` and
            `0120`.
          enum:
            - CREDIT
            - DEBIT
        bank:
          type: object
          description: >-
            Identifies bank's information. If provided, both bank `account` and
            `branch` fields are **REQUIRED**.
          properties:
            account:
              type: string
              description: >
                Identifies the bank's account. This field should be used in the
                requests authorized based on the client's bank. 


                **REQUIRED** together with the `bank.branch` field if
                `account_id`, `document_number`, or card information (`card.pan`
                or `card.stored_id`) are not provided.
              example: '2146125'
            branch:
              type: string
              description: >
                Identifies the bank's branch. This field should be used in
                requests authorized based on the client's bank. 


                **REQUIRED** together with the `bank.account` field if
                `account_id`, `document_number`, or card information (`card.pan`
                or `card.stored_id`) are not provided.
              example: '15235'
        beneficiary_id:
          type: string
          description: >-
            Unique string identifier for the beneficiary associated with the
            account.
          example: 2c298321-bc21-4039-9c45-780cc6d4ec46
        calculated_amounts:
          $ref: '#/components/schemas/CalculatedAmountsAuthorization'
        card:
          type: object
          description: >
            Contains all information related to the card used to perform this
            authorization. 


            **REQUIRED** if `account_id`, `document_number`, or bank information
            (`bank.account` and `bank.branch`) are not provided.
          properties:
            pan:
              type: string
              description: >-
                Primary account number of the card being used for authorization.
                Either this field or `stored_id` is **REQUIRED** to identify the
                card to be used in the authorization process.
              example: '5555550000000001'
            stored_id:
              type: string
              description: >-
                ID of the card-on-file stored in the platform. Either this field
                or `pan` is **REQUIRED** to identify the card to be used in the
                authorization process.
              example: '652973000071210932'
            expiration_date:
              type: string
              description: >-
                Card expiration date in the YYMM format entered by the
                cardholder at the authorization request.
              example: '2601'
            cvv2:
              type: string
              description: CVV2 entered by the cardholder at the authorization request.
              example: '123'
            track1_data:
              type: string
              description: >-
                Track1 data captured at the terminal while performing an
                authorization with magnet stripe.
              example: '123'
            track2_data:
              type: string
              description: >-
                Track2 data captured at the terminal while performing an
                authorization with magnet stripe.
            pin_block:
              type: string
              description: >-
                Pin block related to the password entered by the cardholder at
                the authorization request.
            cryptogram_data:
              type: object
              description: >-
                Cryptogram data captured at the terminal while performing an
                authorization using chip.
              properties:
                amount_authorized:
                  type: string
                  description: Amount authorized referring to the tag 9F02.
                application_cryptogram:
                  type: string
                  description: >-
                    Application cryptogram information referring to the tag
                    9F26.
                application_interchange_profile:
                  type: string
                  description: Application interchange profile referring to the tag 82.
                application_transaction_counter:
                  type: string
                  description: Application transaction counter referring to the tag 9F36.
                application_version_number:
                  type: string
                  description: Application version number referring to the tag 9F09.
                cardholder_verification_method:
                  type: string
                  description: >-
                    Cardholder verification method (CVM) results referring to
                    the tag 9F34.
                cryptogram_information_data:
                  type: string
                  description: Cryptogram information data referring to the tag 9F27.
                dedicated_file_name:
                  type: string
                  description: Dedicated file name referring to the tag 84.
                interface_device_serial_number:
                  type: string
                  description: Interface device serial number referring to the tag 9F1E.
                issuer_application_data:
                  type: string
                  description: Issuer application data referring to the tag 9F10.
                issuer_authentication_data:
                  type: string
                  description: Issuer authentication data referring to the tag 91.
                issuer_script_template:
                  type: string
                  description: Issuer script template referring to the tag 71.
                pan_sequence_number:
                  type: string
                  description: Pan sequence number referring to the tag 5F34.
                terminal_capabilities:
                  type: string
                  description: Terminal capabilities information referring to the tag 9F33.
                terminal_country_code:
                  type: string
                  description: Application interchange profile referring to the tag 9F1A.
                terminal_type:
                  type: string
                  description: Terminal type referring to the tag 9F35.
                terminal_verification_result:
                  type: string
                  description: Terminal verification result (TVR) referring to the tag 95.
                transaction_category_code:
                  type: string
                  description: Transaction category code referring to the tag 9F53.
                transaction_currency_code:
                  type: string
                  description: Transaction currency code referring to the tag 5F2A.
                transaction_date:
                  type: string
                  description: Transaction date referring to the tag 9A.
                transaction_sequence_counter:
                  type: string
                  description: Transaction sequence counter referring to the tag 9F41.
                transaction_type:
                  type: string
                  description: Transaction type referring to the tag 9C.
                unpredictable_number:
                  type: string
                  description: Unpredictable number referring to the tag 9F37.
        clearing_type:
          type: string
          description: >-
            Defines whether confirmation is performed at request time (`ONLINE`)
            or pending a confirmation request (`OFFLINE`). If not provided, the
            platform uses the `mti` value to define this behavior (`0100` for
            `OFFLINE` and `0200` for `ONLINE`).
          enum:
            - ONLINE
            - OFFLINE
        document_number:
          type: string
          description: >
            Document number related to the account owner of this request. Used
            in the requests authorized based on client document number. 


            **REQUIRED** if `account_id`, card information (`card.pan` or
            `card.stored_id`), or bank information (`bank.account` and
            `bank.branch`) are not provided.
          example: '39947739977'
        description:
          type: string
          description: >-
            Optional text that describes the operation and appears on the
            customer's statement as a descriptive line for the transaction. If
            provided, this value populates the `soft_descriptor` field of the
            resulting transactions. If not provided, the `soft_descriptor` field
            for the transaction inherits its value from the transaction type’s
            `description` field.
          example: Custom purchase.
        entry_mode:
          type: string
          description: >
            Defines the authorization entry mode (two first characters) and pin
            entry capability (third character). This field should have either
            two or three digits depending on the usage of the information. 


            **REQUIRED** for authorization requests with the `mti` values
            `0100`, `0120` and `0200`.
          example: '051 # 05 - Chip / 1 - Pin supported'
        has_error:
          type: boolean
          description: >-
            This flag must be used only in the confirmation flow (`mti` -
            `0202`). If set to `true`, this indicates that the confirmation
            operation has an error and the platform will cancel any approved
            authorization related to this request instead of confirming it.
          example: true
          default: false
        installment_plan_id:
          type: string
          description: >-
            ID of the installment plan that should be used to calculate this
            purchase.
          example: PLAN_0_24
        merchant:
          type: object
          description: >
            All information related to the merchant where the authorization took
            place. 


            Only used for authorization requests with the `mti` values `0100`
            and `0120`.
          properties:
            id:
              type: string
              description: >
                Identifies the card acceptor that defines the point of the
                transaction in both local and interchange environments. This is
                used as a merchant ID to uniquely identify the merchant in a POS
                transaction.


                **REQUIRED** if the `merchant` object is filled in.
              example: '12399'
            category_code:
              type: string
              description: >
                Merchant category code (MCC) of the merchant’s type of business
                or service. 


                **REQUIRED** if the `merchant` object is filled in.
              example: '5099'
            name:
              type: string
              description: |
                Name of the merchant where the authorization is performed. 

                **REQUIRED** if the `merchant` object is filled in.
              example: Acme
            city:
              type: string
              description: City of the merchant where the authorization is performed.
              example: San Diego
            country:
              type: string
              description: >
                Country code of the merchant where the authorization is
                performed. 


                **REQUIRED** if the `merchant` object is filled in.
              example: USA
            terminal_id:
              type: string
              description: ID of the terminal at the card acceptor location.
              example: '12345699'
            marketplace_id:
              type: string
              description: |
                ID of the marketplace where this purchase took place.

                **REQUIRED** if the `merchant` object is filled in.
              example: mk123456
        metadata:
          type: object
          description: >-
            Any valid json containing useful information for the flow. This
            information is used by the authorization platform. It is only be
            replicated to the events issued during the flow.
        nsu:
          type: string
          description: Sequential unique number that identifies this authorization.
          example: '12789223'
        number_of_installments:
          type: integer
          minimum: 1
          maximum: 100
          description: >-
            Number of installments in this authorization request. Purchases
            without installments should have the value 1.
          example: 12
        original_authorization_id:
          type: integer
          description: >
            This field can be used to match the original authorization in
            cancellation and confirmation requests. This should contain the same
            value received in the `authorization_id` field for the authorization
            response. 


            **REQUIRED** for cancellation and confirmation requests with the
            `mti` values `0400`, `0420`, `0402` and `0202` if the
            `original_tracking_id` is not provided.

            **NOT REQUIRED** for confirmation requests when the force original
            authorization configuration is enabled.
          example: 58799254
        original_tracking_id:
          type: string
          description: >
            This field can be used to match the original authorization in
            cancellation and confirmation requests. This should contain the same
            value received in the `tracking_id` field for the authorization
            response. 


            **REQUIRED** for cancellation and confirmation requests with the
            `mti` values `0400`, `0420`, `0402` and `0202` if the
            `original_authorization_id` is not provided.

            **NOT REQUIRED** for confirmation requests when the force original
            authorization configuration is enabled.
          example: ab879e9e-433b-499f-a77b-4e90ab509afd
        posting_date:
          type: string
          format: date
          description: >
            Date of the statement when the authorization will be posted. 

            For authorization with installments, this is where the first
            installment will be posted being followed by the other installments
            on next statements.

            This field will be ignored if a `statement_id` is provided.

            If there is an external calculation call, the response of that
            calculation will take precedence over this field.
          example: '2023-01-01T00:00:00.000Z'
        pre_authorization:
          $ref: '#/components/schemas/PreAuthorization'
        processing_code:
          type: string
          description: >
            Unique alphanumeric identifier that defines how the Pismo platform
            handles this financial authorization. 


            **Required when:**  
              - `mti` is `0100`, `0120`, or `0200`
              - `mti` is `0202` or `0402` and force original authorization configuration is enabled
          example: 00AB01
        program_id:
          type: integer
          description: >
            This field is used for authorizations that are based on a document
            number. If this field is provided, the platform uses it to determine
            which account to use for the authorization with the same
            `program_id` or decline if there is no account in this program. If
            this field is not provided, the platform selects the account based
            on the configurations.
          example: 123
        statement_id:
          type: integer
          description: >
            Pismo internal ID of the statement when the authorization will be
            posted. 

            For authorization with installments, this is where the first
            installment will be posted being followed by the other installments
            on next statements.

            This field takes precedence over the `posting_date` when both are
            present.

            If there is an external calculation call, the response of that
            calculation takes precendence over this field.
          example: 1234455
        tid:
          type: string
          description: Transaction ID received with the authorization message.
          example: '10119031908214800419'
        tracking_id:
          type: string
          description: >-
            Unique tracking ID used to identify the authorization request. If
            not provided, the platform generates a new one and the request is
            handled as a new request. Different requests using the same tracking
            ID are considered to be the same request and return the same result.
          example: ab879e9e-433b-499f-a77b-4e90ab509afd
        authorization_validations:
          $ref: '#/components/schemas/AuthorizationValidations'
    PaymentMethodsAuthorizationResponse:
      type: object
      description: Payment methods authorization response.
      required:
        - account_id
        - authorization_code
        - authorization_id
        - calculated_amounts
        - number_of_installments
        - response_code
        - tracking_id
        - validation_results
      properties:
        account_id:
          type: integer
          description: Pismo ID of the account assigned as the owner of this request.
          example: 123
        authorization_code:
          type: string
          description: >-
            Alphanumeric code generated in an authorization request and assigned
            to the authorization response. Used on cancellation or confirmation
            requests to match the original authorization.
          example: ABC123
        authorization_id:
          type: integer
          description: Pismo ID of the authorization created for this request.
        calculated_amounts:
          type: object
          properties:
            contract_amount:
              type: number
              description: >-
                Total amount of the authorization after calculation with the
                addition of any necessary fees.
              example: 100
            principal_amount:
              type: number
              description: >-
                Total amount of the authorization after calculation without the
                addition of any necessary fees.
              example: 100
            postings:
              type: object
              description: Information about the applied fee or tax.
              additionalProperties:
                type: number
                description: Value of the applied fee or tax.
            rates:
              type: object
              description: >-
                Rates used to calculate fees and taxes represented on Postings
                object.
              additionalProperties:
                type: number
                description: Value of the applied rate.
        number_of_installments:
          type: integer
          description: >-
            Number of installments in this authorization request. Purchases
            without installments should have the value `1`.
          example: 12
        response_code:
          type: string
          description: >-
            Response code indicating the decision for the authorization request.
            Refer to [Authorization validation rules for platform
            operations](https://developers.pismo.io/pismo-docs/docs/authorization-validation-rules-for-platform-operations)
            for details.
          example: '00'
        tracking_id:
          type: string
