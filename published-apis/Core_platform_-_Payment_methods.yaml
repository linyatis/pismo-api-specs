  /payments/v1/payments:
    post:
      operationId: post-payments-v1-payments
      summary: Transfer funds
      description: >-
        **Note:** Enhanced features and improvements are available in the
        [Payment methods](doc:payment-methods) API, the new application
        interface for non-card network authorizations. This Transfer funds
        endpoint is still supported, but all new feature developments will be
        available only in the Payment methods API. For more information, contact
        your Pismo representative.


        -----

        Transfer funds between a source (`from`) and destination (`to`). 


        The `to` and `from` objects contain information about one of the
        following payment methods:


        1. **`account`** - Platform merchant or customer account

        2. **`card`** - Credit card stored in a digital wallet, known as a
        **card on file**

        3. **`custom_info`** - Custom payment information, usually about an
        external account

        4. **`merchant`** - Platform merchant


        ### Transfers


        You can use this endpoint to make the following types of transfers:

          * Pismo platform account to Pismo platform account (P2P)
          * Pismo platform account to merchant account (P2M)
          * Card to platform account (P2P with card) 
          * Pismo platform account to merchant account with card (P2M with card)
          * Merchant account to merchant account (M2M)
          * Cashin
          * Cashin with card
          * Cashout
          * Cashout with card
          * Payment, which requires token (code) from [creating payment request](ref:payment-requests)

        See the <b>Examples</b> drop-down menu for sample payloads for each of
        these transfer types. See the [Make transfer](doc:make-transfer) guide
        for more details on these transfer type use cases.


        This endpoint generates an [Authorization
        created](https://developers.pismo.io/events/docs/authorization-authorization-event-1)
        event. 


        **Note:** This endpoint requires an account-specific access token.
        Getting an account token requires you to call the [Get OpenID access
        token](ref:post-passport-v1-oauth2-token-1) endpoint with an account ID.
        Tokens can expire quickly, which can result in an <b>Unauthorized</b>
        message.
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: x-tenant
          required: true
          description: Unique Org ID.
          schema:
            type: string
            example: TN-c0e4c660-9059-404c-ab22-761aa431766c
            pattern: >-
              TN\-[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}
            minLength: 39
            maxLength: 39
        - in: header
          name: x-cid
          description: >
            The correlation identifier field is used to link related API
            requests and events. 

            For example, if a user makes an authorization request with 10
            installments, this generates 1 authorization event and 10
            transaction events all containing the same correlation ID. 

            The x-cid can help the Pismo engineering team track everything
            related to a call.
          schema:
            type: string
            example: c737895c-8159-4c0c-a92a-a4f8600bff37
        - in: header
          name: x-account-id
          description: Optional account ID. For P2P, this should be the `from` account ID.
          schema:
            type: number
            example: 1
        - in: header
          name: x-skip-timeline
          description: >-
            Any value here results in an event **not** being generated in the
            customer timeline.
          schema:
            type: string
            example: 'true'
        - in: header
          name: x-alt-conflict
          description: >-
            If `true`, the HTTP response status code returned is 208 (already
            reported) and not 409 (conflict)
          schema:
            type: string
            example: 'true'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentsModel'
            examples:
              P2P:
                value:
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      account:
                        id: 2417
                  to:
                    - processing_code: '004000'
                      account:
                        id: 2418
              P2P with card:
                value:
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      card:
                        id: f45dbe01-4109-11ea-ab1d-3286e4ea7ade
                        account_id: 2417
                  to:
                    - processing_code: '004000'
                      account:
                        id: 2418
              P2M:
                value:
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      account:
                        id: 2417
                  to:
                    - processing_code: '004000'
                      merchant:
                        id: 2418
                        point_of_sales_id: 123
              P2M with card:
                value:
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      card:
                        id: f45dbe01-4109-11ea-ab1d-3286e4ea7ade
                        account_id: 2417
                  to:
                    - processing_code: '004000'
                      merchant:
                        id: 2418
                        point_of_sales_id: 123
              M2M:
                value:
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      merchant:
                        id: 2417
                  to:
                    - processing_code: '004000'
                      merchant:
                        id: 2418
                        point_of_sales_id: 123
              Cashin:
                value:
                  from:
                    - custom_info:
                        type: DEPOSIT
                  to:
                    - processing_code: '004000'
                      amount: 12.34
                      account:
                        id: 2417
              Cashin (card):
                value:
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      card:
                        id: f45dbe01-4109-11ea-ab1d-3286e4ea7ade
                        account_id: 2417
                  to:
                    - processing_code: '004000'
                      account:
                        id: 2417
              Cashout:
                value:
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      account:
                        id: 2417
                  to:
                    - custom_info:
                        type: WITHDRAWAL
                      beneficiary_id: 2c298321-bc21-4039-9c45-780cc6d4ec46
              Cash-out pre-authorization:
                value:
                  capture: false
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      account:
                        id: 2417
                  to:
                    - custom_info:
                        type: WITHDRAWAL
                      beneficiary_id: 2c298321-bc21-4039-9c45-780cc6d4ec46
              Cashout (card):
                value:
                  from:
                    - processing_code: '002000'
                      amount: 12.34
                      card:
                        id: f45dbe01-4109-11ea-ab1d-3286e4ea7ade
                        account_id: 2417
                  to:
                    - custom_info:
                        type: WITHDRAWAL
                      beneficiary_id: 2c298321-bc21-4039-9c45-780cc6d4ec46
              Payment:
                value:
                  from:
                    - processing_code: '002000'
                      amount: 10
                      account:
                        id: 2417
                  token: test-token-1
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentsResponse'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Invalid payload:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Invalid payload
                Tracking ID is longer than 50 characters:
                  value:
                    error_code: WP2P0019
                    code: WP2P0019
                    message: Tracking ID is longer than 50 characters.
                Payment request has been paid already:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Payment request already settled
                Not possible to determine the type of payment operation:
                  value:
                    error_code: EP2P9999
                    code: EP2P9999
                    message: Unable to proceed with request!
                Invalid debit processing code:
                  value:
                    error_code: WP2P0005
                    code: WP2P0005
                    message: Invalid debit processing code.
                Invalid credit processing code:
                  value:
                    error_code: WP2P0006
                    code: WP2P0006
                    message: Invalid credit processing code.
                Processing code not found:
                  value:
                    error_code: WP2P0003
                    code: WP2P0003
                    message: No Orgs Operation Found
                Account has no credit status active:
                  value:
                    error_code: WP2P0002
                    code: WP2P0002
                    message: Account has no credit status active.
                Account has no debit status active:
                  value:
                    error_code: WP2P0002
                    code: WP2P0002
                    message: Account has no debit status active.
                Account not found:
                  value:
                    error_code: WLDG0019
                    code: WLDG0019
                    message: No Accounts authorization found.
                Currency sent is invalid:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: The currency sent is invalid.
                Flex controls evaluation results:
                  description: Flex controls evaluation results
                  value:
                    evaluation_result: false
                    message: >-
                      Restriction rule
                      [max_value_authorized_device_unique_transaction] does not
                      pass.
                    error_code: RULV10400
                    deny_code: DEVICE_LIMIT_DAILY_TRANSACTION
                    code: ERUL0404
                    response_code: 57
                    custom_code: AA1
                    evaluated_controls:
                      - id: max_value_authorized_device_unique_transaction
                        name: max_value_authorized_device_unique_transaction
                        evaluation_result: false
                        message: >-
                          Restriction rule
                          [max_value_authorized_device_unique_transaction] does
                          not pass.
                        deny_code: DEVICE_LIMIT_DAILY_TRANSACTION
                        max_limit: 0
                        accumulated_limit: 0
                        available_limit: 0
                      - id: max_value_authorized_device_daily
                        name: max_value_authorized_device_daily
                        evaluation_result: true
                        message: ''
                        deny_code: DEVICE_LIMIT_DAILY
                        max_limit: 100000
                        accumulated_limit: 30000
                        available_limit: 70000
                Acquirer credential code sent is invalid:
                  value:
                    error_code: WP2P0020
                    code: WP2P0020
                    message: The credential code should be a valid uuid
                Parameter OPTIN SAVING ACCOUNT is off for this account:
                  value:
                    error_code: WP2P0013
                    code: WP2P0013
                    message: >-
                      Operation not allowed. Parameter OPTIN SAVING ACCOUNT is
                      off.
                No limit available:
                  value:
                    error_code: WLDG0006
                    code: WLDG0006
                    message: >-
                      No AvailableCreditLimit to complete the transaction -
                      amount: 10, availableCreditLimit: 5.00
                Limit of two decimal places:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: The amount must have a maximum of two decimal places.
                Exceed amount limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits, including two decimals, is allowed
                      for the amount field.
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TrackingIdAlreadyInUseResponse'
                  - $ref: '#/components/schemas/ErrorModel'
              examples:
                Tracking id is already in use by an ongoing request:
                  value:
                    error_code: WP2P0010
                    code: WP2P0010
                    message: Tracking id is already in use.
                Tracking id has been already used:
                  value:
                    error_code: WP2P0010
                    code: WP2P0010
                    message: Tracking id is already in use.
                    authorizations:
                      - authorization_id: 16397984
                        response_code: '00'
                        amount: 12.13
                        date: '2020-01-02T15:14:00.218Z'
        '422':
          description: Unprocessable entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Authorized account is different from request:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Authorized account is different from the request
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Unexpected Error:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Unexpected Error
                Internal server error:
                  value:
                    error_code: ELDG500
                    code: ELDG500
                    message: Internal server error
                Internal server error getting Payment Configuration:
                  value:
                    error_code: EPCG501
                    code: EPCG501
                    message: Internal server error
                Unmarshal error:
                  value:
                    error_code: ELDG500
                    code: ELDG500
                    message: Unmarshal error
                Unable to proceed with request:
                  value:
                    error_code: EP2P9999
                    code: EP2P9999
                    message: Unable to proceed with request!
                Unable to connect to acquirer gateway:
                  value:
                    error_code: EP2P0001
                    code: EP2P0001
                    message: Unable to connect to acquirer gateway
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Acquirer gateway bad response:
                  value:
                    error_code: EP2P0002
                    code: EP2P0002
                    message: Acquirer gateway bad response
  /payments/v1/payments/force:
    post:
      operationId: post-payments-v1-force
      summary: Force operation
      description: >-
        Force a credit or debit operation in the specified account using the
        `account_id`, the `processing_code`, and the `amount` provided.

        This operation directly impacts the balance but does not perform any of
        the validations that are done in the [Transfer
        funds](ref:post-payments-v1-payments) endpoint, such as validating the
        account status, account balance, and flex controls.


        This endpoint generates an [Authorization
        created](https://developers.pismo.io/events/docs/authorization-authorization-event-1)
        event with authorization > type "FORCE".


        For additional information, see the [Force
        operation](doc:force-operation) guide. 


        ## Forced credit example


        Assuming that  `processing_code` "090907" is defined as credit type, the
        following payload executes a forced credit operation:


        ```json  

        {
          "amount": 12.34,
          "account_id": 2417,
          "processing_code": "090907",
          "descriptor": "Cashback credit",
          "original_authorization": {
            "id": 123,
            "type": "PLATFORM"
          },
          "metadata": {
            "my-custom-key": "my-custom-info"
          }
        }

        ```
      tags:
        - Force operations
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: x-tenant
          required: true
          description: Unique Org ID
          schema:
            type: string
            example: TN-c0e4c660-9059-404c-ab22-761aa431766c
            pattern: >-
              TN\-[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}
            minLength: 39
            maxLength: 39
        - in: header
          name: x-cid
          description: >-
            Related correlation identifier. If none is provided, a random one is
            generated.
          schema:
            type: string
            example: c737895c-8159-4c0c-a92a-a4f8600bff37
        - in: header
          name: x-account-id
