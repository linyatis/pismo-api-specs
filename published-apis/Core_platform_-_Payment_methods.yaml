    PreAuthorization:
      type: boolean
      description: >-
        If set to `true`, this flag indicates that the operation is
        pre-authorized and requires additional confirmation.
      default: false
      example: false
    AuthorizationValidations:
      type: object
      description: >-
        Contains additional data to be used in the authorization flow. This
        field is only considered for authorizations. Cancellations and
        confirmations will retrieve it based on the original authorization.
      properties:
        is_device_registered:
          description: >-
            Indicates whether the device used for the operation is registered
            according to the financial institution's security policies.
          type: boolean
          example: true
        associated_ids:
          $ref: '#/components/schemas/AssociatedIDs'
    OriginalAuthorization:
      type: object
      description: >
        This optional field identifies the original authorization to be linked. 

        When this object is provided, both the `id` and `type` fields need to be
        filled.
      properties:
        id:
          type: integer
          description: Original authorization ID in the Pismo platform.
          example: 101
        type:
          type: string
          description: Original authorization type.
          example: NETWORK
          enum:
            - NETWORK
            - PLATFORM
      required:
        - id
        - type
    AssociatedIDs:
      type: object
      description: External IDs used in the authorization flow.
      properties:
        payment_id:
          description: External ID associated with the authorization.
          type: string
          example: 319d00f5-48de-4c71-ad47-40b1e9c4e37f
        origin_id:
          description: External ID of the origin of the authorization.
          type: string
          example: CUSTOM_ORIGIN
    Authentication:
      type: object
      description: Authentication object.
      properties:
        method:
          type: string
          description: >
            Authentication method. 

            - `otp` is when the operation needs to be authenticated.

            - `transaction_signing` is when the operation has been authenticated
            already but needs to be validated.
          example: otp
        parameters:
          type: object
          description: >-
            Authentication parameters will vary, depending on type of the method
            used.
          properties:
            device_id:
              type: string
              description: Device ID. Used in the `otp` authentication method.
              example: abc
            token:
              type: string
              description: Authentication token. Used in the `otp` authentication method.
              example: '123456'
            user_id:
              type: string
              description: User ID. Used in the `otp` authentication method.
              example: '123456789'
            hash:
              type: string
              description: >-
                Value generated at the time of authentication via OTP and
                intended for authentication via signing. Used in the
                `transaction_signing` authentication method.
            signing_data:
              type: object
              description: >-
                Object that contains authorization information provided at time
                of signing. Used in the `transaction_signing` authentication
                method.
