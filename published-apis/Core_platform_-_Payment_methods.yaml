          example: 1ff51e99-3a05-448a-bc19-7b5c05274174
          description: >-
            Unique tracking ID of the cancellation. If you don't provide one,
            the Pismo platform generates it randomly.
          pattern: >-
            ^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
        amount:
          description: >-
            Optional full or partial amount to cancel, which cannot be more than
            the original transaction amount. Maximum of two decimal places.
          type: number
          format: float
        original_tracking_id:
          type: string
          minLength: 36
          maxLength: 50
          description: >-
            Either this field or `authorization_id` is **REQUIRED**. Unique
            tracking ID of the original operation to be canceled. Returned from
            the force request (`v1/payments/force`) as `tracking_id`.
          example: 0d240226-d03e-47eb-ab3f-6d57c7d5feeb
          pattern: >-
            ^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
        cancel_fees:
          type: boolean
          description: >
            Indicates whether to cancel associated fees when canceling a forced
            operation. Default value is `false`.

            - If set to `true`, when the cancel forced operation is performed,
            the associated fees on the original forced operation are cancelled
            also.

            - If set to `false`, when the cancel forced operation is performed,
            the associated fees on the original forced operation are not
            cancelled.
          example: false
        descriptor:
          type: string
          description: >-
            Optional text that describes the created authorization. The platform
            supports only letters and numbers in this field and removes any
            special characters or emojis.
          example: Single credit adjustment
        metadata:
          type: object
          description: Any key-value object for adding complementary custom information.
          example:
            my-custom-key: my-custom-value
    ForceCancelResponse:
      title: ForceCancelResponse
      description: >-
        Successful response object from `v1/payments/force/cancel` (Force
        cancellation operation).
      required:
        - tracking_id
        - event_date
        - authorization_id
      type: object
      properties:
        authorization_id:
          description: Generated cancellation authorization ID
          type: integer
          format: int64
          example: 15301234
        event_date:
          description: >-
            Date and time of the cancellation authorization, in the UTC-0
            (RFC3339) format.
          type: string
          format: date-time
          example: '2020-01-02T15:14:00.218Z'
        tracking_id:
          description: >-
            Unique 36-character identifier for the forced cancellation
            operation. If you didn't provide an identifier, then the Pismo
            platform automatically generates and includes one in the response.
          type: string
          example: 82766158-514c-42f0-87e2-1bb3250c6dee
    Location:
      properties:
        lat:
          description: Request latitude.
          type: number
          format: float
          example: 12.2
        lng:
          description: Request longitude.
          type: number
          format: float
          example: -12.2
      description: Request latitude and longitude object.
      title: Location
    PaymentMethodAccount:
      title: PaymentMethodAccount
      type: object
      description: Payment method for Pismo account transfers.
      properties:
        account:
          type: object
          properties:
            id:
              type: integer
              description: Pismo platform account ID.
              example: 101
          required:
            - id
        amount:
          description: Credit or debit amount.
          type: number
          format: float
          example: 12.13
        processing_code:
          description: >
            Optional for use with private acceptance/acquiring merchant
            networks. 

            Can be used to define a different settlement condition (MDR, days to
            settle, and so on). 

            For details, see acquiring/marketplace documentation.
          type: string
          example: '004000'
          pattern: ^[0-9]{6}$
        currency:
          $ref: '#/components/schemas/Currency'
        beneficiary_id:
          type: string
          example: 2c298321-bc21-4039-9c45-780cc6d4ec46
          description: >-
            Unique string identifier for the beneficiary associated with the
            account.
    PaymentMethodCard:
      title: PaymentMethodCard
      type: object
      description: Cards on file payment method.
      properties:
        card:
          type: object
          required:
            - id
            - account_id
          properties:
            id:
              type: string
              description: Card on file (in digital wallet) ID.
              example: b3777333-7a7e-4ae6-8d23-950c5d984e68
            account_id:
              type: integer
              description: Card on file's account ID.
              example: 101
            acquirer_id:
              type: string
              description: Acquirer ID for operation validation.
              example: 8518835f-b24f-4473-87b7-fe41e7cd60e8
            installments:
              type: object
              required:
                - number
              description: Installments information for acquirer.
              properties:
                number:
                  type: integer
                  example: 1
                  minimum: 1
                  description: Number of installments.
                deferred_months:
                  type: integer
                  minimum: 0
                  example: 3
                  description: Number of months before first installment.
            acquirer:
              description: Information sent to specific acquirers.
              type: object
              properties:
                business_application_identifier:
                  type: string
                  example: '01'
                  description: Business application type ID (for REDE acquirer ONLY).
                sub_merchant:
                  type: object
                  properties:
                    merchant_category_code:
                      type: string
                      description: >-
                        4-digit merchant category code (ISO 18245) based on
                        goods or services the merchant sells the most (for REDE
                        acquirer ONLY).
                      example: '6051'
                wallet:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Card's wallet ID (for REDE acquirer ONLY).
                      example: '1234567890'
                    sender_tax_identification:
                      type: string
                      description: >-
                        Document number of wallet owner (for REDE acquirer
                        ONLY).
                      example: '09365523959'
                    first_name:
                      type: string
                      description: First name of the wallet owner (for REDE acquirer ONLY).
                      example: jose
                    last_name:
                      type: string
                      description: Last name of the wallet owner (for REDE acquirer ONLY).
                      example: souza
                    processing_type:
                      type: integer
                      description: >-
                        Identifies the type of the operation (for REDE acquirer
                        ONLY).
                      example: 1
                capture:
                  type: boolean
                  description: >-
                    Should authorization be auto-captured flag. Default is
                    `true`. (For REDE acquirer ONLY.)
                  example: true
                credential:
                  type: object
                  properties:
                    code:
                      type: string
                      description: >-
                        UUID key REDE acquirer uses to get authentication
                        information. Only validated if passed.
                      example: 5f1c280e-ffde-4081-a126-5f2f10a96c2f
        amount:
          description: Credited or debited amount.
          type: number
          format: float
          example: 12.13
        processing_code:
          description: >
            Optional for use with private acceptance/acquiring merchant
            networks. 

            Can be used to define a different settlement condition (MDR, days to
            settle, etc). 

            For details, see acquiring/marketplace documentation.
          type: string
          example: '004000'
          pattern: ^[0-9]{6}$
        currency:
          $ref: '#/components/schemas/Currency'
    PaymentMethodExternal:
      description: >
        External entity payment method object. 

        Not related to a Pismo account, can take any form - an external checking
        account, a bankslip, and so on. 

        The information here is persisted for future reference.
      properties:
        custom_info:
          type: object
          required:
            - external_id
            - type
          properties:
            external_id:
              type: string
              description: Custom information ID
              example: my-external-id-abc123
            type:
              type: string
              description: Custom information type
              example: CASHIN
            name:
              type: string
              description: Custom information name.
              example: CASHIN-TEF
            description:
              type: string
              description: Custom information description.
              example: CASHIN from online bank transfer
            origin:
              type: string
              description: Origin used in migrations.
              example: STRIKER
            accounting_date:
              type: string
              description: Accounting date used in migrations.
              example: '2021-10-25'
        amount:
          description: Credit or debit amount.
          type: number
          format: float
          example: 12.13
        processing_code:
          description: >
            Optional for use with private acceptance/acquiring merchant
            networks. 

            Can be used to define a different settlement condition (MDR, days to
            settle, etc). 

            For more details, see acquiring/marketplace documentation.
          type: string
          example: '004000'
          pattern: ^[0-9]{6}$
        currency:
          $ref: '#/components/schemas/Currency'
    PaymentMethodMerchant:
      title: PaymentMethodMerchant
      type: object
      description: Payment transfer method for Pismo merchant accounts.
      properties:
        merchant:
          type: object
          properties:
            id:
              type: integer
              description: Pismo platform merchant account ID.
              example: 103
            point_of_sales_id:
              type: integer
              description: >
                Marketplace identification for P2M and M2M transactions. A
                merchant can be linked to more than one marketplace. Provide
                this value in the `to` field to ensure that the correct fees are
                applied according to the contract between merchant and
                marketplace.
              example: 123
          required:
            - id
    PaymentRequestItemResponse:
      type: object
      title: PaymentRequestItemResponse
      description: Response object from `GET v1/payment-requests`.
      additionalProperties: false
      properties:
        amount:
          type: number
          minimum: 0.01
          example: 9.95
          description: Payment request amount.
        processing_code:
          type: string
          description: Payment request processing code.
          example: '004000'
        to:
          type: integer
          minimum: 1
          example: 10
          description: Target account ID.
        expiration:
          type: string
          description: Payment request expiration date in UTC-0 (RFC3339) format.
          example: '2020-05-11T10:39:00.000Z'
        location:
          $ref: '#/components/schemas/Location'
        tracking_id:
          type: string
          description: >-
            Optional unique ID correlating the payment request's associated
            credit and debit authorizations.
          example: 1ff51e99-3a05-448a-bc19-7b5c05274174
        status:
          $ref: '#/components/schemas/PaymentRequestStatus'
        id:
          type: string
          example: 0f45e7a3-0d9e-4454-be8b-c74a58427946
          description: Payment request unique ID.
        creation_date:
          type: string
          format: date-time
          description: Payment request creation date in UTC-0 (RFC3339) format.
          example: '2020-06-11T10:39:00.000Z'
        metadata:
          type: object
          description: Any key-value object to add complementary custom information.
          example:
            my-custom-key: my-custom-value
    PaymentRequestModel:
      title: PaymentRequestModel
      type: object
      description: Payload object for Create payment request (`v1/payment-requests`).
      properties:
        to:
          $ref: '#/components/schemas/PaymentMethodAccount'
        from:
          $ref: '#/components/schemas/PaymentMethodAccount'
        amount:
          type: number
          format: float
          description: Payment request amount.
          minimum: 0.01
          example: 9.95
        processing_code:
          type: string
          example: '004000'
          description: Payment request processing code.
        expiration:
          type: string
          format: date-time
          example: '2020-05-11T10:39:00.000Z'
          description: Payment request expiration date in UTC-0 (RFC3339) format.
        tracking_id:
          type: string
          description: >-
            Optional unique ID correlating the payment request's associated
            credit and debit authorizations.
          example: 1ff51e99-3a05-448a-bc19-7b5c05274174
        metadata:
          type: object
          description: Any key-value object for adding complementary custom information.
          example:
            my-custom-key: my-custom-value
        location:
          $ref: '#/components/schemas/Location'
      required:
        - to
        - amount
    PaymentRequestResponse:
      title: PaymentRequestResponse
      type: object
      description: Response object from Create payment request (`v1/payment-requests`).
      properties:
        type:
          type: string
          description: Payment request format type.
          example: TOKEN
        code:
          type: string
          description: >-
            Payment request ID code. Token field for Transfer funds
            (`v1/payments`)
          example: a78f0809-7a22-4485-8e57-abf70168c5f0
    PaymentRequestStatus:
      description: Payment request status
      type: string
      enum:
        - PAID
        - PENDING
        - EXPIRED
        - DELETED
        - REJECTED
        - CANCELLED
        - ACTIVE
    PaymentsModel:
      title: PaymentsModel
      description: Payload object sent to `v1/payments` to transfer payments.
      type: object
      properties:
        from:
          description: >-
            Source method to transfer funds. You must provide one item in this
            array.
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/PaymentMethodAccount'
              - $ref: '#/components/schemas/PaymentMethodCard'
              - $ref: '#/components/schemas/PaymentMethodExternal'
              - $ref: '#/components/schemas/PaymentMethodMerchant'
        to:
          description: >-
            Destination method to transfer funds. You must provide one item in
            this array.
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/PaymentMethodAccount'
              - $ref: '#/components/schemas/PaymentMethodExternal'
              - $ref: '#/components/schemas/PaymentMethodMerchant'
        tracking_id:
          description: >-
            Unique tracking ID of the transaction. If you don't provide one, the
            Pismo platform generates it randomly.
          type: string
          example: 1ff51e99-3a05-448a-bc19-7b5c05274174
          maxLength: 50
          minLength: 36
        entry_mode:
          description: Payment entry mode.
          type: string
          example: QRCODE
        location:
          $ref: '#/components/schemas/Location'
        metadata:
          type: object
          description: Any key-value object to add custom information.
          example:
            my-custom-key: my-custom-value
        token:
          type: string
          description: Validation token used for payment-requests transfers.
          example: e933dd73-ff1d-43af-935d-91891e926ed6
        payment_datetime:
          type: string
          format: date-time
          description: >
            Value date (effective date) of the payment in UTC-0 (RFC3339)
            format. 

            Payments can be backdated but future dates are not allowed.

            example: '2020-01-02T15:14:00.218Z'
        descriptor:
          type: string
          description: >-
            Optional text that describes the created transaction. The platform
            supports only letters and numbers in this field and removes any
            special characters or emojis.
          example: eShop purchase
        timeout:
          type: integer
          description: >-
            Maximum time (in seconds) a payment can take. Optional field
            forwarded to acquirers.
          example: 10
        point_of_sales_id:
          type: integer
          description: >
            ID of POS device initiating request. This field is DEPRECATED - the
            ID should now be passed in the Merchant Payment Method.  Passing it
            here will cause it to **not** be stored, which could lead to
            cancellations referencing the wrong merchant.
          deprecated: true
          example: 10
        authorization_validations:
          type: object
          description: |
            Object containing the authorization validation data. 
          properties:
            is_device_registered:
              description: >-
                Indicates whether the device used for the operation is
                registered according to the financial institution's security
                policies.
              type: boolean
              example: true
      required:
        - from
        - to
    PaymentsResponse:
      properties:
        authorization_id:
          description: >
            Generated authorization ID, depending on operation type. 

            DEPRECATED for the `authorization_ids` object that can contain both
            credit and debit authorization IDs.
          deprecated: true
          type: integer
        authorization_ids:
          $ref: '#/components/schemas/AuthorizationIDs'
        event_date:
          description: Transaction datetime in UTC-0 (RFC3339) format.
          type: string
          format: date-time
          example: '2020-01-02T15:14:00.218Z'
        tracking_id:
          description: >-
            Transfer ID. If none provided in the request, a random one is
            generated.
          type: string
          example: 82766158-514c-42f0-87e2-1bb3250c6dee
        available_credit_limit:
          description: Available credit limit after transaction.
          type: number
          format: float
          example: 99.5
      description: Response object for `v1/payments` (transfer funds) success.
      title: PaymentsResponse
    InstallmentsPaymentRequest:
      title: InstallmentsPaymentRequest
      type: object
      description: >-
        Request object for `POST v1/payments/installments` (Installments
        payment).
      properties:
        tracking_id:
          type: string
          minLength: 36
          maxLength: 50
          description: >-
            Unique tracking ID of the installments operation. If you don't
            provide one, the Pismo platform generates it randomly.
          example: be68db6e-8da0-4761-8632-6a51857bd123
          pattern: >-
            ^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
        account_id:
          type: integer
          description: Unique identifier of an account in the Pismo platform.
          example: 101
        charging_amount:
          description: Total amount to be charged.
          type: number
          format: float
          example: 12.13
        processing_code:
          description: >-
            Unique 6-character processing code that identifies the debit
            operation.
          type: string
          example: '004000'
          pattern: ^[0-9]{6}$
        descriptor:
          type: string
          description: >-
            Optional text that describes the created operation. The platform
            supports only letters and numbers in this field and removes any
            special characters or emojis.
          example: Installments payment
        skip_balance_validation:
          type: boolean
          description: >-
            When set to `true`, the platform skips account balance validation
            and forces the operation. By default, the value is `false` and the
            platform performs account balance validation.
          example: true
        skip_account_status_validation:
          type: boolean
          description: >-
            When set to `true`, the platform skips account status validation and
            forces the operation. By default, the value is `false` and the
            platform performs account status validation.
          example: true
        financed_charge:
          description: >
            Informative optional object that allows financed charges in the
            `principal_amount` to be described and posted only in accounting.
            All fields within the financed charge object must have the suffix
            `_amount`. For example, `iof_amount`, `iva_amount`,
            `other_tax_amount`.  In the `name_amount` field example, `name`
            indicates a dynamic value. To define a new financed charge type
            field, you must contact a Pismo representative.

            When the `financed_charge` object is used, the `tax_amout` field
            cannot be used simultaneously, since this object is used only for
            cases of charges financed in the `principal_amount`.
          type: object
          properties:
            name_amount:
              type: number
              format: float
              description: Amount of the financed charge type to send to accounting.
              example: 12.13
        metadata:
          type: object
          description: >-
            Optional valid key-value object to add complementary custom
            information.
          example:
            my-custom-key: my-custom-value
        first_installment_date:
          description: >-
            Date that the first installment should be posted on the invoice.
            Format = YYYY-MM-DD.
          type: string
          format: date
          pattern: ([0-9]{4})-(?:[0-9]{2})-([0-9]{2})
          example: '2023-12-31'
        installments:
          type: array
          description: >-
            Non-empty collection of installments to be used to implement the
            agreement.
          items:
            $ref: '#/components/schemas/InstallmentDetails'
        original_authorization:
          type: object
          description: |
            This optional field identifies the original authorization. 
            When this field is provided, all your fields needs be filled.
          properties:
            id:
              type: number
              description: >-
                Unique identifier of original authorization in the Pismo
                plataform.
              example: 101
            type:
              type: string
              description: Type of original authorization.
              example: NETWORK
              enum:
                - NETWORK
                - PLATFORM
          required:
            - id
            - type
      required:
        - charging_amount
        - processing_code
        - account_id
        - installments
    CancelInstallmentsPaymentPayload:
      title: CancelInstallmentsPaymentPayload
      type: object
      description: >-
        Request object for `POST v1/payments/installments/cancel` (Cancel
        Installments payment).
      required:
