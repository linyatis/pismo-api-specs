    post:
      summary: Create transfer
      description: >
        Create a transfer operation between two accounts on the Pismo platform.


        With this endpoint, you have the following additional options.

        - Specify the `authentication` method and details.

        - Set `pre_authorization` to `true` for operations that require
        additional confirmation and then call the [Confirm pre-authorized
        transfer](ref:post-transfers-confirm) endpoint.

        - Set `validation_rules` in the `From` object to control the rules in
        this flow, such as disabling a rule, changing the response code and
        denial code, and forcing a rule.


        Refer to the [Payment methods](doc:payment-methods) guide for additional
        information.


        This endpoint generates a [Platform authorization
        created](https://developers.pismo.io/events/docs/platform-authorization-platform-authorization-1)
        event.


        **Note:** This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      operationId: post-transfers
      tags:
