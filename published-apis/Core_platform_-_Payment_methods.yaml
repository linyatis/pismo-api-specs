        original_authorization_id:
          description: >-
            Authorization ID of the original installments operation. You have to
            provide either `original_authorization_id` or `original_tracking_id`
            to execute this request.
          type: integer
          format: int64
          example: 15301234
        account_id:
          type: integer
          description: Pismo account ID.
          example: 101
        amount:
          description: Total amount to be cancelled.
          type: number
          format: float
          example: 12.13
        metadata:
          type: object
          description: >-
            Optional valid key-value object to add complementary custom
            information.
          example:
            my-custom-key: my-custom-value
    InstallmentsPaymentResponse:
      title: InstallmentsPaymentResponse
      properties:
        authorization_id:
          description: Generated authorization ID.
