          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Invalid payload:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Invalid payload
                Invalid amount:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: The amount must have a maximum of two decimal places.
                Invalid installment number:
                  value:
                    error_code: WP2P0024
                    code: WP2P0024
                    message: >-
                      Invalid installment number. Installment number should be
                      sequential, starting with 1.
                Invalid account program type:
                  value:
                    error_code: WP2P0025
                    code: WP2P0025
                    message: >-
                      Debit program accounts are invalid for installments
                      payments.
                Invalid total amount:
                  value:
                    error_code: WP2P0026
                    code: WP2P0026
                    message: Total amount is not equal to the others amounts added
                Invalid charging amount:
                  value:
                    error_code: WP2P0027
                    code: WP2P0027
                    message: >-
                      Charging amount is not equal to the sum of all
                      installments total_amount
                Installments tax amount not allowed:
                  value:
                    error_code: WP2P0028
                    code: WP2P0028
                    message: >-
                      Installments tax_amount not allowed for financed charge
                      operations
                Invalid financed charge amount:
                  value:
                    error_code: WP2P0029
                    code: WP2P0029
                    message: >-
                      All fields within the financed charge amount must be
                      greater than zero
                Invalid financed charge amount suffix:
                  value:
                    error_code: WP2P0030
                    code: WP2P0030
                    message: >-
                      All fields within the financed charge must have the suffix
                      _amount
                Invalid debit processing code:
                  value:
                    error_code: WP2P0005
                    code: WP2P0005
                    message: Invalid debit processing code.
                Processing code not found:
                  value:
                    error_code: WP2P0003
                    code: WP2P0003
                    message: No Orgs Operation Found
                Account has no debit status active:
                  value:
                    error_code: WP2P0002
                    code: WP2P0002
                    message: Account has no debit status active.
                Account authorization not found:
                  value:
                    error_code: WLDG0019
                    code: WLDG0019
                    message: No Accounts authorization found.
                Invalid rules when evaluating:
                  description: Flex controls evaluation results
                  value:
                    evaluation_result: false
                    message: >-
                      Restriction rule
                      [max_value_authorized_device_unique_transaction] does not
                      pass.
                    error_code: RULV10400
                    deny_code: DEVICE_LIMIT_DAILY_TRANSACTION
                    code: ERUL0404
                    response_code: 57
                    custom_code: AA1
                    evaluated_controls:
                      - id: max_value_authorized_device_unique_transaction
                        name: max_value_authorized_device_unique_transaction
                        evaluation_result: false
                        message: >-
                          Restriction rule
                          [max_value_authorized_device_unique_transaction] does
                          not pass.
                        deny_code: DEVICE_LIMIT_DAILY_TRANSACTION
                        max_limit: 0
                        accumulated_limit: 0
                        available_limit: 0
                      - id: max_value_authorized_device_daily
                        name: max_value_authorized_device_daily
                        evaluation_result: true
                        message: ''
                        deny_code: DEVICE_LIMIT_DAILY
                        max_limit: 100000
                        accumulated_limit: 30000
                        available_limit: 70000
                No limit available:
                  value:
                    error_code: WLDG0006
                    code: WLDG0006
                    message: >-
                      No AvailableCreditLimit to complete the transaction -
                      amount: 10, availableCreditLimit: 5.00
                Original authorization id was not provided:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Original authorization id was not provided.
                Original authorization type was not provided:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Original authorization type was not provided.
                Limit of two decimal places:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: The amount must have a maximum of two decimal places.
                Exceed amount limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits, including two decimals, is allowed
                      for the amount field.
                Exceed charging_amount limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits including two decimals is allowed
                      for field charging_amount
                Exceed total_amount limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits including two decimals is allowed
                      for field total_amount
                Exceed principal_amount limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits including two decimals is allowed
                      for field principal_amount
                Exceed interest_amount limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits including two decimals is allowed
                      for field interest_amount
                Exceed interest_rate limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits including two decimals is allowed
                      for field interest_rate
                Exceed tax_amount limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits including two decimals is allowed
                      for field tax_amount
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
