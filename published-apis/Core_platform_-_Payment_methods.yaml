  /payments/v2/cancel:
    post:
      operationId: post-payments-v2-cancel
      summary: Cancel transfer funds
      description: >-
        **Note:** Enhanced features and improvements are available in the
        [Payment methods](doc:payment-methods) API, the new application
        interface for non-card network authorizations. This Cancel transfer
        funds endpoint is still supported, but all new feature developments will
        be available only in the Payment methods API. For more information,
        contact your Pismo representative.


        -----

        Cancel a previously authorized transfer made with the [Transfer
        funds](ref:post-payments-v1-payments) endpoint. 

        Pass one of two parameters (but not both) returned from the Transfer
        funds endpoint to identify the transfer to be canceled:

        - The `tracking_id` (pass as `original_tracking_id`)

        - The credit or debit authorization ID (pass as `authorization_id`). 


        For an external operation, the acquirer response is returned in the
        `metadata` field.

        If no processing codes are specified, the original authorization's
        reversal processing codes are used.


        This endpoint generates an [Authorization
        cancelled](https://developers.pismo.io/events/docs/authorization-authorization-cancellation-event-1)
        event.


        For additional information, see the [Cancel
        transfer](doc:cancel-transfer) guide.
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: x-tenant
          required: true
          description: Unique Org ID.
          schema:
            type: string
            example: TN-c0e4c660-9059-404c-ab22-761aa431766c
            pattern: >-
              TN\-[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}
            minLength: 39
            maxLength: 39
        - in: header
          name: x-cid
          description: >-
            Related correlation ID. If none is provided, a random one is
            generated.
          schema:
            type: string
            example: c737895c-8159-4c0c-a92a-a4f8600bff37
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelModel'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResponse'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
        '208':
          description: Already reported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Authorization already cancelled:
                  value:
                    error_code: AMON0004
                    code: AMON0004
                    message: Authorization was already refunded/reversed.
                Duplicated Correlation ID:
                  value:
                    error_code: WP2P0009
                    code: WP2P0009
                    message: Duplicated correlation ID.
                Payment denied:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Payment was previously denied and can't be cancelled.
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Refund amount error:
                  value:
                    error_code: AMON0000
                    code: AMON0000
                    message: >-
                      The amount passed 51 is greater than the current balance
                      50
                Invalid payload:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Invalid payload
                Amount cannot be negative:
                  value:
                    error_code: WP2P1005
                    code: WP2P1005
                    message: The amount cannot be negative or zero
                The amount is greater than:
                  value:
                    error_code: EP2P0005
                    code: EP2P0005
                    message: >-
                      The amount passed 1000 is greater than the current balance
                      800.00
                Not possible to change limit:
                  value:
                    error_code: WP2P1111
                    code: WP2P1111
                    message: Not possible to change limit.
                Unable to cancel a Force authorization:
                  value:
                    error_code: EP2P0011
                    code: EP2P0011
                    message: Unable to cancel a Force authorization
                Unable to cancel an Installment authorization:
                  value:
                    error_code: EP2P0013
                    code: EP2P0013
                    message: Unable to cancel an Installment authorization
                Only one processing code:
                  value:
                    error_code: EP2P0005
                    code: EP2P0005
                    message: >-
                      Only one processing code can be provided for external
                      cancels
                No Orgs Operation Found:
                  value:
                    error_code: WP2P0003
                    code: WP2P0003
                    message: No Orgs Operation Found
                More than one org operation found:
                  value:
                    error_code: WP2P0003
                    code: WP2P0003
                    message: More than one org operation found
                Unable to proceed with request:
                  value:
                    error_code: EP2P9999
                    code: EP2P9999
                    message: Unable to proceed with request!
                Merchant or Merchant parameters not found:
                  value:
                    error_code: WP2P3003
                    code: WP2P3003
                    message: >-
                      No Merchant or Merchant parameters found. Check for a
                      valid merchant or configured merchant operations
                Authorization process is still ongoing:
                  value:
                    error_code: WP2P0033
                    code: WP2P0033
                    message: Authorization process is still ongoing.
                Limit of two decimal places:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: The amount must have a maximum of two decimal places.
                Exceed amount limit:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: >-
                      A maximum of 20 digits, including two decimals, is allowed
                      for the amount field.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Authorization not found:
                  value:
                    error_code: WP2P0008
                    code: WP2P0008
                    message: Authorization not found.
                Reversal Processing Code not Found:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: No Reversal Processing Code Found
                Account not found:
                  value:
                    error_code: WLDG0019
                    code: WLDG0019
                    message: No Accounts authorization found.
                No AvailableIntegrity found:
                  value:
                    error_code: WLDG0004
                    code: WLDG0004
                    message: No AvailableIntegrity found
                No limit available:
                  value:
                    error_code: WLDG0006
                    code: WLDG0006
                    message: >-
                      No AvailableCreditLimit to complete the transaction -
                      amount: 15, availableCreditLimit: -121.07
                Insufficient funds:
                  value:
                    error_code: WLDG0005
                    code: WLDG0005
                    message: No Available Entries found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TrackingIdHasAlreadyInUsedResponse'
                  - $ref: '#/components/schemas/ErrorModel'
              examples:
                Tracking id is being used in an ongoing request:
                  value:
                    error_code: WP2P0010
                    code: WP2P0010
                    message: Tracking id is already in use.
                Authorization already cancelled:
                  value:
                    error_code: AMON0004
                    code: AMON0004
                    message: Authorization already refunded/reversed
                Duplicated Correlation ID:
                  value:
                    error_code: WP2P0009
                    code: WP2P0009
                    message: Duplicated correlation ID.
                Payment denied:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Payment was previously denied and can't be cancelled.
                Authorization_ID is being used in an ongoing request:
                  value:
                    error_code: WP2P0009
                    code: WP2P0009
                    message: Parent ID is already in use.
                Tracking id has been already used:
                  value:
                    tracking_id: d24729c0-0c2b-4ee4-b599-8c2fcebf0280
                    authorizations_ids:
                      debit: 33636662
                      credit: 0
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Database connection error:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Database connection error
                Acquirer communication error:
                  value:
                    error_code: ACQ0001
                    code: ACQ0001
                    message: Internal server error
                Error with acquirer:
                  value:
                    error_code: ACQ0000
                    code: ACQ0000
                    message: Unknown error
                Error with other apis:
                  value:
                    error_code: EP2P9999
                    code: EP2P9999
                    message: Unable to proceed with request!
                Unmarshal error:
                  value:
                    error_code: ELDG500
                    code: ELDG500
                    message: Unmarshal error
                Unexpected Error:
                  value:
                    error_code: WP2P0000
                    code: WP2P0000
                    message: Unexpected Error
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Unable to connect to acquirer gateway:
                  value:
                    error_code: EP2P0001
                    code: EP2P0001
                    message: Unable to connect to acquirer gateway
