    CancelTransferRequest:
      title: CancelTransferRequest
      type: object
      description: Request object for `POST /v1/payments/hold-funds/transfer/cancel`.
      properties:
        tracking_id:
          type: string
          description: Unique identifier of the operation.
          maxLength: 50
          minLength: 1
          example: be68db6e-8da0-4761-8632-6a51857bd123
        original_tracking_id:
          type: string
          description: Unique identifier that references the original transfer.
          maxLength: 50
          minLength: 1
          example: be68db6e-8da0-4761-8632-6a51857bd123
        account_id:
          type: integer
          description: Unique identifier of an account in the Pismo platform.
          minimum: 1
          example: 101
        amount:
          description: Credit or debit amount.
          type: number
          format: float
          minimum: 0.01
          example: 12.13
        processing_code:
          description: >-
            Unique 6-character processing code that identifies the credit or
            debit operation.
          type: string
          maxLength: 6
          example: '004000'
          pattern: ^[0-9]{6}$
        description:
          type: string
          description: >-
            Optional text that describes this operation. The platform supports
            only letters and numbers in this field and removes any special
            characters or emojis.
          example: Blocked value
        metadata:
          type: object
          description: >-
            Optional valid key-value object to add complementary custom
            information.
          example:
            my-custom-key: my-custom-value
      required:
        - original_tracking_id
        - tracking_id
        - account_id
        - amount
        - processing_code
    HoldFundsRequest:
      title: FundHoldsRequest
      type: object
      description: >-
        Request object for `POST /v1/payments/hold-funds/block`, `POST
        /v1/payments/hold-funds/unblock` and `POST
        /v1/payments/hold-funds/transfer`.
      properties:
        tracking_id:
          type: string
          description: Unique identifier of the operation.
          maxLength: 36
          minLength: 1
          example: be68db6e-8da0-4761-8632-6a51857bd123
        account_id:
          type: integer
          description: Unique identifier of an account in the Pismo platform.
          minimum: 1
          example: 101
        amount:
          description: Credit or debit amount
          type: number
          format: float
          minimum: 0.01
          example: 12.13
        processing_code:
          description: >-
            Unique 6-character processing code that identifies the credit or
            debit operation.
          type: string
          maxLength: 6
          example: '004000'
          pattern: ^[0-9]{6}$
        description:
          type: string
          description: >-
            Optional text that describes this operation. The platform supports
            only letters and numbers in this field and removes any special
            characters or emojis.
          example: Blocked value
        skip_balance_validation:
          type: boolean
          description: >-
            When set to `true`, the platform skips account balance validation
            and forces the operation. By default, the value is `false` and the
            platform performs account balance validation.
          example: false
        skip_status_account_validation:
          type: boolean
          description: >-
            When set to `true`, the platform skips account status validation and
            forces the operation. By default, the value is `false` and the
            platform performs account status validation.
          example: true
        metadata:
          type: object
          description: >-
            Optional valid key-value object to add complementary custom
            information.
          example:
            my-custom-key: my-custom-value
      required:
        - tracking_id
        - account_id
        - amount
        - processing_code
    HoldFundsAuthorizationResponse:
      properties:
        authorization_id:
          description: Generated authorization ID
          type: integer
          format: int64
          example: 15301234
        event_date:
          description: Date and time of the authorization, in the UTC-0 (RFC3339) format.
          type: string
          format: date-time
          example: '2020-01-02T15:14:00.218Z'
        tracking_id:
          description: Unique identifier for the operation.
          type: string
          example: 82766158-514c-42f0-87e2-1bb3250c6dee
      description: >-
        Successful response object from `POST /v1/payments/hold-funds/block`,
        `POST /v1/payments/hold-funds/unblock` and `POST
        /v1/payments/hold-funds/transfer`.
      title: ForceResponse
    AccountID:
      description: Pismo account ID.
      type: integer
      format: int64
      example: 8675309
    Amount:
      type: number
      format: float
      description: Credit or debit amount.
      example: 100.23
    DenialCode:
      type: string
      description: Denial code.
      example: DAL
    Description:
      type: string
      description: Optional text that describes the operation.
      example: Custom purchase.
    Currency:
      type: string
      description: >-
        ISO-4217 alphabetic or numeric (3 characters) operation currency code.
        For example, either BRL or 986 for Brazilian real.
      example: BRL
    CurrencyPismoHierarchy:
      type: string
      description: >-
        ISO-4217 alphabetic or numeric (3 characters) authorization currency
        code. For example, either BRL or 986 for Brazilian real. If you don't
        provide the currency, the platform uses the currency registered in the
        Pismo hierarchy (first looking at the account, then program, and then
        Org levels).
      example: BRL
    Metadata:
      type: object
      description: Any key-value object with custom information.
      example:
        any-key: any-value
    OriginalTrackingID:
      type: string
      description: Tracking ID for the original operation.
      minLength: 36
      maxLength: 50
      example: 249fbd1c-cfcd-48aa-8bcb-1ffe3a5f7978
    PaymentDatetime:
      type: string
      format: date-time
      description: >
        Effective payment date in the UTC-0 RFC3339 format, which includes
        milliseconds (yyyy-MM-ddThh:mm:ss.SSSZ).

        Payments can be backdated but future dates are not allowed.
      example: '2023-01-02T07:35:05.125Z'
    ProcessingCode:
      type: string
      description: Unique processing code that identifies the credit or debit operation.
      example: '219803'
    ResponseCode:
      type: string
      description: >
        Alphanumeric two-character standard card network response code or an
        alternative custom response code, which provides the precise reason for
        the success or denial of the operation by the card network, platform, or
        anti-fraud solution.
      example: '57'
    TrackingID:
      type: string
      description: Unique tracking ID for this operation.
      minLength: 36
      maxLength: 50
      example: 0b6995e5-b417-9be4-92b3-3677f4440ebe
    ValidationResults:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: Name of the evaluated rule.
            example: LEDGER
          status:
            type: string
            enum:
              - APPROVED
              - REJECTED
              - SKIPPED
            description: >-
              Identifies if the rule was approved, rejected, or skipped during
              the validation flow.
            example: REJECTED
          reason:
            type: string
            description: >-
              Status reason why the specific rule was approved, rejected, or
              skipped.
            example: LEDGER_INSUFFICIENT_FUNDS
          description:
            type: string
            description: Description of the validation result.
            example: >-
              The authorization amount is greater than the account available
              limit.
          additional_data:
            description: >-
              Additional data for the validation result. This varies from
              validation to validation, but every denied validation has the
              `denial_code` and `response_code` fields.
            type: object
    ViolationValidationRules:
      type: string
      description: |
        Control the rules in the flow.
      example: validation_rules are invalid. Check the rules and denial reasons
    ViolationAmount:
      type: string
      description: |
        Credit or debit amount.
        Possible values:
          - amount is a required field.
          - amount must be greater than zero
          - amount must have a maximum of two decimal places
      example: amount must be greater than zero
      enum:
        - amount is a required field.
        - amount must be greater than zero
        - amount must have a maximum of two decimal places
        - >-
          a maximum of 20 digits, including two decimals, is allowed for the
          amount field.
    ViolationCurrency:
      type: string
      description: |
        Three-letter currency code of the operation, in ISO 4217.
        Possible values:
          - currency is a required field
          - Currency is invalid. The field must have the valid ISO 4217 currency code.
          - currency must be an uppercase string
          - currency must be 3 characters in length
      example: currency is a required field
      enum:
        - currency is a required field
        - >-
          Currency is invalid. The field must have the valid ISO 4217 currency
          code.
        - currency must be an uppercase string
        - currency must be 3 characters in length
    ViolationDescription:
      type: string
      description: Optional text that describes the operation.
      example: description must be a maximum of 100 characters in length
    ViolationOriginalTrackingID:
      type: string
      description: |
        Tracking ID for the original operation.
        Possible values:
          - original_tracking_id is a required field.
          - original_tracking_id must be a maximum of 50 characters in length
      example: original_tracking_id is a required field.
      enum:
        - original_tracking_id is a required field.
        - original_tracking_id must be a maximum of 50 characters in length
    ViolationPaymentDatetime:
      type: string
      description: >
        Effective payment date in the UTC-0 RFC3339 format, which includes
        milliseconds (yyyy-MM-ddThh:mm:ss.SSSZ).

        Payments can be backdated but future dates are not allowed.
      example: >-
        payment_datetime invalid. The field must have the format
        yyyy-MM-ddThh:mm:ss.SSSZ
    ViolationProcessingCode:
      type: string
      description: |
        Unique processing code that identifies the credit or debit operation.
        Possible values:
          - processing_code is a required field.
          - processing_code must be a maximum of 6 characters in length
      example: processing_code must be a maximum of 6 characters in length
      enum:
        - processing_code is a required field.
        - processing_code must be a maximum of 6 characters in length
    ViolationTrackingID:
      type: string
      description: |
        Unique tracking ID for this operation.
        Possible values:
          - tracking_id is a required field.
          - tracking_id must be a maximum of 50 characters in length
      example: tracking_id is a required field.
      enum:
        - tracking_id is a required field.
        - tracking_id must be a maximum of 50 characters in length
    Violations:
