        debit:
          description: Debit authorization ID.
          type: integer
          format: int64
          example: 15301235
      title: AuthorizationIDs
    CancelModel:
      type: object
      description: Payload object for `v2/cancel` (cancel transfer) endpoint.
      properties:
        authorization_id:
          type: integer
          format: int64
          example: 15301234
          minimum: 1
          description: >
            Credit or debit authorization ID (`authorization_ids.credit` or
            `authorization_ids.debit`) returned in the response of the original
            transfer from the [Transfer funds](ref:post-payments-v1-payments)
            endpoint. 


            Either this field or the `original_tracking_id` field is
            **REQUIRED** to identify the original transfer that needs to be
            canceled with this request.
        tracking_id:
          type: string
          minLength: 36
          maxLength: 65
          example: 1ff51e99-3a05-448a-bc19-7b5c05274174
          description: >
            Unique tracking ID of the pending cancellation. If you don't provide
            one, the Pismo platform generates it randomly. This field is useful
            for tracking and searching transaction information. 


            This field needs to be sent to guarantee the idempotence of the
            request. Requests that use the same tracking_id are considered the
            same. If tracking_id is not received, each request is treated as a
            new one.
          pattern: >-
            ^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
        original_tracking_id:
          type: string
          description: >
            Unique tracking ID of the original operation to be cancelled, which
            is returned from the [Transfer funds](ref:post-payments-v1-payments)
            endpoint as `tracking_id`.


            Either this field or the `authorization_id` field is **REQUIRED** to
            identify the original transfer that needs to be cancelled with this
            request.
          example: 0d240226-d03e-47eb-ab3f-6d57c7d5feeb
          pattern: >-
            ^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
        amount:
          type: number
          format: float
          example: 9.95
          minimum: 0.01
          description: >
            Full or partial amount to cancel, which cannot be more than the
            original transaction amount. Maximum of two decimal places.
        cancel_fees:
          type: boolean
          description: >
            Indicates whether to cancel associated fees when canceling a
            transfer operation. When set to `true`, if a total or partial
            cancellation of an operation with a fee occurs, the platform
            automatically cancels the associated fee also.

            When this flag is not provided:

            - if a total cancellation of an operation with a fee occurs, the
            platform automatically cancels the fee also.

            - if a partial cancellation of an operation with a fee occurs, the
            platform does not cancel the fee.
          example: false
        processing_code:
          type: object
          additionalProperties: false
          description: >
            This optional field identifies the processing codes to be used in
            the cancellation operation. Depending on the type of transaction you
            want to cancel, this object can contain only one subfield of string
            type: `credit` or `debit`. 


            If no processing codes are specified, the platform uses the
            processing codes that correspond to the reversal of original
            authorization.


            Do not use a reversal processing code in this field since the
            endpoint processes a reversal operation, automatically gathering the
            reversal processing code.
          properties:
            credit:
              type: string
              example: '002000'
              pattern: ^[0-9]{6}$
              description: Credit operation processing code.
            debit:
              type: string
              example: '004000'
              pattern: ^[0-9]{6}$
              description: Debit operation processing code.
        acquirer:
          $ref: '#/components/schemas/AcquirerCredential'
        metadata:
          type: object
          description: >
            This optional key-value object field can be used with external
            operations to add supplementary custom information for the
            operation. 


            The Pismo platform does not perform any validation or processing on
            this field but passes this object to the acquirer in transactions
            involving calls to the acquirer and sends it in the events related
            to the stream of data produced at the end of the request.
          example:
            my-custom-key: my-custom-value
        descriptor:
          type: string
          example: eShop purchase cancellation
          description: >
            This field allows you to provide an optional cancellation
            description. 


            The Pismo platform passes this field to the acquirer in transactions
            involving calls to the acquirer.
      required:
        - amount
      title: CancelModel
    CancelResponse:
      title: CancelResponse
      type: object
      properties:
        tracking_id:
          type: string
          description: >-
            Provided `tracking_id` or the identifier automatically generated by
            the Pismo platform.
          example: be68db6e-8da0-4761-8632-6a51857bd123
          pattern: >-
            ^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$
        authorization_datetime:
          type: string
          description: Authorization timestamp in the UTC-0 (RFC3339) format.
          example: '2006-01-02T15:04:05.000Z'
        authorization_ids:
          $ref: '#/components/schemas/AuthorizationIDs'
        metadata:
          type: object
          description: >-
            Any key-value object. For an external operation, this field contains
            the acquirer response.
          example:
            my-custom-key: my-custom-value
      required:
        - tracking_id
        - authorization_ids
      description: Success response object for  `v2/cancel`
