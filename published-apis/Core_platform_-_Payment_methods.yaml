    get:
      operationId: get-payments-v1-payment-requests
      summary: List payment requests
      description: >-
        List previously created payment requests. Filter with either (but not
        both) account ID in `from` or `to`.
      tags:
        - Payment requests
      security:
        - BearerAuth: []
      parameters:
        - schema:
            type: string
          in: query
          name: from
          description: Filter results with destination account ID
        - schema:
            type: string
          in: query
          name: to
          description: Filter results with source account ID
        - schema:
            type: string
            example: TN-c0e4c660-9059-404c-ab22-761aa431766c
            pattern: >-
              TN\-[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}
            minLength: 39
            maxLength: 39
          in: header
          name: x-tenant
          description: Unique Org ID.
        - schema:
            type: string
            example: c737895c-8159-4c0c-a92a-a4f8600bff37
          in: header
          name: x-cid
          description: >-
            Related correlation ID. If none is provided, a random one is
            generated.
        - schema:
            type: string
          in: query
          name: status
          description: Filter results with this payment request status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: Payment request list
                uniqueItems: true
                items:
                  $ref: '#/components/schemas/PaymentRequestItemResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                No account specified:
                  value:
                    error_code: WP2P0009
                    code: WP2P0009
                    message: No account specified in request.
                Only one account can be specified:
                  value:
                    error_code: WP2P0009
                    code: WP2P0009
                    message: Request can specify only one account.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                Unable to proceed with request:
                  value:
                    error_code: EP2P9999
                    code: EP2P9999
                    message: Unable to proceed with request!
