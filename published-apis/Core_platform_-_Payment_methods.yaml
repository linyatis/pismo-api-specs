        '201':
          description: Request was processed successfully, new authorization created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransfersResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Amount required:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      amount: amount is a required field.
                Invalid amount:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      amount: >-
                        A maximum of 20 digits, including two decimals, is
                        allowed for the amount field.
                Invalid account:
                  value:
                    code: WONB0001
                    message: Authorized account is different from the request.
                Invalid currency:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      currency: >-
                        Currency is invalid. The field must have the valid ISO
                        4217 currency code.
                Tracking ID required:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      tracking_id: tracking_id is a required field.
                Processing code required:
                  value:
                    code: WONP0001
                    message: Payload is invalid. It must be a valid JSON.
                    violations:
                      processing_code: processing_code is a required field.
        '401':
          description: Access token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401Transfers'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/409Transfers'
        '422':
          description: Unprocessable request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Unprocessable authentication method:
                  value:
                    - code: EPAE0004
                      message: The method provided in the payload does not exist.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Platform authentication unexpected error:
                  value:
                    - code: EPAE0001
                      message: >-
                        Unexpected error while processing the call to the
                        authentication system.
                Platform authentication timeout error:
                  value:
                    - code: EPAE0002
                      message: >-
                        Timeout error while processing the call to the
                        authentication system.
