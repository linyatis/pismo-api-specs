  /v2/transactions:
    get:
      tags:
        - Transactions
      summary: List transactions
      operationId: ListTransactions
      description: >
        List transactions without their metadata. If you provide at least one of
        the following parameters, the `eventDateStart` parameter is optional. 

        - `id`

        - `authorizationId`

        - `authorizationIds`

        - `statementId`

        - `authorizationTrackingId`

        - `numberOfLatestTransactions`


        If you don't provide any of the above parameters, you must include the
        `eventDateStart` parameter, and the maximum allowed query range is 90
        days. 
      parameters:
        - $ref: '#/components/parameters/statementID'
        - $ref: '#/components/parameters/customerID'
        - $ref: '#/components/parameters/transactionTypeIdQuery'
        - in: query
          name: processingCode
          description: Processing code
          schema:
            type: string
        - in: query
          name: credit
          description: Show only credit (`true`) or debit (`false`) transactions.
          schema:
            type: boolean
        - in: query
          name: statementPost
          description: >-
            Filter on `StatementPost` field. This field indicates whether a
            transaction should be posted to the statement.
          schema:
            type: boolean
        - $ref: '#/components/parameters/authorizationID'
        - $ref: '#/components/parameters/authorizationType'
        - $ref: '#/components/parameters/eventDateStart'
        - in: query
          name: order
          description: >-
            The order of the result set. The results are always ordered by
            transaction date. This param indicates whether the order is
            ascending or descending.
          schema:
            type: string
            enum:
              - asc
              - desc
        - $ref: '#/components/parameters/eventDateEnd'
        - $ref: '#/components/parameters/numberOfLatestTransactions'
        - in: query
          name: authorizationTrackingId
          description: Authorization tracking ID
          schema:
            type: string
        - in: query
          name: pageSize
          description: Maximum number of transactions per page.
          schema:
            type: integer
        - in: query
          name: pageOffset
          description: >-
            Page offset of transactions. Indicates which page to start with when
            returning the results. Defaults to 0.
          schema:
            type: integer
        - in: query
          name: ids
          description: Array of transaction IDs
          schema:
            type: array
            items:
              type: integer
              format: int64
            minItems: 1
            maxItems: 100
          example:
            - 10
            - 20
            - 30
            - 40
            - 50
            - 60
        - in: query
          name: userCategory
          description: User category
          schema:
            type: string
        - in: query
          name: paymentMethodId
          description: Payment method ID
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Transaction'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequestHeaders:
                  summary: Invalid request headers
                  value:
                    message: Invalid request headers
                    error: Invalid request headers
                    code: WTRC00002
                invalidRequestParameter:
                  summary: Invalid request parameters
                  value:
                    message: Invalid request parameters
                    error: Invalid request parameters
                    code: WTRC00003
                invalidFilterValue:
                  summary: Invalid filter value
                  value:
                    message: Invalid filter value
                    error: Invalid filter value
                    code: WTRC00001
                invalidNumberOfLatestTransactions:
                  summary: Number of latest transactions should not have another filter
                  value:
                    message: >-
                      numberOfLatestTransactions should not have another filters
                      associate
                    error: >-
                      numberOfLatestTransactions should not have another filters
                      associate
                    code: WTRC00001
                invalidNumberOfLatestTransactionsFilter:
                  summary: Number of latest transactions should be an integer
                  value:
                    message: numberOfLatestTransactions should be an integer value
                    error: numberOfLatestTransactions should be an integer value
                    code: WTRC00001
                invalidNumberOfLatestTransactionsRange:
                  summary: Invalid range for number of latest transactions
