openapi: 3.1.0
info:
  title: Core platform - Flex controls
  version: 1.0.0
  description: Flex controls API
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/rules
    description: Sandbox API server for testing
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Account access token. Tokens can expire quickly, which can result in an
        "Unauthorized" error.
      bearerFormat: JWT
  schemas:
    AccountCustomerFlexControlsResponse:
      type: object
      description: Flex control response
      properties:
        customer_id:
          type: integer
          format: int64
          description: Customer ID
          example: 99999999
        controls:
          type: array
          items:
            $ref: '#/components/schemas/CustomerFlexControlsResponse'
    AccountFlexControlsResponse:
      type: object
      description: Flex control response.
      required:
        - id
        - type
        - name
        - deny_code
      properties:
        id:
          type: string
          format: uuidv4
          description: Flex control ID
          example: 9cbdadc-860b-4275-a5cd-d9d892fd3869
        deny_code:
          $ref: '#/components/schemas/DenyCode'
        name:
          $ref: '#/components/schemas/Name'
        type:
          $ref: '#/components/schemas/Type'
        rule_reference_id:
          type: string
          description: Flex control template ID
          example: purchase-1M
        beneficiary_id:
          $ref: '#/components/schemas/BeneficiaryId'
        override_controls:
          $ref: '#/components/schemas/OverrideControls'
        description:
          type: string
          description: Flex control description
          example: This flex control restricts the max value to be spent every 24 hours
        processing_codes:
          $ref: '#/components/schemas/ProcessingCodes'
        currency_code:
          $ref: '#/components/schemas/CurrencyCode'
        time_zone:
          $ref: '#/components/schemas/TimeZone'
        max_limit:
          $ref: '#/components/schemas/MaxLimit'
        available_limit:
          $ref: '#/components/schemas/AvailableLimit'
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
        limit_duration:
          $ref: '#/components/schemas/LimitDuration'
        reset_period:
          $ref: '#/components/schemas/ResetPeriod'
        reset_datetime:
          type: string
          format: date-time
          description: >
            Reset datetime (RFC-3339 format) for the control rule.

            If `reset_datetime` is not set, a default is calculated based on
            `limit_duration` period and the current time.

            This field should only be specified when `type` is either
            `spending_limit` or `usage_limit`.
          example: '2022-03-08T21:19:55Z'
        active:
          $ref: '#/components/schemas/Active'
        customized:
          $ref: '#/components/schemas/Customized'
        response_code:
          $ref: '#/components/schemas/ResponseCode'
        custom_code:
          $ref: '#/components/schemas/CustomCode'
        evaluation_order:
          $ref: '#/components/schemas/EvaluationOrder'
    Active:
      type: boolean
      example: true
      default: true
      description: >-
        If not specified, defaults to 'true'. If set to 'false', the flex
        control is skipped during evaluation.
    AttributeGroupDescription:
      type: string
      description: Short description of the attribute group
      maxLength: 50
      minLength: 1
      example: High-risk merchant IDs
    AttributeGroupID:
      type: string
      description: Attribute group ID, unique within the organization
      maxLength: 36
      minLength: 1
      example: non-trusted-merchants
    AttributeGroupType:
      type: string
      enum:
        - merchant_id
        - merchant_category_code
      description: |
        Flex control scope
          * `merchant_category_code`:  Merchant category code (MCC) is a four-digit number assigned to a business by credit card companies. It is used to classify the business by the type of goods or services it provides.
          * `merchant_id`: Unique ID assigned to a merchant by the payment processor.
    AttributeGroupValues:
      type: array
      description: >-
        Attribute group values. - Each value must be unique within the array -
        Maximum of 20,000 items - Each item must not exceed 15 characters
      maxLength: 25000
      minLength: 1
      items:
        type: string
        pattern: ^[a-zA-Z0-9]+$
        maxLength: 15
        minLength: 1
      example:
        - '0123'
        - '2224'
        - '3876'
    AttributeListGroupResponse:
      type: object
      description: Response containing a list of attribute groups
      properties:
        items:
          type: array
          description: List of attribute groups
          items:
            $ref: '#/components/schemas/AttributeGroupObject'
    AvailableLimit:
      type: integer
      format: int64
      description: >
        Total available limit to spend, calculated by: max_limit -
        current_spend_limit. The `current_spend_limit`, an internal field, is
        the total amount of all approved transactions in the `limit_duration`
        period. It is reset by the evaluation flow when a new transaction is
        evaluated in the new period according to the `reset_datetime`. 


        When `available_limit` is set in a PATCH request, it resets
        `current_spend_limit`. In this case, `available_limit` cannot be greater
        than `max_limit`. Note that `available_limit` is an integer. Since
        global currencies vary in the number of digits that are allowed after
        the decimal point, you must convert the actual maximum spending limit
        into an integer value to use in this field. To do this, use the
        following formula:


        value = floatNumber * 10^x,

        where x is the number of digits for the currency as defined in ISO 4217.


        For example, if you want to set the value 499.99 for BRL currency
        transactions, you must set 49999 = 499.99 * 10^2.


        On the other hand, the Japanese money system does't use fractions of a
        yen (the Japanese currency). So, to set the value at 4999 yen, you must
        set 4999 = 4999.0 * 10^0 = 4999.0 * 1. (In other words, the value
        doesn't change.)
      example: 300
    BeneficiaryId:
      type: string
      example: 8497225d-2096-4b92-990e-f73bd21bc48c
      description: Account beneficiary ID
    CardMode:
      type: string
      enum:
        - credit
        - debit
      example: credit
      description: |
        Specifies the operational mode of the card.
    Condition:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Condition ID
          example: b4930a4d-e2c4-4fdc-9803-c83dec3a30d1
        attribute:
          type: string
          description: >
            Attribute to evaluate in condition. For `entry_mode`,
            `merchant_category_code`, and `merchant_id`, these parameters are
            valid for card network operations. For a control to be valid, you
            must enter a code specified by the Mastercard/Visa card network.

            * `amount`: Numeric value that indicates the amount of the operation
            performed by the user

            * `balance`: Maximum balance amount allowed in an account. Due to
            fiscal restrictions in some countries, the user cannot have more
            than a certain amount in the account. When the balance value is
            defined, the control validates any process of entering money into
            that account, evaluates the account balance at the time of the
            transaction, and denies any inflow of money above the amount defined
            in the balance value.

            * `country_code`: Three-letter country code (ISO 3166-1) indicating
            the location where the transaction is initiated or processed.

            * `currency_code`: Three-letter currency code (ISO-4217) for the
            flex control condition

            * `entry_mode`: A code used to establish the mode of purchase. Valid
            only for card network operations. For a control to be valid, it must
            be a code defined by the entire Field 22 (Visa) or DE 22
            (Mastercard) or as specified by each card network.
                * Visa: Field 22 contains a 4-digit code indicating the method used to enter the account number and card expiration date (positions 1 and 2) and, if an electronic terminal is used, the capability of the terminal to capture online PINs (position 3) and the last digit (position 4) equal to 0 (unused) for transactions processed through VisaNet. This field is fixed-length with three subfields.
                * Mastercard: DE 22 contains a 3-digit code indicating the method used to enter the account number and card expiration date (positions 1 and 2) and, if an electronic terminal is used, the capability of the terminal to capture online PINs (position 3).
            * `is_device_registered`: Boolean that indicates whether the device
            used for the operation is registered according to the financial
            institution's security policies.

            * `is_password_present`: Boolean that indicates whether the password
            is present in the evaluation request.

            * `is_physical_card_present`: Boolean that indicates whether a
            physical card is present in the evaluation request.

            * `is_tra_exemption_requested`: Boolean that indicates whether a TRA
            (Transaction Risk Assessment) exemption is requested for the
            transaction.

            * `merchant_category_code`: Merchant Category Code (MCC) is a
            four-digit number used to describe a merchant's primary business
            activities. Valid only for card network operations. For a control to
            be valid, you must enter a code specified by the Mastercard/Visa
            card network.

            * `merchant_id`: Merchant ID. Valid only for card network
            operations. For a control to be valid, you must enter a code
            specified by the Mastercard/Visa card network.

            * `month_day`: Day of the month when the operation is performed.
            Commonly used to limit operations on holidays. The format is MMM-DD.
            For example, enter January 25 as "JAN-25".

            * `number_of_installments`: Number of installments in the operation

            * `time_now`: Restriction window used to establish the time when the
            operation is performed, defined in the Coordinated Universal Time
            (UTC 0) zone. For example, a 10:59 PM-06:59 AM window specifies
            restrictions that apply from 11 PM to 7 AM in the UTC 0 time.

            * `week_day`: Day of the week when the operation occurs. Use the
            full lowercase weekday name. Valid values: sunday, monday, tuesday,
            wednesday, thursday, friday, saturday.

            * `authentication_method`:  Enable authorization rules aligned with
            PSD2 principles. Determine whether restrictions should be applied
            for specific authentication methods. Valid values are "password",
            "email", and "sms". 

            * `is_token_present`: Boolean that indicates whether a token card is
            present in the evaluation request.

            * `initiation_mode`: Payment initiation mode.
               - `moto`: Payments made through mail order or telephone. 
               - `mit`: Merchant-initiated transactions.
            * acquirer_country_code: Three-letter country code (ISO 3166-1)
            representing the location of the acquiring bank or financial
            institution.

            * is_cavv_present: Boolean indicating that the CAVV field is
            present. CAVV stands for cardholder authentication verification
            value.

            * avr: String indicating that the transaction is a card network
            Account Verification Request (AVR) transaction. AVR transactions
            differ from standard authorizations in that they are typically
            zero-value and are used for card network verification flows.
            Currently, the only supported value for this attribute is `mtt`,
            which is the Mobility & Transport Transaction (MTT) type.
          enum:
            - balance
            - amount
            - merchant_category_code
            - week_day
            - month_day
            - time_now
            - entry_mode
            - merchant_id
            - currency_code
            - country_code
            - number_of_installments
            - is_physical_card_present
            - is_device_registered
            - is_tra_exemption_requested
            - authentication_method
            - is_token_present
            - initiation_mode
            - acquirer_country_code
            - is_cavv_present
            - avr
        operator:
          type: string
          enum:
            - eq
            - neq
            - lt
            - lte
            - gt
            - gte
            - in
            - nin
            - bt
            - in_group
            - not_in_group
          description: |
            Condition type evaluation.
            * eq - equal to value
            * neq - not equal to value
            * lt - lower than value
            * lte - lower than or equal to value
            * gt - greater than value
            * gte - greater than or equal to value
            * in - includes value
            * nin - does not include value
            * bt - between two values
            * in_group - in attribute group
            * not_in_group - not in attribute group
        value:
          type: string
          description: Value to compare
          example: '10000'
      required:
        - attribute
        - operator
        - value
    CreateAccountFlexControlRequest:
      type: object
      description: Creates new flex control for account.
      properties:
        type:
          $ref: '#/components/schemas/Type'
        processing_codes:
          $ref: '#/components/schemas/ProcessingCodes'
        name:
          $ref: '#/components/schemas/Name'
        beneficiary_id:
          $ref: '#/components/schemas/BeneficiaryId'
        override_controls:
          $ref: '#/components/schemas/OverrideControls'
        currency_code:
          $ref: '#/components/schemas/CurrencyCode'
        time_zone:
          $ref: '#/components/schemas/TimeZone'
        max_limit:
          $ref: '#/components/schemas/MaxLimit'
        limit_duration:
          $ref: '#/components/schemas/LimitDuration'
        reset_datetime:
          type: string
          format: date-time
          deprecated: true
          description: >
            *Note: This field has been deprecated. The field `reset_period` has
            replaced `reset_datetime`.*

            The reset datetime (RFC-3339 format) of the flex control.
          example: '2022-03-08T21:19:55Z'
        reset_period:
          $ref: '#/components/schemas/ResetPeriod'
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
        deny_code:
          $ref: '#/components/schemas/DenyCode'
        response_code:
          $ref: '#/components/schemas/ResponseCode'
        custom_code:
          $ref: '#/components/schemas/CustomCode'
        evaluation_order:
          $ref: '#/components/schemas/EvaluationOrder'
        active:
          $ref: '#/components/schemas/Active'
      required:
        - type
        - name
        - deny_code
    AttributeGroupObject:
      type: object
      description: Attribute group object
      properties:
        id:
          $ref: '#/components/schemas/AttributeGroupID'
        description:
          $ref: '#/components/schemas/AttributeGroupDescription'
        type:
          $ref: '#/components/schemas/AttributeGroupType'
        values:
          $ref: '#/components/schemas/AttributeGroupValues'
      required:
        - id
        - description
        - type
        - values
    CreateCustomerFlexControlRequest:
      type: object
      description: >
        Create customer flex control request. You use flex controls to restrict
        financial operations. For example, you can set spending and usage
        limits. See [Flexible transaction
        controls](https://developers.pismo.io/pismo-docs/docs/flex-controls) for
        more information.
      properties:
        type:
          $ref: '#/components/schemas/Type'
        processing_codes:
          $ref: '#/components/schemas/ProcessingCodes'
        rule_reference_id:
          type: string
          example: purchase-1M
          description: >
            If `rule_reference_id` is set, this program-level flex control, if
            it exists, overrides this flex control.
        name:
          $ref: '#/components/schemas/Name'
        account_id:
          type: integer
          example: 500000
          format: int64
          description: Account ID
        currency_code:
          $ref: '#/components/schemas/CurrencyCode'
        max_limit:
          $ref: '#/components/schemas/MaxLimit'
        max_transactions:
          $ref: '#/components/schemas/MaxTransactions'
        max_amount:
          $ref: '#/components/schemas/MaxAmount'
        limit_duration:
          $ref: '#/components/schemas/LimitDuration'
        reset_datetime:
          type: string
          format: date-time
          deprecated: true
          description: |
            *Note: This field has been deprecated, use `reset_period` instead.*
            The reset datetime (RFC-3339 format) of the control rule.
          example: '2022-03-08T21:19:55Z'
        time_zone:
          $ref: '#/components/schemas/TimeZone'
        reset_period:
          $ref: '#/components/schemas/ResetPeriod'
        reset_strategy:
          $ref: '#/components/schemas/ResetStrategy'
        card_ids:
          type: array
          description: List of card IDs
          items:
            type: integer
            format: int64
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
        active:
          $ref: '#/components/schemas/Active'
        deny_code:
          $ref: '#/components/schemas/DenyCode'
        response_code:
          $ref: '#/components/schemas/ResponseCode'
        custom_code:
          $ref: '#/components/schemas/CustomCode'
        evaluation_order:
          $ref: '#/components/schemas/EvaluationOrder'
        card_mode:
          $ref: '#/components/schemas/CardMode'
      required:
        - account_id
        - type
        - name
    CurrencyCode:
      type: string
      example: BRL
      description: Flex control currency code (ISO 4217)
    CustomCode:
      type: string
      description: >
        Alphanumeric three-character custom code. This can be an alternative
        custom code. When the platform denies a control evaluation, it returns
        the custom code that provides the precise reason for the denial by the
        anti-fraud solution.
      minLength: 1
      maxLength: 3
      example: A1B
    CustomerFlexControlsResponse:
      type: object
      description: Flex control response.
      properties:
        id:
          type: string
          description: |
            Flex control ID is auto-generated at creation time.
          format: uuid
          example: 89cbdadc-860b-4275-a5cd-d9d892fd3869
        type:
          $ref: '#/components/schemas/Type'
        processing_codes:
          $ref: '#/components/schemas/ProcessingCodes'
        rule_reference_id:
          type: string
          example: purchase-1M
          description: >-
            ID of program-level flex control. Only present in generic flex
            controls created for the entire program.
        name:
          $ref: '#/components/schemas/Name'
        account_id:
          type: integer
          example: 8988000
          format: int64
          description: Account ID
        customer_id:
          type: integer
          format: int64
          description: Customer ID
          example: 99999999
        card_ids:
          type: array
          description: Card ID list
          items:
            type: number
            format: int64
          example:
            - 11111
            - 22222
        currency_code:
          $ref: '#/components/schemas/CurrencyCode'
        max_limit:
          $ref: '#/components/schemas/MaxLimit'
        max_transactions:
          $ref: '#/components/schemas/MaxTransactions'
        max_amount:
          $ref: '#/components/schemas/MaxAmount'
        limit_duration:
          $ref: '#/components/schemas/LimitDuration'
        reset_datetime:
          type: string
          format: date-time
          description: >
            Reset datetime (RFC-3339 format).

            If `reset_datetime` is not set, by default it will calculated based
            on `limit_duration` period and the current time.
          example: '2022-03-08T21:19:55Z'
        time_zone:
          $ref: '#/components/schemas/TimeZone'
        reset_period:
          $ref: '#/components/schemas/ResetPeriod'
        reset_strategy:
          $ref: '#/components/schemas/ResetStrategy'
        available_limit:
          $ref: '#/components/schemas/AvailableLimit'
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
          example:
            - attribute: balance
              operator: gt
              value: '10000'
        active:
          $ref: '#/components/schemas/Active'
        deny_code:
          $ref: '#/components/schemas/DenyCode'
        response_code:
          $ref: '#/components/schemas/ResponseCode'
        custom_code:
          $ref: '#/components/schemas/CustomCode'
        evaluation_order:
          $ref: '#/components/schemas/EvaluationOrder'
        card_mode:
          $ref: '#/components/schemas/CardMode'
        customized:
          $ref: '#/components/schemas/Customized'
      required:
        - id
        - type
        - account_id
    Customized:
      type: boolean
      example: true
      description: >
        Indicates whether the flex control is managed by the user. If
        `customized` is `false`, the flex control is managed by the card's
        program. Generally speaking, users shouldn't change flex controls
        created by the program, however it is possible to do so. You can reverse
        indivdually managing a flex control with a call to [Update account flex
        control](ref:patch-v1-accounts-flex-control) or [Update customer flex
        control](ref:patch-v1-customers-flex-control) and setting `customized`
        as `false`.
    DenyCode:
      type: string
      description: |
        Deny code related to restriction.
        This code is returned when the evaluation does not meet the conditions.
      example: ERR_VAL_BALANCE
    ErrorDetail:
      type: object
      description: Error detail.
      properties:
        location:
          type: string
          example: payload.entity_type
          description: Identifies where the request is causing an error.
        message:
          type: string
          description: Description of error
          example: '`entity_type` should be `legal_person` or `natural_person`'
    ErrorAttributeTypeDetail:
      type: object
      description: Error detail.
      properties:
        location:
          type: string
          example: payload.type
          description: Location where the request is causing an error
        message:
          type: string
          description: Error description
          example: '`type` should be `merchant_category_code` or `merchant_id`'
    ErrorResponse:
      type: object
      description: Error response
      properties:
        message:
          type: string
          description: Error description
        error_code:
          type: string
          description: Error code ID
          deprecated: true
        code:
          description: Error code ID
          type: string
    ErrorResponseWithDetails:
      type: object
      description: Error response
      properties:
        message:
          type: string
          description: Error description
        details:
          type: array
          description: Provides more information about the error message.
          items:
            $ref: '#/components/schemas/ErrorDetail'
        error_code:
          type: string
          description: Error code ID
          deprecated: true
        code:
          type: string
          description: Error code ID
    EvaluationOrder:
      type: integer
      format: int64
      description: >
        Order in which the control is evaluated. If this value is not provided,
        the control is evaluated after the controls with the configured
        `evaluation_order` value.
      minimum: 1
      maximum: 99
    GetAllAccountCustomerFlexControlsResponse:
      type: array
      items:
        $ref: '#/components/schemas/AccountCustomerFlexControlsResponse'
    GetAllAccountFlexControlsResponse:
      type: array
      items:
        $ref: '#/components/schemas/AccountFlexControlsResponse'
    GetAllCustomerFlexControlsResponse:
      type: array
      items:
        $ref: '#/components/schemas/CustomerFlexControlsResponse'
    LimitDuration:
      type: string
      description: >
        Flex control limit period duration (ISO 8601 format).

        For example, if a flex control sets a spending limit of $500, and
        `limit_duration` is set to one month (`P1M`), then the user cannot spend
        more than $500 from the account in any one month period.

        If `limit_duration` is not set, then the flex control does not
        accumulate.
      example: P1M
    MaxAmount:
      type: integer
      minimum: 1
      format: int64
      description: >
        Maximum accumulated amount allowed. Once met or exceeded, subsequent
        transactions are declined by the evaluation control flow.

        Note that the value must be calculated as follows. 


        value = floatNumber × 10^X, where X is the number of digits after the
        decimal separator for the currency defined in ISO 4217.


        For example, if you want to set the value 499.99 for USD currency
        transactions, where the number of decimal places is 2, you must set the
        value to `49999` (499.99 × 10²).


        If you want to set the value 499 for JPY currency transactions, where
        the number of decimal places is 0, you must set the value to `499`
        (499.0 × 10^0 = 499.0 × 1 - in other words, the value doesn't change).
      example: 100000
    MaxLimit:
      type: integer
      minimum: 1
      format: int64
      description: >
        Maximum spending limit. Once met or exceeded, any subsequent
        transactions are declined by evaluation control flow.

        Note that this value is an integer. Since global currencies vary in the
        number of digits that are allowed after the decimal point, you must
        convert the actual maximum spending limit into an integer value to use
        in this field. To do this, use the following formula.


        value = floatNumber × 10^X, where X is the number of digits after the
        decimal separator for the currency as defined in ISO 4217.


        For example, if you want to set the value 499.99 for BRL currency
        transactions, where the number of decimal places is 2, you must set it
        to `49999` (499.99 × 10²).


        If you want to set the value 499 for JPY currency transactions, where
        the number of decimal places is 0, you must set it to `4999` (4999.0 ×
        10^0 = 4999.0 × 1 - in other words, the value doesn't change.)


        This field is **REQUIRED** for cumulative controls.
      example: 1000
    MaxTransactions:
      type: integer
      minimum: 1
      format: int64
      description: >
        Maximum number of transactions allowed. Once met or exceeded, subsequent
        transactions are declined by the evaluation control flow.
      example: 10
    Name:
      type: string
      description: Flex control name
      example: Purchase 1M limit
    OverrideControls:
      type: array
      items:
        type: string
      example:
        - spending-limit-id-1
        - spending-limit-id-2
      description: >
        List of existing flex control IDs to override. 

        The platform ignores these controls and only evaluates the new flex
        control.
    PatchAccountFlexControlRequest:
      type: object
      description: Patch flex control request
      properties:
        name:
          $ref: '#/components/schemas/Name'
        processing_codes:
          $ref: '#/components/schemas/ProcessingCodes'
        currency_code:
          $ref: '#/components/schemas/CurrencyCode'
        beneficiary_id:
          $ref: '#/components/schemas/BeneficiaryId'
        override_controls:
          $ref: '#/components/schemas/OverrideControls'
        max_limit:
          $ref: '#/components/schemas/MaxLimit'
        available_limit:
          $ref: '#/components/schemas/AvailableLimit'
        limit_duration:
          $ref: '#/components/schemas/LimitDuration'
        reset_datetime:
          type: string
          format: date-time
          deprecated: true
          description: >
            *Note: This field has been deprecated. The field `reset_period` has
            replaced `reset_datetime`.*

            The reset datetime (RFC-3339 format) of the flex control.
          example: '2022-03-08T21:19:55Z'
        reset_period:
