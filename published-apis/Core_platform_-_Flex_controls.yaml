          type: string
          format: date-time
          deprecated: true
          description: >
            *Note: This field has been deprecated. The field `reset_period` has
            replaced `reset_datetime`.*

            The reset datetime (RFC-3339 format) of the control rule.
          example: '2022-03-08T21:19:55Z'
        reset_period:
          $ref: '#/components/schemas/ResetPeriod'
        reset_strategy:
          $ref: '#/components/schemas/ResetStrategy'
        time_zone:
          $ref: '#/components/schemas/TimeZone'
