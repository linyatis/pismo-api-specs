tags:
  - name: Account flex controls
    description: API endpoints for managing account flex controls.
  - name: Customer flex controls
    description: API endpoints for managing customer flex controls.
  - name: Attribute groups
    description: API endpoints for managing attribute groups used in flex controls.
paths:
  /v1/customers/{customerId}/flex-controls:
    post:
      operationId: post-v1-customers-flex-controls
      summary: Create customer flex control
      description: >
        Creates flex control for customer. You use flex controls to restrict
        financial operations. For example, you can set spending and usage
        limits. See [Flexible transaction
        controls](https://developers.pismo.io/pismo-docs/docs/flex-controls) for
        more information.


        To create a cumulative condition, the `type` can be:


        - `spending_limit` to restrict the maximum total amount that can be
        transacted during an specific period.

        - `usage_limit` to evaluate the quantity of transactions. The cumulative
        control type must also specify the `max_limit`. The `limit_duration` and
        `reset_period` parameters are optional, but they are linked with the
