        evaluation_order:
          $ref: '#/components/schemas/EvaluationOrder'
        card_mode:
          $ref: '#/components/schemas/CardMode'
    ProcessingCodes:
      type: array
      items:
        type: string
      description: >
        Processing codes list for evaluating flex control conditions. If the
        value is empty, the flex control applies to any processing code.
      example:
        - '07000'
        - '07001'
    ResetPeriod:
      type: object
      description: >
        Enables the specification of reset periods for accumulators based on the
        duration in `limit_duration`. When this field is set, it must follow the
        RFC 3339 pattern from ISO 8601. When `reset_period` changes, the
        `avaliable_limit` is reset.
      properties:
        month_day:
          type: number
          description: >-
            Month day to reset. Can only be used when `limit_duration` is
            monthly.
          minimum: 1
          maximum: 28
        month:
          type: number
          description: >-
            Numeric day of the month to reset the flex control. Can only be used
            when `limit_duration` is yearly.
          minimum: 1
          maximum: 12
        week_day:
          type: string
          description: Week day to reset. Can only be used when `limit_duration` is weekly.
          example: monday
          enum:
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
            - sunday
        time:
          type: string
          description: >
            Time to reset flex control in time zone defined by control. Include
            only hours, minutes, and AM/PM. For example, `11:00PM` for 11PM or
            `00:00AM` for midnight. You can use `12` in hours as an alternative
            to `00` (for example,`12:59AM` is the same as `00:59AM`).
          example: 3:00AM
        utc_time:
          type: string
          deprecated: true
          description: >
            *Note: This field has been deprecated, use `time` instead.*

            Time to reset the flex control in the UTC 0 time. Include only
            hours, minutes, and AM/PM. For example, `11:00PM` for 11PM or
            `00:00AM` for midnight. You can use `12` in hours as an alternative
            to `00` (for example,`12:59AM` is the same as `00:59AM`).
          example: 3:00AM
    ResetStrategy:
      type: object
      description: The strategy to reset the accumulators.
      properties:
        reset_trigger:
          type: object
          description: Trigger that resets the accumulators
          properties:
            is_password_present:
              type: boolean
              description: Indicates whether the client entered a password
            authentication_method:
              type: array
              description: >-
                Indicates which authentication methods should trigger a reset of
                the flex-control accumulator.
              items:
                type: string
                format: text
              example:
                - password
                - sms
                - email
    ResponseCode:
      type: string
      description: >
        Alphanumeric two-character response code. This can be the standard card
        network response code. When the platform denies a transaction, it
        returns the response code that provides the precise reason for the
        denial by the card network.
      minLength: 2
      maxLength: 2
      example: '57'
    TimeZone:
      type: string
      description: >
        IANA Time Zone database, such as "America/New_York". 

        This attribute is used to evaluate the flex control using the desired
        time zone for condition attributes such as `week_day`, `month_day`,
        `time_now`, and `reset_period`.

        If `time_zone` is empty, the control is evaluated using the UTC time
        zone.
      example: America/Sao_Paulo
    Type:
      type: string
      enum:
        - spending_limit
        - usage_limit
        - restriction
        - cumulative_limit
      description: |
        Flex control scope
          * `usage_limit`: Accumulator flex control that increases by one until `max_limit`
          * `spending_limit`: Accumulator flex control that increases by the current transaction’s `amount` until `max_limit`
          * `restriction`: Restriction flex control that only validates specified conditions
          * `cumulative_limit`: Accumulator flex control that increases by one until a condition is met, applies only to flex controls with associated `card_ids`, and requires a `reset_strategy`
