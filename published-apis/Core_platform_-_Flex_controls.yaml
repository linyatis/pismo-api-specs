  /v1/accounts/{accountId}/flex-controls:
    post:
      operationId: post-v1-accounts-flex-controls
      summary: Create account flex control
      description: >
        Creates flex control for account. You use flex controls to restrict
        financial operations. For example, you can set spending and usage
        limits. For more information, refer to [Flexible transaction
        controls](doc:flex-controls).


        To create a cumulative condition, the `type` can be:


        - `spending_limit` to restrict the maximum total amount that can be
        transacted during an specific period.

        - `usage_limit` to evaluate the quantity of transactions. The cumulative
        control type must also specify the `max_limit`. The `limit_duration` and
        `reset_period` parameters are optional, but they are linked with the
        behavior of `max_limit`.


        To create a restriction condition, set `type` as `restriction`.


        To restrict an operation, the restriction control must specify:
          - at least one condition in the `conditions` array.
          - the required values for `attribute`, `operator`, and `value` in the condition.

        Once you create the control, you can't change its type.


        This endpoint generates an [Account flex control
        created](https://developers.pismo.io/events/docs/audit-account-spending-limit-created-1)
        event.


        NOTE: This endpoint requires an account-specific access token.
      tags:
        - Account flex controls
      security:
        - BearerAuth: []
      parameters:
        - name: accountId
          description: Account ID
          in: path
          required: true
          schema:
            type: number
            example: 9999999
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountFlexControlRequest'
            examples:
              With type spending_limit:
                $ref: '#/components/examples/flexControlTypeSpendingLimit'
              With Beneficiary:
                $ref: '#/components/examples/flexControlForBeneficiary'
              With Currency Code:
                $ref: '#/components/examples/flexControlByCurrencyCode'
              With Daily reset period:
                $ref: '#/components/examples/flexControlWithDailyResetPeriod'
              With Weekly reset period:
                $ref: '#/components/examples/flexControlWithWeeklyResetPeriod'
              With Monthly reset period:
                $ref: '#/components/examples/flexControlWithMonthlyResetPeriod'
              With Conditions:
                $ref: '#/components/examples/flexControlMultipleConditions'
              With type usage_limit:
                $ref: '#/components/examples/flexControlTypeUsageLimitConditions'
              With type restriction:
                $ref: '#/components/examples/flexControlRestrictionConditions'
              With installments restriction:
                $ref: '#/components/examples/flexControlByNumberOfInstallments'
      responses:
        '201':
          description: OK. Successful flex control creation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountFlexControlsResponse'
              examples:
                Simple Flex Control:
                  $ref: '#/components/examples/accountFlexControlCreationResponse'
                Flex Control with Conditions:
                  $ref: >-
                    #/components/examples/accountFlexControlCreationConditionsResponse
                Type 'restriction' Flex Control:
                  $ref: >-
                    #/components/examples/accountFlexControlRestrictionCreationResponse
        '400':
          description: Bad request. Validation error on request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
              examples:
                error parsing payload:
                  $ref: '#/components/examples/ERUL0701'
                error validating request path:
                  $ref: '#/components/examples/ERUL0702'
                error validating request header:
                  $ref: '#/components/examples/ERUL0703'
                error building new spending limit from request payload:
                  $ref: '#/components/examples/ERUL0704'
                spending limit already exists:
                  $ref: '#/components/examples/ERUL0706'
                spending limit does not exist in override controls:
                  $ref: '#/components/examples/ERUL0004'
        '403':
          description: Forbidden. Authorization error on request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
              examples:
                operation not allowed:
                  $ref: '#/components/examples/ERUL0002'
        '409':
          description: Conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseWithDetails'
              examples:
                maximum number of account flex controls reached:
                  $ref: '#/components/examples/WRUL0707'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internal server error:
                  $ref: '#/components/examples/ERUL0001'
    get:
      operationId: get-v1-accounts-flex-controls
