  /v1/migrations/merchants/transactions:
    post:
      summary: Migrate merchant transactions
      description: >
        Start migration of Merchant transaction details such as authorization
        ID, merchant ID, marketplace ID, and so on.


        This endpoint generates the following events:


        - [Merchant Transaction migration
        started](https://developers.pismo.io/events/docs/migration-merchant-transaction-incoming-1)


        - [Merchant transactions migration
        completed](https://developers.pismo.io/events/docs/migration-merchant-transaction-outgoing-1)
      operationId: PostMerchantTransactionsV1
      tags:
