  /v1/migrations/recurring-charge-plans:
    post:
      summary: Migrate recurring charge plans
      description: >
        Start migration of **recurring charge plans**. (A recurring charge plan
        defines a recurring charge such as an annual fee, which is applied on a
        fixed schedule, and the number of installments [cycles] to which the
        charge should be applied.)


        This endpoint generates the following events:


        - [Recurring Charge plan migration
        started](https://developers.pismo.io/events/docs/migration-recurring-charge-plan-incoming-1)


        - [Recurring charge plan migration
        completed](https://developers.pismo.io/events/docs/migration-recurring-charge-plan-outgoing-1)
      operationId: PostRecurringChargePlansV1
      tags:
        - Recurring charge plan migration
      requestBody:
        description: Migrates a recurring charge plan
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostRecurringChargePlansV1Request'
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Payload Validation Error:
                  $ref: '#/components/examples/PayloadValidationError'
        '500':
          description: Internal Error
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal Server Error:
                  $ref: '#/components/examples/InternalServerError'
  /v1/migrations/recurring-charge-links:
    post:
      summary: Migrate recurring charge links
      description: >
        Start migration of **recurring charge links** for an account. (A
        recurring charge link associates an active recurring charge plan with an
        account, so that the charges defined for the plan are applied to the
        account.)


        This endpoint generates the following events:


        - [Recurring Charge link migration
        started](https://developers.pismo.io/events/docs/migration-recurring-charge-link-incoming-1)


        - [Recurring charge link migration
        completed](https://developers.pismo.io/events/docs/migration-recurring-charge-link-outgoing-1)
        (one event for **each item** in the `links` array in the payload)
      operationId: PostRecurringChargeLinksV1
      tags:
        - Recurring charge link migration
      requestBody:
        description: Migrates recurring charge links
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostRecurringChargeLinksV1Request'
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Payload Validation Error:
                  $ref: '#/components/examples/PayloadValidationError'
        '500':
          description: Internal Error
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal Server Error:
                  $ref: '#/components/examples/InternalServerError'
  /v1/migrations/on-us-authorizations:
    post:
      summary: Migrate on-us authorizations
      description: >
        Start migration of **on-us authorizations** to the Pismo platform. (An
        on-us authorization is one that Pismo processes without involving card
        networks, such as Mastercard or Visa).


        This endpoint generates the following events:


        - [On-us authorization migration
