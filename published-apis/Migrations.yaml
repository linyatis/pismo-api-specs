                Payload Validation Error:
                  $ref: '#/components/examples/PayloadValidationError'
        '500':
          description: Internal Error
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal Server Error:
                  $ref: '#/components/examples/InternalServerError'
  /v1/migrations/authorizations:
    post:
      description: >
        Start authorizations migration.


        This endpoint generates the following events:


        - [Authorization migration
        started](https://developers.pismo.io/events/docs/migration-authorization-incoming-1)


        - [Authorization migration
        completed](https://developers.pismo.io/events/docs/migration-authorization-outgoing-1)
      summary: Migrate authorizations
      tags:
        - Authorization migration
      operationId: PostAuthorizationsV1
      requestBody:
        description: Start migration of authorizations
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostAuthorizationsV1Request'
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Payload Validation Error:
                  $ref: '#/components/examples/PayloadValidationError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal Server Error:
