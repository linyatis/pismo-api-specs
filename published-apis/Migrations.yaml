  /v1/migrations/balance-control:
    post:
      description: >
        This endpoint enables you to migrate balances from your legacy platform
        to the Pismo platform &#8212; after statement migration but only before
        Go-live. This allows the platform to calculate retroactive accruals even
        if you did not perform daily accruals on your legacy platform. You also
        may split balances to indicate which ones are accruable and fineable.


        This endpoint generates the following events:

        - [Balance control migration
        started](https://developers.pismo.io/events/docs/migration-balance-control-incoming-1)

        - [Balance control migration
        completed](https://developers.pismo.io/events/docs/migration-balance-control-outgoing-1)
      summary: Migrate balances
      operationId: PostBalanceControlV1
      tags:
        - Balance migration
      requestBody:
        description: Start migration of a Migration Balance Control
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostBalanceControlV1Request'
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Payload Validation Error:
                  $ref: '#/components/examples/PayloadValidationError'
        '500':
          description: Internal Error
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                Internal Server Error:
                  $ref: '#/components/examples/InternalServerError'
  /v1/migrations/cards:
    post:
      description: >
        Start migration of non-PCI cards.


        This endpoint generates the following events:


        - [Card migration
        started](https://developers.pismo.io/events/docs/migration-card-incoming-1)


        - [Card migration
        completed](https://developers.pismo.io/events/docs/migration-card-outgoing-1)


        - For COMBO card migrations (that is, `mode = COMBO` and
        `combo_account_id = NOT NULL`), a third event is also sent: [Combo card
        mode migration
        completed](https://developers.pismo.io/events/docs/migration-card-mode-outgoing-1).
        This applies to the initial card migration only, but not to updates made
        before Go-live.
      summary: Migrate cards
      tags:
        - Card migration
      operationId: PostCardsV1
      parameters:
        - $ref: '#/components/parameters/auth'
      requestBody:
        description: |
          Start migration of non-PCI data for cards.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardsV1Request'
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
