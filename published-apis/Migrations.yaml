              examples:
                Internal Server Error:
                  $ref: '#/components/examples/InternalServerError'
  /v1/migrations/cards-pci:
    post:
      description: >
        Start migrations of PCI cards.


        This endpoint generates the [PCI card migration
        completed](https://developers.pismo.io/events/docs/migration-pci-card-outgoing-1)
        event. The result is either `SUCCESS` or `FAIL`.


        **Note:** This is a PCI endpoint. Use the <a
        href="https://gw-pci.pismolabs.io">https://gw-pci.pismolabs.io</a>
        environment.
      summary: Migrate PCI cards
      tags:
        - Card migration
      operationId: PostPciCardsV1
      parameters:
        - $ref: '#/components/parameters/auth'
      requestBody:
        description: Start migration of PCI cards
        content:
