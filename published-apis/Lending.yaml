        Array of options to define how to reduce an outstanding loan amount.
        `INSTALLMENT` reduces the installment amounts over time but keeps the
        same maturity date. `TERM` applies the prepayment amount to reduce the
        loan term (duration), changing the loan maturity date. With either
        option, if the amount paid is not enough to cover a full installment
        amount, it partially pays the installment based on the prepayment
        hierarchy settings.
      type: array
      minItems: 1
      uniqueItems: true
      items:
        $ref: '#/components/schemas/ReduceOption'
      example:
        - INSTALLMENT
        - TERM
    PenaltyV2:
      description: Penalty configuration for early settlement or prepayment
      type: object
      required:
        - type
        - value
      properties:
        type:
          $ref: '#/components/schemas/PenaltyType'
        value:
          $ref: '#/components/schemas/PenaltyValue'
    PenaltyType:
      description: Type of penalty calculation
      type: string
      example: PERCENTAGE
      enum:
        - PERCENTAGE
        - FIXED_AMOUNT
    PenaltyValue:
      description: >-
        Penalty value. For `PERCENTAGE` penalty type, enter a value between 0
        and 1 (such as 0.05 for 5%). For `FIXED_AMOUNT` penalty type, enter the
        fixed amount value.
      type: number
      format: double
      minimum: 0
      example: 0.05
    RepaymentAmount:
      type: number
      format: double
      description: Repayment amount
      example: 100
    RepaidAmount:
      type: number
      format: double
      description: Repaid amount
      example: 100
    RepaymentCalculationMethod:
      type: string
      description: Repayment calculation method
      example: EI_REDUCING_BALANCE
      enum:
        - EI_REDUCING_BALANCE
        - ADD_ON_INTEREST
    RepaymentDate:
      type: string
      description: Repayment date. Format = YYYY-MM-DD.
      format: date
      example: '2022-06-30'
    RepaymentDue:
      type: string
      description: >-
        Repayment due. Define if the repayment calculation method uses the
        period beginning or period ending to calculate the loan repayment
        schedule.
      enum:
        - BEGINNING_OF_PERIOD
        - END_OF_PERIOD
      default: END_OF_PERIOD
    RepaymentHierarchyRequest:
      required:
        - code
        - hierarchy
      type: object
      properties:
        code:
          maxLength: 32
          minLength: 0
          type: string
          description: Code
        hierarchy:
          $ref: '#/components/schemas/Hierarchy'
    RepaymentID:
      type: string
      description: Repayment ID
      format: uuid
      example: 5c075cc6-8dc2-4fe6-9ed7-cf5687d4e834
    RepaymentHierarchyCodeV2:
      maxLength: 80
      minLength: 1
      type: string
      description: >-
        Repayment hierarchy code. Must be normalized (Unicode NFC), and may
        contain a UUID, or uppercase letters, numbers, and underscore.
      example: RH001
    LoanProductV2Parameters:
      type: object
      description: Loan product V2 parameters
      properties:
        stop_accrual_number_of_days:
          description: >-
            Number of days after which interest accrual stops on overdue
            installments
          type: number
          format: int32
          minimum: 1
          maximum: 365
          example: 60
    RepaymentHierarchyCode:
      maxLength: 32
      type: string
      description: Repayment hiearchy code
    RepaymentHierarchyResponse:
      type: object
      properties:
        code:
          type: string
          description: Code
        hierarchy:
          $ref: '#/components/schemas/Hierarchy'
        status:
          type: string
          description: Status
        created_at:
          type: string
          format: datetime
          description: Created at date/time. Format = YYYY-MM-DDThh:mm:ss.
        updated_at:
          type: string
          format: datetime
          description: Updated at date/time. Format = YYYY-MM-DDThh:mm:ss.
    HierarchyCode:
      type: string
      description: >-
        Repayment hierarchy code. Must be unique and can contain alphanumeric
        characters, hyphens, and underscores.
      maxLength: 80
      minLength: 1
      example: CR008
    HierarchyV2:
      type: array
      description: >-
        Ordered list defining the repayment priority. Determines which loan
        components are paid first during repayment processing. All seven items
        are required.
      minItems: 7
      maxItems: 7
      uniqueItems: true
      items:
        type: string
        enum:
          - PRINCIPAL
          - INTEREST
          - TAX
          - FEE
          - CHARGE
          - PENALTY
          - INSURANCE
      example:
        - PRINCIPAL
        - INTEREST
        - TAX
        - FEE
        - CHARGE
        - PENALTY
        - INSURANCE
    RepaymentHierarchyV2Request:
      required:
        - hierarchy_code
        - hierarchy
      type: object
      properties:
        hierarchy_code:
          $ref: '#/components/schemas/HierarchyCode'
        hierarchy:
          $ref: '#/components/schemas/HierarchyV2'
    RepaymentHierarchyV2Response:
      required:
        - hierarchy_code
      type: object
      properties:
        hierarchy_code:
          type: string
          description: Repayment hierarchy code
          example: CR008
    GetRepaymentHierarchyV2Response:
      required:
        - hierarchy_code
        - hierarchy
        - status
      type: object
      properties:
        hierarchy_code:
          $ref: '#/components/schemas/HierarchyCode'
        hierarchy:
          $ref: '#/components/schemas/HierarchyV2'
        status:
          $ref: '#/components/schemas/HierarchyStatus'
    HierarchyStatus:
      type: string
      description: Repayment hierarchy status
      enum:
        - ENABLED
        - DISABLED
        - DELETED
      example: ENABLED
    RepaymentMode:
      type: object
      description: Repayment mode
      discriminator:
        propertyName: type
      properties:
        type:
          type: string
          description: Repayment mode type
          example: PRINCIPAL_AND_INTEREST
          enum:
            - MORATORIUM
            - PRINCIPAL_AND_INTEREST
            - INTEREST_ONLY
    RepaymentRequest:
      required:
        - repayment_amount
        - repayment_date
        - repayment_id
      type: object
      properties:
        repayment_id:
          $ref: '#/components/schemas/RepaymentID'
        repayment_date:
          $ref: '#/components/schemas/RepaymentDate'
        repayment_amount:
          $ref: '#/components/schemas/RepaymentAmount'
        external_id:
          $ref: '#/components/schemas/ExternalID'
    RepaymentSchedule:
      type: array
      description: Ordered collection of repayment parameters
      items:
        $ref: '#/components/schemas/SimulationResponseRepayment'
    ResponseDisbursement:
      required:
        - amount
        - charge
        - due_date
        - fee
        - principal
        - tax
      type: object
      description: Ordered collection of disbursement parameters
      properties:
        due_date:
          $ref: '#/components/schemas/LoanPaymentDueDate'
        amount:
          $ref: '#/components/schemas/DisbursementAmount'
        principal:
          $ref: '#/components/schemas/PrincipalAmount'
        tax:
          $ref: '#/components/schemas/TaxAmount'
        fee:
          $ref: '#/components/schemas/FeeAmount'
        charge:
          $ref: '#/components/schemas/ChargeAmount'
    ResponseLoanID:
      maxLength: 36
      minLength: 0
      type: string
      description: Loan ID
      example: 99999999-9999-9999-9999-999999999999
    OriginalLoanID:
      type: string
      description: >-
        Original loan ID. When a loan is created from a restructure, this field
        contains the ID of the original loan that was restructured.
      format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    RestructureLoanID:
      type: string
      description: >-
        Restructure loan ID. When a loan has been restructured, this field
        contains the ID of the new loan created from the restructure.
      format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    RestructuredLoanID:
      type: string
      description: Restructured loan ID
      format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    RestructuredLoanTotalOutstandingBalance:
      type: string
      description: >-
        Outstanding balance of the restructured loan in the simulation date. If
        there is a change in the outstanding balance of the restructured loan
        after the simulation, you won't be able to book it.
      format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    RestructuredToLoanID:
      type: string
      description: >-
        Restructured to loan UUID identifier. If returned,
        `restructured_loan_id` field is not.
      format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    RuleUnit:
      type: string
      description: Rule unit. Allowed values depend on the rule.
      example: month
    RuleValue:
      type: number
      format: double
      description: Rule value. Allowed values depend on the rule.
      example: 10.5
    SettlementDate:
      type: string
      description: Date prepayment should be settled. Format = YYYY-MM-DD.
      format: date"
      example: '2022-11-10'
    SimulationExternalID:
      anyOf:
        - type: string
        - type: 'null'
      description: Client-generated external ID for client tracking and reference
      example: my_external_id
    SimulationID:
      maxLength: 36
      type: string
      description: >-
        Custom ID for the simulation. Must consist of uppercase alphanumeric
        characters and underscores.
      example: MY_CUSTOM_LOAN_ID
    SimulationResponse:
      required:
        - days_in_year_method
        - disbursement_schedule
        - loan_amount
        - loan_simulation_id
        - outstanding_balance
        - product_id
        - repayment_calculation_method
        - repayment_frequency
        - repayment_schedule
        - stages
        - start_date
        - total_payment_amount
      type: object
      properties:
        loan_simulation_id:
          $ref: '#/components/schemas/LoanSimulationID'
        product_id:
          $ref: '#/components/schemas/LoanProductID'
        external_id:
          $ref: '#/components/schemas/SimulationExternalID'
        loan_amount:
          $ref: '#/components/schemas/LoanAmount'
        outstanding_balance:
          $ref: '#/components/schemas/OutstandingBalance'
        total_payment_amount:
          $ref: '#/components/schemas/TotalPaymentAmount'
        start_date:
          $ref: '#/components/schemas/FirstActiveStartDate'
        days_in_year_method:
          $ref: '#/components/schemas/DaysInYearMethod'
        repayment_calculation_method:
          $ref: '#/components/schemas/RepaymentCalculationMethod'
        repayment_frequency:
          $ref: '#/components/schemas/LoanProductPaymentFrequency'
        restructured_loan_id:
          $ref: '#/components/schemas/RestructuredLoanID'
        restructured_loan_total_outstanding_balance:
          $ref: '#/components/schemas/RestructuredLoanTotalOutstandingBalance'
        repayment_schedule:
          $ref: '#/components/schemas/RepaymentSchedule'
        disbursement_schedule:
          $ref: '#/components/schemas/DisbursementSchedule'
        stages:
          type: array
          description: Ordered collection of stages parameters
          items:
            $ref: '#/components/schemas/SimulationResponseStage'
    SimulationResponseRepayment:
      required:
        - balance
        - due_date
        - number_of_days
        - period
        - amount
      type: object
      description: Ordered collection of repayment parameters
      properties:
        transactions_ids:
          type: array
          description: List of transaction IDs associated with this repayment
          items:
            type: string
            example: '4621794465'
        status:
          $ref: '#/components/schemas/LoanStatus'
        period:
          $ref: '#/components/schemas/Period'
        due_date:
          $ref: '#/components/schemas/LoanPaymentDueDate'
        real_due_date:
          $ref: '#/components/schemas/RealDueDate'
    SimulationRequest:
      required:
        - disbursement
        - loan_amount
        - product_id
        - stages
        - start_date
      type: object
      properties:
        disbursement:
          $ref: '#/components/schemas/DisbursementDueDate'
        loan_amount:
          $ref: '#/components/schemas/LoanAmount2'
        product_id:
          $ref: '#/components/schemas/LoanProductID'
        stages:
          $ref: '#/components/schemas/LoanIntervalstages'
        start_date:
          $ref: '#/components/schemas/StartDate'
        simulation_id:
          $ref: '#/components/schemas/SimulationID'
        external_id:
          $ref: '#/components/schemas/ExternalID'
        restructured_loan_id:
          $ref: '#/components/schemas/RestructuredLoanID'
    SimulationResponseStage:
      required:
        - interest_rate
        - period
      type: object
      description: Ordered collection of stages parameters
      properties:
        interest_rate:
          $ref: '#/components/schemas/SimulationResponseStageInterestRate'
        period:
          $ref: '#/components/schemas/SimulationResponseStagePeriod'
    SimulationResponseStageInterestRate:
      required:
        - unit
        - value
      type: object
      description: Interest rate applied for stage
      properties:
        value:
          $ref: '#/components/schemas/InterestRateValue'
        unit:
          $ref: '#/components/schemas/InterestRateTimeUnit'
    SimulationResponseStagePeriod:
      required:
        - unit
        - value
      type: object
      description: Number of time periods for stage
      properties:
        value:
          $ref: '#/components/schemas/PeriodValue'
        unit:
          $ref: '#/components/schemas/PeriodTimeUnit'
    Stage:
      required:
        - interest_rate
        - period
      type: object
      description: Loan interval affected by the chosen interest rate
      properties:
        interest_rate:
          $ref: '#/components/schemas/StageInterestRate'
        period:
          $ref: '#/components/schemas/StagePeriod'
    StageInterestRate:
      required:
        - unit
        - value
      type: object
      description: Interest rate applied in the stage
      properties:
        value:
          $ref: '#/components/schemas/InterestRateValue'
        unit:
          $ref: '#/components/schemas/InterestRateTimeUnit'
    StagePeriod:
      required:
        - value
      type: object
      description: Number of time periods for the stage
      properties:
        value:
          $ref: '#/components/schemas/PeriodValue'
    ErrorCode:
      type: string
      description: Lending error code
      example: ELND0001
    ErrorMessage:
      type: string
      example: Unexpected error
      description: Lending error message
    AuthorizationResponseCode:
      type: string
      description: Payment Methods - Response Code
      example: '62'
      minLength: 2
      maxLength: 2
    AuthorizationDenialCode:
      type: string
      description: Payment Methods - Denial Code
      example: IAD
      minLength: 3
      maxLength: 5
    StandardErrorResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          $ref: '#/components/schemas/ErrorMessage'
    StandardAuthorizationErrorResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          $ref: '#/components/schemas/ErrorMessage'
        response_code:
          $ref: '#/components/schemas/AuthorizationResponseCode'
        denial_code:
          $ref: '#/components/schemas/AuthorizationDenialCode'
    StartDate:
      type: string
      description: Loan start date. Format = YYYY-MM-DD.
      format: date
      example: '2022-06-28'
    TaxAmount:
      type: number
      format: double
      example: 10
      description: Tax amount
    TotalAmount:
      type: number
      format: double
      example: 2072
      description: Total amount
    TotalExpectedPaymentAmount:
      type: number
      format: double
      description: >-
        Total expected payment amount for the loan including principal,
        interest, fees, and penalty (if applied)
      example: 1100
    TotalPayable:
      type: object
      properties:
        principal:
          $ref: '#/components/schemas/PrincipalAmount'
        interest:
          $ref: '#/components/schemas/InterestAmount'
        fee:
          $ref: '#/components/schemas/FeeAmount'
        tax:
          $ref: '#/components/schemas/TaxAmount'
        charge:
          $ref: '#/components/schemas/ChargeAmount'
        penalty:
          $ref: '#/components/schemas/PenaltyAmount'
        total:
          $ref: '#/components/schemas/TotalAmount'
        amount_due:
          type: object
          properties:
            principal:
              $ref: '#/components/schemas/PrincipalAmount'
            interest:
              $ref: '#/components/schemas/InterestAmount'
            fee:
              $ref: '#/components/schemas/FeeAmount'
            tax:
              $ref: '#/components/schemas/TaxAmount'
            charge:
              $ref: '#/components/schemas/ChargeAmount'
            penalty:
              $ref: '#/components/schemas/PenaltyAmount'
            total:
              $ref: '#/components/schemas/TotalAmount'
        arrears:
          type: object
          properties:
            principal:
              $ref: '#/components/schemas/PrincipalAmount'
            interest:
              $ref: '#/components/schemas/InterestAmount'
            fee:
              $ref: '#/components/schemas/FeeAmount'
            tax:
              $ref: '#/components/schemas/TaxAmount'
            charge:
              $ref: '#/components/schemas/ChargeAmount'
            penalty:
              $ref: '#/components/schemas/PenaltyAmount'
            total:
              $ref: '#/components/schemas/TotalAmount'
    TotalPaymentAmount:
      type: number
      format: double
      description: Total amount applicant is required to pay
      example: 1100
    TotalToSettle:
      type: number
      format: double
      example: 100.9
      description: Total to settle the loan
    TransactionsID:
      type: array
      description: List of transactions IDs
      items:
        type: string
        description: Transaction ID
        example: c04fd22b-7d9c-4099-aaf4-9ee002b5a6a7
    ValueOfCharge:
      type: number
      format: double
      description: Percentage value of the charge
      minimum: 0
      maximum: 100
      example: 10.15
    WaivePenalty:
      type: boolean
      description: Waive penalty?
      example: false
      default: false
    PrepaymentV2Request:
      required:
        - repayment_ids
      type: object
      properties:
        repayment_ids:
          $ref: '#/components/schemas/PrepaymentRepaymentDetails'
        expiration_date:
          $ref: '#/components/schemas/ExpirationDate'
        reference_date:
          $ref: '#/components/schemas/ReferenceDate'
        metadata:
          $ref: '#/components/schemas/PrepaymentMetadata'
    PrepaymentMetadata:
      type: object
      description: Additional prepayment information
      additionalProperties:
        type: string
        description: Additional property
    PrepaymentV2Response:
      type: object
      description: Prepayment response
      properties:
        prepayment_id:
          type: string
          format: uuid
          example: c04fd22b-7d9c-4099-aaf4-9ee002b5a6a7
          description: Prepayment ID
        expected_amount_to_be_paid:
          type: number
          format: double
          example: 100
          description: Expected amount to be paid
    PrepaymentRepaymentDetails:
      type: array
      description: A list of repayments to be paid in the current prepayment
      items:
        type: string
        description: Repayments to be paid
      example:
        - c04fd22b-7d9c-4099-aaf4-9ee002b5a6a7
        - jdu55ks2-7d9c-4099-aaf4-9ee002tkl554
    ExpirationDate:
      type: string
      description: Expiration date of the prepayment. Format = YYYY-MM-DD.
      format: date
      example: '2025-04-28'
    ReferenceDate:
      type: string
      description: Reference date of the installment. Format = YYYY-MM-DD.
      format: date
      example: '2025-04-14'
    UpdateLoanProductV2Request:
      type: object
      description: >-
        Request body for updating a loan product. Only provided fields will be
        updated.
      properties:
        product_name:
          $ref: '#/components/schemas/ProductName'
        loan_activation_method:
          $ref: '#/components/schemas/LoanProductLoanActivationMethod'
        disbursement_method:
          $ref: '#/components/schemas/LoanProductV2DisbursementMethod'
        parameters:
          $ref: '#/components/schemas/LoanProductV2Parameters'
        interest_plan_ids:
          $ref: '#/components/schemas/InterestPlanIDs'
        processing_codes:
          $ref: '#/components/schemas/UpdateProcessingCodes'
    UpdateProcessingCodes:
      type: object
      description: Processing codes to update. Only provided fields will be updated.
      properties:
        booking:
          type: array
          description: Booking processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        repayment:
          type: array
          description: Repayment processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        present_value_discount:
          type: array
          description: Present value discount processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        penalty_accruals:
          type: array
          description: Penalty accruals processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        penalty_waiver:
          type: array
          description: Penalty waiver processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        restructuring:
          type: array
          description: Restructuring processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        insurance:
          $ref: '#/components/schemas/InsurancePC'
        disbursement:
          $ref: '#/components/schemas/DisbursementPC'
        prepayment:
          $ref: '#/components/schemas/PrepaymentPC'
        early_final_settlement:
          $ref: '#/components/schemas/EfsPC'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
security:
  - BearerAuth: []
paths:
  /v1/loan-products:
    post:
      tags:
        - Loan products
      summary: Create loan product
      description: Create a loan product.
      operationId: createLoanProduct
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        description: Request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoanProductRequest'
        required: true
      responses:
        '201':
          description: Loan Product created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanProductPostResponse'
        '202':
          description: Duplicated request identified by Idempotency key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND1501:
                  value:
                    code: ELND1501
                    message: idempotency-key is already in use
        '400':
          description: A validation error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0121:
                  value:
                    code: ELND0121
                    message: >-
                      Field repayment_due must be one of [BEGINNING_OF_PERIOD,
                      END_OF_PERIOD]
                ELND0300:
                  value:
                    code: ELND0300
                    message: The number of stages must be between 1 and 5
                ELND0301:
                  value:
                    code: ELND0301
                    message: Field stages must have a collectable stage at the end
                ELND0302:
                  value:
                    code: ELND0302
                    message: Field early_final_settlement.penalty_rate not passed
                ELND0303:
                  value:
                    code: ELND0303
                    message: >-
                      Field early_final_settlement.penalty_rate must be defined
                      between 0 or 1, ex: 0.5
                ELND0304:
                  value:
                    code: ELND0304
                    message: >-
                      Field early_final_settlement.number_of_periods must be
                      equal to or greater than 0
                ELND0305:
                  value:
                    code: ELND0305
                    message: >-
                      Field early_final_settlement.lock_in_period must be equal
                      to or greater than 0
                ELND0306:
                  value:
                    code: ELND0306
                    message: Field prepayment.penalty_rate not passed
                ELND0307:
                  value:
                    code: ELND0307
                    message: >-
                      Field prepayment.penalty_rate must be defined between 0 or
                      1, ex: 0.5
                ELND0308:
                  value:
                    code: ELND0308
                    message: >-
                      Field prepayment.number_of_periods must be equal to or
                      greater than 0
                ELND0309:
                  value:
                    code: ELND0309
                    message: >-
                      Field prepayment.lock_in_period must be equal to or
                      greater than 0
                ELND0310:
                  value:
                    code: ELND0310
                    message: Field prepayment.reduce_option not passed
                ELND0311:
                  value:
                    code: ELND0311
                    message: The number of charge plan codes must be between 1 and 20
                ELND0312:
                  value:
                    code: ELND0312
                    message: >-
                      Field repayment_hierarchy_code length must be lower or
                      equal to 32
                ELND0313:
                  value:
                    code: ELND0313
                    message: The number of penalty plan codes must be between 1 and 20
                ELND0314:
                  value:
                    code: ELND0314
                    message: >-
                      Field loan_activation_method must be one of [ON_BOOK,
                      ON_DISBURSE, ON_REPAY, ON_DISBURSE_OR_REPAY]
                ELND0317:
                  value:
