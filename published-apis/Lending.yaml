openapi: 3.1.0
info:
  title: Lending
  description: Lending applications
  version: 1.0.0
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/lending
    description: Sandbox API server for testing
tags:
  - name: Loan products
    description: Creates and manages loan product features
  - name: Charge plans
    description: Creates the charge plan management features
  - name: Simulations
    description: Performs stateless simulations for loan bookings
  - name: Loans
    description: Creates the core loan management features
  - name: Disbursements
    description: Creates the disbursement management features
  - name: Repayments
    description: Creates repayment management features
  - name: Early final settlement
    description: Creates early final settlement management features
  - name: Prepayment
    description: Manages loan prepayment
  - name: Repayment hierarchy
    description: Creates the repayment hierarchy and manages features
  - name: Penalty plans
    description: Manages penalty plans
  - name: Program configurations
    description: Manages program configurations
  - name: Entity limits
    description: Manages entity limits
components:
  parameters:
    ChargePlanCodePath:
      name: code
      in: path
      description: Charge plan code
      required: true
      schema:
        type: string
      example: TAC
    DeleteRepaymentPlanHierarchyCodePath:
      name: code
      in: path
      description: Repayment plan hierarchy code
      required: true
      schema:
        type: string
      example: CR005
    EfsIdPath:
      name: efsId
      in: path
      description: Early final settlement simulation ID
      required: true
      schema:
        type: string
        format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    EntityLimitIdPath:
      name: entityId
      in: path
      description: Entity limit ID
      required: true
      schema:
        type: integer
        format: int64
      example: 32434
    PenaltyPlanCodePath:
      name: code
      in: path
      description: Penalty plan code
      required: true
      schema:
        type: string
      example: pp-0001
    ProgramIdPath:
      name: programId
      in: path
      description: Program configuration ID
      required: true
      schema:
        type: integer
        format: int64
      example: 123
    ExpandQuery:
      name: expand
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: Also retrieve disbursements and repayments?
      example: true
    FilterQuery:
      name: filter
      in: query
      required: true
      description: >-
        By default, all entities are returned, but you can filter for either
        `ENABLED` or `DISABLED` entities. `DELETED` entities cannot be
        recovered.
      schema:
        $ref: '#/components/schemas/DefaultEntityFilter'
    IdempotencyKeyHeader:
      name: idempotency-key
      description: Idempotency key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    RequiredIdempotencyKeyHeader:
      name: Idempotency-Key
      description: Idempotency key
      in: header
      required: true
      schema:
        type: string
        format: uuid
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    LoanIdPath:
      name: loanId
      description: Loan ID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    LoanSimulationIdPath:
      name: loanSimulationId
      in: path
      description: Loan simulation ID
      required: true
      schema:
        type: string
      example: 658f9819-2321-4852-9632-6ajn3nahjdj6d
    PresentValueQuery:
      name: presentValue
      in: query
      description: Retrieve the present value of the loan?
      required: false
      schema:
        $ref: '#/components/schemas/BooleanValue'
      example: true
    ReferenceDateQuery:
      name: referenceDate
      in: query
      description: Reference date to calculate the present value of the loan
      required: false
      schema:
        $ref: '#/components/schemas/DateValue'
      example: '2024-06-01'
    PagingQuery:
      name: paging
      in: query
      description: Cursor-based paging with a maximum returned limit
      required: true
      schema:
        type: object
        properties:
          next_cursor:
            $ref: '#/components/schemas/NextCursor'
          limit:
            $ref: '#/components/schemas/Limit'
    PrepaymentIdPath:
      name: prepaymentId
      in: path
      description: Prepayment simulation ID
      required: true
      schema:
        type: string
        format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    ProductIdPath:
      name: productId
      in: path
      description: Loan product ID
      required: true
      schema:
        type: string
        description: Loan product ID
      example: 99999999-9999-9999-9999-999999999999
    QueryFiltersQuery:
      name: queryFilters
      in: query
      description: Filters related to loan product fields
      schema:
        $ref: '#/components/schemas/LoanProductFilterRequest'
    RepaymentHierarchyCodePath:
      name: code
      in: path
      description: >-
        Loan repayment hierarchy code. The repayment hierarchy determines the
        order in which payments are processed. The code must be unique but does
        not have to be a UUID.
      required: true
      schema:
        type: string
      example: CR008
  schemas:
    AccountDigit:
      type: string
      description: Account digit. Required when account type is `EXTERNAL`.
      example: '06'
    AccountExternalID:
      type: string
      description: External ID. Required when account type is `EXTERNAL`.
      example: 89419431dfdfg
    AccountID:
      type: integer
      format: int64
      description: Account ID
      example: 514751581
    AccountNumber:
      type: string
      description: Account number. Required when account type is `EXTERNAL`.
      example: '8494156'
    AlreadySimulatedBookingPostRequest:
      required:
        - account_id
        - loan_simulation_id
      type: object
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        loan_simulation_id:
          $ref: '#/components/schemas/LoanSimulationID'
        loan_id:
          $ref: '#/components/schemas/LoanID'
        external_id:
          $ref: '#/components/schemas/ExternalID'
    AmountPaid:
      minimum: 0
      type: number
      format: double
      example: 1000
      description: Prepayment amount
    ApplyWhen:
      minItems: 1
      uniqueItems: true
      type: array
      description: Collection of penalty plan 'apply when' options
      items:
        type: string
        enum:
          - PAST_DUE
          - PARTIALLY_PAID
      example:
        - PAST_DUE
        - PARTIALLY_PAID
    Balance:
      description: Balance details for a loan
      properties:
        principal:
          $ref: '#/components/schemas/PrincipalAmount'
        interest:
          $ref: '#/components/schemas/InterestAmount'
        fee:
          $ref: '#/components/schemas/FeeAmount'
        tax:
          $ref: '#/components/schemas/TaxAmount'
        charge:
          $ref: '#/components/schemas/ChargeAmount'
        penalty:
          $ref: '#/components/schemas/PenaltyAmount'
        total:
          $ref: '#/components/schemas/TotalAmount'
    BankID:
      type: string
      description: Bank ID. Required when account type is `EXTERNAL`.
      example: '785'
    BaseRuleBigDecimal:
      required:
        - unit
        - value
      type: object
      description: Maximum value
      properties:
        value:
          $ref: '#/components/schemas/RuleValue'
        unit:
          $ref: '#/components/schemas/RuleUnit'
    BaseRuleInteger:
      required:
        - unit
        - value
      type: object
      description: Maximum value
      properties:
        value:
          $ref: '#/components/schemas/RuleValue'
        unit:
          $ref: '#/components/schemas/RuleUnit'
    BookingResponse:
      required:
        - loan_id
      type: object
      properties:
        loan_id:
          $ref: '#/components/schemas/ResponseLoanID'
    BranchDigit:
      type: string
      description: Branch digit. Required when account type is `EXTERNAL`.
      example: '01'
    BranchNumber:
      type: string
      description: Branch number. Required when account type is `EXTERNAL`.
      example: '89198'
    CalculationPenalty:
      type: number
      example: 100
      format: double
      description: Calculation penalty early settlement
    CancellationResponse:
      required:
        - loan_id
      type: object
      properties:
        error_code:
          type: string
          description: Error code
          example: '1020030'
        message:
          type: string
          description: Error message
          example: Error message
        loan_id:
          $ref: '#/components/schemas/ResponseLoanID'
    ChargeAmount:
      type: number
      example: 5
      format: double
      description: Charge amount
    IdempotencyKey:
      type: string
      description: Idempotency key
      format: uuid
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    AuthorizationId:
      type: number
      description: Authorization ID
      format: int64
      example: 123456789
    AuthorizationTrackingId:
      type: string
      description: Authorization tracking ID
      format: uuid
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    ChargePlanCode:
      maxLength: 32
      type: string
      description: Charge plan code
      example: cp-0001
    ChargePlanFixedAmount:
      required:
        - value
      type: object
      properties:
        value:
          type: number
          format: double
          description: Fixed charge
          example: 20
    ChargePlanFixedAmountRequest:
      required:
        - code
        - collection_method
        - name
        - type
        - currency
        - fixed_amount
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ChargePlanName'
        type:
          $ref: '#/components/schemas/ChargePlanType'
        collection_method:
          $ref: '#/components/schemas/CollectionMethod'
        code:
          $ref: '#/components/schemas/ChargePlanCode'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        fixed_amount:
          $ref: '#/components/schemas/ChargePlanFixedAmount'
    RepayV2:
      type: object
      properties:
        repayment_id:
          $ref: '#/components/schemas/RepaymentID'
        repayment_amount:
          $ref: '#/components/schemas/RepaymentAmount'
        repayment_date:
          $ref: '#/components/schemas/RepaymentDate'
        reference_date:
          $ref: '#/components/schemas/ReferenceDate'
        metadata:
          $ref: '#/components/schemas/RepaymentMetadata'
      required:
        - repayment_id
    RepaymentMetadata:
      type: object
      description: Additional repayment information
      additionalProperties:
        type: string
        description: Additional property
    RepayV2Result:
      type: object
      properties:
        authorization_id:
          $ref: '#/components/schemas/AuthorizationId'
        repaid_amount:
          $ref: '#/components/schemas/RepaidAmount'
        installment_amount:
          $ref: '#/components/schemas/InstallmentAmount'
        insurance_installment_amount:
          $ref: '#/components/schemas/InsuranceInstallmentAmount'
    ChargePlanFixedAmountResponse:
      required:
        - code
        - collectionMethod
        - name
        - status
        - type
        - currency
      type: object
      description: Found charge plans
      properties:
        name:
          $ref: '#/components/schemas/ChargePlanName'
        code:
          $ref: '#/components/schemas/ChargePlanCode'
        type:
          $ref: '#/components/schemas/ChargePlanType'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        fixed_amount:
          $ref: '#/components/schemas/FixedAmount'
        collection_method:
          $ref: '#/components/schemas/CollectionMethod'
        status:
          $ref: '#/components/schemas/ChargePlanStatus'
    ChargePlanName:
      type: string
      description: Charge plan name
      example: charge-plan-ng522
      maxLength: 80
    ChargePlanCodes:
      type: array
      maxItems: 20
      minItems: 1
      uniqueItems: true
      description: Ordered collection of charge plan codes
      items:
        maxLength: 20
        type: string
        description: Charge plan codes
        example: '["cp-001","cp-002"]'
    ChargePlanPercentage:
      required:
        - value
      type: object
      properties:
        value:
          $ref: '#/components/schemas/ValueOfCharge'
        min_charged_amount:
          $ref: '#/components/schemas/MinChargedAmount'
        max_charged_amount:
          $ref: '#/components/schemas/MaxChargedAmount'
    ChargePlanPercentageRequest:
      required:
        - code
        - collection_method
        - name
        - type
        - currency
        - percentage
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ChargePlanName'
        type:
          $ref: '#/components/schemas/ChargePlanType'
        collection_method:
          $ref: '#/components/schemas/CollectionMethod'
        code:
          $ref: '#/components/schemas/ChargePlanCode'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        percentage:
          $ref: '#/components/schemas/ChargePlanPercentage'
    ChargePlanPercentageResponse:
      required:
        - code
        - collectionMethod
        - name
        - status
        - type
        - currency
      type: object
      description: Found charge plans
      properties:
        name:
          $ref: '#/components/schemas/ChargePlanName'
        code:
          $ref: '#/components/schemas/ChargePlanCode'
        type:
          $ref: '#/components/schemas/ChargePlanType'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        percentage:
          $ref: '#/components/schemas/ChargePlanPercentage'
        collection_method:
          $ref: '#/components/schemas/CollectionMethod'
        status:
          $ref: '#/components/schemas/ChargePlanStatus'
    ChargePlansResponse:
      required:
        - has_next
        - next_cursor
      type: object
      properties:
        next_cursor:
          $ref: '#/components/schemas/NextCursor'
        has_next:
          $ref: '#/components/schemas/HasNext'
        items:
          type: array
          description: Found charge plans
          items:
            anyOf:
              - $ref: '#/components/schemas/ChargePlanFixedAmountResponse'
              - $ref: '#/components/schemas/ChargePlanPercentageResponse'
    ChargePlanStatus:
      type: string
      description: Charge plan status
      example: ENABLED
      enum:
        - ENABLED
        - DISABLED
        - DELETED
    ChargePlanType:
      type: string
      description: Charge plan type
      example: FEE
      enum:
        - FEE
        - TAX
        - CHARGE
    Collateral:
      type: string
      description: Collateral
      example: SINGLE
      enum:
        - NONE
        - SINGLE
        - COLLATERAL_MULTIPLE
    LoanProductLoanActivationMethod:
      type: string
      description: >-
        Indicate when the system changes a loan to active status. Default is
        `ON_DISBURSEMENT_OR_REPAYMENT`. If disbursement method type is `NONE`,
        you cannot set to `ON_DISBURSEMENT`, and if set to
        `ON_DISBURSEMENT_OR_REPAYMENT` the system changes the loan status on
        repayment.
      example: ON_BOOKING
      enum:
        - ON_BOOKING
        - ON_DISBURSEMENT
        - ON_DISBURSEMENT_OR_REPAYMENT
        - ON_REPAYMENT
    CollectionMethod:
      type: string
      description: Charge plan collection method
      example: DEDUCT
      enum:
        - DEDUCT
        - UPFRONT
        - AMORTISED
        - DEBIT
    CreateEntityLimitRequest:
      required:
        - entity_id
        - max_credit_limit_amount
        - max_credit_limit_currency
      type: object
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
        max_credit_limit_amount:
          $ref: '#/components/schemas/MaxCreditLimitAmount'
        max_credit_limit_currency:
          $ref: '#/components/schemas/MaxCreditLimitCurrency'
    CreateEntityLimitResponse:
      required:
        - entity_id
        - max_credit_limit_amount
        - max_credit_limit_currency
        - created_at
        - creation_cid
      type: object
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
        max_credit_limit_amount:
          $ref: '#/components/schemas/MaxCreditLimitAmount'
        max_credit_limit_currency:
          $ref: '#/components/schemas/MaxCreditLimitCurrency'
        created_at:
          $ref: '#/components/schemas/EntityLimitCreatedAt'
        creation_cid:
          $ref: '#/components/schemas/CreationCid'
    CreateLoanProductRequest:
      required:
        - collateral
        - currency
        - days_in_year_method
        - disbursement
        - interest_type
        - loan_type
        - product_name
        - product_type
        - repayment_calculation_method
        - repayment_frequency
        - stages
        - program_id
      type: object
      properties:
        program_id:
          $ref: '#/components/schemas/ProgramID'
        collateral:
          $ref: '#/components/schemas/Collateral'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        days_in_year_method:
          $ref: '#/components/schemas/DaysInYearMethod'
        disbursement:
          $ref: '#/components/schemas/LoanProductV2DisbursementMethod'
        interest_type:
          $ref: '#/components/schemas/InterestType'
        loan_type:
          $ref: '#/components/schemas/LoanType'
        product_name:
          $ref: '#/components/schemas/ProductName'
        product_type:
          $ref: '#/components/schemas/ProductType'
        product_id:
          $ref: '#/components/schemas/LoanProductID'
        repayment_calculation_method:
          $ref: '#/components/schemas/RepaymentCalculationMethod'
        repayment_frequency:
          $ref: '#/components/schemas/LoanProductPaymentFrequency'
        stages:
          $ref: '#/components/schemas/LoanProductStages'
        interest_collection:
          $ref: '#/components/schemas/InterestCollectionTypeEnum'
        loan_activation_method:
          $ref: '#/components/schemas/LoanActivationMethodEnum'
        charge_plan_codes:
          $ref: '#/components/schemas/ChargePlanCodes'
        penalty_plan_codes:
          $ref: '#/components/schemas/ProductPenaltyPlanCodes'
        rules:
          $ref: '#/components/schemas/LoanProductRuleList'
        repayment_due:
          $ref: '#/components/schemas/RepaymentDue'
        early_final_settlement:
          $ref: '#/components/schemas/LoanProductEFS'
        repayment_hierarchy_code:
          $ref: '#/components/schemas/RepaymentHierarchyCode'
        prepayment:
          $ref: '#/components/schemas/LoanProductPrepayment'
    CreateLoanProductV2Request:
      required:
        - collateral
        - currency
        - disbursement_method
        - product_name
        - program_id
        - product_type
        - processing_codes
      type: object
      properties:
        program_id:
          $ref: '#/components/schemas/ProgramID'
        product_type:
          $ref: '#/components/schemas/ProductTypeV2'
        collateral:
          $ref: '#/components/schemas/Collateral'
        loan_activation_method:
          $ref: '#/components/schemas/LoanProductLoanActivationMethod'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        disbursement_method:
          $ref: '#/components/schemas/LoanProductV2DisbursementMethod'
        product_name:
          $ref: '#/components/schemas/ProductName'
        product_id:
          $ref: '#/components/schemas/LoanProductID'
        processing_codes:
          $ref: '#/components/schemas/ProcessingCodes'
        repayment_calculation_method:
          $ref: '#/components/schemas/RepaymentCalculationMethodV2'
        interest_plan_ids:
          $ref: '#/components/schemas/InterestPlanIDs'
        early_final_settlement:
          $ref: '#/components/schemas/LoanProductEFS'
        prepayment:
          $ref: '#/components/schemas/LoanProductPrepayment'
        repayment_hierarchy_code:
          $ref: '#/components/schemas/RepaymentHierarchyCodeV2'
        parameters:
          $ref: '#/components/schemas/LoanProductV2Parameters'
    CreateAdjustmentV2Request:
      required:
        - adjustment_amount
        - loan_balance_impact
        - processing_code
        - program_id
        - repayment_id
      type: object
      properties:
        adjustment_amount:
          $ref: '#/components/schemas/AdjustmentAmount'
        loan_balance_impact:
          $ref: '#/components/schemas/LoanBalanceImpact'
        processing_code:
          type: string
          description: Processing code for the adjustment
        program_id:
          $ref: '#/components/schemas/ProgramID'
        repayment_id:
          $ref: '#/components/schemas/RepaymentID'
    AdjustmentPostResponse:
      required:
        - idempotency_key
        - authorization_id
      type: object
      properties:
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
        authorization_id:
          $ref: '#/components/schemas/AuthorizationId'
    ProcessingCode:
      type: string
      description: Processing code
      example: '000011'
      minLength: 2
      maxLength: 6
    ProcessingCodes:
      type: object
      description: Define processing codes for each operation during the loan lifecycle.
      properties:
        booking:
          type: array
          description: List of booking processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
        repayment:
          type: array
          description: Repayment processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
        present_value_discount:
          type: array
          description: Present value discount processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
        penalty_accruals:
          type: array
          description: Penalty accruals processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
        penalty_waiver:
          type: array
          description: Penalty waiver processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
        restructuring:
          type: array
          description: Restructuring processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
        insurance:
          $ref: '#/components/schemas/InsurancePC'
        disbursement:
          $ref: '#/components/schemas/DisbursementPC'
        prepayment:
          $ref: '#/components/schemas/PrepaymentPC'
        early_final_settlement:
          $ref: '#/components/schemas/EfsPC'
    InsurancePC:
      type: object
      description: Define processing codes for insurance operations.
      properties:
        booking:
          type: array
          description: Booking processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
        repayment:
          type: array
          description: Repayment processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
    DisbursementPC:
      type: object
      description: Define processing codes for disbursement operations.
      properties:
        internal:
          type: array
          description: Processing code for internal account
          items:
            $ref: '#/components/schemas/ProcessingCode'
        external:
          type: array
          description: Processing code for external account
          items:
            $ref: '#/components/schemas/ProcessingCode'
    PrepaymentPC:
      type: object
      description: Define processing codes for prepayment operations.
      properties:
        fee:
          type: array
          description: Fee processing code for prepayment
          items:
            $ref: '#/components/schemas/ProcessingCode'
    EfsPC:
      type: object
      description: Define processing codes for early final settlement (EFS) operations.
      properties:
        fee:
          type: array
          description: Fee processing code for early final settlement
          items:
            $ref: '#/components/schemas/ProcessingCode'
    CreationCid:
      type: string
      description: x-cid used to create the entity limit
      format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    CurrencyCode:
      type: integer
      description: ISO 4217 currency code
      format: int32
      minimum: 0
      maximum: 999
      example: 999
    CurrentLimitAmount:
      type: number
      format: double
      description: Current limit amount of `entity_id`
      example: 1000
    DaysInYearMethod:
      type: string
      description: Day-count convention
      example: US_30_360
      enum:
        - US_30_360
    DefaultEntityFilter:
      type: object
      properties:
        status:
          type: string
          description: Entity status
          example: ENABLED
          enum:
            - ENABLED
            - DISABLED
    DisbursementAmount:
      type: number
      format: double
      description: Disbursement amount
      example: 1000
    AdjustmentAmount:
      type: number
      format: double
      description: Amount of the adjustment
      example: 1000
    LoanBalanceImpact:
      type: string
      description: Loan balance impact
      example: PRINCIPAL
      enum:
        - PRINCIPAL
        - INTEREST
        - TAX
        - PENALTY
    DisbursementDate:
      type: string
      description: Disbursement date. Format = YYYY-MM-DD.
      format: date
      example: '2022-06-30'
    Disbursement:
      required:
        - due_date
      type: object
      description: Disbursement due date
      properties:
        due_date:
