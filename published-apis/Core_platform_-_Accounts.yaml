      type: string
      description: >

        This field is **DEPRECATED**. 


        Name to be printed on the card. 


        Punctuation, special characters, and connectors (da/das/de/do/dos/e) are
        always removed. 


        This field's maximum length is 25, but you can set it to a lower value
        at the program level with the `Max name length on physical card` program
        parameter.


        If `printed_name` is null, the Pismo platform uses `social_name`. If
        `social_name` is null, the Pismo platform uses the customer's entity
        name. For more information on the customer object, refer to [Core
        objects](doc:setup-overview#customer).


        The Pismo platform gets the name for program parameter `TAMANHO MAX NOME
        EMBOSSADO` (max size name embossed).
      maxLength: 25
      deprecated: true
      example: Jack Williams
    PrintedName2:
      type: string
      description: >

        This field is **DEPRECATED**. Cards is now responsible for this field.


        Name to be printed on the card. **REQUIRED** if `name` and `social_name`
        are not provided.


        Punctuation, special characters, and connectors (da/das/de/do/dos/e) are
        always removed. 


        This field's maximum length is 25, but you can set it to a lower value
        at the program level with the `Max name length on physical card` program
        parameter.
      maxLength: 25
      deprecated: true
      example: John Doe
    PrintedName3:
      type: string
      description: >

        This field is **DEPRECATED**. Cards is now responsible for this field.


        Person's name to be printed on the card. If the field is null, `name` or
        `social_name` is used.


        Punctuation, special characters, and connectors (da/das/de/do/dos/e) are
        always removed. 


        This field's maximum lengh of this field is 25, but you can set it to a
        lower value on the program level with the `Max name length on physical
        card` program parameter.
      example: Luce Lyons
      deprecated: true
      maxLength: 25
