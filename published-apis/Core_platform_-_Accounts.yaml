                    name: NORMAL
                    description: Active account with all operations available.
                    state: ACTIVE
                    is_final: false
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                Invalid payload:
                  value:
