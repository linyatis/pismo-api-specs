        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusCreate'
            examples:
              Required payload:
                value:
                  name: NORMAL
                  allowed_operations: ALL_OPERATIONS
              Full payload:
                value:
                  name: NORMAL
                  description: Active account with all operations available.
                  is_final: false
                  allowed_operations: ALL_OPERATIONS
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              examples:
