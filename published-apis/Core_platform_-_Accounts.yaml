x-readme:
  explorer-enabled: true
  proxy-enabled: true
  samples-enabled: true
paths:
  /acquisitions/v3/s2s/applications:
    post:
      operationId: post-acquisitions-v3-s2s-applications
      summary: Create account application
      description: >
        Create a new account application. 


        If `submit` is set to `false`:


        - The application is not sent for processing and can be further
        modified  with incremental changes via [Update account
        application](ref:patch-acquisitions-v2-s2s-applications). 


        - This endpoint generates an [Account application prospect
        created](https://developers.pismo.io/events/docs/onboarding-prospect-1)
        event.


        If `submit` flag is set to `true`:


        - No further updates can be made and the account application is sent out
        for processing, which creates an account and its associated structures.


        - This endpoint generates an [Account application
        created](https://developers.pismo.io/events/docs/onboarding-succeeded-1)
        event.



        **Warning**&mdash;Some of the account's elements are created
        asynchronously and you should refrain from accessing the account via
        other endpoints until the events this endpoint generates are received. 


        **Notes:** 
          * Either the `personal` object or `company` object is **REQUIRED**. Pass one or the other but not both.
          * This endpoint creates a default `entity` object for the account owner based on document ID.

        Refer to the [Core objects](doc:setup-overview) and the
        [Accounts](doc:accounts-overview) guides for more information.
      tags:
        - Accounts
      parameters: []
      requestBody:
        description: Application details
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - application
              properties:
                application:
                  $ref: '#/components/schemas/AcquisitionRequestV3'
            examples:
              Application form:
                value:
                  application:
                    submit: true
                    due_date: 4638
                    program_id: 1226
                    applicant:
                      document_number: 695-32-3317
                      birth_date: '1980-01-31'
                      account:
                        external_id: de84c0b2-6d9e-49b3-ae97-acbd9944f62a
                        currency_numeric_code: '986'
                        account_type: PHYSICAL
