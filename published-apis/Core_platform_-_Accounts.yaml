                        allowed_operations: ALL_OPERATIONS
                        state: ACTIVE
                      - reason_id: 2
                        name: Active
                        description: Default active reason for an account.
                        allowed_operations: CREDIT_ONLY
                        state: ACTIVE
                      - reason_id: 3
                        name: Judicial block
