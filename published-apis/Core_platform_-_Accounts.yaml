    ApplicationForm:
      type: object
      description: >
        Key/value field that contains all fields from the application form.

        This data can be used to verify the application form during onboarding.
        It should not be used to obtain data after the account is approved.

        After the final status of the application form (such as `APPROVED` or
        `CANCELLED`), this data is kept as read-only and is not updated.
      example:
        id: 1234
        submit: true
        applicant:
          entity:
            name: John Doe
            entity_type: PERSON
            document_number: '31384509038'
          account:
            email: johndoe@test.com
            limit: 50000
          customer:
            nickname: John
            social_name: John Doe
            printed_name: John Doe
