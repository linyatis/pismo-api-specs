  /accounts/v2/customers:
    post:
      operationId: customerV2Post
      summary: Create customer
      description: >
        Create a new account customer.


        There are 3 customer types you can create with this endpoint: a
        `company` customer, a `person` customer, or a person customer with less
        informational fields (`customer` object).


        Each account contains at least one customer. You can add multiple
        customers to an account but only one can be the account owner. Other
        customers can have their own individual cards, but the balances on those
        cards must be shared with the account owner.


        This endpoint generates a [Customer
        created](https://developers.pismo.io/events/docs/account-customer-creation-1)
        event.


        If the `customer.is_owner` property is set to `true`:


        * The account owner is changed to this new customer, and all existing
        customers remain active in the account.

        * This endpoint generates an [Account owner
        changed](https://developers.pismo.io/events/docs/account-account-owner-change-1)
        event.


        If the `customer.is_active` = `true`, and the `Maximum number of card
        holders` program parameter is set, this customer is counted in the limit
        of maximum number of card holders for an account.


        Each customer has an associated entity object. If one isn't passed in
        the request, a default one is created using their document number.


        Refer to the [Core objects](doc:setup-overview) guide for more
        information.
      tags:
        - Customers
      parameters: []
      requestBody:
        description: Additional customer
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerV2Request'
      responses:
        '201':
          description: Account additional registration
          content:
            application/json:
              schema:
                type: object
                oneOf:
                  - $ref: '#/components/schemas/CustomerV2Response'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                  field:
                    type: string
              examples:
                Empty is_owner:
                  value:
                    message: is_owner must not be empty
                    field: is_owner
                Inactive_owner:
                  value:
                    message: New customer owner must not be inactive
                Maximum Additional Customers:
                  value:
                    message: Exceeded maximum value of additional customers
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: >-
                      Customer with accountId=(1001) and
                      documentNumber=(01544455558) exists
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Error trying to register entity
