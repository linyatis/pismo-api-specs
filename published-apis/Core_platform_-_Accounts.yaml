openapi: 3.1.0
info:
  title: Core platform - Accounts
  version: 1.0.0
  description: API used to manage accounts domain
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io
    description: API server for testing
tags:
  - name: Accounts
    description: Endpoints to manage accounts
  - name: Account parameters
    description: Endpoints to manage account parameters
  - name: Customers
    description: Endpoints to manage customers
  - name: Addresses
    description: Endpoints to manage addresses
  - name: Entities
    description: Endpoints to manage generic entities
  - name: Phones
    description: Endpoints to manage phones
  - name: Statuses and reasons
    description: Endpoints to configure accounts, statuses, and reasons.
  - name: Transfer account
    description: Endpoints dealing with account transfer
  - name: Migration
    description: Endpoints to manage migration.
components:
  parameters:
    AccountIdPath:
      name: accountId
      in: path
      description: Account ID
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
        example: 123
    AccountPhoneActiveQuery:
      in: query
      name: active
      description: Filter results based on whether the phone is active or not.
      schema:
        type: boolean
        example: true
        enum:
          - false
          - true
    AccountPhoneTypeQuery:
      in: query
      name: type
      description: Account phone type
      schema:
        type: string
        enum:
          - RESIDENTIAL
          - MOBILE
          - COMMERCIAL
        example: RESIDENTIAL
    AccountReasonDescriptionQuery:
      in: query
      name: description
      description: Account reason description filter
      required: false
      schema:
        type: string
        example: Restrictions
    AccountStatusIdQuery:
      name: accountStatusId
      in: query
      description: Account status ID filter
      required: false
      schema:
        type: integer
        format: int64
        example: 123
        minimum: 1
    AccountStatusNameQuery:
      in: query
      name: accountStatusName
      description: >
        Account status name filter. Pre-defined account statuses include
        `DEBIT_ONLY`, `NORMAL`, `BLOCKED` and `CANCELLED`. You can create your
        own account statuses with the [Create
        status](ref:v4-post-account-status) endpoint. 
      required: false
      schema:
        type: string
        example: NORMAL
    AccountStatusNameQuery2:
      name: name
      in: query
      description: >
        Account status name filter.  Pre-defined account statuses include
        `DEBIT_ONLY`, `NORMAL`, `BLOCKED` and `CANCELLED`. You can create your
        own account statuses with the [Create
        status](ref:v4-post-account-status) endpoint. 
      required: false
      schema:
        type: string
        pattern: ^[A-Z_]+$
        example: NORMAL
    AddressActiveQuery:
      name: active
      in: query
      description: Is address active?
      schema:
        type: boolean
        example: true
        enum:
          - false
          - true
    AddressActiveFilterQuery:
      name: active
      in: query
      description: Filter results based on whether the address is active or inactive.
      required: false
      schema:
        type: boolean
        example: true
        enum:
          - false
          - true
    AddressIdPath:
      name: addressId
      in: path
      description: Address ID
      required: true
      schema:
        type: integer
        format: int64
        example: 456
        minimum: 1
    ApplicationIdPath:
      name: applicationId
      in: path
      description: Application ID
      required: true
      schema:
        type: integer
        format: int64
        example: 12345
    CorrelationIdHeader:
      in: header
      name: x-cid
      schema:
        type: string
      description: >
        The Correlation IDentifier field is used to link related API requests
        and events. The `x-cid` can help the Pismo engineering team track
        everything related to a call. You can find the x-cid field in the
        response header from an API endpoint call.


        If this field isn't passed, one is automatically generated.
      example: 5bb05174-4e80-11ea-b77f-2e728ce88125
    CustomerIdPath:
      name: customerId
      in: path
      description: Customer ID
      required: true
      schema:
        type: integer
        format: int64
        example: 12345
    CustomerMigrationIdPath:
      name: customerMigrationId
      in: path
      description: Customer migration ID
      required: true
      schema:
        type: string
        example: MYCUSMIG02304
    EntityIdQuery:
      name: entityId
      in: query
      description: ID of entity associated with the customer's information
      required: false
      schema:
        type: integer
        format: int64
        example: 12345
    IsOwnerQuery:
      in: query
      name: isOwner
      description: Is customer the account owner?
      required: false
      schema:
        type: boolean
        example: false
    MaxItemsQuery:
      name: maxItems
      in: query
      description: Number of items on current page. `200` maximum. Default is `200`.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        example: 100
    MigrationIdPath:
      name: migrationId
      in: path
      description: Migration ID
      required: true
      schema:
        type: string
        example: MIG0305202304
    NextCursorQuery:
      name: nextCursor
      in: query
      description: >-
        Cursor value used to get the next page. This is the `next_cursor` value
        returned in the response.
      required: false
      schema:
        type: string
        example: MEgCQQCo9...
    OrganizationIdHeader:
      in: header
      name: x-tenant
      required: true
      description: Organization ID
      schema:
        type: string
        example: TN-34778262-f4f0-464d-b4c6-a14e2dc6f4be
    PageNumberQuery:
      in: query
      name: page
      description: Page number.
      required: false
      schema:
        type: integer
        format: int32
        default: 1
    ParameterIdPath:
      name: parameterId
      in: path
      description: >
        Parameter ID. 


        For more information on program/account parameters, refer to the
        [program parameters reference
        table](doc:program-parameters-reference-table). 


        Call the [List program parameters](ref:programparameter) endpoint to get
        the ID (`parameter_id`) to pass here. 
      required: true
      schema:
        type: integer
        format: int64
        example: 123456
    PerPageMax10Query:
      name: perPage
      in: query
      description: Items per page
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 10
        example: 10
    PerPageMax100Query:
      name: perPage
      in: query
      description: Items per page.
      required: false
      schema:
        type: integer
        format: int32
        default: 10
        minimum: 1
        maximum: 100
        example: 100
    PerPageMax200Query:
      in: query
      name: perPage
      description: Items per page
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 10
    PhoneIdPath:
      name: phoneId
      in: path
      required: true
      description: Phone ID
      schema:
        type: integer
        format: int64
        example: 456
        minimum: 1
    ProgramIdPath:
      name: programId
      in: path
      description: Program ID
      required: true
      schema:
        type: integer
        format: int64
        example: 123
        minimum: 1
    ReasonNameQuery:
      name: name
      in: query
      description: Reason name filter
      required: false
      schema:
        type: string
        example: Unblocked
    RequestedPageQuery:
      name: page
      in: query
      description: Requested page
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        example: 1
    ShowChildrenQuery:
      name: show_children
      in: query
      required: false
      description: >
        If`true`, the response lists children and grandchildren account numbers
        in the `children` array. Default is `false`.


        Refer to the [Related accounts](doc:accounts-overview#related-accounts)
        guide section for information about the parent and child relationship
        between Pismo platform accounts.
      schema:
        type: boolean
        example: true
    ShowUserQuery:
      name: showUser
      in: query
      description: Filter by "show to user" flag
      required: false
      schema:
        type: boolean
        example: false
    StateQuery:
      name: state
      in: query
      description: Filter by `ACTIVE` or `INACTIVE`. Default is `ACTIVE`.
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
    XCustomerIdHeader:
      in: header
      name: x-customer-id
      schema:
        type: integer
        format: int64
        description: Customer ID
        example: 50624
  schemas:
    AccountCountryCode:
      type: string
      description: ISO 3166 country code used by the account
      example: US
    AccountCreationDate:
      type: string
      format: date
      example: '2021-10-21'
      description: Date of account creation in ISO 8601 format (yyyy-mm-dd).
    AccountCreationDatetime:
      type: string
      format: date-time
      description: Account creation date/time in UTC. Format = yyyy-mm-dd:hr:mm:ss.
      example: '2017-07-21T17:32:28Z'
    AccountDataResponse:
      title: AccountDataResponse
      type: object
      required:
        - acquisition_id
        - document_number
        - entity_type
        - name
        - email
        - org
        - program_name
        - program_type
        - status
        - status_reason_id
        - status_reason_description
        - collections_status
        - open_due_date
        - current_cicle
        - current_balance
        - available_withdrawal_credit
        - available_monthly_credit
        - available_total_installment_credit
        - withdrawal_credit_limit
        - monthly_credit_limit
        - total_installment_credit_limit
        - total_credit_limit
        - max_credit_limit
        - available_limit
        - blocked_amount
        - postal_address_type
        - social_name
        - exchange_mode
        - customer_id
        - external_id
        - creation_date
        - program_due_date_id
        - account_id
        - account_status_date
        - program_id
        - parent_account_id
        - custom_fields
      properties:
        acquisition_id:
          $ref: '#/components/schemas/AcquisitionIdOfApplicationForm'
        document_number:
          $ref: '#/components/schemas/DocumentNumber'
        entity_type:
          $ref: '#/components/schemas/EntityType'
        name:
          $ref: '#/components/schemas/IndividualsName'
        email:
          $ref: '#/components/schemas/IndividualsEmailAddress'
        org:
          $ref: '#/components/schemas/OrganizationID'
        program_name:
          $ref: '#/components/schemas/ProgramName'
        program_type:
          $ref: '#/components/schemas/ProgramType'
        status:
          $ref: '#/components/schemas/AccountStatus'
        status_reason_id:
          $ref: '#/components/schemas/StatusReasonID'
        status_reason_description:
          $ref: '#/components/schemas/StatusReasonDescription'
        collections_status:
          $ref: '#/components/schemas/CollectionStatus'
        open_due_date:
          $ref: '#/components/schemas/OpenDueDate'
        current_cicle:
          $ref: '#/components/schemas/CurrentCycle'
        current_balance:
          $ref: '#/components/schemas/CurrentBalance'
        available_withdrawal_credit:
          $ref: '#/components/schemas/AvailableWithdrawalCredit'
        available_monthly_credit:
          $ref: '#/components/schemas/AvailableMonthlyCredit'
        available_total_installment_credit:
          $ref: '#/components/schemas/AvailableTotalInstallmentCredit'
        withdrawal_credit_limit:
          $ref: '#/components/schemas/WithdrawalCreditLimit'
        monthly_credit_limit:
          $ref: '#/components/schemas/MonthlyCreditLimit'
        total_installment_credit_limit:
          $ref: '#/components/schemas/TotalInstallmentCreditLimit'
        total_credit_limit:
          $ref: '#/components/schemas/TotalCreditLimit'
        max_credit_limit:
          $ref: '#/components/schemas/MaxCreditLimit'
        available_limit:
          $ref: '#/components/schemas/AvailableLimit'
        blocked_amount:
          $ref: '#/components/schemas/BlockedAmount'
        postal_address_type:
          $ref: '#/components/schemas/PostalAddressType'
        social_name:
          $ref: '#/components/schemas/SocialName'
        exchange_mode:
          $ref: '#/components/schemas/ExchangeMode'
        customer_id:
          $ref: '#/components/schemas/CustomerID'
        external_id:
          $ref: '#/components/schemas/AccountExternalId'
        creation_date:
          $ref: '#/components/schemas/AccountCreationDate'
        program_due_date_id:
          $ref: '#/components/schemas/ProgramDueDateID'
        account_id:
          $ref: '#/components/schemas/AccountID'
        account_status_date:
          $ref: '#/components/schemas/AccountStatusDate'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        parent_account_id:
          $ref: '#/components/schemas/ParentAccountID'
        custom_fields:
          $ref: '#/components/schemas/CustomFieldsString'
        children:
          $ref: '#/components/schemas/Children'
        account_type:
          $ref: '#/components/schemas/AccountType'
        account_name:
          $ref: '#/components/schemas/AccountName'
        division_id:
          $ref: '#/components/schemas/DivisionID'
        currency_numeric_code:
          $ref: '#/components/schemas/CurrencyNumericCode'
        is_centralizer:
          $ref: '#/components/schemas/IsCentralizer'
    AccountDueDateID:
      type: integer
      format: int64
      description: >
        Program due date ID. This field is **REQUIRED** only for Full balance
        credit programs. 


        Program due dates and their IDs are set when you [create a
        program](ref:createprogrambasedontemplate).
      example: 222
    AccountDuplicityByExternalIdError:
      title: AccountDuplicityByExternalIdError
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Message describing the error
        org_id:
          $ref: '#/components/schemas/OrganizationID'
        account_id:
          $ref: '#/components/schemas/AccountID'
        application_id:
          $ref: '#/components/schemas/ApplicationID'
        customer_id:
          $ref: '#/components/schemas/CustomerID'
        entity_id:
          $ref: '#/components/schemas/EntityID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
    AcquisitionChannelsResponse:
      type: object
      properties:
        pages:
          $ref: '#/components/schemas/NumberOfPages'
        per_page:
          $ref: '#/components/schemas/PerPage'
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        total_items:
          $ref: '#/components/schemas/TotalItems'
        items:
          type: array
          description: List of result items
          items:
            $ref: '#/components/schemas/AcquisitionChannelItemResponse'
    IndividualsEmailAddress:
      type: string
      description: Email address.
      format: email
      maxLength: 100
      example: jenna.flect@email.com
    AccountEntityResponseV4:
      type: object
      description: Account entity
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
        name:
          $ref: '#/components/schemas/IndividualsName'
        social_name:
          $ref: '#/components/schemas/SocialName'
        external_id:
          $ref: '#/components/schemas/AccountExternalId'
        ownership:
          $ref: '#/components/schemas/Ownership'
        identifications:
          $ref: '#/components/schemas/Identifications'
        emails:
          $ref: '#/components/schemas/Emails'
        phones:
          $ref: '#/components/schemas/PhoneList'
    AccountEntityResponseV5:
      type: object
      description: Account entity
      properties:
        entity_id:
          $ref: '#/components/schemas/EntityID'
        entity_external_id:
          $ref: '#/components/schemas/AccountExternalId'
    AccountExternalId:
      type: string
      description: >

        Client-created ID from an external system or application. **REQUIRED**
        for `VIRTUAL` accounts.
      maxLength: 60
      example: 8c8a4dd7-e48f-4c15-85b7-9d12f401057f
    AccountID:
      type: integer
      format: int64
      description: Account ID
      example: 1001
    AccountIdNonchecking:
      type: integer
      format: int64
      description: >-
        Created account ID. `null` if the application has not been proccessed
        yet (non-checking accounts only).
      example: 123
    AccountHoldersIdentificationValue:
      type: string
      description: Identification value
      example: '12345678901'
    AccountLastUpdate:
      type: string
      description: >-
        UTC date/time when account was last updated. Format =
        yyyy-mm-dd:hr:mm:ss.
      format: date-time
      example: '2017-07-21T17:32:28Z'
    AccountLimit:
      type: integer
      format: int64
      description: >

        Client-defined account limit. Must be between 0 and the `granted_limit`
        (aka `max_credit_limit`).


        Defaults to zero (0) if not passed. 

         This field is called  `total_credit_limit` in the [Update account limits](https://developers.pismo.io/pismo-docs/reference/patch-v1-account-limit) endpoint and the [Account limits](https://developers.pismo.io/pismo-docs/docs/working-with-limits-objects) guide.
      example: 750
    AccountMigrationID:
      type: string
      description: Account migration ID
      example: MIG0305202304
    AccountName:
      type: string
      description: Custom account's name
      maxLength: 60
      example: Account cash management
    AccountPatch:
      type: object
      description: Object to patch an account
      properties:
        custom_fields:
          $ref: '#/components/schemas/CustomFields'
        division_id:
          $ref: '#/components/schemas/DivisionID'
        account_name:
          $ref: '#/components/schemas/AccountName'
        parent_account_id:
          $ref: '#/components/schemas/ParentAccountID2'
        external_id:
          $ref: '#/components/schemas/AccountExternalId'
        centralizer:
          $ref: '#/components/schemas/IsCentralizer'
    AccountResponse:
      type: object
      description: Response object for account
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        parent_id:
          $ref: '#/components/schemas/ParentID'
        external_id:
          $ref: '#/components/schemas/AccountExternalId'
        created_datetime:
          $ref: '#/components/schemas/AccountCreationDatetime'
        updated_datetime:
          $ref: '#/components/schemas/AccountLastUpdate'
        status:
          type: object
          properties:
            status_id:
              $ref: '#/components/schemas/AccountStatusID'
            status_name:
              $ref: '#/components/schemas/AccountStatusName'
            reason_id:
              $ref: '#/components/schemas/StatusReasonID'
            reason_name:
              $ref: '#/components/schemas/StatusReasonName'
        metadata:
          $ref: '#/components/schemas/Metadata'
    AccountStatus:
      type: string
      description: >
        Account status. The pre-defined account statuses are `DEBIT_ONLY`,
        `NORMAL`, `BLOCKED`, and `CANCELLED`. You can create your own account
        statuses with the [Create status](ref:v4-post-account-status) endpoint. 
      maxLength: 200
      example: NORMAL
    AccountStatus3:
      type: string
      pattern: ^[A-Z_-]+$
      description: >
        Account status. The pre-defined account statuses are `DEBIT_ONLY`,
        `NORMAL`, `BLOCKED`, and `CANCELLED`. You can create your own account
        statuses with the [Create status](ref:v4-post-account-status) endpoint. 
      maxLength: 200
      example: NORMAL
    AccountStatus4:
      type: string
      description: >
        Account status. The pre-defined account statuses are `DEBIT_ONLY`,
        `NORMAL`, `BLOCKED`, and `CANCELLED`. You can create your own account
        statuses with the [Create status](ref:v4-post-account-status) endpoint. 
      pattern: ^[A-Z_]+$
      maxLength: 200
      example: BLOCKED
    AccountStatusDate:
      type: string
      format: date-time
      description: Account status date. Format = yyyy-mm-dd:hr:mm:ss.
      example: '2021-10-21T18:41:26.000Z'
    AccountStatusDescription:
      type: string
      description: Account status description
      maxLength: 500
      example: Full operational account
    AccountStatusGroup:
      type: string
      description: Account status group
      example: BLOCKED
    AccountStatusID:
      type: integer
      format: int64
      description: Account status ID
      example: 1234567890
    AccountStatusName:
      type: string
      description: >
        Account status name. Pre-defined account statuses include `DEBIT_ONLY`,
        `NORMAL`, `BLOCKED` and `CANCELLED`. You can create your own account
        statuses with the [Create status](ref:v4-post-account-status) endpoint. 
      maxLength: 200
      example: NORMAL
    AccountStatusName2:
      type: string
      description: >
        Account status name. Pre-defined account statuses include `DEBIT_ONLY`,
        `NORMAL`, `BLOCKED` and `CANCELLED`. You can create your own account
        statuses with the [Create status](ref:v4-post-account-status) endpoint. 
      pattern: ^[A-Z_]+$
      maxLength: 200
      example: NORMAL
    AccountsV3Request:
      required:
        - document_number
      properties:
        document_number:
          $ref: '#/components/schemas/DocumentNumber'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        account_status:
          $ref: '#/components/schemas/AccountStatus3'
    AccountsV3Response:
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        customer_id:
          $ref: '#/components/schemas/CustomerID'
        account_status:
          $ref: '#/components/schemas/AccountStatus3'
        acquisition_id:
          $ref: '#/components/schemas/AcquisitionIdOfApplicationForm'
        program_id:
          $ref: '#/components/schemas/ProgramID'
    AccountsV4Request:
      properties:
        search_type:
          type: string
          description: |
            Type of search. Must be one of the following:
            * `IDENTIFICATION`: Document ID
            * `ACCOUNT-ID`: Account ID
            * `NAME`: Name or social name
            * `EMAIL`: Any account email
            * `ENTITY-EXTERNAL-ID`: Entity's external ID
            * `ACCOUNT-EXTERNAL-ID`: Account's external ID
            * `PROGRAM-ID`: Account's program ID
          enum:
            - ACCOUNT-ID
            - IDENTIFICATION
            - NAME
            - EMAIL
            - ENTITY-EXTERNAL-ID
            - ACCOUNT-EXTERNAL-ID
            - PROGRAM-ID
          example: IDENTIFICATION
        search_value:
          $ref: '#/components/schemas/SearchValue'
        phones:
          required:
            - number
          type: object
          description: >-
            Filter by phone number, area code, and/or country code. Phone number
            is required.
          properties:
            number:
              $ref: '#/components/schemas/PhoneNumber'
            area_code:
              $ref: '#/components/schemas/AreaCode'
            country_code:
              $ref: '#/components/schemas/PhoneCountryCode'
    AccountsV4Response:
      type: object
      description: Response object for account
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        program_id:
          $ref: '#/components/schemas/ProgramID'
        country_code:
          $ref: '#/components/schemas/AccountCountryCode'
        currency_numeric_code:
          $ref: '#/components/schemas/CurrencyNumericCode'
        timezone:
          $ref: '#/components/schemas/TimeZone'
        division_id:
          $ref: '#/components/schemas/DivisionID'
        is_centralizer:
          $ref: '#/components/schemas/IsCentralizer'
        external_id:
          $ref: '#/components/schemas/AccountExternalId'
        entities:
          type: array
          description: List of account's entities
          items:
            $ref: '#/components/schemas/AccountEntityResponseV4'
    AccountsV5Request:
      required:
        - phone
      properties:
        phone:
          required:
            - number
          type: object
          description: >-
            Filter by phone number, area code, and/or country code. Phone number
            is required.
          properties:
            number:
              $ref: '#/components/schemas/PhoneNumber'
            area_code:
              $ref: '#/components/schemas/AreaCode'
            country_code:
              $ref: '#/components/schemas/PhoneCountryCode'
    AccountsV5Response:
      type: object
      description: Object response for account
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        account_external_id:
          $ref: '#/components/schemas/AccountExternalId'
        is_centralizer:
          $ref: '#/components/schemas/IsCentralizer'
        entities:
          type: array
          description: List of account's entities
          items:
            $ref: '#/components/schemas/AccountEntityResponseV5'
    AccountType:
      type: string
      description: >

        Account type:


        - `PHYSICAL`&mdash;Default. A parent account is always physical. A child
        account can be physical or virtual. 

          A *physical* card is a plastic or metal embossed card. "Physical" here means an account that represents an actual client entity (person or company). A physical account supports full operations&mdash; transfers, payments, cards, interest, statements, and so on. 

        - `VIRTUAL`&mdash;Always a child account. 

          `parent_account_id` and `external_id` are **REQUIRED** for virtual accounts. 
          
          Virtual accounts can have a many to one mapping to a physical account where the balance lives at the parent account. 

        While a `document_number` is **REQUIRED** for a virtual account, it is
        ignored since it shares a parent account's entity and `document_number`.


        **Key difference summary**


        | Feature                        | Physical           |
        Virtual                    |

        | ------------------------------ | ------------------ |
        -------------------------- |

        | Fund ownership                 | Yes                | No (parent owns
        funds)     |

        | Independent balance            | Usually            | Typically parent
        balance   |

        | Persistent ID                  | One account        | Can be many to
        one parent  |

        | Regulatory/KYC link            | Direct             |
        Inherited/indirect         |

        | Primary use                    | Real account       | Segmentation &
        routing     | 
      enum:
        - PHYSICAL
        - VIRTUAL
      example: PHYSICAL
