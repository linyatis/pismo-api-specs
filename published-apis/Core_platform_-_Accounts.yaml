                        allowed_operations: DEBIT_ONLY
                        state: ACTIVE
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                Invalid page parameter:
                  value:
                    code: EACC0005
                    message: One or more parameters with invalid format
                    detail:
                      parameters:
                        - field: page
                          message: Value must be greater than zero
                Invalid per page parameter:
                  value:
                    code: EACC0005
                    message: One or more parameters with invalid format
                    detail:
                      parameters:
                        - field: perPage
                          message: Value is not a number
                Invalid state parameter:
                  value:
                    code: EACC0018
                    message: One or more parameters with invalid format
                    detail:
                      parameters:
                        - field: state
                          message: 'Value should be one of: ACTIVE, INACTIVE'
                Invalid next_cursor parameter:
                  value:
                    code: WACC0011
                    message: Invalid cursor value
                Invalid maxItems parameter:
