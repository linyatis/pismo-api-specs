  /accounts/v2/customers/{customerId}:
    get:
      summary: Get customer
      description: >
        Use the customer ID to get customer and associated entity details. 


        To get a list of customer IDs, call [List account
        customers](ref:customersv2get).


        Depending on customer, either the `person`, `company`, or `customer`
        (less informational fields than `person`) object is returned.
      operationId: customerV2Get
      tags:
        - Customers
      parameters:
        - $ref: '#/components/parameters/CustomerIdPath'
      responses:
        '200':
          description: >-
            Detailed customer and entity information associated with the given
            customer ID.
          content:
            application/json:
              schema:
                type: object
                properties:
                  program_id:
                    $ref: '#/components/schemas/ProgramID'
                  account_id:
                    $ref: '#/components/schemas/AccountID'
                  entity:
                    type: object
                    properties:
                      id:
                        $ref: '#/components/schemas/EntityID'
                      name:
                        $ref: '#/components/schemas/EntityName'
                      document_number:
                        $ref: '#/components/schemas/DocumentNumber'
                      registration:
                        $ref: '#/components/schemas/EntityRegistration'
                      birth_date:
                        $ref: '#/components/schemas/EntityBirthDate'
                      gender:
                        $ref: '#/components/schemas/Gender'
                      mothers_name:
                        $ref: '#/components/schemas/MothersName'
                      marital_status:
                        $ref: '#/components/schemas/MaritalStatus'
                      pep:
                        $ref: '#/components/schemas/PEP'
                      person:
                        $ref: '#/components/schemas/Person2'
                      company:
                        $ref: '#/components/schemas/Company2'
                  customer:
                    type: object
                    properties:
                      id:
                        $ref: '#/components/schemas/CustomerID'
                      printed_name:
                        $ref: '#/components/schemas/PrintedName'
                      social_name:
                        $ref: '#/components/schemas/SocialName'
                      nickname:
                        $ref: '#/components/schemas/Nickname'
                      is_owner:
                        $ref: '#/components/schemas/IsOwner'
                      is_active:
                        $ref: '#/components/schemas/CustomerIsActive'
                      email:
                        $ref: '#/components/schemas/IndividualsEmailAddress'
                      addresses:
                        type: array
                        items:
                          type: object
                          properties:
                            address_id:
                              $ref: '#/components/schemas/AddressID'
                            type:
                              $ref: '#/components/schemas/AddressType'
                      phones:
                        type: array
                        items:
                          type: object
                          properties:
                            phone_id:
                              $ref: '#/components/schemas/PhoneID'
                            type:
                              type: string
                              description: Phone type.
                              enum:
                                - MOBILE
                                - RESIDENTIAL
                                - COMMERCIAL
                              example: MOBILE
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
              examples:
                Account not found:
                  value:
                    message: Account not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
              examples:
                Internal server error:
                  value:
                    message: Internal server error
    put:
      summary: Overwrite customer
      description: >
        Overwrite some customer information. This endpoint allows you to mark
        the customer on the account as active or inactive using the `is_active`
        field. This field is informative only. There are no restrictions that
        prevent inactive customers from performing any actions.


        If `customer.is_active` = `true`, and the `Maximum number of card
        holders` program parameter is set, this customer is counted in the
        account's maximum number of card holders limit.


        If the `customerId` parameter is not set, the server returns "Cannot get
        property `customerId` on null object". 


        **Note:** If `social_name` and `nickname` are not passed, their values
        are overwritten as null. 


        This endpoint generates a [Customer
        changed](https://developers.pismo.io/events/docs/account-customer-change-2)
        event.
      operationId: customerV2Put
      tags:
        - Customers
      parameters:
        - $ref: '#/components/parameters/CustomerIdPath'
      requestBody:
        description: Customer data to overwrite
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OverwriteCustomerInformationRequest'
      responses:
        '200':
          description: OK
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
              examples:
                Maximum Additional Customers:
                  value:
                    message: Exceeded maximum value of additional customers
        '404':
          description: Customer {customerId} not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
              examples:
                Internal server error:
                  value:
                    message: Internal server error
