      type: string
      description: >
        Entity name.


        For individuals, this is the legal registered name, such as birth or
        married name, that appears in a government-issued ID document. 


        For companies, this is the legal registered name of the company.
      maxLength: 60
      example: Samantha Smith
    EntityRegistration:
      type: string
      description: Entity registration
      example: '55555555'
