                    next_cursor: >-
                      MEgCQQCo9+BpMRYQ/dL3DS2CyJxRF+j6ctbT3/Qp84+KeFhnii7NT7fELilKUSnxS30WAvQCCo2yU1orfgqr41mM70MBAgMBAAE=
                    has_next: true
                    count: 100
                    current_page: 1
                    per_page: 100
                    pages: 1
                    total_items: 3
                    items:
                      - status_id: 1
                        name: CANCELLED
                        description: Cancelled account with no operations available.
