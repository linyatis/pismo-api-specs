  /acquisitions/v2/s2s/applications/{applicationId}:
    get:
      operationId: GetApplicationByApplicationId
      summary: Get account application
      description: Get account application given application ID in the path.
      tags:
        - Accounts
      parameters:
        - $ref: '#/components/parameters/ApplicationIdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationsResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Application not found
        '500':
          description: '500'
          content:
            text/plain:
              examples:
                Result:
                  value: Internal server error
    patch:
      operationId: patch-acquisitions-v2-s2s-applications
      summary: Update account application
      description: >
        Update a previously-created account application, only if the account
        application's `submit` field is `false`. 


        If `submit` is set to `false`:


        - The application is not sent for processing and can be further
        modified  with incremental changes via this endpoint.


        If `submit` flag is set to `true`:


        - No further updates can be made and the account application is sent out
        for processing, which creates an account and its associated structures.


        - This endpoint generates an [Account application
        created](https://developers.pismo.io/events/docs/onboarding-succeeded-1)
        event.


        **Warning**&mdash;Some of the account's elements are created
        asynchronously and you should refrain from accessing the account via
        other endpoints until the events this endpoint generates are received. 


        **Notes:**


        * By default, `prospect_cancel` is `false`. If you set `prospect_cancel`
        to `true`, the account application is canceled and no further updates
        can be made.


        * You **cannot** update a previously-entered address. All addresses
        entered are considered new.  The main address is the last one passed
        with `mailing_address` = `true`.


        * You **cannot** update a previously-entered `partner` object. All
        partner information entered is considered new.


        * For all other objects and fields, anything not passed is not updated.
      tags:
        - Accounts
      parameters:
        - $ref: '#/components/parameters/ApplicationIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                application:
                  $ref: '#/components/schemas/AcquisitionRequestUpdate'
            examples:
              Application Form:
                value:
                  application:
                    submit: true
                    prospect_cancel: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisitionResponse'
              examples:
                Processed application:
                  value:
                    application_id: 23942777
                    status: 4
                    status_name: APPROVED
                    account_id: 35426
                    customer_id: 3569
                    entity_id: 123
                    program_id: 100
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
              examples:
                Bad channel:
                  value:
                    message: Invalid acquisition channel
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
              examples:
                Account conflict:
                  value:
                    message: Account already created
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
              examples:
                Internal server error:
                  value:
                    message: Error registering application
