          $ref: '#/components/schemas/InfractionDetails'
        contact_information:
          $ref: '#/components/schemas/ContactInformation'
    CreateTrackingGraphRequest:
      type: object
      description: Create tracking graph request
      required:
        - tracking_graph_parameters
      properties:
        tracking_graph_parameters:
          $ref: '#/components/schemas/TrackingGraphParameters'
    CreationDatetime:
      type: string
      description: >-
        Creation datetime. A RFC 3339 date-time value. For example - 
        `2023-04-12T23:20:50.52Z`.
      format: date-time
      example: '2020-08-13T13:49:03Z'
    CreditedParticipant:
      type: string
      description: >-
        Credited participant's ISPB (Identifcador do Sistema de Pagamento
        Brazil) number - the Brazilian Payment System identifier, an 8-digit
        value.
      maxLength: 8
      example: '99999011'
    DebitedParticipant:
      type: string
      description: >-
        Debited participant's ISPB (Identifcador do Sistema de Pagamento Brazil)
        number - the Brazilian Payment System identifier, an 8-digit value.
      maxLength: 8
      example: '99999011'
    DeleteReason:
      type: string
      description: Delete key reason for request.
      example: USER_REQUESTED
      enum:
        - USER_REQUESTED
        - ACCOUNT_CLOSURE
        - RECONCILIATION
        - FRAUD
        - RFB_VALIDATION
    DocumentNumber:
      type: string
      description: >
        A government document number, such as a Social Security number (US) or
        Cadastro de Pessoas Físicas number (Brazil). Must be numeric with 11-14
        digits.
      minLength: 11
      maxLength: 14
      example: '123412341234'
    DonorParticipant:
      type: string
      description: >-
        Donor participant's ISPB (Identifcador do Sistema de Pagamento Brazil)
        number - the Brazilian Payment System identifier, an 8-digit value.
      maxLength: 8
      example: '99999011'
    EffectiveRefundedAmount:
      type: number
      description: Actual amount refunded to the user.
      example: 20.1
    EndToEndID:
      type: string
      description: >
        This field is a Brazil Central Bank (BCB) requirement to track all steps
        of Pix transactions. 

        Basically, there are two steps to a Pix transaction:
            1. Initialize a transaction 
            2. Confirm a transaction
        The end_to_end_id is sent to the BCB in both steps in order to identify
        all transaction information. 
      example: 132cca0f6a816dd5be409256b3662343
