  /v1/pix/funds-recoveries/{funds_recovery_id}/refund:
    post:
      summary: Initiate refund funds recovery [beta]
      description: >
        Initiate funds recovery refund stage, after the recipient PSPs have
        analyzed (`status` = `ANALYSED`) all the infraction notifications. This
        is the process' final step where funds are effectively returned to the
        victim's account.


        Before requesting the refund, make sure that:

          * The recovery status = `ANALYSED`
          * You are the **creator** recovery participant
          * You are within the **72-hour** deadline after receiving the `FUNDS_RECOVERY_ANALYSED` event
          * There is at least one **accepted** infraction notification (status = `ACCEPTED`)

        Thie endpoint generates a [Pix funds recovery status
        changed](https://developers.pismo.io/events/docs/pix-dict-funds-recoveries-status-change-1)
        event.


        For more information refer to [Pix funds
        recovery](doc:pix-funds-recovery).
      operationId: post-refund-recovery
      tags:
        - Funds recovery
      parameters:
        - $ref: '#/components/parameters/FundsRecoveryIdPath2'
      responses:
        '200':
          description: OK - synchronous success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateFundsRecoveryResponse'
        '202':
          description: Ok - Asynchronous success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncResponse'
              example:
                Asynchrnous success:
                  value:
                    code: EPDA0000
                    message: Refund funds recovery flow will continue asynchronously
        '400':
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Invalid status:
                  value:
                    code: EPDA0000
                    message: >-
                      Refund deadline expired. Must initiate refund within 72
                      hours after ANALYSED status
                    details:
                      analyzed_at: '2025-10-13T10:00:00Z'
                      deadline: '2025-10-16T10:00:00Z'
                      current_time: '2025-10-17T12:00:00Z'
        '404':
          description: No accepted infractions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                No accepted infractions found:
                  value:
                    code: EPDA0000
                    message: >-
                      No accepted infractions found. Cannot initiate refund
                      without accepted infractions
                Recovery not found:
                  value:
                    code: EPDA0000
                    message: Funds recovery not found
  /v1/pix/funds-recoveries/{funds_recovery_id}/cancel:
    post:
      summary: Cancel funds recovery [beta]
      description: >
        Cancel funds recovery 


        Statuses that allow cancellation:

          | Status | Can Cancel? | Note |
          |--------|-------------|------|
          | `CREATED` | Yes | Before any processing |
          | `TRACKED` | Yes | After graph creation |
          | `AWAITING_ANALYSIS` | Yes | During analysis period (7 days) |
          | `ANALYSED` | Yes | After analysis completed, before refund |
          | `REFUNDING` | No | Refunds already started - irreversible process |
          | `COMPLETED` | No | Process already finished |

        When a recovery is cancelled:
          * Status changes to `CANCELLED`
          * All linked infraction notifications are automatically cancelled
          * Receiver PSPs must unblock the resources that were blocked
          * Tracking graph remains available for audit
          * Process cannot be undone (but new recovery can be created)

        Thie endpoint generates a [Pix funds recovery status
        changed](https://developers.pismo.io/events/docs/pix-dict-funds-recoveries-status-change-1)
        event.
      operationId: post-cancel-funds-recovery
      tags:
        - Funds recovery
      parameters:
        - $ref: '#/components/parameters/FundsRecoveryIdPath2'
      responses:
        '200':
          description: OK - synchronous success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelFundsRecoveryResponse'
        '202':
          description: Ok - Asynchronous success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncResponse'
              examples:
                Asynchrnous success:
                  value:
                    code: EPDA0000
                    message: Refund funds recovery flow will continue asynchronously
        '400':
          description: Invalid funds recovery ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Invalid funds recovery ID:
                  value:
                    code: EPDA0000
                    message: Invalid funds recovery ID format
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Funds recovery not found:
                  value:
                    code: EPDA0000
                    message: Funds recovery not found
        '409':
          description: Not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Status does not allow cancellation:
                  value:
                    code: EPDA0000
                    message: Cannot cancel funds recovery in current status
        '504':
          description: Timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                DICT timeout:
                  value:
                    code: EPDA0000
                    message: Timeout communicating with DICT
