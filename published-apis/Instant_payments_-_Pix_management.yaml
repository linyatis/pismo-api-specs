          $ref: '#/components/schemas/InfractionCounterpartyParticipant'
        bacen_creation_datetime:
          $ref: '#/components/schemas/BacenCreationDateTime'
        bacen_last_modified_datetime:
          $ref: '#/components/schemas/BacenLastModifiedDateTime'
