          $ref: '#/components/schemas/InfractionAmount'
        fraud_marker_id:
          $ref: '#/components/schemas/FraudMarkerID'
    InfractionReportSituation:
      type: string
      description: What gave rise to the infraction notification
      example: SCAM
      enum:
        - SCAM
        - ACCOUNT_TAKEOVER
        - COERCION
        - FRAUDULENT_ACCESS
        - OTHER
        - UNKNOWN
    InfractionReportStatus:
      type: string
      description: Infraction report status
      example: OPEN
      enum:
        - OPEN
        - ACKNOWLEDGED
        - CLOSED
        - CANCELLED
    InfractionStatus:
      type: string
      description: Infraction status
      example: CLOSED
      enum:
        - OPEN
        - ACKNOWLEDGED
        - CLOSED
        - CANCELLED
    InfractionAmount:
      type: number
      description: Infraction Amount.
      example: 1050.44
    InfractionTransactionID:
      type: string
      description: Original transaction's end to end ID.
      example: E9999901012341234123412345678900
    infractionType:
      type: string
      description: |
        Infraction type: 
          * `FRAUD` - Payer or payee requested. 
          * `REFUND_REQUEST` - Initiated only by payer's payment service provider (PSP). Used to mark a key as fraudulent and asks for a refund.
          * `REFUND_CANCELLED` - Initiated only by payee's PSP.   To indicate that a refund done thru an infraction process was a fraud and needs to be returned,
      example: FRAUD
      enum:
        - FRAUD
        - REFUND_REQUEST
        - REFUND_CANCELLED
    InitiateFundsRecoveryResponse:
      type: object
      description: Initiate funds recovery response
      properties:
        funds_recovery_id:
          $ref: '#/components/schemas/FundsRecoveryId'
        status:
          $ref: '#/components/schemas/FundsRecoveryStatus'
        total_refunds_created:
          type: integer
          description: Total refunds created
          example: 4
        updated_at:
          $ref: '#/components/schemas/UpdatedDatetime'
    Key:
      type: string
      description: Value, based on a key's type, used to encrypt Pix key.
      maxLength: 77
      example: al_fresco@bourdain.com
    KeyStatus:
      type: string
      description: |
        Key status: 
          * `ACTIVE` - Key is active
          * `DELETED` - Key was removed
          * `PROCESSING` - An error occurred during the request to the PSP. The process continues asynchronously in this case.
      enum:
        - ACTIVE
        - DELETED
        - PROCESSING
    KeyType:
      type: string
      description: >
        User information that can be used to create a Pix key:

        * `CPF` - Cadastro de Pessoas Fisicas (Indiviual Taxpayer Registry)
        number. Similar to a Social Security number in the US. 

        * `CNPJ` - Cadastro Nacional de Pessoa Juridica (National Registry of
        Legal Entities) number. Unique ID for legal entities, such as companies
        and organizations, in Brazil

        * `EMAIL` - Email 

        * `PHONE` - Phone number

        * `EVP` - Endereco de pagamento virtual (virtual payment address). A
        randomly-generated UUID number.
      enum:
        - CPF
        - CNPJ
        - PHONE
        - EMAIL
        - EVP
      example: EMAIL
