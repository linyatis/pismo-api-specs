  /v2/pix/claims:
    post:
      summary: Create key claim
      description: >
        Register a DICT claim for a key. 


        The Brazil Central Bank maintains Pix keys in the Diretório de
        Identificadores de Contas Transacionais (DICT), a national Pix key
        registry and database.


        On PSP timeout, a `202 Accepted` response is returned and the process
        continues asynchronous, eventually emitting a claim successful creation
        event.


        This endpoint generates a <a
        href="https://developers.pismo.io/events/docs/pix-dict-claim-status-change-1"
        >Pix key claim status changed</a> event.


        For more information, refer to [Pix key transfer (key
        claim)](doc:pix-instant-payments#pix-key-transfer-key-claim).
      operationId: post-dict-key-claim
      tags:
        - Claims
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
