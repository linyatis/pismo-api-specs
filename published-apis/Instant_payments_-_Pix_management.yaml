          items:
            $ref: '#/components/schemas/Refund'
    RefundReason:
      type: string
      description: >
        Refund reason. 


        `PIX_AUTOMATICO` means a refund was requested due to failed Automatic
        Pix operation.
      enum:
        - FRAUD
        - OPERATIONAL_FLAW
        - PIX_AUTOMATICO
        - REFUND_CANCELLED
      example: OPERATIONAL_FLAW
    RefundRegisterRequest:
      type: object
      required:
        - refund_amount
        - refund_reason
        - transaction_id
      properties:
        refund_amount:
          $ref: '#/components/schemas/RefundAmount'
        refund_reason:
          $ref: '#/components/schemas/RefundReason'
        transaction_id:
          $ref: '#/components/schemas/RefundTransactionID'
        refund_details:
          $ref: '#/components/schemas/RefundDetails'
    RefundRejectionReason:
      type: string
      description: |
        Refund rejecton reason. 

        **REQUIRED** when `refund_analysis_result` is `REJECTED`.
      enum:
        - NO_BALANCE
        - ACCOUNT_CLOSURE
        - INVALID_REQUEST
        - OTHER
      example: NO_BALANCE
    RefundStatus:
      type: string
      description: Refund status
      enum:
        - OPEN
        - CLOSED
        - CANCELLED
      example: CLOSED
    RefundTransactionID:
      type: string
      description: Refund transaction ID
      example: E9999901012341234123412345678900
    ReportDetails:
      type: string
      description: Details about report
      maxLength: 2000
      example: >-
        Details that can help the receiving participant to analyze the suspected
        violation
    ReportDetails2:
      type: string
      description: Details about report
      maxLength: 500
      example: >-
        Details that can help the receiving participant to analyze the suspected
        violation
    ReporterParticipant:
      type: string
      description: Reporter participant ID
      example: '12345678'
    RequestingParticipant:
      type: string
      maxLength: 8
      description: >-
        Requesting participant's ISPB (Identifcador do Sistema de Pagamento
        Brazil) number - the Brazilian Payment System identifier, an 8-digit
        value.
      example: '99999011'
    ResolutionPeriodEndDatetime:
      type: string
      format: date-time
      description: Resolution period end for claim. ISO 8601 format.
      example: '2020-01-17T10:00:00Z'
    ResponseDateTime:
      type: string
      format: date-time
      description: Response date time. RFC 3339 date-time value.
      example: '2020-08-13T13:49:03Z'
    RootTransactionID:
      type: string
      description: Fraudulent transaction end-to-end-id
      example: E1234567890123456789012345678901
    SituationType:
      type: string
      description: |
        Situation type: 
          * `SCAM` - Scam/fraud through social engineering 
          * `ACCOUNT_TAKEOVER` - Unauthorized transaction without digital authentication 
          * `COERCION` - Coercion crime (kidnapping, extortion) 
          * `FRAUDULENT_ACCESS` - Fraudulent access and authorization (phishing, stolen password) |
          * `OTHER` - Other cases. This option **REQUIRES** you pass `report_details`.
          * `UNKNOWN` - Unknown state
      enum:
        - SCAM
        - ACCOUNT_TAKEOVER
        - COERCION
        - FRAUDULENT_ACCESS
        - OTHER
        - UNKNOWN
    TaxIdNumber:
      type: string
      description: >-
        A government document number, such as a Social Security number (US) or
        Cadastro de Pessoas Físicas number (Brazil). Must be numeric with 11-14
        digits.
      minLength: 11
      maxLength: 14
      example: '123412341234'
    TrackingGraphParameters:
      type: object
      description: >
        Graph parameters (`AUTOMATED` only). 


        Higher values for `min_transaction_amount` and lower values for
        `max_transactions`,`max_hops`, and `hop_window` generate smaller and
        faster graphs. The opposite generates larger and more complete graphs.
      required:
        - min_transaction_amount
        - max_transactions
        - hop_window
        - max_hops
      properties:
        min_transaction_amount:
          type: number
          description: >-
            Minimum amount in Brazilian reals to include transaction in
            tracking.
        max_transactions:
          type: integer
          description: Maximum number of transactions to track
        hop_window:
          type: string
          description: |
            The window duration between transactions

              * `PT30M` -  30 minutes
              * `PT1H` - 1 hour
              * `PT24H` - 24 hours
              * `P7D` - 7 days
              
          enum:
            - PT1H
            - PT30M
            - P7D
            - PT24H
          example: PT1H
        max_hops:
          type: integer
          description: Maxium tracking depth (1-10 layers)
    TrackingGraphResponse:
      type: object
      properties:
        funds_recovery_id:
          $ref: '#/components/schemas/FundsRecoveryId'
        parameters:
          $ref: '#/components/schemas/TrackingGraphParameters'
        persons:
          type: array
          description: Identified people (account holders)
          items:
            $ref: '#/components/schemas/Person'
        accounts:
          type: array
          description: Identified transactional accounts
          items:
            $ref: '#/components/schemas/Account'
        transactions:
          type: array
          description: PIX transactions that compose the graph
          items:
            $ref: '#/components/schemas/Transaction'
        summary:
          $ref: '#/components/schemas/GraphSummary'
        created_at:
          $ref: '#/components/schemas/CreationDatetime'
    TradeName:
      type: string
      description: >-
        Name under which the business operates. Not necessarily the same as the
        legal name.
      maxLength: 100
      example: Acme Widgets
    Transaction:
      type: object
      properties:
        id:
          type: string
          description: Transaction end-to-end-ID
          pattern: ^E[0-9]{31}$
          example: E1234567890123456789012345678901
        debtor_account_id:
          type: string
          description: Debtor account ID
          example: '156704'
        creditor_account_id:
          type: string
          description: Creditor account ID
          example: '257938'
        amount:
          type: number
          format: decimal
          description: Original transaction amount
          example: 1000
        refundable_amount:
          type: number
          format: decimal
          description: Amount available for refund (may be less than original)
          example: 900
        settlement_time:
          type: string
          format: date-time
          description: Transaction settlement timestamp. RFC 3339 format.
          example: '2025-10-23T09:00:00Z'
    TransactionID:
      type: string
      description: Transaction ID
      example: E9999901012341234123412345678900
    TransactionResult:
      type: string
      description: Transaction result
      enum:
        - SETTLED
        - REJECTED_PAYEE
        - REJECTED_PAYER
      example: SETTLED
    TransactionType:
      type: string
      description: |
        Transaction type:
          * `SPI` -  Transaction was created in the Central Bank system. 
          * `INTERNAL` - Transaction was created internally in the Pismo system.
      enum:
        - SPI
        - INTERNAL
      example: SPI
    UpdatedDatetime:
      type: string
      description: >-
        Updated datetime. A RFC 3339 date-time value. For example - 
        `2023-04-12T23:20:50.52Z`.
      format: date-time
      example: '2020-08-13T13:49:03Z'
    Watermark:
      type: string
      format: date-time
      description: Last anti-fraud event's date and time. RFC 3339 format.
      example: '2020-01-17T10:00:00Z'
