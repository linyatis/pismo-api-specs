  /v1/pix/funds-recoveries:
    post:
      summary: Create funds recovery [beta]
      description: >
        Creates and establishes a new funds recovery to track and block diverted
        funds in Pix fraud cases. 


        The tracking follows the chain of subsequent transactions starting from
        the original fraudulent transaction.


        **`AUTOMATED` flow**

           DICT manages the entire process automatically. You only define the initial parameters and the system executes tracking, prioritization, and blocking.
           **Use for**: Standard cases, high volume of recoveries, or when you trust DICT's default algorithm.

        **Notes:**

          * Fraudulent transactions must have occurred less than **80 days** ago
          * Only the **debtor participant** (payer) can create funds recovery
          * Recipient PSPs have **7 calendar days** to analyze infraction notifications
          * Refund must be initiated within **72 hours** after analysis completion
          * Once refunding starts, the process **cannot be cancelled**

        Thie endpoint generates a [Pix funds recovery status
        changed](https://developers.pismo.io/events/docs/pix-dict-funds-recoveries-status-change-1)
        event.


        For more information refer to [Pix funds
        recovery](doc:pix-funds-recovery).
      operationId: post-create-funds-recovery
      tags:
        - Funds recovery
      requestBody:
        description: CheckRequest Body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFundsRecoveryRequest'
            examples:
              automated:
                summary: AUTOMATED flow example
                value:
                  flow_type: AUTOMATED
                  root_transaction_id: E9876543210987654321098765432109
                  situation_type: COERCION
                  contact_information:
                    email: security@yourbank.com
                    phone: '+5511988888888'
                  report_details: >-
                    Customer under coercion transferred R$ 10,000. Police report
                    #12345/2025.
                  tracking_graph_parameters:
                    min_transaction_amount: 100
                    max_transactions: 50
                    hop_window: PT24H
                    max_hops: 5
      responses:
        '201':
          description: Created - synchronous success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFundsRecoveryResponse'
        '202':
          description: Funds recovery creation continues asynchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncResponse'
              example:
                code: EPDA0000
                message: >-
                  Funds recovery creation will continue asynchronously. Monitor
                  events for completion.
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                invalidData:
                  summary: Invalid data
                  value:
                    code: EPDA0000
                    message: Invalid request payload
                    details:
                      field: flow_type
                      error: must be AUTOMATED
                transactionTooOld:
                  summary: Transaction too old
                  value:
                    code: EPDA0000
                    message: >-
                      Transaction is older than 80 days and not eligible for
                      funds recovery
        '403':
          description: Not authorized to create funds recovery for this transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Provider service error:
                  value:
                    code: EPDA0000
                    message: >-
                      Only the debtor participant can create funds recovery for
                      this transaction
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Transaction not found:
                  value:
                    code: EPDA0000
                    message: Transaction not found
        '409':
          description: Recovery already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Recovery already exists:
                  value:
                    code: EPDA0000
                    message: Active funds recovery already exists for this transaction
        '504':
          description: Timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Timeout:
                  value:
                    code: EPDA0000
                    message: Timeout communicating with DICT
