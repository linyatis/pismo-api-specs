security:
  - BearerAuth: []
x-readme:
  explorer-enabled: true
  proxy-enabled: true
  samples-enabled: true
paths:
  /v2/pix/keys:
    post:
      summary: Create key entry
      description: >
        Creates a new DICT key entry for the user.


        The Banco Central do Brazil (BCB) maintains Pix keys in the Diretório de
        Identificadores de Contas Transacionais (DICT), a national Pix key
        registry and database.


        On PSP timeout, a `202 Accepted` with a key status = `PROCESSING`
        reponse is returned  and the process continues asynchronously,
        eventually emitting a success or error event.


        This endpoint generates a <a
        href="https://developers.pismo.io/events/docs/pix-dict-key-status-change-1"
        >Pix key status changed</a> event. 


        For more information, refer to the [Pix instant
        payments](doc:pix-instant-payments) guide.
      operationId: post-v2-pix-keys-create
      tags:
        - Keys
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        description: Create a new key
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/presenter.CreationRequest'
            examples:
              Create Key:
                value:
                  bank_account:
                    opening_datetime: '2020-08-13T13:49:03Z'
                  key: email@email.com
                  key_type: EMAIL
                  reason: USER_REQUESTED
              Create Key EVP:
                value:
                  bank_account:
                    opening_datetime: '2020-08-13T13:49:03Z'
                  key: 8d33a43c-0d22-4974-9652-30c80f2d6b0e
                  key_type: EVP
                  reason: USER_REQUESTED
        required: true
      responses:
        '201':
          description: Created
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.CreationResponse'
        '202':
          $ref: '#/components/responses/202Accepted'
        '400':
          description: Bad Request
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Invalid binding:
                  value:
                    code: EPDA0002
                    message: Failed to unmarshal request body
                Validate errors:
                  value:
                    code: EPDA0003
                    message: >-
                      There are invalid fields when trying to validate request
                      body
                    details:
                      payload:
                        - field: DeleteKeyRequest.reason
                          message: >-
                            Field validation for 'reason' failed on the 'oneof'
                            tag
                Invalid key type create:
                  summary: Invalid Key Type
                  value:
                    code: EPDA0038
                    message: Invalid Key Type
                Invalid cpf create:
                  summary: Invalid CPF
                  value:
                    code: EPDA0039
                    message: Invalid CPF
                Invalid cnpj create:
                  summary: Invalid CNPJ
                  value:
                    code: EPDA0040
                    message: Invalid CNPJ
                Invalid phone create:
                  summary: Invalid PHONE
                  value:
                    code: EPDA0041
                    message: Invalid PHONE
                Invalid email create:
                  summary: Invalid EMAIL
                  value:
                    code: EPDA0042
                    message: Invalid EMAIL
                Invalid evp create:
                  summary: Invalid EVP
                  value:
                    code: EPDA0043
                    message: Invalid EVP
                Missing tenant header:
                  value:
                    code: EPDG0001
                    message: Missing x-tenant header
                Provider service error request:
                  value:
                    code: EPDG0011
                    message: Bad request while accessing the provider service
                    details:
                      external:
                        - code: PBE353
                          message: Entity not found
                Invalid provider service response:
                  value:
                    code: EPDG0018
                    message: >-
                      Provider service returned a status {http_status} which was
                      not expected
                Provider authentication service error request:
                  value:
                    code: EPDG0019
                    message: >-
                      Provider authentication service rejected request due to a
                      client payload misconfiguration
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          description: Resource Not Found
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Participant not found create:
                  summary: Participant Not Found
                  value:
                    code: EPDA0023
                    message: Participant not found for org {orgId}
                Account not found create:
                  summary: Account Not Found
                  value:
                    code: EPDA0024
                    message: Account not found for ID {accountId}
                Provider service error:
                  value:
                    code: EPDG0014
                    message: Resource not found on the provider service
                    details:
                      external:
                        - code: PBE353
                          message: Entity not found
        '409':
          description: Conflict
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Key exists create:
                  summary: Key already exists in database
                  value:
                    code: EPDA0025
                    message: Key already exists in database
                Account blocked cancelled create:
                  summary: Account status blocked or cancelled
                  value:
                    code: EPDA0028
                    message: Account status blocked or cancelled
        '429':
          $ref: '#/components/responses/429TooManyRequests'
        '500':
          description: Internal Server Error
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Provider service communication error:
                  value:
                    code: EPDA0029
                    message: >-
                      Internal errors while attempting to communicate with the
                      provider service
                Invalid client error:
                  value:
                    code: EPDG0005
                    message: Invalid Pix provider '{provider_name}'
                Failed marshalling object:
                  value:
                    code: EPDG0006
                    message: Failed to marshal JSON object
                Failed unmarshalling object:
                  value:
                    code: EPDG0007
                    message: Failed to unmarshal JSON object
                Error reading response data:
                  value:
                    code: EPDG0010
                    message: 'I/O error while reading response data: ''{details}'''
                Provider service error:
                  value:
                    code: EPDG0016
                    message: >-
                      Provider service returned an internal error while trying
                      to access the resource
                    details:
                      external:
                        - code: PBE315
                          message: Generic error
        '502':
          $ref: '#/components/responses/502BadGateway'
        '503':
          description: Service Unavailable
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Provider service unavailable:
                  value:
                    code: EPDG0017
                    message: Provider service resource is unavailable
                Provider authentication service unavailable:
                  value:
                    code: EPDG0021
                    message: Provider authentication service is unavailable
        '504':
          $ref: '#/components/responses/504GatewayTimeout2'
    get:
      summary: List user keys
      description: >-
        Get a list of user keys based on the Pismo account ID, which is parsed
        from the account token.
      operationId: get-v2-pix-keys
      tags:
        - Keys
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/KeyTypeQuery'
      responses:
        '200':
          description: OK
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.ListResponse'
        '400':
          description: Bad Request
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Invalid key type create:
                  summary: Invalid Key Type
                  value:
                    code: EPDA0038
                    message: Invalid key type
        '404':
          description: Resource Not Found
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Provider service error:
                  value:
                    code: EPDG0014
                    message: Resource not found on the provider service
                    details:
                      external:
                        - code: PBE353
                          message: Entity not found
                Account not found:
                  value:
                    code: EPDA0024
                    message: Account not found for ID {account_id}
        '409':
          description: Conflict
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Account blocked cancelled create:
                  summary: Account status blocked or cancelled
                  value:
                    code: EPDA0028
                    message: Account status blocked or cancelled
        '500':
          description: Internal Server Error
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message.Message'
              examples:
                Failed marshalling object:
                  value:
                    code: EPDG0006
                    message: Failed to marshal JSON object
                Failed unmarshalling object:
                  value:
                    code: EPDG0007
                    message: Failed to unmarshal JSON object
                Error reading response data:
                  value:
                    code: EPDG0010
                    message: 'I/O error while reading response data: ''{details}'''
    patch:
      summary: Update key entry
      description: >
        Update the DICT key entry.


        On PSP timeout, a `202 Accepted` response with a key status = 
        `PROCESSING` is returned and the process continues asynchronously,
        eventually emitting a success or error event.


        This endpoint generates a <a
        href="https://developers.pismo.io/events/docs/pix-dict-key-status-change-1"
        >Pix key status changed</a> event.
      operationId: patch-v2-pix-keys
      tags:
        - Keys
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        description: Update the key
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/presenter.UpdateRequest'
            examples:
              Update Key:
                value:
                  bank_account:
                    opening_datetime: '2020-08-13T13:49:03Z'
                  key: email@email.com
                  key_type: EMAIL
                  reason: USER_REQUESTED
        required: true
      responses:
        '200':
          description: OK
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presenter.UpdateResponse'
        '202':
          $ref: '#/components/responses/202Accepted'
        '400':
          description: Bad Request
          headers:
            x-cid:
              $ref: '#/components/headers/XCidResponseHeader'
          content:
            application/json:
              schema:
