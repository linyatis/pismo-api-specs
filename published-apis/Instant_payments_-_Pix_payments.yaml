      properties:
        amount:
          $ref: '#/components/schemas/Amount'
        end_to_end_id:
          $ref: '#/components/schemas/EndToEndID'
        payee:
          $ref: '#/components/schemas/pix.TransactionExternalAccount'
        payer:
          $ref: '#/components/schemas/pix.TransactionExternalAccount'
        status:
          $ref: '#/components/schemas/TransactionStatus'
    pix.InReversalRequest:
      type: object
      required:
        - account_id
        - amount
        - end_to_end_id
        - reason
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        amount:
          $ref: '#/components/schemas/Amount'
        end_to_end_id:
          type: string
          description: >
            This field is a Brazil Central Bank (BCB) requirement to track all
            steps of Pix transactions. 

            Basically, there are two steps to a Pix transaction:

            1. Initialize a transaction 

            2. Confirm a transaction


            The `end_to_end_id` is sent to the BCB in both steps in order to
            identify all transaction information.


            On reversal flow, the `end_to_end_id` is the original transaction
            `end_to_end_id`.
          example: E3030629420200808195101608910248
        reason:
          $ref: '#/components/schemas/ReversalReason'
        additional_information:
          $ref: '#/components/schemas/AdditionalInformation'
        description:
          type: string
          description: Reversal description
          maxLength: 140
    pix.InReversalResponse:
      type: object
      properties:
        end_to_end_id:
          $ref: '#/components/schemas/EndToEndID'
        reversal_end_to_end_id:
          type: string
          description: >
            This field is a Brazil Central Bank (BCB) requirement to track all
            steps of Pix transactions. 

            Basically, there are two steps to a Pix transaction:

            1. Initialize a transaction 

            2. Confirm a transaction

            The `end_to_end_id` is sent to the BCB in both steps in order to
            identify all transaction information.


            Here, the `reversal_end_to_end_id` is generated automatically and
            begins with a "D".
        reversal_status:
          type: string
          description: Reversal status
          enum:
            - SETTLED
            - PROCESSING
            - ERROR
          example: SETTLED
    pix.Meta:
