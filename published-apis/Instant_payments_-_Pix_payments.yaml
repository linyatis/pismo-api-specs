  /pix/v1/pix/in/reversal:
    post:
      summary: Pix reversal
      operationId: post-pix-reversal
      description: >
        Reverse a Pix-out transfer.


        This endpoint generates a <a
        href="https://developers.pismo.io/events/docs/pix-pix-out-reversal-1">Pix-out
        reversed</a> event and a <a
        href="https://developers.pismo.io/events/docs/pix-financial-reconciliation-1">Pix 
        reconciliation notification received</a> event.


        This endpoint also generates a <a
        href="https://developers.pismo.io/events/docs/pix-pix-in-reversal-1">Pix-in
        reversed</a> event when the funds are transferred from the payee's
        account, which can be a Pismo account or an external account.


        For all events, the `status` or `result` field indicates operation
        success or failure.


        For more information, see the [Pix instant
        payments](doc:pix-instant-payments) guide.
