        bank:
          $ref: '#/components/schemas/Bank'
        branch:
          $ref: '#/components/schemas/Branch'
        account_number:
          $ref: '#/components/schemas/AccountNumber2'
        account_type:
          $ref: '#/components/schemas/AccountType'
    Payer:
      type: object
      required:
        - document_number
        - document_type
        - name
        - bank
        - branch
        - account_number
      properties:
        document_number:
          $ref: '#/components/schemas/DocumentNumber'
        document_type:
          $ref: '#/components/schemas/PersonType'
        name:
          $ref: '#/components/schemas/Name'
        bank:
          $ref: '#/components/schemas/Bank'
        branch:
          $ref: '#/components/schemas/Branch'
        account_number:
          $ref: '#/components/schemas/AccountNumber2'
        account_type:
          $ref: '#/components/schemas/AccountType'
        city_code:
          $ref: '#/components/schemas/CityCode'
    PaymentDateTime:
      type: string
      format: datetime
      description: >
        Date time from a successful payment. Mandatory for the `AUT3` journey.
        RFC 3339 value. Format: YYYY-MM-DDThh:mm:ss.SSSZ.
      example: '2020-08-13T13:49:03.000Z'
    PaymentOrderReason:
      description: >
        Payment order cancellation reason: 


        * `ACCT` - Paying or receiving user's transactional account closed

        * `BLCK` - Paying or receiving user's transactional account blocked

        * `CCLD` - Recurring payments authorization cancelled

        * `FAIL` - Settlement process failure or error

        * `OTHR` - Paying or receiving user requested cancellation for other
        reasons

        * `SLBD` - Paying user request

        * `SLCR` - Receiving user request
      type: string
      enum:
        - ACCT
        - BLCK
        - CCLD
        - FAIL
        - OTHR
        - SLBD
        - SLCR
      example: ACCT
    PaymentOrderReasonDescription:
      description: |
        Payment order cancellation reason desciption
      type: string
      example: Paying user's account has been closed.
    PaymentOrderResponse:
      type: object
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        recurrence_id:
          $ref: '#/components/schemas/RecurrenceID'
        end_to_end_id:
          $ref: '#/components/schemas/EndToEndID'
        type:
          $ref: '#/components/schemas/PaymentOrderType'
        status:
          $ref: '#/components/schemas/PaymentOrderStatus'
        transaction_identification:
          $ref: '#/components/schemas/TransactionIdentification'
        calendar:
          type: object
          properties:
            due_date:
              $ref: '#/components/schemas/CalendarDueDate'
            working_day:
              $ref: '#/components/schemas/CalendarWorkingDay'
        amount:
          $ref: '#/components/schemas/Amount'
        dynamic_amount:
          $ref: '#/components/schemas/DynamicAmount'
        additional_information:
          $ref: '#/components/schemas/AdditionalInformation'
        max_payment_amount:
          $ref: '#/components/schemas/MaxPaymentAmount'
        min_amount_allowed:
          $ref: '#/components/schemas/MinPaymentAmount'
        reason:
          type: object
          properties:
            code:
              $ref: '#/components/schemas/PaymentOrderReason'
            description:
              $ref: '#/components/schemas/PaymentOrderReasonDescription'
        payer:
          oneOf:
            - $ref: '#/components/schemas/Payer'
            - $ref: '#/components/schemas/NullType'
        payee:
          $ref: '#/components/schemas/Payee'
        debtor:
          $ref: '#/components/schemas/Debtor'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    PaymentOrderStatus:
      description: >
        Payment order status: 


        * `PENDING` - Payment order exists in the database.

        * `WAITING_CUSTOMER`- Waiting on the payee to update the payment order
        amount. Refer to the [Update order](ref:update-order-automatic-pix)
        endpoint.

        * `REGISTERED` - Payment order was registered to SPI instant payment
        system. 

        * `ACTIVE` - Payer PSP accepted payment order.

        * `REJECTED` - Payer PSP rejected payment order. Check `reason.code` and
        `reason.description`.

        * `CANCELLING` - Payment order was previously accepted, cancel process
        has begun. and it's waiting on counterparty acknowledgement.

        * `CANCELLED` - Payment order was previously accepted and then
        cancelled. Check `reason.code` and `reason.description`.

        * `EXPIRED` - Pix transaction was not found by the due date. Will
        trigger retry if applicable to the recurrence.

        * `CONCLUDED` - Pix transaction was found and payment order is
        concluded.
      type: string
      enum:
        - PENDING
        - WAITING_CUSTOMER
        - REGISTERED
        - ACTIVE
        - CANCELLED
        - CANCELLING
        - EXPIRED
        - REJECTED
        - CONCLUDED
      example: PENDING
    PaymentOrderType:
      type: string
      description: >
        Payment order type:

        * `SCHEDULE` - Default type for recurring payments within the regular
        term.

        * `RETRY_OVERDUE` - Attempted collection after original due date when
        payment has not been made.

        * `RETRY_ERROR` - Intraday reprocessing due to technical or operational
        failures in payment processing.


        **Pismo code** | **SPI code**

        ----------    | ----------- 

        `SCHEDULE`      | `AGNT` 

        `RETRY_OVERDUE` | `RFIL`

        `RETRY_ERROR`   | `NTAG` 
      enum:
        - SCHEDULE
        - RETRY_OVERDUE
        - RETRY_ERROR
      example: SCHEDULE
    PaymentType:
      type: string
      description: |
        Payment type.
        * `IMMEDIATE` - Immediate payment. 
        * `FRAUD` - Payment due to suspected fraud.
        * `SCHEDULED` - Scheduled payment.
      enum:
        - IMMEDIATE
        - FRAUD
        - SCHEDULED
      example: IMMEDIATE
    PerPage:
      type: integer
      description: Max number of items per page.
      example: 10
    PersonType:
      type: string
      description: |
        Person type:  
        * `LEGAL_PERSON` - An actual person with legal rights.
        * `NATURAL_PERSON` - An entity, such as an organization or company.
      enum:
