    pix.QRCodeRequest:
      required:
        - emv
      type: object
      properties:
        emv:
          type: string
          description: >
            BR Code in the Europay, Mastercard, Visa (EMV) format. 


            A BR Code is the standard for QR Codes in Brazil and is commonly
            known as *Boleto Bancario*. A vendor or service provider generates a
            Boleto Bancario with the necessary information such as the payer's
            name, the payment amount, the due date, and the vendor's
            information.
          example: >-
            00020126410014BR.GOV.BCB.PIX0119102785947@email.com5204000053039865802BR5915Teste
            do Fulano6009SAO PAULO61080550900062070503***630495F6
        desired_payment_date:
          type: string
          description: >
            Desired payment date, format = yyyy-mm-dd


            This field is used to calculate fees and discounts on QR codes with
            the due date.
          example: '2021-11-18'
