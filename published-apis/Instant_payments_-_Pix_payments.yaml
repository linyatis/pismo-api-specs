        next_execution:
          $ref: '#/components/schemas/scheduler.Execution'
    SchedulerCycle:
      type: object
      description: >
        Cycle property present for scheduler `type` = `RECURRING`. Defaults to
        `MONTHLY`.
      properties:
        type:
          type: string
          description: Recurring cycle type
          enum:
            - DAILY
            - WEEKLY
            - MONTHLY
            - YEARLY
          example: MONTHLY
        count:
          type: integer
          description: Cycle count for generating new transactions
          example: 1
    SchedulerID:
      type: string
      description: Scheduled PIX transaction ID
      example: 7b29a055-00e1-41e5-b880-aebe517b3bf6
    SchedulerStatus:
      type: string
      description: Scheduler status
      enum:
        - DELIVERED
        - PROCESSING
        - CANCELLED
        - SUCCESS
        - FAIL
        - PENDING
      example: DELIVERED
    SchedulerStatus2:
      type: string
      description: Scheduler status
      enum:
        - ACTIVE
        - INACTIVE
        - CANCELLED
        - COMPLETED
      example: COMPLETED
    SettledValue:
      type: number
      description: >-
        Settlement value. Amount to transfer after all charges have been
        applied.
      example: 10.15
    TotalItems:
      type: integer
      description: Total number of items
      example: 1000
    TransactionIdentification:
      type: string
      description: >-
        Transaction ID from a successful payment. Mandatory for the `AUT3`
        journey.
      maxLength: 35
      example: ttx2020010300000000000000000000001
    TransactionStatus:
      type: string
      description: |
        Current transaction status:

          * `VALIDATED` - Payload was validated and sent to provider
            
          * `PROCESSING` - Waiting response from the provider
            
          * `SETTLED` - Transaction confirmed
            
          * `CANCELLED` - Transaction cancelled
            
          * `ERROR` - Transaction error during processing
      enum:
        - PROCESSING
        - VALIDATED
        - SETTLED
        - CANCELLED
        - ERROR
      example: PROCESSING
    TransactionType:
      type: string
      description: >
        Type of transaction the QR Code validation generates.

        * `TRANSFER` - Standard immediate transfer payment. 

        * `CHANGE` - Occurs when the QR Code validation returns `CHANGE`. For
        example, the customer buys something and pays more than the product
        value to receive the difference in cash. 

        * `WITHDRAWAL` - Occurs when the QR Code validation returns `WITHDRAWAL`
        with `withdrawal` object values.

        * `REFUND_AUTOMATIC_PIX` - Total or partial to the PSP payer user within
        the Automatic Pix MED (Pix return mechanism) scope (only when initiated
        by a `MANUAL`).

        * `REFUND` = Total or partial refund to the paying user within the scope
        of MED 2.0, when this refund occurs from the PI Account of the user's
        PSP who participated in the distribution chain of the resources of the
        original transaction (only when initiated by a `MANUAL`)
      enum:
        - TRANSFER
        - CHANGE
        - WITHDRAWAL
        - REFUND_AUTOMATIC_PIX
        - REFUND
      example: TRANSFER
    TransferStatus:
      type: string
      description: Scheduled transfer status.
      example: SCHEDULED
      enum:
        - SCHEDULED
        - CANCELLED
        - SETTLED
        - FAILED
    UpdatedAt:
      type: string
      description: Scheduled item last updated time, RFC 3339 format
      example: '2024-11-14T17:54:40Z'
    UpdatePaymentOrderRequest:
      type: object
      description: Update payment order
      properties:
        amount:
          description: >-
            New amount value. Can be passed when recurrence has a dynamic
            amount. Payee-defined.
          example: 101.11
          type: number
    Urgency:
      type: string
      description: ' **REQUIRED** when `initiation_type` = `PAYMENT_INITIATOR`. Must be `NORMAL` in this case. Default is `HIGH`.'
      enum:
        - NORMAL
        - HIGH
      example: HIGH
