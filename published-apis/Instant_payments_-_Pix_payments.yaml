    pix.SignatureInfo:
      type: object
      description: >
        Signature information, including the digital signature over the request
        data that <a
        href="https://www.legislation.gov.uk/ukpga/2022/46/contents" that a PSTI
        validates. A Prestadores de Serviços de Tecnologia da Informação (PSTI)
        - Information and Technology Service Provider in English — is a
        technology service provider that connects to the banking/financial
        infrastructure (specifically the Rede do Sistema Financeiro Nacional –
        RSFN) on participants' behalf.


        The signature here is the digital signature standard using a private
        asymmetric key (<a
        href="https://www.geeksforgeeks.org/computer-networks/rsa-algorithm-cryptography/"
        target="_blank">RSA</a> or <a
        href="https://en.wikipedia.org/wiki/Elliptic-curve_cryptography"
        target="_blank">Elliptic Curve</a>) over an input buffer extracted from
        the request and provider-defined. 


        This field guarantees the request's integrity and authenticity and the
        transaction messaging non-repudiation (assurance that a party involved
        in a transaction cannot later deny their involvement) from customer to
        PSTI.


        For more information, refer to the  [Scheduled Pix-out transfer
        encryption](doc:pix-out-transfer-encryption) guide.


        **Note:** Customers should contact the PSTI to get more information
        about the encryption process and how to store the certificate related to
        the certificate thumbprint. Pismo acts as a pass-through entity in this
        process.
      required:
        - algorithm
        - certificate_thumbprint
        - signature
      properties:
        algorithm:
          type: string
          description: >
            The <a
            href="https://en.wikipedia.org/wiki/Digital_Signature_Algorithm"
            target="_blank">digital signature algorithm</a> (DSA). 
          enum:
            - ECDSA_P256_SHA256
            - ECDSA_P384_SHA384
            - Ed25519
            - RSA_PKCS1_SHA256
            - RSA_PSS_SHA256
          example: RSA_PKCS1_SHA256
        certificate_thumbprint:
          type: string
          description: >-
            The certificate thumbprint calculated using a <a
            href="https://en.wikipedia.org/wiki/SHA-2" target="_blank">SHA-256
            algorithm</a> and encoded in hexadecimal.
          maxLength: 128
          example: 3a2b4c1b...
        signature:
          type: string
          description: >
            The digital signature calculated over the payload (see the input
            buffer data and provider-defined format) according to the DSA
            standard and Base64 encoded.
          maxLength: 500
          example: MIIb2132b==
    pix.SimpleScheduledTransfer:
      required:
        - amount
        - payee
        - schedule_creation_datetime
        - schedule_datetime
        - schedule_id
        - status
      type: object
      properties:
