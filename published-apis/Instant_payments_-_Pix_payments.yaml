  /pix/v2/pix/out/scheduler:
    post:
      summary: Schedule transfer(s) V2
      description: >
        Schedule a Pix-out transfer or Pix-out recurring transfers. 


        This endpoint gives you more scheduling options than the version 1
        [Schedule
        transfer](https://developers.pismo.io/pismo-docs/reference/post-schedule)
        endpoint. These include additional options (`scheduler_details` object)
        for recurring transfers.


        As with the [Pix-out transfer](ref:post-pix-out-transfer) endpoint, if
        you are using a key or QR Code, you need to call  <a
        href="https://developers.pismo.io/pismo-docs/reference/post-v2-pix-keys-validate">Validate
        DICT key</a> or <a
        href="https://developers.pismo.io/pismo-docs/reference/post-qr-code">Get
        and validate QR Code</a> before calling this endpoint. You need to enter
        the `end_to_end_id` returned from those calls here. If you are not using
        a key or QR Code, this endpoint generates and returns an `end_to_end_id`
        value you can use in other endpoints.


        The `end_to_end_id` field is a Brazil Central Bank (BCB) requirement to
        track Pix transactions.  Basically, there are two steps to a Pix
        transaction: 1. Initialize a transaction and 2. Confirm a transaction.
        The `end_to_end_id` is sent to the BCB in both steps in order to
        identify all transaction information.


        This endpoint directly generates an [Instant pay scheduler status
        changed](https://developers.pismo.io/events/docs/instantpay-scheduler-scheduler-status-change-1)
        event.


        To create a recurring payment, set `type` = `RECURRING` and pass a value
        for `cycle`. This property has 2 attributes and should be set as shown
        in the sample table below: 


        `cycle.type` | `cycle.count` | New transaction created every:

        ---------- | ----------- | ------------ 

        `DAILY`      | 5           | 5 days

        `WEEKLY`     | 2           | 2 weeks

        `MONTHLY`    | 1           | 1 month

        `MONTHLY`    | 2           | 2 months

        `YEARLY`     | 1           | 1 year


        **Notes**


        * `WEEKLY` sets the `start_date` weekday. For a scheduler with
        `start_date` = Thursday, the next transaction is always on a Thursday.


        * `MONTHLY / YEARLY` sets the `start_date` day. For a scheduler with
        `start_date` = `2024-10-12`, the next transaction is always created on
        day 12 of each cycle count. Now, for days `29`, `30` and `31`, the
        scheduler uses the previous month's last day when that day doesn't exist
        in the current month. For example, considering a scheduler starting at
        `2024-01-30`, the next transaction is created on `2024-02-29`.


        **Events**


        * When the transfer takes place, <a
        href="https://developers.pismo.io/events/docs/pix-pix-out-1">Pix-out
        notification received</a> and <a
        href="https://developers.pismo.io/events/docs/pix-financial-reconciliation-1">Pix
        reconciliation notification received </a> events are generated.


        * Also, when the transfer takes place, a <a
        href="https://developers.pismo.io/events/docs/pix-pix-in-1">Pix-in
        notification received</a> event is generated when the funds are
        deposited in the payee's account, which can be a Pismo account or an
        external account.


        * For all events, the `status` or `result` field indicates operation
        success or failure.


        For more information, refer to the [Pix instant
        payments](doc:pix-instant-payments) guide.
      operationId: post-schedule-pix-payment
      tags:
        - Scheduled transfers V2
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/CIDheader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/scheduler.SchedulerRegisterRequest'
      responses:
        '201':
          description: Created
