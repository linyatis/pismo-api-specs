              $ref: '#/components/schemas/InterestValue'
            fine_value:
              $ref: '#/components/schemas/FineValue'
            settled_value:
              type: number
              description: >-
                Settlement value. Amount to be transferred after all charges
                have been applied.
              example: 10.15
        debtor:
          type: object
          description: >-
            Debtor information. The debtor could be the payer, or someone who
            made a purchase on the payer's behalf.
          properties:
            document_number:
              $ref: '#/components/schemas/DocumentNumber'
            name:
              $ref: '#/components/schemas/Name'
        end_to_end_id:
          type: string
          description: >
            This field is a Brazil Central Bank (BCB) requirement to track all
            steps of Pix transactions. 

            Basically, there are two steps to a Pix transaction:
              1. Initialize a transaction 
              2. Confirm a transaction

            The `end_to_end_id` is sent to the BCB in both steps in order to
            identify all transaction information.

            **REQUIRED** if you are using a Pix key or QR Code. 
          example: E3030629420200808195101608910248
        is_device_registered:
          $ref: '#/components/schemas/IsDeviceRegistered'
        initial_amount:
          $ref: '#/components/schemas/InitialAmount'
        initiator_document_number:
          type: string
          description: Payment initiator document number when `type` is `PAYMENT_INITIATOR`
          maxLength: 14
        payment_type:
          $ref: '#/components/schemas/PaymentType'
        psp_account:
          $ref: '#/components/schemas/pix.OutTransferPSPaccount'
        transaction_identification:
          type: string
          description: >
            This field is returned from the [Validate QR Code](ref:post-qr-code)
            endpoint.


            Transaction ID is **REQUIRED** when `initiation_type` is
            `DYNAMIC_QRCODE` and should not be passed otherwise. If a
            `STATIC_QRCODE` contains the transaction identification, it is also
            **REQUIRED** to pass it. 
          example: 1a84daf6-a61b-4aba-919a-a9943db7102e
        metadata:
          type: object
          description: >-
            Key-value fields for adding custom information to request. Total
            maximum object size = 3000 bytes.
        qr_code_additional_information:
          $ref: '#/components/schemas/QRcodeAddInfo'
        remittance_information:
          maxLength: 140
          type: string
          description: |
            Text payer wents to send to payment receiver.
        urgency:
          $ref: '#/components/schemas/Urgency'
        withdrawal:
          type: object
          description: >
            Withdrawal details. For QR codes and `CHANGE` and `WITHDRAWAL`
            transactions. For example:  a customer goes to a shop, makes a
            purchase, and also asks for cash back.
          properties:
            agent_modality:
              $ref: '#/components/schemas/AgentModality'
            amount:
              description: >-
                Amount's value made available. **REQUIRED** for `CHANGE` or
                `WITHDRAWAL`, cannot be sent for `TRANSFER`.
              example: 101.11
              type: number
            ispb_service_provider:
              type: string
              description: >
                <a
                href="https://bank.codes/numero-do-banco/bank/banco-central-do-brasil/"
                target="_blank">ISPB (Identifcador do Sistema de Pagamento
                Brazil)</a> - the Brazilian Payment System ID, an 8-digit value.
                **REQUIRED** for `CHANGE` or `WITHDRAWAL`.


                This is the ISPB for the withdrawal service provider.
              maxLength: 8
              example: '60701190'
            purchase_amount:
              description: Purchase amount. **REQUIRED** for `CHANGE`.
              example: 101.11
              type: number
        psp_transaction_created_at:
          $ref: '#/components/schemas/PSPtransactionCreatedAt'
        signature_info:
          $ref: '#/components/schemas/pix.SignatureInfo'
    pix.OutTransferPSPaccount:
      type: object
