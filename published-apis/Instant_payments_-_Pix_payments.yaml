    Debtor:
      type: object
      required:
        - document_number
        - document_type
        - name
      properties:
        document_number:
          $ref: '#/components/schemas/DocumentNumber'
        document_type:
          $ref: '#/components/schemas/PersonType'
        name:
          $ref: '#/components/schemas/Name'
    DiscountValue:
      type: number
      description: Discount value.
      example: 0.15
    DocumentNumber:
      type: string
      description: >
        A government document number, such as a Social Security number (US) or
        Cadastro de Pessoas Físicas number (Brazil). Must be numeric with 11-14
        digits.
      minLength: 1
      maxLength: 14
      example: '123412341234'
    DynamicAmount:
      type: boolean
      description: |
        Does recurrence have a dynamic amount? 

        If `true`, `min_payment_amount` is **REQUIRED**. 

        If `false`, `amount` is **REQUIRED**. Default is `false`.
      default: false
      example: false
    EndToEndID:
      type: string
      description: >
        This field is a Brazil Central Bank (BCB) requirement to track all steps
        of Pix transactions. 

        Basically, there are two steps to a Pix transaction:
            1. Initialize a transaction 
            2. Confirm a transaction
        The `end_to_end_id` is sent to the BCB in both steps in order to
        identify all transaction information. 
      example: E3030629420200808195101608910248
    ExecutionID:
      type: integer
      description: Sequential number incremented for each scheduled transfer execution.
      example: 2
    ExecutionStatus:
      type: string
      description: Execution status
      enum:
        - PENDING
        - SUCCESS
        - FAIL
        - CANCELLED
        - PROCESSING
        - DELIVERED
      example: PENDING
    ExpirationDate:
      type: string
      format: datetime
      description: >-
        Authorization expiration date. RFC 3339 value. Format =
        YYYY-MM-DDThh:mm:ss.SSSZ
      example: '2020-08-13T13:49:03.000Z'
    ExpirationDateCreateRecRequest:
      type: string
      format: datetime
      description: >
        Authorization expiration date, must be at least 2 days before the
        `first_payment_date`. 


        RFC 3339 value. Format = YYYY-MM-DDThh:mm:ss.SSSZ


        If not passed,  the `expiration_date` is automatically generated, up to
        2 days before the `first_payment_date`, or a maximum of 30 days from the
        current date, whichever is due first
      example: '2020-08-13T13:49:03.000Z'
    FineValue:
      type: number
      description: Fine value.
      example: 5.15
    FirstPaymentDate:
      type: string
      format: datetime
      description: First charge/payment date. Format = yyyy-mm-dd
      example: '2025-04-25'
    FirstPaymentDateCreateRecRequest:
      type: string
      format: datetime
      description: >-
        First charge/payment date, must be more than 2 days ahead the recurrence
        creation date. Format = yyyy-mm-dd
      example: '2025-04-25'
    FlexControls:
      type: object
      description: >
        [Flex control
        ID](https://developers.pismo.io/pismo-docs/docs/flex-controls#pix-and-accounts)
        and schedule limit checking before creating a new scheduler.
      required:
        - pix_limit_id
      properties:
        pix_limit_id:
          type: string
          description: Rule ID for scheduled Pix limit
          example: 279207b0-d553-424e-a454-8d704cca3702
    FrequencyType:
      type: string
      description: Recurrence payment type
      enum:
        - WEEK
        - MONTH
        - QUARTER
        - SEMESTER
        - YEAR
      example: MONTH
    HistoryItem:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/RecurrenceStatus'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    IdempotencyKey:
      type: string
      description: Idempotency key
      example: d2c3f4e5-6a7b-8c9d-e0f1-2g3h4i5j6k7l
    InitialAmount:
      type: string
      description: The initial purchase price amount before charges or withdrawal changes.
      example: '10.02'
    InitiationType:
      type: string
      enum:
        - MANUAL
        - DICT
        - STATIC_QRCODE
        - DYNAMIC_QRCODE
        - PAYMENT_INITIATOR
        - AUTOMATIC_PIX
        - DYNAMIC_PROXIMITY_PIX
        - STATIC_PROXIMITY_PIX
      maxLength: 20
      description: |
        Initiation type:  

          `MANUAL` - Manually initiated. Key is not used - bank account, bank code, document number, and branch are used for identification.

          `DICT` - Diretorio de Identificadores de Contas de Transacapo (Transaction accounts ID directory). Pix/DICT key is used for identification.

          `STATIC_QRCODE` - Reusable code that contains only the data necessary to complete a transaction. When using static QR Code, the transaction amount must be provided manually.

          `DYNAMIC_QRCODE` - The amount and other details for a dynamic code are included automatically. 
          
          `PAYMENT_INITIATOR` - Payment provider initiated. A payment initiator is a 3rd party that has obtained authorization from the Central Bank and has an <a href="https://www.bcb.gov.br/en/financialstability/open_finance" target="_blank">Open Finance</a> certification.

          `AUTOMATIC_PIX` - Payment order initiated via automatic PIX.
          
          `DYNAMIC_PROXIMITY_PIX` - Dynamic Near Field Communications (NFC) based initiation.

          `STATIC_PROXIMITY_PIX` - Static NFC-based initiation.
      example: DICT
    ScheduleInitiationType:
      type: string
      enum:
        - MANUAL
        - DICT
        - STATIC_QRCODE
        - DYNAMIC_QRCODE
      maxLength: 20
      description: |
        Initiation type:  

          `MANUAL` - Manually initiated. Key is not used - bank account, bank code, document number, and branch are used for identification.

          `DICT` - Diretorio de Identificadores de Contas de Transação (Transaction accounts ID directory). Pix/DICT key is used for identification.

          `DYNAMIC_QRCODE` - The amount and other details for a dynamic code are included automatically. 
      example: DICT
    InitiationType2:
      type: string
      enum:
        - MANUAL
        - DICT
        - STATIC_QRCODE
        - DYNAMIC_QRCODE
      maxLength: 20
      description: |
        Initiation type:  

          `MANUAL` - Manually initiated. Key is not used - bank account, bank code, document number, and branch are used for identification.

          `DICT` - Diretorio de Identificadores de Contas de Transação (Transaction accounts ID directory). Pix/DICT key is used for identification.

          `DYNAMIC_QRCODE` - The amount and other details for a dynamic code are included automatically. 
          
      example: DICT
    InterestValue:
      type: number
      description: Interest value.
      example: 20.15
    Internal:
      type: boolean
      description: >-
        Was transaction made between a Pismo organization's accounts? In this
        case, the instant payment system is not called.
      example: false
    Interval:
      type: string
      description: Scheduler interval
      enum:
        - DAY
        - WEEK
        - MONTH
    IsDeviceRegistered:
      type: boolean
      description: Is device registered to do a Pix-out transfer? Default is `true`.
      example: true
    ISPB:
      type: string
      description: >-
        <a
        href="https://bank.codes/numero-do-banco/bank/banco-central-do-brasil/"
        target="_blank">ISPB (Identifcador do Sistema de Pagamento Brazil)</a> -
        the Brazilian Payment System ID, an 8-digit value.
      maxLength: 8
      example: '60701190'
    IsWorkingDays:
      type: boolean
      description: If the recurrence will only execute on working days
      example: false
    JourneyType:
      type: string
      description: |
        Recurrence payment type: 
         `AUT1` - Bank notification. If the merchant has the payer's banking information, a push notification can be sent directly to the payer's bank app, prompting them to authorize the recurring payment.
         
         `AUT2` - Authorization via QR Code. Payer scans a merchant provided QR Code to authorize recurring payments. This method does not initiate an immediate payment, allowing the first payment to be scheduled for a later date.
         
         `AUT3` - Authorization via QR Code with first payment.  Similar to the second method, but the QR Code includes information for both the authorization and the initial payment, enabling the payer to authorize the recurring payment and make the first payment in a single step.
         
         `AUT4` - Post-payment sign-up path. After completing a one-time payment via QR Code, the payer is offered the option to authorize recurring payments for future transactions

         For more information, refer to [Pix automatic use cases (journeys)](doc:pix-automatic-beta-copy-2#pix-automatic-use-cases-journeys).
      enum:
        - AUT1
        - AUT2
        - AUT3
        - AUT4
      example: AUT1
    Key:
      maxLength: 77
      type: string
      description: Pix key value.
      example: email@email.com
    LastID:
      type: integer
      description: Last returned item ID. Use this ID to get more results.
      example: 1602619
    LastPaymentDate:
      type: string
      format: datetime
      description: Last charge/payment date. Format = yyyy-mm-dd
      example: '2026-06-10'
    MaximumDebitAllowed:
      type: number
      description: Maximum debit allowed in recurrence authorization.
      example: 86753.09
    MaxPaymentAmount:
      type: number
      description: Maximum payment amount for dynamic amount recurrences, defined by payer.
      example: 86753.09
    MinPaymentAmount:
      type: number
      description: Minimum payment amount for dynamic amount recurrences, defined by payee.
      example: 10.09
    Name:
      type: string
      description: Name
      maxLength: 200
      example: Walter Melon
    NextPage:
      type: boolean
      description: Are tbere more results?
      example: false
    NullType:
      title: Null type reference
      description: Used to add nullability to a ref
      enum:
        - null
    NumberElements:
      type: number
      description: Total items returned in query
    PageSize:
      type: number
      description: Maximum elements returned per query.
    PatchRecurrenceRequest:
      type: object
      description: Payload with available fields to update a recurrence.
