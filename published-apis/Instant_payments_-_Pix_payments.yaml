openapi: 3.1.0
info:
  title: Instant payments - Pix payments
  description: API to handle Pix transactions
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
  version: '1.0'
servers:
  - url: https://sandbox-cdn.pismolabs.io
    description: Sandbox API server for testing
  - url: https://sandbox-cdn.pismolabs.io/inst-pull-pay
    description: Sandbox API server for testing instant pull pay.
tags:
  - name: Pix
  - name: Scheduled transfers V2
  - name: Scheduled transfers
  - name: Withdrawal services
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AccountIdHeader:
      name: x-account
      in: header
      schema:
        type: integer
      description: Pismo account ID.
      required: true
      example: 5869300
    AccountIDpath:
      name: account_id
      in: path
      schema:
        type: integer
      description: Pismo account ID.
      required: true
      example: 5869300
    AfterIdQuery:
      in: query
      name: afterId
      description: >-
        Last returned item ID from response. Use this field to return more
        results.
      required: false
      schema:
        type: string
    AuthHeader:
      in: header
      name: Authorization
      required: true
      description: >-
        Account token - an access token encoded with a Pismo account ID. Tokens
        can expire quickly, which can result in a <b>401 Unauthorized</b>
        message.
      schema:
        type: string
        example: Bearer eyJhbGci...IUzUx
    AutomaticPixExecutionStatusQuery:
      name: status
      in: query
      required: true
      schema:
        type: string
        enum:
          - CREATED
          - EXPIRED
          - ACCEPTED
          - REJECTED
          - CANCELLED
          - RECEIVED
      description: Execution status filter
      example: CREATED
    AutomaticPixExecutionStatusOptionalQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - CREATED
          - EXPIRED
          - ACCEPTED
          - REJECTED
          - FINISHED
          - CANCELLED
          - APPROVED
      description: Execution status filter
      example: CREATED
    BeginDateQuery:
      name: beginDate
      in: query
      description: >
        Begin date filter. RFC 3339 format. For example:
        `2023-04-12T23:20:50.52Z`. 


        Maximum days allowed between `beginDate` and `endDate` is 30.
      required: true
      schema:
        type: string
      example: '2023-04-12T23:20:50.52Z'
    BeginDateQuery2:
      name: beginDate
      in: query
      description: >
        Begin creation date for scheduler executions filter. Format =
        yyyy-mm-dd.
      schema:
        type: string
      example: '2023-04-12'
    BeginDateQueryOptional:
      name: beginDate
      in: query
      description: >
        Begin date filter. RFC 3339 filter. For example:
        `2023-04-12T23:20:50.52Z`. 


        Maximum days allowed between `beginDate` and `endDate` is 30.
      required: false
      schema:
        type: string
      example: '2023-04-12T23:20:50.52Z'
    CIDheader:
      name: x-cid
      description: >
        The Correlation ID UUID field links related API requests and events. The
        `x-cid` can help the Pismo engineering team track everything related to
        a call. If not passed, this field is automatically generated.
      in: header
      required: false
      schema:
        type: string
    EndDateQuery:
      name: endDate
      in: query
      description: >
        End date filter. RFC 3339 format. For example:
        `2023-04-12T23:20:50.52Z`. 


        Maximum days allowed between `beginDate` and `endDate` is 30.
      required: true
      schema:
        type: string
      example: '2023-04-12T23:20:50.52Z'
    EndDateQuery2:
      name: endDate
      in: query
      description: |
        End creation date for scheduler executions filter. Format = yyyy-mm-dd.
      schema:
        type: string
      example: '2023-04-12'
    EndDateQueryOptional:
      name: endDate
      in: query
      description: >
        End date filter. RFC 3339 format. For example:
        `2023-04-12T23:20:50.52Z`. 


        Maximum days allowed between `beginDate` and `endDate` is 30.
      required: false
      schema:
        type: string
      example: '2023-04-12T23:20:50.52Z'
    EndToEndIDpath:
      name: end_to_end_id
      in: path
      description: >-
        Transaction end-to-end ID. This field is a Brazil Central Bank (BCB)
        requirement to track all Pix transaction steps.
      required: true
      schema:
        type: string
    EndToEndIDquery:
      name: endToEndId
      in: query
      schema:
        type: string
      description: >
        Transaction end-to-end ID filter. This field is a Brazil Central Bank
        (BCB) requirement to track all Pix transaction steps.
      required: true
    ExecutionIDpath:
      name: execution_id
      in: path
      description: Sequential number incremented for each scheduled transfer execution.
      required: true
      schema:
        type: string
    ExecutionStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - PENDING
          - SUCCESS
          - FAIL
          - CANCELLED
          - PROCESSING
          - DELIVERED
      description: Execution status filter
      example: PENDING
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      description: >
        A unique ID to ensure the operation remains idempotent, allowing for
        operation repitition without causing unintended effects or duplication.
        An idempotent operation is one that can be applied multiple times, yet
        the outcome remains the same. it ensures that network errors, retries,
        or failures can occur without introducing inconsistencies.
      required: true
      schema:
        type: string
    ISPBquery:
      in: query
      name: ispb
      schema:
        type: string
        maxLength: 8
      description: >-
        <a
        href="https://bank.codes/numero-do-banco/bank/banco-central-do-brasil/"
        target="_blank">ISPB (Identifcador do Sistema de Pagamento Brazil)</a> -
        the Brazilian Payment System ID, an 8-digit value.
      required: true
    ISPBtransmitterQuery:
      in: query
      name: ispbTransmitter
      schema:
        type: string
        maxLength: 8
      description: >-
        <a
        href="https://bank.codes/numero-do-banco/bank/banco-central-do-brasil/"
        target="_blank">ISPB (Identifcador do Sistema de Pagamento Brazil)</a> -
        the Brazilian Payment System ID, an 8-digit value. The ISPB transmitter
        ensures the payment request is directed to the correct receiving
        institution based on the ISPB code associated with the beneficiary's
        account.
      required: true
    lastEvaluatedCreationDatetimeQuery:
      name: lastEvaluatedCreationDatetime
      in: query
      description: >-
        This is the `last_evaluated_creation_datetime` field in the returned
        result and is used to get the next page of results in a subsequent
        request.

        RFC 3339 format. For example -  "2023-04-12T23:20:50.52Z". 
      schema:
        type: string
    limitQuery:
      in: query
      name: limit
      description: Maximum number of agents to return. Default is all.
      schema:
        type: integer
      example: 20
    OrderQuery:
      name: order
      in: query
      description: >
        Order to return items: `ASC` = ascending order, `DESC` = descending.
        Default is `DESC`.
      schema:
        type: string
        enum:
          - ASC
          - DESC
    OrgIdHeader:
      name: x-tenant
      in: header
      description: |
        Organization ID
      schema:
        type: string
    PageQuery:
      name: page
      in: query
      description: Page number. Default = `1`.
      required: true
      schema:
        type: string
      example: '1'
    PaymentOrderStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - PENDING
          - WAITING_CUSTOMER
          - REGISTERED
          - ACTIVE
          - CANCELLED
          - CANCELLING
          - EXPIRED
          - REJECTED
          - CONCLUDED
      description: Payment order status filter
      example: PENDING
    PerPageQuery:
      name: perPage
      in: query
      description: Per page amount (min=1, max=100). Default is `20`.
      required: true
      schema:
        type: string
    RecurrenceIdPath:
      name: recurrence_id
      in: path
      description: BACEN (Brazil Central Bank) recurrence ID
      required: true
      schema:
        type: string
    RecurrenceIdQuery:
      name: recurrenceId
      in: query
      description: BACEN (Brazil Central Bank) recurrence ID filter
      required: true
      schema:
        type: string
    ReversalEndToEndIDquery:
      name: reversalEndToEndId
      in: query
      description: Reversal end-to-end ID filter.
      schema:
        type: string
    RoleTypeQuery:
      name: roleType
      in: query
      required: true
      schema:
        type: string
        enum:
          - PAYEE
          - PAYER
      description: Role type filter.
    ScheduleBeginDatetimeQuery:
      name: scheduleBeginDatetime
      in: query
      description: >
        Schedule datetime begin filter. RFC 3339 value, for example:
        `2023-04-12T23:20:50.52Z`. 
      schema:
        type: string
    ScheduleEndDatetimeQuery:
      name: scheduleEndDatetime
      in: query
      description: >
        Schedule datetime end filter. RFC 3339 value, for example:
        `2023-04-12T23:20:50.52Z`. 
      schema:
        type: string
    ScheduleCreationBeginDatetimeQuery:
      name: scheduleCreationBeginDatetime
      in: query
      description: >
        Schedule creation datetime begin filter. RFC 3339 value, for example:
        `2023-04-12T23:20:50.52Z`. 
      schema:
        type: string
    ScheduleCreationEndDatetimeQuery:
      name: scheduleCreationEndDatetime
      in: query
      description: >
        Schedule creation datetime end filter. RFC 3339 value, for example:
        `2023-04-12T23:20:50.52Z`. 
      schema:
        type: string
    ScheduleIdPath:
      name: scheduler_id
      in: path
      description: Schedule ID
      required: true
      schema:
        type: string
        maxLength: 36
      example: '8675309'
    ScheduleIdQuery:
      name: schedulerId
      in: query
      description: Schedule ID filter
      required: false
      schema:
        type: string
        maxLength: 36
      example: '8675309'
    SchedulerIntervalQuery:
      in: query
      name: interval
      required: false
      schema:
        type: string
        enum:
          - DAY
          - WEEK
          - MONTH
      description: Scheduler interval filter
      example: DAY
    SchedulerStatusQuery:
      name: status
      in: query
      schema:
        type: string
        enum:
          - ACTIVE
          - INACTIVE
          - CANCELLED
          - COMPLETED
      description: Scheduler status filter
      required: false
      example: ACTIVE
    SchedulerTypeQuery:
      name: type
      in: query
      required: false
      schema:
        type: string
        enum:
          - ONCE
          - RECURRING
      description: Scheduler type filter
      example: ONCE
    TransactionTypePath:
      name: type
      in: path
      description: Pix transaction type
      schema:
        type: string
        enum:
          - PIX-IN
          - PIX-OUT
          - PIX-IN-REVERSAL
          - PIX-OUT-REVERSAL
      required: true
      example: PIX-IN
    TransactionTypeQuery:
      name: type
      in: query
      description: Pix transaction type filter
      schema:
        type: string
        enum:
          - PIX_IN
          - PIX_OUT
          - PIX_IN_REVERSAL
          - PIX_OUT_REVERSAL
      example: PIX_IN
  schemas:
    AccountID:
      type: integer
      description: Pismo account ID.
      example: 5869300
    AccountNumber:
      type: string
      description: Account number.
      maxLength: 20
      example: '98765432'
    AccountNumber2:
      type: string
      description: Payer's account number.
      maxLength: 20
      example: '98765432'
    AccountType:
      type: string
      enum:
        - CACC
        - SLRY
        - SVGS
        - TRAN
      maxLength: 4
      description: |
        Account type:  
          `CACC` - Checking/current account.  Known as "conta corrente" in Portuguese, this is a bank account type designed for everyday financial transactions and is the most common type individuals and businesses use for day-to-day banking.
          `SVGS` - Savings account
          `TRAN` - Payment account. Payment institutions offer payment accounts to move funds and make payments, while banks offer checking accounts that include full financial services such as credit and investments.
          `SLRY` - Salary account. Employer deposits a fixed amount every month.
      example: TRAN
    AdditionalInformation:
      type: string
      description: Additional information
      maxLength: 105
    AgentModality:
      type: string
      description: >
        Withdrawal service agent. **REQUIRED** for `CHANGE` and `WITHDRAWAL`
        transactions.  
          * `AGTEC` - Agente estabelecimento comercial. For commercial establishment.
          * `AGFSS` - Agente Facilitador de Serviço de Saque. For cash machine.
          * `AGTOT` - Agente Outra Espécie de Pessoa Jurídicas ou correspondente no País. Withdrawal service facilitator.
      enum:
        - AGTEC
        - AGTOT
        - AGPSS
      example: AGTEC
    AllowAttemptsAfterExpiration:
      type: boolean
      description: Will charge continue after due date?
    AllowsValueChange:
      type: boolean
      description: Can the payer change the final amount?
      example: false
    Amount:
      type: number
      description: Amount to be transferred.
      example: 1050.44
    ApproveAuthorizationStatus:
      type: string
      description: "\nAuthorization status: \n\n  * `CREATED`\t  - Receiver created authorization.\n  * `RECEIVED`  - Payer's PSP received authorization.\n  * `ACCEPTED`  - Payer accepted authorization.\n  * `REJECTED`  - Payer rejected authorization.\n  * `EXPIRED`   - Payer's PSP did not accept authorization before expiration date.\n  * `CANCELLED` - Receiver cancelled authorization.\n"
      enum:
        - CREATED
        - RECEIVED
        - ACCEPTED
        - REJECTED
        - EXPIRED
        - CANCELLED
      example: REJECTED
    Authorization:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/AuthorizationID'
        role_type:
          $ref: '#/components/schemas/RoleType'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        account_id:
          $ref: '#/components/schemas/AccountID'
        recurrence_id:
          $ref: '#/components/schemas/RecurrenceID'
        expiration_date:
          $ref: '#/components/schemas/ExpirationDate'
        provider_created_at:
          $ref: '#/components/schemas/CreatedAt'
        provider_updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        maximum_debit_allowed:
          oneOf:
            - $ref: '#/components/schemas/MaximumDebitAllowed'
            - $ref: '#/components/schemas/NullType'
        reason_code:
          $ref: '#/components/schemas/AuthorizationReasonCode'
        payer:
          oneOf:
            - $ref: '#/components/schemas/Payer'
            - $ref: '#/components/schemas/NullType'
        rec_payload:
          oneOf:
            - $ref: '#/components/schemas/RecurrenceDetails'
            - $ref: '#/components/schemas/NullType'
    AuthorizationID:
      type: string
      description: >-
        Authorization ID the same as BACEN (Brazil Central Bank) IdSoliReq
        (request identification code)
      example: IS0435879820240605bcdb1fhn43a
    AuthorizationReasonCode:
      type: string
      description: >
        Authorization reason code. 


        **Note:** "pain.009" is a message sent to the payer when the payee
        starts a #1 journey (`AUT1`) Automatic Pix recurrence


        * `AC01` - Account not found or not belonging to the paying user

        * `AC04` - Paying user's transactional account is closed

        * `AC06` - Paying user's transactional account is blocked

        * `AP01` - Discrepancy in the field for updating periodic payments
        recurrence data and the periodic payments recurrence status - lack of
        synchronization

        * `AP02` - Paying user's CPF/CNPJ  not found or different from the one
        in the original pain.009. Or, in the case of cancellation, the paying
        user's CPF/CNPJ does not match the one contained in the perioduc
        payments recurrence data.

        * `AP03` - Paying user's branch not found

        * `AP04` - Invalid recurrence ID or does not match the original

        * `AP05` - Inconsistent recurrence status for periodic payments

        * `AP06` - Receiving user's CPF/CNPJ is different from the one in the
        pain.009 or the payload. Or, in the case of cancellation, the receiving
        user's CPF/CNPJ does not match the one contained in the periodic
        payments recurrence data.

        * `AP07` - Paying user's recurrence confirmation performed after the
        confirmation request's expiration or cancellation (pain.009)

        * `AP08` - First immediate payment associated with the recurrence was
        not identified. (Valid only for Authorization Journey 3 (`AUT3`))

        * `AP09` - Recurrence confirmation request for periodic payments was not
        identified to enable its cancellation

        * `AP10` - Cancellation requestor's CPF/CNPJ does not match the the
        paying/receiving user's or the paying/receiving PSP's identification
        contained in the periodic payments recurrence data.

        * `AP11` - Paying PSP's ISPB diverges from the information contained in
        the recurrence for periodic payments

        * `AP12` - Receiving PSP's ISPB diverges from the information contained
        in the recurrence for periodic payments

        * `AP13` = Paying user rejects periodic payments recurrence confirmation
        request due to receiving user non-recognition

        * `AP14` - Paying user rejects periodic payments recurrence confirmation
        request due to receiving user's lack of interest in using Pix Automatic

        * `AP15` - Paying user's participant rejects recurrence confirmation
        request for periodic payments as they chose not to offer Pix Automatic
        usage for corporate clients

        * `CH16` - Incorrect or incompatible message content with business rules

        * `MD01` - Cancellation request's recurrence object does not exist.
        Should not be used for cancellation requests of pain.009 with status =
        `PDNG`. That is, a recurrence with status = `PDNG` should be considered
        as an existing recurrence.

        * `MD20` - Cancellation request's recurrence object has already expired.
      enum:
        - AC01
        - AC04
        - AC06
        - AP01
        - AP02
        - AP03
        - AP04
        - AP05
        - AP06
        - AP07
        - AP08
        - AP09
        - AP10
        - AP11
        - AP12
        - AP13
        - AP14
        - AP15
        - CH16
        - MD01
        - MD20
      example: AC01
    AuthorizationRejectedReasonCodeRequest:
      type: string
      description: >
        Rejected authorizations reason code 

        * `AP13` - Paying user rejects recurrence confirmation for periodic
        payments due to receiving user not recognized

        * `AP14` - Paying user rejects recurrence confirmation for periodic
        payments due to receiving user not interested in using Automatic Pix
      enum:
        - AP13
        - AP14
      example: AP14
    AuthorizationRequest:
      type: object
      description: Authorization request
      required:
        - id
        - status
      properties:
        recurrence_id:
          $ref: '#/components/schemas/RecurrenceID'
        status:
          $ref: '#/components/schemas/ApproveAuthorizationStatus'
        reason_code:
          $ref: '#/components/schemas/AuthorizationRejectedReasonCodeRequest'
        max_payment_amount:
          $ref: '#/components/schemas/MaxPaymentAmount'
        journey_type:
          $ref: '#/components/schemas/JourneyType'
        payment_date_time:
          $ref: '#/components/schemas/PaymentDateTime'
        transaction_identification:
          $ref: '#/components/schemas/TransactionIdentification'
    AuthorizationResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/AuthorizationID'
        recurrence_id:
          $ref: '#/components/schemas/RecurrenceID'
        cid:
          $ref: '#/components/schemas/Cid'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        journey_type:
          $ref: '#/components/schemas/JourneyType'
        status:
          $ref: '#/components/schemas/ApproveAuthorizationStatus'
    BacenReasonCode:
      type: string
      description: >
        Cancellation reason code:   


        * `ACCL` - Paying receiving user's account cancelled

        * `CPCL` - Receiving company closure

        * `DCSD` - Paying user death 

        * `ERSL` - Receiving user, or their participant, request cancelled due
        to confirmation request error

        * `FRUD` - Fraud

        * `PCFD` - Receiving user participant request because the same
        recurrence was confirmed another way, for example, via QR Code

        * `SLCR` - Receiving user request

        * `SLDB` - Paying user request

        * `NRES` - Receiving PSP request due to lack of response to pain.009
        within the regulatory period
      enum:
        - ACCL
        - CPCL
        - DCSD
        - ERSL
        - FRUD
        - PCFD
        - SLCR
        - SLDB
        - NRES
      example: ACCL
    Bank:
      type: string
      description: >-
        <a
        href="https://bank.codes/numero-do-banco/bank/banco-central-do-brasil/"
        target="_blank">ISPB (Identifcador do Sistema de Pagamento Brazil)</a> -
        the Brazilian Payment System ID for the receiving bank, an 8-digit
        value.
      maxLength: 8
      example: '237'
    BeneficiaryID:
      type: string
      maxLength: 36
      description: >
        Beneficiary ID. This ID created when the [Register
        beneficiary](ref:post-intl-bank-accounts-v1-bank-accounts-beneficiaries)
        endpoint is called.
      example: 97c96d96-9b87-404b-88e5-287f2b0e6e0a
    Branch:
      type: string
      description: This could be a bank-assigned branch ID or the branch's ISPB number.
      maxLength: 4
      example: '011'
    CancelRecurrenceRequest:
      type: object
      description: Cancel recurrence request
      required:
        - recurrence_id
        - reason_code
      properties:
        recurrence_id:
          $ref: '#/components/schemas/RecurrenceID'
        reason_code:
          $ref: '#/components/schemas/BacenReasonCode'
    CityCode:
      type: string
      description: >-
        The <a href='https://www.ibge.gov.br/explica/codigos-dos-municipios.php'
        target="_blank">IBGE</a> (Instituto Brasileiro de Geografia e
        Estatística) city code.
      example: '3550308'
    CancellatedAt:
      type: string
      description: 'Cancellation date time, RFC 3339 format: YYYY-MM-DDThh:mm:ssZ.'
      example: '2024-11-14T17:54:40Z'
    CalendarDueDate:
      type: string
      description: Calendar due date
      example: '2030-10-10'
    CalendarWorkingDay:
      type: boolean
      description: Calendar working day?
      example: false
    CancelPaymentOrderRequest:
      type: object
      description: Cancel payment order request
      required:
        - end_to_end_id
        - reason
      properties:
        end_to_end_id:
          $ref: '#/components/schemas/EndToEndID'
        reason:
          $ref: '#/components/schemas/PaymentOrderReason'
    CancelPaymentOrderResponse:
      type: object
      description: Cancel payment order request
      required:
        - end_to_end_id
        - reason
        - cancelled_at
      properties:
        end_to_end_id:
          $ref: '#/components/schemas/EndToEndID'
        reason:
          $ref: '#/components/schemas/PaymentOrderReason'
        cancelled_at:
          $ref: '#/components/schemas/CancellatedAt'
    Cid:
      type: string
      description: Correlation ID
      example: 4888-urjju-48474i9-uuke
    commons.AdditionalInfo:
      type: object
      properties:
        name:
          type: string
          description: QR Code name information.
          example: Discount
        value:
          type: string
          description: QR Code value information.
          example: Paying until the 5th, there will be a 10% discount
    commons.Charges:
      type: object
      properties:
        discount_value:
          $ref: '#/components/schemas/DiscountValue'
        interest_value:
          $ref: '#/components/schemas/InterestValue'
        fine_value:
          $ref: '#/components/schemas/FineValue'
        settled_value:
          $ref: '#/components/schemas/SettledValue'
    commons.Dates:
      type: object
      properties:
        creation_datetime:
          type: string
          description: UTC creation date time.
          example: '2020-09-15T19:39:54.013Z'
        due_date:
          type: string
          description: Due date, format = yyyy-mm-dd
          example: '2020-09-15'
        expiration_datetime:
          type: string
          description: UTC expiration date time.
          example: '2020-09-15T19:39:54.013Z'
        presentation_datetime:
          type: string
          description: UTC presentation date time.
          example: '2020-09-15T19:39:54.013Z'
        validity_after_expiration_day:
          type: integer
          description: >-
            How long, in days, the QR Code is active or functional after the
            expiration date.
          example: 30
    commons.Debtor:
      type: object
      properties:
        document_number:
          $ref: '#/components/schemas/DocumentNumber'
        name:
          $ref: '#/components/schemas/Name'
    commons.Payee:
      type: object
      properties:
        type:
