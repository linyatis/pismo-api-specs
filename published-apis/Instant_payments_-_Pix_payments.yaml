    RecurrenceStatus:
      type: string
      description: "\nRecurrence status\n\n  * `CREATED`\t  - Recurrence created, waiting on journey acceptance.\n  * `ACCEPTED`  - Payer accepted recurrence, awaiting confirmation from receiver's PSP.\n  * `APPROVED`  - Payer accepted recurrence and receiver's PSP confirmed. \n  * `REJECTED`  - Payer or receiver's PSP rejected recurrence during `ACCEPTED` validation. For example: receiver's account is inactive.\n  * `EXPIRED`   - Recurrence expired after last scheduled payment date.\n  * `CANCELLED` - Payer or reciever cancelled recurrence.\n  * `FINISHED`  - Deprecated\n"
      enum:
        - CREATED
        - ACCEPTED
        - APPROVED
        - REJECTED
        - EXPIRED
        - CANCELLED
        - FINISHED
      example: REJECTED
