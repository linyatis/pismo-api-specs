openapi: 3.0.3
info:
  title: Banking - Interest-bearing accounts
  version: 1.0.0
  description: API for interest-bearing account functionality
  termsOfService: https://developers.pismo.io/terms/
  contact:
    name: API Support
    email: support@pismo.com.br
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
    url: https://developers.pismo.io/licenses/
servers:
  - url: https://sandbox.pismolabs.io/savings-products
    description: API server for the EXT environment
tags:
  - name: Product
    description: Endpoints that manage Interest-bearing accounts products
  - name: Account attachment
    description: >-
      Endpoints that manage account attachments to interest-bearing account
      products
  - name: Program attachment
    description: >-
      Endpoints that manage program attachments to interest-bearing account
      products
  - name: Average balance
    description: Endpoints that enable calculating average balances for an account
components:
  parameters:
    authorizationTokenHeader:
      name: AuthorizationToken
      in: header
      schema:
        type: string
      required: true
      description: >
        Account token. Token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a 401 Unauthorized error.
      example: 1234
    productId:
      description: Product identifier.
      in: path
      name: productId
      required: true
      schema:
        type: string
      example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
    accountId:
      description: Account ID.
      in: path
      name: accountId
      required: true
      schema:
        type: integer
      example: 123456
    programIdPath:
      description: Program ID
      in: path
      name: programId
      required: true
      schema:
        type: integer
      example: 123
    afterIdQuery:
      description: >
        This is the `last_id` field returned in the response which you can use
        to get the next result set. This is displayed in UNIX timestamp.
      in: query
      name: afterId
      required: false
      schema:
        type: integer
      example: 1706027185000
    beginDateTimeQuery:
      description: >
        Queries for the date and time of products after the value of this field.
        Date and time are displayed in RFC 3339 format, for example:
        `2024-01-28T10:33:01Z`.
      in: query
      name: beginDatetime
      required: false
      schema:
        type: string
        format: date-time
      example: '2024-01-28T10:33:01.000Z'
    endDateTimeQuery:
      description: >
        Queries for the date and time of products created before the value of
        this field. Date and time are displayed in RFC 3339 format, for example:
        `2024-01-29T10:33:01Z`.
      in: query
      name: endDatetime
      required: false
      schema:
        type: string
        format: date-time
      example: '2024-01-30T10:33:01.000Z'
    perPageQuery:
      description: Number of items per page.
      in: query
      name: perPage
      required: false
      schema:
        type: integer
        maximum: 100
        default: 20
      example: 20
    orderQuery:
      description: >-
        List result order of the `created_at` value. It can be sorted in
        ascending (`ASC`) or descending (`DESC`) order. Default is `DESC`.
      in: query
      name: order
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: DESC
      example: DESC
    productTypeQuery:
      description: Filter results by product type.
      in: query
      name: productType
      required: false
      schema:
        type: string
        enum:
          - deposit
          - savings-account
      example: deposit
    statusQuery:
      description: Filter results by status.
      in: query
      name: status
      required: false
      schema:
        type: string
        enum:
          - CREATED
          - ACTIVE
          - INACTIVE
      example: ACTIVE
    idempotencyHeader:
      name: idempotency
      in: header
      schema:
        type: string
      required: true
      description: >
        A unique identifier for the request. If you need to retry a request, use
        the same idempotency key to avoid creating duplicate resources.
      example: 123e4567-e89b-12d3-a456-426614174000
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Error type code.
          example: EIBA0003
        details:
          type: string
          description: Error details.
          example: 'error EIBA0008: Validation error [(Field ''Order'' is invalid)]'
        message:
          description: Error message.
          example: Bad Request
          type: string
    DepositMaturityInstructions:
      properties:
        principal:
          type: string
          description: |
            Determines whether the principal is paid or rolled over.
          example: ROLLOVER
          enum:
            - PAY
            - ROLLOVER
        interest:
          type: string
          description: |
            Decides whether the earned interest is paid or rolled over.
          example: PAY
          enum:
            - PAY
            - ROLLOVER
      type: object
    DepositConfigs:
      type: object
      properties:
        maturity_date_days:
          type: integer
          description: >
            The number of days until the maturity date of the asset or
            investment.<br>

            This field represents the duration in days before the asset reaches
            its maturity and can be cashed out.
          example: 365
    SavingsAccountConfigs:
      type: object
      properties:
        maturity_date_days:
          type: integer
          description: >
            The number of days until the maturity date of the asset or
            investment.<br>

            This field represents the duration in days before the asset reaches
            its maturity and can be cashed out.
          example: 365
    DepositProduct:
      type: object
      properties:
        cool_off_period:
          type: integer
          description: Period in days when a withdrawal can be made without penalty.
          example: 0
        created_at:
          type: string
          format: datetime
          description: Date and time the product was created
          example: '2024-01-23T13:26:25.000Z'
        funding_duration:
          type: integer
          description: >-
            Period during which money is allowed to deposit into the account
            before the account is blocked. The value of this field is calculated
            in days.
          example: 12
        interest_plan_id:
          type: string
          description: Fee plan identification (created in `interest-mgt`).
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        maturity_instructions:
          $ref: '#/components/schemas/DepositMaturityInstructions'
        min_amount:
          type: number
          description: Minimum deposit amount.
          example: 1000
        max_amount:
          type: number
          description: Maximum deposit amount.
          example: 5000
        min_term:
          type: integer
          description: >-
            Minimum term duration. The value of this field is calculated in
            days.
          example: 265
        max_term:
          type: integer
          description: >-
            Maximum term duration. The value of this field is calculated in
            days.
          example: 1025
        name:
          type: string
          description: Product name
          example: Tax 1 Default
        penalties:
          $ref: '#/components/schemas/DepositPenalties'
        processing_codes:
          $ref: '#/components/schemas/DepositProcessingCodes'
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        product_type:
          type: string
          description: Product type.
          enum:
            - deposit
            - savings-account
        status:
          type: string
          description: Indicates the current state of the product. For example, `CREATED`.
          enum:
            - CREATED
            - ACTIVE
            - INACTIVE
          example: CREATED
        term_type:
          type: string
          description: |
            Term type. For example, `FIXED` or `FLEXIBLE`.
          enum:
            - FIXED
            - FLEXIBLE
          example: FIXED
    CreateDepositProductRequest:
      required:
        - name
        - interest_plan_id
        - term_type
      type: object
      properties:
        name:
          type: string
          description: The product name.
          example: Tax 1 Default
        interest_plan_id:
          type: string
          description: Fee plan identification (created in `interest-mgt`).
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        term_type:
          type: string
          description: |
            Term type. For example, `FIXED` or `FLEXIBLE`.
          enum:
            - FIXED
            - FLEXIBLE
          example: FIXED
        maturity_instructions:
          $ref: '#/components/schemas/DepositMaturityInstructions'
        processing_codes:
          $ref: '#/components/schemas/DepositProcessingCodes'
        cool_off_period:
          type: integer
          description: >-
            Period in days when a withdrawal can be made without penalty. The
            value must be greater than or equal to `funding_duration`.
          example: 0
        funding_duration:
          type: integer
          description: >-
            Period during which money is allowed to deposit into the account
            before the account is blocked. The value of this field is calculated
            in days.
          example: 12
        min_amount:
          type: number
          description: Minimum deposit amount.
          example: 1000
        max_amount:
          type: number
          description: Maximum deposit amount.
          example: 5000
        min_term:
          type: integer
          description: >-
            Minimum term duration. The value of this field is calculated in
            days.
          example: 265
        max_term:
          type: integer
          description: >-
            Maximum term duration. The value of this field is calculated in
            days.
          example: 1025
        penalties:
          $ref: '#/components/schemas/DepositPenalties'
    CreateSavingsAccountProductRequest:
      required:
        - interest_plan_id
        - name
        - processing_codes
      type: object
      properties:
        interest_plan_id:
          type: string
          description: Fee plan identification (created in `interest-mgt`).
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        name:
          type: string
          description: The product name.
          example: Tax 1 Default
        processing_codes:
          $ref: '#/components/schemas/SavingsAccountProcessingCodes'
    ProductList:
      type: object
      properties:
        last_id:
          type: integer
          description: Pagination reference, displayed in UNIX timestamp.
          example: 1706027185000
        next_page:
          type: boolean
          description: Indicates whether there is a next page of results.
          example: true
        per_page:
          type: integer
          description: Number of items per page. Default `20`, maximum is `100`.
          maximum: 100
          minimum: 1
          example: 20
          default: 20
        items:
          allOf:
            - $ref: '#/components/schemas/DepositProduct'
            - $ref: '#/components/schemas/SavingsAccountProduct'
          description: A collection of individual product objects.
    PatchProductRequest:
      type: object
      properties:
        status:
          description: Product status
          example: ACTIVE
          type: string
          enum:
            - CREATED
            - ACTIVE
            - INACTIVE
        reason:
          description: Status update reason
          example: Activating product
          type: string
    DepositProcessingCodes:
      type: object
      properties:
        maturity_processing_code:
          type: string
          description: >
            Processing code for maturity.<br>

            If not provided at the time of creation, the default value is
            `009595`.
          example: '009595'
        interest_processing_code:
          type: string
          description: >-
            Processing code for interest calculation. <br> If you don't specify
            a value, the default is `009797`.
          example: '009797'
        detach_processing_code:
          type: string
          description: >
            Processing code for detaching deposit feature from a bank
            account.<br>

            Detaching means the bank removes the deposit feature from the bank
            account.

            If you don't specify a value, the default is `009696`.
          example: '009696'
        withholding_tax_processing_code:
          type: string
          description: Processing code for withholding tax processing.
          example: '202530'
    SavingsAccountProcessingCodes:
      type: object
      properties:
        interest_processing_code:
          type: string
          description: >-
            Processing code for interest calculation. <br> If you don't specify
            a value, the default is `009797`.
          example: '009797'
        detach_processing_code:
          type: string
          description: >
            Processing code for detaching deposit feature from a bank
            account.<br>

            Detaching means the bank removes the deposit feature from the bank
            account.

            If you don't specify a value, the default is `009696`.
          example: '009696'
        withholding_tax_processing_code:
          type: string
          description: Processing code for tax withholding.
          example: '202530'
    DepositAttachRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        deposit_configs:
          $ref: '#/components/schemas/DepositConfigs'
        metadata:
          type: object
          description: >
            The metadata object contains user-defined key-value pairs that
            provide additional context or custom information.<br>

            The platform has no control over its content, but rather controlled
            by the user.
          example:
            key: value
    SavingsAccountAttachRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        savings_account_configs:
          $ref: '#/components/schemas/SavingsAccountConfigs'
        metadata:
          type: object
          description: >
            The metadata object contains user-defined key-value pairs that offer
            additional context or custom information.<br>

            The platform has no control over its content, it's controlled by the
            user.
          example:
            key: value
    DetachRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        metadata:
          type: object
          description: >
            The metadata object contains user-defined key-value pairs that offer
            additional context or custom information.<br>

            The platform has no control over its content, but rather controlled
            by the user.
          example:
            key: value
    SavingsAccountProduct:
      type: object
      properties:
        created_at:
          type: string
          format: datetime
          description: The moment when a product is created.
          example: '2024-01-23T13:26:25.000Z'
        updated_at:
          type: string
          format: datetime
          description: The moment when a product is updated.
          example: '2024-01-23T13:26:25.000Z'
        interest_plan_id:
          type: string
          description: Fee plan identification (created in `interest-mgt`).
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        name:
          type: string
          description: The product name.
          example: Tax 1 Default
        processing_codes:
          $ref: '#/components/schemas/SavingsAccountProcessingCodes'
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        product_type:
          type: string
          description: Product type.
          enum:
            - deposit
            - savings-account
        status:
          description: Product status
          example: ACTIVE
          type: string
          enum:
            - CREATED
            - ACTIVE
            - INACTIVE
    AccountAttachment:
      type: object
      properties:
        attachment_date:
          type: string
          format: datetime
          description: Date on which the product is attached to the account.
          example: '2024-01-23T13:26:25.000Z'
        interest_plan_id:
          type: string
          description: Fee plan identification (created in `interest-mgt`).
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        maturity_date_days:
          type: integer
          description: >
            The number of days until the maturity date of the asset or
            investment.<br>

            This field represents the duration in days before the asset reaches
            its maturity and can be cashed out.
          example: 365
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        product_type:
          type: string
          description: Product type.
          enum:
            - deposit
            - savings-account
    ProgramAttachment:
      type: object
      properties:
        attachment_date:
          type: string
          format: datetime
          description: Date on which the product is attached to the program.
          example: '2024-01-23T13:26:25.000Z'
        interest_plan_id:
          type: string
          description: Fee plan identification (created in `interest-mgt`).
          example: 263d509a-d5d0-4b3a-b909-ce1b9174beff
        maturity_date_days:
          type: integer
          description: >
            The number of days until the maturity date of the asset or
            investment.<br>

            This field represents the duration in days before the asset reaches
            its maturity date and can be cashed out
          example: 365
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        product_type:
          type: string
          description: Product type.
          enum:
            - deposit
            - savings-account
    CalculateAverageBalanceRequest:
      type: object
      properties:
        account_id:
          type: number
          description: Account identifier.
          example: 123456
        begin_date_datetime:
          type: string
          format: date-time
          description: >
            The specified datetime when the average balance calculation begins.
            The datetime is displayed in the RFC 3339 format; for example:
            `2024-01-28T10:33:01Z`.
          example: '2024-01-28T10:33:01.000Z'
        end_date_datetime:
          type: string
          format: date-time
          description: >
            The specified datetime when the average balance calculation ends.
            The datetime is displayed in the RFC 3339 format; for example:
            `2024-01-29T10:33:01Z`.
          example: '2024-01-30T10:33:01.000Z'
        balance_types_to_calculate:
          type: array
          items:
            type: string
            enum:
              - available
              - savings
              - held_funds
          description: >
            Choose a balance to calculate its average balance, you can select
            multiple balance types to calculate their average balances
            simultaneously. The balance types are:<br>

            * `available`

            * `savings`

            * `held_funds`
          example:
            - available
            - savings
            - held_funds
    CalculateAverageBalanceResponse:
      type: object
      properties:
        account_id:
          type: number
          description: Account ID.
          example: 123456
        idempotency_key:
          type: string
          description: Idempotency key.
          example: 123e4567-e89b-12d3-a456-xyz
        status:
          type: string
          description: Status of the average balance calculation request.
          enum:
            - PROCESSING
            - COMPLETE
        message:
          type: string
          description: Message.
          example: Request is under progress
    GetAverageBalanceResponse:
      type: object
      properties:
        account_id:
          type: number
          description: Account ID.
          example: 123456
        begin_date_datetime:
          type: string
          format: date-time
          description: >
            The date and time when the calculation begins. The date and time are
            displayed in RFC 3339 format, for example: `2024-01-28T10:33:01Z`.
          example: '2024-01-28T10:33:01.000Z'
        end_date_datetime:
          type: string
          format: date-time
          description: >
            The date and time when the calculation ends. The date and time are
            displayed in RFC 3339 format, for example: `2024-01-29T10:33:01Z`.
          example: '2024-01-30T10:33:01.000Z'
        balance_types_to_calculate:
          type: array
          items:
            type: string
            enum:
              - available
              - savings
              - held_funds
          description: >
            Choose a balance to calculate its average balance, you can select
            multiple balance types to calculate their average balances
            simultaneously. The balance types are:<br>

            * `available`

            * `savings`

            * `held_funds`
          example:
            - available
            - savings
            - held_funds
    DetachProductFromProgramRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product ID
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
    DepositPenalties:
      type: object
      properties:
        early_withdrawal_after_opening:
          $ref: '#/components/schemas/EarlyWithdrawalAfterOpening'
        grace_period:
          $ref: '#/components/schemas/GracePeriod'
        tiered_interest_forfeiture:
          type: array
          items:
            $ref: '#/components/schemas/TieredInterestForfeitureTier'
        withdrawal_fee:
          $ref: '#/components/schemas/WithdrawalFee'
    EarlyWithdrawalAfterOpening:
      type: object
      required:
        - applicable_within_days
        - penalty_interest_days
      properties:
        applicable_within_days:
          type: integer
          minimum: 0
          description: Number of days after opening that the penalty is applied
          example: 30
        penalty_interest_days:
          type: integer
          description: Number of interest days to forfeit as penalty.
          example: 90
    GracePeriod:
      type: object
      required:
        - duration_days
        - penalty_interest_days
      properties:
        duration_days:
          type: integer
          minimum: 0
          description: Duration of the grace period in days
          example: 7
        penalty_interest_days:
          type: integer
          description: Number of interest days to forfeit as penalty
          example: 30
    TieredInterestForfeitureTier:
      type: object
      required:
        - min_days_held
        - max_days_held
        - forfeited_interest_days
      properties:
        min_days_held:
          type: integer
          description: Minimum number of days the deposit must be held
          example: 1
        max_days_held:
          type: integer
          description: Maximum number of days the deposit can be held
          example: 90
        forfeited_interest_days:
          type: integer
          description: Number of interest days to forfeit as penalty
          example: 30
    WithdrawalFee:
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum:
            - PERCENTAGE
          description: Type of withdrawal fee
          example: PERCENTAGE
        value:
          type: number
          description: Value of the withdrawal fee
          example: 1.5
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    400BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequestBody:
              summary: Bad Request.
              value:
                code: EIBA0008
                message: Bad Request.
                detail: 'error EIBA0008: Validation error [(Field ''Order'' is invalid)]'
    404NotFound:
      description: Bad request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequestBody:
              summary: Bad Request.
              value:
                code: EIBA0078
                message: Product not found.
    409Conflict:
      description: Conflict.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            conflict:
              summary: Conflict.
              value:
                code: EIBA0128
                message: Product is already detached
    500InternalServer:
      description: Internal error.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalProcessingError:
              summary: Internal processing error.
              value:
                code: EIBA0007
                message: Internal error
                detail: Internal error
paths:
  /v1/products:
    get:
      tags:
        - Product
      summary: List product
      description: |
        Returns a list of an organization's savings and time-deposit accounts.
      operationId: interest-bearing-v1-list-products
      parameters:
        - $ref: '#/components/parameters/beginDateTimeQuery'
        - $ref: '#/components/parameters/endDateTimeQuery'
        - $ref: '#/components/parameters/afterIdQuery'
        - $ref: '#/components/parameters/perPageQuery'
        - $ref: '#/components/parameters/orderQuery'
        - $ref: '#/components/parameters/productTypeQuery'
        - $ref: '#/components/parameters/statusQuery'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits:
    post:
      tags:
        - Product
      summary: Create deposit product
      description: >
        Create an organization's time deposit accounts. Time deposit accounts,
        such as CDs, require you to keep your funds in the account for a
        mutually agreed amount for a specific period of time.<br>

        This endpoint generates the [Deposit product
        created](https://developers.pismo.io/events/docs/deposit-product-creation-1)
        event.

        For information about interest-bearing accounts, see [Interest-bearing
        accounts](doc:interest-bearing-accounts).
      operationId: interest-bearing-v1-create-deposit-product
      parameters:
