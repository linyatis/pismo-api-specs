  /v1/accounts/{accountId}/average-balance:
    post:
      tags:
        - Average balance
      summary: Calculate average balance
      description: >
        Calculates an average balance for an account.<br>

        Using this endpoint, you can specify a datetime range and calculate the
        [average
        balance](https://www.investopedia.com/terms/a/average-balance.asp) of an
        account over that period. This involves multiplying the balance by the
        number of days it has remained unchanged, summing the results, and then
        dividing them by the total number of days in the specified period.
      operationId: interest-bearing-calculate-average-balance
      parameters:
        - $ref: '#/components/parameters/idempotencyHeader'
        - $ref: '#/components/parameters/accountId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateAverageBalanceRequest'
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateAverageBalanceResponse'
          description: Accepted
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
    get:
      tags:
        - Average balance
      summary: Get average balance
      description: |
        Retrieves an already calculated average balance for an account.
      operationId: interest-bearing-get-average-balance
      parameters:
        - $ref: '#/components/parameters/idempotencyHeader'
        - $ref: '#/components/parameters/accountId'
      responses:
