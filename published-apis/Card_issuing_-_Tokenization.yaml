  /v1/clicktopay/visa/enroll/customer:
    post:
      summary: Enroll customer and card in Visa CTP [Beta]
      description: >
        Enroll a customer and card in <a
        href="https://usa.visa.com/products/click-to-pay/consumers.html"
        target="_blank">Visa's Click to Pay</a> service. Click to Pay is a
        secure, streamlined online checkout solution using tokenization. 

         For more information, refer to [Click to Pay](doc:click-to-pay).
         
         This endpoint generates a [Click to Pay event generated](https://developers.pismo.io/events/docs/cards-tokenization-click-to-pay-1) event.

        **Notes**:


        - The following fields are **mandatory** to enroll a customer/card into
        Visa's Click to Pay: `first_name`, `last_name`, `emails`, `phones` and
        `billing_address`. If not passed and not found internally, an error is
        returned.


        - The process is asynchronous, success or failure is indicated in the
        generated event.


        - This endpoint takes an account token - an access token encoded with a
        Pismo account ID.


        - This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      operationId: post-v1-clicktopay-enroll_customer
      tags:
        - Visa Click to Pay [Beta]
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CustomerIDheader'
        - $ref: '#/components/parameters/CidHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClickToPayEnrollData'
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClickToPayBadRequest'
              examples:
                bad_request:
                  value:
                    code: 400
                    message: bad request
                bad_request_detailed:
                  value:
                    code: 400
                    message: bad request
                    details:
                      - 'AccountID: cannot be blank'
                      - 'CustomerID: cannot be blank'
                      - 'OrgID: cannot be blank.'
                      - 'cardId: cannot be blank.'
                customer_already_on_click_to_pay:
                  value:
                    code: 400
                    message: customer already on click to pay
                click_to_pay_not_enabled_to_tenant:
                  value:
                    code: 400
                    message: click to pay is not enabled to tenant
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClickToPayInternalServerError'
              examples:
                internal_server_error:
                  value:
                    code: 500
                    message: internal server error
  /v1/clicktopay/visa/enroll/card:
