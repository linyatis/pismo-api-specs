openapi: 3.1.0
info:
  title: Revolving credit - Configurations
  version: 2.74.0
  description: Endpoints for setting up the revolving credit product
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
    identifier: Pismo
servers:
  - url: https://sandbox.pismolabs.io/credit-cycle-configurations
    description: Sandbox API server for testing
tags:
  - name: Internal
    description: Internal endpoints to check the service
  - name: Program transaction types
    description: >-
      Endpoints to associate debit transaction types with a program and a
      transaction category.
  - name: Account accrual rates
    description: Endpoints to set up accrual rates at the account level.
  - name: Program accrual rates
    description: Endpoints to set up accrual rates at the program level.
  - name: Features by account status
    description: >-
      Endpoints to toggle features on or off by account status (at program or
      organization level)
  - name: Additional accrual type configurations
    description: >-
      Endpoints to enable additional accrual type configurations at program
      level
components:
  parameters:
    AccountAccrualTypeQuery:
      name: accrualType
      description: Accrual type
      in: query
      required: false
      schema:
        type: string
        enum:
          - WITHDRAWAL_INTEREST
          - BILLPAYMENT_INTEREST
          - OVERDRAFT_INTEREST
        example: WITHDRAWAL_INTEREST
    AccountIdPath:
      name: accountId
      description: Account ID
      in: path
      required: true
      schema:
        type: integer
        example: 18898
    IsDeletedQuery:
      name: isDeleted
      description: Filter by status
      in: query
      schema:
        type: boolean
        default: false
        example: false
    PageQuery:
      name: page
      description: Current page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        example: 1
    PeriodToCalculatePath:
      name: periodToCalculate
      description: Period to calculate the accruals
      in: path
      required: true
      schema:
        type: string
        enum:
          - UNTIL_DUE_DATE
          - AFTER_DUE_DATE
        example: UNTIL_DUE_DATE
    PeriodToCalculateQuery:
      name: periodToCalculate
      description: Period to calculate the accruals
      in: query
      required: false
      schema:
        type: string
        enum:
          - UNTIL_DUE_DATE
          - AFTER_DUE_DATE
        example: UNTIL_DUE_DATE
    PerPageQuery:
      name: perPage
      description: Number of items per page
      in: query
      required: false
      schema:
        type: integer
        default: 100
        example: 100
    ProgramIdPath:
      name: programId
      description: Program ID
      in: path
      required: true
      schema:
        type: integer
        example: 5689
    ProgramIdQuery:
      name: programId
      description: Program ID
      in: query
      required: false
      schema:
        type: integer
        format: int64
        example: 12345
    ProgramAccrualTypePath:
      name: accrualType
      description: Accrual type
      in: path
      required: true
      schema:
        type: string
        enum:
          - WITHDRAWAL_INTEREST
          - BILLPAYMENT_INTEREST
          - OVERDRAFT_INTEREST
          - FINANCIAL_TAX
          - REFINANCING
          - OVERDUE
          - FINE
        example: WITHDRAWAL_INTEREST
    ProgramAccrualTypeQuery:
      name: accrualType
      description: Accrual type
      in: query
      required: false
      schema:
        type: string
        enum:
          - WITHDRAWAL_INTEREST
          - BILLPAYMENT_INTEREST
          - OVERDRAFT_INTEREST
          - FINANCIAL_TAX
          - REFINANCING
          - OVERDUE
          - FINE
        example: WITHDRAWAL_INTEREST
    TransactionCategoryIDPath:
      name: transactionCategoryId
      description: Program transaction category ID
      in: path
      required: true
      schema:
        type: integer
        example: 2
    TransactionCategoryIdQuery:
      name: transactionCategoryId
      description: Program transaction category ID
      in: query
      required: false
      schema:
        type: integer
        example: 2
    ValidityToCalculateQuery:
      name: validityToCalculate
      description: >
        When the rate is used to calculate the accrual. The possible values are:

        - IMMEDIATE — The rate is used to calculate the next generated accruals.

        - DUEDATE — The rate is used to calculate accruals only after the next
        due date.
      in: query
      required: false
      schema:
        type: string
        enum:
          - IMMEDIATE
          - DUEDATE
        example: IMMEDIATE
  schemas:
    AccountAccrualType:
      type: string
      description: |
        Accrual type at the account level. The most commonly used values are:
        - `WITHDRAWAL_INTEREST`—Interest on a withdrawal
        - `BILLPAYMENT_INTEREST`—Interest on a bill payment
        - `OVERDRAFT_INTEREST`—Interest on an overdraft
        - `FINANCIAL_TAX`—Financial tax
      example: WITHDRAWAL_INTEREST
    AmountDueLowerLimit:
      type: number
      format: double
      description: >-
        Lower limit for the range. Must be greater than zero. If the amount due
        is greater than or equal to this amount, `default_rate` and
        `rate_if_overdue` apply.
      example: 4000
    AccrualRateIfOverdue:
      type: number
      format: double
      description: >
        Rate used to calculate the accrual when the account is overdue.


        **Notes:**

        - If you don't provide a value for this field, you must provide a value
        for `default_rate`.

        - If you provide a value for `default_rate`, but not `rate_if_overdue`,
        then the Pismo platform only calculates the interest if the account
        <i>is not</i> overdue. If you provide a value for `rate_if_overdue`, but
        not `default_rate`, then the platform only calculates the interest when
        the account <i>is</i> overdue. If you want the platform to calculate the
        interest in both cases, you must provide values for both fields.
      example: 3
    AccrualRateRange:
      required:
        - amount_due_lower_limit
      type: object
      description: Accrual rate ranges
      properties:
        amount_due_lower_limit:
          $ref: '#/components/schemas/AmountDueLowerLimit'
        default_rate:
          $ref: '#/components/schemas/DefaultAccrualRate'
        rate_if_overdue:
          $ref: '#/components/schemas/AccrualRateIfOverdue'
    AccrualRateRanges:
      type: array
      description: >
        List of accrual rate ranges. Which range applies depends on a comparison
        of the last amount due with `amount_due_lower_limit`. For example,
        suppose you execute the endpoint with the following parameter values.

        <pre>

        {
          'transaction_category_id': 107178,
          'accrual_type': 'WITHDRAWAL_INTEREST',
          'period_to_calculate: 'AFTER_DUE_DATE',
          'default_rate': 10.70,
          'rate_if_overdue': 12.70,
          'validity_to_calculate': 'IMMEDIATE',
          'ranges': [
              {
                  'amount_due_lower_limit': 1000,
                  'default_rate': 10.00,
                  'rate_if_overdue': 8.123456
              },
              {
                  'amount_due_lower_limit': 3000,
                  'default_rate': 9.25,
                  'rate_if_overdue': 7.351451
              }
          ]
        }

        </pre>


        If the last amount due is 4000, then both of above ranges are valid, but
        the `amount_due_lower_limit` with 3000 is the closest, so the values for
        `default_rate` and `rate_if_overdue` in the second range are used to
        calculate accruals.


        **Notes:**


        - Either `default_rate`, `rate_if_overdue`, or both must be provided in
        each range.


        - The rate division by total days is not affected by whether or not
        ranges are defined.


        - The **Overdue strategy start** program parameter also impacts the
        amount due. For more information, refer to the entry for that parameter
        in [Program parameters](doc:program-parameters-reference-table).
      items:
        $ref: '#/components/schemas/AccrualRateRange'
    AccrualTypesConfigurations:
      description: Array of additional accrual type configurations
      type: array
      items:
        type: string
        enum:
          - ONCE_AFTER_TRANSACTION_DUE_DATE
    ChargeOrder:
      type: integer
      description: >-
        Used to determine the priority order when discharging transaction
        balances. 1 is the highest priority.
      example: 2
    DefaultAccrualRate:
      type: number
      format: double
      description: >
        Rate used to calculate the accrual when the account is not overdue.


        **Notes:**

        - If you don't provide a value for this field, you must provide a value
        for `rate_if_overdue`.

        - If you provide a value for `default_rate`, but not `rate_if_overdue`,
        then the Pismo platform only calculates the interest if the account
        <i>is not</i> overdue. If you provide a value for `rate_if_overdue`, but
        not `default_rate`, then the platform only calculates the interest when
        the account <i>is</i> overdue. If you want the platform to calculate the
        interest in both cases, you must provide values for both fields.
      example: 2
    PostAccrualTypeConfigurationsRequest:
      type: object
      properties:
        configurations:
          $ref: '#/components/schemas/AccrualTypesConfigurations'
      required:
        - configurations
    PostAccrualTypeConfigurationsResponse:
      type: object
      properties:
        configurations:
          $ref: '#/components/schemas/AccrualTypesConfigurations'
      required:
        - configurations
    ProgramsTransactionsTypesRequest:
      type: object
      properties:
        transaction_type_id:
          $ref: '#/components/schemas/TransactionTypeID'
        transaction_category_id:
          $ref: '#/components/schemas/TransactionCategoryID'
        charge_order:
          $ref: '#/components/schemas/ChargeOrder'
      required:
        - transaction_type_id
        - transaction_category_id
    ProgramTransactionTypeID:
      type: integer
      description: Program transaction type ID
      example: 156781
    ProgramsTransactionsTypesResponse:
      type: object
      properties:
        program_transaction_type_id:
          $ref: '#/components/schemas/ProgramTransactionTypeID'
        transaction_type_id:
          $ref: '#/components/schemas/TransactionTypeID'
        transaction_category_id:
          $ref: '#/components/schemas/TransactionCategoryID'
        charge_order:
          $ref: '#/components/schemas/ChargeOrder'
      required:
        - program_transaction_type_id
        - transaction_type_id
        - transaction_category_id
    ProgramAccrualType:
      type: string
      description: |
        Accrual type. The possible values at the program level are:
        - `WITHDRAWAL_INTEREST` — Interest on a withdrawal
        - `BILLPAYMENT_INTEREST` — Interest on a bill payment
        - `OVERDRAFT_INTEREST` — Interest on an overdraft
        - `FINANCIAL_TAX` — Financial tax
        - `REFINANCING` — Refinancing charge
        - `OVERDUE` — Overdue charge
        - `FINE` — Overdue fine
      enum:
        - WITHDRAWAL_INTEREST
        - BILLPAYMENT_INTEREST
        - OVERDRAFT_INTEREST
        - FINANCIAL_TAX
        - REFINANCING
        - OVERDUE
        - FINE
      example: WITHDRAWAL_INTEREST
    PeriodToCalculate:
      type: string
      description: >
        Period to calculate the accrual


        `UNTIL_DUE_DATE`—The period extends from the transaction date plus one
        day to the due date.

        `AFTER_DUE_DATE`—The period extends from the due date plus one day to
        the current date.


        **Note:** If an accrual needs to start at the transaction date and
        continue past the due date, then two accrual rates need to be
        created—one with `UNTIL_DUE_DATE` and another with
        `AFTER_DUE_DATE`.      
    TransactionCategoryID:
      type: integer
      description: Transaction category ID
      example: 1237456
    TransactionTypeID:
      description: Transaction type ID
      type: integer
      example: 101
    ValidityToCalculate:
      type: string
      description: >
        When the rate is used to calculate the accrual. The possible values are:

        - `IMMEDIATE` — The rate is used to calculate the next generated
        accruals.

        - `DUEDATE` — The rate is used to calculate accruals only after the next
        due date.
      enum:
        - IMMEDIATE
        - DUEDATE
      example: IMMEDIATE
    AccountAccrualTypesRatesRequest:
      type: object
      required:
        - transaction_category_id
        - accrual_type
        - period_to_calculate
        - validity_to_calculate
      properties:
        transaction_category_id:
          $ref: '#/components/schemas/TransactionCategoryID'
        accrual_type:
          $ref: '#/components/schemas/AccountAccrualType'
        period_to_calculate:
          $ref: '#/components/schemas/PeriodToCalculate'
        default_rate:
          $ref: '#/components/schemas/DefaultAccrualRate'
        rate_if_overdue:
          $ref: '#/components/schemas/AccrualRateIfOverdue'
        validity_to_calculate:
          $ref: '#/components/schemas/ValidityToCalculate'
        ranges:
          $ref: '#/components/schemas/AccrualRateRanges'
    AccrualTypeRateID:
      type: integer
      description: Account accrual type rate ID
      example: 1237456
    AccountID:
      type: integer
      description: Account  ID
      example: 1237456
    CreatedAt:
      type: string
      description: Date created, format = yyyy-mm-ddThh:mm:ssZ
      example: '2023-08-18T20:53:27.498Z'
    DeletedAt:
      type: string
      description: Date deleted, format = yyyy-mm-ddThh:mm:ssZ
      example: '2023-10-10T10:50:18.212Z'
    AccountAccrualTypesRatesResponse:
      type: object
      required:
        - transaction_category_id
        - accrual_type
        - period_to_calculate
        - validity_to_calculate
      properties:
        transaction_category_id:
          $ref: '#/components/schemas/TransactionCategoryID'
        accrual_type:
          $ref: '#/components/schemas/AccountAccrualType'
        period_to_calculate:
          $ref: '#/components/schemas/PeriodToCalculate'
        default_rate:
          $ref: '#/components/schemas/DefaultAccrualRate'
        rate_if_overdue:
          $ref: '#/components/schemas/AccrualRateIfOverdue'
        ranges:
          $ref: '#/components/schemas/AccrualRateRanges'
        validity_to_calculate:
          $ref: '#/components/schemas/ValidityToCalculate'
        account_accrual_type_rate_id:
          $ref: '#/components/schemas/AccrualTypeRateID'
        account_id:
          $ref: '#/components/schemas/AccountID'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        deleted_at:
          $ref: '#/components/schemas/DeletedAt'
    ProgramAccrualTypesRatesRequest:
      type: object
      required:
        - transaction_category_id
        - accrual_type
        - period_to_calculate
        - validity_to_calculate
      properties:
        transaction_category_id:
          $ref: '#/components/schemas/TransactionCategoryID'
        accrual_type:
          $ref: '#/components/schemas/ProgramAccrualType'
        period_to_calculate:
          $ref: '#/components/schemas/PeriodToCalculate'
        default_rate:
          $ref: '#/components/schemas/DefaultAccrualRate'
        rate_if_overdue:
          $ref: '#/components/schemas/AccrualRateIfOverdue'
        validity_to_calculate:
          $ref: '#/components/schemas/ValidityToCalculate'
        ranges:
          $ref: '#/components/schemas/AccrualRateRanges'
    ProgramAccrualTypesRatesResponse:
      type: object
      required:
        - transaction_category_id
        - accrual_type
        - period_to_calculate
        - validity_to_calculate
        - created_at
      properties:
        transaction_category_id:
          $ref: '#/components/schemas/TransactionCategoryID'
        accrual_type:
          $ref: '#/components/schemas/ProgramAccrualType'
        period_to_calculate:
          $ref: '#/components/schemas/PeriodToCalculate'
        validity_to_calculate:
          $ref: '#/components/schemas/ValidityToCalculate'
        default_rate:
          $ref: '#/components/schemas/DefaultAccrualRate'
        rate_if_overdue:
          $ref: '#/components/schemas/AccrualRateIfOverdue'
        ranges:
          $ref: '#/components/schemas/AccrualRateRanges'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        deleted_at:
          $ref: '#/components/schemas/DeletedAt'
        accrual_type_rate_id:
          $ref: '#/components/schemas/AccrualTypeRateID'
    CurrentPageNumber:
      type: integer
      description: Current page number
      default: 1
      example: 1
    ItemsPerPage:
      type: integer
      description: Number of items per page
      minLength: 1
      default: 1
      example: 10
    NumberOfItems:
      type: integer
      description: Number of items
      example: 50
    ItemsOnCurrentPage:
      type: integer
      description: Number of items on the current page
      example: 10
    NumberOfPages:
      type: integer
      description: Number of pages
      example: 5
    IsLastPage:
      type: boolean
      description: Indicates if the current page is the last page
      example: false
    ArrayOfInterestRateObjects:
      type: array
      description: Array of interest rate objects
      items:
        $ref: '#/components/schemas/AccountAccrualTypesRatesResponse'
    GetAllAccountAccrualTypesRatesResponse:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPageNumber'
        per_page:
          $ref: '#/components/schemas/ItemsPerPage'
        total_items:
          $ref: '#/components/schemas/NumberOfItems'
        items_on_page:
          $ref: '#/components/schemas/ItemsOnCurrentPage'
        pages:
          $ref: '#/components/schemas/NumberOfPages'
        is_last_page:
          $ref: '#/components/schemas/IsLastPage'
        items:
          $ref: '#/components/schemas/ArrayOfInterestRateObjects'
      required:
        - current_page
        - per_page
        - total_items
        - items_on_page
        - pages
    GetAllProgramAccrualTypesRatesResponse:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPageNumber'
        per_page:
          $ref: '#/components/schemas/ItemsPerPage'
        total_items:
          $ref: '#/components/schemas/NumberOfItems'
        items_on_page:
          $ref: '#/components/schemas/ItemsOnCurrentPage'
        pages:
          $ref: '#/components/schemas/NumberOfPages'
        is_last_page:
          $ref: '#/components/schemas/IsLastPage'
        items:
          $ref: '#/components/schemas/ArrayOfInterestRateObjects'
      required:
        - current_page
        - per_page
        - total_items
        - items_on_page
        - pages
    StandardErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Standard error code
          example: '1020030'
        message:
          type: string
          description: Error message
          example: An error occurred when attempting to execute request.
    FeaturesByAccountStatusResponse:
      type: object
      properties:
        program_id:
          type: number
          description: Program ID
          format: int64
          example: 123
        account_statuses:
          type: array
          description: >-
            List of account statuses with the corresponding features marked to
            be disabled/enabled
          items:
            $ref: '#/components/schemas/AccountStatusItemResponse'
      required:
        - account_statuses
    FeaturesByAccountStatusPostRequest:
      type: object
      properties:
        program_id:
          type: number
          description: Program ID
          format: int64
          example: 123
        account_statuses:
          type: array
          description: >-
            List of account statuses with the corresponding features marked to
            be disabled/enabled
          items:
            type: object
            properties:
              name:
                type: string
                description: Account status name
                example: DEFINITIVE_CANCELLATION
              features:
                type: object
                properties:
                  close-statements:
                    type: boolean
                    description: Perform cycle closings?
                    default: true
                    example: false
                  late-payment-fee:
                    type: boolean
                    description: Charge late payment fees?
                    default: true
                    example: false
                  overlimit:
                    type: boolean
                    default: true
                    description: Charge overlimit fees?
                    example: false
                  create-accruals:
                    type: boolean
                    description: |
                      Calculate new accruals?
                    default: true
                    example: false
          example:
            - name: DEFINITIVE_CANCELLATION
              features:
                close-statements: false
      required:
        - account_statuses
    FeaturesByAccountStatusPatchRequest:
      type: object
      properties:
        reset_configuration:
          type: boolean
          description: Reset configuration?
          example: true
        program_id:
          type: number
          description: Program ID
          format: int64
          example: 123
        account_statuses:
          type: array
          description: >-
            List of account statuses with the corresponding features marked to
            be disabled/enabled
          items:
            $ref: '#/components/schemas/AccountStatusPatchItemRequest'
      required:
        - account_statuses
    AccountStatusItemResponse:
      type: object
      properties:
        name:
          type: string
          description: Account status name
          example: FULL_CANCELLATION
        features:
          type: object
          description: Map of features and the corresponding enabled/disabled status
          properties:
            close-statements:
              type: boolean
            overlimit:
              type: boolean
            late-payment-fee:
              type: boolean
          example:
            close-statements: false
            overlimit: true
      example:
        value:
          - name: DEFINITIVE_CANCELLATION
            features:
              close-statements: false
          - name: BLOCKED
            features:
              close-statements: false
              overlimit: false
    AccountStatusPatchItemRequest:
      type: object
      properties:
        remove_status:
          type: boolean
          description: Remove current status?
          example: true
        name:
          type: string
          description: Account status name
          example: FULL_CANCELLATION
        features:
          type: object
          additionalProperties:
            type: boolean
          description: Map of features and the corresponding enabled/disabled status
          example:
            close-statements: false
            overlimit: true
      example:
        value:
          - name: DEFINITIVE_CANCELLATION
            features:
              close-statements: false
          - remove_status: true
            name: BLOCKED
  responses:
    204NoContent:
      description: No Content
    400BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
          examples:
            Missing request header or param:
              description: Missing request header or parameter
              value:
                code: EX0001
                message: >-
                  Validation Error. Details: Can't find [BalanceAccount] with
                  params: [AccountID: XXXXXX, OrgID:
                  TN-XXXXXXXXXXX-XXXX-XXXX-XXXXXXXXXX].
    404NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardErrorResponse'
          examples:
            Statement not found:
              description: Program ID not found.
              value:
                code: EX0002
                message: Program operationID does not exit.
    409Conflict:
      description: The specified resource status conflicts with the current request.
    500InternalServer:
      description: Internal server error
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - BearerAuth: []
paths:
  /v1/programs/{programId}/program-transaction-types:
    post:
      summary: Create program transaction type
      description: >
        A program transaction type is used to associate a transaction type with
        a transaction category. It can also be used to set the charge order. For
        more information, refer to [Using configurable
        entities](doc:full-balance-credit-program#using-configurable-entities).


        **Note:** Only debit transactions and transactions that impact the
        statements can be used to create program transaction types. Use the
        [List transaction types](ref:searchtransactiontypes) endpoint to see if
        a transaction type is a debit (`credit` = `false`) and if it impacts the
        statement (`posted_transaction` = `true`).
      operationId: createProgramTransactionType
      tags:
        - Program transaction types
      parameters:
        - $ref: '#/components/parameters/ProgramIdPath'
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ProgramsTransactionsTypesRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramsTransactionsTypesResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/programs/{programId}/accrual-type-rates:
    post:
      summary: Configure program accrual rates
      description: |
        Configure accrual rates at the program level. 
      operationId: postAccrualTypesRates
      tags:
        - Program accrual rates
      parameters:
        - $ref: '#/components/parameters/ProgramIdPath'
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ProgramAccrualTypesRatesRequest'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramAccrualTypesRatesResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
    get:
      summary: List program accrual rates
      description: |
        Retrieves a list of accrual rates configured at the program level.
      operationId: listProgramAccrualTypesRates
      tags:
        - Program accrual rates
      parameters:
        - $ref: '#/components/parameters/ProgramIdPath'
        - $ref: '#/components/parameters/PerPageQuery'
