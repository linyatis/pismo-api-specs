  /v1/features-by-account-status:
    post:
      summary: Configure features by account status
      description: >
        Configure features by account status at the program or organization
        level.

        <b>Note:</b> This only applies to full balance credit card programs.


        You can toggle the following features on or off for a particular account
        status by setting them to `true` or `false`, respectively. <b>By
        default, all these features are on (`true`)</b>.

        * `close-statements`: If `false`, the platform doesn't perform any cycle
        closings if the account has the specified status.

        * `late-payment-fee`: If `false`, the platform doesn't charge any late
        payment fees if the account has the specified status.

        * `overlimit`: If `false`, the platform doesn't charge any overlimit
        fees if the account has the specified status.

        * `create-accruals`: If `false`, the platform doesn't calculate new
        accruals if the account has the specified status.


        For example, suppose you set the `close-statements` feature to `false`
        for the `CANCELLED` account status for a specific program. (That is, you
        turn the feature off at the program level.) Then the Pismo platform
        won't perform any cycle closings for accounts in that status if they
        belong to that program.


        <b>Important:</b> Once the status is set to bypass the billing cycle
        closure and the account reaches that status, it cannot revert to a
        previous status. In other words, no further cycle closures can occur for
        this account. The change is irreversible.


        There are several points you should keep in mind when using this
        endpoint.

        * You can use this endpoint to set a feature toggle at the organization
        level, whether or not you have created any full balance credit programs
        in your organization. However, if you try to use it to set a feature
        toggle at the program level, and the program isn't a full balance credit
        card program, the endpoint throws an error.

        * If a feature is set to `true` or `false` at the program level, this
        overrules that feature's setting at the organization level. For example,
        if `close-statements` is set to `false` at the organization level and
        `true` at the program level, then the platform continues to perform
        cycle closings for accounts in the specified program. In other words,
        the organization level setting is ignored.

        * If a feature is not set to `true` or `false` at either the program or
        organization level, it defaults to `true`.

        * You can't use this endpoint to update a feature setting for an account
        status if it has already been configured at a particular level. For
        that, you need to use [Update features by account
        status](ref:patchfeaturesbyaccountstatus).


        You can use the [List statuses](ref:v4-get-account-status) endpoint to
        list all the account statuses defined for your organization.
      operationId: postFeaturesByAccountStatus
      tags:
        - Features by account status
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FeaturesByAccountStatusPostRequest'
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header or param:
                  description: x-tenant
                  value:
                    code: EX0001
                    message: 'Request header is missing: x-tenant'
                Status not configured:
                  description: FULL_CANCELLATION
                  value:
                    code: WCCC011
                    message: >-
                      Validation Error: The "FULL_CANCELLATION" account status
                      was not found for this organization.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Internal Server Error:
                  value:
                    code: GN0001
                    message: Generic Error
    get:
      summary: List features by account status
      description: >
        List account statuses with the corresponding feature toggles at program
        or organization level.
      operationId: getFeaturesByAccountStatus
      tags:
        - Features by account status
      parameters:
        - $ref: '#/components/parameters/ProgramIdQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturesByAccountStatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header or param:
                  description: x-tenant
                  value:
                    code: EX0001
                    message: 'Request header is missing: x-tenant'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Configuration not found:
                  description: x-tenant
                  value:
                    code: EX0004
                    message: >-
                      Validation Error: Configuration not found for this
                      organization.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Internal Server Error:
                  value:
                    code: GN0001
                    message: Generic Error
    patch:
      summary: Update features by account status
      description: >
        Update features by account status at the program or organization level.

        <b>Note:</b> This only applies to full balance credit card programs, and
        only features that were previously configured using [Configure features
        by account status](ref:postfeaturesbyaccountstatus) can be updated using
        this endpoint.


        You can toggle the following features on or off for a particular account
        status by setting them to `true` or `false`, respectively. <b>By
        default, all these features are on (`true`)</b>. In the `FEATURES
        OBJECT` body parameter, `newKey`, `newKey-1`, and so on, must be one of
        these features.

        * `close-statements`: If `false`, the platform won't perform any cycle
        closings if the account has the specified status.

        * `late-payment-fee`: If `false`, the platform won't charge any late
        payment fees if the account has the specified status.

        * `overlimit`: If `false`, the platform won't charge any overlimit fees
        if the account has the specified status.


        When modifying an existing account status, all the features previously
        configured must be provided.

        <b>Note:</b> If you send a feature name that does not exist, the
        endpoint returns an error.


        A status can be removed if the `remove_status` flag is set to `true`.  


        The configuration can be reset if the `reset_configuration` flag is set
        to `true`. Resetting the configuration causes all the features to go
        back to their default values (`true`).

        <b>Note:</b> if you set `reset_configuration` to true, and also try to
        update some features for that status, the endpoint generates the
        following error:

        <b>Request body is missing: account_statuses field is not allowed when
        it is set to reset this configuration.</b>


        You can use the [List statuses](ref:v4-get-account-status) endpoint to
        list all the account statuses defined for your organization.           
      operationId: patchFeaturesByAccountStatus
      tags:
        - Features by account status
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/FeaturesByAccountStatusPatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturesByAccountStatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Missing request header or param:
                  description: x-tenant
                  value:
                    code: EX0001
                    message: 'Request header is missing: x-tenant'
                Status not configured:
                  description: FULL_CANCELLATION
                  value:
                    code: WCCC011
                    message: >-
                      Validation Error: The "FULL_CANCELLATION" account status
                      was not found for this organization.
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                Internal Server Error:
                  value:
                    code: GN0001
                    message: Generic Error
