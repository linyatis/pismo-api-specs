  /v1/accounts/{accountId}/accrual-type-rates:
    post:
      summary: Configure account accrual rates
      description: >
        Configure accrual rates for individual accounts.

        To do this, you must first configure the rates at the program level
        using the <a
        href="https://developers.pismo.io/pismo-docs/reference/postaccrualtypesrates"
        target="_blank">Configure program accrual rates</a> endpoint.

        Then, use this endpoint to override the configuration for an individual
        account.

        Use the `accrual_type` field to specify the type of accrual.

        The `periodToCalculate` must be set to `UNTIL_DUE_DATE`, which means the
        accrual stops accruing when the due date is reached.


        NOTE: This endpoint requires an account-specific access token. Getting
        an account token requires you to call [Get OpenID access
        token](ref:post-passport-v1-oauth2-token-1) with an external account ID.
        Tokens can expire quickly, which can result in an Unauthorized message.
      operationId: postAccountAccrualTypesRates
      tags:
        - Account accrual rates
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AccountAccrualTypesRatesRequest'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAccrualTypesRatesResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServer'
    get:
      summary: List account accrual rates
      description: >
        Retrieves a list of accrual rates configured at the account level.


        NOTE: This endpoint requires an account-specific access token. Getting
        an account token requires you to call [Get OpenID access
        token](ref:post-passport-v1-oauth2-token-1) with an external account ID.
        Tokens can expire quickly, which can result in an Unauthorized message.
      operationId: listAccountAccrualTypeRates
      tags:
        - Account accrual rates
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/PerPageQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/TransactionCategoryIdQuery'
        - $ref: '#/components/parameters/AccountAccrualTypeQuery'
        - $ref: '#/components/parameters/PeriodToCalculateQuery'
        - $ref: '#/components/parameters/ValidityToCalculateQuery'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllAccountAccrualTypesRatesResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
    delete:
      summary: Delete account accrual rates
      description: >
        Deletes an accrual rate that's configured for an individual account.

        If only `accountId` is provided, all account accrual rates are deleted
        for that account.

        You can use the optional parameters `transactionCategoryId`,
        `accrualType`, and `periodToCalculate` to specify a subset of the
        account accrual rates that you want to delete.

        For example, if you provide values for `transactionCategoryId`,
        `accrualType`, and `periodToCalculate`, then all account accrual rates
        configured for the specified account, transaction category, accrual
        type, and period to calculate are deleted.


        NOTE: This endpoint requires an account-specific access token. Getting
        an account token requires you to call [Get OpenID access
        token](ref:post-passport-v1-oauth2-token-1) with an external account ID.
        Tokens can expire quickly, which can result in an Unauthorized message.
      operationId: deleteAccountAccrualTypesRate
      tags:
        - Account accrual rates
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/TransactionCategoryIdQuery'
        - $ref: '#/components/parameters/AccountAccrualTypeQuery'
