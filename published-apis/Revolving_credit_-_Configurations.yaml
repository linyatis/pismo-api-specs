  /v1/programs/{programId}/transaction-category-id/{transactionCategoryId}/accrual-type/{accrualType}/period-to-calculate/{periodToCalculate}/configurations:
    post:
      summary: Enable additional configurations on accrual types
      description: >
        Enable additional configurations on accrual types. Any additional
        configuration that you enable modifies the default accrual behavior.


        Specify configurations to enable by listing them as an array in the
        `configurations` body parameter. The following configuration is
        available.

        - `ONCE_AFTER_TRANSACTION_DUE_DATE`: By default, accruals on
        transactions with this transaction category occur on a daily basis. If
        this additional configuration is enabled, then, for each transaction,
        the accrual is calculated only once on the transaction due date.

        **Note:** Unlike other rates that you define using transaction
        categories or accrual type rates, when you enable the
        `ONCE_AFTER_TRANSACTION_DUE_DATE` configuration on an accrual type, the
        rate you define for that type is not divided by 30 before it's applied.
      operationId: postAccrualTypesConfigurations
      tags:
        - Additional accrual type configurations
