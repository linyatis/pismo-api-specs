      example: '2020-06-23T22:29:49Z'
    CustomerEmailAddress:
      description: Customer email
      type: string
      format: email
      example: johndoe@gmail.com
    CustomerName:
      description: Customer name
      type: string
      example: MARIA JOSE
    ItemAmount:
      description: Number of items
      type: integer
      format: int64
      example: 5
    Merchant:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/MerchantName'
        email:
          $ref: '#/components/schemas/EmailAddress'
    AuthorizationCode:
      description: Authorization ID
      type: number
      example: 992009
    GETMerchantTransactionDetailsResponse:
      properties:
        transaction_auth_id:
          $ref: '#/components/schemas/TransactionAuthorizationID'
        card:
          $ref: '#/components/schemas/Card'
        total:
          $ref: '#/components/schemas/TransactionTotalAmount'
        date:
          $ref: '#/components/schemas/TransactionAuthorizationDate'
        email:
          $ref: '#/components/schemas/CustomerEmailAddress'
        name:
          $ref: '#/components/schemas/CustomerName'
        installments:
          $ref: '#/components/schemas/NumberOfInstallments'
        authorization_code:
          $ref: '#/components/schemas/AuthorizationCode'
        account_id:
          $ref: '#/components/schemas/PismoAccountID'
        merchant:
          $ref: '#/components/schemas/Merchant'
        items:
          type: array
          items:
            properties:
              id:
                $ref: '#/components/schemas/ItemID'
              code:
                $ref: '#/components/schemas/ItemCode'
              price:
                $ref: '#/components/schemas/ItemPrice'
              description:
                $ref: '#/components/schemas/ItemDescription'
              amount:
                $ref: '#/components/schemas/ItemAmount'
      example:
        transaction_auth_id: 992009
        card:
          first_four_digits: 1234
          last_four_digits: 6789
        total: 21480
        date: '2020-06-23T22:29:49Z'
        email: johndoe@gmail.com
        name: MARIA JOSE
        installments: 1
        authorization_code: 992009
        account_id: 340018
        items:
          - id: 10452
            code: '31601014'
            price: 9.99
            description: Acupuntura
            amount: 1
        merchant:
          name: Acme Store
          email: store@acme.com
    AdvancementAmountDouble:
      description: Advanced amount
      type: number
      format: double
    AdvancementDiscount:
      description: Advancement discount
      type: number
      format: double
    TransactionTotalDouble:
      description: Transaction total (gross) amount
      type: number
      format: double
    TransactionStatus:
      description: Transaction status
      type: string
      example: SCHEDULED
      enum:
        - PENDING
        - SCHEDULED
        - BLOCKED
        - SETTLED
        - PAID
        - ADVANCED
        - CANCELED
        - RETURNED
    TransactionEventDate:
      description: >-
        The transaction event date and time (sale or refund). UTC date/time -
        format: yyyy-MM-ddThh:mm:ssZ
      type: string
      format: datetime
      example: '2020-07-14T00:41:29Z'
    GETMerchantTransactionResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/MerchantTransactionID'
        authorization_id:
          $ref: '#/components/schemas/AuthorizationID'
        parent_authorization_id:
          $ref: '#/components/schemas/ParentAuthorizationID'
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        merchant_id:
          $ref: '#/components/schemas/MerchantID'
        org_operation_id:
          $ref: '#/components/schemas/OrgOperationID'
        creditor_id:
          $ref: '#/components/schemas/CreditorID'
        installment:
          $ref: '#/components/schemas/InstallmentNumber'
        number_of_installments:
          $ref: '#/components/schemas/NumberOfInstallments'
        amount:
          $ref: '#/components/schemas/TransactionTotalDouble'
        mdr_amount:
          $ref: '#/components/schemas/MDRamount'
        mdr_tax:
          $ref: '#/components/schemas/MDRtax'
        transaction_fee:
          $ref: '#/components/schemas/TransactionFee'
        mdr_without_fee:
          $ref: '#/components/schemas/MDRwithoutFee'
        advancement_discount:
          $ref: '#/components/schemas/AdvancementDiscount'
        advanced_amount:
          $ref: '#/components/schemas/AdvancementAmountDouble'
        event_date:
          $ref: '#/components/schemas/TransactionEventDate'
        scheduled_payment_date:
          $ref: '#/components/schemas/ScheduledPaymentDate'
        origin_transaction_id:
          $ref: '#/components/schemas/OriginTransactionID'
        marketplace_id:
          $ref: '#/components/schemas/MarketplaceID'
      example:
        id: 123456
        authorization_id: '992023'
        parent_authorization_id: '992022'
        type: SALE
        status: PENDING
        merchant_id: 13
        org_operation_id: 51
        creditor_id: 80
        installment: 1
        number_of_installments: 3
        amount: 155.5
        mdr_amount: 5.5
        mdr_tax: 0
        transaction_fee: 0.6
        mdr_without_fee: 4.9
        advancement_discount: 0
        advanced_amount: 0
        event_date: '2023-08-26T12:58:32Z'
        scheduled_payment_date: '2023-09-10'
        origin_transaction_id: 123455
        marketplace_id: 21
    DiscountValueTotal:
      type: number
      description: Total discount value
      example: -0.33
    GETMerchantOperationsResponse:
      type: array
      items:
        properties:
          gross_value_total:
            $ref: '#/components/schemas/GrossValueTotal'
          net_value_total:
            $ref: '#/components/schemas/NetValueTotal'
          operation:
            $ref: '#/components/schemas/OperationName'
          discount_value_total:
            $ref: '#/components/schemas/DiscountValueTotal'
      example:
        - gross_value_total: 10
          net_value_total: 9.67
          operation: Interest-free installment
          discount_value_total: -0.33
    PATCHTransactionRequest:
      properties:
        status:
          $ref: '#/components/schemas/TransactionStatus'
    OperationNotes:
      deprecated: true
      description: |
        Notes about the operation.

        <b>Note</b>: This field is <b>deprecated</b> and scheduled for removal.
      type: string
      example: This is a status change.
  responses:
    400BadRequest:
      description: Bad Request
    401Unauthorized:
      description: Access token is missing or invalid
    404NotFound:
      description: The specified resource was not found
    408RequestTimeout:
      description: Request timeout
    409Conflict:
      description: The specified resource status conflict with the current request.
    422UnprocessableEntity:
      description: Unprocessable Entity
    500InternalServer:
      description: Internal server error
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - BearerAuth: []
paths:
  /v1/businesscategories:
    get:
      summary: List business categories
      description: Retrieves the list of business categories for merchants.
      operationId: listBusinessCategories
      tags:
        - Merchant business category
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PerPageQuery'
        - $ref: '#/components/parameters/ExternalCodeQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GETBusinessCategoryResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/businesscategories/{externalCode}:
    get:
      summary: Get business category
      description: >-
        Get business category using external code. The category is the type of
        business.
      operationId: getBusinessCategory
      tags:
        - Merchant business category
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/ExternalCodePath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessCategory'
        '400':
          description: Bad request
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/merchants:
    post:
      summary: Create merchant
      description: >
        Create merchant. You use this endpoint to register a merchant (store) in
        a marketplace using the information the merchant provides.


        <b>Note:</b> Before you create merchants, you must create a Merchant
        program, using the [Create program based on
        template](ref:createprogrambasedontemplate) endpoint with `type` set to
        `MERCHANT`. If a program of type `MERCHANT` is not provided, the request
        returns an error.

        By default, when a merchant is created, the Pismo platform assigns it to
        the first existing program of type `MERCHANT` in the Org. However, you
        have the option of specifying a program by providing its ID in the
        `program_id` field.


        <b>Note:</b> When a `x-marketplace-id` header is provided, the merchant
        is automatically linked to the provided marketplace after creation.


        For more information about merchants, refer to the <a
        href="https://developers.pismo.io/pismo-docs/docs/seller-management-overview"
        target="blank">Seller management overview</a> guide.<br>


        This endpoint generates a [Merchant
        created](https://developers.pismo.io/events/docs/merchants-merchant-created-1)
        event.
      operationId: createMerchant
      tags:
        - Merchant
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/XMarketplaceIDheader'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/POSTMerchantRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/POSTMerchantResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
    get:
      summary: List merchants
      description: >
        Find merchants using query parameters.


        For more information about merchants, see the <a
        href="https://developers.pismo.io/pismo-docs/docs/seller-management-overview"
        target="blank">Seller management overview</a> guide.
      operationId: listMerchants
      tags:
        - Merchant
      parameters:
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/XMarketplaceIDheader'
        - $ref: '#/components/parameters/DocumentNumberQuery'
        - $ref: '#/components/parameters/MerchantStatusQuery'
        - $ref: '#/components/parameters/MerchantNameQuery'
        - $ref: '#/components/parameters/ExternalIDQuery'
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindMerchantsResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/merchants/{merchantId}:
    get:
      summary: Get merchant
      description: >
        Get merchant by ID.


        For more information about merchants, see the <a
        href="https://developers.pismo.io/pismo-docs/docs/seller-management-overview"
        target="blank">Seller management overview</a> guide.
      operationId: getMerchant
      tags:
        - Merchant
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GETMerchantResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
    put:
      summary: Update merchant
      description: >
        Update merchant by ID.


        For more information about merchants, see the <a
        href="https://developers.pismo.io/pismo-docs/docs/seller-management-overview"
        target="blank">Seller management overview</a> guide.<br>

        This endpoint generates a [Merchant
        updated](https://developers.pismo.io/events/docs/merchants-merchant-updated-1)
        event.
      operationId: updateMerchant
      tags:
        - Merchant
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PUTMerchantRequest'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/creditors:
    get:
      summary: List creditors
      description: List creditors using query parameters.
      operationId: listCreditors
      tags:
        - Merchant creditor
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/CreditorNameQuery'
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GETCreditorsResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/creditors/{creditorId}:
    get:
      summary: Get creditor
      description: Get creditor by ID.
      operationId: getCreditor
      tags:
        - Merchant creditor
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/CreditorIDpath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditorResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
    put:
      summary: Update creditor
      description: >
        Update creditor using its ID.


        This endpoint generates a [Marketplace creditor operation
        updated](https://developers.pismo.io/events/docs/marketplace-marketplace-creditor-operation-updated-1)
        event.
      operationId: updateCreditor
      tags:
        - Merchant creditor
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/CreditorIDpath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/POSTCreditorRequest'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/merchants/{merchantId}/transactions:
    post:
      summary: Create merchant transaction
      description: >
        Create merchant transaction using the merchant ID.<br>

        This endpoint generates a [Merchant transaction
        created](https://developers.pismo.io/events/docs/merchants-merchant-transaction-created-1)
        event.
      operationId: createMerchantUsingMerchantID
      tags:
        - Merchant transaction
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Transaction'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '409':
          $ref: '#/components/responses/409Conflict'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/merchants/{merchantId}/workflow/statuses:
    get:
      summary: List status transitions
      description: |
        List the status transitions using the merchant ID.
      operationId: listStatusTransitions
      tags:
        - Merchant
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantWorkflowStatus'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/merchants/{merchantId}/workflow/status:
    put:
      summary: Update merchant status
      description: >
        Update merchant status using the merchant ID.


        To find all available merchant status transitions, use [List status
        transitions](ref:liststatustransitions).


        This endpoint generates a [Merchant
        updated](https://developers.pismo.io/events/docs/merchants-merchant-updated-1)
        event.
      operationId: updateMerchantStatus
      tags:
        - Merchant
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              required:
                - status
              properties:
                status:
                  $ref: '#/components/schemas/MerchantStatus'
                notes:
                  $ref: '#/components/schemas/OperationNotes'
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v3/merchants/{merchantId}/operations:
    get:
      summary: List merchant transactions by operations
      description: >
        List merchant transactions grouped by Org operations. Returns one item
        for each Org operation that has transactions for the specified date.

        An item lists the amounts (gross, net, and discount) for that operation.
      operationId: listMerchatTransactionsByOperationsV3
      tags:
        - Merchant transaction
      parameters:
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
        - $ref: '#/components/parameters/MarketplaceQuery'
        - $ref: '#/components/parameters/PaymentDateQuery'
        - $ref: '#/components/parameters/MerchantTransactionTypeQuery'
        - $ref: '#/components/parameters/AdvancementRequestStatusQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GETMerchantOperationsResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v2/merchants/{merchantId}/transactions:
    get:
      summary: List merchant transactions (V2)
      description: >
        List merchants transactions filtered using query parameters.


        <b>NOTE</b>: By default, the endpoint returns only 60 days of merchant
        transactions. If you want a longer period (up to 365 days),

        you must provide the `saleAuthorizationId` parameter, and specify a
        desired date in both `startEventDate` and `endEventDate`.
      operationId: listMerchantTransactionsV2
      tags:
        - Merchant transaction
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
        - $ref: '#/components/parameters/OriginTransactionIDquery'
        - $ref: '#/components/parameters/AuthorizationIDquery'
        - $ref: '#/components/parameters/SaleAuthorizationIDquery'
        - $ref: '#/components/parameters/OrderIDquery'
        - $ref: '#/components/parameters/TransactionStatusQuery'
        - $ref: '#/components/parameters/StartEventDateQuery'
        - $ref: '#/components/parameters/EndEventDateQuery'
        - $ref: '#/components/parameters/StartPaymentDateQuery'
        - $ref: '#/components/parameters/EndPaymentDateQuery'
        - $ref: '#/components/parameters/StartReceiptDateQuery'
        - $ref: '#/components/parameters/EndReceiptDateQuery'
        - $ref: '#/components/parameters/OperationQuery'
        - $ref: '#/components/parameters/OrgOperationIDquery'
        - $ref: '#/components/parameters/GrossValueQuery'
        - $ref: '#/components/parameters/NetValueQuery'
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '408':
          $ref: '#/components/responses/408RequestTimeout'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v3/merchants/{merchantId}/transactions:
    get:
      summary: List merchant transactions (V3)
      description: List merchant transactions filtered using query parameters.
      operationId: listMerchantTransactionsV3
      tags:
        - Merchant transaction
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
        - $ref: '#/components/parameters/MarketplaceIDquery'
        - $ref: '#/components/parameters/TransactionStatusQuery'
        - $ref: '#/components/parameters/StartPaymentDateQuery'
        - $ref: '#/components/parameters/EndPaymentDateQuery'
        - $ref: '#/components/parameters/StartEventDateQuery'
        - $ref: '#/components/parameters/EndEventDateQuery'
        - $ref: '#/components/parameters/StartReceiptDateQuery'
        - $ref: '#/components/parameters/EndReceiptDateQuery'
        - $ref: '#/components/parameters/OrgOperationIDquery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/TransactionMetadataQuery'
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PerPageQuery'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GETTransactionsV3Response'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '408':
          $ref: '#/components/responses/408RequestTimeout'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v2/merchants/{merchantId}/transactions/{merchantTransactionId}:
    get:
      summary: Get merchant transaction
      description: Get transaction details using merchant transaction ID
      operationId: getMerchantTransactionV2
      tags:
        - Merchant transaction
      parameters:
        - $ref: '#/components/parameters/ContentTypeHeader'
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
        - $ref: '#/components/parameters/MerchantTransactionIDpath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GETMerchantTransactionResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '408':
          $ref: '#/components/responses/408RequestTimeout'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/merchants/{merchantId}/reversal-transactions:
    post:
      summary: Create reversal transaction
      description: >
        Create reversal transaction using merchant ID.

        This endpoint generates a [Merchant transaction
        settled](https://developers.pismo.io/events/docs/merchants-merchant-transaction-settled-1)
        event.
      operationId: createReversalTransaction
