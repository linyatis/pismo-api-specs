        sometimes called a prepayment of receivables. You arrange to have a
        financial

        institution make regular deposits into your account equal to what you
        expect to receive in the future from credit card sales in installments
        or post-dated

        checks and bills. The financial institution deducts its fee before it
        puts the money in your account. You pay back each deposit when you
        receive

        payment from your customers. This is a way of covering business expenses
        in the short term. It's a cheaper alternative to a loan.


