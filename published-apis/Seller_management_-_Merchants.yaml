  /v2/merchants/{merchantId}/transactions-totals:
    get:
      summary: Get transactions summary [beta]
      description: >
        Returns the transactions totals summarized by status and/or date.

        When the `groupBy` is provided with the values `date` or `dateAndStatus`
        the date range between `startPaymentDate` and `endPaymentDate` must not
        exceed 30 days.
      operationId: getTransactionsSummaryV2
      tags:
        - Merchant transaction
      parameters:
        - $ref: '#/components/parameters/AuthorizationTokenHeader'
        - $ref: '#/components/parameters/MerchantIDpath'
        - name: startPaymentDate
          in: query
          description: >
            Initial scheduled payment date used to filter the transactions.
            Format yyyy-mm-dd.

            Finds scheduled payments between this date and `endPaymentDate`.
          required: true
          schema:
            type: string
            format: date
            example: '2020-01-01'
        - name: endPaymentDate
          in: query
          description: >
            Final scheduled payment date used to filter the transactions. Format
            yyyy-mm-dd.

            Finds scheduled payments between `startPaymentDate` and this date.
          required: true
          schema:
            type: string
            format: date
            example: '2020-01-02'
        - name: marketplaceId
          in: query
          description: >
            Marketplace ID used as filter. When provided, it returns the values
            of the transactions belonging only to the marketplace.

            When not provided, it returns the values of all transactions for the
            provided Merchant ID.
          schema:
            type: integer
            format: int64
            example: 12
        - name: status
          in: query
          description: >-
            Transaction status used as a filter. When provided, it returns the
            values of the transactions matching this status.
          schema:
            type: string
            example: SCHEDULED
        - name: groupBy
          in: query
          description: >
            Group the returned entries by this criteria. The default value is
            `status`.

            - For the `status` value, returns one item per different status in
            the response.

            - For the `date` value, returns one item per day between the
            `startPaymentDate` and `endPaymentDate` that have transaction values
            for the filters. The response is ordered by day in ascending order.

            - For the `dateAndStatus` value, returns one item per day and
            status. The response is ordered by day and status in ascending
            order.
          schema:
            type: string
            example: status
            enum:
              - status
              - date
              - dateAndStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GETTransactionsTotalsV2Response'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServer'
