        first_installment_interval:
          $ref: '#/components/schemas/FirstInstallmentInterval'
        following_installments_interval:
          $ref: '#/components/schemas/FollowingInstallmentsInterval'
        creditor_id:
          $ref: '#/components/schemas/CreditorID'
        work_days_interval:
          $ref: '#/components/schemas/WorkDaysInterval'
        status:
          $ref: '#/components/schemas/MerchantTransactionStatusCreation'
    TransactionOrgOperation:
      description: Org operation
      type: object
      required:
        - org_operation_id
      properties:
        org_operation_id:
          $ref: '#/components/schemas/OrgOperationID'
    TransactionAdditionalInfo:
      description: Additionnal information
      type: object
      required:
        - account_id
      properties:
        account_id:
          $ref: '#/components/schemas/PismoAccountID'
        any_other_key:
          $ref: '#/components/schemas/AnyOtherKey'
    TransactionScheduledItems:
      description: Scheduled items
      type: array
      items:
        properties:
          code:
            $ref: '#/components/schemas/ItemCode'
          description:
            $ref: '#/components/schemas/ItemDescription'
    MerchantItems:
      description: Items merchant is selling
      type: array
      items:
        properties:
          code:
            $ref: '#/components/schemas/ItemCode'
          description:
            $ref: '#/components/schemas/ItemDescription'
    TransactionMetadata:
      description: >-
        Metadata. The accepted parameters are `MarketplaceAuthorization` and
        `MarketplaceTransaction`.
      type: array
      items:
        type: object
        description: Array of objects containing metadata
        properties:
          name:
            type: string
            example: any value
          value:
            type: string
            example: any value
      example:
        - name: MarketplaceAuthorization
          value: ashga-jwjh-huahu-wquiqw
        - name: MarketplaceTransaction
          value: wquiqw-jwjh-huahu-ashga
    Transaction:
      description: Merchant transaction
      type: object
      properties:
        marketplace_id:
          $ref: '#/components/schemas/MarketplaceID'
        authorization:
          $ref: '#/components/schemas/TransactionAuthorization'
        acceptance:
          $ref: '#/components/schemas/TransactionAcceptance'
        operation:
          $ref: '#/components/schemas/TransactionOrgOperation'
        additional_info:
          $ref: '#/components/schemas/TransactionAdditionalInfo'
        scheduled_items:
          $ref: '#/components/schemas/TransactionScheduledItems'
        items:
          $ref: '#/components/schemas/MerchantItems'
        meta:
          $ref: '#/components/schemas/TransactionMetadata'
    AuthorizedAmount:
      description: Authorized amount (must be a multiple of 100)
      type: number
      example: 10000
    MDRpenalty:
      description: >-
        Indicates whether there should be a merchant discount rate (MDR)
        penalty. If true, the fixed transaction fee and the MDR amount are not
        reversed.
      type: boolean
      example: false
    ReversalTransaction:
      description: Reversal transaction for merchant
      type: object
      required:
        - amount
        - processing_code
        - event_date_hour
      properties:
        authorization:
          description: Marketplace authorization
          type: object
          properties:
            id:
              $ref: '#/components/schemas/MarketplaceAuthorizationID'
        amount:
          $ref: '#/components/schemas/AuthorizedAmount'
        mdr_penalty:
          $ref: '#/components/schemas/MDRpenalty'
        processing_code:
          $ref: '#/components/schemas/ProcessingCode'
        event_date_hour:
          $ref: '#/components/schemas/EventDateHour'
