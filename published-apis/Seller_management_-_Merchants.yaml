    MarketplaceID:
      description: Marketplace ID
      type: integer
      format: int64
      example: 1
    OrgOperationID:
      description: >-
        Processing code. See <a
        href="https://developers.pismo.io/pismo-docs/docs/processing-codes-and-transaction-types"
        target="_blank">Processing codes and transaction types</a>.
      type: integer
      format: int64
      example: 1
    MinInstallments:
      description: Minimum number of installments
      type: integer
      format: int64
      example: 1
      default: 1
    MaxInstallments:
      description: >-
        Maximum number of installments. The default is the same value as
        `min_installments`.
      type: integer
      format: int64
      example: 1
    MinAmount:
      description: Minimum transaction amount
      type: number
      format: double
      example: 0.01
      default: 0.01
    InterestRate:
      description: Interest rate
      type: number
      format: double
      example: 0.5
      default: 0
    POSTAcceptanceRequest:
      required:
        - merchant_id
        - program_id
        - org_operation_id
        - credit_limit_impact_id
      properties:
        merchant_id:
          $ref: '#/components/schemas/MerchantID'
        program_id:
          $ref: '#/components/schemas/MerchantProgramID'
        org_operation_id:
          $ref: '#/components/schemas/OrgOperationID'
        min_installments:
          $ref: '#/components/schemas/MinInstallments'
        max_installments:
          $ref: '#/components/schemas/MaxInstallments'
        min_amount:
          $ref: '#/components/schemas/MinAmount'
        interest_rate:
          $ref: '#/components/schemas/InterestRate'
    AcceptanceID:
      description: Acceptance ID
      type: integer
      format: int64
      example: 1
    POSTAcceptanceResponse:
      properties:
        acceptance_id:
          $ref: '#/components/schemas/AcceptanceID'
      example:
        acceptance_id: 1
    CreditorID:
      description: Creditor ID
      type: integer
      format: int64
      example: 1
    CreditorName:
      description: Creditor name
      type: string
      minLength: 1
      maxLength: 128
      example: Acme Corporation
    CreditingMethod:
      description: |
        Crediting method. Must be set to `ACCOUNT`.
      type: string
      example: ACCOUNT
      enum:
        - ACCOUNT
    CreditorDiscountRate:
      description: |
        Advancement discount rate for creditor.
      type: string
      default: '0.025'
      example: '0.03'
    CreditorDiscountRateMerchant:
      description: >
        Advancement discount rate for creditor. If the client doesn't provide a
        value for this field, the server tries to retrieve the value from the
        <b>Percentage rate over the anticipated gross amount</b> parameter for
        the provided `program_id` in the Pismo console.

        If the `program_id` of the merchant is not found or the parameter is
        disabled, the server uses the default value of `0.025`.
      type: string
      default: '0.025'
      example: '0.03'
    MaximumAdvancementPercentage:
      description: |
        Maximum advancement percentage for creditor.
      type: string
      default: '1'
      example: '0.80'
    MaximumAdvancementPercentageMerchant:
      description: >
        Maximum advancement percentage for creditor. If the client didn't
        provide a value for this field, the server tries to retrieve the value
        from the <b>Max percentage that can be anticipated</b> parameter for the
        provided `program_id` in the Pismo console.
          If the `program_id` of the merchant is not found or the parameter is disabled, the server uses the default value of `1`.
      type: string
      default: '1'
      example: '0.80'
    CreditorResponse:
      description: >
        Response from merchant creditor. This is the entity from which the
        merchant receives money when a transaction is settled.

        It can be an external bank account or a Pismo account.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/CreditorID'
        name:
          $ref: '#/components/schemas/CreditorName'
        crediting_method:
          $ref: '#/components/schemas/CreditingMethod'
        account:
          description: Pismo platform account
          type: object
          properties:
            id:
              $ref: '#/components/schemas/PismoAccountID'
        advancement_fee:
          $ref: '#/components/schemas/AdvancementFeeInRequest'
        discount_rate:
          $ref: '#/components/schemas/CreditorDiscountRate'
        maximum_advancement_percentage:
          $ref: '#/components/schemas/MaximumAdvancementPercentage'
      example:
        id: 7611
        name: Acme Corporation
        crediting_method: ACCOUNT
        account:
          id: 2
        advancement_fee: '3.00'
        discount_rate: '0.025'
        maximum_advancement_percentage: '0.80'
    MerchantCreditorResponse:
      description: |
        Get response from merchant creditor.
      properties:
        id:
          $ref: '#/components/schemas/CreditorID'
        name:
          $ref: '#/components/schemas/CreditorName'
        crediting_method:
          $ref: '#/components/schemas/CreditingMethod'
        account:
          description: Pismo platform account
          type: object
          properties:
            id:
              $ref: '#/components/schemas/PismoAccountID'
        advancement_fee:
          $ref: '#/components/schemas/AdvancementFeeInRequest'
        discount_rate:
          $ref: '#/components/schemas/CreditorDiscountRate'
        maximum_advancement_percentage:
          $ref: '#/components/schemas/MaximumAdvancementPercentage'
      example:
        id: 7611
        name: Acme Corporation
        crediting_method: ACCOUNT
        account:
          id: 2
        advancement_fee: '3.00'
        discount_rate: '0.025'
        maximum_advancement_percentage: '0.80'
    GETCreditorsResponse:
      type: object
      properties:
        total_items:
          $ref: '#/components/schemas/TotalItems'
        per_page:
          $ref: '#/components/schemas/PerPage'
        pages:
          $ref: '#/components/schemas/Pages'
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreditorResponse'
      example:
        total_items: 2330
        per_page: 10
        pages: 233
        current_page: 1
        items:
          - id: 7611
            name: Acme Corporation
            crediting_method: ACCOUNT
            advancement_fee: '3.00'
            discount_rate: '0.025'
            maximum_advancement_percentage: '0.80'
    AdvancementFeeInRequest:
      description: |
        Advancement fee for creditor.
      type: string
      default: '10'
      example: '30.00'
    AdvancementFeeInRequestMerchant:
      description: >
        Advancement fee for creditor. If you don't specify a value for this
        field, the server tries to retrieve the value from the <b>Fixed fee
        applied to the

        advancement transaction</b> parameter for the provided `program_id` in
        the Pismo console. If the `program_id` is not provided or the parameter
        is disabled,

        the server uses the default value of `10`.
      type: string
      default: '10'
      example: '30.00'
    POSTCreditorRequest:
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/CreditorName'
        crediting_method:
          $ref: '#/components/schemas/CreditingMethod'
        advancement_fee:
          $ref: '#/components/schemas/AdvancementFeeInRequest'
        discount_rate:
          $ref: '#/components/schemas/CreditorDiscountRate'
        maximum_advancement_percentage:
          $ref: '#/components/schemas/MaximumAdvancementPercentage'
    PUTMerchantCreditorRequest:
      description: >
        This is the entity from which the merchant receives money when a
        transaction is settled.

        It should be a Pismo account.
      required:
        - name
      properties:
        id:
          $ref: '#/components/schemas/CreditorID'
    POSTMerchantCreditorRequest:
      description: >
        This is the entity from which the merchant receives money when a
        transaction is settled.

        It should be a Pismo account.


        You can either provide an `id` to create a merchant with an already
        existing creditor, or fill in the creditor fields to create a new
        creditor for the created merchant.
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/CreditorName'
        id:
          $ref: '#/components/schemas/CreditorID'
        crediting_method:
          $ref: '#/components/schemas/CreditingMethod'
        advancement_fee:
          $ref: '#/components/schemas/AdvancementFeeInRequestMerchant'
        discount_rate:
          $ref: '#/components/schemas/CreditorDiscountRateMerchant'
        maximum_advancement_percentage:
          $ref: '#/components/schemas/MaximumAdvancementPercentageMerchant'
    MatchedSettlement:
      description: >
        Indicates whether this is a matched settlement. A matched settlement
        means the full amount is paid in one single payment, whereas `false`
        indicates the

        settlement is paid in several batches. The default value is `false`.
      type: boolean
      default: false
      example: false
    MatchedMDR:
      description: >
        Indicates whether or not this is a matched merchant discount rate (MDR).
        If `false`, the fixed transaction fee and the MDR amount is applied only
        to the

        first installment. The default value is `false`.
      type: boolean
      default: false
      example: false
    FirstInstallmentInterval:
      description: >
        First installment interval. This is the amount of days between the
        purchase and the due date of the first installment.

        For example, if the merchant made the sale on 2023-03-10 and
        `first_installment_interval` is 10, then `scheduled_payment_date` is
        2023-03-20.
      type: integer
      format: int64
      example: 30
    FollowingInstallmentsInterval:
      description: >-
        Interval for following installments. The first installment interval
        could be shorter than the interval between subsequent installments.
      type: integer
      format: int64
      example: 1
    ProcessingCode:
      description: >-
        Processing code. See <a
        href="https://developers.pismo.io/pismo-docs/docs/processing-codes-and-transaction-types"
        target="_blank">Processing codes and transaction types</a>.
      type: integer
      format: int64
      example: 11827
    ProcessingCodeString:
      description: >-
        Processing code. For more information, refer to <a
        href="https://developers.pismo.io/pismo-docs/docs/processing-codes-and-transaction-types"
        target="_blank">Processing codes</a>.
      type: string
      example: 00AB01
    PismoAccountID:
      description: Pismo account ID
      type: integer
      format: int64
      example: 8675309
    EventDateHour:
      description: 'The event date and time. UTC date/time - format: yyyy-MM-ddThh:mm:ssZ'
      type: string
      format: datetime
      example: '2020-04-20T18:14:56Z'
    AuthorizedPrincipalAmount:
      description: authorized principal amount
      type: number
      minimum: 0
      example: 10000
    InstallmentAmount:
      description: Installment amount
      type: number
      example: 10000
    WorkDaysInterval:
      description: Indicates whether to consider only business days.
      type: boolean
      example: true
    AnyOtherKey:
      type: string
      example: any other value
    ItemDescription:
      description: Item description
      type: string
      example: Widget number one
    CurrencyCode:
      description: >
        Represents the currency with an ISO-4217 alphabetic or numeric (3
        characters) string. For example, you represent Brazilian real with
        either BRL or 986.

        If you don't provide this code, the system uses the currency from the
        merchant program.
      type: string
      example: '986'
    CurrencyCodeResponse:
      description: |
        ISO-4217 alphabetic (3 characters) currency code.
      type: string
      example: BRL
    TransactionAuthorization:
      description: Marketplace authorization
      type: object
      required:
        - event_date_hour
