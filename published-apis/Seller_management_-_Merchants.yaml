openapi: 3.1.0
info:
  title: Seller management - Merchants
  version: 1.0.0
  description: API for merchant operations
  contact:
    name: API Support
    url: https://developers.pismo.io/support
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/merchants
    description: Sandbox API server for testing
tags:
  - name: Merchant
    description: Endpoints for merchant operations
  - name: Merchant creditor
    description: Endpoints for creditor operations
  - name: Merchant transaction
    description: Endpoints for transactions
  - name: Merchant advancement
    description: Endpoints for advancement operations
  - name: Merchant business category
    description: Endpoints for business category
  - name: Merchant acceptance
    description: Endpoints for acceptances
  - name: Merchant marketplace
    description: Endpoints for marketplace operations
  - name: Merchant location
    description: Endpoints for merhant locations
  - name: Merchant transaction operation
    description: Endpoints for merchant transaction operations
components:
  parameters:
    ContentTypeHeader:
      name: Content-Type
      in: header
      description: Content type
      schema:
        type: string
        example: application/json
    ExternalCodeQuery:
      name: externalCode
      in: query
      description: >-
        External code for business category. The category is the type of
        business.
      required: true
      schema:
        type: string
        maxLength: 128
        example: 123-abc
    ExternalCodePath:
      name: externalCode
      in: path
      description: >-
        External code for business category. The category is the type of
        business.
      required: true
      schema:
        type: string
        maxLength: 128
        example: 123-abc
    AuthorizationTokenHeader:
      name: Authorization
      in: header
      description: >-
        Authorization token. This is a regular access token, which does not need
        to include an account ID.
      schema:
        type: string
        example: Bearer 1JI12J39182H39182JDIOAWJ%=
    XMarketplaceIDheader:
      name: x-marketplace-id
      in: header
      description: Marketplace ID
      schema:
        type: integer
        format: int64
        example: 123456
    MarketplaceIDquery:
      name: marketplaceId
      in: query
      description: Marketplace ID
      required: false
      schema:
        type: integer
        format: int64
        example: 1
    MarketplaceQuery:
      name: marketplace
      in: query
      description: Marketplace ID
      required: false
      schema:
        type: integer
        format: int64
        example: 1
    DocumentNumberQuery:
      name: documentNumber
      in: query
      description: Merchant document number
      schema:
        type: string
        minLength: 1
        maxLength: 128
        example: '73399909000114'
    MerchantIDpath:
      name: merchantId
      in: path
      description: Merchant ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1
    MerchantStatusQuery:
      name: status
      in: query
      description: >-
        Merchant status. This is a string, not an enum, so any string value is
        allowed, but the most commonly used values are: 'ACTIVE', 'ANALYSING',
        'APPROVED', 'CANCELLED', 'PENDING', 'REJECTED'
      schema:
        type: string
        example: ACTIVE
    MerchantNameQuery:
      name: name
      in: query
      description: Merchant name
      schema:
        type: string
        minLength: 1
        maxLength: 128
        example: Acme Store
    AcceptanceIDpath:
      name: acceptanceId
      in: path
      description: Acceptance ID
      required: true
      schema:
        type: integer
        format: int64
        example: 121234
    PageNumberQuery:
      name: page
      in: query
      description: Page number. Default is 1.
      schema:
        type: integer
        format: int32
        example: 1
    CreditorNameQuery:
      name: name
      in: query
      description: Creditor name
      schema:
        type: string
        minLength: 1
        maxLength: 128
    PageQuery:
      name: page
      in: query
      description: Current page number
      schema:
        type: integer
        format: int64
        default: 1
        example: 1
    PerPageQuery:
      name: perPage
      in: query
      description: Items per page. Default is 10.
      schema:
        type: integer
        format: int32
        example: 10
    CreditorIDpath:
      name: creditorId
      in: path
      description: Creditor ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1
    MerchantTransactionIDpath:
      name: merchantTransactionId
      in: path
      description: Merchant Transaction ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1
    StartPaymentDateQuery:
      name: startPaymentDate
      in: query
      description: >-
        Scheduled payment start date. Find scheduled payments between this date
        and `endPaymentDate`. Format = yyyy-mm-dd.
      schema:
        type: string
        format: date
        example: '2020-01-01'
    EndPaymentDateQuery:
      name: endPaymentDate
      in: query
      description: >-
        Scheduled payment end date. Format = yyyy-mm-dd. Find scheduled payments
        between `startPaymentDate` and this date.
      schema:
        type: string
        format: date
        example: '2020-01-02'
    TransactionIDpath:
      name: transactionId
      in: path
      description: Transaction ID
      required: true
      schema:
        type: integer
        format: int64
        example: 123
    OriginTransactionIDquery:
      name: originTransactionId
      in: query
      description: >-
        Merchant's original transaction ID. If it's a sale, then it's null; if
        it's a refund, then it refers to the transaction ID of a sale.
      schema:
        type: integer
        format: int64
        example: 1
    AuthorizationIDquery:
      name: authorizationId
      in: query
      description: >
        Authorization ID. Automatically generated unique identifier used in any
        flow where a transaction is created, whether sale, resale or
        cancellation.
      schema:
        type: integer
        format: int64
        example: 112345
    SaleAuthorizationIDquery:
      name: saleAuthorizationId
      in: query
      description: >
        Authorization ID of sale. This refers to the authorization ID of a
        transaction to which the current transaction is tied.

        For example, when you cancel a transaction, `saleAuthorizationId` is the
        `authorizationId` of the transaction that you are cancelling.


        Example of a sale: authorizationId: 101011


        Cancelling this sale: authorizationId: 101012, saleAuthorizationId :
        101011
      schema:
        type: integer
        format: int64
        example: 112345
    OrderIDquery:
      name: orderId
      in: query
      description: Marketplace authorization (external or internal) ID
      schema:
        type: integer
        format: int64
        example: 1
    TransactionStatusQuery:
      name: status
      in: query
      description: Transaction status
      schema:
        type: string
        example: SCHEDULED
        enum:
          - PENDING
          - SCHEDULED
          - BLOCKED
          - SETTLED
          - PAID
          - ADVANCED
          - CANCELED
          - RETURNED
    AdvancementRequestStatusQuery:
      name: status
      in: query
      description: Advancement request status
      schema:
        type: string
        example: PENDING
        enum:
          - PENDING
          - PROCESSED
          - ERROR
    OrgOperationIDquery:
      name: orgOperationId
      in: query
      description: >-
        Processing code. See <a
        href="https://developers.pismo.io/pismo-docs/docs/processing-codes-and-transaction-types"
        target="_blank">Processing codes and transaction types</a>.
      schema:
        type: integer
        format: int64
        example: 1
    StartEventDateQuery:
      name: startEventDate
      in: query
      description: >-
        Date authorization is generated (and associated event emitted). Format
        is `yyyy-mm-dd`.
      schema:
        type: string
        format: date
        example: '2020-01-01'
    EndEventDateQuery:
      name: endEventDate
      in: query
      description: End date of transaction event. Format is `yyyy-mm-dd`.
      schema:
        type: string
        format: date
        example: '2020-01-02'
    StartReceiptDateQuery:
      name: startReceiptDate
      in: query
      description: Start date of merchant transaction settlement. Format is `yyyy-mm-dd`.
      schema:
        type: string
        format: date
        example: '2020-01-01'
    EndReceiptDateQuery:
      name: endReceiptDate
      in: query
      description: End date of merchant transaction settlement. Format is `yyyy-mm-dd`.
      schema:
        type: string
        format: date
        example: '2020-01-02T00:00:00.000Z'
    OperationQuery:
      name: operation
      deprecated: true
      in: query
      description: Transaction operation description
      schema:
        type: integer
        format: int64
        example: 1
    GrossValueQuery:
      name: grossValue
      in: query
      description: >
        Gross amount of the transaction. `startEventDate` and `endEventDate`
        must be on the same date.

        For example: grossValue: 100, startEventDate: 2023-03-01, endEventDate:
        2023-03-01,
      schema:
        type: number
        format: float
        example: 12.01
    NetValueQuery:
      name: netValue
      in: query
      description: >
        Net amount of the transaction. `startEventDate` and `endEventDate` must
        be on the same date.

        For example: netValue: 101, startEventDate: 2023-04-01, endEventDate:
        2023-04-01
      schema:
        type: number
        format: float
        example: 10.01
    SortByQuery:
      name: sortBy
      in: query
      description: Sort field
      schema:
        type: string
        example: paymentDate
    TransactionMetadataQuery:
      name: meta
      in: query
      description: >-
        Metadata. The accepted parameters are `MarketplaceAuthorization` and
        `MarketplaceTransaction`.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        example: MarketplaceTransaction:wquiqw-jwjh-huahu-ashga
    RequestDateQuery:
      name: date
      in: query
      description: Request date. Format is `yyyy-mm-dd`.
      schema:
        type: string
        format: date
        example: '2021-07-31'
    AdvancementRequestIDquery:
      name: advancementRequestId
      in: path
      description: Advancement request ID
      required: true
      schema:
        type: integer
        format: int64
        example: 995
    MerchantTransactionTypeQuery:
      name: transactionType
      in: query
      description: |
        Transaction type. Currently, SALES is the only value allowed.
      schema:
        type: string
        example: SALES
        enum:
          - SALES
    PaymentDateQuery:
      name: paymentDate
      in: query
      description: Payment date. Format = yyyy-mm-dd.
      schema:
        type: string
        format: date
        example: '2018-03-29'
    ExternalIDQuery:
      name: externalId
      in: query
      description: ID used by client to reference a merchant in their domain.
      schema:
        type: string
        minLength: 1
        maxLength: 50
        example: '5321'
  schemas:
    OrgID:
      type: string
      description: Organization/tenant ID
      example: TN-f878e4a1-2879-48ba-be16-821e73ac98db
    BusinessCategoryID:
      description: Business category ID
      type: string
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    ExternalCode:
      description: >
        Code for merchant category. The category is the type of business. You
        can use the endpoint <a
        href="https://developers.pismo.io/pismo-docs/reference/get_v1-businesscategories">Retrieves
        business categories corresponding to query parameters</a> to get a list
        of business categories and their external codes.
      type: string
      minLength: 1
      maxLength: 128
    BusinessCategoryName:
      description: Business category name
      type: string
      minLength: 1
      maxLength: 128
    BusinessCategoryDescription:
      description: Business category description
      type: string
      minLength: 1
      maxLength: 128
    BusinessCategory:
      type: object
      description: Type of business
      properties:
        org_id:
          $ref: '#/components/schemas/OrgID'
        business_category_id:
          $ref: '#/components/schemas/BusinessCategoryID'
        external_code:
          $ref: '#/components/schemas/ExternalCode'
        category:
          $ref: '#/components/schemas/BusinessCategoryName'
        description:
          $ref: '#/components/schemas/BusinessCategoryDescription'
    HasNext:
      description: Indicates whether there are more pages after the current one.
      type: boolean
      example: false
    PerPage:
      description: Number of items per page
      type: integer
      format: int64
      example: 20
    CurrentPage:
      type: integer
      format: int64
      description: Current page number
      default: 1
      example: 1
    Pages:
      description: Number of pages
      type: integer
      format: int64
      example: 10
    TotalItems:
      description: Total number of items
      type: integer
      format: int64
      example: 74
    GETBusinessCategoryResponse:
      properties:
        has_next:
          $ref: '#/components/schemas/HasNext'
        per_page:
          $ref: '#/components/schemas/PerPage'
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        items:
          description: Items
          type: array
          items:
            $ref: '#/components/schemas/BusinessCategory'
      example:
        has_next: true
        per_page: 10
        current_page: 1
        items:
          - org_id: 08102A0B-D4F8-42A2-8B0E-2052D05577D7
            business_category_id: 4df987e3-8179-11ed-8209-06c7b022d1ee
            external_code: '123'
            category: Management, consulting, and public relations services
            description: Management, consulting, and public relations services
    MerchantID:
      description: Merchant ID
      type: integer
      format: int64
      example: 1
    MerchantDocumentNumber:
      description: >
        Merchant document number. This is the government document code, such as
        a government-issued tax ID.
      type: string
      minLength: 1
      maxLength: 14
      example: '40533164000107'
    MerchantName:
      description: Merchant name
      type: string
      minLength: 1
      maxLength: 100
      example: Acme Store
    MerchantBrandName:
      description: >
        Merchant brand name. Note that this is different from a merchant's legal
        registered name. For example, <i>Great Company</i> as opposed to
        <i>Great Company, LLC</i> (legal entity name).
      type: string
      minLength: 1
      maxLength: 128
      example: Acme Corporation
    MerchantCategory:
      deprecated: true
      description: Code name for merchant category. The category is the type of business.
      example: abc-123
      type: string
      minLength: 1
      maxLength: 128
    ContactName:
      description: Name of contact
      type: string
      minLength: 1
      maxLength: 128
      example: John Doe
    EmailAddress:
      description: Email address
      type: string
      example: test@acmecorp.com
    PostalCode:
      description: >-
        Postal code. This is called a zip code in the United States, but you can
        use other types of postal codes.
      type: string
      minLength: 1
      maxLength: 9
      example: '12345'
    AddressNumber:
      description: Numerical identifier for the specific location within a street or avenue
      type: integer
      format: int64
      example: 45
    AddressLine:
      description: Name of the street, avenue, or primary thoroughfare of the address
      type: string
      minLength: 1
      maxLength: 80
      example: Maple Street
    ComplementaryAddress:
      description: >-
        Additional address details that help pinpoint the exact location, such
        as building, apartment, or floor
      type: string
      minLength: 1
      maxLength: 50
      example: Suite 100
    Neighborhood:
      description: >-
        Name of the neighborhood or administrative region where the address is
        located
      type: string
      minLength: 1
      maxLength: 50
      example: Canary Wharf
    State:
      description: >-
        Abbreviation or full name of the state, province, or administrative
        division
      type: string
      minLength: 1
      maxLength: 2
      example: CA
    City:
      description: Name of the city or municipality
      type: string
      minLength: 1
      maxLength: 60
      example: San Diego
    CityCode:
      description: >-
        Official seven-digit numeric code of the city according to the IBGE
        (Brazilian Institute of Geography and Statistics) code table. Used only
        for cities in Brazil; this code is unique per city.
      type: string
      minLength: 1
      maxLength: 50
      example: '3550308'
    Country:
      description: >-
        Full name of the country according to international standards or local
        registry
      type: string
      minLength: 1
      maxLength: 30
      example: United States
    AreaCode:
      description: >
        Area code. The US, Canada, and certain other countries divide their
        telephone service into regions, which are identified by numbers called
        area codes.

        In the US, for example, area codes are 3-digit numbers.
      type: string
      example: '555'
    Phone:
      description: Phone number. Parentheses and dashes are optional.
      maxLength: 25
      type: string
      example: '1231234'
    AdditionalPhone:
      description: Number for an additional phone. Parentheses and dashes are optional.
      type: string
      example: '2342345'
    MarketplaceCategoryID:
      deprecated: true
      description: Marketplace category ID. The category is the type of business.
      type: number
      example: 123
    MerchantStatus:
      description: >-
        Merchant status. This is a string, not an enum, so any string value is
        allowed, but the most commonly used values are: 'ACTIVE', 'ANALYSING',
        'APPROVED', 'CANCELLED', 'PENDING', 'REJECTED'
      type: string
      minLength: 1
      maxLength: 128
      example: APPROVED
    MerchantProgramID:
      description: Program ID for merchant account
      type: integer
      format: int64
      example: 123
    ExternalID:
      description: Internal ID used by client to reference a merchant in their domain.
      type: string
      example: '5321'
    GETMerchantBaseResponse:
      properties:
        id:
          $ref: '#/components/schemas/MerchantID'
        document_number:
          $ref: '#/components/schemas/MerchantDocumentNumber'
        municipal_registration:
          $ref: '#/components/schemas/MunicipalRegistration'
        contact:
          $ref: '#/components/schemas/ContactName'
        email:
          $ref: '#/components/schemas/EmailAddress'
        zip_code:
          $ref: '#/components/schemas/PostalCode'
        address:
          $ref: '#/components/schemas/AddressLine'
        complementary_address:
          $ref: '#/components/schemas/ComplementaryAddress'
        neighborhood:
          $ref: '#/components/schemas/Neighborhood'
        state:
          $ref: '#/components/schemas/State'
        city:
          $ref: '#/components/schemas/City'
        city_code:
          $ref: '#/components/schemas/CityCode'
        country:
          $ref: '#/components/schemas/Country'
        number:
          $ref: '#/components/schemas/AddressNumber'
        area_code:
          $ref: '#/components/schemas/AreaCode'
        phone:
          $ref: '#/components/schemas/Phone'
        additional_area_code:
          $ref: '#/components/schemas/AdditionalAreaCode'
        additional_phone:
          $ref: '#/components/schemas/AdditionalPhone'
        marketplace_category:
          $ref: '#/components/schemas/MarketplaceCategoryID'
        status:
          $ref: '#/components/schemas/MerchantStatus'
        program_id:
          $ref: '#/components/schemas/MerchantProgramID'
        external_id:
          $ref: '#/components/schemas/ExternalID'
        business_category:
          type: object
          description: Type of business
          properties:
            external_code:
              $ref: '#/components/schemas/ExternalCode'
            category:
              $ref: '#/components/schemas/BusinessCategoryName'
            description:
              $ref: '#/components/schemas/BusinessCategoryDescription'
    GETMerchantResponse:
      allOf:
        - $ref: '#/components/schemas/GETMerchantBaseResponse'
        - properties:
            name:
              $ref: '#/components/schemas/MerchantName'
            brand_name:
              $ref: '#/components/schemas/MerchantBrandName'
            creditor:
              $ref: '#/components/schemas/MerchantCreditorResponse'
      example:
        id: 9278
        document_number: '40533164000107'
        name: Pismo Store
        brand_name: Pismo Store
        municipal_registration: 737.326.648.860
        contact: John Doe
        email: store@pismo.com
        zip_code: '12345'
        address: Maple Street
        complementary_address: Suite 100
        state: CA
        city: San Diego
        country: United States
        number: 223
        area_code: '555'
        phone: '1231234'
        additional_area_code: '555'
        additional_phone: '1231234'
        marketplace_category: 1
        status: ANALYSING
        program_id: 123
        external_id: '3254'
        city_code: '3550308'
        creditor:
          id: 7611
          name: Acme Corporation
          crediting_method: ACCOUNT
          account:
            id: 2
          advancement_fee: '3.00'
          discount_rate: '0.025'
          maximum_advancement_percentage: '0.80'
        business_category:
          category: Management, consulting, and public relations services
          description: Management, consulting, and public relations services
          external_code: '123'
    FindMerchantsResponse:
      allOf:
        - $ref: '#/components/schemas/GETMerchantBaseResponse'
        - properties:
            creditor_id:
              $ref: '#/components/schemas/CreditorID'
            name:
              $ref: '#/components/schemas/MerchantBrandName'
            merchant_name:
              $ref: '#/components/schemas/MerchantName'
      example:
        id: 9278
        document_number: '40533164000107'
        name: Pismo Store
        merchant_name: Pismo Store
        municipal_registration: 737.326.648.860
        category: abc-123
        contact: John Doe
        email: store@pismo.com
        zip_code: '12345'
        address: Maple Street
        complementary_address: Suite 100
        neighborhood: Canary Wharf
        state: CA
        city: San Diego
        country: United States
        number: 223
        area_code: '555'
        phone: '1231234'
        additional_area_code: '555'
        additional_phone: '1231234'
        marketplace_category: 1
        status: ANALYSING
        program_id: 123
        external_id: '3254'
        creditor_id: 123
        city_code: 3550308
        business_category:
          category: Management, consulting, and public relations services
          description: Management, consulting, and public relations services
          external_code: '123'
    MunicipalRegistration:
      description: |
        Merchant's municipal registration number
      type: string
      minLength: 1
      maxLength: 128
      example: 737.326.648.860
    TransactionType:
      description: >
        Transaction type. Examples of transaction types include cash-in and
        cash-out.

        See <a
        href="https://developers.pismo.io/pismo-docs/docs/transactions-overview#transaction-types">Transaction
        types</a> for the list of transaction types

        on the Pismo platform.
      type: string
      example: SALES
    AuthorizationID:
      description: Authorization ID
      type: string
      example: '13387693'
    ParentAuthorizationID:
      description: Parent authorization ID
      type: string
      example: '13387682'
    SaleAuthorizationID:
      description: ID of parent sale authorization
      type: string
      example: '13387693'
    POSTMerchantRequest:
      required:
        - document_number
        - name
        - email
      properties:
        document_number:
          $ref: '#/components/schemas/MerchantDocumentNumber'
        name:
          $ref: '#/components/schemas/MerchantName'
        email:
          $ref: '#/components/schemas/EmailAddress'
        brand_name:
          $ref: '#/components/schemas/MerchantBrandName'
        municipal_registration:
          $ref: '#/components/schemas/MunicipalRegistration'
        contact:
          $ref: '#/components/schemas/ContactName'
        zip_code:
          $ref: '#/components/schemas/PostalCode'
        number:
          $ref: '#/components/schemas/AddressNumber'
        address:
          $ref: '#/components/schemas/AddressLine'
        complementary_address:
          $ref: '#/components/schemas/ComplementaryAddress'
        neighborhood:
          $ref: '#/components/schemas/Neighborhood'
        state:
          $ref: '#/components/schemas/State'
        city:
          $ref: '#/components/schemas/City'
        country:
          $ref: '#/components/schemas/Country'
        area_code:
          $ref: '#/components/schemas/AreaCode'
        phone:
          $ref: '#/components/schemas/Phone'
        additional_area_code:
          $ref: '#/components/schemas/AdditionalAreaCode'
        additional_phone:
          $ref: '#/components/schemas/AdditionalPhone'
        program_id:
          $ref: '#/components/schemas/MerchantProgramID'
        external_code:
          $ref: '#/components/schemas/ExternalCode'
        external_id:
          $ref: '#/components/schemas/ExternalID'
        creditor:
          $ref: '#/components/schemas/POSTMerchantCreditorRequest'
        city_code:
          $ref: '#/components/schemas/CityCode'
    POSTMerchantResponse:
      properties:
        id:
          $ref: '#/components/schemas/MerchantID'
        document_number:
          $ref: '#/components/schemas/MerchantDocumentNumber'
        name:
          $ref: '#/components/schemas/MerchantName'
        brand_name:
          $ref: '#/components/schemas/MerchantBrandName'
        municipal_registration:
          $ref: '#/components/schemas/MunicipalRegistration'
        category:
          $ref: '#/components/schemas/MerchantCategory'
        contact:
          $ref: '#/components/schemas/ContactName'
        email:
          $ref: '#/components/schemas/EmailAddress'
        zip_code:
          $ref: '#/components/schemas/PostalCode'
        address:
          $ref: '#/components/schemas/AddressLine'
        complementary_address:
