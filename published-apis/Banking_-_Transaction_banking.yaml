  /corporate/v2/earmarks:
    post:
      summary: Create earmark
      description: >
        Create an earmark.

        An account holder can use an earmark to hold needed funds in reserve
        until a specified release date and time.


        Optionally, the account holder can schedule a payout for the release
        date and time. At that time, an automatic process releases the earmarked
        funds and settles the payout.


        It's possible to force the creation of an earmark by not performing any
        regular validations, such as account status, account balance, or flex
        controls validations.


        This endpoint generates the following events:

        - [Platform authorization
        created](https://developers.pismo.io/events/docs/platform-authorization-platform-authorization-1)

        - [Account balance
        changed](https://developers.pismo.io/events/docs/account-balances-balance-change-1)

        - [Account balance changed
        (Availables)](https://developers.pismo.io/events/docs/availables-change-available-1)

        - [Transaction
        created](https://developers.pismo.io/events/docs/transaction-creation-1)

        - [Earmark created, updated, or
        canceled](https://developers.pismo.io/events/docs/corporate-earmark-1)
        with `CREATED` action.


        **NOTES**:
          - This endpoint requires an account token - an access token encoded with a Pismo account ID. Tokens can expire quickly, which can result in a `401 Unauthorized` message.
      parameters: []
      operationId: post-corporate-v2-earmarks
      tags:
        - Earmarking
