  /corporate/v2/scheduled-payments:
    post:
      summary: Schedule payment
      description: >-
        Schedule payments for a specified future date (`schedule_datetime`). For
        more information, refer to [Schedule payment
        overview](https://developers.pismo.io/pismo-docs/docs/scheduled-payments).


        The payload for this request is similar to that of the [Post
        payment](ref:corporate-v2-post-payments) endpoint with the exception of
        the (`schedule_datetime`) property.


        See [Data and reporting](doc:data-reporting-overview) for more
        information about events and setting up event notifications.


        For more information on payments operations, see [Corporate Banking
        Launch Reference](doc:corporate-banking-launch-reference).


        NOTE:

        - This endpoint requires an account token - an access token encoded with
        a Pismo account ID. Tokens can expire quickly, which can result in a
        `401 Unauthorized` message.

        - For scheduled payments, validation of the transaction occurs only
        during the execution of the scheduled payment.


        This endpoint generates the following events:

        - [Platform authorization
        created](https://developers.pismo.io/events/docs/platform-authorization-platform-authorization-1)

        - [Account balance
        changed](https://developers.pismo.io/events/docs/availables-change-available-1)

        - [Current scheduled payment status
        displayed](https://developers.pismo.io/events/docs/corporate-schedule-payment-1)


        See [Data and reporting](doc:data-reporting-overview) for more
        information about events and how to set up event notifications.
      parameters: []
      operationId: corporate-v2-post-scheduled-payments
      tags:
        - Payments
      requestBody:
        description: Request body
        required: true
        content:
