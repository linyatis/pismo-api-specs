  /corporate/v3/payments/multileg:
    post:
      summary: Post multi-leg payment
      operationId: corporate-v3-post-multileg-payments
      description: >
        Allow you to submit a payment with multiple legs to the platform. The
        payments are processed asynchronously and must contain at least two
        legs, but no more than 20.

        The payload contains `debits` and `credits` lists. These lists include
        legs that follow the requirements of `credit` and `debit` objects in the
        [Post payment](ref:corporate-v2-post-payments) endpoint.

        For information about multi-leg payments, refer to the [Multi-leg
        payments](doc:multi-leg-payments) guide.

        **NOTES**:
          - To find the correct reason IDs, refer to the [List account status reasons](ref:get-accounts-v1-accounts-status-reasons) endpoint.
          - This endpoint does not support forced transfers from an earmark balance.
          - For error handling, see [Error handling mechanism](doc:payment-overview#error-handling-mechanism) in _Payment overview_.
          - **Processing sequence**: Debit legs are always processed before credit legs. Within each group, the sequence is not guaranteed, and the order of execution among debits or among credits is non-deterministic.

        Each leg generates the following events:

        - [Platform authorization
        created](https://developers.pismo.io/events/docs/platform-authorization-platform-authorization-1)

        - If flex controls are configured, a [Flex control
        evaluated](https://developers.pismo.io/events/docs/rules-evaluation-requested-1)
        event is triggered.

        Additionally, the following events are generated for multi-leg payments:

        - [Multi-leg payment lifecycle
        created](https://developers.pismo.io/events/docs/corporate-multi-leg-creation-2)

        - [Multi-leg payment lifecycle status
        changed](https://developers.pismo.io/events/docs/corporate-multi-leg-status-change-2)

        See [Data and reporting](doc:data-reporting-overview) for more
        information about events and setting up event notifications.
      parameters: []
      tags:
        - Payments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiLegPaymentV3Request'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiLegPaymentV3Response'
