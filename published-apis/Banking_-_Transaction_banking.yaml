    patch:
      summary: Update account balance history configuration
      description: >-
        Update the account balance history configuration for a division code.


        If this endpoint is called when the current datetime is greater than
        `cycle_config_validity.start`, the new configuration is valid only after
        the two-cycle closing date.

        Example:
          - division timezone: UTC
          - Update account balance history configuration called at: `2023-05-01T18:00:00Z`
          - current cycle closing time: 22:00:00
          - current cycle closing date: 2023-04-30 (from `2023-04-30T22:00:00Z` to `2023-05-01T22:00:00Z`)
          - cycle config validity start datetime of the new config: `2023-05-02T22:00:00Z`
          - current config stays valid until `2023-05-02T22:00:00Z`

        If this endpoint is called when the current datetime is less than or
        equal to `cycle_config_validity.start` of the most recent configuration,
        the new configuration overrides the the most recent configuration.

        Example:
          - division timezone: UTC
          - Update account balance history configuration called at: `2023-05-01T19:00:00Z`
          - Cycle config validity start datetime of the most recent configuration: `2023-05-02T22:00:00Z`
          - New config overrides the most recent configuration settings, keeping the same cycle config validity start date: `2023-05-01T22:00:00Z`

        This endpoint generates an [Account balance history configuration
        changed](https://developers.pismo.io/events/docs/account-balances-balance-history-config-change-1)
        event.
      operationId: patch-account-balances-history-configuration
      tags:
        - Bank statements
      parameters:
        - $ref: '#/components/parameters/DivisionCodePath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: >-
                #/components/schemas/UpdateAccountBalanceHistoryConfigurationRequest
            examples:
              Update account balances history configuration:
                value:
                  cycle_closing_time: '22:00:00'
                  cycle_event_delay: 15
      responses:
        '204':
          $ref: '#/components/responses/204NoContent'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Parameters must be provided:
                  value:
                    code: WCFG0002
                    message: >-
                      cycle_closing_time or cycle_event_delay params must be
                      provided
                Invalid JSON payload received:
                  value:
                    code: WCFG0001
                    message: 'Invalid JSON payload received: Error unmarshalling request'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Division not found:
                  value:
                    code: WCFG0003
                    message: Division not found
                Account balance history config not found:
                  value:
                    code: WCFG0005
                    message: Account balance history config not found
        '500':
          $ref: '#/components/responses/500InternalServer'
