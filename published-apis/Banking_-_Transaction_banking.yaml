        - $ref: '#/components/parameters/BulkIdPath'
      requestBody:
        description: Create AES key request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAESKeyRequest'
            examples:
              Public key:
                value:
                  public_key_id: b6cdccc4-f6bf-4218-9e5e-7fb8f66008e3
      responses:
        '200':
          description: Create AES key response
          content:
            application/jose:
              schema:
                $ref: '#/components/schemas/CreateAESKeyResponse'
              examples:
                AES key response:
                  value: >-
                    eyJhbGciOiJSU0.cG8IjDbOwrNmuFuu.cG8IjDbOwrNmuFuu.hRmQ0dLFA.Uo3S0eDP0GLkQW6LJVNi5
        '401':
