    MultilegMetadata:
      type: object
      description: >-
        Key-value pairs containing data intended for storage in the Pismo
        system.
    Metadata:
      type: object
      description: >
        Key-value pairs containing data intended for storage in the Pismo
        system.<br>

        <b>NOTES</b>:

        - The `metadata` field includes a `corporate_metadata` object with the
        following fields:
            - `credit_external_account_id`: Included in the `corporate_metadata` field when it's provided in the credit leg.
            - `debit_external_account_id`: Included in the `corporate_metadata` field when it's provided in the debit leg.
            - `earmark_id`: Included in the `corporate_metadata` field when it's provided in the debit leg.
        - The `corporate_metadata` attribute must be an object. A type mismatch
        results in an error as mapped in the responses section.
      example:
        my-id: 2932
    MetadataPayment:
      type: object
      description: >
        Key-value pairs containing data intended for storage in the Pismo
        system.<br>

        <b>NOTES</b>:

        - The `metadata` field includes a `corporate_metadata` object with the
        following fields:
            - `credit_external_account_id`: Included in the `corporate_metadata` field when it's provided in the credit leg.
            - `debit_external_account_id`: Included in the `corporate_metadata` field when it's provided in the debit leg.
            - `earmark_id`: Included in the `corporate_metadata` field when it's provided in the debit leg.
        - The `corporate_metadata` attribute must be an object. A type mismatch
        results in an error as mapped in the responses section.

        - To be able to send different `metadata` information for each payment
        leg in transfer operations, the `metadata` can be included in the
        primary or leg field. A conflict between the primary and a leg field
        results in an error as mapped in the responses section.
      example:
        my-id: 2932
    Metadata2:
      type: object
      description: >
        Key-value pair field that you can use to send any information relating
        to a status change. The information you send is propagated in the
        [Account status
        changed](https://developers.pismo.io/events/docs/account-status-change-2)
        event.<br>

        Note that data entered in this field is not saved.<br>

        <b>Note</b>: If you include `external_account_id` in this field, the
        Pismo platform ignores it and only uses the one you sent in the path
        parameter.
    FloatMetadata:
      type: object
      description: >
        Key-value pairs containing data intended for storage in the Pismo
        system.<br>

        <b>NOTES</b>:
          - The `metadata` includes a `corporate_metadata` object with the following subfields:
            - `credit_external_account_id`
            - `authorization_type`
            - `business_date`
            - `float_amount`
            - `settlement_date`
          - The `corporate_metadata` field must be an object. A type mismatch results in an error as mapped in the responses section.
