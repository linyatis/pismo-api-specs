  /corporate/v2/dormancy-config:
    post:
      summary: Create dormancy configuration
      description: >
        Create a dormancy configuration at the division or program level. This
        configuration sets the days of inactivity required for accounts to
        switch to a dormant status and the reason for the switch.

        The dormancy configuration is applied to all accounts under the
        specified division or program.

        Automated dormancy checks are performed according to the number of days
        specified in the dormancy configuration.


        For information about dormancy, refer to [Dormancy
        overview](doc:dormancy-overview).


        This endpoint generates a [Dormancy configuration
        created](https://developers.pismo.io/events/docs/corporate-dormancy-config-creation-1)
        event.
      operationId: post-dormancy-config-v2
      parameters: []
      tags:
        - Dormancy
      requestBody:
        description: Create dormancy configuration request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDormancyConfigRequestv2'
            examples:
              Example dormancy configuration structure:
                value:
                  check_time: '22:00:00'
                  target_type: DIVISION
                  target_id: abc-0001
                  statuses:
                    - status: INACTIVE
                      days: 60
                      reason_id: 1
                      reason_external_id: '01'
                      restrictions:
                        - current_reason_id: 13
                        - new_reason_id: 16
                      reactivation_with_last_restriction: true
                    - status: UNCLAIMED
                      days: 120
                      reason_id: 2
                      reason_external_id: '02'
                      reactivation_with_last_restriction: false
                    - status: DORMANT
                      days: 180
                      reason_id: 3
                      reason_external_id: '03'
                      reactivation_with_last_restriction: false
                  dormant_processing_codes:
                    - '100000'
                    - '100001'
                  deny_forced_transaction_reactivation: true
                  reactivation_exceptions_config:
                    field: soft_descriptor
                    values:
                      - '001'
                      - '002'
                      - '003'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDormancyConfigResponse'
              examples:
                Dormancy configuration:
                  value:
                    id: c49cf5f4-762a-429b-83cc-3a1bf2969e2e
                    check_time: '09:00:00'
                    target_type: DIVISION
                    target_id: my-division-code
                    statuses:
                      - status: DORMANT
                        days: 1
                        reason_id: 1618
                        reason_external_id: CREDIT_ONLY
                        restrictions:
                          - current_reason_id: 1421
                            new_reason_id: 1618
                            current_reason_external_id: DEBIT_ONLY
                            new_reason_external_id: CREDIT_ONLY
                        reactivation_with_last_restriction: false
                    dormant_processing_codes:
                      - '220040'
                    dormancy_config_validity:
                      start: '2024-11-06T20:04:25.800Z'
                    deny_forced_transaction_reactivation: false
                    check_timezone_origin: PROGRAM
                    reactivation_exceptions_config:
                      field: soft_descriptor
                      values:
                        - '001'
                        - '002'
                        - '003'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Invalid JSON payload:
                  value:
                    code: WDOR0001
                    message: 'Invalid JSON payload received: Error unmarshalling request'
                check_time required:
                  value:
                    code: WDOR0002
                    message: check_time is a required field
                check_time invalid format:
                  value:
                    code: WDOR0002
                    message: check_time has invalid format
                target_type required:
                  value:
                    code: WDOR0002
                    message: target_type is a required field
                target_type one of:
                  value:
                    code: WDOR0002
                    message: target_type must be one of [DIVISION PROGRAM]
                target_id required:
                  value:
                    code: WDOR0002
                    message: >-
                      target_id is a required field. If the target_type is
                      DIVISION the target_id is the division code. If
                      target_type is PROGRAM the target_id will be the program
                      ID.
                statuses.status must be unique:
                  value:
                    code: WDOR0002
                    message: statuses.status must be unique in the statuses list
                statuses.days must be unique:
                  value:
                    code: WDOR0002
                    message: statuses.days must be unique in the statuses list
                statuses.days must be greater than 0:
                  value:
                    code: WDOR0002
                    message: statuses.days must be greater than 0
                statuses should have at least 1 item:
                  value:
                    code: WDOR0002
                    message: statuses should have at least 1 item
                dormant_processing_codes[i] must be at least 1 character in length:
                  value:
                    code: WDOR0002
                    message: >-
                      dormant_processing_codes[i] must be at least 1 character
                      in length
                dormant_processing_codes[i] must be a maximum of 6 characters in length:
                  value:
                    code: WDOR0002
                    message: >-
                      dormant_processing_codes[i] must be a maximum of 6
                      characters in length
                dormant_processing_codes must contain only unique values:
                  value:
                    code: WDOR0002
                    message: dormant_processing_codes must contain only unique values
                Invalid restrictions.current_reason_external_id field:
                  value:
                    code: WDOR0010
                    message: >-
                      Invalid current_reason_external_id, the
                      current_reason_external_id you entered does not exist.
                Invalid Restrictions.new_reason_external_id field:
                  value:
                    code: WDOR0011
                    message: >-
                      Invalid new_reason_external_id, the new_reason_external_id
                      you entered does not exist.
                statuses.status invalid status:
                  value:
                    code: WDOR0005
                    message: Invalid status {status}
                statuses.reason_external_id invalid reason:
                  value:
                    code: WDOR0006
                    message: Invalid reason_external_id {reason_id}
                Dormancy configuration already exists:
                  value:
                    code: WDOR0008
                    message: Dormancy configuration with ID {dormancyID} already exists
                Invalid dormant processing code:
                  value:
                    code: WDOR0009
                    message: >-
                      Invalid dormant processing code
                      [{dormant_processing_code}]
                Invalid timezone origin:
                  value:
                    code: WDOR0002
                    message: check_timezone_origin must be one of [DIVISION PROGRAM]
                Invalid statuses.days:
                  value:
                    code: WDOR0002
                    message: statuses.days must be less than or equal to 2147483647
                Invalid restrictions.current_reason_external_id:
                  value:
                    code: WDOR0002
                    message: >-
                      statuses.restrictions.current_reason_external_id must be
                      unique in the restrictions list
                reactivation_exceptions_config.field must be soft_descriptor or metadata.*:
                  value:
                    code: WDOR0002
                    message: >-
                      reactivation_exceptions_config.field must be
                      soft_descriptor or metadata.*
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                program not found:
                  value:
                    code: WDOR0004
                    message: Program with program_id {targetID} not found
                division not found:
                  value:
                    code: WDOR0003
                    message: Division with division_code {targetID} not found
        '500':
          $ref: '#/components/responses/500InternalServer'
