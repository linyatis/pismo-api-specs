  /corporate/v2/payments:
    post:
      summary: Post payment
      description: >-
        Enable users to submit a payment to the Pismo platform. It supports
        posting debits and credits to an account, as well as facilitating fund
        transfers between accounts.


        For details about payment operations, see [Payment
        overview](doc:payment-overview) and [Corporate Banking Launch
        Reference](doc:corporate-banking-launch-reference).


        <b>NOTES</b>:
          - This endpoint requires an account token - an access token encoded with a Pismo account ID. Tokens can expire quickly, which can result in a `401 Unauthorized` message.
          - To get the correct reason IDs, refer to the [List account status reasons](https://developers.pismo.io/pismo-docs/reference/get-accounts-v1-accounts-status-reasons) endpoint.<br>

        Each payment operation created generates the following events:

        - [Platform authorization
        created](https://developers.pismo.io/events/docs/platform-authorization-platform-authorization-1)

        - [Account balance
        changed](https://developers.pismo.io/events/docs/account-balances-balance-change-1)

        - [Account balance changed
        (Availables)](https://developers.pismo.io/events/docs/availables-change-available-1)

        - [Accounting entry
        created](https://developers.pismo.io/events/docs/accounting-entry-creation-1)

        - If flex controls are configured, a [Flex control
        evaluated](https://developers.pismo.io/events/docs/rules-evaluation-requested-1)
        event is triggered.


        See [Data and reporting](doc:data-reporting-overview) for more
        information on events and setting up event notifications.
      parameters: []
      operationId: corporate-v2-post-payments
      tags:
        - Payments
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentV2Request'
            examples:
              Credit transaction:
                value:
                  credit:
                    external_account_id: '289'
                    processing_code: '220035'
                  amount:
                    currency: USD
                    value: 100
                  soft_descriptor: Debit operation
                  channel: GCE
                  tracking_id: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
              Debit transaction:
                value:
                  debit:
                    external_account_id: '289'
                    processing_code: '220037'
                  amount:
                    currency: USD
                    value: 100
                  soft_descriptor: Debit operation
                  channel: GCE
                  tracking_id: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
              Debit transaction with earmark:
                value:
                  debit:
                    external_account_id: '289'
                    processing_code: '219251'
                    earmark_id: 632b378a-2248-11ee-be56-0242ac120002
                  amount:
                    currency: USD
                    value: 100
                  soft_descriptor: Debit operation from earmark balance
                  tracking_id: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
              Transfer transaction:
                value:
                  credit:
                    external_account_id: '289'
                    processing_code: '220035'
                    soft_descriptor: Transfer - Credit leg
                    metadata:
                      invoice: 298
                  debit:
                    external_account_id: '289'
                    processing_code: '220037'
                    soft_descriptor: Transfer - Debit leg
                    metadata:
                      invoice: 892
                  amount:
                    currency: USD
                    value: 100
                  tracking_id: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
              Transfer from earmark balance transaction:
                value:
                  credit:
                    external_account_id: '289'
                    processing_code: '220035'
                  debit:
                    external_account_id: '289'
                    processing_code: '220037'
                    earmark_id: 632b378a-2248-11ee-be56-0242ac120002
                  amount:
                    currency: USD
                    value: 100
                  soft_descriptor: Transfer operation from earmark balance
                  tracking_id: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
                  metadata:
                    invoice: 298
              Force transfer transaction:
                value:
                  credit:
                    external_account_id: '289'
                    processing_code: '220035'
                    soft_descriptor: Force transfer - Credit leg
                    metadata:
                      invoice: 298
                  debit:
                    external_account_id: '289'
                    processing_code: '220037'
                    soft_descriptor: Force transfer - Debit leg
                    metadata:
                      invoice: 892
                  amount:
                    currency: USD
                    value: 100
                  tracking_id: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
                  force_post: true
              Transfer transaction with validation rules:
                value:
                  credit:
                    external_account_id: '289'
                    processing_code: '220035'
                  debit:
                    external_account_id: '289'
                    processing_code: '220037'
                  amount:
                    currency: USD
                    value: 100
                  soft_descriptor: Transfer operation with validation rules
                  tracking_id: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
                  validation_rules:
                    ACCOUNT_STATUS:
                      override: true
                    LEDGER:
                      force: true
                  metadata:
                    invoice: 298
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentV2Response'
        '400':
          description: Bad request
          content:
