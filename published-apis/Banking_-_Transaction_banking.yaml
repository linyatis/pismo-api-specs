                Channel contains character not permitted:
                  summary: channel contains character not permitted
                  value:
                    code: WPMT0018
                    message: channel contains character not permitted
                Channel exceed size:
                  summary: channel exceeds maximum length
                  value:
                    code: WPMT0018
