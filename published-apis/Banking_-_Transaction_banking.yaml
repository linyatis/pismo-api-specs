    MultiLegV3Status:
      title: MultiLegLegV3Status
      type: object
      properties:
        multileg_id:
          $ref: '#/components/schemas/MultilegID'
        status:
          type: string
          description: >
            Status of the multi-leg processing.<br>

            * `CREATING`: The multileg payment request has been received and
            queued for execution.

            * `EXECUTING`: Asynchronous processing of the multileg payment has
            started.

            * `DEBITS_EXECUTED`: All debit legs have been successfully executed;
            credit leg processing is still in progress.

            * `CREDITS_FAILED`: Used in v2 when one or more credit legs failed.
            This status is no longer used in v3, but remains in the API for
            queries on payments created via the V2 endpoint.

            * `FINISHED`: All payment legs were processed successfully.

            * `ROLLING_BACK`: One or more payment legs failed, and the rollback
            process has begun.

            * `ROLLED_BACK`: One or more payment legs failed, and all successful
            legs were rolled back.

            * `ROLLBACK_FAILED`: One or more payment legs failed, rollback was
            attempted, but the rollback of some legs was unsuccessful.

            * `TIMED_OUT`: Processing did not complete because the multileg
            execution timed out.
          enum:
            - CREATING
            - EXECUTING
            - DEBITS_EXECUTED
            - CREDITS_FAILED
            - FINISHED
            - ROLLING_BACK
            - ROLLED_BACK
            - ROLLBACK_FAILED
            - TIMED_OUT
          example: CREATING
        debits:
          type: array
          items:
            $ref: '#/components/schemas/MultiLegItemV3Status'
        credits:
          type: array
          items:
            $ref: '#/components/schemas/MultiLegItemV3Status'
      required:
        - multileg_id
        - status
    MultiLegStatus:
      title: MultiLegLegStatus
      type: object
      properties:
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        status:
          type: string
          description: Status of the multi-leg processing.
          enum:
            - CREATING
            - EXECUTING
            - DEBITS_EXECUTED
            - CREDITS_FAILED
            - FINISHED
            - ROLLING_BACK
            - ROLLED_BACK
            - ROLLBACK_FAILED
            - TIMED_OUT
          example: CREATING
        debits:
          type: array
          items:
            $ref: '#/components/schemas/MultiLegItemStatus'
        credits:
          type: array
          items:
            $ref: '#/components/schemas/MultiLegItemStatus'
