        - external_account_id
      properties:
        amount:
          $ref: '#/components/schemas/TransactionAmount'
        currency:
          $ref: '#/components/schemas/Currency'
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountId2'
        processing_code:
          $ref: '#/components/schemas/ProcessingCode2'
        soft_descriptor:
          $ref: '#/components/schemas/SoftDescriptor'
        force_post:
          $ref: '#/components/schemas/ForcePostDebit'
        validation_rules:
          $ref: '#/components/schemas/ValidationRules'
        payment_datetime:
          $ref: '#/components/schemas/PaymentDatetime'
        business_date:
          $ref: '#/components/schemas/BusinessDate'
        skip_account_date_validation:
          $ref: '#/components/schemas/SkipAccountDateValidation'
        earmark_id:
          $ref: '#/components/schemas/EarmarkIdWithdrawal'
    DebitLegV2Response:
      title: DebitLegV2Response
      type: object
      properties:
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountId2'
        amount:
          $ref: '#/components/schemas/TransactionAmount'
        processing_code:
          $ref: '#/components/schemas/ProcessingCode2'
        soft_descriptor:
          $ref: '#/components/schemas/SoftDescriptor'
        currency:
          $ref: '#/components/schemas/Currency'
        force_post:
          $ref: '#/components/schemas/ForcePostDebit'
        validation_rules:
          $ref: '#/components/schemas/ValidationRules'
        payment_datetime:
          $ref: '#/components/schemas/PaymentDatetime'
        business_date:
          $ref: '#/components/schemas/BusinessDate'
        skip_account_date_validation:
          $ref: '#/components/schemas/SkipAccountDateValidation'
        earmark_id:
          $ref: '#/components/schemas/EarmarkIdWithdrawal'
    DebitLegV3ErrorResponse:
      title: DebitLegV3ErrorResponse
      type: object
      allOf:
        - $ref: '#/components/schemas/DebitLegV3Response'
        - type: object
          properties:
            errors:
              type: array
              items:
                $ref: '#/components/schemas/ErrorResponse'
              example: []
    DebitLegV3Request:
      title: DebitLegV3Request
      type: object
      required:
        - tracking_id
        - amount
        - currency
        - external_account_id
      properties:
        tracking_id:
          $ref: '#/components/schemas/TrackingIdMultiLegV3'
        amount:
          $ref: '#/components/schemas/TransactionAmount'
        currency:
          $ref: '#/components/schemas/Currency'
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountId2'
        processing_code:
          $ref: '#/components/schemas/ProcessingCode2'
        soft_descriptor:
          $ref: '#/components/schemas/SoftDescriptor'
        force_post:
          $ref: '#/components/schemas/ForcePostDebit'
        validation_rules:
          $ref: '#/components/schemas/ValidationRules'
        payment_datetime:
          $ref: '#/components/schemas/PaymentDatetime'
        business_date:
          $ref: '#/components/schemas/BusinessDate'
        channel:
          $ref: '#/components/schemas/ChannelCode'
        skip_account_date_validation:
