  /corporate/v1/corporate-float-cashin:
    post:
      summary: Post float cash-in
      description: >-
        Enable users to submit float cash-in payments to the Pismo platform. It
        supports posting credits to an account, as well as facilitating fund
        transfers between accounts.


        To post a credit, you must provide a valid `processing_code` for the
        credit operation and the recipient's `external_account_id`.


        See the <b>Examples</b> drop-down menu for a sample payload.


        For more information about payments operations, see [Corporate Banking
        Launch Reference](doc:corporate-banking-launch-reference).


        <b>NOTES</b>:
          - This endpoint requires an account-specific access token. Getting an account token requires you to call the [Get OpenID access token endpoint](https://developers.pismo.io/pismo-docs/reference/post-passport-v1-oauth2-token-1) with an external account ID. Tokens can expire quickly, which can result in an Unauthorized message.

        Each payment created generates the following events:

        - [Float payment status
        change](https://developers.pismo.io/events/docs/corporate-float-payment-status-change-1)

        - [Authorization
        created](https://developers.pismo.io/events/docs/authorization-authorization-event-1)

        - [Account balance
        changed](https://developers.pismo.io/events/docs/account-balances-balance-change-1).

        - [Account balance changed
        (Availables)](https://developers.pismo.io/events/docs/availables-change-available-1)

        - [Transaction
        created](https://developers.pismo.io/events/docs/transaction-creation-1).

        - [Accounting entry
        created](https://developers.pismo.io/events/docs/accounting-entry-creation-1)

        - If flex controls are configured, the event is triggered:
          - [Flex control evaluated](https://developers.pismo.io/events/docs/rules-evaluation-requested-1)

        See [Data and reporting](doc:data-reporting-overview) for more
        information about events and setting up event notifications.
      parameters: []
      operationId: post-corporate-float-cash-in
      tags:
        - Payments
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FloatPaymentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FloatPaymentResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Invalid JSON payload:
                  value:
                    code: WCFC0001
                    message: 'Invalid JSON payload received: Error unmarshalling request'
                Processing code exceed size:
                  value:
                    code: WCFC0002
                    message: >-
                      processing_code must be a maximum of 6 characters in
                      length
                External Account ID exceed size:
                  value:
                    code: WCFC0002
                    message: >-
                      external_account_id must be a maximum of 60 characters in
                      length
                External Account ID required:
                  value:
                    code: WCFC0002
                    message: external_account_id is a required field
                Float Amount value zero:
                  value:
                    code: WCFC0002
                    message: value must be greater than 0
                Float Amount value exceed:
                  value:
                    code: WCFC0002
                    message: value must be 999,999,999,999.99 or less
                Float Amount value required:
                  value:
                    code: WCFC0002
                    message: value is a required field
                Total Amount value zero:
                  value:
                    code: WCFC0002
                    message: value must be greater than 0
                Total Amount value exceed:
                  value:
                    code: WCFC0002
                    message: value must be 999,999,999,999.99 or less
                Total Amount value required:
                  value:
                    code: WCFC0002
                    message: value is a required field
                Tracking ID exceed size:
                  value:
                    code: WCFC0002
                    message: tracking_id must be a maximum of 36 characters in length
                External account ID contains characters not permitted:
                  value:
                    code: WCFC0002
                    message: >-
                      external_account_id contains characters not permitted:
                      [characters]
                Tracking ID required:
                  value:
                    code: WCFC0002
                    message: tracking_id is a required field
                Currency required:
                  value:
                    code: WCFC0002
                    message: currency is a required field
                Amount has invalid decimal places for currency:
                  value:
                    code: WCFC0002
                    message: >-
                      The number of decimal places is not compatible with the
                      specified currency
                Invalid amount values:
                  value:
                    code: WCFC0003
                    message: Invalid values for float_amount and total_amount
                Currency mismatch:
                  description: >-
                    At the moment, the platform can only accept the currency
                    that is configured for the account
                  value:
                    code: WCFC0005
                    message: >-
                      Cannot perform conversion between account currency and
                      provided currency
                Holiday error:
                  value:
                    code: WCFC0006
                    message: Cannot post transaction on holidays
                Weekend error:
                  value:
                    code: WCFC0007
                    message: Cannot post transaction on weekends
                Invalid credit processing code:
                  value:
                    code: WCFC0008
                    message: Invalid credit processing code
                Invalid account status:
                  description: >-
                    This error occurs when the account is in an invalid state,
                    an example is when the account cannot be credited or debited
                  value:
                    code: WCFC0009
                    message: Invalid account status
                Insufficient funds:
                  value:
                    code: WCFC0010
                    message: Insufficient funds
                Account closed error:
                  description: >-
                    This error occurs when the client sends a force post payment
                    and the account has been closed
                  value:
                    code: WCFC0011
                    message: Action not permitted on a closed account
                Orgs operation not found or parameterized:
                  value:
                    code: WCFC0012
                    message: >-
                      Orgs operations not found or parameters are incorrect or
                      invalid
                Invalid account program type:
                  value:
                    code: WCFC0013
                    message: The account's program type is invalid
                Invalid settlement date:
                  value:
                    code: WCFC0014
                    message: settlement_date must be after the current business date
                Invalid currency:
                  description: The currency must be specified in the ISO 4217 3-letter code
                  value:
                    code: WCFC0016
                    message: Invalid currency
                Corporate Metadata must be an object:
                  value:
                    code: WCMN0002
                    message: corporate_metadata is reserved and must be an object
                Unrecognized account ID type:
                  value:
                    code: WCAC0010
                    message: Token contains an unrecognized account ID type
                Transaction using this tracking ID in progress:
                  description: >-
                    This error occurs when multiple payment requests with the
                    same `tracking_id` are made simultaneously.
                  value:
                    code: WCFC0022
                    message: >-
                      transaction using this tracking_id is in progress, please
                      try again later
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Unauthorized account:
                  value:
                    code: WCAC0001
                    message: Account not authorized
        '403':
          $ref: '#/components/responses/403Forbidden'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Tracking ID already in use:
                  description: >-
                    This error occurs when the client sends a duplicate tracking
                    ID for the payment
                  value:
                    code: WCFC0004
                    message: tracking_id is already in use
                Invalid time zone:
                  value:
                    code: WCFC0015
                    message: Division {id} is set with an invalid timezone ({timezone})
        '500':
          $ref: '#/components/responses/500InternalServer'
