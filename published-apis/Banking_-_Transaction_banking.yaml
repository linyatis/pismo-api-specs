    DebitLegV3Response:
      title: DebitLegV3Response
      type: object
      properties:
        tracking_id:
          $ref: '#/components/schemas/TrackingIdMultiLegV3'
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountId2'
        amount:
          $ref: '#/components/schemas/TransactionAmount'
        processing_code:
          $ref: '#/components/schemas/ProcessingCode2'
        soft_descriptor:
          $ref: '#/components/schemas/SoftDescriptor'
        currency:
          $ref: '#/components/schemas/Currency'
        force_post:
          $ref: '#/components/schemas/ForcePostDebit'
        validation_rules:
          $ref: '#/components/schemas/ValidationRules'
        payment_datetime:
          $ref: '#/components/schemas/PaymentDatetime'
        business_date:
          $ref: '#/components/schemas/BusinessDate'
        channel:
          $ref: '#/components/schemas/ChannelCodeResponse'
        skip_account_date_validation:
          $ref: '#/components/schemas/SkipAccountDateValidation'
        earmark_id:
          $ref: '#/components/schemas/EarmarkIdWithdrawal'
        instant_clearing:
          $ref: '#/components/schemas/InstantClearing'
        metadata:
          $ref: '#/components/schemas/MultilegMetadata'
    DebitProcessingCode:
      type: string
      description: >-
        Processing code to be used for posting the debit transaction. List the
        organization processing codes in [List processing
        codes](https://developers.pismo.io/pismo-docs/reference/get-processing-code-by-tenant)
        endpoint.
      maxLength: 6
      example: '220037'
    DeferredPaymentStatus:
      type: string
      description: |
        Status of the deferred payment
      enum:
        - CREATED
        - UNSETTLED
        - SETTLED
        - FAILED
      example: CREATED
    DenyForcedTransactionReactivation:
      type: boolean
      description: >-
        Whether an account under that dormancy configuration should be
        reactivated when a forced transaction is made to that account (`true`)
        or not (`false`).
      example: true
      default: false
    DivisionCode:
      type: string
      maxLength: 36
      description: >-
        Code string that uniquely identifies the division within your
        organization. It must comply with the rule `^[a-zA-Z0-9-]+$`.
      pattern: ^[a-zA-Z0-9-]+$
      example: US
    DivisionCode2:
      type: string
      description: >-
        Division code registered in the [Create
        division](https://developers.pismo.io/pismo-docs/reference/post-division-v2)
        endpoint.
      maximum: 36
      pattern: ^[a-zA-Z0-9-]+$
      example: US
    DivisionDescription:
      type:
        - string
        - 'null'
      maxLength: 80
      description: Division description
      example: NY - New York City
    DivisionID:
      type: string
      description: >-
        Pismo generates the division ID when you use the [Create
        division](ref:post-division-v2) endpoint.
      format: uuid
      example: 6f8a456a-8b1a-4022-a2f8-7612595330b5
    DivisionName:
      type: string
      description: Division name
      example: NY
      maximum: 40
    DivisionResponseV2:
      type: object
      properties:
        division_id:
          $ref: '#/components/schemas/DivisionID'
        division_code:
          $ref: '#/components/schemas/DivisionCode2'
        parent_code:
          $ref: '#/components/schemas/ParentCode'
        name:
          $ref: '#/components/schemas/DivisionName'
        description:
          $ref: '#/components/schemas/DivisionDescription'
        level_id:
          $ref: '#/components/schemas/LevelID'
        hierarchy_id:
          $ref: '#/components/schemas/HierarchyID'
        administrative_division_id:
          $ref: '#/components/schemas/AdministrativeDivisionID'
        program_ids:
          $ref: '#/components/schemas/ProgramIDs'
      required:
        - division_id
    DocumentNumber:
      type: string
      description: >
        Applicant's government document number. Once set, this value is
        immutable, which means that `document_number` can't be updated. This
        field only accepts alphanumeric characters.<br>

        <b>Note</b>: `document_number` does not allow special characters.
      maxLength: 15
      example: '812045147'
    DocumentNumber2:
      type: string
      minLength: 1
      maxLength: 15
      description: |
        Entity's government document number.<br>
        `minLength: 1`
        `maxLength: 15`
      example: '1122334455'
    DormancyCheckTime:
      type: string
      format: time
      description: >
        Dormancy check time<br>

        <b>Note</b>: The timezone is inherited from the customer's divisions or
        programs.
      pattern: ^(?:([01]?\d|2[0-3]):([0-5]?\d):)?([0-5]?\d)$
      example: '09:00:00'
      maxLength: 8
    DormancyConfigEndValid:
      type: string
      description: >-
        Date and time the dormancy configuration ceased to be valid. The field
        is omitted from the response if empty. Format = yyyy-mm-dd:hr:mm:ss.
      example: '2023-08-14T22:12:48.961Z'
    DormancyConfigID:
      type: string
      description: Dormancy configuration ID generated internally
      format: uuid
      example: b993ba96-b3e8-4ef7-9cf7-7eee5ddafdab
    DormancyConfigResponse:
      description: Dormancy-config response object
      type: object
      properties:
        id:
          $ref: '#/components/schemas/DormancyConfigID'
        check_time:
          $ref: '#/components/schemas/DormancyCheckTime'
        target_type:
          $ref: '#/components/schemas/DormancyTargetType'
        target_id:
          $ref: '#/components/schemas/TargetID'
        statuses:
          type: array
          description: >-
            List of objects that contains all the information pertinent to an
            organization's valid account status
          items:
            type: object
            properties:
              status:
                $ref: '#/components/schemas/AccountStatus'
              days:
                $ref: '#/components/schemas/InactivityDays'
              reason_id:
                $ref: '#/components/schemas/AccountStatusReasonID'
            required:
              - status
              - days
              - reason_id
        dormant_processing_codes:
          $ref: '#/components/schemas/DormantProcessingCodes'
        dormancy_config_validity:
          $ref: '#/components/schemas/DormancyConfigValidityWithEnd'
        deny_forced_transaction_reactivation:
          $ref: '#/components/schemas/DenyForcedTransactionReactivation'
        reactivation_exceptions_config:
          $ref: '#/components/schemas/ReactivationExceptionsConfig'
    DormancyConfigStartValid:
      type: string
      description: >-
        Date and time the dormancy configuration starts to be valid. Format =
        yyyy-mm-dd:hr:mm:ss.
      example: '2024-10-18T17:45:26.930Z'
    DormancyConfigValidityWithEnd:
      type: object
      description: The datetimes for dormancy configuration validity
      properties:
        start:
          $ref: '#/components/schemas/DormancyConfigStartValid'
        end:
          $ref: '#/components/schemas/DormancyConfigEndValid'
    DormancyConfigValidityWithoutEnd:
      type: object
      description: The datetimes for dormancy configuration validity
      properties:
        start:
          $ref: '#/components/schemas/DormancyConfigStartValid'
    DormancyControlID:
      type: string
      description: Account dormancy control ID generated internally
      format: uuid
    DormancyExceptionField:
      type: string
      minLength: 1
      maxLength: 100
      description: >-
        Specifies which transaction attribute is checked in order to determine
        whether a transaction is exempt from reactivating a dormant account.
      example: soft_descriptor
    DormancyExceptionValues:
      type: array
      description: >-
        Lists the values that, when present in the specified field, prevent the
        account from being reactivated by that transaction.
      maxItems: 30
      items:
        $ref: '#/components/schemas/ValidExceptionValue'
    DormancyRestrictions:
      type: array
      description: >
        List of objects that contains the information related to account
        dormancy restrictions.<br>

        If there is a restriction in the list and the account's current reason
        is different from the value in `current_reason_id`, the dormancy
        configuration sets the reason to the value of the `reason_id` field.
        However, If the account's current reason is identical to the one in
        `current_reason_id`, the dormancy configuration sets the value to the
        `new_reason_id` field; in other words, the value in `new_reason_id` is
        the result of `reason_id` plus `current_reason_id`.
      items:
        type: object
        required:
          - current_reason_id
          - new_reason_id
        properties:
          current_reason_id:
            $ref: '#/components/schemas/CurrentReasonID'
          new_reason_id:
            $ref: '#/components/schemas/NewReasonID'
          current_reason_external_id:
            $ref: '#/components/schemas/CurrentReasonExternalID'
          new_reason_external_id:
            $ref: '#/components/schemas/NewReasonExternalID'
    DormancyRestrictionsv2:
      type: array
      description: >
        Objects that contain the information related to account dormancy
        restrictions.
      items:
        type: object
        properties:
          current_reason_external_id:
            $ref: '#/components/schemas/CurrentReasonExternalID'
          new_reason_external_id:
            $ref: '#/components/schemas/NewReasonExternalID'
    DormancyTargetType:
      type: string
      description: Dormancy configuration target
      enum:
        - DIVISION
        - PROGRAM
      example: DIVISION
    DormantProcessingCodes:
      type: array
      description: >-
        List of processing codes that prevent account reactivation. If there are
        financial transactions in an account that were made with any of these
        codes, the account cannot be reactivated.
      items:
        $ref: '#/components/schemas/ValidProcessingCode'
    EarmarkAmount:
      type: number
      format: float
      description: |
        Earmark amount<br>
        `minimum: 0.01`
        `maximum: 18446744073709551617`
      minimum: 0.01
      maximum: 18446744073709552000
      example: 50
    EarmarkBalance:
      type: number
      description: >
        Earmark balance. Initially equal to the earmarked amount and decreases
        as the reserved funds are used up or decreased in a decrease operation.
        It can also increase if an increase operation is performed.<br>

        `minimum: 0`

        `maximum: 18446744073709551617`
      minimum: 0
      maximum: 18446744073709552000
      example: 123.45
    EarmarkDescription:
      type: string
      description: Earmark description
      minLength: 1
      maxLength: 40
    EarmarkForcePost:
      type: boolean
      description: >
        If the account has any reason-based force debit payment restrictions,
        and the force earmark creation violates any of those restrictions, it
        fails. The reasons that restrict force debit operations are:
          - `CREDIT ONLY`: No force debit allowed
          - `ANY`: No force allowed
          - `MANUAL`: No force allowed
    EarmarkIdCreation:
      type: string
      description: >
        Optional earmark ID. If `earmark_id` already exists, the caller receives
        a 409 error.

        If provided, the earmark is created with this ID.

        If not provided, a random earmark ID is generated.
      maxLength: 60
      pattern: ^[a-zA-Z0-9-]+$
      example: da85b309-a7f7-4316-b2ad-f069f0838058
    EarmarkIdReturned:
      type: string
      description: >-
        Earmark ID. Used as the primary key for query and update operations. It
        has the same value as the tracking ID, if one is provided. Generated by
        [Create
        Earmark](https://developers.pismo.io/pismo-docs/reference/post-corporate-v2-earmarks).
      example: da85b309-a7f7-4316-b2ad-f069f0838058
    EarmarkIdWithdrawal:
      type: string
      description: >-
        ID of the earmark from which the amount is withdrawn. The earmark ID is
        generated by the [Create
        Earmark](https://developers.pismo.io/pismo-docs/reference/post-corporate-v2-earmarks)
        endpoint.
      maxLength: 60
      minLength: 1
      example: dadaab22-6e28-4746-8440-0caa030f0f3f
    EarmarkReleaseDatetime:
      type: string
      description: >
        RFC 3339 date/time for earmark release.

        Used to schedule a cash-out (usually a payment) at the specified release
        date and time.

        At `release_datetime`, an automatic process releases the earmarked funds
        and settles the cash-out.

        If no `release_datetime` is set, the earmarked amount is held
        indefinitely until the customer cancels the earmark.
      minLength: 20
      maxLength: 30
      example: '2022-02-10T15:00:00Z'
      format: date-time
    EarmarkResponse:
      type: object
      properties:
        earmark_id:
          $ref: '#/components/schemas/EarmarkIdReturned'
        account_id:
          $ref: '#/components/schemas/AccountID3'
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountIdForEarmark'
        description:
          $ref: '#/components/schemas/EarmarkDescription'
        amount:
          $ref: '#/components/schemas/EarmarkAmount'
        balance:
          $ref: '#/components/schemas/EarmarkBalance'
        release_datetime:
          $ref: '#/components/schemas/EarmarkReleaseDatetime'
        internal_operations:
          $ref: '#/components/schemas/InternalOperations'
    EarmarkUpdateAmount:
      type: number
      format: float
      description: >
        New amount to be set when `update_type` is `SET_AMOUNT` or delta. Value
        cannot be zero.<br>

        `minimum: 0.01`

        `maximum: 18446744073709551617`
      minimum: 0.01
      maximum: 18446744073709552000
      example: 1000.53
    EarmarkUpdateType:
      type: string
      enum:
        - INCREASE
        - DECREASE
        - SET_AMOUNT
      description: Operation type. Default is `SET_AMOUNT`.
      example: INCREASE
      default: SET_AMOUNT
    EntityName:
      type: string
      description: Entity name
      maxLength: 60
      example: Chester Fields
    ErrorCode:
      description: |
        Error code
        `minLength: 1`
        `maxLength: 12`
      type: string
      minLength: 1
      maxLength: 12
      example: WPMT0017
    ErrorMessage:
      description: |
        Error message
        `minLength: 1`
        `maxLength: 1000`
      type: string
      minLength: 1
      maxLength: 1000
      example: 'Invalid JSON payload received: Error unmarshalling request'
    ErrorResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          $ref: '#/components/schemas/ErrorMessage'
    EventDate:
      type: string
      format: date-time
      description: Event date in format ISO 8601.
      example: '2023-04-27T12:01:24Z'
    EventDatetime:
      type: string
      format: date-time
      minLength: 1
      maxLength: 30
      description: >
        Event date and time displayed in [ISO
        8601](https://en.wikipedia.org/wiki/ISO_8601) format.<br>

        `minLength: 1`

        `maxLength: 30`
      example: '2023-04-27T12:01:24Z'
    ExternalAccountID:
      maxLength: 60
      type: string
      pattern: ^[a-zA-Z0-9-]+$
      description: >
        Custom account ID. Used as the key for all operations (manage accounts,
        transactions, etc.) on the corporate layer.


        This field is:

        - Unique within the Organization

        - Immutable: The field cannot be updated.

        - Not recyclable: You can't reuse an external account ID, even if the
        account that was using it has been canceled.
      example: b993ba96-b3e8-4ef7-9cf7-7eee5ddafdab
    ExternalAccountId2:
      type: string
      description: External ID of the account to which the transaction is posted.
      maxLength: 60
      minLength: 1
      example: '289'
      pattern: ^[a-zA-Z0-9-]+$
    ExternalAccountIdForEarmark:
      type: string
      description: >
        External ID of the account on which the earmark is created.

        Should be the same `external_account_id` that was used to log in.

        Should be the same `external_account_id` used in [Create Corporate
        Account](https://developers.pismo.io/pismo-docs/reference/post-account).
      maxLength: 60
      pattern: ^[a-zA-Z0-9-]+$
      example: b993ba96-b3e8-4ef7-9cf7-7eee5ddafdab
    ExternalID:
      type: string
      maxLength: 60
      description: >-
        Custom entity ID that uniquely identifies the entity within your
        organization. By default, `document_number` is used as the primary
        identifier. To set `external_id` as the primary identifier, contact a
        Pismo representative to enable the parameter `EXTERNAL ID AS MAIN KEY`.
      example: 83bcde27-e049-4244-9dab-cfb4c88d70f8
    FloatAmount:
      type: number
      format: float
      description: >
        Part of the total amount that is deferred to settle on the
        `settlement_date`. If it is equal to or greater than `total_amount`, a
        bad request error is returned.
      maximum: 100000000000000000
      example: 300.52
      minimum: 0.01
    FloatPaymentRequest:
      title: FloatPaymentRequest
      type: object
      required:
        - external_account_id
        - currency
        - total_amount
        - float_amount
        - settlement_date
        - tracking_id
      properties:
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountId2'
        currency:
          $ref: '#/components/schemas/Currency2'
        total_amount:
          $ref: '#/components/schemas/TransactionAmount'
        float_amount:
          $ref: '#/components/schemas/FloatAmount'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        settlement_date:
          $ref: '#/components/schemas/SettlementDate'
        processing_code:
          $ref: '#/components/schemas/CreditProcessingCode'
        description:
          $ref: '#/components/schemas/TransactionDescription'
        metadata:
          $ref: '#/components/schemas/FloatMetadata'
    FloatPaymentResponse:
      title: FloatPaymentResponse
      type: object
      properties:
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        status:
          $ref: '#/components/schemas/DeferredPaymentStatus'
    Force:
      type: boolean
      description: >
        Whether a payment validation rule should be executed in a forced state
        (`true`) or not (`false`).<br>

        Allowed for `LEDGER` validation rule.
      example: false
    ForcePostCredit:
      type: boolean
      description: >
        If `true`, the operation is performed regardless of the account status,
        balance, or state, unless the account is closed.<br>

        If the account has any reason-based force payment restrictions, and the
        operation violates any of those restrictions, the force operation fails.
        The reasons that restrict force credit or debit operations are:

        - `ALL_NO_FORCE_ALLOWED`: Debits and credits are permitted, but force
        operations are not allowed.

        - `ALL_NO_FORCE_ALLOWED`: Debits and credits are permitted, but force
        operations are not allowed.

        - `DEBIT_ONLY_NO_FORCE_CREDIT_ALLOWED`: Only debits and force debits are
        allowed.

        - `FORCE_DEBIT_ONLY`: Debits, credits, and force credits are not
        allowed.

        - `NONE_NO_FORCE_ALLOWED`: Debits, credits, force debits, and force
        credits are not allowed.
      example: false
    ForcePostDebit:
      type: boolean
      description: >
        If `true`, the operation is performed regardless of the account status,
        balance, or state, unless the account is closed.<br>

        The force operation fails if the account has any reason-based force
        payment restrictions, and the operation violates any of those
        restrictions. The reasons that restrict force credit or debit operations
        are:
          - `ALL_NO_FORCE_ALLOWED`: Debits and credits are permitted, but force operations are not allowed.
          - `CREDIT_ONLY_NO_FORCE_DEBIT_ALLOWED`: Only credit and force credit are allowed.
          - `FORCE_CREDIT_ONLY`: Debits, credits and force debit are not allowed.
          - `NONE_NO_FORCE_ALLOWED`: Debits, credits, force debits, and force credits are not allowed.
      example: false
    ForcePostPayment:
      type: boolean
      description: >
        If `true`, the transaction is executed regardless of the accounts
        balance or state.<br>

        To post a forced transfer, you must specify both `credit` and `debit`,
        and set `force_post` to `true`.<br>

        Reason-based force payments:
          If the account has any reason-based force payment restrictions, and the operation violates any of those restrictions, it fails. The reasons that restrict force credit or debit operations are:
            - `ALL_NO_FORCE_ALLOWED`: Debits and credits are permitted, but force operations are not allowed.
            - `CREDIT_ONLY_NO_FORCE_DEBIT_ALLOWED`: Only credits and force credits are allowed.
            - `FORCE_CREDIT_ONLY`: Debits, credits, and force debits are not allowed.
            - `FORCE_DEBIT_ONLY`: Debits, credits, and force credits are not allowed.
            - `DEBIT_ONLY_NO_FORCE_CREDIT_ALLOWED`: Only debits and force debits are allowed.
            - `NONE_NO_FORCE_ALLOWED`: Debits, credits, force debits, and force credits are not allowed.<br>
        <b>NOTE</b>: Forced transfers from an earmark balance are not supported
        when `credit`, `debit`, or `earmark_id` are specified.
      default: false
      example: false
    FutureDatedCreditsBalance:
      description: >
        Represents the account balance scheduled to be settled on a future date,
        after the original posting date. The account's `book_balance` is
        credited when the settlement occurs.<br>

        The `future_dated_credits_balance` increases when future-dated credits
        are posted using the [Post payment](ref:corporate-v2-post-payments)
        endpoint, and decreases when those payments are settled or canceled.
        This balance is always a positive value.<br>

        `minimum`: `-9223372036854775807`

        `maximum`: `9223372036854775807`
      type: number
      minimum: -9223372036854776000
      maximum: 9223372036854776000
      example: 70
    FutureDatedDebitsBalance:
      description: >
        Represents the account balance scheduled to be settled on a future date,
        after the initial posting date. The account’s `book_balance` is debited
        when the settlement occurs.<br>

        The `future_dated_debits_balance` increases when future-dated debits are
        posted using the [Post payment](ref:corporate-v2-post-payments)
        endpoint, and decreases when these payments are settled or canceled.
        This balance is always a positive value.<br>

        `minimum`: `-9223372036854775807`

        `maximum`: `9223372036854775807`
      type: number
      minimum: -9223372036854776000
      maximum: 9223372036854776000
      example: 70
    CreditMovement:
      description: >
        Represents the total of all credits processed during the business day.
        Always expressed as a positive value.<br>

        `minimum`: `0`

        `maximum`: `9223372036854775807`
      type: number
      minimum: 0
      maximum: 9223372036854776000
      example: 70
    DebitMovement:
      description: >
        Represents the total of all debits processed during the business day.
        Always expressed as a positive value.<br>

        `minimum`: `0`

        `maximum`: `9223372036854775807`
      type: number
      minimum: 0
      maximum: 9223372036854776000
      example: 70
    NetMovement:
      description: >
        The change in an account’s balance between two consecutive business
        dates.

        Calculated as: `net_movement` = `credit_movement` -
        `debit_movement`.<br>

        `minimum`: `-9223372036854775807`

        `maximum`: `9223372036854775807`
      type: number
      minimum: -9223372036854776000
      maximum: 9223372036854776000
      example: 70
