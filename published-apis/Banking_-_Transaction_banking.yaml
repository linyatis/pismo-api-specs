  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /corporate/v1/hierarchies:
    post:
      summary: Create hierarchy
      description: >
        Creates a hierarchy. This can be used generically, but it's typically
        used to create business hierarchies along territorial lines:
        headquarters > countries > regions > branches, and so on.


        This endpoint generates a [Corporate hierarchy
        created](https://developers.pismo.io/events/docs/corporate-hierarchy-creation-1)
        event. See the [Data and reporting](doc:data-reporting-overview) guide
        for more information on events and setting up event notifications.


        For more information on hierarchies, see [Hierarchy](doc:hierarchies-2).
      operationId: post-hierarchies
      tags:
        - Hierarchies
      requestBody:
        description: Create hierarchy request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHierarchiesRequest'
            examples:
              New hierarchy:
                value:
                  name: Hierarchy One
                  levels:
                    - name: Central
                      index: 0
                      description: Root level
                    - name: Region
                      index: 1
                      description: Regional level
                    - name: Country
                      index: 2
                      description: Country level
                    - name: City
                      index: 3
                      description: Main cities level
                    - name: Branch
                      index: 4
                      description: Branch level
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateHierarchiesResponse'
              examples:
                Example hierarchy level structure:
                  value:
                    id: 497f6eca-6276-4993-bfeb-53cbbbba6f08
                    name: Hierarchy One
                    levels:
                      - id: df48f983-c906-4bb3-83c7-ac2e18babb59
                        name: Central
                        index: 0
                        description: Root level
                      - id: e7685dd9-e2c8-4a05-baf7-c7dd72c0969f
                        name: Region
                        index: 1
                        description: Regional level
                      - id: 0b05d677-602f-4874-92ea-a23471573c67
                        name: Country
                        index: 2
                        description: Country level
                      - id: 3cf5d1cf-e440-4813-ab14-7de22d2418e3
                        name: City
                        index: 3
                        description: Main cities level
                      - id: 22f4f976-11f2-451c-b62c-d4e2e174d90b
                        name: Branch
                        index: 4
                        description: Branch level
        '400':
          description: A Bad Request validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Invalid JSON payload:
                  value:
                    code: WHIE0001
                    message: 'Invalid JSON payload received: Error unmarshalling request'
                name required:
                  value:
                    code: WHIE0002
                    message: name is a required field
                name exceed size:
                  value:
                    code: WHIE0002
                    message: name must be a maximum of 40 characters in length
                levels required:
                  value:
                    code: WHIE0002
                    message: levels is a required field
                levels.index required:
                  value:
                    code: WHIE0002
                    message: index is a required field
                levels.index negative:
                  value:
                    code: WHIE0002
                    message: index must be 0 or greater
                levels.name exceed size:
                  value:
                    code: WHIE0002
                    message: name must be a maximum of 40 characters in length
                levels.description exceed size:
                  value:
                    code: WHIE0002
                    message: description must be a maximum of 80 characters in length
                levels maximum items in a Hierarchy:
                  value:
                    code: WHIE0002
                    message: levels must contain at maximum 10 items
                levels different indexes:
                  value:
                    code: WHIE0003
                    message: First Level index must be 0
                levels indexes values duplicated:
                  value:
                    code: WHIE0004
                    message: Levels must have different index values
                levels indexes values sequential order:
                  value:
                    code: WHIE0005
                    message: Levels index values must be in a sequential order
                levels should have at least 1 item:
                  value:
                    code: WHIE0007
                    message: levels should have at least 1 item
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500InternalServer'
      parameters: []
    get:
      summary: List hierarchies
      description: |
        Lists hierarchies and their levels.
      operationId: get-hierarchies
      tags:
        - Hierarchies
      parameters:
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/LimitQuery4'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetHierarchiesResponse'
              examples:
                Example hierarchies list:
                  value:
                    hierarchies:
                      - id: 497f6eca-6276-4993-bfeb-53cbbbba6f08
                        name: Hierarchy One
                        levels:
                          - id: df48f983-c906-4bb3-83c7-ac2e18babb59
                            name: Central
                            index: 0
                            description: Root level
                          - id: e7685dd9-e2c8-4a05-baf7-c7dd72c0969f
                            name: Region
                            index: 1
                            description: Regional level
                          - id: 0b05d677-602f-4874-92ea-a23471573c67
                            name: Country
                            index: 2
                            description: Country level
                          - id: 3cf5d1cf-e440-4813-ab14-7de22d2418e3
                            name: City
                            index: 3
                            description: Main cities level
                          - id: 22f4f976-11f2-451c-b62c-d4e2e174d90b
                            name: Branch
                            index: 4
                            description: Branch level
                      - id: 01c0230c-67fb-472f-bd89-50c291c9ce50
                        name: Hierarchy Two
                        levels:
                          - id: 8b3e3577-3d9d-4c9f-b2a5-56b462c6e20a
                            name: Central
                            index: 0
                            description: Root level
                          - id: ebb8200e-a89c-45ae-8dd0-edaaba842926
                            name: Region
                            index: 1
                            description: Regional level
                          - id: 8d8d3e78-194f-48e8-af1c-6a388cbf3587
                            name: Country
                            index: 2
                            description: Country level
                          - id: 4927554c-f346-4b7d-842f-84cd9c1c4170
                            name: City
                            index: 3
                            description: Main cities level
                          - id: a345a382-f52a-46e6-85b6-b32120919eba
                            name: Branch
                            index: 4
                            description: Branch level
                    pagination:
                      limit: 10
                      cursor: >-
                        eyJJRCI6IjBjOGVhMTA4LWNhZTYtNDA2Mi1iMmQzLTFhMTZkNmJiNGIyOCIsIk9yZ0lEIjoiMDllYThhMDQtNWY5My0xMWVkLTliNmEtMDI0MmFjMTIwMDAyIn0=
        '400':
          description: A Bad Request validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid cursor:
                  value:
                    code: WCMN0004
                    message: Invalid cursor
                limit exceeded maximum value:
                  value:
                    code: WCMN0006
                    message: Limit must be less than or equal to 100
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /corporate/v1/hierarchies/{hierarchyId}:
    get:
      summary: Get hierarchy
      operationId: getHierarchy
      description: Retrieves a hierarchy by its ID.
      parameters:
        - $ref: '#/components/parameters/HierarchyIdPath'
      tags:
        - Hierarchies
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateHierarchiesResponse'
        '500':
          $ref: '#/components/responses/500InternalServer'
    patch:
      summary: Update hierarchy
      operationId: patch-hierarchy
      description: Updates a hierarchy's name.
      parameters:
        - $ref: '#/components/parameters/HierarchyIdPath'
      tags:
        - Hierarchies
      requestBody:
        description: Patch hierarchy request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchHierarchyRequest'
            examples:
              Patch hierarchy:
                value:
                  name: Hierarchy Name
      responses:
        '204':
          $ref: '#/components/responses/204NoContent'
        '400':
          description: A Bad Request validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Invalid JSON payload:
                  value:
                    code: WHIE0001
                    message: 'Invalid JSON payload received: Error unmarshalling request'
                Hierarchy name exceed size:
                  value:
                    code: WHIE0002
                    message: name must be a maximum of 40 characters in length
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          description: Hierarchy Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Hierarchy Not Found:
                  value:
                    code: WHIE0006
                    message: Hierarchy with ID {hierarchyId} not found
        '500':
          $ref: '#/components/responses/500InternalServer'
  /corporate/v2/divisions:
    post:
      summary: Create division
      operationId: post-division-v2
      description: >
        Creates a division by level and hierarchy ID. To use the holidays
        defined in an administrative division, specify its ID in
        `administrative_division_id` to link your division.


        This endpoint generates a [Corporate division
        created](https://developers.pismo.io/events/docs/corporate-division-creation-2)
        event.
      parameters: []
      tags:
        - Divisions
      requestBody:
        description: Create level division request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDivisionRequestV2'
            examples:
              New level division:
                value:
                  division_code: my-division
                  hierarchy_id: 9bb95e15-c0e6-4c84-b644-350c76a83358
                  level_id: 7d574f66-ebd0-4b83-85a1-98ce7569e5c3
                  name: NORAM
                  parent_code: my-parent-division
                  description: North American regional division
                  program_ids:
                    - 111
                    - 222
                    - 333
                  administrative_division_id: 13
                  timezone: Pacific Standard Time
                  schema:
                    $schema: https://json-schema.org/draft/2020-12/schema
                    $id: https://example.com/product.schema.json
                    title: Product
                    description: A product from Acme's catalog
                    type: object
                    properties:
                      product_id:
                        $ref: '#/components/schemas/ProductID'
                    required:
                      - product_id
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDivisionsResponseV2'
              examples:
                New division:
                  value:
                    division_id: 6f8a456a-8b1a-4022-a2f8-7612595330b5
                    division_code: my-division
                    level_id: 3cb85fcc-c00c-4c83-ae89-cd2568531125
                    parent_code: my-parent-division
                    name: NORAM
                    description: North American regional division
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Invalid JSON payload:
                  value:
                    code: WDIV0015
                    message: 'Invalid JSON payload received: Error unmarshalling request'
                hierarchy_id is a required field:
                  value:
                    code: WDIV0011
                    message: hierarchy_id is a required field
                level_id is a required field:
                  value:
                    code: WDIV0011
                    message: level_id is a required field
                Name is a required field:
                  value:
                    code: WDIV0011
                    message: name is a required field
                name must be a maximum of 40 characters in length:
                  value:
                    code: WDIV0011
                    message: name must be a maximum of 40 characters in length
                description must be a maximum of 80 characters in length:
                  value:
                    code: WDIV0011
                    message: description must be a maximum of 80 characters in length
                timezone is invalid:
                  value:
                    code: WDIV0011
                    message: timezone is invalid
                schema is invalid:
                  value:
                    code: WDIV0011
                    message: schema is invalid
                program_ids must contain unique values:
                  value:
                    code: WDIV0011
                    message: program_ids must contain unique values
                program_ids must contain at maximum 100 items:
                  value:
                    code: WDIV0011
                    message: program_ids must contain at maximum 100 items
                division_code must be a maximum of 36 characters in length:
                  value:
                    code: WDIV0011
                    message: division_code must be a maximum of 36 characters in length
                division_code is a required field:
                  value:
                    code: WDIV0011
                    message: division_code is a required field
                division_code contains character not permitted:
                  value:
                    code: WDIV0011
                    message: division_code contains character not permitted
                Invalid level:
                  value:
                    code: WDIV0005
                    message: Invalid level
                Parent level division not found for the given hierarchy:
                  value:
                    code: WDIV0007
                    message: Parent level division not found for the given hierarchy
                The parent division informed is at a level lower than or equal to the level:
                  value:
                    code: WDIV0006
                    message: >-
                      The parent division informed is at a level lower than or
                      equal to the level
                Program with program_id {programId} not found:
                  value:
                    code: WDIV0012
                    message: Program with program_id {programId} not found
                The administrative division ID is invalid:
                  value:
                    code: WDIV0011
                    message: Administrative division is invalid
                Invalid hierarchy:
                  value:
                    code: WDIV0018
                    message: Invalid hierarchy
                Administrative division is misconfigured:
                  value:
                    code: WDIV0019
                    message: Administrative division is misconfigured
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Parent division not found:
                  value:
                    code: WDIV0017
                    message: Parent division not found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Division code already exists:
