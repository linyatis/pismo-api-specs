  /bank-statements/v1/account-balances/history/config:
    post:
      summary: Create account balance history configuration
      description: >-
        Create an account balance history configuration by division code.


        The configuration becomes effective on the day after the cycle closing
        time plus the cycle event delay.

        Example:
          - Division timezone: `UTC`
          - Create account balance history configuration is called at: `2023-05-01T18:00:00Z`
          - Account balance history configuration `cycle_closing_time` is: `22:00:00`
          - Account balance history configuration `cycle_event_delay` is: `10`
          - Account balance history configuration starts at `2023-05-01T22:10:00Z`

        This endpoint generates an [Account balance history configuration
        created](https://developers.pismo.io/events/docs/account-balances-balance-history-config-creation-1)
        event.
      operationId: post-account-balance-history-configuration
      tags:
        - Bank statements
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: >-
                #/components/schemas/CreateAccountBalanceHistoryConfigurationRequest
            examples:
              Create account balance history configuration:
                value:
                  division_code: my-division
                  cycle_closing_time: '22:00:00'
                  cycle_event_delay: 15
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/CreateAccountBalanceHistoryConfigurationResponse
              examples:
                Created account balance history configuration successfully:
                  value:
                    cycle_closing_time: '22:00:00'
                    cycle_event_delay: 10
                    cycle_config_validity:
                      start: '2023-05-01T22:10:00Z'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                division_code is a required field:
                  value:
                    code: WCFG0002
                    message: division_code is a required field
                division_code exceed size:
                  value:
                    code: WCFG0002
                    message: division_code must be a maximum of 36 characters in length
                cycle_closing_time is a required field:
                  value:
                    code: WCFG0002
                    message: cycle_closing_time is a required field
                cycle_closing_time exceed size:
                  value:
                    code: WCFG0002
                    message: >-
                      cycle_closing_time must be a maximum of 8 characters in
                      length
                cycle_closing_time invalid time format:
                  value:
                    code: WCFG0002
                    message: >-
                      cycle_closing_time has an invalid time format:
                      {cycle_closing_time}
                cycle_event_delay is a required field:
                  value:
                    code: WCFG0002
                    message: cycle_event_delay is a required field
                cycle_event_delay must be 5 minutes or greater:
                  value:
                    code: WCFG0002
                    message: cycle_event_delay must be 5 or greater
                cycle_event_delay exceed maximum minutes:
                  value:
                    code: WCFG0002
                    message: cycle_event_delay must be 1,439 or less
                Invalid JSON payload received:
                  value:
                    code: WCFG0001
                    message: 'Invalid JSON payload received: Error unmarshalling request'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Division not found:
                  value:
                    code: WCFG0003
                    message: Division not found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Division already configured:
                  value:
                    code: WCFG0004
                    message: Division already configured
        '500':
          $ref: '#/components/responses/500InternalServer'
