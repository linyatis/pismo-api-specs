  /corporate/v1/bulk-payments/{bulkId}:
    put:
      summary: Upload bulk file
      description: >
        This endpoint enables you to manage the upload of bulk files along with
        their corresponding signature data in the request header.


        <b>Detailed flow:</b>

        1. The client sends a request with the bulk file as the body and
        signature in the
           `Signature` header. The signature header is formatted as `keyId="{key_id}",signature="{signature_base64}"`. The parameters `key_id` and `signature_base64` are specified in the `parameters` section.
        2. The server processes the request and responds with a `200 OK` status,
        indicating the file upload request is complete.


        For detailed instructions, refer to [File signature and
        encryption](doc:file-signature-and-encryption).


        <b>Note</b>: Pismo reserves the right to offer this endpoint only for
        single-tenant clients, reach out to your Pismo representative for more
        information.
      operationId: corporate-put-bulk-file
      parameters:
        - name: bulkId
          in: path
          description: ID of the bulk payment file. This ID is client-generated.
          schema:
            type: string
          required: true
          example: b6cdccc4-f6bf-4218-9e5e-7fb8f66008e3
        - name: signature
          in: header
          description: >-
            The `Signature` header includes two fields: `keyId` and `signature`.
            The `keyId` represents the public key ID used to verify the request,
            while `signature` contains the the base64-encoded cryptographic
            signature of the request body, created using the private key
            associated with the `keyId`.
          schema:
            type: string
          required: true
          example: keyId="abcd1234", signature="c2lnbmF0dXJlLWRhdGE="
      tags:
        - Bulk payment files
      requestBody:
        description: Bulk file data.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutUploadBulkFile'
        '400':
          description: A Bad Request validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                keyId is required:
                  value:
                    code: WBUP0001
                    message: '''keyId'' header: attribute is required'
                signature is required:
                  value:
                    code: WBUP0001
                    message: '''signature'' header: attribute is required'
                signature is not a valid base64-encoded string:
                  value:
                    code: WBUP0001
                    message: >-
                      'signature' header: attribute must be a valid base64
                      encoded string
                signature is malformed:
                  value:
                    code: WBUP0001
                    message: '''signature'' header: header is malformed'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicate bulk file uploaded:
                  value:
                    code: WBUP0003
                    message: Duplicate bulk file uploaded
        '500':
          $ref: '#/components/responses/500InternalServer'
  /corporate/v1/bulk-settlement:
    post:
      summary: Request bulk settlement
      description: >
        This endpoint triggers the clearing of future value-dated payments and
        check-release operations in bulk.<br>

        A future value dated payment is a banking transaction that is scheduled
        to occur on a future date, such as a prepayment or normal payment. The
        bank is instructed to send the payment on a specific date, which can be
        the next day or later. When a payment is scheduled for a future date,
        the funds remain in the payer's account, continuing to accrue interest
        until the payment is settled on the scheduled date.


        A check release is the process that moves funds from an uncleared or
        held state into the customer’s available balance. After a check is
        deposited, some or all of its amount remains pending until a scheduled
        release. When the check is released, the pending funds are applied, and
        the account balances are updated so that the amount becomes fully
        available for use.


        <b>NOTE</b>: You can call this endpoint once with the same parameters,
        per division, settlement date, and operation type. If the process fails,
        you can retry up to 9 times per division, per business day.
      operationId: post-bulk-settlement
      tags:
        - Bulk settlement
      parameters: []
      requestBody:
        description: Bulk settlement request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkSettlementRequest'
            examples:
              Request bulk settlement:
                value:
                  operation_type: float-payment
                  settlement_date: '2024-07-03'
                  bulk_id: 74f8e8df
                  division_code: 74f8e8df-2c2b-412f-8d35-abdf17d896ec
      responses:
        '202':
          description: Accepted
        '400':
          description: A Bad Request validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid JSON payload:
                  value:
                    code: WSTM0001
                    message: 'Invalid JSON payload received: Error unmarshalling request'
                bulk id required:
                  value:
                    code: WSTM0002
                    message: bulk_id is a required field
                bulk id max length:
                  value:
                    code: WSTM0002
                    message: bulk_id must be a maximum of 60 characters in length
                bulk id invalid characters:
                  value:
                    code: WSTM0002
                    message: 'bulk_id contains invalid characters: [characters]'
                operation type required:
                  value:
                    code: WSTM0002
                    message: operation_type is a required field
                operation type invalid:
                  value:
                    code: WSTM0002
                    message: operation_type must be one of [future-dated float-payment]
                settlement date required:
                  value:
                    code: WSTM0002
                    message: settlement_date is a required field
                settlement date max length:
                  value:
                    code: WSTM0002
                    message: >-
                      settlement_date must be a maximum of 10 characters in
                      length
                settlement date wrong format:
                  value:
                    code: WSTM0002
                    message: >-
                      settlement_date 07/15/2024 should be formatted as
                      yyyy-mm-dd and be a valid date
                division code required:
                  value:
                    code: WSTM0002
                    message: division_code is a required field
                division code max length:
                  value:
                    code: WSTM0002
                    message: division_code must be a maximum of 36 characters in length
                settlement date in the future:
                  value:
                    code: WSTM0003
                    message: Settlement date cannot be a future date
                settlement date before allowed time:
                  value:
                    code: WSTM0004
                    message: >-
                      Current date can be the same as settlement date only after
                      00:15 in the division's time zone
                division not found:
                  value:
                    code: WSTM0005
                    message: Division not found
                settlement date invalid:
                  value:
                    code: WSTM0006
                    message: Settlement date must be a valid date in ISO 8601 format
                Settlement not yet allowed:
                  value:
                    code: WSTM0010
                    message: >-
                      Bulk settlement for the current date is allowed only after
                      {hour}:{minute}, according to the division’s time zone
                administrative division is misconfigured:
                  value:
                    code: WSTM0011
                    message: Administrative division is misconfigured
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicated parameters:
                  value:
                    code: WSTM0007
                    message: >-
                      Bulk settlement already posted with parameters division
                      code [division], settlement date [date] and type [type]
                duplicated bulk id:
                  value:
                    code: WSTM0009
                    message: Bulk id [id] is already in use
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                posts limit:
                  value:
                    code: WSTM0008
                    message: You cannot post more than 10 daily bulk settlements
        '500':
          description: Internal Errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Generic internal error:
                  value:
                    code: ECMN9999
                    message: Internal error
