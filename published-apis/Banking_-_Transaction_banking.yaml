          $ref: '#/components/schemas/EventDatetime'
    PostedTransaction:
      type: boolean
      description: Are transactions posted on statements?
      example: false
    PreviousAccountBalanceHistoryConfig:
      type: object
      properties:
        cycle_closing_time:
          $ref: '#/components/schemas/CycleClosingTime'
        cycle_event_delay:
          $ref: '#/components/schemas/CycleEventDelay'
        updated_at:
          $ref: '#/components/schemas/ConfigUpdatedAt'
        cycle_config_validity:
          $ref: '#/components/schemas/CycleConfigValidity'
    PreviousDormancyConfigs:
      type: array
      description: >-
        List of previous dormancy configurations. This field is returned only if
        you pass the query string with `showPrevious` set to `true`.
      items:
        $ref: '#/components/schemas/DormancyConfigResponse'
    ProcessingCode2:
      type: string
      description: >-
        Processing code used for posting the transaction. The code must have a
        balance impact compatible with the operation type `debit` or `credit`.
        To list the organization processing codes, use the [List processing
        codes](https://developers.pismo.io/pismo-docs/reference/get-processing-code-by-tenant)
        endpoint.
      maxLength: 6
      minLength: 1
      example: '220035'
    ProcessingCodeDescription:
      type: string
      description: Processing code description
      example: Hold Funds
    ProductID:
      description: Product ID
      type: integer
      format: int64
      example: 1234
    ProgramID:
      type: integer
      format: int64
      maximum: 99999999999
      description: >
        Program ID. The program must belong to the organization. Use [List
        programs](https://developers.pismo.io/pismo-docs/reference/programs-1)
        to view a list of the program IDs for the organization.


        This program must be bound to the division. You can attach the program
        with either of the following endpoints:

        [Create division](ref:post-division-v2)

        [Patch division](ref:patch-division-v2)
      example: 8674
    ProgramID2:
      type: integer
      format: int64
      minimum: 1
      maximum: 4294967295
      description: |
        Program ID<br>
        `minimum: 1`
        `maximum: 4294967295`
      example: 492
    ProgramID3:
      type: integer
      format: int64
      description: Program ID
      example: 2222
    ProgramIDs:
      type: array
      maximum: 100
      description: >
        List of allowed program IDs. The programs must belong to the
        organization.

        This list is used for validation during the [Create transaction banking
        account](https://developers.pismo.io/pismo-docs/reference/post-account)
        process.

        You can retrieve the organization programs using the [List
        programs](https://developers.pismo.io/pismo-docs/reference/programs-1)
        endpoint.

        If no program IDs are specified, this division inherits the
        `program_ids` list from the parent division, if it exists.
      items:
        type: integer
        format: int32
        example: 1
      example:
        - 1
        - 2
        - 3
    ProcessingCode:
      type: string
      description: >
        Processing code used to create the underlying transaction. Each internal
        operation type uses a default processing code.<br>

        `minLength: 1`

        `maxLength: 6`
      minLength: 1
      maxLength: 6
      example: '219248'
    PublicKeyExpiresAt:
      type: string
      description: >-
        Expiration date and time of the public key. If not provided, it is set
        to 6 months from the date of submission.
      example: '2025-05-21T12:27:00Z'
    PublicKeyID:
      type: string
      description: >-
        ID of the public key. Only digits, letters, hyphens, and underscores are
        allowed, and cannot exceed 60 characters.
      maximum: 60
      example: b6cdccc4-f6bf-4218-9e5e-7fb8f66008e3
    PutUploadBulkFile:
      type: string
      description: Ok
      example: OK
    ReactivationWithLastRestriction:
      type: boolean
      description: >-
        Whether the account should be reactivated to `normal` with its last
        manual change restriction (`true`) or not (`false`).
      example: false
    ReactivationExceptionsConfig:
      type: object
      description: >-
        Specifies configuration rules that allow certain transactions to bypass
        dormancy reactivation based on defined transaction attributes and their
        corresponding values.
      properties:
        field:
          $ref: '#/components/schemas/DormancyExceptionField'
        values:
          $ref: '#/components/schemas/DormancyExceptionValues'
      required:
        - field
        - values
    RequiredCreditTransaction:
      type: object
      description: >
        Credit transaction. To post a credit, you must provide a `credit` object
        with a valid credit processing code (`processing_code`) and destination
        (`external_account_id`).<br>

        To post a transfer, you must provide both credit and debit objects,
        representing the credit and debit legs of the operation, respectively.
      properties:
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountId2'
        processing_code:
          $ref: '#/components/schemas/CreditProcessingCode'
        soft_descriptor:
          $ref: '#/components/schemas/SoftDescriptorPayment'
        metadata:
          $ref: '#/components/schemas/MetadataPayment'
      required:
        - external_account_id
    RequiredDebitTransaction:
      type: object
      description: >
        Debit transaction. To post a debit you must provide a `debit` object. If
        you provide an `earmark_id` value inside the `debit` object, the payment
        amount is withdrawn directly from the earmark balance. The earmark ID is
        generated by the [Create
        earmark](https://developers.pismo.io/pismo-docs/reference/post-corporate-v2-earmarks)
        endpoint.<br>

        To post a transfer, you must provide both `credit` and `debit` objects,
        representing the credit and debit legs of the operation, respectively.
        If you provide an `earmark_id` value inside the `debit` object, the
        transferred amount is withdrawn directly from the earmark balance.
      properties:
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountId2'
        processing_code:
          $ref: '#/components/schemas/DebitProcessingCode'
        earmark_id:
          $ref: '#/components/schemas/EarmarkIdWithdrawal'
        soft_descriptor:
          $ref: '#/components/schemas/SoftDescriptorPayment'
        metadata:
          $ref: '#/components/schemas/MetadataPayment'
      required:
        - external_account_id
    RestrictedFundsBalance:
      type: number
      format: float
      description: >
        The portion of an account balance held under regulatory or operational
        restrictions and not available for transactions.

        `minimum`: 0

        `maximum`: 9223372036854775807
      minimum: 0
      maximum: 9223372036854776000
    HeldFunds:
      type: number
      format: float
      description: >
        Funds that are temporarily restricted due to regulatory or operational
        requirements, unavailable for transactions, and representing the total
        amount of earmarked or otherwise restricted balances.

        `minimum`: 0

        `maximum`: 9223372036854775807
      minimum: 0
      maximum: 9223372036854776000
    HeldChecksBalance:
      type: number
      format: float
      description: >
        The balance from checks that the bank considers available but holds to
        earn interest. It increases when check holds are applied and decreases
        when those holds are released or canceled.

        `minimum`: 0

        `maximum`: 9223372036854775807
      minimum: 0
      maximum: 9223372036854776000
    RemunerativeInterestAccrued:
      type: number
      format: float
      description: >
        This balance reflects the total interest pending capitalization. It
        increases as interest accrues and decreases when the accrued interest is
        added to the principal balance.

        `minimum`: 0

        `maximum`: 9223372036854775807
      minimum: 0
      maximum: 9223372036854776000
    RestrictedFundsAppliedAmount:
      type: number
      format: float
      description: >
        Amount actually executed by the operation at the time it was applied.


        Depending on the `hold_method`, this value may be different from the
        requested_amount.


        Hold Method:
          - STRICT holds either apply the full requested amount or fail
          - FLEXIBLE may apply only the available portion

        Type:
          - For RESTRICT_FUNDS, it is the portion of the requested amount that was successfully held.
          - For RELEASE_FUNDS, it is the portion that was actually released back to the available balance.
      minimum: 0
      multipleOf: 0.0001
      maximum: 100000000000000000
      example: 800.22
    RestrictedFundsAmount:
      type: number
      format: float
      description: >
        Amount requested by the operation.


        The final applied amount may differ (see applied_amount) depending on
        execution rules and available balance at execution time.


        Notes:
          - For `RESTRICT_FUNDS`, this is the amount to be held.
          - For `RELEASE_FUNDS`, this is the amount to be released.
          - Precision depends on the currency's minor units. For example:
            - 2 decimals (USD, EUR) → multiples of 0.01
            - 3 decimals (BHD, JOD, KWD, OMR, TND) → multiples of 0.001
            - 4 decimals (CLF) → multiples of 0.0001
      minimum: 0.0001
      maximum: 100000000000000000
    RestrictedFundsRequestedAmount:
      type: number
      format: float
      description: >-
        Amount originally requested at the time the restriction was created;
        remains unchanged after the initial request.
      minimum: 0.0001
      maximum: 100000000000000000
    RestrictedFundsHoldMethod:
      type: string
      description: >-
        Determines how the system processes the restriction request in relation
        to the available balance at the time of execution.


        Notes:
          - `STRICT`: Applies to the full requested amount or fails (no partial holds).
          - `FLEXIBLE`: Can apply only to the available portion, resulting in a partial hold.
      enum:
        - STRICT
        - FLEXIBLE
      example: STRICT
    RestrictedFundsHeldAmount:
      type: number
      format: float
      minimum: 0
      maximum: 100000000000000000
    RestrictedFundsID:
      type: string
      format: uuid
      maxLength: 36
      example: e4adf199-c925-4d11-b002-c5bfd5679030
    RestrictedFundsRequest:
      description: Create funds restriction request body
      type: object
      properties:
        hold_method:
          $ref: '#/components/schemas/RestrictedFundsHoldMethod'
        amount:
          $ref: '#/components/schemas/RestrictedFundsAmount'
        operation:
          $ref: '#/components/schemas/RestrictedFundsRequestOperation'
        restricted_funds_id:
          $ref: '#/components/schemas/RestrictedFundsID'
        soft_descriptor:
          $ref: '#/components/schemas/RestrictedFundsSoftDescriptor'
      required:
        - hold_method
        - amount
        - operation
    RestrictedFundsReleaseRequest:
      description: Create funds restriction request body
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/RestrictedFundsAmount'
        operation:
          $ref: '#/components/schemas/RestrictedFundsRequestOperation'
        soft_descriptor:
          $ref: '#/components/schemas/RestrictedFundsSoftDescriptor'
      required:
        - amount
        - operation
    RestrictedFunds:
      type: object
      properties:
        restricted_funds_id:
          $ref: '#/components/schemas/RestrictedFundsID'
        hold_method:
          $ref: '#/components/schemas/RestrictedFundsHoldMethod'
        requested_amount:
          $ref: '#/components/schemas/RestrictedFundsRequestedAmount'
        held_amount:
          $ref: '#/components/schemas/RestrictedFundsHeldAmount'
        created_at:
          $ref: '#/components/schemas/RestrictedFundsCreatedAt'
        soft_descriptor:
          $ref: '#/components/schemas/RestrictedFundsSoftDescriptor'
        operations:
          $ref: '#/components/schemas/RestrictedFundsOperations'
      required:
        - restricted_funds_id
        - hold_method
        - requested_amount
        - held_amount
        - created_at
    RestrictedFundsCreatedAt:
      type: string
      format: date-time
      minLength: 1
      maxLength: 30
      description: >
        Date and time when the restriction or operation was created, shown in
        [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.<br>

        `minLength: 1`

        `maxLength: 30`
      example: '2023-04-27T12:01:24Z'
    RestrictedFundsAppliedAt:
      type: string
      format: date-time
      minLength: 1
      maxLength: 30
      description: >
        Date and time when the financial operation was actually executed, shown
        in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format.<br>

        `minLength: 1`

        `maxLength: 30`
      example: '2023-04-27T12:01:24Z'
    RestrictedFundsOperationType:
      type: string
      description: >
        Represents the kind of financial operation being performed.

        Indicates whether the operation is creating a funds restriction or
        releasing funds.
      enum:
        - RESTRICT_FUNDS
        - RELEASE_FUNDS
      example: RELEASE_FUNDS
    RestrictedFundsOperation:
      type: object
      properties:
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        type:
          $ref: '#/components/schemas/RestrictedFundsOperationType'
        status:
          $ref: '#/components/schemas/RestrictedFundsOperationStatus'
        processing_code:
          $ref: '#/components/schemas/RestrictedFundsProcessingCode'
        requested_amount:
          $ref: '#/components/schemas/RestrictedFundsAmount'
        applied_amount:
          $ref: '#/components/schemas/RestrictedFundsAppliedAmount'
        created_at:
          $ref: '#/components/schemas/RestrictedFundsCreatedAt'
        soft_descriptor:
          $ref: '#/components/schemas/RestrictedFundsSoftDescriptor'
        applied_at:
          $ref: '#/components/schemas/RestrictedFundsAppliedAt'
        metadata:
          $ref: '#/components/schemas/Metadata'
      required:
        - tracking_id
        - type
        - status
        - processing_code
        - requested_amount
        - applied_amount
        - created_at
    RestrictedFundsOperations:
      type: array
      description: List of operations performed to restrict or release funds.
      items:
        $ref: '#/components/schemas/RestrictedFundsOperation'
    RestrictedFundsProcessingCode:
      type: string
      description: >
        Processing code used to create the underlying transaction. Each
        operation type uses a default processing code.<br>

        `minLength: 1`

        `maxLength: 6`
      minLength: 1
      maxLength: 6
      example: PSM045
    RestrictedFundsRequestOperation:
      description: Represents the data of the hold or release transaction.
      type: object
      properties:
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        soft_descriptor:
          $ref: '#/components/schemas/RestrictedFundsSoftDescriptor'
        metadata:
          $ref: '#/components/schemas/Metadata'
      required:
        - tracking_id
    RestrictedFundsSoftDescriptor:
      type: string
      description: >-
        Brief description that helps to identify a particular restriction or
        operation.
      example: FDIC 12 C.F.R. § 360.9
      maxLength: 100
      minLength: 0
    RestrictedFundsOperationStatus:
      type: string
      description: |
        Indicates the current execution state of the operation.
      enum:
        - PROCESSING
        - SUCCEEDED
        - FAILED
        - TIMED_OUT
      example: SUCCEEDED
    ScheduleDatetime:
      type: string
      format: date-time
      description: >-
        The date and time when the transaction is scheduled to occur. Required
        for scheduled payments. Format = yyyy-mm-dd:hr:mm:ss.
      example: '2023-03-10T19:05:56.743Z'
    ScheduledPaymentID:
      type: string
      description: ID used to reference the scheduled payment for subsequent operations.
      example: d2644122-251b-41fa-b5b5-54cfad097afb
    ScheduledPaymentResponse:
      title: ScheduledPaymentResponse
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ScheduledPaymentID'
    ScheduledPaymentStatus:
      type: string
      description: Status of scheduled payment
      example: ACTIVE
    ScheduledPaymentV2Item:
      title: ScheduledPaymentItem
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ScheduledPaymentID'
        status:
          $ref: '#/components/schemas/ScheduledPaymentStatus'
        payment:
          $ref: '#/components/schemas/ScheduledPaymentV2Request'
    ScheduledPaymentV2Request:
      title: ScheduledPaymentV2Request
      required:
        - schedule_datetime
      allOf:
        - $ref: '#/components/schemas/PaymentV2Request'
        - type: object
          properties:
            schedule_datetime:
              $ref: '#/components/schemas/ScheduleDatetime'
    SchemaCreateTransactionBankingAccount:
      type: object
      description: >
        Valid JSON schema as specified in
        https://json-schema.org/specification.html.

        Used to validate the JSON of custom fields in the [Create transaction
        banking
        account](https://developers.pismo.io/pismo-docs/reference/post-account)
        process.

        If this field is not set, the division inherits its schema from the
        parent division, if it exists.
      example:
        $schema: https://json-schema.org/draft/2020-12/schema
        $id: https://example.com/product.schema.json
        title: Product
        description: A product from Acme's catalog
        type: object
        properties:
          product_id:
            $ref: '#/components/schemas/ProductID'
        required:
          - product_id
    SettlementDate:
      type: string
      format: date
      description: >
        Future date on which the `float_amount` is settled. Corresponds to the
        cycle closing date relative to the payment date.<br>

        <b>Notes</b>:
          - The settlement date is in ISO 8601 format.
          - It's similar to the `business_date` attribute for regular payment operations.
      example: '2023-03-09'
    SkipAccountDateValidation:
      type: boolean
      description: >-
        If `FALSE`, the `payment_datetime` is validated against the account
        creation date and time. If `TRUE`, the validation is skipped.
      default: false
      example: false
    SoftDescriptor:
      type: string
      description: >-
        Brief description that helps to identify a particular transaction on the
        bank statement.
      example: ACME Inc. - Invoice 2938
      maxLength: 100
      minLength: 0
    SoftDescriptorPayment:
      type: string
      description: >
        Brief description that helps to identify a particular transaction on the
        bank statement.<br>

        <b>NOTES</b>:

        - To be able to send different `soft_descriptor` information for each
        payment leg in transfer operations, the `soft_descriptor` can be
        included in the primary or leg field. A conflict between the primary and
        a leg field results in an error as mapped in the responses section.
      maxLength: 100
      minLength: 0
      example: ACME Inc. - Invoice 2938
    StatusCurrentPageDeprecated:
      type: integer
      format: int32
      description: Current page
      example: 1
      deprecated: true
    StatusCursorResponse:
      type: object
      properties:
        next_cursor:
          $ref: '#/components/schemas/NextCursor'
        has_next:
          $ref: '#/components/schemas/StatusCursorHasNext'
        count:
          $ref: '#/components/schemas/CurrentPageCount'
    StatusNumberOfPagesDeprecated:
      type: integer
      format: int32
      description: Total pages
      example: 100
      deprecated: true
    StatusPerPageDeprecated:
      type: integer
      format: int64
      description: Maximum items per page
      example: 100
      deprecated: true
    StatusReasonsResponse:
      type: object
      description: Paginated response for account reason
      allOf:
        - $ref: '#/components/schemas/StatusCursorResponse'
        - $ref: '#/components/schemas/ListStatusReasonDeprecatedResponse'
      properties:
        items:
          type: array
          description: List of result items
          items:
            $ref: '#/components/schemas/ListStatusReasonResponse'
    StatusReasonExternalID:
      type: string
      description: >-
        Custom reason ID for the specified status. This field is unique within
        the organization and is related to the `reason_id` field.
      example: CREDIT ONLY
    StatusTotalItemsDeprecated:
      type: integer
      format: int32
      description: Total items
      example: 500
      deprecated: true
    TargetID:
      type: string
      description: >-
        Target ID. If `target_type` is `DIVISION`, then `target_id` is the
        division code. If `target_type` is `PROGRAM`, then `target_id` is the
        program ID.
      maxLength: 60
      example: my-division-code
    Timezone:
      type: string
      description: >
        Division timezone in timezone database format.<br>

        This value is used in the calculations for holidays, weekends, and daily
        balances. If a timezone is not specified, the division inherits the
        timezone from its parent division. If the parent division also lacks a
        specified timezone, Pismo defaults to using UTC.

        To clear this field, specify an empty string.
      example: America/New_York
    TrackingID:
      type: string
      description: >
        A unique payment tracking number provided by the client. If an existing
        `tracking_id` already exists in the system, the API returns a `409`
        error.


        This field is:
          - Unique within the Organization.
          - Immutable — It can't be updated.
          - Not recyclable — You can't reuse a `tracking_id`.
      minLength: 1
      maxLength: 43
      example: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
    TrackingIdMultiLeg:
      type: string
      description: >
        A unique payment tracking number. In the case of multi-leg payments,
        this ID is used to generate distinct child tracking IDs for each leg. If
        any of these child tracking IDs matches an existing tracking ID within
        the platform, a 400 error is returned.<br>

        A single tracking ID must be provided. This is referred to as the
        `original tracking ID`. For information about tracking IDs, see
        [Tracking ID
        requirement](https://developers.pismo.io/pismo-docs/docs/payment-overview#tracking-id-requirement).


        This field is:
          - Unique within the Organization.
          - Immutable: This field cannot be updated.
          - Not recyclable: `tracking_id` cannot be reused.
      maxLength: 43
      minLength: 1
      example: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
    TrackingIdMultiLegV3:
      type: string
      description: >
        A unique payment tracking number provided by the client. If an existing
        `tracking_id` already exists in the system, the API returns a `400`
        error.<br>

        For information about tracking IDs, see [Tracking ID
        requirement](https://developers.pismo.io/pismo-docs/docs/payment-overview#tracking-id-requirement).


        This field is:
          - Unique within the Organization.
          - Immutable: This field cannot be updated.
          - Not recyclable: `tracking_id` cannot be reused.
      maxLength: 43
      minLength: 1
      pattern: ^[a-zA-Z0-9-]+$
      example: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
    MultilegID:
      type: string
      description: >
        A unique multileg payment identifier provided by the client. If an
        existing `multileg_id` already exists in the system, the API returns a
        `409` error.


        This field is:
          - Unique within the Organization.
          - Immutable — It can't be updated.
          - Not recyclable — You can't reuse a `multileg_id`.
      minLength: 1
      maxLength: 43
      pattern: ^[a-zA-Z0-9-]+$
      example: 0a50c88a-ade8-4bcc-a639-9a0b0f11e245
    TransactionAmount:
      type: number
      format: float
      description: Transaction amount
      maximum: 100000000000000000
      example: 1000.52
      minimum: 0.01
    TransactionCreatedAt:
      type: string
      format: date-time
      description: Transaction creation date in format ISO 8601
      example: '2023-04-27T12:01:24Z'
    TransactionDescription:
      type: string
      description: >-
        A brief description that appears on the bank statement to help identify
        a particular transaction.
      example: ACME Inc. - Invoice 2938
      maxLength: 100
    TransactionID:
      type: integer
      format: int64
      description: Transaction ID
      example: 1111
    TransactionResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/TransactionID'
        program_id:
          $ref: '#/components/schemas/ProgramID3'
        account_id:
          $ref: '#/components/schemas/AccountID'
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountID'
        soft_descriptor:
          $ref: '#/components/schemas/SoftDescriptor'
        processing_code:
          $ref: '#/components/schemas/ProcessingCode'
        processing_description:
          $ref: '#/components/schemas/ProcessingCodeDescription'
        amount:
          $ref: '#/components/schemas/Amount'
        event_date:
          $ref: '#/components/schemas/EventDate'
        payment_date:
          $ref: '#/components/schemas/PaymentDatetime'
        created_at:
          $ref: '#/components/schemas/TransactionCreatedAt'
        transaction_type:
          $ref: '#/components/schemas/TransactionType'
        authorization:
          $ref: '#/components/schemas/Authorization'
        metadata:
          $ref: '#/components/schemas/Metadata'
    TransactionStatusResponse:
      type: object
      properties:
        authorizations_status:
          $ref: '#/components/schemas/AuthorizationStatus'
        amount:
          $ref: '#/components/schemas/AmountValue'
        currency:
          $ref: '#/components/schemas/Currency'
        processing_code:
          $ref: '#/components/schemas/ProcessingCode'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        metadata:
          $ref: '#/components/schemas/Metadata'
        event_datetime:
          $ref: '#/components/schemas/EventDate'
        error:
          $ref: '#/components/schemas/ErrorResponse'
    TransactionType:
      type: object
      description: Transaction type
      properties:
        id:
          $ref: '#/components/schemas/TransactionTypeID'
        description:
          $ref: '#/components/schemas/TransactionTypeDescription'
        credit:
          $ref: '#/components/schemas/IsCredit'
        posted_transaction:
          $ref: '#/components/schemas/PostedTransaction'
    TransactionTypeDescription:
      type: string
      description: Transaction type description
      maxLength: 30
      example: Purchase
    TransactionTypeID:
      type: integer
      format: int64
      description: Transaction type ID
      example: 2345
    UnclearedChecksBalance:
      type: number
      format: float
      minimum: -9223372036854776000
      maximum: 9223372036854776000
      description: >
        The total value of checks that have been posted to the account but have
        not yet cleared.

        `minimum: -9223372036854775807`

        `maximum: 9223372036854775807`
    UnclearedFunds:
      type: number
      format: float
      minimum: -9223372036854776000
      maximum: 9223372036854776000
      description: |
        Uncleared funds amount<br>
        `minimum: -9223372036854775807`
        `maximum: 9223372036854775807`
      example: 123.45
    UpdateAccountBalanceHistoryConfigurationRequest:
      description: Update account balance history configuration request object
      type: object
      properties:
        cycle_closing_time:
          $ref: '#/components/schemas/CycleClosingTime'
        cycle_event_delay:
          $ref: '#/components/schemas/CycleEventDelay'
    UpdateChildren:
      type: boolean
      description: >-
        Whether to update status of all account children linked through the
        attribute `parent_account_id` (`true`) or not (`false`).
      example: true
    UpdateDormancyConfigRequestv2:
      description: Update dormancy-config payload request object
      type: object
      properties:
        check_time:
          $ref: '#/components/schemas/DormancyCheckTime'
        statuses:
          type: array
          description: >-
            List of objects containing information related to an organization's
            valid account status
          maxItems: 3
          items:
            type: object
            properties:
              status:
                $ref: '#/components/schemas/AccountStatus'
              days:
                $ref: '#/components/schemas/InactivityDays'
              reason_external_id:
                $ref: '#/components/schemas/StatusReasonExternalID'
              reactivation_with_last_restriction:
                $ref: '#/components/schemas/ReactivationWithLastRestriction'
              restrictions:
                $ref: '#/components/schemas/DormancyRestrictionsv2'
            required:
              - status
              - days
              - reason_external_id
        dormant_processing_codes:
          $ref: '#/components/schemas/DormantProcessingCodes'
        deny_forced_transaction_reactivation:
          $ref: '#/components/schemas/DenyForcedTransactionReactivation'
        reactivation_exceptions_config:
          $ref: '#/components/schemas/ReactivationExceptionsConfig'
    UpdateEarmarkRequestV2:
      type: object
      properties:
        internal_operation:
          $ref: '#/components/schemas/InternalOperation2'
        description:
          $ref: '#/components/schemas/EarmarkDescription'
        update_type:
          $ref: '#/components/schemas/EarmarkUpdateType'
        amount:
          $ref: '#/components/schemas/EarmarkUpdateAmount'
        release_datetime:
          $ref: '#/components/schemas/EarmarkReleaseDatetime'
        force_post:
          $ref: '#/components/schemas/EarmarkForcePost'
      required:
        - internal_operation
    UpdatePaymentResponse:
      title: UpdatePaymentResponse
      type: object
      properties:
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
    UploadPublicKeyRequest:
      description: Create public key payload request
      type: object
      example:
        id: string
        key_material: string
        expires_at: string
      properties:
        id:
          $ref: '#/components/schemas/PublicKeyID'
        key_material:
          $ref: '#/components/schemas/KeyMaterial'
        expires_at:
          $ref: '#/components/schemas/PublicKeyExpiresAt'
      required:
        - id
        - key_material
    UploadPublicKeyResponse:
      description: Upload public key response
      type: object
      properties:
        id:
          $ref: '#/components/schemas/PublicKeyID'
    ValidationRule:
      title: ValidationRule
      type: object
      properties:
        override:
          $ref: '#/components/schemas/Override'
        force:
          $ref: '#/components/schemas/Force'
    ValidationRules:
      title: ValidationRules
      type: object
      description: >
        Rules that determine which validations are executed during the payment
        process.<br>

        Available validation rules:
          - `LEDGER`
          - `ACCOUNT_STATUS`
      additionalProperties:
        $ref: '#/components/schemas/ValidationRule'
      example:
        ACCOUNT_STATUS:
          override: false
        LEDGER:
          force: false
    ValidExceptionValue:
      type: string
      description: >-
        Transaction attribute values that exempt the transaction from
        reactivating a dormant account
      minLength: 1
      maxLength: 100
      example: '001'
    ValidProcessingCode:
      type: string
      description: Valid processing code used in transactions
      minLength: 1
      maxLength: 6
      example: '220040'
    ValueDatedBalance:
      type: number
      description: >
        The value dated balance results from recalculating credit or debit
        balance based on the back value date. Defaults to the book balance.<br>

        The value dated balance is included in the following events:

        - [Account balance
        changed](https://developers.pismo.io/events/docs/account-balances-balance-change-1)

        - [Account balance history
        generated](https://developers.pismo.io/events/docs/account-balances-balance-history-1)
      format: float
      example: 123.45
  responses:
