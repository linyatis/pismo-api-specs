          $ref: '#/components/schemas/MultilegLegError'
        rollback:
          title: Multileg payment leg rollback
          type: object
          properties:
            tracking_id:
              $ref: '#/components/schemas/TrackingID'
            event_datetime:
              $ref: '#/components/schemas/EventDatetime'
