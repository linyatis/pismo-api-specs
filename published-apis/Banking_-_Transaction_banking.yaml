      description: Date of current balance. Format = yyyy-mm-dd.
      example: '2023-06-22'
    CurrentPageCount:
      type: integer
      format: int32
      description: Number of items on the current page
      example: 100
    CurrentReasonExternalID:
      type: string
      description: >
        The custom reason ID related to the `current_reason_id` specified in the
        dormancy restrictions.

        The dormancy configuration checks to see whether the current
        `reason_external_id` matches the one in the configuration. If yes, the
        new `reason_external_id` is the `new_reason_external_id`.
      example: CREDIT_ONLY
    CurrentReasonID:
      type: integer
      description: >-
        The dormancy configuration checks whether the current account
        `reason_id` is the same as the current account reason. If they are
        different, the dormancy configuration sets the reason to the value in
        the `reason_id` field.
      example: 13
    Cursor:
      type: string
      description: Cursor pointing to the next page of results
      example: >-
        eyJJRCI6IjBjOGVhMTA4LWNhZTYtNDA2Mi1iMmQzLTFhMTZkNmJiNGIyOCIsIk9yZ0lEIjoiMDllYThhMDQtNWY5My0xMWVkLTliNmEtMDI0MmFjMTIwMDAyIn0=
    CustomFields:
      type: object
      description: >-
        Name-value fields for any account-related data your organization needs
        to store at Pismo. This field can have its values validated against the
        JSON schema stored at the division (referenced by the `division_code`)
        field `schema`.
    CycleClosingTime:
      type: string
      format: time
      description: >-
        The cycle closing datetime indicates at what time the day closes for a
        division. This time follows the timezone configured in division. You can
        find the division timezone using the [Get division by
        code](https://developers.pismo.io/pismo-docs/reference/get-division)
        endpoint.
      pattern: ^(?:([01]?\d|2[0-3]):([0-5]?\d):)?([0-5]?\d)$
      example: '22:00:00'
      maxLength: 8
    CycleConfigValidity:
      type: object
      description: >
        The start and end date/time indicating when the cycle configuration
        becomes valid or invalid.
      properties:
        start:
          type: string
          format: datetime
          description: >-
            The date and time when the configuration becomes valid. Format is
            `yyyy-mm-dd:hr:mm:ss`.
          example: '2023-04-01T22:10:00Z'
        end:
          type: string
          format: datetime
          description: >-
            The date and time when the configuration ends. Format is
            `yyyy-mm-dd:hr:mm:ss`.
          example: '2023-05-01T22:10:00Z'
    CycleEventDelay:
      type: integer
      format: int32
      description: >-
        The cycle event delay is the minutes after `cycle_closing_time` that the
        Account Balance History event should be issued for every account in the
        division.
      example: 15
      minimum: 5
    DebitBalance:
      type: number
      description: Debit balance
      format: float
      example: 123.45
    DebitLegV2ErrorResponse:
      title: DebitLegV2ErrorResponse
      type: object
      allOf:
        - $ref: '#/components/schemas/DebitLegV2Response'
        - type: object
          properties:
            errors:
              type: array
              items:
                $ref: '#/components/schemas/ErrorResponse'
              example: []
    DebitLegV2Request:
      title: DebitLegV2Request
      type: object
      required:
