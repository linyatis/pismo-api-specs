openapi: 3.1.0
info:
  title: Banking - Transaction banking
  version: 0.9.0
  description: Transaction banking API
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io
    description: Sandbox API server for testing
security:
  - BearerAuth: []
tags:
  - name: Hierarchies
    description: Hierarchy-related endpoints
  - name: Divisions
    description: Divisions endpoints
  - name: Accounts
    description: Accounts endpoints
  - name: Bank statements
    description: Bank statements endpoints
  - name: Payments
    description: Payment endpoints
  - name: Earmarking
    description: Earmarking endpoints
  - name: Channels
    description: Channel management endpoints
  - name: Check posting
    description: Check posting endpoints
  - name: Dormancy
    description: Dormancy endpoints
  - name: Transactions
    description: Transaction endpoints
  - name: Bulk payment files
    description: Bulk payment file endpoints
  - name: Bulk settlement
    description: Bulk settlement related endpoints
  - name: Operations blocks
    description: Operations blocks endpoints
  - name: Restricted funds
    description: Restricted funds endpoints
components:
  parameters:
    AuthorizationIdQuery:
      name: authorizationId
      in: query
      description: Authorization ID
      schema:
        type: integer
        format: int64
      required: false
      deprecated: true
      example: 78
    AuthorizationTrackingIdQuery:
      name: authorizationTrackingId
      in: query
      description: Authorization tracking ID
      schema:
        type: string
      required: false
      example: 68ea7e26-e506-11ed-b5ea-0242ac120002
    AuthorizationTypeQuery:
      name: authorizationType
      in: query
      description: Authorization type
      schema:
        type: string
        enum:
          - PLATFORM
          - NETWORK
      required: false
      example: PLATFORM
    BulkIdPath:
      name: bulkId
      in: path
      description: ID of the existing bulk payment file. This ID is client-generated.
      schema:
        type: string
      required: true
      example: b6cdccc4-f6bf-4218-9e5e-7fb8f66008e3
    ChannelPath:
      name: channel
      in: path
      description: Channel code identifier
      schema:
        type: string
        minLength: 1
        maxLength: 20
        pattern: ^[a-zA-Z0-9]+$
      required: true
      example: GDP
    CreditQuery:
      name: credit
      in: query
      description: Show only credit (`true`) or debit (`false`) transactions.
      schema:
        type: boolean
      required: false
      example: true
    CustomerIdQuery:
      name: customerId
      in: query
      description: Customer ID
      schema:
        type: integer
        format: int64
      required: false
      example: 4321
    CursorQuery:
      name: cursor
      in: query
      description: >-
        Cursor to the next page of results. If no value is specified, it fetches
        the first page.
      schema:
        type: string
      example: '1234'
    DivisionCodePath:
      name: divisionCode
      in: path
      description: >-
        Division code registered in the [Create
        division](https://developers.pismo.io/pismo-docs/reference/post-division-v2)
        endpoint.
      schema:
        type: string
        maxLength: 36
        pattern: ^[a-zA-Z0-9-]+$
      required: true
      example: my-division-code
    DormancyConfigIdPath:
      name: dormancyConfigId
      in: path
      description: >-
        Dormancy configuration ID. This is the ID that the Pismo platform
        generates when you use [Create dormancy
        configuration](ref:post-dormancy-config-v2) to set up dormancy.
      schema:
        type: string
      required: true
      example: '1234'
    EarmarkIdPath:
      name: earmarkId
      in: path
      description: >-
        Earmark ID generated by [Create
        earmark](https://developers.pismo.io/pismo-docs/reference/post-corporate-v2-earmarks).
      schema:
        type: string
      required: true
      example: '1234'
    EarmarkBalanceGtQuery:
      name: balanceGt
      in: query
      description: Filters earmarks whose balance exceeds the specified amount.
      schema:
        type: number
        format: float
      required: false
      example: 10.01
    EarmarkBalanceGeQuery:
      name: balanceGe
      in: query
      description: >-
        Filters earmarks with a balance greater than or equal to the specified
        amount.
      schema:
        type: number
        format: float
      required: false
      example: 22.5
    EarmarkBalanceLtQuery:
      name: balanceLt
      in: query
      description: Filters earmarks with a balance less than the specified amount.
      schema:
        type: number
        format: float
      required: false
      example: 15.21
    EarmarkBalanceLeQuery:
      name: balanceLe
      in: query
      description: >-
        Filters earmarks with a balance less than or equal to the specified
        amount.
      schema:
        type: number
        format: float
      required: false
      example: 11.33
    EndDateQuery:
      name: endDate
      in: query
      description: >-
        Ending date of the desired date range for the account balance history.
        If not provided, it defaults to the current date. The total date range
        cannot exceed three years.
      schema:
        type: string
        format: date
      example: '2023-05-03'
    EventDateEndQuery:
      name: eventDateEnd
      in: query
      description: End of event date period. Format = yyyy-mm-dd:hr:mm:ss.
      schema:
        type: string
        format: date-time
      required: false
      example: '2023-04-27T13:00:00Z'
    EventDateStartQuery:
      name: eventDateStart
      in: query
      description: Start of event date period. Format = yyyy-mm-dd:hr:mm:ss.
      schema:
        type: string
        format: date-time
      required: false
      example: '2023-04-27T12:00:00Z'
    ExternalAccountIdPath:
      name: externalAccountId
      in: path
      description: External account ID
      schema:
        type: string
        minLength: 1
        maxLength: 60
      example: '12345678901'
      required: true
    HierarchyIdPath:
      name: hierarchyId
      in: path
      description: Hierarchy ID
      schema:
        type: string
      required: true
      example: '1234'
    HierarchyIdQuery:
      name: hierarchyId
      in: query
      required: false
      description: >-
        Hierarchy ID generated by the [Create
        hierarchy](https://developers.pismo.io/pismo-docs/reference/post-hierarchies)
        endpoint. You only need to provide one of the parameters.
      schema:
        type: string
      example: 1c6ca187-e61f-4301-8dcb-0e9749e89eef
    IDsQuery:
      name: ids
      in: query
      description: Array of transaction IDs
      schema:
        type: array
        items:
          type: integer
          format: int64
        minItems: 1
        maxItems: 100
      required: false
      example:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
    LevelIdQuery:
      name: levelId
      in: query
      required: false
      description: >-
        Level ID generated by the [Create
        hierarchy](https://developers.pismo.io/pismo-docs/reference/post-hierarchies)
        endpoint. You only need to provide one of the parameters.
      schema:
        type: string
      example: 1c6ca187-e61f-4301-8dcb-0e9749e89eef
    LimitQuery:
      name: limit
      in: query
      description: Maximum number of items per page. Defaults to `10`.
      schema:
        type: integer
        format: int32
        default: 10
        maximum: 20
      example: 20
    LimitQuery2:
      name: limit
      in: query
      description: Maximum number of items per page. Defaults to `100`. Maximum is `500`.
      schema:
        type: integer
        format: int32
        default: 100
        maximum: 500
      example: 500
    LimitQuery3:
      name: limit
      in: query
      description: Maximum number of items per page. Defaults to `10`.
      schema:
        type: integer
        format: int32
        default: 10
        maximum: 100
      required: false
      example: 100
    LimitQuery4:
      name: limit
      in: query
      description: Maximum number of items per page. Defaults to `10`.
      schema:
        type: integer
        format: int32
        default: 10
      example: 20
    MaxItemsParamQuery:
      name: maxItems
      in: query
      description: Number of items on current page
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
      example: 100
    MultilegIdPath:
      name: multilegId
      in: path
      description: Multileg ID provided when the multileg payment is created.
      schema:
        type: string
        minLength: 1
        maxLength: 43
      required: true
      example: 0a50c88a-ade8-4bcc-a639-9a0b0f11e245
    NextCursorParamQuery:
      name: nextCursor
      in: query
      description: Cursor value used to get the next page
      required: false
      schema:
        type: string
      example: >-
        MEgCQQCo9+BpMRYQ/dL3DS2CyJxRF+j6ctbT3/Qp84+KeFhnii7NT7fELilKUSnxS30WAvQCCo2yU1orfgqr41mM70MBAgMBAAE=
    numberOfLatestTransactionsQuery:
      name: numberOfLatestTransactions
      in: query
      description: >-
        Number of latest transactions. Get the latest transactions based on the
        date specified in the `event_date` field. Note that this filter
        overwrites page filters and doesn't allow any other filters.
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 500
      example: 10
    OffsetQuery:
      name: offset
      in: query
      description: Starting point for the results list. Default is `0`.
      required: false
      schema:
        type: integer
        format: int32
        default: 0
        minimum: 0
      example: 1
    OperationsBlockV1IDPath:
      name: operationsBlockId
      in: path
      description: Operations block ID
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 99999999999
      example: 15
      required: true
    OperationsBlockV2IDPath:
      name: operationsBlockId
      in: path
      description: Operations block ID
      schema:
        type: string
        format: uuid
      example: e4adf199-c925-4d11-b002-c5bfd5679030
      required: true
    OrderQuery:
      name: order
      in: query
      description: >-
        Order of the result list. The results are always ordered by transaction
        date. This param indicates whether the order is ascending ('asc') or
        descending ('desc').
      schema:
        type: string
        enum:
          - asc
          - desc
      required: false
      example: asc
    PaymentIdMethodQuery:
      name: paymentMethodId
      in: query
      description: Payment method ID
      schema:
        type: string
      required: false
      example: MASTERCARD
    PaymentTypeQuery:
      name: type
      in: query
      description: Determines the type of operation for the listed scheduled payments.
      required: false
      schema:
        type: string
        enum:
          - CREDIT
          - DEBIT
          - TRANSFER
        default: DEBIT
      example: CREDIT
    PerPageMax100Query:
      name: perPage
      in: query
      description: Items per page
      required: false
      deprecated: true
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
      example: 100
    ProcessingCodeQuery:
      name: processingCode
      in: query
      description: Processing code used to create the transaction
      schema:
        type: string
      required: false
      example: '219248'
    PublicKeyIdPath:
      name: id
      in: path
      description: ID of the public key
      example: b6cdccc4-f6bf-4218-9e5e-7fb8f66008e3
      schema:
        type: string
      required: true
    ReasonNameQuery:
      name: name
      in: query
      description: Filter by reason name
      required: false
      schema:
        type: string
      example: Unblocked
    RequestedPageQuery:
      name: page
      in: query
      description: Requested page
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
      example: 1
    RestrictedFundsIDPath:
      name: restrictedFundsId
      in: path
      description: Restricted Funds ID
      schema:
        type: string
        format: uuid
      example: e4adf199-c925-4d11-b002-c5bfd5679030
      required: true
    ScheduledPaymentIdPath:
      name: scheduledPaymentId
      in: path
      description: Scheduled payment ID
      schema:
        type: string
      required: true
      example: '1234'
    ShowPreviousQuery:
      name: showPrevious
      in: query
      description: >-
        If `true`, returns the previous account balances history configurations
        by division code. Default is `false`.
      required: false
      example: true
      schema:
        type: boolean
        default: false
    ShowPreviousQuery2:
      name: showPrevious
      in: query
      description: >
        If `true`, returns the previous dormancy configurations.

        For example, if you use [Update dormancy
        configuration](ref:patch-dormancy-config) to update an existing dormancy
        configuration, specifying `true` in this field returns both the current
        dormancy configuration and the previous ones.<br>

        There is no limit to how many previous dormancy configurations can be
        returned.
      example: true
      schema:
        type: boolean
        default: false
    StartDateQuery:
      name: startDate
      in: query
      description: >-
        Starting date of the desired date range for the account balance history.
        If not provided, it defaults to one month prior to the end date. The
        total date range cannot exceed three years.
      schema:
        type: string
        format: date
      example: '2023-04-03'
    StatementIdQuery:
      name: statementId
      in: query
      description: Statement ID
      schema:
        type: integer
        format: int64
      required: false
      example: 1234
    StatementPostQuery:
      name: statementPost
      in: query
      description: Filter transactions posted to the statement.
      schema:
        type: boolean
      required: false
      example: true
    StateQuery:
      name: state
      in: query
      description: Filter by `ACTIVE` or `INACTIVE`. Default is `ACTIVE``.
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
      example:
        - INACTIVE
    TrackingIdPath:
      name: trackingId
      in: path
      description: Original tracking ID provided when the ID is created.
      schema:
        type: string
        minLength: 1
        maxLength: 43
      required: true
      example: 0a50c88a-ade8-4bcc-a639-9a0b0f11e245
    TrackingIdPath2:
      name: trackingId
      in: path
      description: Original tracking ID provided when the float payment is created.
      schema:
        type: string
      required: true
      example: 0a50c88a-ade8-4bcc-a639-9a0b0f11e245
    TransacationIDPath:
      name: transactionId
      in: path
      description: Transaction ID
      example: 313123
      schema:
        type: integer
      required: true
    TransactionTypeIdQuery:
      name: transactionTypeId
      in: query
      description: Transaction type ID
      schema:
        type: integer
        format: int64
      required: false
      example: 5678
    TargetTypeQuery:
      name: targetType
      in: query
      description: >-
        Type of dormancy configuration to list. If you don't specify a type, all
        types are listed.
      schema:
        type: string
        enum:
          - DIVISION
          - PROGRAM
      required: false
      example: DIVISION
    UserCategoryQuery:
      name: userCategory
      in: query
      description: User category
      schema:
        type: string
      required: false
      example: RETAIL
    CheckIDPath:
      name: checkId
      in: path
      description: Check ID
      schema:
        type: string
      required: true
      example: c462b2f3-55cc-42b4-ae9a-7614df3e8e72
  schemas:
    AccountBalanceHistoryResponse:
      type: object
      properties:
        account_id:
          $ref: '#/components/schemas/AccountID'
        external_account_id:
          $ref: '#/components/schemas/ExternalAccountID'
        currency_numeric_code:
          $ref: '#/components/schemas/AccountNumericCurrencyCode'
        currency_alphabetic_code:
          $ref: '#/components/schemas/AccountAlphabeticCurrencyCode'
        balance_history:
          type: array
          items:
            type: object
            allOf:
              - $ref: '#/components/schemas/AccountBalanceMainAttributes'
              - type: object
                properties:
                  date:
                    $ref: '#/components/schemas/CurrentBalanceDate'
                  business_date:
                    $ref: '#/components/schemas/BusinessDate'
                  credit_movement:
                    $ref: '#/components/schemas/CreditMovement'
                  debit_movement:
                    $ref: '#/components/schemas/DebitMovement'
                  net_movement:
                    $ref: '#/components/schemas/NetMovement'
        pagination:
          $ref: '#/components/schemas/Pagination'
    AccountBalanceMainAttributes:
      type: object
      required:
        - future_dated_credits_balance
        - future_dated_debits_balance
      properties:
        future_dated_credits_balance:
          $ref: '#/components/schemas/FutureDatedCreditsBalance'
        future_dated_debits_balance:
          $ref: '#/components/schemas/FutureDatedDebitsBalance'
        ledger_balance:
          $ref: '#/components/schemas/LedgerBalance'
        book_balance:
          $ref: '#/components/schemas/BookBalance'
        available_balance:
          $ref: '#/components/schemas/AvailableBalance'
        credit_balance:
          $ref: '#/components/schemas/CreditBalance'
        debit_balance:
          $ref: '#/components/schemas/DebitBalance'
        uncleared_funds:
          $ref: '#/components/schemas/UnclearedFunds'
        uncleared_checks_balance:
          $ref: '#/components/schemas/UnclearedChecksBalance'
        restricted_funds:
          $ref: '#/components/schemas/RestrictedFundsBalance'
        earmarked_balance:
          $ref: '#/components/schemas/EarmarkBalance'
        overdraft_limit:
          $ref: '#/components/schemas/OverdraftLimit'
        value_dated_balance:
          $ref: '#/components/schemas/ValueDatedBalance'
        held_funds:
          $ref: '#/components/schemas/HeldFunds'
        held_checks_balance:
          $ref: '#/components/schemas/HeldChecksBalance'
        remunerative_interest_accrued:
          $ref: '#/components/schemas/RemunerativeInterestAccrued'
    AccountBalanceResponse:
      allOf:
        - type: object
          required:
            - future_dated_credits_balance
            - future_dated_debits_balance
          properties:
            future_dated_credits_balance:
              $ref: '#/components/schemas/FutureDatedCreditsBalance'
            future_dated_debits_balance:
              $ref: '#/components/schemas/FutureDatedDebitsBalance'
            account_id:
              $ref: '#/components/schemas/AccountID'
            external_account_id:
              $ref: '#/components/schemas/ExternalAccountID'
            program_id:
              $ref: '#/components/schemas/ProgramID3'
            currency_numeric_code:
              $ref: '#/components/schemas/AccountNumericCurrencyCode'
            currency_alphabetic_code:
              $ref: '#/components/schemas/AccountAlphabeticCurrencyCode'
        - $ref: '#/components/schemas/AccountBalanceMainAttributes'
    AccountCreateDatetime:
      type: string
      format: date-time
      description: >
        The datetime the account was created (in UTC). The datetime format
        follows the ISO 8601 standard: `yyyy-mm-ddThh:mm:ss.sssZ`.<br>

        `minLength: 24`

        `maxLength: 24`
      minLength: 24
      maxLength: 24
      example: '2025-02-01T22:07:58.000Z'
    AccountCreationDatetime:
      type: string
      format: date-time
      description: >
        Datetime the account was created in the Pismo system (in UTC). The
        datetime format follows the ISO 8601 standard:
        `yyyy-mm-ddThh:mm:ss.sssZ`.<br>

        Note that milliseconds are represented as `000`, for example:
        `2024-02-22T16:51:49.000Z`.<br>

        This field accepts datetime values from the present or past. Future
        dates are not allowed.<br>

        `minLength: 24`

        `maxLength: 24`
      minLength: 24
      maxLength: 24
      example: '2024-01-04T10:25:30.123Z'
    AccountID:
      type: integer
      format: int64
      description: Account ID
      example: 1234
    AccountID2:
      type: integer
      format: int64
      minimum: 1
      maximum: 4294967295
      description: |
        Account ID<br>
        `minimum: 1`
        `maximum: 4294967295`
      example: 102778
    AccountID3:
      type: integer
      format: int64
      description: >
        Account ID generated by [Create Corporate
        Account](https://developers.pismo.io/pismo-docs/reference/post-account).<br>

        `minimum: 1`

        `maximum: 4294967295`
      example: 102701621
    AccountStatus:
      type: string
      minLength: 1
      maxLength: 9
      description: |
        Account status<br>
        `minLength: 1`
        `maxLength: 9`
      example: DORMANT
    AccountStatusReasonDescription:
      type: string
      minLength: 1
      maxLength: 500
      description: |
        Account status reason description<br>
        `minLength: 1`
        `maxLength: 500`
      example: CREDIT_ONLY
    AccountStatusReasonID:
      type: integer
      format: int64
      minimum: 1
      maximum: 4294967295
      description: |
        Account status reason ID<br>
        `minimum: 1`
        `maximum: 4294967295`
      example: 1438
    AccountStatusReasonExternalID:
      type: string
      minLength: 1
      maximum: 120
      description: |
        External reason ID specifying account restrictions<br>
        `minimum: 1`
        `maximum: 120`
      example: CREDIT_ONLY
    AdministrativeDivisionID:
      type: integer
      format: int64
      description: >-
        Administrative division ID. Specifying an administrative division ID in
        this field links your division to it. This is useful when you want to
        use the holidays defined in that administrative division.
      example: 13
    AllowedOperations:
      type: array
      description: >
        List of operations allowed to bypass the block enforcement logic.<br>

        - `EARMARK_RELEASE`: Release an earmark even when an operation block is
        active.

        - `EARMARK_UPDATE`: Update an earmark (set amount, increase, or
        decrease) while the account is blocked by an operation block.

        - `PAYMENT_DEBIT`: Execute a debit transaction while the account is
        blocked by an operation block.

        - `PAYMENT_CREDIT`: Execute a credit transaction while the account is
        blocked by an operation block.

        - `PAYMENT_CONFIRM`: Confirm a value transaction while the account is
        blocked by an operation block.

        - `PAYMENT_CANCEL`: Cancel an existing transaction while the account is
        blocked by an operation block.

        - `ACCOUNT_STATUS_UPDATE`: Change the account status and the associated
        status reason.

        - `CHECK_POST`: Post a check while the account is blocked by an
        operation block.

        - `CHECK_RELEASE`: Release an uncleared check or operation while the
        account is blocked by an operation block.

        - `CHECK_CANCEL`: Cancel an existing check while the account is blocked
        by an operation block.

        - `RESTRICTED_FUNDS_CREATE`: Hold a specified amount by transferring it
        from the available balance to restricted funds.

        - `RESTRICTED_FUNDS_RELEASE`: Release restricted funds from hold. This
        transfers funds from restricted funds back to available balance.
      items:
        $ref: '#/components/schemas/OperationsBlocksOperation'
      example:
        - EARMARK_CREATE
    Amount:
      type: object
      description: Amount
      properties:
        value:
          $ref: '#/components/schemas/AmountValue'
        currency:
          $ref: '#/components/schemas/Currency'
      required:
        - value
    AmountValue:
      type: number
      format: float
      description: Amount value
      exclusiveMinimum: 0
      maximum: 100000000000000000
      example: 1000.52
    ApplicantName:
      type: string
      description: Applicant name
      maxLength: 60
      example: Chester Fields
    Authorization:
      type: object
      description: Authorization
      properties:
        id:
          $ref: '#/components/schemas/AuthorizationID'
        type:
          $ref: '#/components/schemas/AuthorizationType'
        code:
          $ref: '#/components/schemas/AuthorizationCode'
        payment_method_id:
          $ref: '#/components/schemas/PaymentMethod'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
    AuthorizationCode:
      type: string
      description: Authorization code or network approval code
      example: '1234'
    AuthorizationID:
      type: integer
      format: int64
      description: Authorization ID
      example: 5678
    AuthorizationStatus:
      type: string
      enum:
        - APPROVED
        - DECLINED
      description: Authorization status
      example: DECLINED
    AuthorizationType:
      type: string
      enum:
        - PLATFORM
        - NETWORK
      description: Authorization type
      example: PLATFORM
    AvailableBalance:
      type: number
      format: float
      minimum: -9223372036854776000
      maximum: 9223372036854776000
      description: >
        Available balance.<br>

        Available balance is calculated as `credit_balance` - `debit_balance` +
        `overdraft_limit`.

        `minimum: -9223372036854775807`

        `maximum: 9223372036854775807`
      example: 123.45
    BookBalance:
      type: number
      format: float
      minimum: -9223372036854776000
      maximum: 9223372036854776000
      description: >
        Book balance.<br>

        Book balance is calculated as `credit_balance` - `debit_balance` +
        `earmarked_balance`.

        `minimum: -9223372036854775807`

        `maximum: 9223372036854775807`
      example: 146.9
    BulkID:
      type: string
      description: Bulk settlement request ID provided by the requester.
      maximum: 60
      pattern: ^[a-zA-Z0-9-]+$
      example: 0a50c88a-ade8-4bcc-a639-9a0b0f11e244
    BulkSettlementRequest:
      description: Bulk settlement request
      type: object
      required:
        - operation_type
        - settlement_date
        - division_code
        - bulk_id
      properties:
        operation_type:
          $ref: '#/components/schemas/OperationType'
        settlement_date:
          $ref: '#/components/schemas/SettlementDate'
        division_code:
          $ref: '#/components/schemas/DivisionCode2'
        bulk_id:
          $ref: '#/components/schemas/BulkID'
    BusinessDate:
      type: string
      format: date
      description: >
        Specifying a `business_date` value impacts the account balance
        history.<br>

        <b>Notes</b>:
          - The business date is in ISO 8601 format.
          - The business date allows users to designate the balance history cycle in which a payment is posted.
          - You can specify a `business_date` within the current working day or up to one working day before or after.
      example: '2023-03-09'
    BackBusinessToggleRequest:
      title: BackBusinessToggleRequest
      type: object
      required:
        - division_code
        - business_date
        - enabled
      properties:
        division_code:
          type: string
          description: >-
            The division code registered in the [Create
            division](https://developers.pismo.io/pismo-docs/reference/post-division-v2)
            endpoint for which payments are enabled or disabled. It must comply
            with the rule `^[a-zA-Z0-9-]+$`.
          maximum: 36
          pattern: ^[a-zA-Z0-9-]+$
          example: my-division-code
        business_date:
          type: string
          format: date
          description: |
            The business date on which payments will be disabled or enabled.<br>
            <b>Notes</b>:
              - The business date is in ISO 8601 format.
              - Users are restricted to specifying a `business_date` that is within a past business cycle.
              - Setting a `business_date` that falls within the current or a future business cycle returns a `400` error.
          example: '2023-03-09'
        enabled:
          type: boolean
          description: >-
            Indicates whether the payments are enabled or disabled. When set to
            `true`, payments within a division and business date are allowed.
            When set to `false`, payment requests are not allowed.
          example: true
        channels:
          type: array
          description: List of channels that may bypass the cutoff when `enabled=false`
          items:
            $ref: '#/components/schemas/ChannelCode'
          example:
            - GCE
            - GDP
    CancelEarmarkMetadata:
      type: object
      description: >-
        Key-value pairs containing data intended for storage in the Pismo
        system.
    CancelEarmarkRequest:
      type: object
      properties:
        internal_operation:
          $ref: '#/components/schemas/InternalOperation2'
      required:
        - internal_operation
    CancellationMethod:
      type: string
      enum:
        - INSTANT
        - ORIGINAL_DATES
      description: >
        Define the cancellation method used to determine which dates the
        cancellation will impact the account balance.


        <br>

        - `INSTANT` (default): Cancels the payment using the current business
        date.

        - `ORIGINAL_DATES`: Cancels the payment using the original payment
        dates.
      default: INSTANT
      example: INSTANT
