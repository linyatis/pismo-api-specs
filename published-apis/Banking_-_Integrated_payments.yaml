        In Brazil, bank slips, known as *Boleto Bancarios* or simply *Boletos*
        in Portuguese, are a popular payment method for various services, bills,
        and purchases. When a payment needs to be made, the recipient (such as a
        business or service provider) generates a Boleto with the necessary
        payment details, such as the recipent's information, the payment amount,
        due date, barcode, and other relevant information.

        Pismo works with [BTG Pactual](https://www.btgpactual.us),
        [Celcoin](https://celcoin.com.br), and [Itaú](https://www.itau.com.br)
        to implement Boleto payments. In the future, Pismo may work with
        additional financial companies.

        This endpoint generates the following events: 

        * [Authorization
        created](https://developers.pismo.io/events/docs/authorization-authorization-event-1)
        - This event contains bank slip information (beneficiary name and
        document number, digitable line, amount, payment date, interest/fine and
        discount (if any) in the `metadata` field.

        * [Financial bank slip status
        changed](https://developers.pismo.io/events/docs/integrated-payments-bankslip-status-change-1)
        - Before clearing, a bank slip's status is `PAID`. After clearing, Pismo
        changes its status to `SETTLED`.

        * [Integrated payments financial
        reconciliation](https://developers.pismo.io/events/docs/integrated-payments-financial-reconciliation-1)-
        This event is generated after the transaction has been cleared and
        accounts debited or credited. If `x-skip-reconciliation` is `true` or
        the provider is JD Consultores, this event is not generated.<br>

        See [Bank slips](doc:bank-slips) for more information.<br>

        **Important**: You need to call [Validate bank
        slip](ref:post-integrated-payments-api-v1-bankslips-validate) before
        calling this endpoint and pass the `external_authorization` field value
        if it is returned from that call here. 
      operationId: post-integrated-payments-api-v1-bankslips-pay
      parameters:
        - $ref: '#/components/parameters/authorizationHeader'
        - $ref: '#/components/parameters/idempotencyKeyHeader'
      requestBody:
