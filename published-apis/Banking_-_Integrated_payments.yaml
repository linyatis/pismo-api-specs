paths:
  /v1/bankslips-issue:
    post:
      tags:
        - Bank slip issuance
      operationId: post-integrated-payments-api-v1-bankslips-issue
      summary: Issue bank slip
      description: >
        Create a bank slip and issue it to the provider. See [Bank
        slips](doc:bank-slips) for more information.<br>

        This endpoint generates the [Bank slip issuance
        registered](https://developers.pismo.io/events/docs/integrated-payments-bankslip-issue-register-1)
        event.
      parameters:
        - $ref: '#/components/parameters/idempotencyKeyHeader'
      requestBody:
        description: Request Body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bankslips_issue.IssueRequest'
        required: true
      responses:
        '202':
          description: Accepted
          headers:
            x-cid:
              description: Request tracking ID.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/bankslips_issue.IssueResponse'
        '400':
          description: Bad Request
          headers:
            x-cid:
              description: Request tracking ID.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EIP0010:
                  summary: Unmarshal error
                  value:
                    code: EIP0010
                    message: Unmarshal error
                EIP0012:
                  summary: Account not found
                  value:
                    code: EIP0012
                    message: Account not found
                EIP0016:
                  summary: IntlBankAccounts - API Account not found
                  value:
                    code: EIP0016
                    message: IntlBankAccounts - API Account not found
                EIP0017:
                  summary: IntlBankAccounts - API returned 4xx error
                  value:
                    code: EIP0017
                    message: IntlBankAccounts - API returned 4xx error
                EIP0023:
                  summary: BankingGatewayAPI - API returned 4xx error
                  value:
                    code: EIP0023
                    message: BankingGatewayAPI - API returned 4xx error
        '403':
          description: Forbidden
          headers:
            x-cid:
              description: Request tracking ID.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EIP0005:
                  summary: Missing required header x-tenant
                  value:
                    code: EIP0005
                    message: Missing required header {x-tenant}
                EIP0006:
                  summary: Invalid account ID header x-account-id
                  value:
                    code: EIP0006
                    message: Invalid account ID header {x-account-id}
                EIP0009:
                  summary: Missing required header x-idempotency-key
                  value:
                    code: EIP0005
                    message: Missing required header {x-idempotency-key}
                EIP0029:
                  summary: Account blocked or canceled
                  value:
                    code: EIP0029
                    message: Account blocked or canceled
        '409':
          description: Conflict
          headers:
            x-cid:
              description: Request tracking ID.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EIP0065:
                  summary: BankingGatewayAPI returned 409 provider error
                  value:
                    code: EIP0029
                    message: BankingGatewayAPI returned 409 provider error
        '500':
          description: Internal Server Error
          headers:
            x-cid:
              description: Request tracking ID.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EIP0015:
                  summary: IntlBankAccounts - API timeout error
                  value:
                    code: EIP0015
                    message: IntlBankAccounts - API timeout error
                EIP0014:
                  summary: Accounts - API returned 5xx error
                  value:
                    code: EIP0014
                    message: Accounts - API returned 5xx error
                EIP0007:
                  summary: Internal error
                  value:
                    code: EIP0007
                    message: Internal error
                EIP0004:
                  summary: HTTP request error
                  value:
                    code: EIP0004
                    message: HTTP request error
                EIP0011:
                  summary: Accounts API timeout error
                  value:
                    code: EIP0011
                    message: Accounts API timeout error
                EIP0028:
                  summary: Transaction database error
                  value:
                    code: EIP0028
                    message: Transaction database error
                EIP0022:
                  summary: BankingGatewayAPI - API timeout error
                  value:
                    code: EIP0022
                    message: BankingGatewayAPI - API timeout error
        '502':
          description: Bad Gateway
          headers:
            x-cid:
              description: Request tracking ID.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EIP0018:
                  summary: IntlBankAccounts - API returned 5xx error
                  value:
                    code: EIP0018
                    message: IntlBankAccounts - API returned 5xx error
                EIP0024:
                  summary: BankingGatewayAPI - API returned 5xx error
                  value:
                    code: EIP0024
                    message: BankingGatewayAPI - API returned 5xx error
