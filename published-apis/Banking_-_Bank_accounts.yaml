        money transfers between banks and financial institutions. Its similar to
        a routing number in the US. It is a six-digit number that identifies
        both the bank and the specific branch. Each bank and branch has its own
        unique sort code. The first two digits identity the bank and the
        remaining 4 digits identify the branch.
