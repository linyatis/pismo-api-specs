openapi: 3.0.0
info:
  title: Card issuing - Visa Flexible Credentials [beta]
  description: Visa Flexible Credentials endpoints.
  version: 1.0.0
  contact:
    email: support@pismo.com.br
    name: API Support
    url: https://developers.pismo.io/support
  license:
    name: Copyright Pismo
    url: https://developers.pismo.io/licenses
  termsOfService: https://developers.pismo.io/terms
servers:
  - url: https://sandbox.pismolabs.io
    description: Sandbox API server for testing
tags:
  - name: Enrollment
    description: Card enrollment and management endpoints.
  - name: Relationships
    description: >-
      Creation and management of relationship between primary and secondary
      cards.
  - name: Rules
    description: >-
      Creation and management of rules to be applied during transactions using
      VFC credentials.
components:
  parameters:
    accessTokenHeader:
      name: access_token
      in: header
      required: true
      schema:
        type: string
      description: >-
        Access token. Tokens can expire quickly, which can result in a **401
        Unauthorized** error.
    CardIDpath:
      name: cardId
      in: path
      schema:
        type: string
      description: Card ID
      required: true
    RuleIDpath:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
      description: Rule ID
  schemas:
    CardID:
      type: integer
      format: int64
      description: Enrolled card ID
      example: 6743052
    CardID2:
      type: integer
      format: int64
      description: ID of card to create relationship for
      example: 6743052
    CardID3:
      type: integer
      format: int64
      description: Primary card ID
      example: 6743052
    CardID4:
      type: integer
      format: int64
      description: Secondary card ID
      example: 6743052
    CardID5:
      type: integer
      format: int64
      description: ID of card the rule applies to
      example: 6743052
    CardholderBillAmount:
      type: object
      required:
        - maxAmount
      properties:
        maxAmount:
          $ref: '#/components/schemas/MaxTransAmountAllowed'
        minAmount:
          $ref: '#/components/schemas/MinTransAmountAllowed'
    ControlType:
      type: string
      enum:
        - TCT_E_COMMERCE
      description: |
        Transaction control type: 
          * `TCT_E_COMMERCE`&mdash; E-commerce transaction control
      example: TCT_E_COMMERCE
    ControlType2:
      type: string
      enum:
        - TCT_GLOBAL
        - TCT_ATM_WITHDRAW
        - TCT_AUTO_PAY
        - TCT_BRICK_AND_MORTAR
        - TCT_CROSS_BORDER
        - TCT_E_COMMERCE
        - TCT_CONTACTLESS
        - MCT_ADULT_ENTERTAINMENT
        - MCT_AIRFARE
        - MCT_ALCOHOL
        - MCT_APPAREL_AND_ACCESSORIES
        - MCT_AUTOMOTIVE
        - MCT_CAR_RENTAL
        - MCT_ELECTRONICS
        - MCT_SPORT_AND_RECREATION
        - MCT_GAMBLING
        - MCT_GAS_AND_PETROLEUM
        - MCT_GROCERY
        - MCT_HOTEL_AND_LODGING
        - MCT_HOUSEHOLD
        - MCT_PERSONAL_CARE
        - MCT_SMOKE_AND_TOBACCO
        - MCT_DINING
      description: >
        Transaction control type: 

        * `TCT_GLOBAL`&mdash; Transaction control type (TCT) global

        * `TCT_ATM_WITHDRAW`&mdash; TCT ATM withdrawal

        * `TCT_AUTO_PAY`&mdash; TCT autopay

        * `TCT_BRICK_AND_MORTAR`&mdash; TCT brick and mortar

        * `TCT_CROSS_BORDER`&mdash; TCT cross border

        * `TCT_E_COMMERCE`&mdash; TCT e-commerce

        * `TCT_CONTACTLESS`&mdash; TCT contactless card

        * `MCT_ADULT_ENTERTAINMENT`&mdash; Merchant category type (MCT) adult
        entertainment

        * `MCT_AIRFARE`&mdash; MCT airfare

        * `MCT_ALCOHOL`&mdash; MCT alcohol

        * `MCT_APPAREL_AND_ACCESSORIES`&mdash; MCT apparel and accessories

        * `MCT_AUTOMOTIVE`&mdash; MCT automotive

        * `MCT_CAR_RENTAL`&mdash; MCT car rental

        * `MCT_ELECTRONICS`&mdash; MCT electronics

        * `MCT_SPORT_AND_RECREATION`&mdash; MCT sport and recreation

        * `MCT_GAMBLING`&mdash; MCT gambling

        * `MCT_GAS_AND_PETROLEUM`&mdash; MCT gas and petroleum

        * `MCT_GROCERY`&mdash; MCT grocery

        * `MCT_HOTEL_AND_LODGING`&mdash; MCT hotel and lodging 

        * `MCT_HOUSEHOLD`&mdash; MCT household

        * `MCT_PERSONAL_CARE`&mdash; MCT personal car

        * `MCT_SMOKE_AND_TOBACCO`&mdash; MCT smoke and tobacco 

        * `MCT_DINING`mdash; MCT dining
      example: TCT_AUTO_PAY
    DocumentId:
      type: string
      description: Enrollment document ID. UUID from Visa that identifies card in VFC.
      example: v-301-923113d1-c87e-460f-a504-9eb7999163ff
    EndTimeRuleValidity:
      type: string
      format: date-time
      description: End time for rule validity. RFC 3339 format.
      example: '2025-05-13T23:30:52.123Z'
    ErrorObject:
      type: object
      description: Standard error object
      properties:
        error_code:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
    ExistingCardId:
      type: integer
      format: int64
      description: Existing card ID with enrollment
      example: 186248443
    IsFallback:
      type: boolean
      description: Is this the fallback card? Only one card can be a fallback card.
      example: false
    MaxTransAmountAllowed:
      type: number
      format: float
      description: Maximum transaction amount allowed
      example: 20.5
    MinTransAmountAllowed:
      type: number
      format: float
      description: Minimum transaction amount allowed
      example: 10.5
    NewCardID:
      type: integer
      format: int64
      description: The new card ID to update enrollment for
      example: 186283624
    EnrollmentResponse:
      type: object
      description: Response object for card enrollment creation
      required:
        - card_id
        - document_id
      properties:
        card_id:
          $ref: '#/components/schemas/CardID'
        document_id:
          $ref: '#/components/schemas/DocumentId'
    RelationshipCardRequest:
      type: object
      required:
        - cards
      properties:
        cards:
          type: array
          items:
            type: object
            required:
              - cardID
              - roleType
              - isFallback
            properties:
              cardID:
                $ref: '#/components/schemas/CardID2'
              roleType:
                $ref: '#/components/schemas/RoleType'
              isFallback:
                $ref: '#/components/schemas/IsFallback'
    RelationshipResponse:
      type: object
      required:
        - cardID
        - cards
      properties:
        cardID:
          $ref: '#/components/schemas/CardID3'
        cards:
          type: array
          items:
            type: object
            required:
              - cardID
              - roleType
              - isFallback
            properties:
              cardID:
                $ref: '#/components/schemas/CardID4'
              roleType:
                $ref: '#/components/schemas/RoleType'
              isFallback:
                $ref: '#/components/schemas/IsFallback'
    RoleType:
      type: string
      enum:
        - SECONDARY_DEBIT
        - SECONDARY_CREDIT
        - SECONDARY_LOC
        - SECONDARY_INSTALLMENT
        - SECONDARY_PREPAID
      description: |
        Card role type: 
        * `SECONDARY_DEBIT`&mdash;Debit card

        * `SECONDARY_CREDIT`&mdash;Credit card

        * `SECONDARY_LOC`&mdash;Secondary/fallback funding source

        * `SECONDARY_INSTALLMENT`&mdash;Installment plan

        * `SECONDARY_PREPAID`&mdash;Prepaid card
      example: SECONDARY_INSTALLMENT
    Rule:
      type: object
      required:
        - cardId
        - rulePriority
        - scope
        - definedBy
        - ruleId
      properties:
        cardId:
          $ref: '#/components/schemas/CardID5'
        rulePriority:
          $ref: '#/components/schemas/RulePriority'
        scope:
          $ref: '#/components/schemas/RuleScope2'
        definedBy:
          $ref: '#/components/schemas/RuleDefinedBy'
        ruleId:
          $ref: '#/components/schemas/RuleID'
    Rule2:
      type: object
      required:
        - cardId
        - name
        - rulePriority
        - scope
      properties:
        cardId:
          $ref: '#/components/schemas/CardID5'
        name:
          $ref: '#/components/schemas/RuleName'
        rulePriority:
          $ref: '#/components/schemas/RulePriority'
        scope:
          $ref: '#/components/schemas/RuleScope'
    RuleDefinedBy:
      type: string
      enum:
        - CARDHOLDER
        - ISSUER
      description: Entity that defined the rule
      example: CARDHOLDER
    RuleID:
      type: string
      description: Rule ID
      example: v-301-b0c3dfae-0dd7-40b6-9272-5fa466804a8a
    RuleName:
      type: string
      description: Rule name
      example: My Debit Card
    RulePriority:
      type: integer
      description: Rule priority, `1` being the highest.
      minimum: 1
      example: 1
    RuleScope:
      type: object
      required:
        - controlType
        - cardHolderBillAmount
        - timeRange
      properties:
        controlType:
          $ref: '#/components/schemas/ControlType'
        cardHolderBillAmount:
          $ref: '#/components/schemas/CardholderBillAmount'
        timeRange:
          $ref: '#/components/schemas/RuleValidityTimeRange'
    RuleScope2:
      type: object
      required:
        - controlType
        - cardHolderBillAmount
        - timeRange
      properties:
        controlType:
          $ref: '#/components/schemas/ControlType2'
        cardHolderBillAmount:
          $ref: '#/components/schemas/CardholderBillAmount'
        timeRange:
          $ref: '#/components/schemas/RuleValidityTimeRange'
    RulesRequest:
      type: object
      required:
        - rules
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/Rule2'
    RulesResponse:
      type: object
      required:
        - cardId
        - rules
      properties:
        cardId:
          $ref: '#/components/schemas/CardID3'
        rules:
          type: array
          items:
            $ref: '#/components/schemas/Rule'
    RuleValidityTimeRange:
      type: object
      required:
        - startTime
        - endTime
      properties:
        startTime:
          $ref: '#/components/schemas/StartTimeRuleValidity'
        endTime:
          $ref: '#/components/schemas/EndTimeRuleValidity'
    StartTimeRuleValidity:
      type: string
      format: date-time
      description: Start time for rule validity. RFC 3339 format.
      example: '2025-05-13T23:30:52.123Z'
    UpdateEnrollmentRequest:
      type: object
      required:
        - newCardId
        - existingCardId
      properties:
        newCardId:
          $ref: '#/components/schemas/NewCardID'
        existingCardId:
          $ref: '#/components/schemas/ExistingCardId'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Account token - token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a "**401 Unauthorized**" error.
      bearerFormat: JWT
  responses:
    400BadRequestWithoutErrorCode:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorObject'
          examples:
            example-1:
              value:
                message: Card profile can't be null
    400BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorObject'
          example:
            error_code: ERR9993
            message: card not found
    401Unauthorized:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorObject'
          example:
            error_code: ERR9786
            message: Access token is missing or invalid
    404NotFound:
      description: Token not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorObject'
          example:
            error_code: ERR4133
            message: Token not found
    500InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorObject'
          example:
            error_code: ERR5446
            message: Internal server error
    500InternalServerErrorWithoutErrorCode:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorObject'
          examples:
            example-1:
              value:
                message: Internal server error
security:
  - BearerAuth: []
paths:
  /v1/vfc/enrollment/cards/{cardId}:
    parameters:
      - $ref: '#/components/parameters/accessTokenHeader'
      - $ref: '#/components/parameters/CardIDpath'
    post:
      summary: Enroll card in VFC
      description: >
        Enrolls/registers a card in Visa Flexible Credentials (VFC).


        VFC enables a single card to access multiple funding sources, such as
        debit, credit, prepaid, and installment plans.


        For more information, refer to [Visa Flexible
        Credentials](doc:visa-flexible-credentials).
      operationId: enroll-card-enrollment
      tags:
        - Enrollment
      parameters:
        - $ref: '#/components/parameters/CardIDpath'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
              example:
                card_id: 186283623
                document_id: v-301-923113d1-c87e-460f-a504-9eb7999163ff
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: Get card enrollment
      description: |
        Get VFC card enrolled/registered credentials.
      operationId: get-card-enrollment
      tags:
        - Enrollment
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
              example:
                card_id: 186283623
                document_id: v-301-923113d1-c87e-460f-a504-9eb7999163ff
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    delete:
      summary: Delete card enrollment
      description: |
        Delete card enrolled/registered credentials in VFC accounts.
      operationId: delete-card-enrollment
      tags:
        - Enrollment
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      responses:
        '204':
          description: Success
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/vfc/enrollment/cards:
    put:
      summary: Update card enrollment
      description: >
        Update card existing enrolled/registered credentials in VFC accounts.


        **Note:** This endpoint takes an account token - an access token encoded
        with a Pismo account ID. Tokens can expire quickly, which can result in
        a **401 Unauthorized** error.
      operationId: update-card-enrollment
      tags:
        - Enrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEnrollmentRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
              example:
                card_id: 186283624
                document_id: v-301-923113d1-c87e-460f-a504-9eb7999163f1
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/vfc/relationship/cards/{cardId}:
    parameters:
      - $ref: '#/components/parameters/CardIDpath'
    post:
      summary: Create card relationships
      description: |
        Create relationships between primary and secondary cards.
      operationId: create-card-relationship
      tags:
        - Relationships
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationshipCardRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipResponse'
              example:
                cardID: 186283623
                cards:
                  - cardID: 186283615
                    roleType: SECONDARY_INSTALLMENT
                    isFallback: false
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: List card relationships
      description: |
        List relationships for a given primary card.
      operationId: get-card-relationship
      tags:
        - Relationships
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipResponse'
              example:
                cardID: 186283623
                cards:
                  - cardID: 186283615
                    roleType: SECONDARY_INSTALLMENT
                    isFallback: false
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    put:
      summary: Update card relationships
      description: |
        Update relationships for a given primary card.
      operationId: update-card-relationship
      tags:
        - Relationships
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationshipCardRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RelationshipResponse'
              example:
                cardID: 186283623
                cards:
                  - cardID: 186283615
                    roleType: SECONDARY_INSTALLMENT
                    isFallback: false
                  - cardID: 186283617
                    roleType: SECONDARY_LOC
                    isFallback: false
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    delete:
      summary: Delete card relationships
      description: |
        Delete relationships for a given primary card.
      operationId: delete-card-relationship
      tags:
        - Relationships
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      responses:
        '204':
          description: Success
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/vfc/rules/cards/{cardId}:
    post:
      summary: Create rules
      description: |
        Create rules for a primary card.
      operationId: create-card-rules
      tags:
        - Rules
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RulesRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulesResponse'
              example:
                cardId: 186283623
                rules:
                  - cardId: 186283615
                    name: ''
                    rulePriority: 2
                    scope:
                      controlType: TCT_AUTO_PAY
                      cardHolderBillAmount:
                        minAmount: 0
                        maxAmount: 201.5
                      timeRange:
                        startTime: '2025-05-13T23:30:52.123Z'
                        endTime: '2025-08-13T23:30:52.123Z'
                    definedBy: CARDHOLDER
                    ruleId: v-301-b0c3dfae-0dd7-40b6-9272-5fa466804a8a
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: List card rules
      description: |
        Retrieve card rules for a given primary card.
      operationId: get-card-rules
      tags:
        - Rules
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulesResponse'
              example:
                cardId: 186283623
                rules:
                  - cardId: 186283615
                    rulePriority: 2
                    scope:
                      controlType: TCT_AUTO_PAY
                      cardHolderBillAmount:
                        minAmount: 0
                        maxAmount: 201.5
                      timeRange:
                        startTime: '2025-05-13T23:30:52.123Z'
                        endTime: '2025-08-13T23:30:52.123Z'
                    definedBy: CARDHOLDER
                    ruleId: v-301-b0c3dfae-0dd7-40b6-9272-5fa466804a8a
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    put:
      summary: Update card rules
      description: |
        Update rules for a given primary card.
      operationId: update-card-rules
      tags:
        - Rules
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RulesRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulesResponse'
              example:
                cardId: 186283623
                rules:
                  - cardId: 186283615
                    name: ''
                    rulePriority: 2
                    scope:
                      controlType: TCT_AUTO_PAY
                      cardHolderBillAmount:
                        minAmount: 0
                        maxAmount: 201.5
                      timeRange:
                        startTime: '2025-05-13T23:30:52.123Z'
                        endTime: '2025-08-13T23:30:52.123Z'
                    definedBy: CARDHOLDER
                    ruleId: v-301-b0c3dfae-0dd7-40b6-9272-5fa466804a8a
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    delete:
      summary: Delete card rules
      description: >
        Delete rules for a given primary card. (Rules in response represents the
        remaining rules after deleting the rule mentioned in the request).
      operationId: delete-card-rules
      tags:
        - Rules
      parameters:
        - $ref: '#/components/parameters/accessTokenHeader'
        - $ref: '#/components/parameters/CardIDpath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RulesRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulesResponse'
              example:
                cardId: 186283623
                rules:
                  - cardId: 186283615
                    name: ''
                    rulePriority: 2
                    scope:
                      controlType: TCT_AUTO_PAY
                      cardHolderBillAmount:
                        minAmount: 0
                        maxAmount: 201.5
                      timeRange:
                        startTime: '2025-05-13T23:30:52.123Z'
                        endTime: '2025-08-13T23:30:52.123Z'
