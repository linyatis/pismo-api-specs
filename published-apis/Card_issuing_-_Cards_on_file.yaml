        - Cards on file
      parameters:
        - $ref: '#/components/parameters/authPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardsOnFilePatch'
      responses:
        '200':
          description: SUCCESS
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
    post:
      summary: Create card on file (outdated)
      description: >
        Create a *card on file* - an existing card that has been tokenized and
        stored in a digital wallet. The token is then used for payment
        transactions to avoid exposing sensitive data like the card's PAN and
        CVV.<br>

        The card can be a Pismo-issued card or an external card. The card is
        added to the customer's digital wallet.<br>


        This endpoint generates a
        [provision-1](https://developers.pismo.io/events/docs/cardsonfile-provision-1)
        event.


        **Note**: This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      operationId: create-a-cardsonfile
      deprecated: true
      tags:
        - Cards on file
      parameters:
        - in: query
          name: skip_validation
          schema:
            type: boolean
          required: false
          description: Flag to skip acquirer and anti-fraud validation. Default is `false`.
        - $ref: '#/components/parameters/authPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardsOnFileCreate'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardsOnFileRegisterResponse'
        '400':
