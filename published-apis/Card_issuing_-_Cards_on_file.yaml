    patch:
      summary: Update card on file
      description: >
        Updates a card on file - change the card name, status, or profile. You
        must pass the card uuid token as a body parameter to identify the card.


        Fields that are not passed are not updated.


        This endpoint generates a [Card on file
        updated](https://developers.pismo.io/events/docs/cardsonfile-patch-cards-1)
        event. If the card status is being changed to `SUSPENDED`, it also
        generates a [Card
        excluded](https://developers.pismo.io/events/docs/cardsonfile-exclusion-1)
        event.


        **Note**: This is a PCI endpoint, use the https://gw-pci.pismolabs.io
        environment.
      operationId: updates-a-cardsonfile
